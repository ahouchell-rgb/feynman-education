name: CI

on:
  push:
    branches: [main, csv-export]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: Downloads/retrieval-app
        run: npm ci
      - name: Run tests
        working-directory: Downloads/retrieval-app
        run: npm test
