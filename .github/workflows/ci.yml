name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # ── JS workspaces: @feynman/web, @feynman/retrieval, @feynman/db ──────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install (workspaces)
        run: npm ci
      - name: Typecheck
        run: npx turbo run typecheck
      - name: Test
        run: npx turbo run test

  # ── interactive-science: prove the static build runs without error ────────────
  # NB: build.py stamps sitemap.xml <lastmod> with today's date, so the output is
  # date-dependent, not idempotent — a `git diff --exit-code` drift check would
  # fail on every run. We only assert the build completes cleanly.
  interactive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build static site
        working-directory: apps/interactive
        run: python3 build.py

  # ── retrieval Supabase Edge Functions: deploy on main when secrets present ────
  # Folded in from retrieval-app's separate deploy step. Deno edge fns deploy
  # outside Vercel. No-op on PRs / forks / when secrets are unset.
  edge-functions:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy retrieval edge functions
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        working-directory: apps/retrieval
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

  # ── repo-wide secret scan (kept from feynman; now covers all three apps) ──────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed secrets
        run: |
          set -uo pipefail
          # base64url of '"role":"service_role"' — the giveaway inside a service-role JWT.
          # (The anon key is intentionally in source in both Node apps, so we match
          # the service_role payload specifically, not any JWT.)
          SERVICE_ROLE_B64='InJvbGUiOiJzZXJ2aWNlX3JvbGUi'
          PATTERNS=(
            "$SERVICE_ROLE_B64"          # Supabase service_role JWT
            'sk_live_[0-9A-Za-z]{20,}'   # Stripe live secret key
            'whsec_[0-9A-Za-z]{24,}'     # Stripe webhook signing secret
            'sk-ant-[0-9A-Za-z_-]{40,}'  # Anthropic API key
          )
          status=0
          for pat in "${PATTERNS[@]}"; do
            # Tracked files only; exclude env examples, this workflow, and test
            # files at any depth (they legitimately carry fake placeholder secrets).
            if git grep -nIE "$pat" -- . \
                 ':(exclude,glob)**/.env.example' ':(exclude).env.example' \
                 ':(exclude).github/workflows/ci.yml' \
                 ':(exclude,glob)**/*.test.ts' ':(exclude,glob)**/*.test.tsx' \
                 ':(exclude,glob)**/*.test.js' ; then
              echo "::error::Possible committed secret matching /$pat/ — remove it and rotate the key."
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "Secret scan failed. See matches above."
            exit 1
          fi
          echo "Secret scan clean."
