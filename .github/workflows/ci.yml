name: CI
on:
  push: { branches: [main, csv-export] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Downloads/retrieval-app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: Downloads/retrieval-app/package-lock.json }
      - run: npm ci
      - run: npm test
