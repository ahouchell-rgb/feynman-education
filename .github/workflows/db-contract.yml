name: db-contract

# Turns cross-repo RPC drift from a silent production fallback into a red check.
# Path-filtered so it stays out of the way of unrelated branches — but it also
# triggers on apps/houchell/src/** because the static call-site check reads the
# app source (a new/renamed RPC call must re-run this).
# See docs/MONOREPO_AND_DOMAIN_PLAN.md §5 and packages/db/README.md.

on:
  push:
    paths:
      - "packages/db/**"
      - "apps/houchell/src/**"
      - ".github/workflows/db-contract.yml"
  pull_request:
    paths:
      - "packages/db/**"
      - "apps/houchell/src/**"
      - ".github/workflows/db-contract.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: packages/db

jobs:
  contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contract
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (pg only)
        run: npm install --no-audit --no-fund
      # Secret-free check #1: migrations/ ↔ canonical anchor ledger.
      # Runs every time; no DB or credentials needed.
      - name: Ledger ↔ migrations consistency
        run: npm run check:ledger
      # Secret-free check #2: the RPC contract list is well-formed and importable.
      # Asserts the shape of contracts/rpcs.mjs (names unique, args present) without
      # touching a DB — so even before SQL bodies are seeded, contract drift in the
      # list itself fails CI.
      - name: RPC contract shape (no DB)
        run: |
          node --input-type=module -e '
            import { REQUIRED_RPCS } from "./contracts/rpcs.mjs";
            import assert from "node:assert/strict";
            assert(Array.isArray(REQUIRED_RPCS) && REQUIRED_RPCS.length > 0, "REQUIRED_RPCS empty");
            const names = REQUIRED_RPCS.map((r) => r.name);
            assert.equal(new Set(names).size, names.length, "duplicate RPC name in contract");
            for (const r of REQUIRED_RPCS) {
              assert(typeof r.name === "string" && r.name, "RPC missing name");
              assert("args" in r, `RPC ${r.name} missing args (use null to skip signature)`);
              assert(["retrieval", "feynman"].includes(r.origin), `RPC ${r.name} bad origin`);
            }
            console.log(`RPC contract shape OK — ${REQUIRED_RPCS.length} RPCs.`);
          '
      # Secret-free check #3: the houchell app's RPC call sites stay inside the
      # contract (no undeclared RPC, no unknown parameter). Reads app source, needs
      # no DB — this is the half of the cross-repo guard that runs on every change.
      - name: Call-site contract (no DB)
        run: npm run check:callsites
      - name: Apply migrations to ephemeral Postgres
        id: apply
        run: node lib/applyMigrations.mjs
      # Full live-signature contract test. Needs the SQL bodies seeded into
      # migrations/ (supabase db pull against the anchor — see migrations/README.md)
      # so applyMigrations can build the ephemeral DB. No external secret is needed
      # (the Postgres service above is local), only the seeded SQL. Equivalent to
      # `npm test -w @houchell/db` from the repo root.
      - name: Contract test (only once SQL bodies are seeded)
        if: steps.apply.outputs.seeded == 'true'
        run: npm test
      - name: Note unseeded state
        if: steps.apply.outputs.seeded != 'true'
        run: echo "::notice::Migrations not seeded yet (supabase db pull) — ledger + RPC-shape checks ran; full signature test skipped. See packages/db/migrations/README.md."

  # Manual, secret-gated: prove the LIVE anchor still honours the contract (read-only).
  verify-live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (pg only)
        working-directory: packages/db
        run: npm install --no-audit --no-fund
      - name: Verify live anchor (skips cleanly if secret absent)
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.ANCHOR_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::notice::ANCHOR_DATABASE_URL not set — skipping live verify."
            exit 0
          fi
          npm run verify:live
