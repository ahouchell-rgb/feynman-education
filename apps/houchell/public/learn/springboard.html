<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#1E2761">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KS3 Science">
<title>Houchell · KS3 Science — learn it, step by step</title>
<meta name="description" content="A Duolingo-style home-learning course for KS3 Science, following the Springboard pathway. Learn the vocabulary with your voice, practise, and watch your streak grow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E6; --paper:#FFFFFF; --ink:#1A1A1A; --navy:#1E2761;
    --grey:#5C6370; --line:#E4DDCB; --line-2:#D7DCEC;
    --green:#2C5F2D; --green-bg:#E6F0E0; --green-line:#BFD8B6;
    --wrong:#B4341E; --wrong-bg:#FBE7E2; --wrong-line:#EBB9AC;
    --gold:#C99528; --gold-bg:#FBF1D8; --lav:#AEB6D6; --lav-pale:#D7DCEC;
    --bio:#2C5F2D; --chem:#7A4FA3; --phys:#1E5F8C; --earth:#9A6A2C;
    --shadow:0 1px 0 rgba(26,26,26,.04), 0 8px 28px rgba(30,39,97,.08);
    --r:16px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ background:var(--cream); color-scheme:light only; }
  body{ font-family:'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:var(--ink); background:var(--cream); line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100dvh; }
  .fr{ font-family:'Fraunces', Georgia, serif; letter-spacing:-0.02em; font-variation-settings:'opsz' 110,'SOFT' 20; }
  .mono-kicker{ font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
  button{ font-family:inherit; cursor:pointer; }
  .sr{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }
  .app{ max-width:680px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

  /* ===== Home top bar (streak / xp / hearts) ===== */
  .hbar{ position:sticky; top:0; z-index:20; background:var(--cream); padding:14px 18px 12px; border-bottom:1px solid rgba(30,39,97,.06); }
  .hbar .stats{ display:flex; align-items:center; gap:16px; }
  .hbar .s{ display:flex; align-items:center; gap:6px; font-weight:700; font-size:16px; }
  .hbar .s .e{ font-size:19px; }
  .hbar .streak{ color:#D9831F; } .hbar .xp{ color:var(--gold); } .hbar .hearts-c{ color:var(--wrong); }
  .hbar .spacer{ flex:1; }
  .hbar .snd{ border:none; background:transparent; font-size:19px; width:34px; height:34px; border-radius:10px; }
  .hbar .snd:hover{ background:rgba(30,39,97,.07); }
  .seg{ display:flex; gap:6px; margin-top:12px; background:#EDE6D5; padding:4px; border-radius:12px; }
  .seg button{ flex:1; border:none; background:transparent; padding:9px; border-radius:9px; font-weight:600; font-size:14px; color:var(--grey); }
  .seg button.on{ background:var(--paper); color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .yearjump{ display:flex; gap:8px; margin-top:9px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; }
  .yearjump::-webkit-scrollbar{ display:none; }
  .yearjump button{ flex:0 0 auto; min-width:62px; white-space:nowrap; border:1px solid var(--line); background:var(--paper); color:var(--grey); padding:7px 12px; border-radius:9px; font-size:12.5px; font-weight:600; }
  .yearjump button:active{ transform:translateY(1px); }

  .scroll{ flex:1; padding:6px 18px 40px; }

  /* ===== Path / course map ===== */
  .yr{ margin-top:22px; }
  .yr-head{ display:flex; align-items:center; gap:12px; margin:6px 0 14px; }
  .yr-head .yl{ font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--navy); white-space:nowrap; }
  .yr-head .hr{ flex:1; height:1px; background:var(--line); }
  .yr-head .hrs{ font-size:12px; color:var(--grey); }

  .unit{ background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:0; margin-bottom:14px; overflow:hidden; }
  .unit.locked{ background:#FBF9F2; box-shadow:none; border-color:#EFE8D6; }
  .unit-head{ display:flex; align-items:center; gap:13px; padding:17px 18px 14px; }
  .unit .badge{ width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:24px; flex:none; color:#fff; }
  .unit .meta{ flex:1; min-width:0; }
  .unit .meta .t{ font-size:17.5px; font-weight:600; color:var(--navy); line-height:1.2; }
  .unit .meta .sub{ font-size:12.5px; color:var(--grey); margin-top:4px; }
  .unit .meta .disc{ font-weight:600; }
  .ublurb{ padding:0 18px; margin-bottom:15px; font-size:13.5px; line-height:1.45; color:#6c6757; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; max-height:2.9em; }
  .crowns{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--gold); font-weight:700; flex:none; background:var(--gold-bg); padding:5px 10px; border-radius:999px; white-space:nowrap; }
  .lock-ic{ font-size:17px; color:#C3BBA4; flex:none; }

  /* lesson nodes inside a unit */
  .nodes{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); align-items:start; gap:18px 4px; padding:6px 14px 20px; }
  .node{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:7px; background:transparent; border:none; padding:0; appearance:none; -webkit-appearance:none; height:auto; min-height:0; font:inherit; color:inherit; }
  .node .ring{ width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:21px; border:2.5px solid var(--line-2); background:var(--paper); position:relative; transition:transform .06s; box-shadow:0 2px 0 rgba(30,39,97,.05); }
  .node:not(.locked):active .ring{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0); }
  .node.done .ring{ background:var(--green); border-color:var(--green); color:#fff; box-shadow:0 2px 0 rgba(44,95,45,.25); }
  .node.next .ring{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-bg); }
  .node.locked .ring{ opacity:.45; box-shadow:none; }
  .node .lab{ font-size:10px; text-align:center; color:var(--grey); line-height:1.18; min-height:24px; }
  .node.next .lab, .node.done .lab{ color:var(--navy); font-weight:600; }
  .node .start-pill{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--gold); color:#fff; font-size:8.5px; font-weight:700; letter-spacing:.05em; padding:2px 7px; border-radius:8px; text-transform:uppercase; white-space:nowrap; z-index:2; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .unit.locked .nodes{ display:none; }
  .lockmsg{ padding:0 18px 16px; margin-top:-4px; font-size:12.5px; color:#8c856f; }
  .lockmsg b{ color:#6c6757; }
  .node.recap .ring{ background:#FFF6DE; border-color:var(--gold); color:#B8860B; }
  .node.recap.done .ring{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .ext-row{ padding:0 18px 18px; }
  .ext-btn{ display:block; width:100%; text-align:center; border:1.5px solid var(--green-line); background:var(--green-bg); color:var(--green); font-weight:700; padding:13px; border-radius:13px; font-size:14px; }

  /* ===== Dashboard ===== */
  .dash{ padding-top:8px; }
  .goalcard{ background:var(--navy); color:#fff; border-radius:20px; padding:22px; display:flex; align-items:center; gap:20px; margin-bottom:16px; }
  .ring-wrap{ position:relative; width:92px; height:92px; flex:none; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-wrap .ctr{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring-wrap .ctr .n{ font-size:22px; font-weight:700; line-height:1; }
  .ring-wrap .ctr .l{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.8; margin-top:2px; }
  .goalcard .gtext .h{ font-size:20px; margin-bottom:4px; }
  .goalcard .gtext .p{ font-size:13.5px; opacity:.85; }
  .goalcard .gtext .lev{ display:inline-block; margin-top:9px; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .mcard{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:16px 17px; }
  .mcard .v{ font-size:26px; font-weight:700; line-height:1; display:flex; align-items:center; gap:7px; }
  .mcard .l{ font-size:12px; color:var(--grey); margin-top:8px; }
  .mcard.streak .v{ color:#D9831F; } .mcard.xp .v{ color:var(--gold); }
  .mcard.crowns .v{ color:var(--navy); } .mcard.words .v{ color:var(--chem); }

  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:17px; margin-bottom:16px; }
  .panel h3{ font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; }
  .week{ display:flex; justify-content:space-between; gap:6px; }
  .day{ display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; }
  .day .dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:16px; background:#EFEADB; color:#B8B09A; }
  .day.act .dot{ background:var(--green-bg); }
  .day .dl{ font-size:10.5px; color:var(--grey); }
  .ubar{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .ubar .ue{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; color:#fff; flex:none; }
  .ubar .un{ flex:1; font-size:14px; font-weight:500; }
  .ubar .ut{ width:90px; height:8px; background:#EDE6D5; border-radius:999px; overflow:hidden; }
  .ubar .ut > i{ display:block; height:100%; background:var(--green); border-radius:999px; }
  .ubar .up{ font-size:12px; color:var(--grey); width:34px; text-align:right; }
  .resetbtn{ width:100%; border:1px solid var(--line); background:transparent; color:var(--grey); padding:11px; border-radius:12px; font-size:13px; margin-top:4px; }
  .srow{ display:flex; align-items:center; gap:13px; padding:7px 0; }
  .srow .snum{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-size:21px; font-weight:700; flex:none; }
  .srow .snum.due{ background:var(--gold-bg); color:var(--gold); }
  .srow .snum.tracked{ background:#F4F6FC; color:var(--navy); }
  .srow .sl{ display:flex; flex-direction:column; gap:1px; }
  .srow .sl b{ font-size:14.5px; color:var(--ink); }
  .srow .sl span{ font-size:12.5px; color:var(--grey); }
  .srdone{ text-align:center; font-size:13.5px; color:var(--green); background:var(--green-bg); border-radius:12px; padding:11px; margin-top:8px; }

  /* ===== Lesson player ===== */
  .topbar{ display:flex; align-items:center; gap:14px; padding:14px 16px; position:sticky; top:0; background:var(--cream); z-index:20; }
  .iconbtn{ border:none; background:transparent; color:var(--grey); font-size:22px; line-height:1; width:34px; height:34px; border-radius:10px; display:grid; place-items:center; }
  .iconbtn:hover{ background:rgba(30,39,97,.07); color:var(--navy); }
  .pbar{ flex:1; height:14px; background:#E9E2D1; border-radius:999px; overflow:hidden; }
  .pbar > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--green),#3f8a40); border-radius:999px; transition:width .45s cubic-bezier(.4,0,.2,1); }
  .hearts{ display:flex; align-items:center; gap:5px; font-weight:600; color:var(--wrong); font-size:15px; }
  .hearts .hh{ font-size:18px; line-height:1; }
  .stage{ flex:1; padding:8px 18px 160px; display:flex; flex-direction:column; }
  .step-kicker{ margin-bottom:10px; }
  .prompt{ font-size:25px; line-height:1.18; color:var(--navy); margin-bottom:4px; }
  @media (max-width:430px){ .prompt{ font-size:21px; } }

  .teach{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-top:6px; }
  .teach .emoji{ font-size:34px; display:block; margin-bottom:10px; }
  .teach h2{ font-size:23px; color:var(--navy); line-height:1.2; margin-bottom:12px; }
  .teach p{ font-size:16.5px; margin-bottom:12px; color:#2a2a28; }
  .teach p:last-child{ margin-bottom:0; }
  .teach b{ color:var(--navy); font-weight:600; }
  /* on-mistake re-teach: a compact .teach card shown inside the feedback sheet */
  .teach.reteach{ padding:14px 16px; margin-top:12px; box-shadow:none; border-radius:14px; }
  .teach.reteach .emoji{ font-size:24px; margin-bottom:6px; }
  .teach.reteach p{ font-size:15px; margin-bottom:7px; }
  .teach.reteach .rt-k{ font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--grey); margin-bottom:7px; }

  /* vocab card */
  .vcard{ text-align:center; padding:30px 22px; }
  .vcard .term{ font-size:34px; color:var(--navy); margin:6px 0 4px; }
  .vcard .say{ font-size:15px; color:var(--grey); font-style:italic; margin-bottom:14px; }
  .vcard .def{ font-size:17px; color:#2a2a28; max-width:34ch; margin:0 auto; }
  .etym{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:13px; padding:13px 14px; margin:4px auto 14px; max-width:36ch; }
  .etym-h{ font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--grey); margin-bottom:9px; }
  .etym-bits{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; }
  .ebit{ display:inline-flex; flex-direction:column; align-items:center; background:var(--paper); border:1px solid var(--line-2); border-radius:9px; padding:5px 10px; min-width:48px; }
  .ebit b{ font-size:15px; color:var(--navy); } .ebit span{ font-size:11px; color:var(--grey); }
  .eplus{ color:var(--lav); font-weight:700; }
  .etym-gloss{ font-size:14.5px; color:var(--navy); font-weight:600; margin-top:10px; }
  .speakbtn{ display:inline-flex; align-items:center; gap:10px; margin:6px auto 0; border:2px solid var(--lav); background:var(--paper); color:var(--navy); font-weight:600; font-size:16px; padding:13px 22px; border-radius:999px; }
  .speakbtn .ic{ font-size:22px; }
  .speakbtn:active{ transform:scale(.97); }

  /* mic / speak step */
  .mic-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:18px; }
  .micbtn{ width:108px; height:108px; border-radius:50%; border:none; background:var(--navy); color:#fff; font-size:46px; display:grid; place-items:center; box-shadow:0 6px 0 rgba(0,0,0,.18); }
  .micbtn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .micbtn.listening{ background:var(--wrong); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 0 rgba(180,52,30,.4); } 50%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 16px rgba(180,52,30,0); } }
  .mic-status{ font-size:15px; color:var(--grey); min-height:24px; text-align:center; }
  .mic-status b{ color:var(--navy); }
  .heard{ font-size:15px; color:var(--navy); font-weight:600; }

  /* type-what-you-hear */
  .listen-big{ display:flex; justify-content:center; margin:20px 0; }
  .listen-big button{ width:84px; height:84px; border-radius:20px; border:none; background:var(--navy); color:#fff; font-size:38px; box-shadow:0 5px 0 rgba(0,0,0,.16); }
  .listen-big button:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .tinput{ width:100%; padding:15px 16px; font-family:inherit; font-size:18px; border:2px solid var(--line-2); border-radius:14px; background:var(--paper); color:var(--ink); outline:none; }
  .tinput:focus{ border-color:var(--navy); }
  .tinput.ok{ border-color:var(--green); background:var(--green-bg); color:var(--green); }
  .tinput.bad{ border-color:var(--wrong); background:var(--wrong-bg); }

  .opts{ display:flex; flex-direction:column; gap:11px; margin-top:14px; }
  .opt{ position:relative; text-align:left; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:15px 16px 15px 52px; font-size:16.5px; color:var(--ink); transition:border-color .12s, background .12s, transform .04s; }
  .opt:hover:not(:disabled){ border-color:var(--lav); }
  .opt:active:not(:disabled){ transform:translateY(1px); }
  .opt .num{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:8px; border:1.5px solid var(--line-2); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--grey); }
  .opt.sel{ border-color:var(--navy); background:#F4F6FC; } .opt.sel .num{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .opt.correct{ border-color:var(--green-line); background:var(--green-bg); } .opt.correct .num{ border-color:var(--green); background:var(--green); color:#fff; }
  .opt.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); } .opt.wrong .num{ border-color:var(--wrong); background:var(--wrong); color:#fff; }
  .opt.dim{ opacity:.55; }
  .opt .mk{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-weight:700; font-size:17px; }
  .opt.correct .mk{ color:var(--green); } .opt.wrong .mk{ color:var(--wrong); }
  .hint{ font-size:13.5px; color:var(--grey); margin-top:10px; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:14px; }
  .chip{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:14px; font-size:16px; text-align:left; }
  .chip.sel{ border-color:var(--navy); background:#F4F6FC; }
  .chip.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }
  .chip.miss{ border-color:var(--green); border-style:dashed; }

  .sentence{ font-size:19px; line-height:2.1; margin-top:16px; color:#2a2a28; }
  .blank{ display:inline-block; min-width:96px; border-bottom:2.5px solid var(--lav); margin:0 3px; text-align:center; color:var(--navy); font-weight:600; padding:0 6px; }
  .blank.filled{ border-bottom-color:var(--navy); }
  .blank button{ border:none; background:#F4F6FC; border-radius:8px; padding:4px 10px; font-size:16px; font-weight:600; color:var(--navy); }
  .blank.ok{ color:var(--green); border-bottom-color:var(--green); } .blank.ok button{ background:var(--green-bg); color:var(--green); }
  .blank.bad{ color:var(--wrong); border-bottom-color:var(--wrong); } .blank.bad button{ background:var(--wrong-bg); color:var(--wrong); }
  .bank{ display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
  .token{ background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:12px; padding:11px 16px; font-size:16px; font-weight:500; color:var(--ink); }
  .token:hover:not(:disabled){ border-color:var(--lav); }
  .token.used{ opacity:.32; pointer-events:none; }

  .match{ display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-top:16px; }
  .match .col{ display:flex; flex-direction:column; gap:11px; }
  .mitem{ position:relative; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:13px 13px; font-size:14.5px; text-align:left; min-height:52px; }
  .mitem:hover:not(:disabled){ border-color:var(--lav); }
  .mitem.active{ border-color:var(--navy); background:#F4F6FC; }
  .mitem.paired{ border-color:var(--lav); background:#FBFAF5; }
  .mitem .dot{ position:absolute; top:8px; right:9px; width:13px; height:13px; border-radius:50%; }
  .mitem.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .mitem.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }

  /* spaced-retrieval review banner */
  .review-banner{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; border:none; border-radius:16px; padding:15px 17px; margin:18px 0 6px; box-shadow:var(--shadow); }
  .review-banner.due{ background:var(--navy); color:#fff; }
  .review-banner.clear{ background:var(--paper); border:1px solid var(--line); box-shadow:none; }
  .review-banner .rb-ic{ font-size:24px; flex:none; }
  .review-banner .rb-txt{ flex:1; display:flex; flex-direction:column; gap:2px; min-width:0; }

  .review-banner.weak{ background:#fff; border:1.5px solid var(--gold); box-shadow:none; }
  .review-banner.weak .rb-txt b{ color:#8a6400; } .review-banner.weak .rb-txt span{ font-size:12.5px; color:var(--grey); }

  /* diagram (tap the part) */
  .diagram{ position:relative; width:100%; max-width:380px; margin:16px auto 8px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); }
  .diagram svg{ display:block; }
  .hotspot{ position:absolute; width:34px; height:34px; transform:translate(-50%,-50%); border-radius:50%; border:2.5px solid var(--navy); background:rgba(30,39,97,.10); cursor:pointer; }
  .hotspot:hover:not(:disabled){ background:rgba(30,39,97,.2); }
  .hotspot.sel{ background:rgba(30,39,97,.28); box-shadow:0 0 0 4px var(--lav-pale); }
  .hotspot.correct{ border-color:var(--green); background:rgba(44,95,45,.28); }
  .hotspot.wrong{ border-color:var(--wrong); background:rgba(180,52,30,.28); }

  /* progressive build-up diagram (one label revealed per fact) */
  .bdiagram{ position:relative; width:100%; max-width:360px; margin:14px auto 4px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); }
  .bdiagram svg{ display:block; }
  .dlabel{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none; z-index:2; }
  .ddot{ width:13px; height:13px; border-radius:50%; background:var(--lav-pale); border:2.5px solid var(--navy); box-shadow:0 1px 4px rgba(30,39,97,.25); }
  .dtag{ font:600 11px/1.1 ui-rounded,system-ui; color:var(--navy); background:rgba(255,255,255,.93); border:1px solid var(--line); border-radius:8px; padding:2px 6px; white-space:nowrap; box-shadow:var(--shadow); }
  .dlabel:not(.cur){ opacity:.6; }
  .dlabel.cur{ z-index:3; animation:dpop .35s ease-out; }
  .dlabel.cur .ddot{ background:var(--navy); animation:dpulse 1.5s ease-out infinite; }
  .dlabel.cur .dtag{ background:var(--navy); color:#fff; border-color:var(--navy); }
  @keyframes dpulse{ 0%{box-shadow:0 0 0 0 rgba(30,39,97,.45)} 100%{box-shadow:0 0 0 11px rgba(30,39,97,0)} }
  @keyframes dpop{ 0%{transform:translate(-50%,-50%) scale(.6); opacity:0} 100%{transform:translate(-50%,-50%) scale(1); opacity:1} }
  .motion-off .dlabel.cur,.motion-off .dlabel.cur .ddot{ animation:none; }

  /* ===== Living-diagram simulation layer =====
     SVG elements tagged class="sm-…" come alive; elements tagged data-part="id"
     stay hidden until the matching fact reveals them (set by applyLiveDiagram),
     so the picture assembles AND moves as the student learns. The global
     a11y-motion-off / prefers-reduced-motion rules above already stop all of it. */
  .bdiagram svg [class*="sm-"]{ transform-box:fill-box; transform-origin:center; }
  .bdiagram svg [data-part]{ transition:opacity .55s ease, transform .55s ease; }
  .sm-spin{ animation:sm-spin 3s linear infinite; }
  .sm-spin-slow{ animation:sm-spin 9s linear infinite; }
  .sm-spin-rev{ animation:sm-spin 3s linear infinite reverse; }
  .sm-flow{ animation:sm-flow 1s linear infinite; }
  .sm-flow-slow{ animation:sm-flow 2.2s linear infinite; }
  .sm-flow-rev{ animation:sm-flow-rev 1.4s linear infinite; }
  .sm-pulse{ animation:sm-pulse 1.6s ease-in-out infinite; }
  .sm-throb{ animation:sm-throb 1s ease-in-out infinite; }
  .sm-drift{ animation:sm-drift 2.6s ease-in-out infinite; }
  .sm-osc{ animation:sm-osc 1.8s ease-in-out infinite; }
  .sm-osc-x{ animation:sm-osc-x 1.8s ease-in-out infinite; }
  .sm-rise{ animation:sm-rise 2.6s ease-in infinite; }
  .sm-fall{ animation:sm-fall 2.6s ease-in infinite; }
  .sm-blink{ animation:sm-blink 1.4s ease-in-out infinite; }
  .sm-glow{ animation:sm-glow 2s ease-in-out infinite; }
  .sm-shake{ animation:sm-shake .3s ease-in-out infinite; }
  .sm-sweep{ animation:sm-sweep 2.8s ease-in-out infinite; }
  @keyframes sm-spin{ to{ transform:rotate(360deg); } }
  @keyframes sm-flow{ to{ stroke-dashoffset:-24; } }
  @keyframes sm-flow-rev{ to{ stroke-dashoffset:24; } }
  @keyframes sm-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.13); } }
  @keyframes sm-throb{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  @keyframes sm-drift{ 0%{ transform:translate(0,0); } 25%{ transform:translate(2px,-2.5px); } 50%{ transform:translate(-2.5px,1.5px); } 75%{ transform:translate(1.5px,2px); } 100%{ transform:translate(0,0); } }
  @keyframes sm-osc{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  @keyframes sm-osc-x{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(5px); } }
  @keyframes sm-rise{ 0%{ transform:translateY(2px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(-16px); opacity:0; } }
  @keyframes sm-fall{ 0%{ transform:translateY(-14px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(4px); opacity:0; } }
  @keyframes sm-blink{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  @keyframes sm-glow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  @keyframes sm-shake{ 0%,100%{ transform:translate(0,0); } 25%{ transform:translate(.9px,-.9px); } 75%{ transform:translate(-.9px,.9px); } }
  @keyframes sm-sweep{ 0%{ transform:translateX(-6px); opacity:.35; } 50%{ opacity:1; } 100%{ transform:translateX(6px); opacity:.35; } }

  /* settings sheet */

  .sheet{ width:100%; max-width:680px; background:var(--cream); border-radius:20px 20px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); animation:slideup .22s ease both; }

  /* accessibility modes */

  /* numeric */

  /* exam-style cards (reveal mark scheme) */
  .exam-marks{ display:inline-block; font-family:'IBM Plex Sans',monospace; background:var(--navy); color:#fff; font-weight:700; padding:3px 11px; border-radius:999px; font-size:12.5px; letter-spacing:.02em; margin-bottom:8px; }
  .exam-stem{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:16px 18px; margin-top:8px; font-size:15px; line-height:1.5; color:var(--ink); }

  .scheme ul{ margin:0; padding:0; list-style:none; }

  .slot-fill{ flex:1; }
  .order-pool{ display:flex; flex-wrap:wrap; gap:9px; }
  .order-chip{ width:100%; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:11px; padding:11px 14px; font-size:15px; text-align:left; color:var(--ink); }
  .order-pool .order-chip{ width:auto; }
  .order-chip:hover:not(:disabled){ border-color:var(--lav); }
  .order-chip.correct{ border-color:var(--green-line); background:var(--green-bg); color:var(--green); }
  .order-chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); color:var(--wrong); }

  .footer{ position:fixed; left:0; right:0; bottom:0; z-index:30; }

  .footer.fb-ok .inner{ background:var(--green-bg); border-top-color:var(--green-line); }

  .fbhead h3{ font-size:18px; } .fb-ok .fbhead h3{ color:var(--green); } .fb-bad .fbhead h3{ color:var(--wrong); }
  .fbwhy{ font-size:15px; color:#2a2a28; margin-bottom:14px; } .fbwhy b{ color:var(--navy); } .fb-bad .fbwhy .ans{ color:var(--green); font-weight:600; }
  .btn{ display:block; width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; box-shadow:0 4px 0 rgba(0,0,0,.14); transition:transform .05s, box-shadow .05s, background .15s; }

  /* ============ DARK THEME (Duolingo-style glassmorphism) ============ */
  :root{
    --cream:#0a1626; --paper:rgba(255,255,255,.065); --ink:#eef4ff; --navy:#cfe0ff;
    --grey:#9fb0c7; --line:rgba(255,255,255,.12); --line-2:rgba(255,255,255,.16);
    --green:#58e0c2; --green-bg:rgba(88,224,194,.14); --green-line:rgba(88,224,194,.34);
    --wrong:#ff7da3; --wrong-bg:rgba(255,107,154,.15); --wrong-line:rgba(255,107,154,.34);
    --gold:#ffd166; --gold-bg:rgba(255,209,102,.16); --lav:#79a7ff; --lav-pale:rgba(255,255,255,.14);
    --line-2:rgba(255,255,255,.16);
    --shadow:0 18px 50px rgba(0,0,0,.34);
    --accent:linear-gradient(135deg,#58e0c2,#79a7ff);
  }
  body{ color:#eef4ff;
    background:
      radial-gradient(circle at 15% 0%, rgba(88,224,194,.16), transparent 32%),
      radial-gradient(circle at 90% 8%, rgba(121,167,255,.18), transparent 34%),
      linear-gradient(180deg,#06111f 0%,#081528 48%,#05101e 100%);
    background-attachment:fixed; }
  /* top bar */

  .hbar .streak{ color:#ffce63; }

  .yearjump button{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.12); color:#cdd8ea; }
  /* year + unit cards */
  .yr-head .yl{ color:#9af0dd; }
  .unit{ background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 18px 50px rgba(0,0,0,.30); }
  .unit.locked{ background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.07); }

  /* path nodes */
  .node .ring{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); color:#eef4ff; box-shadow:0 8px 20px rgba(0,0,0,.32); }

Object.assign(CONTENT, {"GCA1":{"code":"GCA1","title":"Atoms, elements, compounds & mixtures","discipline":"chemistry","blurb":"Elements, compounds and mixtures, and the methods used to separate mixtures.","diagram":{"key":"d_GCA1","map":["element",["compound","mixture"],null,["filtration","crystallisation"],null,"chromatography"]},"vocab":[{"term":"element","definition":"a substance made of only one type of atom","say":"el-e-ment"},{"term":"compound","definition":"two or more elements chemically bonded together","say":"com-pound"},{"term":"mixture","definition":"substances mixed together but not chemically joined","say":"mix-ture"},{"term":"filtration","definition":"separating an insoluble solid from a liquid using filter paper","say":"fil-tray-shun"},{"term":"crystallisation","definition":"getting a soluble solid from solution by evaporating the solvent","say":"cris-tal-eye-zay-shun"},{"term":"chromatography","definition":"separating substances by how far they travel with a solvent","say":"crow-ma-tog-ra-fee"}],"facts":["An element is made of only one type of atom; there are about 100 elements in the periodic table.","A compound is two or more elements chemically bonded together; a mixture is substances that are not chemically joined.","A compound can only be separated by a chemical reaction, but a mixture can be separated by physical methods.","Filtration separates an insoluble solid from a liquid; crystallisation gets a soluble solid back from a solution by evaporating the solvent.","Distillation separates a liquid from a solution (simple) or separates liquids by their boiling points (fractional).","Chromatography separates substances in a mixture by how far they travel up the paper with the solvent."],"misconceptions":[{"wrong":"A mixture and a compound are the same thing.","right":"A compound is chemically bonded and needs a reaction to separate; a mixture is not bonded and separates physically."},{"wrong":"Air is a compound.","right":"Air is a mixture of gases that are not chemically joined."}],"questions":[{"type":"mcq","q":"What is an element?","options":[{"t":"A substance made of only one type of atom","correct":true},{"t":"Two elements bonded together","why":"That is a compound."},{"t":"Several substances mixed but not bonded","why":"That is a mixture."}],"ok":"An element contains only one type of atom."},{"type":"mcq","q":"How is a compound different from a mixture?","options":[{"t":"A compound is chemically bonded; a mixture is not","correct":true},{"t":"A compound is always a gas","why":"Compounds can be solids, liquids or gases."},{"t":"A mixture always contains a metal","why":"Mixtures need not contain a metal."}],"ok":"Compounds are chemically bonded and need a reaction to separate; mixtures do not."},{"type":"categorise","q":"Match each separation method to what it separates.","bins":["Insoluble solid from liquid","Soluble solid from solution","Coloured substances in a mixture"],"items":[{"t":"Filtration","bin":"Insoluble solid from liquid"},{"t":"Crystallisation","bin":"Soluble solid from solution"},{"t":"Chromatography","bin":"Coloured substances in a mixture"}],"ok":"Each method exploits a different physical property.","bad":"Filtration: insoluble solid. Crystallisation: dissolved solid. Chromatography: coloured mixtures."},{"type":"mcq","q":"Which method separates a soluble salt from its solution?","options":[{"t":"Crystallisation","correct":true},{"t":"Filtration","why":"Filtration only removes insoluble solids."},{"t":"Chromatography","why":"Chromatography separates coloured substances, not a salt from water."}],"ok":"Crystallisation evaporates the solvent to leave the soluble solid behind."},{"type":"mcq","q":"Which separates a liquid from a dissolved solid (e.g. getting pure water from salty water)?","options":[{"t":"Distillation","correct":true},{"t":"Filtration","why":"Filtration cannot remove a dissolved solid."},{"t":"Chromatography","why":"Chromatography does not collect a pure liquid."}],"ok":"Distillation evaporates and condenses the liquid, leaving the dissolved solid behind."},{"type":"tf","q":"A compound can be separated into its elements using physical methods alone.","answer":false,"why":"A compound is chemically bonded, so it needs a chemical reaction to separate it."},{"type":"mcq","q":"Why is sea water described as a mixture?","options":[{"t":"The salt and water are not chemically bonded","correct":true},{"t":"Salt and water are the same element","why":"They are different substances."},{"t":"It can only be separated by a reaction","why":"A mixture separates by physical methods, like distillation."}],"ok":"In a mixture the substances are not chemically joined."}]},"GCA2":{"code":"GCA2","title":"Atomic structure & isotopes","discipline":"chemistry","blurb":"Subatomic particles, atomic and mass number, isotopes and electronic structure.","diagram":{"key":"d_GCA2","map":["nucleus",["proton","neutron","electron"],null,null,["innerShell","outerShell"]]},"vocab":[{"term":"proton","definition":"a positive subatomic particle in the nucleus","say":"pro-ton"},{"term":"neutron","definition":"a neutral subatomic particle in the nucleus","say":"new-tron"},{"term":"electron","definition":"a negative subatomic particle that orbits in shells","say":"ee-lec-tron"},{"term":"isotope","definition":"atoms of the same element with different numbers of neutrons","say":"eye-so-tope"},{"term":"electronic structure","definition":"how the electrons are arranged in shells, e.g. 2,8,1","say":"ee-lec-tron-ic structure"}],"facts":["An atom has a tiny central nucleus of protons and neutrons, with electrons arranged in shells around it; the radius of an atom is about 1 x 10 to the minus 10 metres.","Relative charges: a proton is +1, a neutron is 0 and an electron is -1. A proton and a neutron each have a relative mass of 1; an electron is almost nothing (about 1/1835).","The atomic number is the number of protons; in a neutral atom this equals the number of electrons. The mass number is the number of protons plus neutrons.","Isotopes are atoms of the same element with the same number of protons but different numbers of neutrons.","Electrons fill shells from the inside out: the first shell holds up to 2 electrons, then the next shells hold up to 8, for example sodium is 2,8,1."],"misconceptions":[{"wrong":"Electrons are found in the nucleus.","right":"The nucleus holds protons and neutrons; electrons orbit it in shells."},{"wrong":"Isotopes are different elements.","right":"Isotopes are the same element (same protons); they differ only in the number of neutrons."}],"questions":[{"type":"mcq","q":"Where in the atom are the protons and neutrons found?","options":[{"t":"In the nucleus","correct":true},{"t":"In the electron shells","why":"Electrons are in the shells; protons and neutrons are in the nucleus."},{"t":"Spread evenly through the atom","why":"They are concentrated in the central nucleus."}],"ok":"Protons and neutrons are found in the nucleus."},{"type":"mcq","q":"What is the relative charge of an electron?","options":[{"t":"-1","correct":true},{"t":"+1","why":"That is the charge of a proton."},{"t":"0","why":"That is the charge of a neutron."}],"ok":"An electron has a relative charge of -1."},{"type":"numeric","kicker":"Work it out","q":"An atom has an atomic number of 17 and a mass number of 35. How many neutrons does it have?","hint":"neutrons = mass number minus atomic number","answer":18,"unit":"neutrons","ok":"35 - 17 = 18 neutrons."},{"type":"mcq","q":"What do two isotopes of an element have in common?","options":[{"t":"The same number of protons","correct":true},{"t":"The same number of neutrons","why":"That is what differs between isotopes."},{"t":"The same mass number","why":"Different neutron numbers give different mass numbers."}],"ok":"Isotopes have the same number of protons but different neutrons."},{"type":"mcq","q":"How many electrons can the first shell of an atom hold?","options":[{"t":"2","correct":true},{"t":"8","why":"The first shell holds 2; later shells hold up to 8."},{"t":"18","why":"The first shell only holds 2 electrons."}],"ok":"The first electron shell holds a maximum of 2 electrons."},{"type":"numeric","kicker":"Work it out","q":"A neutral atom has 12 protons. How many electrons does it have?","hint":"In a neutral atom, electrons = protons","answer":12,"unit":"electrons","ok":"A neutral atom has equal protons and electrons, so 12."},{"type":"mcq","q":"What is the electronic structure of a sodium atom (11 electrons)?","options":[{"t":"2,8,1","correct":true},{"t":"8,2,1","why":"Shells fill from the inside out: 2 then 8 then 1."},{"t":"2,9","why":"The second shell only holds up to 8 electrons."}],"ok":"Sodium fills 2, then 8, leaving 1 in the third shell: 2,8,1."}]},"GCA3":{"code":"GCA3","title":"The periodic table","discipline":"chemistry","blurb":"How the table is arranged, groups and periods, and the trends in Groups 1, 7 and 0.","diagram":{"key":"d_GCA3","map":[["atomicOrder"],["group","period"],["metals","nonMetals"],["group1"],["group0"]]},"vocab":[{"term":"group","definition":"a column of the periodic table; elements share similar properties","say":"groop"},{"term":"period","definition":"a row of the periodic table","say":"peer-ee-od"},{"term":"alkali metal","definition":"a Group 1 metal that reacts vigorously with water","say":"al-ka-lye metal"},{"term":"halogen","definition":"a Group 7 non-metal that forms salts","say":"hal-o-jen"},{"term":"noble gas","definition":"a Group 0 element with a full outer shell, very unreactive","say":"no-bul gas"}],"facts":["The elements are arranged in order of increasing atomic number. Mendeleev arranged earlier versions by properties and left gaps for undiscovered elements.","Groups are the columns; elements in a group have the same number of outer electrons and similar properties. Periods are the rows.","Metals are on the left and centre; non-metals are on the right.","Group 1 (alkali metals) react with water to form hydrogen and an alkali, and get more reactive down the group. Higher tier: the outer electron is further from the nucleus, so it is lost more easily.","Group 7 (halogens) get less reactive down the group, and a more reactive halogen displaces a less reactive one. Group 0 (noble gases) have full outer shells, so they are unreactive."],"misconceptions":[{"wrong":"Group 1 metals get less reactive down the group.","right":"Group 1 metals get MORE reactive down the group, because the outer electron is lost more easily."},{"wrong":"Noble gases are unreactive because they have no electrons.","right":"Noble gases are unreactive because they have a full (stable) outer shell of electrons."}],"questions":[{"type":"mcq","q":"How are the elements ordered in the modern periodic table?","options":[{"t":"By increasing atomic number","correct":true},{"t":"By increasing mass only","why":"The modern table is ordered by atomic number, not just mass."},{"t":"Alphabetically","why":"Elements are not arranged alphabetically."}],"ok":"Elements are arranged in order of increasing atomic number."},{"type":"mcq","q":"What do elements in the same group have in common?","options":[{"t":"The same number of electrons in their outer shell","correct":true},{"t":"The same number of protons","why":"Different elements have different proton numbers."},{"t":"The same mass number","why":"Group members have different masses."}],"ok":"Same outer-shell electrons gives a group its similar properties."},{"type":"mcq","q":"What happens to the reactivity of Group 1 metals down the group?","options":[{"t":"It increases","correct":true},{"t":"It decreases","why":"Group 1 reactivity increases down the group."},{"t":"It stays the same","why":"Reactivity changes down the group."}],"ok":"Group 1 metals get more reactive down the group."},{"type":"mcq","q":"What happens to the reactivity of Group 7 halogens down the group?","options":[{"t":"It decreases","correct":true},{"t":"It increases","why":"Halogen reactivity decreases down the group."},{"t":"It stays the same","why":"Reactivity changes down the group."}],"ok":"Halogens get less reactive down the group."},{"type":"mcq","q":"Why are the Group 0 noble gases unreactive?","options":[{"t":"They have a full, stable outer shell of electrons","correct":true},{"t":"They have no protons","why":"They do have protons; it is the full outer shell that matters."},{"t":"They are all metals","why":"Noble gases are non-metals."}],"ok":"A full outer shell makes the noble gases very unreactive."},{"type":"mcq","q":"Why did Mendeleev leave gaps in his early periodic table?","options":[{"t":"For elements that had not yet been discovered","correct":true},{"t":"Because he ran out of space","why":"The gaps were deliberate, for undiscovered elements."},{"t":"To separate metals from gases","why":"The gaps were for missing elements, predicted by their properties."}],"ok":"He left gaps for undiscovered elements and predicted their properties."},{"type":"multi","q":"Tap the properties of Group 1 alkali metals.","items":[{"t":"They react with water","correct":true},{"t":"They form an alkali and hydrogen with water","correct":true},{"t":"They get more reactive down the group","correct":true},{"t":"They are unreactive like the noble gases"}],"ok":"Alkali metals react with water and get more reactive down the group.","bad":"Alkali metals are very reactive, unlike the noble gases."}]},"GCA-EX":{"code":"GCA-EX","title":"Atomic structure — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Atomic structure and the periodic table.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"An atom of potassium has an atomic number of 19 and a mass number of 39. Calculate its number of neutrons.","hint":"neutrons = mass number minus atomic number","answer":20,"unit":"neutrons","ok":"39 - 19 = 20 neutrons."},{"type":"mcq","q":"An atom has the electronic structure 2,8,7. Which group is it in?","options":[{"t":"Group 7","correct":true},{"t":"Group 2","why":"The number of outer-shell electrons gives the group; here it is 7."},{"t":"Group 8","why":"A full outer shell of 8 would be Group 0; this has 7."}],"ok":"7 electrons in the outer shell means Group 7 (a halogen)."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain why the reactivity of the Group 1 metals increases going down the group. (Higher tier)","scheme":["Group 1 atoms have one electron in their outer shell (1)","To react, this outer electron must be lost (1)","Going down the group, atoms have more shells / are larger (1)","so the outer electron is further from the nucleus (1)","and is less strongly attracted / more easily lost (1)","so the metal is more reactive (also outer electron is shielded by inner shells) (1)"],"model":"Group 1 atoms react by losing their single outer electron. Down the group the atoms are larger, so the outer electron is further from the nucleus and shielded by more inner shells. It is therefore held less strongly and lost more easily, making the metal more reactive."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe how you could use chromatography to find out whether a food colouring is a single dye or a mixture of dyes.","scheme":["Put a spot of the colouring on a pencil baseline on chromatography paper (1)","Place the paper in a solvent (below the baseline) (1)","Allow the solvent to rise and carry the dyes up the paper (1)","A single dye gives one spot; a mixture gives two or more spots (1)"],"model":"Spot the colouring on a pencil baseline, stand the paper in solvent below the line, and let the solvent rise. A single dye produces one spot; a mixture separates into two or more spots."}]},"GCB1":{"code":"GCB1","title":"Ionic, covalent & metallic bonding","discipline":"chemistry","blurb":"How the three types of chemical bond form and hold substances together.","diagram":{"key":"d_GCB1","map":["ionicPanel",["covalentPanel","sharedPair"],["metalIon","electronSea"],"positiveIon",null]},"vocab":[{"term":"ionic bond","definition":"the strong attraction between oppositely charged ions","say":"eye-on-ic bond"},{"term":"covalent bond","definition":"a shared pair of electrons between two non-metal atoms","say":"co-vay-lent bond"},{"term":"metallic bond","definition":"the attraction between positive metal ions and delocalised electrons","say":"met-al-ic bond"},{"term":"ion","definition":"an atom that has lost or gained electrons to become charged","say":"eye-on"},{"term":"delocalised electron","definition":"an electron free to move through a metal structure","say":"dee-loh-cal-ized"}],"facts":["Ionic bonding happens between a metal and a non-metal: electrons are transferred, forming oppositely charged ions that attract strongly.","Covalent bonding happens between non-metals: atoms share pairs of electrons.","Metallic bonding is in metals: positive metal ions sit in a sea of delocalised electrons that hold them together.","Atoms form ions to gain a full outer shell: metals lose electrons to form positive ions, non-metals gain electrons to form negative ions.","Ionic, covalent and metallic bonds are all strong; this strength explains many of a substance's properties."],"misconceptions":[{"wrong":"Covalent bonds form between a metal and a non-metal.","right":"Covalent bonds form between non-metals (shared electrons); ionic bonds form between a metal and a non-metal (transferred electrons)."},{"wrong":"In ionic bonding electrons are shared.","right":"In ionic bonding electrons are transferred from the metal to the non-metal; sharing is covalent bonding."}],"questions":[{"type":"mcq","q":"Ionic bonding occurs between...","options":[{"t":"a metal and a non-metal","correct":true},{"t":"two non-metals","why":"Two non-metals bond covalently."},{"t":"two metals","why":"Two metals bond metallically."}],"ok":"Ionic bonding is between a metal and a non-metal, by transferring electrons."},{"type":"mcq","q":"What is a covalent bond?","options":[{"t":"A shared pair of electrons between two non-metals","correct":true},{"t":"A transfer of electrons from metal to non-metal","why":"That is ionic bonding."},{"t":"A sea of delocalised electrons","why":"That is metallic bonding."}],"ok":"A covalent bond is a shared pair of electrons between non-metal atoms."},{"type":"mcq","q":"What holds a metal together?","options":[{"t":"Attraction between positive ions and delocalised electrons","correct":true},{"t":"Shared pairs of electrons","why":"That is covalent bonding."},{"t":"Attraction between oppositely charged ions","why":"That is ionic bonding."}],"ok":"Metallic bonding: positive ions in a sea of delocalised electrons."},{"type":"categorise","q":"Sort each substance by its bonding type.","bins":["Ionic","Covalent","Metallic"],"items":[{"t":"Sodium chloride","bin":"Ionic"},{"t":"Water","bin":"Covalent"},{"t":"Copper","bin":"Metallic"},{"t":"Magnesium oxide","bin":"Ionic"},{"t":"Carbon dioxide","bin":"Covalent"}],"ok":"Metal + non-metal is ionic; non-metals only is covalent; a pure metal is metallic.","bad":"Metal+non-metal = ionic, non-metals = covalent, a metal = metallic."},{"type":"mcq","q":"How does a metal atom form a positive ion?","options":[{"t":"It loses one or more electrons","correct":true},{"t":"It gains electrons","why":"Gaining electrons makes a negative ion; metals lose electrons."},{"t":"It gains protons","why":"Protons stay in the nucleus; only electrons move."}],"ok":"Metals lose outer electrons to form positive ions."},{"type":"tf","q":"In ionic bonding, oppositely charged ions attract each other strongly.","answer":true,"why":"Ionic bonds are the strong electrostatic attraction between oppositely charged ions."},{"type":"mcq","q":"Why does a non-metal atom form a negative ion?","options":[{"t":"It gains electrons to fill its outer shell","correct":true},{"t":"It loses electrons","why":"Non-metals gain electrons; metals lose them."},{"t":"It loses protons","why":"Ion formation involves electrons, not protons."}],"ok":"Non-metals gain electrons, becoming negatively charged ions."}]},"GCB2":{"code":"GCB2","title":"Structures & properties","discipline":"chemistry","blurb":"How ionic, molecular, giant covalent and metallic structures explain a substance's properties.","diagram":{"key":"d_GCB2","map":["ionicLattice","simpleMolecule","giantCovalent",["metalStructure","alloy"],"nanoparticle"]},"vocab":[{"term":"giant ionic lattice","definition":"a regular 3D arrangement of many ions held by strong ionic bonds","say":"jy-ant eye-on-ic lattice"},{"term":"simple molecular","definition":"made of small molecules with weak forces between them","say":"sim-pul mo-lec-yew-lar"},{"term":"giant covalent","definition":"a huge network of atoms joined by covalent bonds, like diamond","say":"jy-ant co-vay-lent"},{"term":"alloy","definition":"a mixture of a metal with another element, usually harder than the pure metal","say":"al-oy"},{"term":"nanoparticle","definition":"a particle around 1 to 100 nanometres across","say":"nan-oh-par-ti-cle"}],"facts":["Giant ionic lattices have high melting points because many strong ionic bonds must be broken; they conduct electricity when molten or dissolved, because the ions are then free to move.","Simple molecular substances (like water and carbon dioxide) have low melting and boiling points because only weak forces between molecules are broken; they do not conduct electricity.","Giant covalent structures have very high melting points. Diamond is hard (each carbon forms 4 bonds); graphite is soft and conducts (layers, with one delocalised electron per carbon).","Metals conduct electricity and heat because of their delocalised electrons, and are malleable; alloys are harder than pure metals because the different-sized atoms distort the layers.","Nanoparticles are 1 to 100 nm across and have a very large surface-area-to-volume ratio, which makes them useful as catalysts and in sunscreens, though their effects on health are not fully known."],"misconceptions":[{"wrong":"Ionic compounds conduct electricity when solid.","right":"They only conduct when molten or dissolved, because then the ions are free to move."},{"wrong":"Simple molecular substances have high melting points because covalent bonds are weak.","right":"The covalent bonds are strong, but the forces BETWEEN molecules are weak, so little energy is needed to separate them."}],"questions":[{"type":"mcq","q":"Why do ionic compounds have high melting points?","options":[{"t":"Many strong ionic bonds must be broken","correct":true},{"t":"The molecules are very heavy","why":"Ionic compounds are lattices, not molecules; it is the strong bonds."},{"t":"They contain delocalised electrons","why":"Delocalised electrons are in metals, not ionic lattices."}],"ok":"High melting points come from breaking many strong ionic bonds."},{"type":"mcq","q":"When does an ionic compound conduct electricity?","options":[{"t":"When molten or dissolved, so the ions can move","correct":true},{"t":"Only when solid","why":"When solid the ions are fixed and cannot move."},{"t":"It never conducts","why":"It conducts when the ions are free to move."}],"ok":"Conduction needs free-moving charged particles, so molten or dissolved."},{"type":"mcq","q":"Why do simple molecular substances have low melting points?","options":[{"t":"Only weak forces between molecules need to be broken","correct":true},{"t":"Their covalent bonds are weak","why":"The covalent bonds are strong; the forces between molecules are weak."},{"t":"They have no bonds at all","why":"They have strong covalent bonds within molecules."}],"ok":"Melting only breaks the weak forces between molecules, not the covalent bonds."},{"type":"mcq","q":"Why does graphite conduct electricity but diamond does not?","options":[{"t":"Graphite has delocalised electrons that can move; diamond does not","correct":true},{"t":"Graphite contains metal atoms","why":"Both are made of carbon only."},{"t":"Diamond is a liquid","why":"Diamond is a solid giant covalent structure."}],"ok":"In graphite each carbon has a delocalised electron free to move; in diamond all four are bonded."},{"type":"mcq","q":"Why are metals good conductors of electricity?","options":[{"t":"They have delocalised electrons that are free to move","correct":true},{"t":"Their ions move through the metal","why":"The ions stay in place; the electrons move."},{"t":"They contain charged molecules","why":"Metals have a lattice of ions and delocalised electrons."}],"ok":"Delocalised electrons carry the charge through the metal."},{"type":"mcq","q":"Why is an alloy usually harder than the pure metal?","options":[{"t":"Different-sized atoms distort the layers, so they cannot slide easily","correct":true},{"t":"Alloys contain no metal","why":"An alloy is mostly metal."},{"t":"Alloys are made of small molecules","why":"Alloys have a giant metallic structure."}],"ok":"Different-sized atoms stop the layers sliding, making the alloy harder."},{"type":"mcq","q":"Why are nanoparticles useful as catalysts?","options":[{"t":"They have a very large surface-area-to-volume ratio","correct":true},{"t":"They are very heavy","why":"Their usefulness comes from surface area, not mass."},{"t":"They cannot react","why":"Catalysts must take part in reactions; nanoparticles are very reactive surfaces."}],"ok":"A large surface-area-to-volume ratio gives nanoparticles a big active surface."}]},"GCB-EX":{"code":"GCB-EX","title":"Bonding — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Bonding, structure and properties.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Sodium chloride does not conduct electricity when solid, but does when molten. Why?","options":[{"t":"When molten the ions are free to move","correct":true},{"t":"When molten it gains electrons","why":"Conduction is from moving ions, not gained electrons."},{"t":"Solid salt has no ions","why":"Solid salt has ions, but they are fixed in place."}],"ok":"Molten salt has free-moving ions that can carry the charge."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Diamond and graphite are both made only of carbon, but diamond is hard and does not conduct electricity, while graphite is soft and does conduct. Explain these differences.","scheme":["Both are giant covalent structures of carbon (1)","In diamond each carbon forms 4 strong covalent bonds (1)","giving a rigid 3D structure, so it is hard (1)","In graphite each carbon forms 3 bonds, in layers (1)","the layers have weak forces between them and can slide, so it is soft/slippery (1)","graphite has one delocalised electron per carbon that can move, so it conducts (diamond has none) (1)"],"model":"Both are giant covalent carbon structures. In diamond each carbon forms four strong covalent bonds in a rigid 3D network, so it is hard, and it has no free electrons, so it cannot conduct. In graphite each carbon forms three bonds in layers; the layers slide because the forces between them are weak (soft), and each carbon has a delocalised electron that can move, so graphite conducts."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why magnesium oxide has a much higher melting point than carbon dioxide.","scheme":["Magnesium oxide is a giant ionic lattice (1)","with many strong ionic bonds that need a lot of energy to break (1)","Carbon dioxide is a simple molecular substance (1)","with only weak forces between molecules, needing little energy to break (1)"],"model":"Magnesium oxide is a giant ionic lattice held by many strong ionic bonds, so a lot of energy is needed to melt it. Carbon dioxide is simple molecular, so only weak forces between molecules must be overcome, giving a very low melting point."}]},"GCQ1":{"code":"GCQ1","title":"Conservation of mass & Mr","discipline":"chemistry","blurb":"Conservation of mass, balanced equations and relative formula mass.","diagram":{"key":"d_GCQ1","map":["balanceBeam",["reactantsPan","productsPan","atoms"],null,"escapingGas","incomingGas"]},"vocab":[{"term":"relative formula mass","definition":"the sum of the relative atomic masses of the atoms in a formula, symbol Mr","say":"rel-a-tiv form-yew-la mass"},{"term":"conservation of mass","definition":"the rule that the total mass of reactants equals the total mass of products","say":"con-ser-vay-shun of mass"},{"term":"balanced equation","definition":"an equation with the same number of each type of atom on both sides","say":"bal-anced ee-quay-shun"}],"facts":["Mass is conserved in a chemical reaction: the total mass of the reactants equals the total mass of the products, because no atoms are created or destroyed.","A balanced symbol equation has the same number of each type of atom on both sides.","The relative formula mass (Mr) is the sum of the relative atomic masses (Ar) of all the atoms in the formula.","In a reaction where a gas is given off into the open air, the mass left behind appears to fall.","In a reaction where a gas from the air is taken in (e.g. a metal rusting), the mass appears to rise."],"misconceptions":[{"wrong":"Mass is lost when a substance burns away.","right":"Mass is conserved; if mass seems to fall, a gas has escaped into the air, taking mass with it."},{"wrong":"Relative formula mass is measured in grams.","right":"Relative formula mass is a ratio with no units; it is just a number."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"12 g of carbon reacts completely with 32 g of oxygen. What mass of carbon dioxide is formed?","hint":"Conservation of mass: products total the same as reactants.","answer":44,"unit":"g","ok":"12 + 32 = 44 g of carbon dioxide."},{"type":"numeric","kicker":"Work it out","q":"Calculate the relative formula mass (Mr) of water, H2O. (Ar: H = 1, O = 16)","hint":"Mr = (2 x 1) + 16","answer":18,"unit":"","ok":"(2 x 1) + 16 = 18."},{"type":"numeric","kicker":"Work it out","q":"Calculate the Mr of calcium carbonate, CaCO3. (Ar: Ca = 40, C = 12, O = 16)","hint":"Mr = 40 + 12 + (3 x 16)","answer":100,"unit":"","ok":"40 + 12 + 48 = 100."},{"type":"mcq","q":"What does conservation of mass tell us about a reaction?","options":[{"t":"The total mass of products equals the total mass of reactants","correct":true},{"t":"Mass is always lost","why":"No atoms are lost, so total mass is unchanged."},{"t":"Mass doubles","why":"Mass is conserved, not doubled."}],"ok":"No atoms are created or destroyed, so the total mass stays the same."},{"type":"mcq","q":"A metal is heated in an open dish and its mass increases. Why?","options":[{"t":"It reacts with oxygen from the air, which adds mass","correct":true},{"t":"Mass is created in the reaction","why":"Mass cannot be created; oxygen is added from the air."},{"t":"The metal melts","why":"Melting does not change mass."}],"ok":"Oxygen from the air bonds to the metal, increasing the mass."},{"type":"tf","q":"In a sealed flask, the mass before a reaction equals the mass after.","answer":true,"why":"No atoms can enter or leave a sealed flask, so mass is conserved."},{"type":"numeric","kicker":"Work it out","q":"Calculate the Mr of carbon dioxide, CO2. (Ar: C = 12, O = 16)","hint":"Mr = 12 + (2 x 16)","answer":44,"unit":"","ok":"12 + 32 = 44."}]},"GCQ2":{"code":"GCQ2","title":"Moles, % mass & concentration","discipline":"chemistry","blurb":"Percentage by mass, the concentration of solutions, and moles (Higher tier).","diagram":{"key":"d_GCQ2","map":["solute",["solution","solvent"],"balance",null,["meniscus","scaleMarks"]]},"vocab":[{"term":"percentage by mass","definition":"the fraction of a compound's mass made up by one element, as a percentage","say":"per-cent-age by mass"},{"term":"concentration","definition":"the mass of solute dissolved in a given volume of solution","say":"con-sen-tray-shun"},{"term":"mole","definition":"the unit for amount of substance; moles = mass / Mr","say":"mohl"}],"facts":["The percentage by mass of an element in a compound = (Ar x number of atoms / Mr) x 100.","The concentration of a solution = mass of solute / volume of solution, often in grams per cubic decimetre (g/dm cubed).","Higher tier: the amount of a substance in moles = mass / relative formula mass.","Higher tier: a balanced equation tells you the ratio of moles of reactants and products.","Measurements always have some uncertainty, so repeated, careful measurements improve reliability."],"misconceptions":[{"wrong":"Concentration depends only on the mass of solute.","right":"Concentration depends on both the mass of solute AND the volume of solution."},{"wrong":"A concentrated solution always has more solute than a dilute one.","right":"It is the amount per volume that matters; a small concentrated sample can have less solute overall than a large dilute one."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"Calculate the percentage by mass of oxygen in water, H2O. (Mr = 18, O = 16)","hint":"% mass = (16 / 18) x 100","answer":89,"unit":"%","ok":"(16 / 18) x 100 = 88.9, about 89%."},{"type":"numeric","kicker":"Work it out","q":"250 g of salt is dissolved to make 5 dm cubed of solution. What is the concentration?","hint":"concentration = mass / volume","answer":50,"unit":"g/dm3","ok":"250 / 5 = 50 g/dm cubed."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: how many moles are in 36 g of water? (Mr of water = 18)","hint":"moles = mass / Mr","answer":2,"unit":"mol","ok":"36 / 18 = 2 mol."},{"type":"mcq","q":"What two quantities decide the concentration of a solution?","options":[{"t":"The mass of solute and the volume of solution","correct":true},{"t":"Only the mass of solute","why":"Volume matters too."},{"t":"Only the volume of solution","why":"The mass of solute matters too."}],"ok":"Concentration = mass of solute / volume of solution."},{"type":"numeric","kicker":"Work it out","q":"What is the Mr of magnesium oxide, MgO? (Ar: Mg = 24, O = 16)","hint":"Mr = 24 + 16","answer":40,"unit":"","ok":"24 + 16 = 40."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: how many moles are in 88 g of carbon dioxide? (Mr = 44)","hint":"moles = mass / Mr","answer":2,"unit":"mol","ok":"88 / 44 = 2 mol."},{"type":"tf","q":"Repeating a measurement and taking a mean helps reduce the effect of uncertainty.","answer":true,"why":"Repeats and a mean reduce the effect of random errors, improving reliability."}]},"GCQ-EX":{"code":"GCQ-EX","title":"Quantitative — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Quantitative chemistry.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"Calculate the Mr of sulfuric acid, H2SO4. (Ar: H = 1, S = 32, O = 16)","hint":"Mr = (2 x 1) + 32 + (4 x 16)","answer":98,"unit":"","ok":"2 + 32 + 64 = 98."},{"type":"numeric","kicker":"Exam · calculate","q":"48 g of magnesium reacts with oxygen to form 80 g of magnesium oxide. What mass of oxygen reacted?","hint":"Conservation of mass: oxygen = product mass - magnesium mass","answer":32,"unit":"g","ok":"80 - 48 = 32 g of oxygen."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student burns magnesium in an open crucible and finds the mass increases. Explain this result using conservation of mass.","scheme":["Magnesium reacts with oxygen from the air (1)","forming magnesium oxide (1)","The oxygen atoms add mass to the solid (1)","No mass is created; the extra mass comes from the oxygen that has joined the magnesium (1)"],"model":"The magnesium reacts with oxygen from the air to form magnesium oxide. The oxygen atoms become part of the solid, so the mass increases. Mass is still conserved overall — the extra mass is the oxygen taken from the air."},{"type":"numeric","kicker":"Exam · Higher","q":"Higher tier: a solution contains 0.5 mol of sodium hydroxide (Mr = 40). What mass of sodium hydroxide is this?","hint":"mass = moles x Mr","answer":20,"unit":"g","ok":"0.5 x 40 = 20 g."}]},"GCC1":{"code":"GCC1","title":"Reactivity & extracting metals","discipline":"chemistry","blurb":"The reactivity series, displacement, oxidation and reduction, and extracting metals.","diagram":{"key":"d_GCC1","map":["reactiveMetals",["reactivitySeries","unreactiveMetals"],null,"reduction",["carbonLine","electrolysis"]]},"vocab":[{"term":"reactivity series","definition":"a list of metals in order of how reactive they are","say":"ree-ac-tiv-it-ee seer-eez"},{"term":"displacement reaction","definition":"a reaction where a more reactive metal pushes a less reactive one out of its compound","say":"dis-place-ment"},{"term":"oxidation","definition":"gain of oxygen, or loss of electrons","say":"ok-si-day-shun"},{"term":"reduction","definition":"loss of oxygen, or gain of electrons","say":"ree-duc-shun"},{"term":"ore","definition":"a rock that contains enough metal to be worth extracting","say":"or"}],"facts":["The reactivity series lists metals in order of reactivity; potassium, sodium, calcium and magnesium are very reactive, while copper, silver and gold are unreactive.","A more reactive metal will displace a less reactive metal from its compound in a displacement reaction.","Oxidation is the gain of oxygen; reduction is the loss of oxygen. Higher tier: oxidation is loss of electrons and reduction is gain of electrons (OIL RIG).","Metals less reactive than carbon can be extracted by reduction with carbon, for example iron from iron oxide.","Metals more reactive than carbon (like aluminium) must be extracted by electrolysis, and very unreactive metals like gold are found native (uncombined)."],"misconceptions":[{"wrong":"All metals can be extracted using carbon.","right":"Only metals less reactive than carbon are extracted with carbon; more reactive metals need electrolysis."},{"wrong":"Reduction means making something smaller.","right":"In chemistry, reduction is the loss of oxygen, or gain of electrons."}],"questions":[{"type":"mcq","q":"In a displacement reaction, which metal is displaced?","options":[{"t":"The less reactive metal in the compound","correct":true},{"t":"The more reactive metal","why":"The more reactive metal does the displacing."},{"t":"Both metals","why":"Only the less reactive metal is pushed out."}],"ok":"A more reactive metal displaces a less reactive one from its compound."},{"type":"mcq","q":"What is oxidation?","options":[{"t":"Gain of oxygen (or loss of electrons)","correct":true},{"t":"Loss of oxygen","why":"That is reduction."},{"t":"Gain of electrons","why":"That is reduction; oxidation is loss of electrons."}],"ok":"Oxidation is gain of oxygen, or loss of electrons."},{"type":"mcq","q":"How is iron extracted from iron oxide?","options":[{"t":"By reduction with carbon","correct":true},{"t":"By electrolysis","why":"Iron is less reactive than carbon, so carbon reduction is used."},{"t":"It is found native","why":"Iron is reactive enough to be found as a compound, not native."}],"ok":"Iron is less reactive than carbon, so it is reduced by carbon."},{"type":"mcq","q":"Why must aluminium be extracted by electrolysis rather than with carbon?","options":[{"t":"Aluminium is more reactive than carbon","correct":true},{"t":"Aluminium is less reactive than carbon","why":"If it were less reactive, carbon would work; aluminium is more reactive."},{"t":"Aluminium is found native","why":"Aluminium is reactive, so it is found in compounds."}],"ok":"Aluminium is more reactive than carbon, so carbon cannot reduce it."},{"type":"categorise","q":"Sort each metal as very reactive or unreactive.","bins":["Very reactive","Unreactive"],"items":[{"t":"Potassium","bin":"Very reactive"},{"t":"Gold","bin":"Unreactive"},{"t":"Sodium","bin":"Very reactive"},{"t":"Copper","bin":"Unreactive"},{"t":"Magnesium","bin":"Very reactive"}],"ok":"Group 1 and 2 metals are very reactive; copper, silver and gold are not.","bad":"Potassium, sodium and magnesium are very reactive; copper and gold are not."},{"type":"tf","q":"Gold is found in the Earth as the uncombined metal.","answer":true,"why":"Gold is so unreactive that it is found native (uncombined)."},{"type":"mcq","q":"Higher tier: in terms of electrons, what is reduction?","options":[{"t":"Gain of electrons","correct":true},{"t":"Loss of electrons","why":"That is oxidation."},{"t":"Loss of protons","why":"Redox is about electrons, not protons."}],"ok":"Reduction is gain of electrons (OIL RIG: Reduction Is Gain)."}]},"GCC2":{"code":"GCC2","title":"Acids, bases & salts","discipline":"chemistry","blurb":"The pH scale, neutralisation, and the reactions that make salts.","diagram":{"key":"d_GCC2","map":[["phScale","indicatorBar"],["acidicEnd","alkalineEnd"],["neutralPoint"],null,null]},"vocab":[{"term":"acid","definition":"a substance that produces hydrogen ions (H+) in solution; pH less than 7","say":"as-id"},{"term":"alkali","definition":"a soluble base that produces hydroxide ions (OH-); pH more than 7","say":"al-ka-lye"},{"term":"neutralisation","definition":"the reaction of an acid with a base to make a salt and water","say":"new-tral-eye-zay-shun"},{"term":"salt","definition":"a compound made when an acid reacts with a base or metal","say":"solt"},{"term":"pH scale","definition":"a scale from 0 to 14 that measures acidity or alkalinity","say":"pee-aytch scale"}],"facts":["The pH scale runs from 0 to 14: below 7 is acidic, 7 is neutral and above 7 is alkaline. Universal indicator shows the pH by its colour.","Acids produce hydrogen ions (H+) in solution; alkalis produce hydroxide ions (OH-).","Neutralisation is acid + base making a salt and water; the ionic equation is H+ + OH- making H2O.","Acid + metal makes a salt + hydrogen; acid + metal carbonate makes a salt + water + carbon dioxide.","Higher tier: strong acids fully ionise in water, weak acids only partly ionise; each step down the pH scale means ten times the hydrogen ion concentration."],"misconceptions":[{"wrong":"A strong acid and a concentrated acid mean the same thing.","right":"Strong is about how fully it ionises; concentrated is about how much acid is dissolved in the water."},{"wrong":"Neutralisation makes a gas every time.","right":"Acid + base makes salt and water; a gas (carbon dioxide) is only made with carbonates, and hydrogen with metals."}],"questions":[{"type":"mcq","q":"What is the pH of a neutral substance?","options":[{"t":"7","correct":true},{"t":"0","why":"pH 0 is strongly acidic."},{"t":"14","why":"pH 14 is strongly alkaline."}],"ok":"Neutral substances have a pH of 7."},{"type":"mcq","q":"Which ions do acids produce in solution?","options":[{"t":"Hydrogen ions, H+","correct":true},{"t":"Hydroxide ions, OH-","why":"Those are produced by alkalis."},{"t":"Oxygen ions","why":"Acids produce hydrogen ions."}],"ok":"Acids produce H+ ions in solution."},{"type":"mcq","q":"What are the products of neutralising an acid with a base?","options":[{"t":"A salt and water","correct":true},{"t":"A salt and hydrogen","why":"Hydrogen is made with a metal, not a base."},{"t":"Only water","why":"A salt is also formed."}],"ok":"Acid + base makes a salt and water."},{"type":"mcq","q":"What is made when an acid reacts with a metal carbonate?","options":[{"t":"A salt, water and carbon dioxide","correct":true},{"t":"A salt and hydrogen","why":"Hydrogen comes from acid + metal, not a carbonate."},{"t":"Only a salt","why":"Water and carbon dioxide are also produced."}],"ok":"Acid + carbonate makes a salt, water and carbon dioxide."},{"type":"mcq","q":"What gas is given off when an acid reacts with a metal?","options":[{"t":"Hydrogen","correct":true},{"t":"Carbon dioxide","why":"That comes from carbonates, not metals."},{"t":"Oxygen","why":"Acid + metal gives hydrogen."}],"ok":"Acid + metal makes a salt and hydrogen gas."},{"type":"tf","q":"Universal indicator can be used to estimate the pH of a solution.","answer":true,"why":"Universal indicator changes colour to show the pH of a solution."},{"type":"mcq","q":"Higher tier: what is the difference between a strong and a weak acid?","options":[{"t":"A strong acid fully ionises; a weak acid only partly ionises","correct":true},{"t":"A strong acid is more concentrated","why":"Strength is about ionisation, not concentration."},{"t":"A weak acid has no hydrogen ions","why":"A weak acid does make H+, but only partly ionises."}],"ok":"Strong acids fully ionise in water; weak acids only partly ionise."}]},"GCC3":{"code":"GCC3","title":"Electrolysis","discipline":"chemistry","blurb":"Breaking down ionic compounds with electricity, and the products at each electrode.","diagram":{"key":"d_GCC3","map":[["electrolyte","powerSupply"],["cation","anion"],["cathode","anode"],null,null]},"vocab":[{"term":"electrolysis","definition":"using electricity to break down an ionic compound","say":"ee-lec-trol-iss-iss"},{"term":"electrolyte","definition":"the molten or dissolved ionic compound that is broken down","say":"ee-lec-tro-light"},{"term":"cathode","definition":"the negative electrode, which attracts positive ions","say":"cath-ode"},{"term":"anode","definition":"the positive electrode, which attracts negative ions","say":"an-ode"}],"facts":["Electrolysis uses electricity to break down an ionic compound that is molten or dissolved in water (the electrolyte).","Positive ions (cations) move to the negative cathode; negative ions (anions) move to the positive anode.","When a molten ionic compound is electrolysed, the metal forms at the cathode and the non-metal at the anode.","In a solution, hydrogen is produced at the cathode unless the metal is less reactive than hydrogen (then the metal forms).","In a solution, oxygen is produced at the anode unless a halide (such as chloride) is present, when the halogen forms instead. Higher tier: these changes can be shown with half equations."],"misconceptions":[{"wrong":"Positive ions go to the positive electrode.","right":"Opposite charges attract, so positive ions go to the negative cathode."},{"wrong":"Electrolysis works on any compound.","right":"Electrolysis breaks down ionic compounds that are molten or dissolved, so the ions can move."}],"questions":[{"type":"mcq","q":"What is electrolysis?","options":[{"t":"Using electricity to break down an ionic compound","correct":true},{"t":"Heating a compound until it melts","why":"That is just melting, not electrolysis."},{"t":"Mixing two solutions","why":"Electrolysis needs an electric current."}],"ok":"Electrolysis uses electricity to break down a molten or dissolved ionic compound."},{"type":"mcq","q":"Which ions are attracted to the negative cathode?","options":[{"t":"Positive ions","correct":true},{"t":"Negative ions","why":"Negative ions go to the positive anode."},{"t":"Both equally","why":"Opposite charges attract; positive ions go to the cathode."}],"ok":"Positive ions are attracted to the negative cathode."},{"type":"mcq","q":"When molten lead bromide is electrolysed, what forms at the cathode?","options":[{"t":"Lead (the metal)","correct":true},{"t":"Bromine","why":"Bromine, the non-metal, forms at the anode."},{"t":"Oxygen","why":"There is no oxygen in molten lead bromide."}],"ok":"In a molten ionic compound, the metal forms at the cathode."},{"type":"mcq","q":"In the electrolysis of a salt solution, what usually forms at the cathode?","options":[{"t":"Hydrogen, unless the metal is less reactive than hydrogen","correct":true},{"t":"Always the metal","why":"The metal forms only if it is less reactive than hydrogen."},{"t":"Oxygen","why":"Oxygen forms at the anode, not the cathode."}],"ok":"Hydrogen forms at the cathode unless the metal is less reactive than hydrogen."},{"type":"mcq","q":"In the electrolysis of sodium chloride solution, what forms at the anode?","options":[{"t":"Chlorine (because a halide is present)","correct":true},{"t":"Oxygen","why":"With a halide present, the halogen forms instead of oxygen."},{"t":"Sodium","why":"Sodium is a metal; it would form at the cathode, but hydrogen forms instead."}],"ok":"A halide present means the halogen (chlorine) forms at the anode."},{"type":"tf","q":"During electrolysis, negative ions are attracted to the positive anode.","answer":true,"why":"Opposite charges attract, so negative ions move to the positive anode."},{"type":"mcq","q":"Why must an ionic compound be molten or dissolved for electrolysis?","options":[{"t":"So the ions are free to move and carry the charge","correct":true},{"t":"So it becomes a gas","why":"It does not need to be a gas; the ions just need to move."},{"t":"So it stops conducting","why":"It must conduct, which needs free-moving ions."}],"ok":"Free-moving ions are needed to carry the current during electrolysis."}]},"GCC-EX":{"code":"GCC-EX","title":"Chemical changes — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemical changes.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Zinc is added to copper sulfate solution and the blue colour fades as copper appears. What type of reaction is this?","options":[{"t":"A displacement reaction (zinc is more reactive than copper)","correct":true},{"t":"Neutralisation","why":"No acid and base are reacting here."},{"t":"Electrolysis","why":"No electricity is used."}],"ok":"Zinc, being more reactive, displaces copper from its compound."},{"type":"mcq","q":"Which acid + carbonate reaction product turns limewater milky?","options":[{"t":"Carbon dioxide","correct":true},{"t":"Hydrogen","why":"Hydrogen comes from acid + metal, and does not turn limewater milky."},{"t":"Oxygen","why":"Oxygen is not a product of acid + carbonate."}],"ok":"Acid + carbonate releases carbon dioxide, which turns limewater milky."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the method used to extract a metal from its ore depends on the metal's position in the reactivity series.","scheme":["Metals less reactive than carbon can be extracted by reduction with carbon (1)","e.g. iron from iron oxide (1)","because carbon is more reactive and removes the oxygen (1)","Metals more reactive than carbon mu
