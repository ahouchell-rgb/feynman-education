<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#1E2761">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KS3 Science">
<title>Houchell · KS3 Science — learn it, step by step</title>
<meta name="description" content="A Duolingo-style home-learning course for KS3 Science, following the Springboard pathway. Learn the vocabulary with your voice, practise, and watch your streak grow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E6; --paper:#FFFFFF; --ink:#1A1A1A; --navy:#1E2761;
    --grey:#5C6370; --line:#E4DDCB; --line-2:#D7DCEC;
    --green:#2C5F2D; --green-bg:#E6F0E0; --green-line:#BFD8B6;
    --wrong:#B4341E; --wrong-bg:#FBE7E2; --wrong-line:#EBB9AC;
    --gold:#C99528; --gold-bg:#FBF1D8; --lav:#AEB6D6; --lav-pale:#D7DCEC;
    --bio:#2C5F2D; --chem:#7A4FA3; --phys:#1E5F8C; --earth:#9A6A2C;
    --shadow:0 1px 0 rgba(26,26,26,.04), 0 8px 28px rgba(30,39,97,.08);
    --r:16px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ background:var(--cream); color-scheme:light only; }
  body{ font-family:'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:var(--ink); background:var(--cream); line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100dvh; }
  .fr{ font-family:'Fraunces', Georgia, serif; letter-spacing:-0.02em; font-variation-settings:'opsz' 110,'SOFT' 20; }
  .mono-kicker{ font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
  button{ font-family:inherit; cursor:pointer; }
  .sr{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }
  .app{ max-width:680px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

  /* ===== Home top bar (streak / xp / hearts) ===== */
  .hbar{ position:sticky; top:0; z-index:20; background:var(--cream); padding:14px 18px 12px; border-bottom:1px solid rgba(30,39,97,.06); }
  .hbar .stats{ display:flex; align-items:center; gap:16px; }
  .hbar .s{ display:flex; align-items:center; gap:6px; font-weight:700; font-size:16px; }
  .hbar .s .e{ font-size:19px; }
  .hbar .streak{ color:#D9831F; } .hbar .xp{ color:var(--gold); } .hbar .hearts-c{ color:var(--wrong); }
  .hbar .spacer{ flex:1; }
  .hbar .snd{ border:none; background:transparent; font-size:19px; width:34px; height:34px; border-radius:10px; }
  .hbar .snd:hover{ background:rgba(30,39,97,.07); }
  .seg{ display:flex; gap:6px; margin-top:12px; background:#EDE6D5; padding:4px; border-radius:12px; }
  .seg button{ flex:1; border:none; background:transparent; padding:9px; border-radius:9px; font-weight:600; font-size:14px; color:var(--grey); }
  .seg button.on{ background:var(--paper); color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .yearjump{ display:flex; gap:8px; margin-top:9px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; }
  .yearjump::-webkit-scrollbar{ display:none; }
  .yearjump button{ flex:0 0 auto; min-width:62px; white-space:nowrap; border:1px solid var(--line); background:var(--paper); color:var(--grey); padding:7px 12px; border-radius:9px; font-size:12.5px; font-weight:600; }
  .yearjump button:active{ transform:translateY(1px); }

  .scroll{ flex:1; padding:6px 18px 40px; }

  /* ===== Path / course map ===== */
  .yr{ margin-top:22px; }
  .yr-head{ display:flex; align-items:center; gap:12px; margin:6px 0 14px; }
  .yr-head .yl{ font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--navy); white-space:nowrap; }
  .yr-head .hr{ flex:1; height:1px; background:var(--line); }
  .yr-head .hrs{ font-size:12px; color:var(--grey); }

  .unit{ background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:0; margin-bottom:14px; overflow:hidden; }
  .unit.locked{ background:#FBF9F2; box-shadow:none; border-color:#EFE8D6; }
  .unit-head{ display:flex; align-items:center; gap:13px; padding:17px 18px 14px; }
  .unit .badge{ width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:24px; flex:none; color:#fff; }
  .unit .meta{ flex:1; min-width:0; }
  .unit .meta .t{ font-size:17.5px; font-weight:600; color:var(--navy); line-height:1.2; }
  .unit .meta .sub{ font-size:12.5px; color:var(--grey); margin-top:4px; }
  .unit .meta .disc{ font-weight:600; }
  .ublurb{ padding:0 18px; margin-bottom:15px; font-size:13.5px; line-height:1.45; color:#6c6757; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; max-height:2.9em; }
  .crowns{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--gold); font-weight:700; flex:none; background:var(--gold-bg); padding:5px 10px; border-radius:999px; white-space:nowrap; }
  .lock-ic{ font-size:17px; color:#C3BBA4; flex:none; }

  /* lesson nodes inside a unit */
  .nodes{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); align-items:start; gap:18px 4px; padding:6px 14px 20px; }
  .node{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:7px; background:transparent; border:none; padding:0; appearance:none; -webkit-appearance:none; height:auto; min-height:0; font:inherit; color:inherit; }
  .node .ring{ width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:21px; border:2.5px solid var(--line-2); background:var(--paper); position:relative; transition:transform .06s; box-shadow:0 2px 0 rgba(30,39,97,.05); }
  .node:not(.locked):active .ring{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0); }
  .node.done .ring{ background:var(--green); border-color:var(--green); color:#fff; box-shadow:0 2px 0 rgba(44,95,45,.25); }
  .node.next .ring{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-bg); }
  .node.locked .ring{ opacity:.45; box-shadow:none; }
  .node .lab{ font-size:10px; text-align:center; color:var(--grey); line-height:1.18; min-height:24px; }
  .node.next .lab, .node.done .lab{ color:var(--navy); font-weight:600; }
  .node .start-pill{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--gold); color:#fff; font-size:8.5px; font-weight:700; letter-spacing:.05em; padding:2px 7px; border-radius:8px; text-transform:uppercase; white-space:nowrap; z-index:2; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .unit.locked .nodes{ display:none; }
  .lockmsg{ padding:0 18px 16px; margin-top:-4px; font-size:12.5px; color:#8c856f; }
  .lockmsg b{ color:#6c6757; }
  .node.recap .ring{ background:#FFF6DE; border-color:var(--gold); color:#B8860B; }
  .node.recap.done .ring{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .ext-row{ padding:0 18px 18px; }
  .ext-btn{ display:block; width:100%; text-align:center; border:1.5px solid var(--green-line); background:var(--green-bg); color:var(--green); font-weight:700; padding:13px; border-radius:13px; font-size:14px; }

  /* ===== Dashboard ===== */
  .dash{ padding-top:8px; }
  .goalcard{ background:var(--navy); color:#fff; border-radius:20px; padding:22px; display:flex; align-items:center; gap:20px; margin-bottom:16px; }
  .ring-wrap{ position:relative; width:92px; height:92px; flex:none; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-wrap .ctr{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring-wrap .ctr .n{ font-size:22px; font-weight:700; line-height:1; }
  .ring-wrap .ctr .l{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.8; margin-top:2px; }
  .goalcard .gtext .h{ font-size:20px; margin-bottom:4px; }
  .goalcard .gtext .p{ font-size:13.5px; opacity:.85; }
  .goalcard .gtext .lev{ display:inline-block; margin-top:9px; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .mcard{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:16px 17px; }
  .mcard .v{ font-size:26px; font-weight:700; line-height:1; display:flex; align-items:center; gap:7px; }
  .mcard .l{ font-size:12px; color:var(--grey); margin-top:8px; }
  .mcard.streak .v{ color:#D9831F; } .mcard.xp .v{ color:var(--gold); }
  .mcard.crowns .v{ color:var(--navy); } .mcard.words .v{ color:var(--chem); }

  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:17px; margin-bottom:16px; }
  .panel h3{ font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; }
  .week{ display:flex; justify-content:space-between; gap:6px; }
  .day{ display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; }
  .day .dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:16px; background:#EFEADB; color:#B8B09A; }
  .day.act .dot{ background:var(--green-bg); }
  .day .dl{ font-size:10.5px; color:var(--grey); }
  .ubar{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .ubar .ue{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; color:#fff; flex:none; }
  .ubar .un{ flex:1; font-size:14px; font-weight:500; }
  .ubar .ut{ width:90px; height:8px; background:#EDE6D5; border-radius:999px; overflow:hidden; }
  .ubar .ut > i{ display:block; height:100%; background:var(--green); border-radius:999px; }
  .ubar .up{ font-size:12px; color:var(--grey); width:34px; text-align:right; }
  .resetbtn{ width:100%; border:1px solid var(--line); background:transparent; color:var(--grey); padding:11px; border-radius:12px; font-size:13px; margin-top:4px; }
  .srow{ display:flex; align-items:center; gap:13px; padding:7px 0; }
  .srow .snum{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-size:21px; font-weight:700; flex:none; }
  .srow .snum.due{ background:var(--gold-bg); color:var(--gold); }
  .srow .snum.tracked{ background:#F4F6FC; color:var(--navy); }
  .srow .sl{ display:flex; flex-direction:column; gap:1px; }
  .srow .sl b{ font-size:14.5px; color:var(--ink); }
  .srow .sl span{ font-size:12.5px; color:var(--grey); }
  .srdone{ text-align:center; font-size:13.5px; color:var(--green); background:var(--green-bg); border-radius:12px; padding:11px; margin-top:8px; }

  /* ===== Lesson player ===== */
  .topbar{ display:flex; align-items:center; gap:14px; padding:14px 16px; position:sticky; top:0; background:var(--cream); z-index:20; }
  .iconbtn{ border:none; background:transparent; color:var(--grey); font-size:22px; line-height:1; width:34px; height:34px; border-radius:10px; display:grid; place-items:center; }
  .iconbtn:hover{ background:rgba(30,39,97,.07); color:var(--navy); }
  .pbar{ flex:1; height:14px; background:#E9E2D1; border-radius:999px; overflow:hidden; }
  .pbar > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--green),#3f8a40); border-radius:999px; transition:width .45s cubic-bezier(.4,0,.2,1); }
  .hearts{ display:flex; align-items:center; gap:5px; font-weight:600; color:var(--wrong); font-size:15px; }
  .hearts .hh{ font-size:18px; line-height:1; }
  .stage{ flex:1; padding:8px 18px 160px; display:flex; flex-direction:column; }
  .step-kicker{ margin-bottom:10px; }
  .prompt{ font-size:25px; line-height:1.18; color:var(--navy); margin-bottom:4px; }
  @media (max-width:430px){ .prompt{ font-size:21px; } }

  .teach{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-top:6px; }
  .teach .emoji{ font-size:34px; display:block; margin-bottom:10px; }
  .teach h2{ font-size:23px; color:var(--navy); line-height:1.2; margin-bottom:12px; }
  .teach p{ font-size:16.5px; margin-bottom:12px; color:#2a2a28; }
  .teach p:last-child{ margin-bottom:0; }
  .teach b{ color:var(--navy); font-weight:600; }
  /* on-mistake re-teach: a compact .teach card shown inside the feedback sheet */
  .teach.reteach{ padding:14px 16px; margin-top:12px; box-shadow:none; border-radius:14px; }
  .teach.reteach .emoji{ font-size:24px; margin-bottom:6px; }
  .teach.reteach p{ font-size:15px; margin-bottom:7px; }
  .teach.reteach .rt-k{ font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--grey); margin-bottom:7px; }

  /* vocab card */
  .vcard{ text-align:center; padding:30px 22px; }
  .vcard .term{ font-size:34px; color:var(--navy); margin:6px 0 4px; }
  .vcard .say{ font-size:15px; color:var(--grey); font-style:italic; margin-bottom:14px; }
  .vcard .def{ font-size:17px; color:#2a2a28; max-width:34ch; margin:0 auto; }
  .etym{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:13px; padding:13px 14px; margin:4px auto 14px; max-width:36ch; }
  .etym-h{ font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--grey); margin-bottom:9px; }
  .etym-bits{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; }
  .ebit{ display:inline-flex; flex-direction:column; align-items:center; background:var(--paper); border:1px solid var(--line-2); border-radius:9px; padding:5px 10px; min-width:48px; }
  .ebit b{ font-size:15px; color:var(--navy); } .ebit span{ font-size:11px; color:var(--grey); }
  .eplus{ color:var(--lav); font-weight:700; }
  .etym-gloss{ font-size:14.5px; color:var(--navy); font-weight:600; margin-top:10px; }
  .speakbtn{ display:inline-flex; align-items:center; gap:10px; margin:6px auto 0; border:2px solid var(--lav); background:var(--paper); color:var(--navy); font-weight:600; font-size:16px; padding:13px 22px; border-radius:999px; }
  .speakbtn .ic{ font-size:22px; }
  .speakbtn:active{ transform:scale(.97); }

  /* mic / speak step */
  .mic-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:18px; }
  .micbtn{ width:108px; height:108px; border-radius:50%; border:none; background:var(--navy); color:#fff; font-size:46px; display:grid; place-items:center; box-shadow:0 6px 0 rgba(0,0,0,.18); }
  .micbtn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .micbtn.listening{ background:var(--wrong); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 0 rgba(180,52,30,.4); } 50%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 16px rgba(180,52,30,0); } }
  .mic-status{ font-size:15px; color:var(--grey); min-height:24px; text-align:center; }
  .mic-status b{ color:var(--navy); }
  .heard{ font-size:15px; color:var(--navy); font-weight:600; }

  /* type-what-you-hear */
  .listen-big{ display:flex; justify-content:center; margin:20px 0; }
  .listen-big button{ width:84px; height:84px; border-radius:20px; border:none; background:var(--navy); color:#fff; font-size:38px; box-shadow:0 5px 0 rgba(0,0,0,.16); }
  .listen-big button:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .tinput{ width:100%; padding:15px 16px; font-family:inherit; font-size:18px; border:2px solid var(--line-2); border-radius:14px; background:var(--paper); color:var(--ink); outline:none; }
  .tinput:focus{ border-color:var(--navy); }
  .tinput.ok{ border-color:var(--green); background:var(--green-bg); color:var(--green); }
  .tinput.bad{ border-color:var(--wrong); background:var(--wrong-bg); }

  .opts{ display:flex; flex-direction:column; gap:11px; margin-top:14px; }
  .opt{ position:relative; text-align:left; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:15px 16px 15px 52px; font-size:16.5px; color:var(--ink); transition:border-color .12s, background .12s, transform .04s; }
  .opt:hover:not(:disabled){ border-color:var(--lav); }
  .opt:active:not(:disabled){ transform:translateY(1px); }
  .opt .num{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:8px; border:1.5px solid var(--line-2); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--grey); }
  .opt.sel{ border-color:var(--navy); background:#F4F6FC; } .opt.sel .num{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .opt.correct{ border-color:var(--green-line); background:var(--green-bg); } .opt.correct .num{ border-color:var(--green); background:var(--green); color:#fff; }
  .opt.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); } .opt.wrong .num{ border-color:var(--wrong); background:var(--wrong); color:#fff; }
  .opt.dim{ opacity:.55; }
  .opt .mk{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-weight:700; font-size:17px; }
  .opt.correct .mk{ color:var(--green); } .opt.wrong .mk{ color:var(--wrong); }
  .hint{ font-size:13.5px; color:var(--grey); margin-top:10px; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:14px; }
  .chip{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:14px; font-size:16px; text-align:left; }
  .chip.sel{ border-color:var(--navy); background:#F4F6FC; }
  .chip.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }
  .chip.miss{ border-color:var(--green); border-style:dashed; }

  .sentence{ font-size:19px; line-height:2.1; margin-top:16px; color:#2a2a28; }
  .blank{ display:inline-block; min-width:96px; border-bottom:2.5px solid var(--lav); margin:0 3px; text-align:center; color:var(--navy); font-weight:600; padding:0 6px; }
  .blank.filled{ border-bottom-color:var(--navy); }
  .blank button{ border:none; background:#F4F6FC; border-radius:8px; padding:4px 10px; font-size:16px; font-weight:600; color:var(--navy); }
  .blank.ok{ color:var(--green); border-bottom-color:var(--green); } .blank.ok button{ background:var(--green-bg); color:var(--green); }
  .blank.bad{ color:var(--wrong); border-bottom-color:var(--wrong); } .blank.bad button{ background:var(--wrong-bg); color:var(--wrong); }
  .bank{ display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
  .token{ background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:12px; padding:11px 16px; font-size:16px; font-weight:500; color:var(--ink); }
  .token:hover:not(:disabled){ border-color:var(--lav); }
  .token.used{ opacity:.32; pointer-events:none; }

  .match{ display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-top:16px; }
  .match .col{ display:flex; flex-direction:column; gap:11px; }
  .mitem{ position:relative; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:13px 13px; font-size:14.5px; text-align:left; min-height:52px; }
  .mitem:hover:not(:disabled){ border-color:var(--lav); }
  .mitem.active{ border-color:var(--navy); background:#F4F6FC; }
  .mitem.paired{ border-color:var(--lav); background:#FBFAF5; }
  .mitem .dot{ position:absolute; top:8px; right:9px; width:13px; height:13px; border-radius:50%; }
  .mitem.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .mitem.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }

  /* spaced-retrieval review banner */
  .review-banner{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; border:none; border-radius:16px; padding:15px 17px; margin:18px 0 6px; box-shadow:var(--shadow); }
  .review-banner.due{ background:var(--navy); color:#fff; }
  .review-banner.clear{ background:var(--paper); border:1px solid var(--line); box-shadow:none; }
  .review-banner .rb-ic{ font-size:24px; flex:none; }
  .review-banner .rb-txt{ flex:1; display:flex; flex-direction:column; gap:2px; min-width:0; }

  /* diagram (tap the part) */
  .diagram{ position:relative; width:100%; max-width:380px; margin:16px auto 8px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); }

  .hotspot:hover:not(:disabled){ background:rgba(30,39,97,.2); }

  /* progressive build-up diagram (one label revealed per fact) */
  .bdiagram{ position:relative; width:100%; max-width:360px; margin:14px auto 4px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); }
  .bdiagram svg{ display:block; }
  .dlabel{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none; z-index:2; }
  .ddot{ width:13px; height:13px; border-radius:50%; background:var(--lav-pale); border:2.5px solid var(--navy); box-shadow:0 1px 4px rgba(30,39,97,.25); }
  .dtag{ font:600 11px/1.1 ui-rounded,system-ui; color:var(--navy); background:rgba(255,255,255,.93); border:1px solid var(--line); border-radius:8px; padding:2px 6px; white-space:nowrap; box-shadow:var(--shadow); }
  .dlabel:not(.cur){ opacity:.6; }
  .dlabel.cur{ z-index:3; animation:dpop .35s ease-out; }
  .dlabel.cur .ddot{ background:var(--navy); animation:dpulse 1.5s ease-out infinite; }
  .dlabel.cur .dtag{ background:var(--navy); color:#fff; border-color:var(--navy); }
  @keyframes dpulse{ 0%{box-shadow:0 0 0 0 rgba(30,39,97,.45)} 100%{box-shadow:0 0 0 11px rgba(30,39,97,0)} }
  @keyframes dpop{ 0%{transform:translate(-50%,-50%) scale(.6); opacity:0} 100%{transform:translate(-50%,-50%) scale(1); opacity:1} }
  .motion-off .dlabel.cur,.motion-off .dlabel.cur .ddot{ animation:none; }

  /* ===== Living-diagram simulation layer =====
     SVG elements tagged class="sm-…" come alive; elements tagged data-part="id"
     stay hidden until the matching fact reveals them (set by applyLiveDiagram),
     so the picture assembles AND moves as the student learns. The global
     a11y-motion-off / prefers-reduced-motion rules above already stop all of it. */
  .bdiagram svg [class*="sm-"]{ transform-box:fill-box; transform-origin:center; }
  .bdiagram svg [data-part]{ transition:opacity .55s ease, transform .55s ease; }
  .sm-spin{ animation:sm-spin 3s linear infinite; }
  .sm-spin-slow{ animation:sm-spin 9s linear infinite; }
  .sm-spin-rev{ animation:sm-spin 3s linear infinite reverse; }
  .sm-flow{ animation:sm-flow 1s linear infinite; }
  .sm-flow-slow{ animation:sm-flow 2.2s linear infinite; }
  .sm-flow-rev{ animation:sm-flow-rev 1.4s linear infinite; }
  .sm-pulse{ animation:sm-pulse 1.6s ease-in-out infinite; }
  .sm-throb{ animation:sm-throb 1s ease-in-out infinite; }
  .sm-drift{ animation:sm-drift 2.6s ease-in-out infinite; }
  .sm-osc{ animation:sm-osc 1.8s ease-in-out infinite; }
  .sm-osc-x{ animation:sm-osc-x 1.8s ease-in-out infinite; }
  .sm-rise{ animation:sm-rise 2.6s ease-in infinite; }
  .sm-fall{ animation:sm-fall 2.6s ease-in infinite; }
  .sm-blink{ animation:sm-blink 1.4s ease-in-out infinite; }
  .sm-glow{ animation:sm-glow 2s ease-in-out infinite; }
  .sm-shake{ animation:sm-shake .3s ease-in-out infinite; }
  .sm-sweep{ animation:sm-sweep 2.8s ease-in-out infinite; }
  @keyframes sm-spin{ to{ transform:rotate(360deg); } }
  @keyframes sm-flow{ to{ stroke-dashoffset:-24; } }
  @keyframes sm-flow-rev{ to{ stroke-dashoffset:24; } }
  @keyframes sm-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.13); } }
  @keyframes sm-throb{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  @keyframes sm-drift{ 0%{ transform:translate(0,0); } 25%{ transform:translate(2px,-2.5px); } 50%{ transform:translate(-2.5px,1.5px); } 75%{ transform:translate(1.5px,2px); } 100%{ transform:translate(0,0); } }
  @keyframes sm-osc{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  @keyframes sm-osc-x{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(5px); } }
  @keyframes sm-rise{ 0%{ transform:translateY(2px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(-16px); opacity:0; } }
  @keyframes sm-fall{ 0%{ transform:translateY(-14px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(4px); opacity:0; } }
  @keyframes sm-blink{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  @keyframes sm-glow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  @keyframes sm-shake{ 0%,100%{ transform:translate(0,0); } 25%{ transform:translate(.9px,-.9px); } 75%{ transform:translate(-.9px,.9px); } }
  @keyframes sm-sweep{ 0%{ transform:translateX(-6px); opacity:.35; } 50%{ opacity:1; } 100%{ transform:translateX(6px); opacity:.35; } }

  /* ============ DARK THEME (Duolingo-style glassmorphism) ============ */
  :root{

    --line-2:rgba(255,255,255,.16);

/* ---------- Voice (Web Speech API) -------------------------------------- */
const Voice = {
  synth: window.speechSynthesis || null,
  SR: window.SpeechRecognition || window.webkitSpeechRecognition || null,
  voice: null,
  ready(){ return !!this.synth; },
  canListen(){ return !!this.SR; },
  pickVoice(){
    if(!this.synth) return;
    const vs = this.synth.getVoices();
    this.voice = vs.find(v=>/en-GB/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || vs[0] || null;
  },
  speak(text, rate){
    if(!this.synth || !State.s.sound) return;
    try{
      this.synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-GB"; u.rate = rate || 0.92; u.pitch = 1;
      if(this.voice) u.voice = this.voice;
      this.synth.speak(u);
    }catch(e){}
  },
  say(text, rate){   // explicit read-aloud: speaks even when ambient sound is off
    if(!this.synth) return;
    try{ this.synth.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="en-GB"; u.rate=rate||0.92; u.pitch=1; if(this.voice)u.voice=this.voice; this.synth.speak(u); }catch(e){}
  },
  listen(onResult, onErr){
    if(!this.SR){ onErr && onErr("unsupported"); return null; }
    try{
      const r = new this.SR();
      r.lang = "en-GB"; r.interimResults = false; r.maxAlternatives = 3;
      r.onresult = (e)=>{ const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript); onResult(alts); };
      r.onerror = (e)=> onErr && onErr(e.error || "error");
      r.start();
      return r;
    }catch(e){ onErr && onErr("error"); return null; }
  }
};
if(Voice.synth){ Voice.pickVoice(); window.speechSynthesis.onvoiceschanged = ()=>Voice.pickVoice(); }

const norm = s => String(s||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
function lev(a,b){ const m=a.length,n=b.length; const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); } return d[m][n]; }
function saidMatch(heardAlts, target){
  const t = norm(target); if(!t) return false;
  const tol = Math.max(1, Math.floor(t.length/5));
  return (heardAlts||[]).some(h=>{ const hh=norm(h); if(!hh) return false;
    if(hh===t || hh.includes(t) || t.includes(hh)) return true;
    if(lev(hh,t) <= tol) return true;
    const tw=t.split(" ").filter(w=>w.length>2); if(tw.length && tw.every(w=>hh.includes(w))) return true;
    return false; });
}
function typedMatch(typed, target){ const a=norm(typed), b=norm(target); return a===b || lev(a,b)<=1; }
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }

function addDays(dateStr, n){ const d=new Date(dateStr+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }

// Spaced retrieval (Leitner). Box -> days until due again. Expanding intervals.
const REVIEW_INTERVALS = [1, 2, 4, 9, 20];
function recordReview(qid, ok){
  if(!qid) return;
  const code = qid.split("#")[0];
  const r = State.s.review[qid] || { box:0, unit:code };
  if(!ok) r.misses = (r.misses||0)+1;   // track for adaptive "fix weak spots"
  r.box = ok ? Math.min(REVIEW_INTERVALS.length-1, (r.box||0)+1) : 0;
  r.due = addDays(todayStr(), REVIEW_INTERVALS[r.box]);
  r.unit = code; r.last = todayStr();
  State.s.review[qid] = r;
  State.save();
}
function dueReviews(excludeUnit){
  const t = todayStr(), out = [];
  for(const qid in State.s.review){
    const r = State.s.review[qid];
    if(!r || !r.due) continue;
    if(excludeUnit && r.unit === excludeUnit) continue;
    if(!CONTENT[r.unit]) continue;
    if(r.due <= t) out.push({ qid, unit:r.unit, due:r.due, box:r.box });
  }
  out.sort((a,b)=> a.due<b.due ? -1 : a.due>b.due ? 1 : (a.box-b.box)); // most overdue, then least-learned first
  return out;
}
function retrievalStep(qid){
  const [code, idx] = qid.split("#");
  const q = CONTENT[code] && CONTENT[code].questions[+idx];
  if(!q) return null;
  if(TIER==="foundation" && isHTQ(q)) return null;   // don't resurface Higher-only content in Foundation
  const s = toStep(q); s.qid = qid; s.retrieval = true;
  s.kicker = "🔄 Retrieval · " + CONTENT[code].title;
  return s;
}

const State = {
  s: null,
  load(){
    let d=null; try{ d=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
    this.s = Object.assign({ xp:0, streak:0, lastDay:null, lessons:{}, dailyXP:{}, words:0, sound:true, seen:false, review:{}, exam:{}, tier:"higher", badges:[], flags:{}, notify:false, a11y:{textSize:"m", readable:false, contrast:false, motionOff:false} }, d||{});
    if(!this.s.review) this.s.review = {};
    if(!this.s.exam) this.s.exam = {};
    if(!this.s.tier) this.s.tier = "higher";
    if(!this.s.badges) this.s.badges = [];
    if(!this.s.flags) this.s.flags = {};
    if(!this.s.a11y) this.s.a11y = {textSize:"m", readable:false, contrast:false, motionOff:false};
  },
  save(){ try{ localStorage.setItem(KEY, JSON.stringify(this.s)); }catch(e){} syncPush(); },
  lessonDone(id){ return !!this.s.lessons[id]; },
  unitCrowns(code, total){ let c=0; for(let i=0;i<total;i++) if(this.lessonDone(code+"-L"+i)) c++; return c; },
  completeLesson(id, xp, newWords){
    const t=todayStr();
    if(!this.s.lessons[id] || (this.s.lessons[id].xp||0) < xp) this.s.lessons[id]=Object.assign(this.s.lessons[id]||{}, {done:true, xp:xp});
    this.s.xp += xp;
    this.s.dailyXP[t] = (this.s.dailyXP[t]||0) + xp;
    this.s.words += (newWords||0);
    // streak
    if(this.s.lastDay !== t){
      if(this.s.lastDay && daysBetween(this.s.lastDay,t)===1) this.s.streak += 1;
      else this.s.streak = 1;
      this.s.lastDay = t;
    }
    this.save();
  },
  reset(){ localStorage.removeItem(KEY); this.load(); }
};

function stripHtml(h){ return String(h||"").replace(/<[^>]+>/g," ").replace(/&[a-z]+;/g," ").replace(/\s+/g," ").trim(); }

  if(s.type==="teach") return (s.h?s.h+". ":"")+stripHtml(s.html);
  if(s.type==="vocab") return s.term+". "+s.def;
  if(s.type==="speak") return "Say the word: "+s.term;
  if(s.type==="listenType") return "Type the word you hear.";

function weakQuestions(){
  const out=[];
  for(const qid in State.s.review){ const r=State.s.review[qid]; if(!r||!CONTENT[r.unit]) continue;
    if((r.box||0)===0 && (r.misses||0)>0) out.push({ qid, unit:r.unit, misses:r.misses||0 }); }
  out.sort((a,b)=> b.misses-a.misses);

}

function matchVocabStep(vs){

    left: pick.map(v=>({ t:v.term, key:v.term })),

function gapVocabStep(vs){

  return { type:"gap", kicker:"Sentence builder", q:"Tap the word that fits the meaning.",
    parts:[article, {b:0}, " is ", v.definition, "."], blanks:[v.term], bank, ok:"That's the right word." };

function interleave(a, b){ const out=[]; const n=Math.max(a.length,b.length); for(let i=0;i<n;i++){ if(a[i])out.push(a[i]); if(b[i])out.push(b[i]); } return out; }

function chunk(a,n){ const out=[]; for(let i=0;i<a.length;i+=n) out.push(a.slice(i,i+n)); return out; }
function splitEven(arr,n){ const out=Array.from({length:Math.max(1,n)},()=>[]); arr.forEach((x,i)=>out[i%out.length].push(x)); return out; }

// Combined "arrive at the word" card: hear the word + meaning, then say it back — all in one place.
function vocabStep(v, disc){ return { type:"vocab", kicker:"Key word — hear it & say it", term:v.term, say:v.say, def:v.definition, emoji:DISC_EMOJI[disc]||"📘" }; }

// Does a fact's text actually mention this term (whole word, simple plural)? Used to
// tie a word's card to the fact that explains it. Short words use word boundaries so
// "ore" doesn't match "more"/"store".
function termInFact(term, fact){
  const esc=String(term).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");

}
// Interleave teaching blocks (each = a fact + its tied word cards) with questions.
function interleaveBlocks(blocks, qs){ const out=[]; const n=Math.max(blocks.length,qs.length); for(let i=0;i<n;i++){ if(blocks[i]) out.push(...blocks[i]); if(qs[i]) out.push(qs[i]); } return out; }

function ixCleanup(){ if(typeof L!=="undefined" && L && L._cleanup){ try{L._cleanup();}catch(e){} L._cleanup=null; } }

function buildLessons(c){
  const disc=c.discipline, V=c.vocab;
  const rawFacts = (TIER==="foundation") ? c.facts.filter(f=>!isHTFact(f)) : c.facts;
  const dg = c.diagram || null;   // progressive build-up diagram (DIAGRAMS resolved later at render time, in teachDiagram)
  const facts=rawFacts.map(f=>{
    const st=teachFact(f,disc);
    if(dg){ const fi=c.facts.indexOf(f); if(fi>=0){
      const flat=[]; for(let k=0;k<=fi;k++){ const m=dg.map[k]; if(m) flat.push(...(Array.isArray(m)?m:[m])); }
      const cm=dg.map[fi]; st.dgram=dg.key; st.dreveal=[...new Set(flat)]; st.dcur=cm?(Array.isArray(cm)?cm:[cm]):[];
    } }
    return st;
  });
  let QP=c.questions.map((q,idx)=>({q,idx}));
  if(TIER==="foundation") QP=QP.filter(x=>!isHTQ(x.q));
  const Q=QP.map(x=>{ const s=toStep(x.q); s.qid=c.code+"#"+x.idx; return s; });   // qid keeps ORIGINAL index
  const qchunks=chunk(Q,5);
  const n=Math.max(1,qchunks.length);
  const fGroups=splitEven(facts,n);   // round-robin: fact i lives in lesson i%n

  // Tie each word to the first fact that actually explains (mentions) it.
  const wordsByFact={}, unmatched=[];
  V.forEach(v=>{ const fi=rawFacts.findIndex(f=>termInFact(v.term,f)); if(fi>=0){ (wordsByFact[fi]=wordsByFact[fi]||[]).push(v); } else unmatched.push(v); });
  const unmatchedGroups=splitEven(unmatched,n);   // leftover words consolidate at lesson end

  const pTitles=["Learn","Build","Practise","Apply","Master"], pIcons=["📖","🧩","✍️","🔬","🏆"];
  const lessons=[];
  qchunks.forEach((qc,ci)=>{
    const lessonFacts=fGroups[ci]||[];
    // each fact becomes a block: the fact, then the word cards it explains (taught → then hear/say),
    // then — when the fact just added a part to the build-up diagram — a "find it" checkpoint that
    // asks the pupil to tap the new part with the labels hidden (retrieval, not recognition).
    const blocks=lessonFacts.map(fs=>{
      const fi=facts.indexOf(fs);
      const b=[fs, ...(wordsByFact[fi]||[]).map(v=>vocabStep(v,disc))];
      if(fs.dgram && fs.dcur && fs.dcur.length && fs.dreveal && fs.dreveal.length>=2)
        b.push({ type:"dcheck", dgram:fs.dgram, dreveal:fs.dreveal, target:fs.dcur[fs.dcur.length-1], kicker:"📍 Find it on the diagram" });
      return b;
    });
    let steps=interleaveBlocks(blocks, qc);
    // words with no explaining fact: consolidate at the end
    const cons=unmatchedGroups[ci]||[];
    cons.forEach(v=>steps.push(vocabStep(v,disc)));
    const lessonWords=lessonFacts.reduce((a,fs)=>a.concat(wordsByFact[facts.indexOf(fs)]||[]),[]).concat(cons);
    if(lessonWords.length>=2) steps.push(matchVocabStep(lessonWords));
    if(lessonWords.length) steps.push(listenTypeStep(lessonWords[lessonWords.length-1]));
    lessons.push({ title:pTitles[ci]||("Round "+(ci+1)), icon:pIcons[ci]||"🎯", kind:"practice", words:lessonWords.length, steps });
  });
  // Lead the topic with its interactive widget (an engaging "explore" hook), if it has one.
  if(TOPIC_IX[c.code] && lessons[0]) lessons[0].steps.unshift({ type:"interactive", widget:TOPIC_IX[c.code], kicker:"Explore" });
  return lessons;
}

const LESSONS = {}; // code -> [lessons]
let TIER = "higher";   // "higher" | "foundation" — Foundation hides Higher-only content

/* ---------- Tracks, sequential gating & recaps (learn-it-all path) ----------
   Each "track" is a sequence a learner unlocks topic by topic: KS3 is one track,
   and each GCSE subject (Physics/Chemistry/Biology) is its own track. A topic is
   complete when all its lessons AND its recap warm-up are done; the next topic in
   the track unlocks only then. Every topic after the first in a track opens with a
   recap drawn from earlier learned material. */
let UNIT_POS = {}; // code -> {track, idx, prev:{code,t}}
function sectionTrack(sec){
  const y=sec.year||"";
  if(/^Year /.test(y)) return "ks3";
  if(/Physics/.test(y)) return "gcse-physics";
  if(/Chemistry/.test(y)) return "gcse-chem";
  if(/Biology/.test(y)) return "gcse-bio";
  return "ks3";
}
function indexTracks(){
  const tr={}; UNIT_POS={};
  PATHWAY.forEach(sec=>{ const t=sectionTrack(sec);
    sec.units.forEach(u=>{ if(u.code && LESSONS[u.code]){ (tr[t]=tr[t]||[]).push(u); } }); });
  Object.keys(tr).forEach(t=> tr[t].forEach((u,i)=>{ UNIT_POS[u.code]={track:t, idx:i, prev:i>0?{code:tr[t][i-1].code,t:tr[t][i-1].t}:null}; }));
}
// (Re)build all lessons for the current tier, then re-index the tracks. Called at
// load and whenever the Higher/Foundation tier is switched in Settings.
function rebuildLessons(){
  TIER = (State.s && State.s.tier) || "higher";
  Object.keys(CONTENT).forEach(code=> LESSONS[code]=buildLessons(CONTENT[code]));
  indexTracks();
}
rebuildLessons();
function unitHasRecap(code){ const p=UNIT_POS[code]; return !!(p && p.idx>0); }
function unitComplete(code){
  const L=LESSONS[code]; if(!L) return false;
  for(let i=0;i<L.length;i++) if(!State.lessonDone(code+"-L"+i)) return false;
  if(unitHasRecap(code) && !State.lessonDone(code+"-RECAP")) return false;
  return true;
}
function unitUnlocked(code){
  const p=UNIT_POS[code]; if(!p) return true;          // special/non-tracked units stay open
  if(p.idx===0) return true;                           // first topic of a track is always open
  return p.prev ? unitComplete(p.prev.code) : true;    // previous topic must be complete
}
// Pool of question ids from earlier units the learner has already started (for recaps).
function earlierQuestionPool(code){
  const pool=[];
  for(const sec of PATHWAY){ for(const u of sec.units){
    if(!u.code || !LESSONS[u.code]) continue;
    if(u.code===code) return pool;
    const total=LESSONS[u.code].length;
    const started = State.unitCrowns(u.code,total)>0 || State.lessonDone(u.code+"-RECAP");
    if(started && CONTENT[u.code]) CONTENT[u.code].questions.forEach((q,idx)=>{ if(q.type!=="exam") pool.push(u.code+"#"+idx); });
  }}
  return pool;
}
function buildRecapSteps(code){
  const steps=[], seen=new Set();
  const add=(qid)=>{ if(steps.length>=6||seen.has(qid))return; const st=retrievalStep(qid); if(st){ st.kicker="🔄 Recap"; steps.push(st); seen.add(qid);} };
  dueReviews(code).forEach(d=>add(d.qid));      // spaced-repetition first
  weakQuestions().forEach(w=>add(w.qid));       // then tricky ones
  shuffle(earlierQuestionPool(code)).forEach(qid=>add(qid)); // then a spread of earlier topics
  return steps;
}
function startRecap(code){
  const steps=buildRecapSteps(code);
  if(!steps.length){ State.completeLesson(code+"-RECAP", 5, 0); render(); return; }
  L={ code, li:-2, id:code+"-RECAP", title:"Recap", steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isRecap:true };
  go("lesson");
}

  if(u.soon){
    return `<div class="unit locked">
      <div class="unit-head">
        <div class="badge" style="background:#C8C2B0">${DISC_EMOJI[u.d]}</div>
        <div class="meta"><div class="t" style="color:#8c856f">${u.t}</div><div class="sub"><span class="disc" style="color:#a59d86">${cap(u.d)}</span> · ${u.n} lessons</div></div>
        <div class="lock-ic">🔒</div>
      </div></div>`;
  }
  // authored, playable
  const lessons = LESSONS[u.code];
  const total = lessons.length;
  const crowns = State.unitCrowns(u.code, total);
  // Locked topic: a previous topic in the track is not finished yet.
  if(!unitUnlocked(u.code)){
    const prev = UNIT_POS[u.code] && UNIT_POS[u.code].prev;
    const prevTitle = prev ? prev.t : "the previous topic";
    return `<div class="unit locked">
      <div class="unit-head">
        <div class="badge" style="background:#C8C2B0">${UNIT_EMOJI[u.code]||DISC_EMOJI[u.d]}</div>
        <div class="meta"><div class="t" style="color:#8c856f">${u.t}</div><div class="sub"><span class="disc" style="color:#a59d86">${cap(u.d)}</span> · ${total} lessons</div></div>
        <div class="lock-ic">🔒</div>
      </div>
      <div class="lockmsg">Finish <b>${prevTitle}</b> to unlock this topic</div>
    </div>`;
  }
  const hasRecap = unitHasRecap(u.code);
  const recapDone = State.lessonDone(u.code+"-RECAP");
  const recapGate = hasRecap && !recapDone;     // must do the recap before new content
  const nextIdx = firstIncomplete(u.code, total);
  let nodes = "";
  if(hasRecap){
    nodes += `<button class="node recap ${recapDone?'done':'next'}" data-recap="1" data-code="${u.code}">
      ${recapDone?'':'<span class="start-pill">Start</span>'}
      <span class="ring">${recapDone?'✓':'🔄'}</span>
      <span class="lab">Recap</span>
    </button>`;
  }
  nodes += lessons.map((ls,i)=>{
    const id=u.code+"-L"+i, done=State.lessonDone(id);
    const isNext = !recapGate && (i===nextIdx) && !done;
    const locked = recapGate || ((i>nextIdx) && !done);
    return `<button class="node ${done?'done':''} ${isNext?'next':''} ${locked?'locked':''}" data-code="${u.code}" data-li="${i}" ${locked?'disabled':''}>
      ${isNext?'<span class="start-pill">Start</span>':''}
      <span class="ring">${done?'✓':ls.icon}</span>
      <span class="lab">${ls.title}</span>
    </button>`;
  }).join("");
  const nodeCount = total + (hasRecap?1:0);
  const cols = nodeCount<=5 ? nodeCount : Math.ceil(nodeCount/2);
  return `<div class="unit${unitComplete(u.code)?' complete':''}">
    <div class="unit-head">
      <div class="badge" style="background:${color}">${UNIT_EMOJI[u.code]||DISC_EMOJI[u.d]}</div>
      <div class="meta"><div class="t">${u.t}</div><div class="sub"><span class="disc" style="color:${color}">${cap(u.d)}</span> · ${total} lessons${hasRecap?' + recap':''}</div></div>
      <div class="crowns">${crowns}/${total} 👑</div>
    </div>
    <div class="ublurb">${CONTENT[u.code].blurb}</div>
    <div class="nodes" style="grid-template-columns:repeat(${cols},minmax(0,1fr))">${nodes}</div>
  </div>`;
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function firstIncomplete(code,total){ for(let i=0;i<total;i++) if(!State.lessonDone(code+"-L"+i)) return i; return total; }

function wirePath(){
  [...document.querySelectorAll(".node:not([disabled])")].forEach(n=> n.onclick=()=>{
    if(n.dataset.recap){ startRecap(n.dataset.code); }
    else { startLesson(n.dataset.code, +n.dataset.li); }
  });
  const rb=document.getElementById("review"); if(rb) rb.onclick=()=>startReview();
}

/* ---------- Lesson session ---------- */
function startLesson(code, li){
  const ls = LESSONS[code][li];
  let steps = ls.steps;
  // Do Now: spaced retrieval of earlier units' content at the start of practice lessons.
  if(ls.kind === "practice"){
    const due = dueReviews(code).slice(0, 3).map(d=>retrievalStep(d.qid)).filter(Boolean);
    if(due.length) steps = [...due, ...ls.steps];
  }
  L = { code, li, id:code+"-L"+li, title:ls.title, steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:ls.words||0, rec:null };
  go("lesson");
}

function startReview(){
  const due = dueReviews(null).slice(0, 14).map(d=>retrievalStep(d.qid)).filter(Boolean);
  if(!due.length) return;
  L = { code:"REVIEW", li:-1, id:"review-"+todayStr(), title:"Daily review", steps:due, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isReview:true };
  go("lesson");
}

function topbar(){
  const pct=Math.round(L.i/L.steps.length*100);
  const hearts="❤️".repeat(L.hearts)+"🤍".repeat(Math.max(0,5-L.hearts));
  return `<div class="topbar">
    <button class="iconbtn" id="quit" aria-label="Quit">✕</button>
    <div class="pbar" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"><i style="width:${pct}%"></i></div>
    <button class="iconbtn" id="readaloud" title="Read aloud" aria-label="Read this question aloud">🔊</button>
    <div class="hearts"><span class="hh">${hearts}</span></div></div>`;
}

function renderStep(){
  ixCleanup();
  if(L.i >= L.steps.length){ return finishLesson(); }
  const s=L.steps[L.i];
  let body="";
  if(s.type==="interactive") body=viewInteractive(s);
  else if(s.type==="teach") body=viewTeach(s);
  else if(s.type==="vocab") body=viewVocab(s);
  else if(s.type==="speak") body=viewSpeak(s);
  else if(s.type==="listenType") body=viewListenType(s);
  else if(s.type==="mcq") body=viewMcq(s);
  else if(s.type==="multi") body=viewMulti(s);
  else if(s.type==="gap") body=viewGap(s);
  else if(s.type==="match") body=viewMatch(s);
  else if(s.type==="numeric") body=viewNumeric(s);
  else if(s.type==="categorise") body=viewCategorise(s);
  else if(s.type==="order") body=viewOrder(s);
  else if(s.type==="diagram") body=viewDiagram(s);
  else if(s.type==="dcheck") body=viewDcheck(s);
  else if(s.type==="exam") body=viewExam(s);

  app.innerHTML = topbar() + `<div class="stage fade" id="stage">${body}</div>` + footerShell();
  document.getElementById("quit").onclick=()=>{ if(L.rec){try{L.rec.abort();}catch(e){}} ixCleanup(); go("home"); };
  document.getElementById("readaloud").onclick=readStep;

  if(s.type==="interactive") wireInteractive(s);
  else if(s.type==="teach") wireTeachLike(s);
  else if(s.type==="vocab") wireVocab(s);
  else if(s.type==="speak") wireSpeak(s);
  else if(s.type==="listenType") wireListenType(s);
  else if(s.type==="mcq") wireMcq(s);
  else if(s.type==="multi") wireMulti(s);
  else if(s.type==="gap") wireGap(s);
  else if(s.type==="match") wireMatch(s);
  else if(s.type==="numeric") wireNumeric(s);
  else if(s.type==="categorise") wireCategorise(s);
  else if(s.type==="order") wireOrder(s);
  else if(s.type==="diagram") wireDiagram(s);
  else if(s.type==="dcheck") wireDcheck(s);
  else if(s.type==="exam") wireExam(s);
  if(s.dgram && typeof DIAGRAMS!=="undefined" && DIAGRAMS[s.dgram]) applyLiveDiagram(s);
}

/* Living-diagram reveal: hide every tagged SVG part until the fact that introduces
   it has been taught, so the picture assembles in step with the labels. Parts with
   no data-part tag (scaffolding: axes, outlines, ground) always stay visible.
   Newly revealed parts get a brief pop so the eye lands on what just appeared. */
function applyLiveDiagram(s){
  const wrap=document.querySelector('.bdiagram'); if(!wrap) return;
  const rev=new Set(s.dreveal||[]);
  wrap.querySelectorAll('svg [data-part]').forEach(el=>{
    const ids=(el.getAttribute('data-part')||'').trim().split(/\s+/);
    el.style.opacity=ids.some(id=>rev.has(id))?'1':'0';   // CSS transition fades it in; sm-* motion keeps running
  });
}

/* TEACH + VOCAB */
// Progressive build-up diagram: shows the topic's picture with one label revealed
// per fact taught so far (s.dreveal), the newest one (s.dcur) highlighted.
function teachDiagram(s){
  const d=DIAGRAMS[s.dgram]; if(!d) return "";
  const wh=d.vb.split(" "); const ratio=wh[2]+" / "+wh[3];
  const rev=s.dreveal||[], cur=s.dcur||[];
  const labels=d.parts.filter(p=>rev.indexOf(p.id)>=0).map(p=>
    `<div class="dlabel${cur.indexOf(p.id)>=0?' cur':''}" style="left:${p.x}%;top:${p.y}%"><span class="ddot"></span><span class="dtag">${p.label}</span></div>`).join("");
  return `<div class="bdiagram" style="aspect-ratio:${ratio}"><svg viewBox="${d.vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">${d.svg}</svg>${labels}</div>`;
}
function viewTeach(s){
  return `<div class="step-kicker mono-kicker">${s.kicker}</div>
    <div class="teach"><span class="emoji">${s.emoji}</span>${s.h?`<h2 class="fr">${s.h}</h2>`:''}${s.dgram?teachDiagram(s):''}${s.html}</div>`;
}
/* INTERACTIVE — mount a canvas widget; Continue advances. Cleanup stops its animation loop. */
function viewInteractive(s){
  return `<div class="step-kicker mono-kicker">${s.kicker||"Explore"}</div>
    <div class="teach"><div id="ixwrap"></div></div>`;
}
function wireInteractive(s){
  const wrap=document.getElementById("ixwrap"), w=INTERACTIVES[s.widget];
  if(wrap && w){ try{ L._cleanup = w(wrap) || null; }catch(e){ console.error("interactive "+s.widget, e); } }
  footerButton("Continue","btn-go",true,()=>next());
}
// Break a term into its morphemes so the meaning can be read from the parts.
function etymHTML(term){
  const e=ETYM[(term||"").toLowerCase()]; if(!e) return "";
  const chips=e.bits.map(b=>`<span class="ebit"><b>${b[0]}</b><span>${b[1]}</span></span>`).join(`<span class="eplus">+</span>`);
  return `<div class="etym"><div class="etym-h">Break it apart</div><div class="etym-bits">${chips}</div><div class="etym-gloss">→ ${e.gloss}</div></div>`;
}
// Combined vocab card: word-building → hear it + meaning → say it back, one seamless place.
function viewVocab(s){
  return `<div class="step-kicker mono-kicker">${s.kicker}</div>
    <div class="teach vcard">
      <div class="emoji">${s.emoji}</div>
      <div class="term fr">${s.term}</div>
      ${s.say && s.say!==s.term ? `<div class="say">say it like: ${s.say}</div>`:''}
      ${etymHTML(s.term)}
      <div class="def">${s.def}</div>

        <div class="mic-status" id="mstat">Now say it: <b>${s.term}</b></div>
      </div>
    </div>`;
}
function wireVocab(s){
  setTimeout(()=>Voice.speak(s.term+". "+s.def, 0.92), 250);   // hear the word + its meaning on arrival
  const spk=document.getElementById("spk"); if(spk) spk.onclick=()=>Voice.speak(s.term, 0.85);
  const mic=document.getElementById("mic"), stat=document.getElementById("mstat");
  let tries=0;
  if(!Voice.canListen()){
    stat.innerHTML=`Say <b>${s.term}</b> out loud, then tap “I said it”.`;
    footerRow([{label:"I said it ✓",cls:"btn-go",on:()=>markVoice(true,"Great — keep saying <b>"+s.term+"</b> out loud.")},{label:"Skip",cls:"btn-ghost",on:()=>next()}]);
    mic.onclick=()=>Voice.speak(s.term,0.85);

  }
  footerRow([{label:"Can't use mic — continue",cls:"btn-ghost",on:()=>{ if(L.rec){try{L.rec.abort();}catch(e){}} next(); }}]);
  mic.onclick=()=>{ if(L.checked) return;
    mic.classList.add("listening"); stat.innerHTML="Listening… say <b>"+s.term+"</b>";

      const ok=saidMatch(alts,s.say)||saidMatch(alts,s.term);

}

function wireSpeak(s){

function markVoice(ok, why){
  // voice steps are gentle: correct gives XP, "got it" gives partial; never lose hearts
  L.checked=true; L.asked+=1; if(ok){ L.correct+=1; L.xp+=10; }
  showFeedback(ok, ok?pickPraise():"That's okay", why, true);
}

/* LISTEN-TYPE (type what you hear) */
function viewListenType(s){

function wireListenType(s){
  setTimeout(()=>Voice.speak(s.say),300);
  const play=document.getElementById("play"); play.onclick=()=>Voice.speak(s.say,0.85);
  const inp=document.getElementById("tin"); inp.focus();

  setCheck(()=>{
    const ok=typedMatch(inp.value, s.answer);
    inp.disabled=true; inp.classList.add(ok?"ok":"bad");
    gradeQ(ok, ok? "That's right — <b>"+s.answer+"</b>." : `The word was <span class="ans">${s.answer}</span>.`);
  });
}

/* MCQ */
function viewMcq(s){

  return `<div class="step-kicker mono-kicker">${s.kicker||"Question"}</div>
    <h1 class="prompt fr">${s.q}</h1><div class="opts" id="opts">${opts}</div>
    <div class="hint">Tap an answer, then press Check.</div>`;
}
function wireMcq(s){
  L.payload={choice:null};
  const opts=[...document.querySelectorAll(".opt")];
  opts.forEach(b=> b.onclick=()=>{ if(L.checked)return; L.payload.choice=+b.dataset.idx; opts.forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); enableCheck(true); });
  setCheck(()=>{
    const ci=s.options.findIndex(o=>o.correct), chosen=L.payload.choice, ok=chosen===ci;

function wireMulti(s){

  setCheck(()=>{

/* GAP */
function viewGap(s){
  let html=""; s.parts.forEach(p=>{ html += typeof p==="string"?p:`<span class="blank" data-b="${p.b}"></span>`; });
  const bank=s.bank.map((w,i)=>`<button class="token" data-w="${i}">${w}</button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="sentence" id="sentence">${html}</div><div class="bank" id="bank">${bank}</div>`;
}
function wireGap(s){
  L.payload={fill:{}};
  const blanks=[...document.querySelectorAll(".blank")], tokens=[...document.querySelectorAll(".token")];
  function refresh(){
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, tk=L.payload.fill[bi]; bl.classList.toggle("filled",tk!=null);
      bl.innerHTML = tk!=null?`<button>${s.bank[tk]}</button>`:""; if(tk!=null) bl.querySelector("button").onclick=(e)=>{ if(L.checked)return; e.stopPropagation(); delete L.payload.fill[bi]; refresh(); }; });
    tokens.forEach(t=> t.classList.toggle("used", Object.values(L.payload.fill).includes(+t.dataset.w)));
    enableCheck(s.blanks.every((_,bi)=>L.payload.fill[bi]!=null));
  }
  function firstEmpty(){ for(let bi=0;bi<s.blanks.length;bi++) if(L.payload.fill[bi]==null) return bi; return -1; }
  tokens.forEach(t=> t.onclick=()=>{ if(L.checked)return; const bi=firstEmpty(); if(bi<0)return; L.payload.fill[bi]=+t.dataset.w; refresh(); });
  blanks.forEach(bl=> bl.onclick=()=>{ if(L.checked)return; const bi=+bl.dataset.b; if(L.payload.fill[bi]!=null){ delete L.payload.fill[bi]; refresh(); } });
  refresh();
  setCheck(()=>{ let ok=true;
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, word=s.bank[L.payload.fill[bi]], good=word===s.blanks[bi]; bl.classList.add(good?"ok":"bad"); if(!good)ok=false; const inner=bl.querySelector("button"); if(inner)inner.disabled=true; });
    tokens.forEach(t=>t.disabled=true);
    const correct=s.parts.map(p=> typeof p==="string"?p:`<b>${s.blanks[p.b]}</b>`).join("");
    gradeQ(ok, ok?s.ok:`The answer is: “${correct}”`);
  });
}

/* MATCH */
const PAIR_COLORS=["#1E2761","#C99528","#2C5F2D","#7A4FA3","#1E5F8C"];
function viewMatch(s){
  const left=s.left.map((l,i)=>`<button class="mitem mleft" data-idx="${i}">${l.t}<span class="dot"></span></button>`).join("");
  const right=s.right.map((r,i)=>`<button class="mitem mright" data-idx="${i}">${r.t}<span class="dot"></span></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="match"><div class="col">${left}</div><div class="col">${right}</div></div>
    <div class="hint">Tap one on the left, then its match on the right.</div>`;
}
function wireMatch(s){
  L.payload={links:{}, activeLeft:null, colorOf:{}};
  const lefts=[...document.querySelectorAll(".mleft")], rights=[...document.querySelectorAll(".mright")]; let cn=0;
  function clearActive(){ lefts.forEach(l=>l.classList.remove("active")); }
  function paint(){
    lefts.forEach(l=>{ const i=+l.dataset.idx, on=L.payload.links[i]!=null; l.classList.toggle("paired",on); l.querySelector(".dot").style.background=on?L.payload.colorOf[i]:"transparent"; });
    rights.forEach(r=>{ const i=+r.dataset.idx, li=Object.keys(L.payload.links).find(k=>L.payload.links[k]===i), on=li!=null; r.classList.toggle("paired",on); r.querySelector(".dot").style.background=on?L.payload.colorOf[li]:"transparent"; });
    enableCheck(Object.keys(L.payload.links).length===s.left.length);
  }
  lefts.forEach(l=> l.onclick=()=>{ if(L.checked)return; clearActive(); l.classList.add("active"); L.payload.activeLeft=+l.dataset.idx; });
  rights.forEach(r=> r.onclick=()=>{ if(L.checked||L.payload.activeLeft==null)return; const li=L.payload.activeLeft, ri=+r.dataset.idx;
    for(const k of Object.keys(L.payload.links)) if(L.payload.links[k]===ri) delete L.payload.links[k];
    if(L.payload.colorOf[li]==null) L.payload.colorOf[li]=PAIR_COLORS[(cn++)%PAIR_COLORS.length];
    L.payload.links[li]=ri; L.payload.activeLeft=null; clearActive(); paint(); });
  setCheck(()=>{ let ok=true; lefts.forEach(l=>l.disabled=true); rights.forEach(r=>r.disabled=true);
    Object.entries(L.payload.links).forEach(([li,ri])=>{ const good=s.left[li].key===s.right[ri].key; lefts[li].classList.add(good?"correct":"wrong"); rights[ri].classList.add(good?"correct":"wrong"); if(!good)ok=false; });
    gradeQ(ok, ok?s.ok:s.bad);
  });
}

/* NUMERIC (type a number) */
function viewNumeric(s){
  return `<div class="step-kicker mono-kicker">${s.kicker||"Work it out"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    ${s.hint?`<div class="formula">${s.hint}</div>`:''}
    <div class="num-row">
      <input class="tinput num" id="nin" inputmode="decimal" autocomplete="off" placeholder="Answer">
      ${s.unit?`<span class="num-unit">${s.unit}</span>`:''}
    </div>
    <div class="hint">Type the number${s.unit?` (in ${s.unit})`:''}, then press Check.</div>`;
}
function numMatch(typed, s){
  const v=parseFloat(String(typed).replace(/[, ]/g,""));
  if(isNaN(v)) return false;
  const accept = s.accept || [s.answer];
  const tol = s.tolerance!=null ? s.tolerance : 0;
  return accept.some(a=> Math.abs(v-a) <= tol);
}
function wireNumeric(s){
  const inp=document.getElementById("nin"); inp.focus();
  inp.oninput=()=> enableCheck(inp.value.trim().length>0);
  setCheck(()=>{
    const ok=numMatch(inp.value, s);
    inp.disabled=true; inp.classList.add(ok?"ok":"bad");
    gradeQ(ok, ok? (s.ok||"That's right.") : `The answer is <span class="ans">${s.answer}${s.unit?(" "+s.unit):""}</span>.${s.ok?" "+s.ok:""}`);
  });
}

}
function wireCategorise(s){
  L.payload={assign:{}, active:null};   // assign[itemIdx]=binIdx
  const pool=document.getElementById("pool");
  const bodies=[...document.querySelectorAll(".bin-body")];
  const bins=[...document.querySelectorAll(".bin")];
  function chipHTML(i){ return `<button class="cat-chip" data-i="${i}">${s.items[i].t}</button>`; }
  function refresh(){
    pool.innerHTML = s.items.map((it,i)=> L.payload.assign[i]==null? chipHTML(i):"").join("");
    bodies.forEach((b,bi)=>{ b.innerHTML = s.items.map((it,i)=> L.payload.assign[i]===bi? chipHTML(i):"").join(""); });

    });

      if(e.target.classList.contains("cat-chip"))return;

  }

  });
}

function viewOrder(s){

  const slots = s.items.map((_,i)=>`<div class="order-slot" data-slot="${i}"><span class="nidx">${i+1}</span><span class="slot-fill" data-slot="${i}"></span></div>`).join("");

}
function wireOrder(s){
  const ansFills=[...document.querySelectorAll(".slot-fill")];
  const pool=document.getElementById("opool");
  function chip(itemIdx, where){ return `<button class="order-chip" data-i="${itemIdx}" data-where="${where}">${s.items[itemIdx]}</button>`; }
  function refresh(){
    pool.innerHTML = L.payload.order.filter(i=>!L.payload.placed.includes(i)).map(i=>chip(i,"pool")).join("");
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; f.innerHTML = i!=null? chip(i,"ans") : ""; });
    [...document.querySelectorAll(".order-chip")].forEach(c=> c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.i;
      if(c.dataset.where==="pool"){ if(L.payload.placed.length<s.items.length) L.payload.placed.push(i); }
      else { L.payload.placed = L.payload.placed.filter(x=>x!==i); }
      refresh(); });
    enableCheck(L.payload.placed.length===s.items.length);
  }
  refresh();
  setCheck(()=>{ let ok=true;
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; const good=(i===slot); if(!good)ok=false;
      const c=f.querySelector(".order-chip"); if(c){ c.classList.add(good?"correct":"wrong"); c.disabled=true; } });
    gradeQ(ok, ok?(s.ok||"Perfect order!"):`The correct order is: ${s.items.map((t,i)=>`<b>${i+1}.</b> ${t}`).join("  ")}`);
  });
}
