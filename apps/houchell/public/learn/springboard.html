rs of electrons","why":"That is covalent bonding."},{"t":"Attraction between oppositely charged ions","why":"That is ionic bonding."}],"ok":"Metallic bonding: positive ions in a sea of delocalised electrons."},{"type":"categorise","q":"Sort each substance by its bonding type.","bins":["Ionic","Covalent","Metallic"],"items":[{"t":"Sodium chloride","bin":"Ionic"},{"t":"Water","bin":"Covalent"},{"t":"Copper","bin":"Metallic"},{"t":"Magnesium oxide","bin":"Ionic"},{"t":"Carbon dioxide","bin":"Covalent"}],"ok":"Metal + non-metal is ionic; non-metals only is covalent; a pure metal is metallic.","bad":"Metal+non-metal = ionic, non-metals = covalent, a metal = metallic."},{"type":"mcq","q":"How does a metal atom form a positive ion?","options":[{"t":"It loses one or more electrons","correct":true},{"t":"It gains electrons","why":"Gaining electrons makes a negative ion; metals lose electrons."},{"t":"It gains protons","why":"Protons stay in the nucleus; only electrons move."}],"ok":"Metals lose outer electrons to form positive ions."},{"type":"tf","q":"In ionic bonding, oppositely charged ions attract each other strongly.","answer":true,"why":"Ionic bonds are the strong electrostatic attraction between oppositely charged ions."},{"type":"mcq","q":"Why does a non-metal atom form a negative ion?","options":[{"t":"It gains electrons to fill its outer shell","correct":true},{"t":"It loses electrons","why":"Non-metals gain electrons; metals lose them."},{"t":"It loses protons","why":"Ion formation involves electrons, not protons."}],"ok":"Non-metals gain electrons, becoming negatively charged ions."}]},"GCB2":{"code":"GCB2","title":"Structures & properties","discipline":"chemistry","blurb":"How ionic, molecular, giant covalent and metallic structures explain a substance's properties.","vocab":[{"term":"giant ionic lattice","definition":"a regular 3D arrangement of many ions held by strong ionic bonds","say":"jy-ant eye-on-ic lattice"},{"term":"simple molecular","definition":"made of small molecules with weak forces between them","say":"sim-pul mo-lec-yew-lar"},{"term":"giant covalent","definition":"a huge network of atoms joined by covalent bonds, like diamond","say":"jy-ant co-vay-lent"},{"term":"alloy","definition":"a mixture of a metal with another element, usually harder than the pure metal","say":"al-oy"},{"term":"nanoparticle","definition":"a particle around 1 to 100 nanometres across","say":"nan-oh-par-ti-cle"}],"facts":["Giant ionic lattices have high melting points because many strong ionic bonds must be broken; they conduct electricity when molten or dissolved, because the ions are then free to move.","Simple molecular substances (like water and carbon dioxide) have low melting and boiling points because only weak forces between molecules are broken; they do not conduct electricity.","Giant covalent structures have very high melting points. Diamond is hard (each carbon forms 4 bonds); graphite is soft and conducts (layers, with one delocalised electron per carbon).","Metals conduct electricity and heat because of their delocalised electrons, and are malleable; alloys are harder than pure metals because the different-sized atoms distort the layers.","Nanoparticles are 1 to 100 nm across and have a very large surface-area-to-volume ratio, which makes them useful as catalysts and in sunscreens, though their effects on health are not fully known."],"misconceptions":[{"wrong":"Ionic compounds conduct electricity when solid.","right":"They only conduct when molten or dissolved, because then the ions are free to move."},{"wrong":"Simple molecular substances have high melting points because covalent bonds are weak.","right":"The covalent bonds are strong, but the forces BETWEEN molecules are weak, so little energy is needed to separate them."}],"questions":[{"type":"mcq","q":"Why do ionic compounds have high melting points?","options":[{"t":"Many strong ionic bonds must be broken","correct":true},{"t":"The molecules are very heavy","why":"Ionic compounds are lattices, not molecules; it is the strong bonds."},{"t":"They contain delocalised electrons","why":"Delocalised electrons are in metals, not ionic lattices."}],"ok":"High melting points come from breaking many strong ionic bonds."},{"type":"mcq","q":"When does an ionic compound conduct electricity?","options":[{"t":"When molten or dissolved, so the ions can move","correct":true},{"t":"Only when solid","why":"When solid the ions are fixed and cannot move."},{"t":"It never conducts","why":"It conducts when the ions are free to move."}],"ok":"Conduction needs free-moving charged particles, so molten or dissolved."},{"type":"mcq","q":"Why do simple molecular substances have low melting points?","options":[{"t":"Only weak forces between molecules need to be broken","correct":true},{"t":"Their covalent bonds are weak","why":"The covalent bonds are strong; the forces between molecules are weak."},{"t":"They have no bonds at all","why":"They have strong covalent bonds within molecules."}],"ok":"Melting only breaks the weak forces between molecules, not the covalent bonds."},{"type":"mcq","q":"Why does graphite conduct electricity but diamond does not?","options":[{"t":"Graphite has delocalised electrons that can move; diamond does not","correct":true},{"t":"Graphite contains metal atoms","why":"Both are made of carbon only."},{"t":"Diamond is a liquid","why":"Diamond is a solid giant covalent structure."}],"ok":"In graphite each carbon has a delocalised electron free to move; in diamond all four are bonded."},{"type":"mcq","q":"Why are metals good conductors of electricity?","options":[{"t":"They have delocalised electrons that are free to move","correct":true},{"t":"Their ions move through the metal","why":"The ions stay in place; the electrons move."},{"t":"They contain charged molecules","why":"Metals have a lattice of ions and delocalised electrons."}],"ok":"Delocalised electrons carry the charge through the metal."},{"type":"mcq","q":"Why is an alloy usually harder than the pure metal?","options":[{"t":"Different-sized atoms distort the layers, so they cannot slide easily","correct":true},{"t":"Alloys contain no metal","why":"An alloy is mostly metal."},{"t":"Alloys are made of small molecules","why":"Alloys have a giant metallic structure."}],"ok":"Different-sized atoms stop the layers sliding, making the alloy harder."},{"type":"mcq","q":"Why are nanoparticles useful as catalysts?","options":[{"t":"They have a very large surface-area-to-volume ratio","correct":true},{"t":"They are very heavy","why":"Their usefulness comes from surface area, not mass."},{"t":"They cannot react","why":"Catalysts must take part in reactions; nanoparticles are very reactive surfaces."}],"ok":"A large surface-area-to-volume ratio gives nanoparticles a big active surface."}]},"GCB-EX":{"code":"GCB-EX","title":"Bonding — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Bonding, structure and properties.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Sodium chloride does not conduct electricity when solid, but does when molten. Why?","options":[{"t":"When molten the ions are free to move","correct":true},{"t":"When molten it gains electrons","why":"Conduction is from moving ions, not gained electrons."},{"t":"Solid salt has no ions","why":"Solid salt has ions, but they are fixed in place."}],"ok":"Molten salt has free-moving ions that can carry the charge."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Diamond and graphite are both made only of carbon, but diamond is hard and does not conduct electricity, while graphite is soft and does conduct. Explain these differences.","scheme":["Both are giant covalent structures of carbon (1)","In diamond each carbon forms 4 strong covalent bonds (1)","giving a rigid 3D structure, so it is hard (1)","In graphite each carbon forms 3 bonds, in layers (1)","the layers have weak forces between them and can slide, so it is soft/slippery (1)","graphite has one delocalised electron per carbon that can move, so it conducts (diamond has none) (1)"],"model":"Both are giant covalent carbon structures. In diamond each carbon forms four strong covalent bonds in a rigid 3D network, so it is hard, and it has no free electrons, so it cannot conduct. In graphite each carbon forms three bonds in layers; the layers slide because the forces between them are weak (soft), and each carbon has a delocalised electron that can move, so graphite conducts."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why magnesium oxide has a much higher melting point than carbon dioxide.","scheme":["Magnesium oxide is a giant ionic lattice (1)","with many strong ionic bonds that need a lot of energy to break (1)","Carbon dioxide is a simple molecular substance (1)","with only weak forces between molecules, needing little energy to break (1)"],"model":"Magnesium oxide is a giant ionic lattice held by many strong ionic bonds, so a lot of energy is needed to melt it. Carbon dioxide is simple molecular, so only weak forces between molecules must be overcome, giving a very low melting point."}]},"GCQ1":{"code":"GCQ1","title":"Conservation of mass & Mr","discipline":"chemistry","blurb":"Conservation of mass, balanced equations and relative formula mass.","vocab":[{"term":"relative formula mass","definition":"the sum of the relative atomic masses of the atoms in a formula, symbol Mr","say":"rel-a-tiv form-yew-la mass"},{"term":"conservation of mass","definition":"the rule that the total mass of reactants equals the total mass of products","say":"con-ser-vay-shun of mass"},{"term":"balanced equation","definition":"an equation with the same number of each type of atom on both sides","say":"bal-anced ee-quay-shun"}],"facts":["Mass is conserved in a chemical reaction: the total mass of the reactants equals the total mass of the products, because no atoms are created or destroyed.","A balanced symbol equation has the same number of each type of atom on both sides.","The relative formula mass (Mr) is the sum of the relative atomic masses (Ar) of all the atoms in the formula.","In a reaction where a gas is given off into the open air, the mass left behind appears to fall.","In a reaction where a gas from the air is taken in (e.g. a metal rusting), the mass appears to rise."],"misconceptions":[{"wrong":"Mass is lost when a substance burns away.","right":"Mass is conserved; if mass seems to fall, a gas has escaped into the air, taking mass with it."},{"wrong":"Relative formula mass is measured in grams.","right":"Relative formula mass is a ratio with no units; it is just a number."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"12 g of carbon reacts completely with 32 g of oxygen. What mass of carbon dioxide is formed?","hint":"Conservation of mass: products total the same as reactants.","answer":44,"unit":"g","ok":"12 + 32 = 44 g of carbon dioxide."},{"type":"numeric","kicker":"Work it out","q":"Calculate the relative formula mass (Mr) of water, H2O. (Ar: H = 1, O = 16)","hint":"Mr = (2 x 1) + 16","answer":18,"unit":"","ok":"(2 x 1) + 16 = 18."},{"type":"numeric","kicker":"Work it out","q":"Calculate the Mr of calcium carbonate, CaCO3. (Ar: Ca = 40, C = 12, O = 16)","hint":"Mr = 40 + 12 + (3 x 16)","answer":100,"unit":"","ok":"40 + 12 + 48 = 100."},{"type":"mcq","q":"What does conservation of mass tell us about a reaction?","options":[{"t":"The total mass of products equals the total mass of reactants","correct":true},{"t":"Mass is always lost","why":"No atoms are lost, so total mass is unchanged."},{"t":"Mass doubles","why":"Mass is conserved, not doubled."}],"ok":"No atoms are created or destroyed, so the total mass stays the same."},{"type":"mcq","q":"A metal is heated in an open dish and its mass increases. Why?","options":[{"t":"It reacts with oxygen from the air, which adds mass","correct":true},{"t":"Mass is created in the reaction","why":"Mass cannot be created; oxygen is added from the air."},{"t":"The metal melts","why":"Melting does not change mass."}],"ok":"Oxygen from the air bonds to the metal, increasing the mass."},{"type":"tf","q":"In a sealed flask, the mass before a reaction equals the mass after.","answer":true,"why":"No atoms can enter or leave a sealed flask, so mass is conserved."},{"type":"numeric","kicker":"Work it out","q":"Calculate the Mr of carbon dioxide, CO2. (Ar: C = 12, O = 16)","hint":"Mr = 12 + (2 x 16)","answer":44,"unit":"","ok":"12 + 32 = 44."}]},"GCQ2":{"code":"GCQ2","title":"Moles, % mass & concentration","discipline":"chemistry","blurb":"Percentage by mass, the concentration of solutions, and moles (Higher tier).","vocab":[{"term":"percentage by mass","definition":"the fraction of a compound's mass made up by one element, as a percentage","say":"per-cent-age by mass"},{"term":"concentration","definition":"the mass of solute dissolved in a given volume of solution","say":"con-sen-tray-shun"},{"term":"mole","definition":"the unit for amount of substance; moles = mass / Mr","say":"mohl"}],"facts":["The percentage by mass of an element in a compound = (Ar x number of atoms / Mr) x 100.","The concentration of a solution = mass of solute / volume of solution, often in grams per cubic decimetre (g/dm cubed).","Higher tier: the amount of a substance in moles = mass / relative formula mass.","Higher tier: a balanced equation tells you the ratio of moles of reactants and products.","Measurements always have some uncertainty, so repeated, careful measurements improve reliability."],"misconceptions":[{"wrong":"Concentration depends only on the mass of solute.","right":"Concentration depends on both the mass of solute AND the volume of solution."},{"wrong":"A concentrated solution always has more solute than a dilute one.","right":"It is the amount per volume that matters; a small concentrated sample can have less solute overall than a large dilute one."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"Calculate the percentage by mass of oxygen in water, H2O. (Mr = 18, O = 16)","hint":"% mass = (16 / 18) x 100","answer":89,"unit":"%","ok":"(16 / 18) x 100 = 88.9, about 89%."},{"type":"numeric","kicker":"Work it out","q":"250 g of salt is dissolved to make 5 dm cubed of solution. What is the concentration?","hint":"concentration = mass / volume","answer":50,"unit":"g/dm3","ok":"250 / 5 = 50 g/dm cubed."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: how many moles are in 36 g of water? (Mr of water = 18)","hint":"moles = mass / Mr","answer":2,"unit":"mol","ok":"36 / 18 = 2 mol."},{"type":"mcq","q":"What two quantities decide the concentration of a solution?","options":[{"t":"The mass of solute and the volume of solution","correct":true},{"t":"Only the mass of solute","why":"Volume matters too."},{"t":"Only the volume of solution","why":"The mass of solute matters too."}],"ok":"Concentration = mass of solute / volume of solution."},{"type":"numeric","kicker":"Work it out","q":"What is the Mr of magnesium oxide, MgO? (Ar: Mg = 24, O = 16)","hint":"Mr = 24 + 16","answer":40,"unit":"","ok":"24 + 16 = 40."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: how many moles are in 88 g of carbon dioxide? (Mr = 44)","hint":"moles = mass / Mr","answer":2,"unit":"mol","ok":"88 / 44 = 2 mol."},{"type":"tf","q":"Repeating a measurement and taking a mean helps reduce the effect of uncertainty.","answer":true,"why":"Repeats and a mean reduce the effect of random errors, improving reliability."}]},"GCQ-EX":{"code":"GCQ-EX","title":"Quantitative — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Quantitative chemistry.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"Calculate the Mr of sulfuric acid, H2SO4. (Ar: H = 1, S = 32, O = 16)","hint":"Mr = (2 x 1) + 32 + (4 x 16)","answer":98,"unit":"","ok":"2 + 32 + 64 = 98."},{"type":"numeric","kicker":"Exam · calculate","q":"48 g of magnesium reacts with oxygen to form 80 g of magnesium oxide. What mass of oxygen reacted?","hint":"Conservation of mass: oxygen = product mass - magnesium mass","answer":32,"unit":"g","ok":"80 - 48 = 32 g of oxygen."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student burns magnesium in an open crucible and finds the mass increases. Explain this result using conservation of mass.","scheme":["Magnesium reacts with oxygen from the air (1)","forming magnesium oxide (1)","The oxygen atoms add mass to the solid (1)","No mass is created; the extra mass comes from the oxygen that has joined the magnesium (1)"],"model":"The magnesium reacts with oxygen from the air to form magnesium oxide. The oxygen atoms become part of the solid, so the mass increases. Mass is still conserved overall — the extra mass is the oxygen taken from the air."},{"type":"numeric","kicker":"Exam · Higher","q":"Higher tier: a solution contains 0.5 mol of sodium hydroxide (Mr = 40). What mass of sodium hydroxide is this?","hint":"mass = moles x Mr","answer":20,"unit":"g","ok":"0.5 x 40 = 20 g."}]},"GCC1":{"code":"GCC1","title":"Reactivity & extracting metals","discipline":"chemistry","blurb":"The reactivity series, displacement, oxidation and reduction, and extracting metals.","vocab":[{"term":"reactivity series","definition":"a list of metals in order of how reactive they are","say":"ree-ac-tiv-it-ee seer-eez"},{"term":"displacement reaction","definition":"a reaction where a more reactive metal pushes a less reactive one out of its compound","say":"dis-place-ment"},{"term":"oxidation","definition":"gain of oxygen, or loss of electrons","say":"ok-si-day-shun"},{"term":"reduction","definition":"loss of oxygen, or gain of electrons","say":"ree-duc-shun"},{"term":"ore","definition":"a rock that contains enough metal to be worth extracting","say":"or"}],"facts":["The reactivity series lists metals in order of reactivity; potassium, sodium, calcium and magnesium are very reactive, while copper, silver and gold are unreactive.","A more reactive metal will displace a less reactive metal from its compound in a displacement reaction.","Oxidation is the gain of oxygen; reduction is the loss of oxygen. Higher tier: oxidation is loss of electrons and reduction is gain of electrons (OIL RIG).","Metals less reactive than carbon can be extracted by reduction with carbon, for example iron from iron oxide.","Metals more reactive than carbon (like aluminium) must be extracted by electrolysis, and very unreactive metals like gold are found native (uncombined)."],"misconceptions":[{"wrong":"All metals can be extracted using carbon.","right":"Only metals less reactive than carbon are extracted with carbon; more reactive metals need electrolysis."},{"wrong":"Reduction means making something smaller.","right":"In chemistry, reduction is the loss of oxygen, or gain of electrons."}],"questions":[{"type":"mcq","q":"In a displacement reaction, which metal is displaced?","options":[{"t":"The less reactive metal in the compound","correct":true},{"t":"The more reactive metal","why":"The more reactive metal does the displacing."},{"t":"Both metals","why":"Only the less reactive metal is pushed out."}],"ok":"A more reactive metal displaces a less reactive one from its compound."},{"type":"mcq","q":"What is oxidation?","options":[{"t":"Gain of oxygen (or loss of electrons)","correct":true},{"t":"Loss of oxygen","why":"That is reduction."},{"t":"Gain of electrons","why":"That is reduction; oxidation is loss of electrons."}],"ok":"Oxidation is gain of oxygen, or loss of electrons."},{"type":"mcq","q":"How is iron extracted from iron oxide?","options":[{"t":"By reduction with carbon","correct":true},{"t":"By electrolysis","why":"Iron is less reactive than carbon, so carbon reduction is used."},{"t":"It is found native","why":"Iron is reactive enough to be found as a compound, not native."}],"ok":"Iron is less reactive than carbon, so it is reduced by carbon."},{"type":"mcq","q":"Why must aluminium be extracted by electrolysis rather than with carbon?","options":[{"t":"Aluminium is more reactive than carbon","correct":true},{"t":"Aluminium is less reactive than carbon","why":"If it were less reactive, carbon would work; aluminium is more reactive."},{"t":"Aluminium is found native","why":"Aluminium is reactive, so it is found in compounds."}],"ok":"Aluminium is more reactive than carbon, so carbon cannot reduce it."},{"type":"categorise","q":"Sort each metal as very reactive or unreactive.","bins":["Very reactive","Unreactive"],"items":[{"t":"Potassium","bin":"Very reactive"},{"t":"Gold","bin":"Unreactive"},{"t":"Sodium","bin":"Very reactive"},{"t":"Copper","bin":"Unreactive"},{"t":"Magnesium","bin":"Very reactive"}],"ok":"Group 1 and 2 metals are very reactive; copper, silver and gold are not.","bad":"Potassium, sodium and magnesium are very reactive; copper and gold are not."},{"type":"tf","q":"Gold is found in the Earth as the uncombined metal.","answer":true,"why":"Gold is so unreactive that it is found native (uncombined)."},{"type":"mcq","q":"Higher tier: in terms of electrons, what is reduction?","options":[{"t":"Gain of electrons","correct":true},{"t":"Loss of electrons","why":"That is oxidation."},{"t":"Loss of protons","why":"Redox is about electrons, not protons."}],"ok":"Reduction is gain of electrons (OIL RIG: Reduction Is Gain)."}]},"GCC2":{"code":"GCC2","title":"Acids, bases & salts","discipline":"chemistry","blurb":"The pH scale, neutralisation, and the reactions that make salts.","vocab":[{"term":"acid","definition":"a substance that produces hydrogen ions (H+) in solution; pH less than 7","say":"as-id"},{"term":"alkali","definition":"a soluble base that produces hydroxide ions (OH-); pH more than 7","say":"al-ka-lye"},{"term":"neutralisation","definition":"the reaction of an acid with a base to make a salt and water","say":"new-tral-eye-zay-shun"},{"term":"salt","definition":"a compound made when an acid reacts with a base or metal","say":"solt"},{"term":"pH scale","definition":"a scale from 0 to 14 that measures acidity or alkalinity","say":"pee-aytch scale"}],"facts":["The pH scale runs from 0 to 14: below 7 is acidic, 7 is neutral and above 7 is alkaline. Universal indicator shows the pH by its colour.","Acids produce hydrogen ions (H+) in solution; alkalis produce hydroxide ions (OH-).","Neutralisation is acid + base making a salt and water; the ionic equation is H+ + OH- making H2O.","Acid + metal makes a salt + hydrogen; acid + metal carbonate makes a salt + water + carbon dioxide.","Higher tier: strong acids fully ionise in water, weak acids only partly ionise; each step down the pH scale means ten times the hydrogen ion concentration."],"misconceptions":[{"wrong":"A strong acid and a concentrated acid mean the same thing.","right":"Strong is about how fully it ionises; concentrated is about how much acid is dissolved in the water."},{"wrong":"Neutralisation makes a gas every time.","right":"Acid + base makes salt and water; a gas (carbon dioxide) is only made with carbonates, and hydrogen with metals."}],"questions":[{"type":"mcq","q":"What is the pH of a neutral substance?","options":[{"t":"7","correct":true},{"t":"0","why":"pH 0 is strongly acidic."},{"t":"14","why":"pH 14 is strongly alkaline."}],"ok":"Neutral substances have a pH of 7."},{"type":"mcq","q":"Which ions do acids produce in solution?","options":[{"t":"Hydrogen ions, H+","correct":true},{"t":"Hydroxide ions, OH-","why":"Those are produced by alkalis."},{"t":"Oxygen ions","why":"Acids produce hydrogen ions."}],"ok":"Acids produce H+ ions in solution."},{"type":"mcq","q":"What are the products of neutralising an acid with a base?","options":[{"t":"A salt and water","correct":true},{"t":"A salt and hydrogen","why":"Hydrogen is made with a metal, not a base."},{"t":"Only water","why":"A salt is also formed."}],"ok":"Acid + base makes a salt and water."},{"type":"mcq","q":"What is made when an acid reacts with a metal carbonate?","options":[{"t":"A salt, water and carbon dioxide","correct":true},{"t":"A salt and hydrogen","why":"Hydrogen comes from acid + metal, not a carbonate."},{"t":"Only a salt","why":"Water and carbon dioxide are also produced."}],"ok":"Acid + carbonate makes a salt, water and carbon dioxide."},{"type":"mcq","q":"What gas is given off when an acid reacts with a metal?","options":[{"t":"Hydrogen","correct":true},{"t":"Carbon dioxide","why":"That comes from carbonates, not metals."},{"t":"Oxygen","why":"Acid + metal gives hydrogen."}],"ok":"Acid + metal makes a salt and hydrogen gas."},{"type":"tf","q":"Universal indicator can be used to estimate the pH of a solution.","answer":true,"why":"Universal indicator changes colour to show the pH of a solution."},{"type":"mcq","q":"Higher tier: what is the difference between a strong and a weak acid?","options":[{"t":"A strong acid fully ionises; a weak acid only partly ionises","correct":true},{"t":"A strong acid is more concentrated","why":"Strength is about ionisation, not concentration."},{"t":"A weak acid has no hydrogen ions","why":"A weak acid does make H+, but only partly ionises."}],"ok":"Strong acids fully ionise in water; weak acids only partly ionise."}]},"GCC3":{"code":"GCC3","title":"Electrolysis","discipline":"chemistry","blurb":"Breaking down ionic compounds with electricity, and the products at each electrode.","vocab":[{"term":"electrolysis","definition":"using electricity to break down an ionic compound","say":"ee-lec-trol-iss-iss"},{"term":"electrolyte","definition":"the molten or dissolved ionic compound that is broken down","say":"ee-lec-tro-light"},{"term":"cathode","definition":"the negative electrode, which attracts positive ions","say":"cath-ode"},{"term":"anode","definition":"the positive electrode, which attracts negative ions","say":"an-ode"}],"facts":["Electrolysis uses electricity to break down an ionic compound that is molten or dissolved in water (the electrolyte).","Positive ions (cations) move to the negative cathode; negative ions (anions) move to the positive anode.","When a molten ionic compound is electrolysed, the metal forms at the cathode and the non-metal at the anode.","In a solution, hydrogen is produced at the cathode unless the metal is less reactive than hydrogen (then the metal forms).","In a solution, oxygen is produced at the anode unless a halide (such as chloride) is present, when the halogen forms instead. Higher tier: these changes can be shown with half equations."],"misconceptions":[{"wrong":"Positive ions go to the positive electrode.","right":"Opposite charges attract, so positive ions go to the negative cathode."},{"wrong":"Electrolysis works on any compound.","right":"Electrolysis breaks down ionic compounds that are molten or dissolved, so the ions can move."}],"questions":[{"type":"mcq","q":"What is electrolysis?","options":[{"t":"Using electricity to break down an ionic compound","correct":true},{"t":"Heating a compound until it melts","why":"That is just melting, not electrolysis."},{"t":"Mixing two solutions","why":"Electrolysis needs an electric current."}],"ok":"Electrolysis uses electricity to break down a molten or dissolved ionic compound."},{"type":"mcq","q":"Which ions are attracted to the negative cathode?","options":[{"t":"Positive ions","correct":true},{"t":"Negative ions","why":"Negative ions go to the positive anode."},{"t":"Both equally","why":"Opposite charges attract; positive ions go to the cathode."}],"ok":"Positive ions are attracted to the negative cathode."},{"type":"mcq","q":"When molten lead bromide is electrolysed, what forms at the cathode?","options":[{"t":"Lead (the metal)","correct":true},{"t":"Bromine","why":"Bromine, the non-metal, forms at the anode."},{"t":"Oxygen","why":"There is no oxygen in molten lead bromide."}],"ok":"In a molten ionic compound, the metal forms at the cathode."},{"type":"mcq","q":"In the electrolysis of a salt solution, what usually forms at the cathode?","options":[{"t":"Hydrogen, unless the metal is less reactive than hydrogen","correct":true},{"t":"Always the metal","why":"The metal forms only if it is less reactive than hydrogen."},{"t":"Oxygen","why":"Oxygen forms at the anode, not the cathode."}],"ok":"Hydrogen forms at the cathode unless the metal is less reactive than hydrogen."},{"type":"mcq","q":"In the electrolysis of sodium chloride solution, what forms at the anode?","options":[{"t":"Chlorine (because a halide is present)","correct":true},{"t":"Oxygen","why":"With a halide present, the halogen forms instead of oxygen."},{"t":"Sodium","why":"Sodium is a metal; it would form at the cathode, but hydrogen forms instead."}],"ok":"A halide present means the halogen (chlorine) forms at the anode."},{"type":"tf","q":"During electrolysis, negative ions are attracted to the positive anode.","answer":true,"why":"Opposite charges attract, so negative ions move to the positive anode."},{"type":"mcq","q":"Why must an ionic compound be molten or dissolved for electrolysis?","options":[{"t":"So the ions are free to move and carry the charge","correct":true},{"t":"So it becomes a gas","why":"It does not need to be a gas; the ions just need to move."},{"t":"So it stops conducting","why":"It must conduct, which needs free-moving ions."}],"ok":"Free-moving ions are needed to carry the current during electrolysis."}]},"GCC-EX":{"code":"GCC-EX","title":"Chemical changes — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemical changes.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Zinc is added to copper sulfate solution and the blue colour fades as copper appears. What type of reaction is this?","options":[{"t":"A displacement reaction (zinc is more reactive than copper)","correct":true},{"t":"Neutralisation","why":"No acid and base are reacting here."},{"t":"Electrolysis","why":"No electricity is used."}],"ok":"Zinc, being more reactive, displaces copper from its compound."},{"type":"mcq","q":"Which acid + carbonate reaction product turns limewater milky?","options":[{"t":"Carbon dioxide","correct":true},{"t":"Hydrogen","why":"Hydrogen comes from acid + metal, and does not turn limewater milky."},{"t":"Oxygen","why":"Oxygen is not a product of acid + carbonate."}],"ok":"Acid + carbonate releases carbon dioxide, which turns limewater milky."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the method used to extract a metal from its ore depends on the metal's position in the reactivity series.","scheme":["Metals less reactive than carbon can be extracted by reduction with carbon (1)","e.g. iron from iron oxide (1)","because carbon is more reactive and removes the oxygen (1)","Metals more reactive than carbon must be extracted by electrolysis (1)","e.g. aluminium (1)","very unreactive metals such as gold are found native/uncombined and need no extraction (1)"],"model":"Metals below carbon in the reactivity series (like iron) can be reduced by carbon, which removes the oxygen. Metals above carbon (like aluminium) are too reactive for carbon to remove the oxygen, so they are extracted by electrolysis. Very unreactive metals such as gold are found native and need no extraction."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Predict and explain the products at each electrode when molten zinc chloride is electrolysed.","scheme":["At the cathode: zinc (1)","because positive metal ions are attracted to the negative cathode (1)","At the anode: chlorine (1)","because negative chloride ions are attracted to the positive anode (1)"],"model":"Zinc forms at the cathode because the positive zinc ions are attracted to the negative electrode. Chlorine forms at the anode because the negative chloride ions are attracted to the positive electrode."}]},"GCE1":{"code":"GCE1","title":"Exothermic & endothermic reactions","discipline":"chemistry","blurb":"Reactions that give out or take in energy, and how we use them.","vocab":[{"term":"exothermic","definition":"a reaction that transfers energy to the surroundings, so the temperature rises","say":"ex-oh-ther-mic"},{"term":"endothermic","definition":"a reaction that takes in energy, so the temperature falls","say":"en-doh-ther-mic"}],"facts":["An exothermic reaction transfers energy to the surroundings, so the temperature of the surroundings rises. Examples include combustion, neutralisation and oxidation.","An endothermic reaction takes in energy from the surroundings, so the temperature falls. Examples include thermal decomposition and some dissolving reactions.","Required practical: measure the temperature change of reactions such as dissolving, displacement and neutralisation.","Hand warmers use exothermic reactions to warm you up; some sports injury cold packs use endothermic reactions to cool a injury.","Whether a reaction is exothermic or endothermic depends on the balance of energy taken in to break bonds and given out to make bonds."],"misconceptions":[{"wrong":"Endothermic reactions feel hot.","right":"Endothermic reactions take in energy, so the surroundings get colder, not hotter."},{"wrong":"All reactions give out energy.","right":"Exothermic reactions give out energy, but endothermic reactions take it in."}],"questions":[{"type":"mcq","q":"What happens to the temperature of the surroundings in an exothermic reaction?","options":[{"t":"It rises","correct":true},{"t":"It falls","why":"Falling temperature is endothermic."},{"t":"It stays the same","why":"Exothermic reactions release energy, warming the surroundings."}],"ok":"Exothermic reactions release energy, so the surroundings get warmer."},{"type":"mcq","q":"What is an endothermic reaction?","options":[{"t":"One that takes in energy, so the temperature falls","correct":true},{"t":"One that gives out energy","why":"That is exothermic."},{"t":"One with no energy change","why":"Endothermic reactions take in energy."}],"ok":"Endothermic reactions absorb energy, cooling the surroundings."},{"type":"categorise","q":"Sort each as exothermic or endothermic.","bins":["Exothermic","Endothermic"],"items":[{"t":"Combustion (burning)","bin":"Exothermic"},{"t":"Neutralisation","bin":"Exothermic"},{"t":"Thermal decomposition","bin":"Endothermic"},{"t":"A sports cold pack","bin":"Endothermic"}],"ok":"Giving out energy is exothermic; taking it in is endothermic.","bad":"Burning and neutralisation give out energy; decomposition and cold packs take it in."},{"type":"mcq","q":"A hand warmer gets hot when it is activated. What kind of reaction is inside?","options":[{"t":"Exothermic","correct":true},{"t":"Endothermic","why":"Endothermic reactions cool down, not warm up."},{"t":"Neither","why":"Giving out heat is exothermic."}],"ok":"A hand warmer uses an exothermic reaction to release heat."},{"type":"mcq","q":"In the required practical, how do you tell whether a reaction is exothermic or endothermic?","options":[{"t":"Measure the temperature change of the mixture","correct":true},{"t":"Measure its mass","why":"Mass does not tell you the energy change."},{"t":"Measure its colour","why":"Colour does not directly show the energy change."}],"ok":"You measure the temperature change: a rise is exothermic, a fall is endothermic."},{"type":"tf","q":"Neutralisation of an acid by an alkali is an exothermic reaction.","answer":true,"why":"Neutralisation releases energy, so the temperature of the mixture rises."}]},"GCE2":{"code":"GCE2","title":"Reaction profiles","discipline":"chemistry","blurb":"Energy level diagrams, activation energy, and bond breaking and making.","vocab":[{"term":"reaction profile","definition":"an energy diagram showing the energy of reactants and products","say":"ree-ac-shun pro-file"},{"term":"activation energy","definition":"the minimum energy needed for a reaction to start","say":"ac-ti-vay-shun energy"}],"facts":["A reaction profile shows the energy of the reactants and the products during a reaction.","In an exothermic reaction the products are at a lower energy than the reactants; in an endothermic reaction they are higher.","The activation energy is the minimum energy that colliding particles need for a reaction to start; it is the height of the hump on the profile.","Breaking bonds takes in energy (endothermic); making bonds gives out energy (exothermic).","A reaction is exothermic overall if more energy is given out making bonds than is taken in breaking them; a catalyst lowers the activation energy."],"misconceptions":[{"wrong":"Making bonds takes in energy.","right":"Making bonds gives out energy; it is breaking bonds that takes in energy."},{"wrong":"A catalyst makes a reaction exothermic.","right":"A catalyst lowers the activation energy and speeds up the reaction; it does not change whether it is exothermic or endothermic."}],"questions":[{"type":"mcq","q":"On a reaction profile for an exothermic reaction, where are the products?","options":[{"t":"Lower in energy than the reactants","correct":true},{"t":"Higher in energy than the reactants","why":"Higher products would be endothermic."},{"t":"At the same energy as the reactants","why":"Exothermic reactions release energy, lowering the products."}],"ok":"In an exothermic reaction, the products are at a lower energy than the reactants."},{"type":"mcq","q":"What is the activation energy?","options":[{"t":"The minimum energy needed for a reaction to start","correct":true},{"t":"The energy given out by a reaction","why":"That is the overall energy change, not the activation energy."},{"t":"The energy stored in the products","why":"Activation energy is the barrier at the start."}],"ok":"Activation energy is the minimum energy needed to start a reaction."},{"type":"mcq","q":"Is breaking bonds exothermic or endothermic?","options":[{"t":"Endothermic (it takes in energy)","correct":true},{"t":"Exothermic (it gives out energy)","why":"Making bonds gives out energy; breaking takes it in."},{"t":"Neither","why":"Breaking bonds always takes in energy."}],"ok":"Breaking bonds takes in energy, so it is endothermic."},{"type":"mcq","q":"Is making bonds exothermic or endothermic?","options":[{"t":"Exothermic (it gives out energy)","correct":true},{"t":"Endothermic (it takes in energy)","why":"Breaking bonds takes in energy; making them gives it out."},{"t":"Neither","why":"Making bonds always gives out energy."}],"ok":"Making bonds gives out energy, so it is exothermic."},{"type":"mcq","q":"What does a catalyst do to the activation energy?","options":[{"t":"Lowers it","correct":true},{"t":"Raises it","why":"A catalyst lowers the activation energy."},{"t":"Has no effect","why":"Lowering the activation energy is how a catalyst speeds a reaction."}],"ok":"A catalyst lowers the activation energy, speeding up the reaction."},{"type":"tf","q":"In an endothermic reaction, the products are higher in energy than the reactants.","answer":true,"why":"Endothermic reactions take in energy, so the products end up at a higher energy level."}]},"GCE-EX":{"code":"GCE-EX","title":"Energy changes — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Energy changes.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A reaction's products are at a higher energy than its reactants. What does this tell you?","options":[{"t":"The reaction is endothermic","correct":true},{"t":"The reaction is exothermic","why":"Exothermic reactions have lower-energy products."},{"t":"No reaction has happened","why":"An energy change shows a reaction has happened."}],"ok":"Higher-energy products mean energy was taken in, so the reaction is endothermic."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"A student mixes two solutions and the temperature falls from 21 degC to 15 degC. Explain what type of reaction this is and describe how the student could improve the reliability of the result.","scheme":["The temperature falls, so the reaction is endothermic (1)","energy is taken in from the surroundings (1)","To improve reliability: use a lid/insulated cup to reduce heat exchange with the air (1)","repeat the experiment and calculate a mean temperature change (1)","control the volumes and concentrations of the solutions each time (1)","use the same thermometer / read it at eye level to reduce errors (1)"],"model":"The temperature falls, so the reaction is endothermic — it takes in energy from the surroundings. To improve reliability, use an insulated cup with a lid, repeat the experiment and take a mean, keep the volumes and concentrations the same each time, and read the thermometer carefully."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Use ideas about bond breaking and bond making to explain why a combustion reaction is exothermic.","scheme":["Breaking the bonds in the reactants takes in energy (1)","Making the bonds in the products (CO2 and water) gives out energy (1)","More energy is given out making bonds than is taken in breaking them (1)","so there is a net release of energy, making it exothermic (1)"],"model":"Breaking the bonds in the fuel and oxygen takes in energy, but making the bonds in the carbon dioxide and water gives out energy. More energy is released making bonds than is used breaking them, so overall energy is given out — the reaction is exothermic."}]},"GCR1":{"code":"GCR1","title":"Rate of reaction","discipline":"chemistry","blurb":"What controls how fast reactions go, using collision theory.","vocab":[{"term":"rate of reaction","definition":"how quickly reactants are used up or products are made","say":"rayt of ree-ac-shun"},{"term":"collision theory","definition":"the idea that reactions happen when particles collide with enough energy","say":"col-li-shun theory"},{"term":"catalyst","definition":"a substance that speeds up a reaction without being used up","say":"cat-a-list"},{"term":"surface area","definition":"the total area of the surface of a solid that is exposed to react","say":"sur-face air-ee-a"}],"facts":["The rate of reaction is how quickly the reactants are used up or the products are made.","Collision theory says reactions happen when particles collide with at least the activation energy and the correct orientation; more frequent or more energetic collisions speed up the reaction.","Increasing the temperature speeds up a reaction because particles move faster and collide more often and more energetically.","Increasing the concentration of a solution (or the pressure of a gas) speeds up a reaction because there are more particles in the same volume, so collisions are more frequent.","Increasing the surface area of a solid speeds up a reaction; a catalyst speeds up a reaction by providing a different pathway with a lower activation energy, and is not used up."],"misconceptions":[{"wrong":"A catalyst is used up in the reaction.","right":"A catalyst is not used up; it can be used again and again."},{"wrong":"Breaking a solid into smaller pieces gives it less surface area.","right":"Smaller pieces have a larger total surface area, so the reaction is faster."}],"questions":[{"type":"mcq","q":"What is the rate of a reaction?","options":[{"t":"How quickly reactants are used up or products made","correct":true},{"t":"How much product is made in total","why":"Rate is about speed, not total amount."},{"t":"The temperature of the reaction","why":"Temperature affects rate but is not the rate itself."}],"ok":"Rate is how fast reactants are used up or products are formed."},{"type":"mcq","q":"According to collision theory, what is needed for a reaction to happen?","options":[{"t":"Particles must collide with at least the activation energy","correct":true},{"t":"Particles must be the same size","why":"Size is not the requirement."},{"t":"Particles must be cold","why":"Colder particles react more slowly."}],"ok":"Particles must collide with enough energy (the activation energy) and the right orientation."},{"type":"mcq","q":"Why does raising the temperature speed up a reaction?","options":[{"t":"Particles move faster and collide more often and more energetically","correct":true},{"t":"Particles get bigger","why":"Temperature changes speed, not size."},{"t":"There are more particles","why":"Temperature does not add particles; it speeds them up."}],"ok":"Hotter particles collide more frequently and with more energy."},{"type":"mcq","q":"Why does increasing the surface area of a solid speed up a reaction?","options":[{"t":"More of the solid is exposed, so collisions are more frequent","correct":true},{"t":"The solid becomes more concentrated","why":"Surface area is about exposed area, not concentration."},{"t":"The activation energy falls","why":"Surface area does not change the activation energy."}],"ok":"More exposed surface means more frequent collisions and a faster reaction."},{"type":"mcq","q":"How does a catalyst speed up a reaction?","options":[{"t":"It provides a pathway with a lower activation energy","correct":true},{"t":"It increases the temperature","why":"A catalyst does not heat the reaction."},{"t":"It is used up to release energy","why":"A catalyst is not used up."}],"ok":"A catalyst lowers the activation energy and is not used up."},{"type":"categorise","q":"Match each change to why it speeds up a reaction.","bins":["More frequent collisions","More energetic collisions","Lower activation energy"],"items":[{"t":"Higher concentration","bin":"More frequent collisions"},{"t":"Larger surface area","bin":"More frequent collisions"},{"t":"Higher temperature","bin":"More energetic collisions"},{"t":"Adding a catalyst","bin":"Lower activation energy"}],"ok":"Concentration and surface area raise collision frequency; temperature raises energy; catalysts lower the barrier.","bad":"Frequency vs energy vs activation energy are the three ways to speed up a reaction."},{"type":"tf","q":"A catalyst is used up during a reaction.","answer":false,"why":"A catalyst speeds up a reaction without being used up, so it can be reused."}]},"GCR2":{"code":"GCR2","title":"Reversible reactions & equilibrium","discipline":"chemistry","blurb":"Reversible reactions, their energy changes, and dynamic equilibrium.","vocab":[{"term":"reversible reaction","definition":"a reaction in which the products can react to reform the reactants","say":"ree-ver-si-bul"},{"term":"equilibrium","definition":"the state where the forward and reverse reactions happen at the same rate","say":"ee-kwi-lib-ree-um"}],"facts":["A reversible reaction is one where the products can react to reform the reactants; it is shown with a special double arrow.","If a reversible reaction is exothermic in one direction, it is endothermic in the other, by the same amount of energy.","In a closed system a reversible reaction reaches equilibrium, where the forward and reverse reactions happen at the same rate.","At equilibrium the amounts (concentrations) of reactants and products stay constant, even though both reactions are still going on.","This is called a dynamic equilibrium, because the reactions have not stopped; they just balance out."],"misconceptions":[{"wrong":"At equilibrium the reactions have stopped.","right":"At equilibrium both reactions still happen, but at equal rates, so the amounts stay constant (dynamic equilibrium)."},{"wrong":"Equilibrium means there are equal amounts of reactants and products.","right":"It means the rates are equal, not the amounts; the amounts simply stay constant."}],"questions":[{"type":"mcq","q":"What is a reversible reaction?","options":[{"t":"One where the products can react to reform the reactants","correct":true},{"t":"One that can only go forwards","why":"Reversible reactions can go both ways."},{"t":"One that releases no energy","why":"Reversible reactions can still involve energy changes."}],"ok":"In a reversible reaction the products can reform the reactants."},{"type":"mcq","q":"A reversible reaction is exothermic in the forward direction. What is it in the reverse direction?","options":[{"t":"Endothermic, by the same amount of energy","correct":true},{"t":"Exothermic, by the same amount","why":"If forward is exothermic, reverse is endothermic."},{"t":"It releases no energy in reverse","why":"The reverse takes in the same energy the forward gave out."}],"ok":"If exothermic one way, it is endothermic the other, by the same amount."},{"type":"mcq","q":"What happens at dynamic equilibrium in a closed system?","options":[{"t":"The forward and reverse reactions happen at the same rate","correct":true},{"t":"Both reactions stop","why":"Both reactions continue; they just balance."},{"t":"Only the forward reaction happens","why":"Both directions happen at equilibrium."}],"ok":"At equilibrium the forward and reverse rates are equal."},{"type":"mcq","q":"At equilibrium, what happens to the amounts of reactants and products?","options":[{"t":"They stay constant","correct":true},{"t":"They keep increasing","why":"Amounts are constant at equilibrium."},{"t":"They fall to zero","why":"Both reactants and products remain present."}],"ok":"The concentrations stay constant because the rates are balanced."},{"type":"tf","q":"At equilibrium the reactions have completely stopped.","answer":false,"why":"Both reactions continue at equal rates (dynamic equilibrium), so the amounts stay constant."},{"type":"mcq","q":"Why is equilibrium described as 'dynamic'?","options":[{"t":"Both reactions are still happening, but at equal rates","correct":true},{"t":"The container is moving","why":"Dynamic refers to the ongoing reactions, not movement."},{"t":"The temperature keeps changing","why":"Dynamic refers to the balanced reactions continuing."}],"ok":"Dynamic means the reactions continue but balance out."}]},"GCR-EX":{"code":"GCR-EX","title":"Rates — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Rate and extent of chemical change.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Marble chips react faster with acid when ground into a powder. Why?","options":[{"t":"The powder has a larger surface area, so collisions are more frequent","correct":true},{"t":"The powder is more concentrated","why":"Surface area, not concentration, has changed."},{"t":"The powder is hotter","why":"Grinding does not heat the marble."}],"ok":"A powder exposes more surface, so there are more frequent collisions."},{"type":"mcq","q":"Which change would NOT increase the rate of a reaction between a solid and an acid?","options":[{"t":"Cooling the acid down","correct":true},{"t":"Increasing the acid concentration","why":"Higher concentration increases the rate."},{"t":"Using a catalyst","why":"A catalyst increases the rate."}],"ok":"Cooling slows particles down, decreasing the rate."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Using collision theory, explain why increasing the temperature and increasing the concentration both speed up a reaction.","scheme":["Reactions happen when particles collide with at least the activation energy (1)","Increasing temperature gives particles more energy / they move faster (1)","so they collide more often AND more collisions have the activation energy (1)","Increasing concentration means more particles in the same volume (1)","so there are more frequent collisions (1)","more successful collisions per second means a faster rate (1)"],"model":"Reactions need collisions with at least the activation energy. Higher temperature makes particles move faster, so they collide more often and a greater fraction of collisions has enough energy. Higher concentration puts more particles in the same volume, so collisions are more frequent. Both give more successful collisions each second, so the rate increases."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain what is meant by a dynamic equilibrium in a closed system.","scheme":["The reaction is reversible and takes place in a closed system (1)","The forward and reverse reactions both continue (1)","They happen at the same rate (1)","so the concentrations of reactants and products stay constant (1)"],"model":"In a closed system a reversible reaction reaches a point where the forward and reverse reactions both still occur but at equal rates, so the concentrations of reactants and products stay constant. This is a dynamic equilibrium."}]},"GCO1":{"code":"GCO1","title":"Crude oil & hydrocarbons","discipline":"chemistry","blurb":"Crude oil, alkanes, fractional distillation and the properties of fractions.","vocab":[{"term":"hydrocarbon","definition":"a compound made of hydrogen and carbon only","say":"hy-droh-car-bon"},{"term":"alkane","definition":"a saturated hydrocarbon with the general formula CnH2n+2","say":"al-kane"},{"term":"crude oil","definition":"a finite mixture of hydrocarbons formed from ancient sea creatures","say":"crood oyl"},{"term":"fractional distillation","definition":"separating crude oil into fractions by their boiling points","say":"frac-shun-al dis-til-ay-shun"}],"facts":["Crude oil is a finite resource and a mixture of hydrocarbons, most of which are alkanes.","Alkanes are saturated hydrocarbons with the general formula CnH2n+2; the first four are methane, ethane, propane and butane.","Fractional distillation separates crude oil into fractions: the column is hot at the bottom and cooler at the top, so each fraction condenses at its boiling point.","Shorter-chain hydrocarbons have lower boiling points, are more volatile (evaporate more easily), are more flammable, and are less viscous (runnier).","Complete combustion of a hydrocarbon in plenty of oxygen produces carbon dioxide and water, releasing energy."],"misconceptions":[{"wrong":"Crude oil is a single compound.","right":"Crude oil is a mixture of many different hydrocarbons."},{"wrong":"Longer hydrocarbons are more flammable.","right":"Shorter-chain hydrocarbons are more volatile and more flammable than longer ones."}],"questions":[{"type":"mcq","q":"What is a hydrocarbon?","options":[{"t":"A compound of hydrogen and carbon only","correct":true},{"t":"A compound containing oxygen","why":"Hydrocarbons contain only hydrogen and carbon."},{"t":"A type of metal","why":"Hydrocarbons are not metals."}],"ok":"Hydrocarbons contain only hydrogen and carbon."},{"type":"mcq","q":"What is the general formula of an alkane?","options":[{"t":"CnH2n+2","correct":true},{"t":"CnH2n","why":"That is the formula for an alkene."},{"t":"CnHn","why":"That is not a correct hydrocarbon formula."}],"ok":"Alkanes are saturated with the general formula CnH2n+2."},{"type":"mcq","q":"How does fractional distillation separate crude oil?","options":[{"t":"By the different boiling points of the fractions","correct":true},{"t":"By their colours","why":"Boiling point, not colour, is used."},{"t":"By a chemical reaction","why":"Fractional distillation is a physical separation."}],"ok":"Fractions condense at different heights because they have different boiling points."},{"type":"mcq","q":"What is true of a shorter-chain hydrocarbon compared with a longer one?","options":[{"t":"It has a lower boiling point and is more flammable","correct":true},{"t":"It is more viscous","why":"Shorter chains are less viscous (runnier)."},{"t":"It has a higher boiling point","why":"Shorter chains have lower boiling points."}],"ok":"Shorter chains are more volatile, more flammable and less viscous."},{"type":"mcq","q":"What are the products of complete combustion of a hydrocarbon?","options":[{"t":"Carbon dioxide and water","correct":true},{"t":"Carbon monoxide and water","why":"That is incomplete combustion."},{"t":"Hydrogen and oxygen","why":"Those are not combustion products."}],"ok":"Complete combustion gives carbon dioxide and water."},{"type":"tf","q":"Crude oil is a finite resource.","answer":true,"why":"Crude oil formed over millions of years and is being used up far faster than it forms."},{"type":"order","q":"Order these alkanes from the lowest boiling point to the highest.","items":["Methane","Ethane","Propane","Butane"],"ok":"Longer chains have higher boiling points, so butane boils highest."}]},"GCO2":{"code":"GCO2","title":"Cracking & alkenes","discipline":"chemistry","blurb":"Cracking long hydrocarbons into useful ones, and the reactive alkenes.","vocab":[{"term":"cracking","definition":"breaking large hydrocarbon molecules into smaller, more useful ones","say":"crack-ing"},{"term":"alkene","definition":"an unsaturated hydrocarbon with a carbon-carbon double bond, formula CnH2n","say":"al-keen"},{"term":"unsaturated","definition":"containing a carbon-carbon double bond","say":"un-sat-yur-ay-ted"}],"facts":["Cracking breaks large, less useful hydrocarbon molecules into smaller, more useful ones, using heat with a catalyst or steam.","Cracking produces smaller alkanes (useful as fuels) and alkenes.","Alkenes are unsaturated hydrocarbons with a carbon-carbon double bond and the general formula CnH2n.","Alkenes are more reactive than alkanes; they turn bromine water from orange to colourless, which is the test for an alkene.","Cracking is done because the demand for short-chain hydrocarbons (fuels) is greater than the supply, and alkenes are used to make polymers."],"misconceptions":[{"wrong":"Cracking joins small molecules into big ones.","right":"Cracking breaks big molecules into smaller ones; joining small molecules makes polymers."},{"wrong":"Alkanes turn bromine water colourless.","right":"Only alkenes (with a C=C double bond) decolourise bromine water; alkanes do not."}],"questions":[{"type":"mcq","q":"What does cracking do?","options":[{"t":"Breaks large hydrocarbons into smaller, more useful ones","correct":true},{"t":"Joins small molecules into a polymer","why":"That is polymerisation, not cracking."},{"t":"Burns hydrocarbons completely","why":"That is combustion."}],"ok":"Cracking breaks long-chain hydrocarbons into shorter, more useful molecules."},{"type":"mcq","q":"What are the products of cracking a long alkane?","options":[{"t":"Smaller alkanes and alkenes","correct":true},{"t":"Only carbon dioxide and water","why":"Those are combustion products."},{"t":"Only metals","why":"Cracking does not make metals."}],"ok":"Cracking gives smaller alkanes and alkenes."},{"type":"mcq","q":"What is the general formula of an alkene?","options":[{"t":"CnH2n","correct":true},{"t":"CnH2n+2","why":"That is the formula of an alkane."},{"t":"CnHn","why":"That is not a hydrocarbon formula."}],"ok":"Alkenes are unsaturated with the general formula CnH2n."},{"type":"mcq","q":"How can you test for an alkene?","options":[{"t":"Add bromine water — it turns from orange to colourless","correct":true},{"t":"Add bromine water — it stays orange","why":"Alkenes decolourise bromine water; staying orange would mean no alkene."},{"t":"Add limewater — it turns milky","why":"That is the test for carbon dioxide."}],"ok":"Alkenes decolourise bromine water, turning it from orange to colourless."},{"type":"mcq","q":"Why is cracking carried out?","options":[{"t":"Demand for short-chain fuels is greater than the supply","correct":true},{"t":"To make crude oil","why":"Crude oil is the raw material, not the product."},{"t":"To remove all alkenes","why":"Cracking actually produces useful alkenes."}],"ok":"Cracking turns surplus long chains into short-chain fuels and useful alkenes."},{"type":"tf","q":"Alkenes are unsaturated because they contain a carbon-carbon double bond.","answer":true,"why":"The C=C double bond makes alkenes unsaturated and more reactive than alkanes."}]},"GCO-EX":{"code":"GCO-EX","title":"Organic — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Organic chemistry.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A hydrocarbon decolourises bromine water. What does this show?","options":[{"t":"It is an alkene (it contains a C=C double bond)","correct":true},{"t":"It is an alkane","why":"Alkanes do not decolourise bromine water."},{"t":"It contains oxygen","why":"Hydrocarbons contain only carbon and hydrogen."}],"ok":"Decolourising bromine water shows a carbon-carbon double bond — an alkene."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how fractional distillation separates crude oil into useful fractions, and why different fractions condense at different heights in the column.","scheme":["Crude oil is heated until it evaporates (1)","The vapours rise up a column that is hot at the bottom and cooler at the top (1)","Each fraction condenses when it reaches a temperature equal to its boiling point (1)","Fractions with high boiling points (long chains) condense low down (1)","Fractions with low boiling points (short chains) condense near the top (1)","so the mixture is separated into fractions of similar chain length (1)"],"model":"Heated crude oil evaporates and rises up a column that is hot at the bottom and cool at the top. Each fraction condenses where the temperature matches its boiling point: long-chain fractions with high boiling points condense low down, while short-chain fractions with low boiling points reach the cooler top before condensing, so the oil is separated by chain length."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why crude oil is cracked, and name the two types of product formed.","scheme":["Demand for short-chain hydrocarbons (fuels) is greater than the supply (1)","Cracking turns long-chain hydrocarbons into shorter, more useful ones (1)","It produces smaller alkanes (used as fuels) (1)","and alkenes (used to make polymers) (1)"],"model":"There is more demand for short-chain hydrocarbon fuels than crude oil supplies directly, so long chains are cracked into shorter, more useful molecules. This produces smaller alkanes, used as fuels, and alkenes, used to make polymers."}]},"GCN1":{"code":"GCN1","title":"Purity, formulations & chromatography","discipline":"chemistry","blurb":"Pure substances and formulations, and using chromatography to separate mixtures.","vocab":[{"term":"pure substance","definition":"a single element or compound, not mixed with anything else","say":"pyoor sub-stance"},{"term":"formulation","definition":"a mixture made to an exact recipe for a useful purpose","say":"for-mew-lay-shun"},{"term":"chromatography","definition":"a method that separates a mixture as a solvent moves through paper","say":"crow-ma-tog-ra-fee"},{"term":"Rf value","definition":"the distance a substance moves divided by the distance the solvent moves","say":"arr-eff value"}],"facts":["In chemistry a pure substance is a single element or compound; it melts and boils at a sharp, specific temperature.","Impurities lower the melting point and raise the boiling point, and the substance melts or boils over a range of temperatures.","A formulation is a mixture made to an exact recipe so that each component does a particular job, for example paints, medicines and fuels.","Paper chromatography has a stationary phase (the paper) and a mobile phase (the solvent), and separates substances by how strongly they are attracted to each.","The Rf value = distance moved by the substance / distance moved by the solvent, and is always between 0 and 1."],"misconceptions":[{"wrong":"In everyday language and chemistry, 'pure' means the same thing.","right":"In chemistry 'pure' means a single element or compound; in everyday use it can just mean natural or clean."},{"wrong":"An impure substance melts at one exact temperature.","right":"Impurities make a substance melt over a range of temperatures, and at a lower temperature."}],"questions":[{"type":"mcq","q":"What is a pure substance in chemistry?","options":[{"t":"A single element or compound","correct":true},{"t":"Anything natural","why":"Chemical purity means a single substance, not just natural."},{"t":"A mixture made to a recipe","why":"That is a formulation."}],"ok":"A pure substance is a single element or compound."},{"type":"mcq","q":"How does a pure substance melt?","options":[{"t":"At a sharp, specific temperature","correct":true},{"t":"Over a wide range of temperatures","why":"That is what an impure substance does."},{"t":"It never melts","why":"Pure substances melt at a definite temperature."}],"ok":"A pure substance melts at one sharp temperature."},{"type":"mcq","q":"What is a formulation?","options":[{"t":"A mixture made to an exact recipe for a purpose","correct":true},{"t":"A single pure compound","why":"A formulation is a mixture, not a pure substance."},{"t":"An element","why":"An element is not a formulation."}],"ok":"Formulations are useful mixtures made to a precise recipe, like paint or medicine."},{"type":"mcq","q":"In paper chromatography, what is the stationary phase?","options":[{"t":"The paper","correct":true},{"t":"The solvent","why":"The solvent is the mobile phase."},{"t":"The beaker","why":"The stationary phase is the paper."}],"ok":"The paper is the stationary phase; the solvent is the mobile phase."},{"type":"numeric","kicker":"Work it out","q":"In chromatography, a dye moves 4 cm while the solvent moves 8 cm. What is the Rf value?","hint":"Rf = distance moved by substance / distance moved by solvent","answer":0.5,"unit":"","ok":"4 / 8 = 0.5."},{"type":"tf","q":"Impurities lower the melting point of a substance.","answer":true,"why":"Impurities lower the melting point and make it melt over a range of temperatures."},{"type":"mcq","q":"Why might a single dye produce one spot in chromatography but a mixture produce several?","options":[{"t":"Each substance travels a different distance with the solvent","correct":true},{"t":"The paper changes colour by itself","why":"The spots come from the substances, not the paper."},{"t":"Pure substances cannot be tested","why":"Pure substances can be tested and give one spot."}],"ok":"Different substances are attracted differently, so they travel different distances."}]},"GCN2":{"code":"GCN2","title":"Tests for gases","discipline":"chemistry","blurb":"The standard chemical tests for hydrogen, oxygen, carbon dioxide and chlorine.","vocab":[{"term":"limewater","definition":"a solution used to test for carbon dioxide; it turns milky","say":"lime-wa-ter"},{"term":"splint","definition":"a thin piece of wood used to test for hydrogen or oxygen","say":"splint"}],"facts":["Hydrogen is tested with a lighted splint: it burns with a squeaky pop.","Oxygen is tested with a glowing splint: the splint relights.","Carbon dioxide is tested with limewater: it turns milky (cloudy).","Chlorine is tested with damp litmus paper: it is bleached white.","These simple tests let you identify common gases produced in reactions."],"misconceptions":[{"wrong":"A glowing splint tests for hydrogen.","right":"A lighted splint and squeaky pop tests for hydrogen; a glowing splint relighting tests for oxygen."},{"wrong":"Chlorine turns limewater milky.","right":"Carbon dioxide turns limewater milky; chlorine bleaches damp litmus paper."}],"questions":[{"type":"mcq","q":"What is the test for hydrogen gas?","options":[{"t":"A lighted splint gives a squeaky pop","correct":true},{"t":"A glowing splint relights","why":"That is the test for oxygen."},{"t":"Limewater turns milky","why":"That is the test for carbon dioxide."}],"ok":"Hydrogen burns with a squeaky pop when a lighted splint is used."},{"type":"mcq","q":"What is the test for oxygen gas?","options":[{"t":"A glowing splint relights","correct":true},{"t":"A lighted splint gives a squeaky pop","why":"That is the test for hydrogen."},{"t":"Damp litmus is bleached","why":"That is the test for chlorine."}],"ok":"Oxygen relights a glowing splint."},{"type":"mcq","q":"What is the test for carbon dioxide?","options":[{"t":"Limewater turns milky (cloudy)","correct":true},{"t":"A squeaky pop with a lighted splint","why":"That is the test for hydrogen."},{"t":"A glowing splint relights","why":"That is the test for oxygen."}],"ok":"Carbon dioxide turns limewater milky."},{"type":"mcq","q":"What is the test for chlorine gas?","options":[{"t":"Damp litmus paper is bleached white","correct":true},{"t":"Limewater turns milky","why":"That tests for carbon dioxide."},{"t":"A squeaky pop","why":"That tests for hydrogen."}],"ok":"Chlorine bleaches damp litmus paper white."},{"type":"categorise","q":"Match each gas to its test result.","bins":["Squeaky pop","Relights a glowing splint","Limewater milky","Bleaches damp litmus"],"items":[{"t":"Hydrogen","bin":"Squeaky pop"},{"t":"Oxygen","bin":"Relights a glowing splint"},{"t":"Carbon dioxide","bin":"Limewater milky"},{"t":"Chlorine","bin":"Bleaches damp litmus"}],"ok":"Each gas has a distinctive simple test.","bad":"Hydrogen: pop. Oxygen: relights. CO2: milky limewater. Chlorine: bleaches litmus."},{"type":"tf","q":"Carbon dioxide relights a glowing splint.","answer":false,"why":"Carbon dioxide puts out a flame; it is oxygen that relights a glowing splint."}]},"GCN-EX":{"code":"GCN-EX","title":"Analysis — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemical analysis.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"In a chromatogram, a pigment travels 3 cm and the solvent travels 12 cm. Calculate the Rf value.","hint":"Rf = distance by substance / distance by solvent","answer":0.25,"unit":"","ok":"3 / 12 = 0.25."},{"type":"mcq","q":"A gas puts out a lighted splint and turns limewater milky. What is the gas?","options":[{"t":"Carbon dioxide","correct":true},{"t":"Oxygen","why":"Oxygen relights a splint and does not turn limewater milky."},{"t":"Hydrogen","why":"Hydrogen gives a squeaky pop."}],"ok":"Turning limewater milky identifies carbon dioxide."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain how the melting point of a substance can be used to tell whether it is pure.","scheme":["A pure substance melts at a single, sharp temperature (1)","An impure substance melts over a range of temperatures (1)","and at a lower temperature than the pure substance (1)","so a sharp melting point at the expected value shows the substance is pure (1)"],"model":"A pure substance melts at one sharp temperature, while an impure substance melts over a range and at a lower temperature. So if the sample melts sharply at the expected value, it is pure; if it melts over a range, it contains impurities."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe how you would carry out paper chromatography to separate the dyes in a sample of ink.","scheme":["Draw a pencil baseline near the bottom of the chromatography paper (1)","Put a spot of ink on the baseline (1)","Stand the paper in solvent so the solvent is below the baseline (1)","Let the solvent rise and carry the dyes up; the dyes separate into spots (1)"],"model":"Draw a pencil baseline near the bottom of the paper and add a spot of ink on it. Stand the paper in solvent (kept below the baseline). As the solvent rises it carries the dyes different distances, separating them into individual spots."}]},"GCT1":{"code":"GCT1","title":"Earth's atmosphere & its evolution","discipline":"chemistry","blurb":"The gases in today's air and how the atmosphere changed over billions of years.","vocab":[{"term":"atmosphere","definition":"the layer of gases surrounding the Earth","say":"at-mo-sfeer"}],"facts":["Today's atmosphere is about four-fifths (80%) nitrogen and about one-fifth (20%) oxygen, with small amounts of carbon dioxide, water vapour and noble gases.","The Earth's early atmosphere had a lot of carbon dioxide and little or no oxygen, released by intense volcanic activity along with water vapour.","As the Earth cooled, the water vapour condensed to form the oceans.","Carbon dioxide levels fell because it dissolved in the oceans and was absorbed by plants and algae for photosynthesis, and became locked in sedimentary rocks and fossil fuels.","Oxygen levels rose over time because algae and then plants produced oxygen by photosynthesis."],"misconceptions":[{"wrong":"The air is mostly oxygen.","right":"The air is about 80% nitrogen and only about 20% oxygen."},{"wrong":"The early atmosphere was like today's.","right":"The early atmosphere had lots of carbon dioxide and little oxygen, very different from today's."}],"questions":[{"type":"mcq","q":"Roughly what proportion of today's atmosphere is nitrogen?","options":[{"t":"About 80% (four-fifths)","correct":true},{"t":"About 20%","why":"That is the proportion of oxygen."},{"t":"About 50%","why":"Nitrogen is about 80%."}],"ok":"The air is about 80% nitrogen and 20% oxygen."},{"type":"mcq","q":"What was the Earth's early atmosphere like?","options":[{"t":"Lots of carbon dioxide and little or no oxygen","correct":true},{"t":"Mostly oxygen","why":"Oxygen built up much later, from photosynthesis."},{"t":"The same as today","why":"The early atmosphere was very different."}],"ok":"The early atmosphere had lots of carbon dioxide and little oxygen."},{"type":"mcq","q":"Why did oxygen levels in the atmosphere increase?","options":[{"t":"Algae and plants produced it by photosynthesis","correct":true},{"t":"Volcanoes released oxygen","why":"Volcanoes released carbon dioxide and water vapour, not oxygen."},{"t":"Oceans gave out oxygen","why":"Oxygen came mainly from photosynthesis."}],"ok":"Photosynthesis by algae and plants released oxygen."},{"type":"mcq","q":"Give one reason the carbon dioxide level fell over time.","options":[{"t":"It dissolved in the oceans and was used by plants for photosynthesis","correct":true},{"t":"It was destroyed by sunlight","why":"CO2 was removed by oceans, plants and rocks, not destroyed by light."},{"t":"Volcanoes absorbed it","why":"Volcanoes released CO2, not absorbed it."}],"ok":"CO2 dissolved in oceans, was used by plants, and became locked in rocks and fossil fuels."},{"type":"multi","q":"Tap the gases found in today's atmosphere.","items":[{"t":"Nitrogen","correct":true},{"t":"Oxygen","correct":true},{"t":"Carbon dioxide (small amount)","correct":true},{"t":"Hydrogen as the main gas"}],"ok":"Today's air is mostly nitrogen and oxygen, with a little carbon dioxide and noble gases.","bad":"Hydrogen is not a main gas in today's atmosphere."},{"type":"tf","q":"The oceans formed when water vapour in the early atmosphere condensed as the Earth cooled.","answer":true,"why":"As the Earth cooled, the water vapour condensed to form the oceans."}]},"GCT2":{"code":"GCT2","title":"Greenhouse gases & pollutants","discipline":"chemistry","blurb":"The greenhouse effect, climate change, the carbon footprint and combustion pollutants.","vocab":[{"term":"greenhouse gas","definition":"a gas such as carbon dioxide or methane that traps heat in the atmosphere","say":"green-house gas"},{"term":"global warming","definition":"the rise in the Earth's average temperature caused by more greenhouse gases","say":"glow-bal warm-ing"},{"term":"carbon footprint","definition":"the total greenhouse gases given out over the life of a product or activity","say":"car-bon foot-print"}],"facts":["Greenhouse gases such as carbon dioxide, methane and water vapour absorb the infrared radiation re-emitted by the Earth, keeping the planet warm enough for life.","Human activities such as burning fossil fuels, deforestation and farming increase greenhouse gases, leading to global warming and climate change.","The carbon footprint is the total amount of greenhouse gases given out over the full life of a product, service or activity; it can be reduced by using less fossil fuel.","Burning fuels can release pollutants: carbon monoxide (a toxic gas from incomplete combustion) and soot (particulates).","Sulfur dioxide and oxides of nitrogen cause acid rain, and oxides of nitrogen and particulates can cause breathing problems."],"misconceptions":[{"wrong":"The greenhouse effect is entirely bad.","right":"The natural greenhouse effect keeps Earth warm enough for life; the problem is the extra warming from increased greenhouse gases."},{"wrong":"Carbon monoxide is harmless.","right":"Carbon monoxide is a toxic gas; it stops the blood carrying oxygen properly."}],"questions":[{"type":"mcq","q":"How do greenhouse gases keep the Earth warm?","options":[{"t":"They absorb infrared radiation re-emitted by the Earth","correct":true},{"t":"They block sunlight from reaching the Earth","why":"They trap heat leaving the Earth, not incoming light."},{"t":"They produce their own heat","why":"They trap heat; they do not generate it."}],"ok":"Greenhouse gases absorb infrared radiated from the Earth's surface."},{"type":"mcq","q":"Which human activity increases atmospheric carbon dioxide the most?","options":[{"t":"Burning fossil fuels","correct":true},{"t":"Photosynthesis by plants","why":"Photosynthesis removes carbon dioxide."},{"t":"Letting forests grow","why":"Growing forests absorb carbon dioxide."}],"ok":"Burning fossil fuels releases large amounts of carbon dioxide."},{"type":"mcq","q":"Why is carbon monoxide dangerous?","options":[{"t":"It is toxic and stops the blood carrying oxygen properly","correct":true},{"t":"It causes acid rain","why":"Sulfur dioxide and nitrogen oxides cause acid rain."},{"t":"It is harmless","why":"Carbon monoxide is a toxic gas."}],"ok":"Carbon monoxide is toxic; it reduces the blood's ability to carry oxygen."},{"type":"mcq","q":"Which pollutant gas causes acid rain?","options":[{"t":"Sulfur dioxide","correct":true},{"t":"Carbon monoxide","why":"Carbon monoxide is toxic but does not cause acid rain."},{"t":"Oxygen","why":"Oxygen is not a pollutant."}],"ok":"Sulfur dioxide (and oxides of nitrogen) dissolve to make acid rain."},{"type":"categorise","q":"Match each pollutant to the main problem it causes.","bins":["Toxic to humans","Acid rain","Breathing problems"],"items":[{"t":"Carbon monoxide","bin":"Toxic to humans"},{"t":"Sulfur dioxide","bin":"Acid rain"},{"t":"Particulates (soot)","bin":"Breathing problems"}],"ok":"Different combustion pollutants cause different problems.","bad":"Carbon monoxide is toxic, sulfur dioxide causes acid rain, particulates harm breathing."},{"type":"tf","q":"Increasing greenhouse gases is linked to global warming and climate change.","answer":true,"why":"More greenhouse gases trap more heat, raising the Earth's average temperature."},{"type":"mcq","q":"What is a carbon footprint?","options":[{"t":"The total greenhouse gases given out over the life of a product or activity","correct":true},{"t":"The amount of carbon in a person's body","why":"It measures greenhouse gas emissions, not body carbon."},{"t":"The size of a coal mine","why":"It is a measure of emissions, not mine size."}],"ok":"A carbon footprint is the total greenhouse gas emissions over something's whole life."}]},"GCT-EX":{"code":"GCT-EX","title":"Atmosphere — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemistry of the atmosphere.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Which two gases make up almost all of today's atmosphere?","options":[{"t":"Nitrogen and oxygen","correct":true},{"t":"Carbon dioxide and water vapour","why":"These are only small amounts today."},{"t":"Hydrogen and helium","why":"These are not the main atmospheric gases."}],"ok":"Today's air is about 80% nitrogen and 20% oxygen."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how and why the levels of oxygen and carbon dioxide in the Earth's atmosphere have changed since the Earth was first formed.","scheme":["The early atmosphere had a lot of carbon dioxide and little/no oxygen (1)","released by volcanoes, along with water vapour (1)","Algae and then plants carried out photosynthesis (1)","which released oxygen, so oxygen levels rose (1)","Carbon dioxide was absorbed by plants and dissolved in the oceans (1)","and became locked in sedimentary rocks and fossil fuels, so its level fell (1)"],"model":"The early atmosphere, from volcanic activity, was rich in carbon dioxide with little oxygen. As algae and plants evolved, photosynthesis released oxygen, so oxygen levels rose. Meanwhile carbon
