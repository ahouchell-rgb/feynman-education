 dioxide was taken up by plants, dissolved in the oceans, and locked into sedimentary rocks and fossil fuels, so its level fell to today's small amount."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Burning fuels in vehicles releases several pollutant gases. Name two pollutants and describe a problem each one causes.","scheme":["Carbon monoxide (1) is toxic / reduces oxygen carried by the blood (1)","Sulfur dioxide (1) causes acid rain (1)","(or oxides of nitrogen cause acid rain/breathing problems; particulates cause breathing problems)"],"model":"Carbon monoxide is toxic and reduces the oxygen the blood can carry. Sulfur dioxide dissolves in rain to cause acid rain, which damages buildings and plants. (Oxides of nitrogen and particulates also cause acid rain and breathing problems.)"}]},"GCU1":{"code":"GCU1","title":"Resources & potable water","discipline":"chemistry","blurb":"Finite and renewable resources, making water safe to drink, and treating waste water.","vocab":[{"term":"finite resource","definition":"a resource that will run out because it is not replaced quickly","say":"fy-nite ree-sorss"},{"term":"potable water","definition":"water that is safe to drink","say":"poh-ta-bul wa-ter"},{"term":"desalination","definition":"removing salt from sea water to make it drinkable","say":"dee-sal-in-ay-shun"}],"facts":["Natural resources can be finite (like fossil fuels and metal ores) or renewable; chemistry helps by improving processes and finding sustainable alternatives.","Potable water is water that is safe to drink; it is not pure, because it still contains dissolved substances.","In the UK, fresh water is made potable by filtering to remove solids and then sterilising with chlorine, ozone or ultraviolet light to kill microbes.","Where fresh water is scarce, salty water can be made drinkable by desalination, using distillation or reverse osmosis, both of which need a lot of energy.","Waste water is treated by screening to remove large solids, settling out sludge (sedimentation), and breaking down organic matter with aerobic bacteria."],"misconceptions":[{"wrong":"Potable water is pure water.","right":"Potable water is safe to drink but still contains dissolved substances, so it is not chemically pure."},{"wrong":"Desalination is cheap and easy.","right":"Desalination needs a lot of energy, so it is expensive and usually a last resort."}],"questions":[{"type":"mcq","q":"What is potable water?","options":[{"t":"Water that is safe to drink","correct":true},{"t":"Chemically pure water","why":"Potable water still contains dissolved substances."},{"t":"Sea water","why":"Sea water is not safe to drink without treatment."}],"ok":"Potable water is safe to drink, though not chemically pure."},{"type":"mcq","q":"How is fresh water usually made potable in the UK?","options":[{"t":"Filtering to remove solids, then sterilising to kill microbes","correct":true},{"t":"Just adding salt","why":"Salt is removed, not added, and does not sterilise."},{"t":"Freezing it solid","why":"Freezing is not the standard treatment."}],"ok":"Fresh water is filtered then sterilised with chlorine, ozone or UV."},{"type":"mcq","q":"What is desalination?","options":[{"t":"Removing salt from sea water to make it drinkable","correct":true},{"t":"Adding salt to water","why":"Desalination removes salt, not adds it."},{"t":"Filtering out solids","why":"Filtering removes solids, not dissolved salt."}],"ok":"Desalination removes dissolved salt from sea water."},{"type":"mcq","q":"Why is desalination usually a last resort?","options":[{"t":"It needs a lot of energy, so it is expensive","correct":true},{"t":"It makes water poisonous","why":"Desalination makes water safe, not poisonous."},{"t":"It is illegal","why":"It is legal but energy-intensive."}],"ok":"Desalination uses a lot of energy, making it costly."},{"type":"tf","q":"Potable water is the same as pure water.","answer":false,"why":"Potable water is safe to drink but still contains dissolved substances, so it is not pure."},{"type":"mcq","q":"Which step of water treatment kills microbes?","options":[{"t":"Sterilising with chlorine, ozone or UV light","correct":true},{"t":"Filtering","why":"Filtering removes solids, not microbes."},{"t":"Sedimentation","why":"Settling removes solids, not microbes."}],"ok":"Sterilising with chlorine, ozone or UV kills microbes in the water."}]},"GCU2":{"code":"GCU2","title":"Life cycle assessment & recycling","discipline":"chemistry","blurb":"Assessing environmental impact and conserving resources by reducing, reusing and recycling.","vocab":[{"term":"life cycle assessment","definition":"an assessment of the environmental impact of a product over its whole life","say":"life cycle ass-ess-ment"},{"term":"recycling","definition":"processing used materials so they can be used again","say":"ree-sy-cling"}],"facts":["A life cycle assessment (LCA) looks at the environmental impact of a product at every stage: getting the raw materials, manufacturing, using the product, and disposing of it.","Reducing, reusing and recycling materials conserves limited resources, saves energy, reduces waste and cuts environmental damage.","Recycling metals usually uses much less energy than extracting new metal from its ore.","Some parts of an LCA, such as the effect of pollutants, are hard to measure and can be judged differently by different people.","This means an LCA can be biased, for example if a company uses it to make its product look better."],"misconceptions":[{"wrong":"A life cycle assessment only looks at how a product is made.","right":"An LCA covers the whole life: raw materials, manufacture, use AND disposal."},{"wrong":"Recycling a metal uses more energy than extracting it.","right":"Recycling a metal usually uses far less energy than extracting it from its ore."}],"questions":[{"type":"mcq","q":"What does a life cycle assessment consider?","options":[{"t":"The environmental impact across a product's whole life","correct":true},{"t":"Only how much the product costs to buy","why":"An LCA is about environmental impact, not just cost."},{"t":"Only the manufacturing stage","why":"An LCA covers all stages, not just manufacture."}],"ok":"An LCA covers raw materials, manufacture, use and disposal."},{"type":"mcq","q":"Why does recycling a metal save energy?","options":[{"t":"It uses much less energy than extracting new metal from its ore","correct":true},{"t":"It creates new ore","why":"Recycling reuses metal; it does not make ore."},{"t":"It uses no energy at all","why":"Recycling uses energy, but far less than extraction."}],"ok":"Recycling avoids the energy-heavy step of extracting metal from ore."},{"type":"order","q":"Put the stages of a life cycle assessment in order.","items":["Getting the raw materials","Manufacturing the product","Using the product","Disposing of the product"],"ok":"An LCA follows a product from raw materials, through manufacture and use, to disposal."},{"type":"mcq","q":"Why can a life cycle assessment be biased?","options":[{"t":"Some impacts are hard to measure and can be judged differently","correct":true},{"t":"It always gives an exact, certain answer","why":"Some parts are subjective, so it is not always exact."},{"t":"It ignores the environment","why":"An LCA is all about environmental impact."}],"ok":"Some impacts are hard to quantify, so an LCA can be made to favour a product."},{"type":"multi","q":"Tap the benefits of reducing, reusing and recycling materials.","items":[{"t":"Conserves limited resources","correct":true},{"t":"Saves energy","correct":true},{"t":"Reduces waste","correct":true},{"t":"Uses up resources faster"}],"ok":"Reduce, reuse and recycle conserve resources, save energy and cut waste.","bad":"These actions conserve resources rather than using them up faster."},{"type":"tf","q":"Recycling a metal usually uses less energy than extracting it from its ore.","answer":true,"why":"Recycling skips the energy-intensive extraction step, so it saves energy."}]},"GCU-EX":{"code":"GCU-EX","title":"Using resources — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Using resources.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Why is potable water not classed as a pure substance in chemistry?","options":[{"t":"It contains dissolved substances","correct":true},{"t":"It contains no water","why":"Potable water is mostly water."},{"t":"It is frozen","why":"Potability has nothing to do with being frozen."}],"ok":"Potable water is safe to drink but still contains dissolved substances, so it is not pure."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe how fresh water is treated to make it safe to drink (potable), and explain why sea water is more difficult and expensive to treat.","scheme":["Fresh water is passed through filters to remove insoluble solids (1)","It is then sterilised to kill microbes (1)","using chlorine, ozone or ultraviolet light (1)","Sea water contains dissolved salt that must be removed by desalination (1)","e.g. distillation or reverse osmosis (1)","these need a lot of energy, so treating sea water is more expensive (1)"],"model":"Fresh water is filtered to remove solids, then sterilised with chlorine, ozone or UV light to kill microbes. Sea water also contains dissolved salt, which must be removed by desalination (distillation or reverse osmosis). These processes require a great deal of energy, making sea water much more expensive to treat."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why recycling aluminium is better for the environment than extracting new aluminium from its ore.","scheme":["Extracting aluminium from its ore uses electrolysis, which needs a lot of electrical energy (1)","Recycling uses much less energy (1)","It conserves the finite ore / raw materials (1)","and reduces waste sent to landfill (1)"],"model":"Extracting aluminium requires electrolysis, which uses a great deal of electrical energy. Recycling melts down used aluminium, using far less energy, conserves the finite ore, and reduces waste — so it has a much smaller environmental impact."}]}});

Object.assign(CONTENT, {"GBC1":{"code":"GBC1","title":"Cell structure","discipline":"biology","blurb":"Eukaryotic and prokaryotic cells, and the parts of animal, plant and bacterial cells.","vocab":[{"term":"eukaryotic cell","definition":"a cell with a nucleus, like animal and plant cells","say":"yoo-kair-ee-ot-ic"},{"term":"prokaryotic cell","definition":"a cell with no nucleus, like a bacterium","say":"pro-kair-ee-ot-ic"},{"term":"nucleus","definition":"the part of a cell that controls it and holds the DNA","say":"new-clee-us"},{"term":"mitochondria","definition":"the parts of a cell where aerobic respiration happens","say":"my-toh-con-dree-a"},{"term":"chloroplast","definition":"the green part of a plant cell where photosynthesis happens","say":"klor-oh-plast"}],"facts":["Eukaryotic cells (animal and plant cells) have a nucleus; prokaryotic cells (bacteria) do not, and their genetic material is a single DNA loop, sometimes with extra rings called plasmids.","Animal cells contain a nucleus, cytoplasm, a cell membrane, mitochondria and ribosomes.","Plant cells have all of those plus a cell wall (made of cellulose), a permanent vacuole and often chloroplasts.","The nucleus controls the cell and holds the DNA; mitochondria are where aerobic respiration releases energy; ribosomes are where proteins are made.","Chloroplasts contain chlorophyll and are where photosynthesis happens; bacterial cells are much smaller than plant and animal cells."],"misconceptions":[{"wrong":"All cells have a nucleus.","right":"Eukaryotic cells have a nucleus, but prokaryotic cells (bacteria) do not."},{"wrong":"Animal cells have a cell wall.","right":"Only plant (and bacterial) cells have a cell wall; animal cells do not."}],"questions":[{"type":"mcq","q":"What is the main difference between a eukaryotic and a prokaryotic cell?","options":[{"t":"Eukaryotic cells have a nucleus; prokaryotic cells do not","correct":true},{"t":"Prokaryotic cells are bigger","why":"Prokaryotic (bacterial) cells are much smaller."},{"t":"Only eukaryotic cells have DNA","why":"Both have DNA, but prokaryotes have no nucleus."}],"ok":"Eukaryotic cells have a nucleus; prokaryotic cells (bacteria) do not."},{"type":"multi","q":"Tap the parts found in a plant cell but NOT an animal cell.","items":[{"t":"Cell wall","correct":true},{"t":"Permanent vacuole","correct":true},{"t":"Chloroplasts","correct":true},{"t":"Cytoplasm"}],"ok":"Plant cells have a cell wall, vacuole and chloroplasts; cytoplasm is in both.","bad":"Cytoplasm is in both animal and plant cells."},{"type":"mcq","q":"What does the nucleus do?","options":[{"t":"Controls the cell and holds the DNA","correct":true},{"t":"Releases energy by respiration","why":"That is the mitochondria."},{"t":"Makes food by photosynthesis","why":"That is the chloroplast."}],"ok":"The nucleus controls the cell and contains the DNA."},{"type":"mcq","q":"Where does aerobic respiration happen in a cell?","options":[{"t":"In the mitochondria","correct":true},{"t":"In the nucleus","why":"The nucleus controls the cell; respiration is in mitochondria."},{"t":"In the cell wall","why":"The cell wall supports the cell; it does not respire."}],"ok":"Mitochondria are the site of aerobic respiration."},{"type":"mcq","q":"What is the genetic material of a bacterium like?","options":[{"t":"A single loop of DNA, sometimes with plasmids","correct":true},{"t":"DNA inside a nucleus","why":"Bacteria have no nucleus."},{"t":"Chloroplasts","why":"Bacteria do not have chloroplasts."}],"ok":"Bacteria have a single DNA loop and sometimes plasmids, with no nucleus."},{"type":"categorise","q":"Sort each cell part by where it is found.","bins":["Plant cells only","Both animal and plant cells"],"items":[{"t":"Chloroplast","bin":"Plant cells only"},{"t":"Cell wall","bin":"Plant cells only"},{"t":"Mitochondria","bin":"Both animal and plant cells"},{"t":"Cell membrane","bin":"Both animal and plant cells"},{"t":"Nucleus","bin":"Both animal and plant cells"}],"ok":"Chloroplasts and cell walls are plant-only; membranes, nuclei and mitochondria are in both.","bad":"Animal cells lack a cell wall and chloroplasts."},{"type":"tf","q":"Bacterial cells contain a nucleus.","answer":false,"why":"Bacteria are prokaryotic, so they have no nucleus; their DNA is a single loop."}]},"GBC2":{"code":"GBC2","title":"Microscopy & specialised cells","discipline":"biology","blurb":"Magnification, light and electron microscopes, differentiation and stem cells.","vocab":[{"term":"magnification","definition":"how many times bigger an image is than the real object","say":"mag-ni-fi-cay-shun"},{"term":"differentiation","definition":"when a cell becomes specialised for a particular job","say":"diff-er-en-she-ay-shun"},{"term":"stem cell","definition":"an unspecialised cell that can divide to form other types of cell","say":"stem cell"}],"facts":["Magnification = size of image / size of real object. The total magnification of a microscope = eyepiece lens magnification x objective lens magnification.","Light microscopes are cheaper and can view living cells, but electron microscopes have a much higher magnification and resolution, revealing tiny structures.","Differentiation is the process by which a cell becomes specialised to do a particular job, for example a nerve cell or a root hair cell.","Specialised cells have features suited to their function, such as a sperm cell's tail or a root hair cell's large surface area.","Stem cells are unspecialised cells that can divide and differentiate; they are found in early embryos, in adult bone marrow, and in plant meristems."],"misconceptions":[{"wrong":"Electron microscopes can view living cells.","right":"Electron microscopes cannot view living cells, but they give much higher magnification and resolution than light microscopes."},{"wrong":"A specialised cell can become any other type of cell.","right":"Once differentiated, most animal cells cannot change; stem cells are the unspecialised cells that can become different types."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A cell image is 40 mm wide and the real cell is 0.1 mm wide. What is the magnification?","hint":"magnification = size of image / size of real object","answer":400,"unit":"","ok":"40 / 0.1 = 400 times."},{"type":"numeric","kicker":"Work it out","q":"A microscope has an eyepiece of 10x and an objective of 40x. What is the total magnification?","hint":"total magnification = eyepiece x objective","answer":400,"unit":"","ok":"10 x 40 = 400 times."},{"type":"mcq","q":"What is an advantage of an electron microscope over a light microscope?","options":[{"t":"Much higher magnification and resolution","correct":true},{"t":"It can view living cells","why":"Electron microscopes cannot view living cells."},{"t":"It is cheaper","why":"Electron microscopes are far more expensive."}],"ok":"Electron microscopes give much higher magnification and resolution."},{"type":"mcq","q":"What is differentiation?","options":[{"t":"When a cell becomes specialised for a particular job","correct":true},{"t":"When a cell divides into two","why":"That is cell division, not differentiation."},{"t":"When a cell dies","why":"Differentiation is becoming specialised, not dying."}],"ok":"Differentiation is a cell becoming specialised for its function."},{"type":"mcq","q":"What is a stem cell?","options":[{"t":"An unspecialised cell that can divide and become different types of cell","correct":true},{"t":"A fully specialised nerve cell","why":"A stem cell is unspecialised."},{"t":"A dead cell","why":"Stem cells are living, dividing cells."}],"ok":"Stem cells are unspecialised and can differentiate into other cell types."},{"type":"tf","q":"A root hair cell's large surface area helps it absorb water and minerals.","answer":true,"why":"Root hair cells are specialised with a large surface area to absorb water and minerals efficiently."},{"type":"mcq","q":"Where are stem cells found in a plant?","options":[{"t":"In the meristems","correct":true},{"t":"In the chloroplasts","why":"Chloroplasts carry out photosynthesis, not cell division."},{"t":"In the xylem vessels","why":"Xylem is dead tissue for transport, not stem cells."}],"ok":"Plant stem cells are found in the meristems, where growth happens."}]},"GBC3":{"code":"GBC3","title":"Cell division & transport","discipline":"biology","blurb":"Mitosis and the cell cycle, plus diffusion, osmosis and active transport.","vocab":[{"term":"mitosis","definition":"cell division that makes two identical cells for growth and repair","say":"my-toh-sis"},{"term":"diffusion","definition":"the spreading of particles from a high to a low concentration","say":"diff-yoo-shun"},{"term":"osmosis","definition":"the diffusion of water across a partially permeable membrane","say":"oz-moh-sis"},{"term":"active transport","definition":"moving substances against a concentration gradient, using energy","say":"ac-tiv transport"}],"facts":["In the cell cycle, the cell grows and copies its DNA, then divides by mitosis to make two genetically identical cells, used for growth and repair.","Diffusion is the net movement of particles from an area of higher concentration to an area of lower concentration, down a concentration gradient.","Osmosis is the diffusion of water across a partially permeable membrane, from a dilute solution to a more concentrated one.","Active transport moves substances from a lower to a higher concentration (against the gradient), which needs energy from respiration.","A larger surface area, a shorter distance, and a bigger concentration difference all increase the rate of diffusion."],"misconceptions":[{"wrong":"Osmosis is the movement of any particle across a membrane.","right":"Osmosis is specifically the movement of WATER across a partially permeable membrane."},{"wrong":"Active transport needs no energy.","right":"Active transport moves substances against the gradient, so it needs energy from respiration."}],"questions":[{"type":"mcq","q":"What does mitosis produce?","options":[{"t":"Two genetically identical cells","correct":true},{"t":"Four different cells","why":"That describes meiosis, not mitosis."},{"t":"Cells with half the DNA","why":"Mitosis keeps the full set of DNA; meiosis halves it."}],"ok":"Mitosis makes two identical cells for growth and repair."},{"type":"mcq","q":"What is diffusion?","options":[{"t":"Movement of particles from high to low concentration","correct":true},{"t":"Movement of water only","why":"That is osmosis specifically."},{"t":"Movement using energy against the gradient","why":"That is active transport."}],"ok":"Diffusion is net movement down a concentration gradient."},{"type":"mcq","q":"What is osmosis?","options":[{"t":"The diffusion of water across a partially permeable membrane","correct":true},{"t":"The diffusion of any particle","why":"Osmosis is specifically about water."},{"t":"Active movement of salt","why":"Osmosis is the passive movement of water."}],"ok":"Osmosis is the movement of water across a partially permeable membrane."},{"type":"mcq","q":"How is active transport different from diffusion?","options":[{"t":"It moves substances against the gradient and needs energy","correct":true},{"t":"It needs no energy","why":"Active transport requires energy from respiration."},{"t":"It only moves water","why":"Active transport can move many dissolved substances."}],"ok":"Active transport works against the concentration gradient, using energy."},{"type":"multi","q":"Tap what increases the rate of diffusion.","items":[{"t":"A larger surface area","correct":true},{"t":"A shorter diffusion distance","correct":true},{"t":"A bigger concentration difference","correct":true},{"t":"A thicker membrane"}],"ok":"More surface, shorter distance and a bigger concentration difference all speed diffusion.","bad":"A thicker membrane is a longer distance, which slows diffusion."},{"type":"tf","q":"Active transport allows a root to absorb minerals even when they are more concentrated inside the root than in the soil.","answer":true,"why":"Active transport moves minerals against the gradient into the root, using energy."},{"type":"mcq","q":"Why does active transport require energy?","options":[{"t":"It moves substances from a low to a high concentration","correct":true},{"t":"It moves substances down the gradient","why":"Moving down the gradient is diffusion and needs no energy."},{"t":"It destroys the membrane","why":"Active transport uses carrier proteins, not membrane destruction."}],"ok":"Going against the concentration gradient requires energy from respiration."}]},"GBC-EX":{"code":"GBC-EX","title":"Cell biology — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Cell biology.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"An image of a cell is 60 mm long and the magnification is 300x. Calculate the real length of the cell in mm.","hint":"real size = image size / magnification","answer":0.2,"unit":"mm","ok":"60 / 300 = 0.2 mm."},{"type":"mcq","q":"A cell has no nucleus and its DNA is a single loop. What type of cell is it?","options":[{"t":"A prokaryotic cell (bacterium)","correct":true},{"t":"An animal cell","why":"Animal cells have a nucleus."},{"t":"A plant cell","why":"Plant cells have a nucleus."}],"ok":"No nucleus and a single DNA loop means a prokaryotic (bacterial) cell."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the structure of a plant root hair cell is adapted for absorbing water and dissolved minerals.","scheme":["It has a long extension / large surface area (1)","so more water and minerals can be absorbed (1)","It has a thin cell wall / membrane (1)","giving a short distance for substances to cross (1)","It has many mitochondria (1)","which release energy for active transport of minerals against the gradient (1)"],"model":"A root hair cell has a long projection giving a large surface area, so more water and minerals can be absorbed. Its thin wall gives a short distance for substances to cross. It has many mitochondria to release energy for active transport, allowing minerals to be taken up against the concentration gradient."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student places potato chips in salt solutions of different concentrations. Explain, using osmosis, why a chip in a concentrated salt solution loses mass.","scheme":["The salt solution is more concentrated than the potato cells (1)","Water moves out of the cells by osmosis (1)","across the partially permeable cell membrane (1)","so the chip loses mass (water) (1)"],"model":"The concentrated salt solution has a lower water concentration than inside the potato cells, so water moves out of the cells by osmosis across the partially permeable membrane. Losing water means the chip loses mass."}]},"GBO1":{"code":"GBO1","title":"Enzymes & digestion","discipline":"biology","blurb":"How enzymes work, the digestive enzymes, and food tests.","vocab":[{"term":"enzyme","definition":"a biological catalyst that speeds up reactions in living things","say":"en-zime"},{"term":"substrate","definition":"the molecule that an enzyme acts on","say":"sub-strayt"},{"term":"active site","definition":"the part of an enzyme where the substrate fits","say":"ac-tiv site"}],"facts":["Enzymes are biological catalysts: proteins that speed up reactions without being used up.","Each enzyme has a specific shape (active site) that fits only its substrate, like a lock and key.","Enzymes work fastest at their optimum temperature and pH; too high a temperature or the wrong pH changes the active site's shape (denaturing) so the substrate no longer fits.","Carbohydrase enzymes (e.g. amylase) break down starch to sugars, protease breaks proteins into amino acids, and lipase breaks lipids into fatty acids and glycerol.","Food tests: iodine turns blue-black with starch; Benedict's solution turns brick-red when heated with sugar; biuret turns purple with protein; ethanol gives a cloudy white layer with lipids."],"misconceptions":[{"wrong":"A denatured enzyme just slows down and can recover.","right":"Denaturing permanently changes the active site's shape, so the enzyme no longer works."},{"wrong":"One enzyme can break down any food molecule.","right":"Each enzyme is specific: its active site only fits one type of substrate."}],"questions":[{"type":"mcq","q":"What is an enzyme?","options":[{"t":"A biological catalyst that speeds up reactions","correct":true},{"t":"A type of sugar","why":"Enzymes are proteins, not sugars."},{"t":"A food molecule that is broken down","why":"That is the substrate; the enzyme breaks it down."}],"ok":"Enzymes are biological catalysts (proteins) that speed up reactions."},{"type":"mcq","q":"Why does each enzyme only work on one substrate?","options":[{"t":"Its active site has a specific shape that fits only that substrate","correct":true},{"t":"Enzymes are too weak for big molecules","why":"Specificity is about shape, not strength."},{"t":"Enzymes only work once","why":"Enzymes are not used up and can work repeatedly."}],"ok":"The lock-and-key shape of the active site makes an enzyme specific."},{"type":"mcq","q":"What happens to an enzyme at too high a temperature?","options":[{"t":"Its active site changes shape (denatures) and stops working","correct":true},{"t":"It works faster forever","why":"Beyond the optimum it denatures and stops working."},{"t":"It turns into a sugar","why":"Enzymes do not turn into sugars."}],"ok":"Too much heat denatures the enzyme, changing the active site so the substrate no longer fits."},{"type":"categorise","q":"Match each digestive enzyme to what it breaks down.","bins":["Starch","Proteins","Lipids"],"items":[{"t":"Amylase (carbohydrase)","bin":"Starch"},{"t":"Protease","bin":"Proteins"},{"t":"Lipase","bin":"Lipids"}],"ok":"Carbohydrase digests starch, protease digests proteins, lipase digests lipids.","bad":"Amylase: starch. Protease: protein. Lipase: lipids."},{"type":"mcq","q":"Which food test uses iodine solution?","options":[{"t":"The test for starch (turns blue-black)","correct":true},{"t":"The test for protein","why":"Protein is tested with biuret solution."},{"t":"The test for sugar","why":"Sugar is tested with Benedict's solution."}],"ok":"Iodine turns blue-black in the presence of starch."},{"type":"mcq","q":"Benedict's solution is heated with a food and turns brick-red. What does this show?","options":[{"t":"Sugar is present","correct":true},{"t":"Starch is present","why":"Starch is tested with iodine."},{"t":"Protein is present","why":"Protein is tested with biuret solution."}],"ok":"A brick-red colour with Benedict's solution shows sugar."},{"type":"tf","q":"Enzymes are used up in the reactions they catalyse.","answer":false,"why":"Enzymes are catalysts; they are not used up and can be reused."}]},"GBO2":{"code":"GBO2","title":"Circulatory system & health","discipline":"biology","blurb":"The heart, blood vessels and blood, plus non-communicable disease and risk factors.","vocab":[{"term":"artery","definition":"a blood vessel that carries blood away from the heart at high pressure","say":"ar-ter-ee"},{"term":"vein","definition":"a blood vessel that carries blood back to the heart, with valves","say":"vayn"},{"term":"capillary","definition":"a tiny blood vessel where substances are exchanged with cells","say":"cap-ill-ar-ee"},{"term":"non-communicable disease","definition":"a disease that is not caused by a pathogen and is not spread","say":"non-com-yoon-ic-a-bul"}],"facts":["The heart pumps blood around a double circulatory system: one loop to the lungs and one to the rest of the body.","Arteries carry blood away from the heart at high pressure and have thick, muscular walls; veins carry blood back at low pressure and have valves; capillaries have very thin walls for exchanging substances.","Blood is made of red blood cells (carry oxygen), white blood cells (fight pathogens), platelets (help clotting) and plasma (carries dissolved substances).","Coronary heart disease happens when the coronary arteries narrow with fatty deposits, reducing blood flow to the heart muscle; it can be treated with stents or statins.","Non-communicable diseases are not caused by pathogens; risk factors include smoking, poor diet, lack of exercise and alcohol, which can raise the chance of conditions such as cancer."],"misconceptions":[{"wrong":"All arteries carry oxygen-rich blood.","right":"Most do, but the pulmonary artery carries deoxygenated blood to the lungs; arteries are defined by carrying blood AWAY from the heart."},{"wrong":"Non-communicable diseases can be caught from other people.","right":"Non-communicable diseases are not caused by pathogens and are not spread; risk factors like diet and smoking raise the chance of them."}],"questions":[{"type":"mcq","q":"What is the job of an artery?","options":[{"t":"To carry blood away from the heart at high pressure","correct":true},{"t":"To carry blood back to the heart","why":"That is a vein."},{"t":"To exchange substances with cells","why":"That is a capillary."}],"ok":"Arteries carry blood away from the heart at high pressure."},{"type":"mcq","q":"Which blood vessel has valves to stop blood flowing backwards?","options":[{"t":"Veins","correct":true},{"t":"Arteries","why":"Arteries are at high pressure and do not need valves."},{"t":"Capillaries","why":"Capillaries are tiny exchange vessels, without valves."}],"ok":"Veins have valves because blood in them is at low pressure."},{"type":"mcq","q":"What do red blood cells do?","options":[{"t":"Carry oxygen around the body","correct":true},{"t":"Fight pathogens","why":"That is the job of white blood cells."},{"t":"Help blood to clot","why":"That is the job of platelets."}],"ok":"Red blood cells carry oxygen, using haemoglobin."},{"type":"categorise","q":"Match each blood component to its job.","bins":["Carry oxygen","Fight pathogens","Help clotting","Carry dissolved substances"],"items":[{"t":"Red blood cells","bin":"Carry oxygen"},{"t":"White blood cells","bin":"Fight pathogens"},{"t":"Platelets","bin":"Help clotting"},{"t":"Plasma","bin":"Carry dissolved substances"}],"ok":"Each part of the blood has a distinct role.","bad":"Red cells: oxygen. White cells: defence. Platelets: clotting. Plasma: transport."},{"type":"mcq","q":"What causes coronary heart disease?","options":[{"t":"Fatty deposits narrow the coronary arteries, reducing blood flow to the heart","correct":true},{"t":"A virus infects the heart","why":"Coronary heart disease is non-communicable, not from a pathogen."},{"t":"Too many red blood cells","why":"It is caused by narrowed coronary arteries."}],"ok":"Fatty deposits narrow the coronary arteries, reducing the heart muscle's blood supply."},{"type":"multi","q":"Tap the risk factors for non-communicable diseases.","items":[{"t":"Smoking","correct":true},{"t":"Poor diet","correct":true},{"t":"Lack of exercise","correct":true},{"t":"Being vaccinated"}],"ok":"Smoking, poor diet, inactivity and alcohol all raise the risk of non-communicable disease.","bad":"Vaccination protects against communicable disease; it is not a risk factor."},{"type":"tf","q":"Coronary heart disease is a communicable disease that can be caught from others.","answer":false,"why":"Coronary heart disease is non-communicable; it is not caused by a pathogen and cannot be spread."}]},"GBO3":{"code":"GBO3","title":"Plant tissues & transport","discipline":"biology","blurb":"Plant organs and tissues, transpiration and translocation.","vocab":[{"term":"xylem","definition":"plant tissue that carries water and minerals up from the roots","say":"zy-lem"},{"term":"phloem","definition":"plant tissue that carries dissolved sugars around the plant","say":"floh-em"},{"term":"transpiration","definition":"the loss of water vapour from a plant's leaves","say":"tran-spir-ay-shun"},{"term":"stomata","definition":"tiny holes in a leaf that let gases in and out","say":"stoh-ma-ta"}],"facts":["Plant organs include roots, stems and leaves; the leaf is an organ for photosynthesis.","Xylem tissue carries water and dissolved minerals up from the roots to the leaves; it is made of dead, hollow cells.","Phloem tissue carries dissolved sugars made in the leaves to the rest of the plant (translocation); it is made of living cells.","Transpiration is the loss of water vapour from the leaves, mostly through the stomata; it pulls water up through the xylem (the transpiration stream).","The rate of transpiration increases with higher temperature, more air movement (wind), lower humidity and brighter light (which opens the stomata)."],"misconceptions":[{"wrong":"Xylem carries sugars and phloem carries water.","right":"Xylem carries water and minerals up; phloem carries dissolved sugars around the plant."},{"wrong":"Transpiration only happens in bright sunlight.","right":"It happens whenever stomata are open; its rate changes with temperature, wind, humidity and light."}],"questions":[{"type":"mcq","q":"What does xylem tissue carry?","options":[{"t":"Water and dissolved minerals, up from the roots","correct":true},{"t":"Dissolved sugars","why":"That is phloem."},{"t":"Oxygen only","why":"Xylem carries water and minerals, not oxygen."}],"ok":"Xylem carries water and minerals up from the roots."},{"type":"mcq","q":"What does phloem tissue carry?","options":[{"t":"Dissolved sugars around the plant","correct":true},{"t":"Water up from the roots","why":"That is xylem."},{"t":"Minerals only","why":"Phloem carries sugars made in the leaves."}],"ok":"Phloem carries dissolved sugars (translocation)."},{"type":"mcq","q":"What is transpiration?","options":[{"t":"The loss of water vapour from a plant's leaves","correct":true},{"t":"The making of sugar in the leaf","why":"That is photosynthesis."},{"t":"The movement of sugars in phloem","why":"That is translocation."}],"ok":"Transpiration is water vapour leaving the leaves, mostly through the stomata."},{"type":"mcq","q":"Through which structures does most water vapour leave a leaf?","options":[{"t":"The stomata","correct":true},{"t":"The xylem","why":"Xylem carries water inside the plant; it does not release vapour."},{"t":"The roots","why":"Water is lost from the leaves, not released as vapour from roots."}],"ok":"Most water vapour is lost through the stomata in the leaf."},{"type":"multi","q":"Tap the conditions that increase the rate of transpiration.","items":[{"t":"Higher temperature","correct":true},{"t":"More wind (air movement)","correct":true},{"t":"Brighter light","correct":true},{"t":"Higher humidity"}],"ok":"Heat, wind and light speed transpiration; high humidity slows it.","bad":"High humidity reduces transpiration, because the air is already moist."},{"type":"tf","q":"Phloem is made of living cells, while xylem is made of dead, hollow cells.","answer":true,"why":"Phloem cells are living and transport sugars; xylem is dead, hollow tissue that carries water."},{"type":"mcq","q":"What is translocation?","options":[{"t":"The transport of dissolved sugars in the phloem","correct":true},{"t":"The loss of water from leaves","why":"That is transpiration."},{"t":"The uptake of minerals by roots","why":"That is absorption, not translocation."}],"ok":"Translocation is the movement of dissolved sugars through the phloem."}]},"GBO-EX":{"code":"GBO-EX","title":"Organisation — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Organisation.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"An enzyme stops working after a solution is heated to 80 degC. Why?","options":[{"t":"The high temperature has denatured it, changing the active site","correct":true},{"t":"It has run out of substrate","why":"Heating denatures the enzyme regardless of substrate."},{"t":"It has turned into a sugar","why":"Enzymes do not turn into sugars."}],"ok":"High temperature denatures the enzyme, so the substrate no longer fits the active site."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the structures of arteries, veins and capillaries are each adapted to their function.","scheme":["Arteries carry blood away from the heart at high pressure (1)","so they have thick, muscular/elastic walls to withstand it (1)","Veins carry blood back at low pressure (1)","so they have valves to stop blood flowing backwards (1)","Capillaries exchange substances with cells (1)","so they have very thin (one-cell-thick) walls for a short diffusion distance (1)"],"model":"Arteries carry blood away from the heart at high pressure, so they have thick, muscular and elastic walls. Veins carry blood back at low pressure, so they have valves to prevent backflow. Capillaries exchange substances with cells, so they have walls only one cell thick to give a short diffusion distance."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain how lifestyle factors can increase a person's risk of a non-communicable disease.","scheme":["Non-communicable diseases are not caused by pathogens (1)","Risk factors such as smoking, poor diet, inactivity or alcohol (1)","increase the chance of developing the disease (1)","e.g. smoking increases the risk of lung cancer / poor diet increases heart disease (1)"],"model":"Non-communicable diseases are not caused by pathogens, but lifestyle risk factors raise the chance of getting them. For example, smoking increases the risk of lung cancer, and a poor diet and lack of exercise increase the risk of heart disease."}]},"GBI1":{"code":"GBI1","title":"Pathogens & disease","discipline":"biology","blurb":"The types of pathogen, the diseases they cause, and how disease spreads.","vocab":[{"term":"pathogen","definition":"a microorganism that causes a communicable (infectious) disease","say":"path-o-jen"},{"term":"communicable disease","definition":"a disease that can be spread from one organism to another","say":"com-yoon-ic-a-bul"},{"term":"virus","definition":"a tiny pathogen that reproduces inside the cells it infects","say":"vy-russ"}],"facts":["A pathogen is a microorganism that causes a communicable (infectious) disease; pathogens can be bacteria, viruses, fungi or protists.","Bacteria can make you ill by producing toxins; viruses reproduce inside your cells and damage them.","Examples: measles and HIV are caused by viruses; salmonella food poisoning is bacterial; rose black spot is a fungal disease; malaria is caused by a protist spread by mosquitoes.","Pathogens spread by direct contact, in water, in the air (droplets), or by vectors such as insects.","Spread can be reduced by good hygiene, destroying vectors, isolating infected people and vaccination."],"misconceptions":[{"wrong":"Antibiotics kill viruses.","right":"Antibiotics kill bacteria, not viruses; viral diseases cannot be treated with antibiotics."},{"wrong":"All pathogens are bacteria.","right":"Pathogens can be bacteria, viruses, fungi or protists."}],"questions":[{"type":"mcq","q":"What is a pathogen?","options":[{"t":"A microorganism that causes a communicable disease","correct":true},{"t":"A type of white blood cell","why":"White blood cells fight pathogens; they are not pathogens."},{"t":"A vaccine","why":"A vaccine protects against pathogens."}],"ok":"A pathogen is a microorganism that causes infectious disease."},{"type":"categorise","q":"Match each disease to the type of pathogen that causes it.","bins":["Virus","Bacterium","Fungus","Protist"],"items":[{"t":"Measles","bin":"Virus"},{"t":"Salmonella","bin":"Bacterium"},{"t":"Rose black spot","bin":"Fungus"},{"t":"Malaria","bin":"Protist"}],"ok":"Pathogens can be viruses, bacteria, fungi or protists.","bad":"Measles: virus. Salmonella: bacterium. Rose black spot: fungus. Malaria: protist."},{"type":"mcq","q":"How do many bacteria make you feel ill?","options":[{"t":"They produce toxins that damage cells","correct":true},{"t":"They photosynthesise inside you","why":"Bacteria do not photosynthesise inside the body."},{"t":"They are too big to move","why":"Bacteria are tiny; illness is from toxins."}],"ok":"Many bacteria release toxins that make you ill."},{"type":"mcq","q":"How is malaria spread?","options":[{"t":"By mosquitoes acting as vectors","correct":true},{"t":"Through the air by coughing","why":"Malaria is spread by mosquito vectors, not droplets."},{"t":"By eating contaminated food","why":"That is how salmonella spreads, not malaria."}],"ok":"Malaria is caused by a protist spread by mosquito vectors."},{"type":"multi","q":"Tap ways the spread of disease can be reduced.","items":[{"t":"Good hygiene / hand washing","correct":true},{"t":"Vaccination","correct":true},{"t":"Isolating infected people","correct":true},{"t":"Sharing drinking cups"}],"ok":"Hygiene, vaccination, isolation and vector control all reduce spread.","bad":"Sharing cups spreads pathogens, rather than reducing the spread."},{"type":"tf","q":"Antibiotics can be used to cure a viral disease such as measles.","answer":false,"why":"Antibiotics only kill bacteria; they have no effect on viruses."},{"type":"mcq","q":"Why does a virus damage the body?","options":[{"t":"It reproduces inside cells and damages them","correct":true},{"t":"It photosynthesises","why":"Viruses do not photosynthesise."},{"t":"It is a type of white blood cell","why":"Viruses are pathogens, not white blood cells."}],"ok":"Viruses reproduce inside host cells, damaging or destroying them."}]},"GBI2":{"code":"GBI2","title":"Defence & medicines","discipline":"biology","blurb":"The body's defences, the immune system, vaccination and developing drugs.","vocab":[{"term":"immune system","definition":"the body's defence that destroys pathogens, using white blood cells","say":"im-yoon system"},{"term":"antibody","definition":"a protein made by white blood cells that targets a specific pathogen","say":"an-ti-bod-ee"},{"term":"vaccination","definition":"giving a harmless form of a pathogen to make the body immune","say":"vac-sin-ay-shun"},{"term":"antibiotic","definition":"a medicine that kills bacteria inside the body","say":"an-ti-by-ot-ic"}],"facts":["The body's first defences keep pathogens out: the skin, mucus and cilia in the airways, and acid in the stomach.","If pathogens get in, white blood cells defend the body by engulfing them (phagocytosis), producing antibodies, and producing antitoxins.","Vaccination introduces a small, harmless amount of a pathogen, so the white blood cells make antibodies; if the real pathogen invades later, the body responds quickly.","Antibiotics kill bacteria inside the body, but they do not work against viruses; overuse has led to resistant bacteria such as MRSA.","New drugs are tested for safety (toxicity), the right dose and effectiveness (efficacy) in preclinical and then clinical trials, often using placebos and double-blind tests."],"misconceptions":[{"wrong":"A vaccine gives you the full disease to fight off.","right":"A vaccine gives a small, harmless amount of the pathogen so the body makes antibodies without becoming seriously ill."},{"wrong":"Painkillers cure the disease.","right":"Painkillers treat the symptoms; they do not kill the pathogen."}],"questions":[{"type":"mcq","q":"How do white blood cells defend against pathogens?","options":[{"t":"By engulfing them, and making antibodies and antitoxins","correct":true},{"t":"By photosynthesising","why":"White blood cells do not photosynthesise."},{"t":"By carrying oxygen","why":"That is red blood cells, not white blood cells."}],"ok":"White blood cells engulf pathogens and produce antibodies and antitoxins."},{"type":"mcq","q":"How does a vaccine make you immune?","options":[{"t":"It introduces a harmless form of the pathogen so antibodies are made","correct":true},{"t":"It kills all bacteria in the body","why":"Vaccines trigger antibody production, not kill all bacteria."},{"t":"It replaces your white blood cells","why":"Vaccines stimulate your own white blood cells."}],"ok":"A vaccine triggers white blood cells to make antibodies, ready for the real pathogen."},{"type":"mcq","q":"What do antibiotics kill?","options":[{"t":"Bacteria","correct":true},{"t":"Viruses","why":"Antibiotics do not work on viruses."},{"t":"All pathogens","why":"Antibiotics work on bacteria only."}],"ok":"Antibiotics kill bacteria, but not viruses."},{"type":"mcq","q":"Why is the overuse of antibiotics a problem?","options":[{"t":"It leads to resistant bacteria, such as MRSA","correct":true},{"t":"It makes viruses stronger","why":"Antibiotics do not affect viruses."},{"t":"It boosts the immune system too much","why":"Overuse causes resistance, not an overactive immune system."}],"ok":"Overusing antibiotics has led to antibiotic-resistant bacteria."},{"type":"multi","q":"Tap the body's first-line defences that keep pathogens out.","items":[{"t":"The skin","correct":true},{"t":"Mucus and cilia in the airways","correct":true},{"t":"Stomach acid","correct":true},{"t":"Antibodies in a vaccine"}],"ok":"Skin, mucus, cilia and stomach acid are first-line defences.","bad":"Antibodies are part of the immune response, not a first-line barrier."},{"type":"tf","q":"Painkillers kill the pathogen causing a disease.","answer":false,"why":"Painkillers relieve symptoms; they do not kill the pathogen."},{"type":"order","q":"Put the stages of testing a new drug in order.","items":["Preclinical testing on cells and tissues","Testing on animals","Clinical trials on healthy volunteers","Clinical trials on patients"],"ok":"Drugs are tested on cells/tissues, then animals, then healthy volunteers, then patients."}]},"GBI-EX":{"code":"GBI-EX","title":"Infection — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Infection and response.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A doctor refuses to give antibiotics for a patient's cold. Why?","options":[{"t":"A cold is caused by a virus, and antibiotics do not kill viruses","correct":true},{"t":"Antibiotics are too expensive","why":"The reason is that antibiotics do not work on viruses."},{"t":"Colds cannot be treated at all","why":"Symptoms can be eased; antibiotics just will not help."}],"ok":"Colds are viral, and antibiotics only kill bacteria."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how vaccination protects a person from a disease and how it can protect a whole population.","scheme":["A vaccine contains a small/harmless amount of the pathogen (1)","White blood cells respond by producing antibodies (1)","and memory cells remain in the body (1)","If the real pathogen invades, antibodies are produced quickly and in large numbers (1)","so the person does not become ill (immunity) (1)","If most people are vaccinated, the pathogen cannot spread easily (herd immunity), protecting others (1)"],"model":"A vaccine introduces a small, harmless amount of the pathogen. White blood cells respond by making antibodies and memory cells. If the real pathogen later invades, antibodies are produced quickly and in large numbers, so the person does not become ill. If most of the population is vaccinated, the pathogen cannot spread easily, protecting even those who are not vaccinated (herd immunity)."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe why new medicines are tested in clinical trials before they are used widely.","scheme":["To check the drug is safe / not too toxic (1)","To find the most effective dose (1)","To check it actually works (efficacy) (1)","Trials may use a placebo / be double-blind to give fair, reliable results (1)"],"model":"Clinical trials check that a new medicine is safe (low toxicity), find the correct dose, and confirm it is effective. Using a placebo and a double-blind design makes the results fair and reliable before the drug is used widely."}]},"GBE1":{"code":"GBE1","title":"Photosynthesis","discipline":"biology","blurb":"The photosynthesis reaction, limiting factors, and what plants do with the glucose.","vocab":[{"term":"photosynthesis","definition":"the reaction in which plants make glucose using light energy","say":"foh-toh-sin-the-sis"},{"term":"chlorophyll","definition":"the green pigment in chloroplasts that absorbs light","say":"klor-oh-fill"},{"term":"limiting factor","definition":"a factor that, when in short supply, holds back the rate of photosynthesis","say":"lim-it-ing factor"}],"facts":["Photosynthesis is an endothermic reaction: carbon dioxide + water make glucose + oxygen, using light energy absorbed by chlorophyll.","The rate of photosynthesis is affected by limiting factors: light intensity, carbon dioxide concentration and temperature.","As light intensity, carbon dioxide or temperature increases, the rate rises until another factor becomes limiting; too high a temperature denatures the enzymes.","Required practical: investigate how light intensity affects the rate of photosynthesis (for example by counting bubbles of oxygen from pondweed).","Plants use the glucose for respiration, to make cellulose for cell walls, to make amino acids (with nitrate), and to store as starch or convert to fats and oils."],"misconceptions":[{"wrong":"Plants only respire at night and photosynthesise in the day.","right":"Plants respire all the time; they also photosynthesise when there is light."},{"wrong":"Photosynthesis releases energy.","right":"Photosynthesis takes IN energy (endothermic), storing it in glucose."}],"questions":[{"type":"mcq","q":"What are the products of photosynthesis?","options":[{"t":"Glucose and oxygen","correct":true},{"t":"Carbon dioxide and water","why":"Those are the reactants, not the products."},{"t":"Glucose and carbon dioxide","why":"Oxygen is produced, not carbon dioxide."}],"ok":"Carbon dioxide + water make glucose + oxygen."},{"type":"mcq","q":"Where is light energy absorbed for photosynthesis?","options":[{"t":"By chlorophyll in the chloroplasts","correct":true},{"t":"By the cell wall","why":"The cell wall supports the cell; chlorophyll absorbs light."},{"t":"By the mitochondria","why":"Mitochondria are for respiration, not photosynthesis."}],"ok":"Chlorophyll in the chloroplasts absorbs the light energy."},{"type":"multi","q":"Tap the limiting factors of photosynthesis.","items":[{"t":"Light intensity","correct":true},{"t":"Carbon dioxide concentration","correct":true},{"t":"Temperature","correct":true},{"t":"Oxygen concentration"}],"ok":"Light, carbon dioxide and temperature can all limit the rate.","bad":"Oxygen is a product, not a limiting factor of photosynthesis."},{"type":"mcq","q":"What happens to the rate of photosynthesis if the temperature gets too high?","options":[{"t":"It falls, because the enzymes denature","correct":true},{"t":"It keeps rising forever","why":"Too high a temperature denatures the enzymes, lowering the rate."},{"t":"It is unaffected","why":"High temperature denatures enzymes, so the rate falls."}],"ok":"Above the optimum, the enzymes denature and the rate falls."},{"type":"mcq","q":"What is one use a plant makes of the glucose from photosynthesis?","options":[{"t":"To make cellulose for cell walls","correct":true},{"t":"To absorb sunlight","why":"Sunlight is absorbed by chlorophyll, not glucose."},{"t":"To act as a pathogen","why":"Glucose is a food molecule, not a pathogen."}],"ok":"Glucose is used for respiration, cellulose, amino acids and stored as starch."},{"type":"tf","q":"Photosynthesis is an endothermic reaction.","answer":true,"why":"Photosynthesis takes in (absorbs) light energy, so it is endothermic."},{"type":"mcq","q":"In the required practical, how can the rate of photosynthesis be measured?","options":[{"t":"By counting the bubbles of oxygen given off by pondweed","correct":true},{"t":"By weighing the light","why":"Light cannot be weighed; you measure oxygen produced."},{"t":"By measuring the pH of the air","why":"Bubble counting measures the oxygen produced."}],"ok":"Counting oxygen bubbles from pondweed measures the rate of photosynthesis."}]},"GBE2":{"code":"GBE2","title":"Respiration","discipline":"biology","blurb":"Aerobic and anaerobic respiration, and the body's response to exercise.","vocab":[{"term":"aerobic respiration","definition":"respiration that uses oxygen to release energy from glucose","say":"air-oh-bic"},{"term":"anaerobic respiration","definition":"respiration without oxygen, releasing less energy","say":"an-air-oh-bic"},{"term":"metabolism","definition":"all the chemical reactions happening in a body's cells","say":"me-tab-o-liz-um"}],"facts":["Respiration is an exothermic reaction, happening continuously in all living cells, that releases energy from glucose.","Aerobic respiration uses oxygen: glucose + oxygen make carbon dioxide + water, releasing a lot of energy.","Anaerobic respiration happens without oxygen and releases much less energy; in muscles it produces lactic acid, and in yeast it produces ethanol and carbon dioxide (fermentation).","During exercise the heart rate and breathing rate increase to supply more oxygen and glucose and remove carbon dioxide.","Metabolism is the sum of all the reactions in a cell or body, including building larger molecules and breaking them down."],"misconceptions":[{"wrong":"Respiration is the same as breathing.","right":"Breathing moves air in and out; respiration is the chemical reaction in cells that releases energy."},{"wrong":"Anaerobic respiration releases more energy than aerobic.","right":"Anaerobic respiration releases much LESS energy than aerobic respiration."}],"questions":[{"type":"mcq","q":"What is the word equation for aerobic respiration?","options":[{"t":"glucose + oxygen make carbon dioxide + water","correct":true},{"t":"carbon dioxide + water make glucose + oxygen","why":"That is photosynthesis."},{"t":"glucose makes lactic acid","why":"That is anaerobic respiration in muscles."}],"ok":"Aerobic respiration: glucose + oxygen make carbon dioxide + water."},{"type":"mcq","q":"How does anaerobic respiration compare with aerobic respiration?","options":[{"t":"It releases much less energy","correct":true},{"t":"It releases much more energy","why":"Anaerobic respiration releases less energy."},{"t":"It releases the same energy","why":"Aerobic respiration releases far more energy."}],"ok":"Anaerobic respiration releases much less energy than aerobic respiration."},{"type":"mcq","q":"What does anaerobic respiration produce in human muscles?","options":[{"t":"Lactic acid","correct":true},{"t":"Carbon dioxide and water","why":"Those are aerobic respiration products."},{"t":"Ethanol","why":"Ethanol is produced by yeast, not human muscles."}],"ok":"In muscles, anaerobic respiration produces lactic acid."},{"type":"mcq","q":"What does anaerobic respiration in yeast produce?","options":[{"t":"Ethanol and carbon dioxide","correct":true},{"t":"Lactic acid","why":"That is what happens in human muscles."},{"t":"Oxygen","why":"Anaerobic respiration does not use or produce oxygen."}],"ok":"In yeast, anaerobic respiration (fermentation) produces ethanol and carbon dioxide."},{"type":"mcq","q":"Why does heart rate increase during exercise?","options":[{"t":"To supply muscles with more oxygen and glucose and remove carbon dioxide","correct":true},{"t":"To cool the body down","why":"Heart rate rises to supply muscles, not mainly to cool down."},{"t":"To stop respiration","why":"Exercise increases respiration, not stops it."}],"ok":"A faster heart rate supplies more oxygen and glucose and removes carbon dioxide."},{"type":"tf","q":"Respiration only happens in animal cells.","answer":false,"why":"Respiration happens in all living cells, including plant cells, all the time."},{"type":"tf","q":"Respiration is an exothermic reaction.","answer":true,"why":"Respiration releases energy from glucose, so it is exothermic."}]},"GBE-EX":{"code":"GBE-EX","title":"Bioenergetics — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Bioenergetics.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A pondweed gives off more oxygen bubbles when a lamp is moved closer. Why?","options":[{"t":"More light increases the rate of photosynthesis","correct":true},{"t":"The water gets warmer, stopping photosynthesis","why":"More light raises the rate; the effect here is light intensity."},{"t":"Carbon dioxide is removed","why":"Bringing the lamp closer increases light, not removes carbon dioxide."}],"ok":"Higher light intensity increases the rate of photosynthesis, so more oxygen is produced."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"A student investigates how light intensity affects the rate of photosynthesis using pondweed. Describe a method, including how to change and measure the variables.","scheme":["Place pondweed in water with a lamp at a set distance (1)","Change the light intensity by moving the lamp to different distances (1)","Count the oxygen bubbles given off in a fixed time (or measure volume of gas) (1)","Repeat at each distance and take a mean (1)","Control variables: same pondweed, same temperature, same time (1)","As light intensity increases, the rate (bubbles per minute) increases until another factor limits it (1)"],"model":"Place pondweed in water and shine a lamp at a set distance. Change the light intensity by moving the lamp to measured distances, and count the oxygen bubbles given off in a fixed time at each distance, repeating for a mean. Keep the temperature, the pondweed and the time the same. The rate increases as light intensity increases until another factor becomes limiting."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Compare aerobic and anaerobic respiration in human cells.","scheme":["Aerobic respiration uses oxygen; anaerobic does not (1)","Aerobic produces carbon dioxide and water; anaerobic produces lactic acid (1)","Aerobic releases much more energy than anaerobic (1)","Anaerobic happens when oxygen runs low, e.g. during hard exercise (1)"],"model":"Aerobic respiration uses oxygen and produces carbon dioxide and water, releasing a lot of energy. Anaerobic respiration happens without oxygen (e.g. during hard exercise), produces lactic acid, and releases much less energy."}]},"GBH1":{"code":"GBH1","title":"Homeostasis & the nervous system","discipline":"biology","blurb":"Keeping conditions stable, and how nerves and reflexes work.","vocab":[{"term":"homeostasis","definition":"keeping a stable internal environment in the body","say":"hoh-mee-oh-stay-sis"},{"term":"receptor","definition":"a cell that detects a stimulus (a change)","say":"ree-sep-tor"},{"term":"reflex action","definition":"a fast, automatic response that does not involve the conscious brain","say":"ree-fleks"},{"term":"synapse","definition":"the tiny gap between two neurones","say":"sy-naps"}],"facts":["Homeostasis is keeping a stable internal environment (such as temperature, blood glucose and water levels) despite changes inside or outside the body.","A control system has receptors that detect a stimulus, a coordination centre (such as the brain or spinal cord), and effectors (muscles or glands) that bring about a response.","The nervous system lets us react to surroundings: stimulus, receptor, sensory neurone, coordination centre, motor neurone, effector, response.","A reflex action is fast and automatic to protect the body; the signal passes through the spinal cord without involving the conscious brain (a reflex arc).","At a synapse, a chemical is released that diffuses across the gap and starts a new impulse in the next neurone."],"misconceptions":[{"wrong":"Reflexes are controlled by the conscious brain.","right":"Reflex actions are automatic and bypass the conscious brain, which makes them fast and protective."},{"wrong":"Nerve impulses jump across synapses electrically.","right":"At a synapse a chemical diffuses across the gap to start the next impulse."}],"questions":[{"type":"mcq","q":"What is homeostasis?","options":[{"t":"Keeping a stable internal environment in the body","correct":true},{"t":"Fighting off pathogens","why":"That is the immune response."},{"t":"Making glucose from light","why":"That is photosynthesis."}],"ok":"Homeostasis keeps internal conditions stable."},{"type":"order","q":"Put the parts of the nervous pathway in order.","items":["Stimulus","Receptor","Sensory neurone","Coordination centre","Motor neurone","Effector"],"ok":"Stimulus, receptor, sensory neurone, coordination centre, motor neurone, then effector."},{"type":"mcq","q":"What is a reflex action?","options":[{"t":"A fast, automatic response that bypasses the conscious brain","correct":true},{"t":"A slow, thought-out response","why":"Reflexes are fast and automatic, not thought-out."},{"t":"A response controlled by hormones","why":"Reflexes use the nervous system, not hormones."}],"ok":"A reflex is a fast, automatic response that protects the body."},{"type":"mcq","q":"What happens at a synapse?","options":[{"t":"A chemical diffuses across the gap to start a new impulse","correct":true},{"t":"The neurones touch and pass electricity directly","why":"There is a gap; a chemical crosses it."},{"t":"The impulse stops completely","why":"The impulse continues via the chemical messenger."}],"ok":"A chemical crosses the synapse gap to continue the impulse."},{"type":"mcq","q":"What does an effector do?","options":[{"t":"Brings about a response, e.g. a muscle contracting or a gland releasing a hormone","correct":true},{"t":"Detects the stimulus","why":"That is the receptor."},{"t":"Coordinates the response","why":"That is the coordination centre."}],"ok":"Effectors (muscles or glands) carry out the response."},{"type":"tf","q":"A reflex action is slower than a conscious decision.","answer":false,"why":"Reflexes are faster than conscious responses because they bypass the conscious brain."}]},"GBH2":{"code":"GBH2","title":"Hormones & the endocrine system","discipline":"biology","blurb":"Hormones, controlling blood glucose and diabetes, and reproduction hormones.","vocab":[{"term":"hormone","definition":"a chemical messenger carried in the blood from a gland to a target organ","say":"hor-mohn"},{"term":"endocrine system","definition":"the glands that release hormones into the blood","say":"en-doh-crin"},{"term":"insulin","definition":"the hormone that lowers blood glucose","say":"in-sue-lin"}],"facts":["The endocrine system is made of glands that release hormones into the blood; hormones travel to target organs and act more slowly and for longer than nerves.","Blood glucose is controlled by the pancreas: when it is too high, the pancreas releases insulin, which makes cells take up glucose and the liver store it as glycogen.","In type 1 diabetes the pancreas does not make enough insulin, so it is treated with insulin injections; type 2 diabetes is linked to obesity and is often controlled by diet and exercise.","In reproduction, oestrogen is the main female hormone and testosterone the main male hormone; the menstrual cycle is controlled by hormones including FSH, LH, oestrogen and progesterone.","Contraception can be hormonal (such as the pill, which stops eggs maturing) or non-hormonal (such as condoms, which also help prevent infection)."],"misconceptions":[{"wrong":"Hormones act faster than nerve impulses.","right":"Hormones act more slowly than nerves but their effects last longer."},{"wrong":"Insulin raises blood glucose.","right":"Insulin lowers blood glucose by making cells take it up and the liver store it."}],"questions":[{"type":"mcq","q":"What is a hormone?","options":[{"t":"A chemical messenger carried in the blood to a target organ","correct":true},{"t":"A nerve impulse","why":"Hormones are chemicals in the blood, not nerve impulses."},{"t":"A type of white blood cell","why":"Hormones are messengers, not blood cells."}],"ok":"Hormones are chemical messengers carried in the blood."},{"type":"mcq","q":"How do hormones compare with nerve impulses?","options":[{"t":"They act more slowly, but their effects last longer","correct":true},{"t":"They act faster and for a shorter time","why":"Hormones are slower but longer-lasting."},{"t":"They are exactly the same","why":"Nerves are fast and brief; hormones are slow and long-lasting."}],"ok":"Hormonal responses are slower and longer-lasting than nervous ones."},{"type":"mcq","q":"What does insulin do when blood glucose is too high?","options":[{"t":"Makes cells take up glucose and the liver store it as glycogen","correct":true},{"t":"Raises the blood glucose further","why":"Insulin lowers blood glucose."},{"t":"Stops the heart beating","why":"Insulin controls glucose, not the heartbeat."}],"ok":"Insulin lowers blood glucose by promoting uptake and storage."},{"type":"mcq","q":"How is type 1 diabetes treated?","options":[{"t":"With insulin injections","correct":true},{"t":"With antibiotics","why":"Antibiotics treat bacterial infections, not diabetes."},{"t":"By avoiding all exercise","why":"Exercise is helpful; type 1 needs insulin."}],"ok":"Type 1 diabetes is treated with insulin injections, as the pancreas makes too little."},{"type":"mcq","q":"Which is the main female reproductive hormone?","options":[{"t":"Oestrogen","correct":true},{"t":"Testosterone","why":"Testosterone is the main male hormone."},{"t":"Insulin","why":"Insulin controls blood glucose, not reproduction."}],"ok":"Oestrogen is the main female reproductive hormone."},{"type":"tf","q":"Type 2 diabetes is linked to obesity and is often controlled by diet and exercise.","answer":true,"why":"Type 2 diabetes is associated with obesity and is often managed through diet and exercise."},{"type":"mcq","q":"How does the hormonal contraceptive pill work?","options":[{"t":"It uses hormones to stop eggs maturing/being released","correct":true},{"t":"It kills pathogens","why":"That is not how contraception works."},{"t":"It is a physical barrier","why":"A barrier method like a condom is non-hormonal."}],"ok":"The pill uses hormones to prevent eggs maturing and being released."}]},"GBH-EX":{"code":"GBH-EX","title":"Homeostasis — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Homeostasis and response.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A person touches a hot object and pulls their hand away before they feel pain. Why is this response so fast?","options":[{"t":"It is a reflex that bypasses the conscious brain","correct":true},{"t":"Hormones carried it quickly","why":"Reflexes use the nervous system, which is faster than hormones."},{"t":"The brain made a quick decision","why":"A reflex bypasses the conscious brain, making it faster."}],"ok":"Reflexes are fast because they do not involve the conscious brain."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the body controls blood glucose concentration when it rises after a meal.","scheme":["The rise in blood glucose is detected by the pancreas (1)","The pancreas releases the hormone insulin into the blood (1)","Insulin travels in the blood to the liver and body cells (1)","Cells take up glucose from the blood (1)","The liver stores excess glucose as glycogen (1)","so the blood glucose concentration falls back to normal (negative feedback) (1)"],"model":"After a meal, blood glucose rises. The pancreas detects this and releases insulin into the blood. Insulin causes body cells to take up glucose and the liver to store the excess as glycogen, so the blood glucose concentration falls back to normal."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Compare how the nervous system and the endocrine (hormonal) system bring about responses.","scheme":["The nervous system uses electrical impulses; the endocrine system uses chemical hormones in the blood (1)","Nervous responses are very fast; hormonal responses are slower (1)","Nervous responses are short-lived; hormonal effects last longer (1)","Nerve impulses act on a precise area; hormones can affect several target organs (1)"],"model":"The nervous system sends fast electrical impulses that act briefly on precise targets. The endocrine system releases hormones into the blood, which act more slowly but for longer and can affect several target organs."}]},"GBV1":{"code":"GBV1","title":"Reproduction & DNA","discipline":"biology","blurb":"Sexual and asexual reproduction, meiosis, and the basics of DNA and the genome.","vocab":[{"term":"sexual reproduction","definition":"reproduction involving two parents and the joining of gametes","say":"sex-yoo-al"},{"term":"asexual reproduction","definition":"reproduction from one parent, making genetically identical offspring","say":"ay-sex-yoo-al"},{"term":"meiosis","definition":"cell division that makes gametes with half the number of chromosomes","say":"my-oh-sis"},{"term":"gamete","definition":"a sex cell: a sperm or an egg in animals","say":"gam-eet"},{"term":"DNA","definition":"the molecule that carries the genetic code, found in chromosomes","say":"dee-en-ay"}],"facts":["Sexual reproduction involves two parents and the joining of gametes (egg and sperm); it mixes genetic information, giving variation.","Asexual reproduction involves only one parent and no gametes; the offspring are genetically identical clones.","Gametes are made by meiosis, which halves the chromosome number, so that when two gametes join the normal number is restored.","At fertilisation, the gametes fuse to make a cell with the full set of chromosomes, which then divides by mitosis.","DNA is a polymer made of two strands in a double helix; a gene is a small section of DNA, and the genome is all the DNA of an organism."],"misconceptions":[{"wrong":"Meiosis makes two identical cells.","right":"Meiosis makes four genetically different gametes, each with half the chromosomes; mitosis makes two identical cells."},{"wrong":"Asexual reproduction produces variation.","right":"Asexual reproduction produces genetically identical clones, with no variation."}],"questions":[{"type":"mcq","q":"What does sexual reproduction involve?","options":[{"t":"Two parents and the joining of gametes","correct":true},{"t":"One parent and no gametes","why":"That is asexual reproduction."},{"t":"Only cloning","why":"Sexual reproduction mixes genes, unlike cloning."}],"ok":"Sexual reproduction needs two parents and joins gametes, giving variation."},{"type":"mcq","q":"What are the offspring of asexual reproduction like?","options":[{"t":"Genetically identical clones of the parent","correct":true},{"t":"Genetically different from the parent","why":"Asexual offspring are identical clones."},{"t":"Always a different species","why":"They are the same species and genetically identical."}],"ok":"Asexual reproduction produces genetically identical clones."},{"type":"mcq","q":"What does meiosis produce?","options":[{"t":"Four genetically different gametes with half the chromosomes","correct":true},{"t":"Two identical cells","why":"That is mitosis."},{"t":"Cells with double the chromosomes","why":"Meiosis halves the chromosome number."}],"ok":"Meiosis makes four different gametes, each with half the chromosomes."},{"type":"mcq","q":"Why must gametes have half the normal number of chromosomes?","options":[{"t":"So that joining two gametes restores the full number","correct":true},{"t":"So the offspring are clones","why":"Halving and rejoining gives variation, not clones."},{"t":"So they can photosynthesise","why":"Gametes do not photosynthesise."}],"ok":"Halving the chromosomes means fertilisation restores the full set."},{"type":"mcq","q":"What is a gene?","options":[{"t":"A small section of DNA","correct":true},{"t":"A whole chromosome","why":"A chromosome contains many genes."},{"t":"A type of protein","why":"Genes code for proteins; they are made of DNA."}],"ok":"A gene is a short section of DNA that codes for a protein."},{"type":"tf","q":"DNA is arranged as a double helix of two strands.","answer":true,"why":"DNA is a polymer of two strands twisted into a double helix."},{"type":"mcq","q":"What is the genome of an organism?","options":[{"t":"All of the genetic material (DNA) of that organism","correct":true},{"t":"A single gene","why":"The genome is all the DNA, not one gene."},{"t":"A type of gamete","why":"The genome is the DNA, not a sex cell."}],"ok":"The genome is the entire genetic material of an organism."}]},"GBV2":{"code":"GBV2","title":"Genetics & inheritance","discipline":"biology","blurb":"Alleles, dominant and recessive, genetic crosses and inherited disorders.","vocab":[{"term":"allele","definition":"a different version of a gene","say":"al-eel"},{"term":"dominant","definition":"an allele that shows even if only one copy is present","say":"dom-in-ant"},{"term":"recessive","definition":"an allele that only shows if both copies are present","say":"ree-sess-iv"},{"term":"genotype","definition":"the alleles an organism has for a characteristic","say":"jee-no-type"}],"facts":["Most characteristics are controlled by many genes, but some are controlled by a single gene with different versions called alleles.","A dominant allele shows in the offspring if just one copy is present; a recessive allele only shows if both copies are recessive.","The genotype is the alleles present; the phenotype is the characteristic that shows. Homozygous means two of the same allele, heterozygous means two different alleles.","Genetic crosses can be shown with a Punnett square to predict the ratio of offspring; for two heterozygous parents the ratio is 3 dominant to 1 recessive.","In humans, females are XX and males are XY; some disorders are inherited, such as polydactyly (dominant) and cystic fibrosis (recessive)."],"misconceptions":[{"wrong":"A recessive characteristic shows whenever one recessive allele is present.","right":"A recessive characteristic only shows when both alleles are recessive."},{"wrong":"Genotype and phenotype are the same thing.","right":"The genotype is the alleles you have; the phenotype is the characteristic that actually shows."}],"questions":[{"type":"mcq","q":"What is an allele?","options":[{"t":"A different version of a gene","correct":true},{"t":"A whole chromosome","why":"A chromosome carries many genes."},{"t":"A type of protein","why":"Alleles are versions of genes, not proteins."}],"ok":"Alleles are different versions of the same gene."},{"type":"mcq","q":"When does a recessive characteristic show in an organism?","options":[{"t":"Only when both alleles are recessive","correct":true},{"t":"When one recessive allele is present","why":"One recessive allele is masked by a dominant one."},{"t":"Whenever a dominant allele is present","why":"A dominant allele hides a recessive one."}],"ok":"A recessive characteristic needs two recessive alleles to show."},{"type":"mcq","q":"Two parents are both heterozygous for a gene (Bb). What ratio of offspring shows the dominant characteristic?","options":[{"t":"3 dominant to 1 recessive","correct":true},{"t":"1 dominant to 1 recessive","why":"Bb x Bb gives a 3:1 ratio."},{"t":"All dominant","why":"One quarter (bb) shows the recessive characteristic."}],"ok":"A Bb x Bb cross gives a 3:1 ratio of dominant to recessive."},{"type":"mcq","q":"What are the sex chromosomes of a human female?","options":[{"t":"XX","correct":true},{"t":"XY","why":"XY is male."},{"t":"YY","why":"Humans do not have a YY combination."}],"ok":"Females are XX and males are XY."},{"type":"mcq","q":"What is the difference between genotype and phenotype?","options":[{"t":"Genotype is the alleles present; phenotype is the characteristic shown","correct":true},{"t":"They are the same thing","why":"Genotype is the alleles; phenotype is what shows."},{"t":"Genotype is what shows; phenotype is the alleles","why":"It is the other way round."}],"ok":"Genotype = alleles you have; phenotype = the characteristic that shows."},{"type":"tf","q":"Cystic fibrosis is caused by a recessive allele.","answer":true,"why":"Cystic fibrosis is a recessive inherited disorder, so two recessive alleles are needed."},{"type":"mcq","q":"A homozygous organism has...","options"
