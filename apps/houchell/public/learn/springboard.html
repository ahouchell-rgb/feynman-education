"GE-EX":{"code":"GE-EX","title":"Energy — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for the Energy topic: calculations, structured questions and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A 2000 W kettle is switched on for 90 s. Calculate the energy it transfers.","hint":"energy = power x time","answer":180000,"unit":"J","ok":"2000 x 90 = 180 000 J."},{"type":"numeric","kicker":"Exam · calculate","q":"A motor is supplied with 500 J and usefully lifts a load, transferring 350 J to the gravitational store. Calculate the efficiency as a percentage.","hint":"efficiency = useful / total x 100","answer":70,"unit":"%","ok":"350 / 500 x 100 = 70%."},{"type":"numeric","kicker":"Exam · calculate","q":"A 1500 kg car accelerates from rest to 20 m/s. Calculate its kinetic energy at 20 m/s.","hint":"Ek = 0.5 x mass x speed squared","answer":300000,"unit":"J","ok":"0.5 x 1500 x 20 squared = 0.5 x 1500 x 400 = 300 000 J."},{"type":"mcq","q":"A pendulum swings from its highest point to its lowest point. Which best describes the main energy transfer (ignoring air resistance)?","options":[{"t":"Gravitational potential store to kinetic store","correct":true},{"t":"Kinetic store to chemical store","why":"No chemical store is involved in a swinging pendulum."},{"t":"Thermal store to gravitational store","why":"Heating is not the main transfer in an ideal pendulum."}],"ok":"As it falls, the gravitational store transfers to the kinetic store."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student claims their electric heater is 100% efficient because all the electrical energy ends up as heat. Explain whether the student is correct.","scheme":["For a heater, heat IS the useful output (1)","so nearly all the electrical input is usefully transferred (1)","a heater can be treated as ~100% efficient (1)","but some energy may be transferred as light/sound, which are not useful, so strictly just under 100% (1)"],"model":"For a heater the useful output is thermal energy, so almost all the input is useful — heaters are close to 100% efficient. Strictly, a little energy is transferred as light or sound (not useful), so it is just below 100%."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"A student wants to find out which of three materials is the best thermal insulator. Plan an investigation, including the variables they must control to make it a fair test.","scheme":["Method: wrap identical containers of hot water, each in one material (1)","Use the same starting temperature and same volume/mass of water (1)","Measure the water temperature with a thermometer at set time intervals (1)","Control variables: same volume of water, same start temperature, same thickness of material, same surroundings (1)","The best insulator keeps the water hottest / smallest temperature drop (1)","Repeat and compare to improve reliability (1)"],"context":"Three materials are tested: bubble wrap, cotton wool and foil.","model":"Pour the same volume of water at the same starting temperature into identical containers, each wrapped in one material of the same thickness. Record the temperature every minute for the same time. Keep volume, start temperature, thickness and surroundings the same (fair test). The best insulator gives the smallest temperature drop. Repeat for reliability."}]},
"GL1":{"code":"GL1","title":"Circuit basics & symbols","discipline":"physics","blurb":"Charge and current, the units, circuit symbols and how to connect meters.","vocab":[{"term":"charge","definition":"a property of particles, measured in coulombs; current is the flow of charge","say":"charj"},{"term":"current","definition":"the rate of flow of electric charge, measured in amperes","say":"cur-rent"},{"term":"coulomb","definition":"the unit of electric charge, symbol C","say":"koo-lom"},{"term":"ampere","definition":"the unit of current, often shortened to amp, symbol A","say":"am-peer"},{"term":"ammeter","definition":"a meter that measures current, connected in series","say":"am-meet-er"}],"facts":["Current is the rate of flow of electric charge: charge = current x time (Q = I t).","Charge is measured in coulombs (C) and current in amperes (A). An ammeter measures current and is connected in series.","A cell or battery provides the potential difference that pushes the charge around the circuit.","Standard circuit symbols include the cell, battery, switch, lamp, resistor, variable resistor, ammeter, voltmeter, diode, LED, fuse, thermistor and LDR.","Current only flows when the circuit is complete (a closed loop with no breaks)."],"misconceptions":[{"wrong":"An ammeter should be connected in parallel.","right":"An ammeter measures the current through a component, so it goes in series; a voltmeter goes in parallel."},{"wrong":"Charge and current are the same thing.","right":"Current is the rate of flow of charge: charge = current x time."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A current of 4 A flows for 5 s. How much charge flows past a point?","hint":"charge = current x time","answer":20,"unit":"C","ok":"4 x 5 = 20 C."},{"type":"numeric","kicker":"Work it out","q":"How much charge flows when a current of 0.5 A flows for 60 s?","hint":"charge = current x time","answer":30,"unit":"C","ok":"0.5 x 60 = 30 C."},{"type":"mcq","q":"What is electric current?","options":[{"t":"The rate of flow of electric charge","correct":true},{"t":"The energy stored in a battery","why":"That is closer to the chemical store; current is flow of charge."},{"t":"The resistance of a wire","why":"Resistance opposes current; it is not the current itself."}],"ok":"Current is the rate of flow of charge, measured in amperes."},{"type":"mcq","q":"How should an ammeter be connected to measure the current through a lamp?","options":[{"t":"In series with the lamp","correct":true},{"t":"In parallel with the lamp","why":"A voltmeter goes in parallel; an ammeter goes in series."},{"t":"It does not matter","why":"Connection matters: an ammeter must be in series."}],"ok":"An ammeter is connected in series so the same current flows through it."},{"type":"mcq","q":"What is the unit of electric charge?","options":[{"t":"The coulomb (C)","correct":true},{"t":"The ampere (A)","why":"The ampere is the unit of current, not charge."},{"t":"The volt (V)","why":"The volt is the unit of potential difference."}],"ok":"Charge is measured in coulombs."},{"type":"tf","q":"Current can flow even if there is a break in the circuit.","answer":false,"why":"Current only flows in a complete, unbroken circuit."},{"type":"mcq","q":"A battery in a circuit provides the...","options":[{"t":"potential difference that pushes the charge round","correct":true},{"t":"resistance that stops the current","why":"A battery drives the current; it does not stop it."},{"t":"charge that is used up and destroyed","why":"Charge is not used up; energy is transferred."}],"ok":"The cell or battery provides the potential difference that drives the charge."}]},
"GL2":{"code":"GL2","title":"Resistance & Ohm's law","discipline":"physics","blurb":"Potential difference, resistance, the V = IR equation and the resistance of a wire.","vocab":[{"term":"potential difference","definition":"the energy transferred per coulomb of charge, measured in volts","say":"po-ten-shal"},{"term":"resistance","definition":"how much a component opposes the current, measured in ohms","say":"ree-zis-tance"},{"term":"ohm","definition":"the unit of resistance, symbol the Greek letter omega","say":"ohm"},{"term":"voltmeter","definition":"a meter that measures potential difference, connected in parallel","say":"volt-meet-er"}],"facts":["Potential difference (voltage) is the energy transferred per coulomb of charge. It is measured in volts with a voltmeter connected in parallel.","Ohm's law links them: potential difference = current x resistance (V = I R). Resistance is measured in ohms.","Resistance opposes the current, so for the same potential difference, a higher resistance gives a smaller current.","The resistance of a wire increases as the wire gets longer.","Required practical: change the length of a wire, measure the current and potential difference, and calculate resistance with R = V / I."],"misconceptions":[{"wrong":"A voltmeter should be connected in series.","right":"A voltmeter measures the p.d. across a component, so it is connected in parallel with it."},{"wrong":"More resistance gives more current.","right":"Resistance opposes current, so more resistance gives less current for the same potential difference."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A 6 ohm resistor carries a current of 2 A. What is the potential difference across it?","hint":"V = I x R","answer":12,"unit":"V","ok":"2 x 6 = 12 V."},{"type":"numeric","kicker":"Work it out","q":"A component has 12 V across it and a current of 3 A. What is its resistance?","hint":"R = V / I","answer":4,"unit":"ohm","ok":"12 / 3 = 4 ohm."},{"type":"numeric","kicker":"Work it out","q":"A 5 ohm resistor has 10 V across it. What current flows through it?","hint":"I = V / R","answer":2,"unit":"A","ok":"10 / 5 = 2 A."},{"type":"mcq","q":"How is a voltmeter connected to measure the p.d. across a resistor?","options":[{"t":"In parallel with the resistor","correct":true},{"t":"In series with the resistor","why":"That is how an ammeter is connected; a voltmeter goes in parallel."},{"t":"In place of the battery","why":"A voltmeter measures across a component, not in place of the supply."}],"ok":"A voltmeter is connected in parallel across the component."},{"type":"mcq","q":"For a fixed potential difference, what happens to the current if the resistance increases?","options":[{"t":"The current decreases","correct":true},{"t":"The current increases","why":"Resistance opposes current, so more resistance means less current."},{"t":"The current stays the same","why":"V = IR, so for fixed V, more R means less I."}],"ok":"Higher resistance gives a smaller current for the same p.d."},{"type":"mcq","q":"In the required practical, what happens to the resistance as the wire gets longer?","options":[{"t":"The resistance increases","correct":true},{"t":"The resistance decreases","why":"A longer wire has more resistance, not less."},{"t":"The resistance stays the same","why":"Length affects resistance; longer means more."}],"ok":"A longer wire has a greater resistance."},{"type":"tf","q":"Potential difference is measured in volts.","answer":true,"why":"Potential difference (voltage) is measured in volts, using a voltmeter in parallel."}]},
"GL3":{"code":"GL3","title":"Components & I–V graphs","discipline":"physics","blurb":"How resistors, lamps, diodes, thermistors and LDRs behave, and their I–V characteristics.","vocab":[{"term":"ohmic conductor","definition":"a component whose resistance stays constant, so current is proportional to potential difference","say":"oh-mic"},{"term":"filament lamp","definition":"a lamp whose resistance increases as it heats up","say":"fil-a-ment lamp"},{"term":"diode","definition":"a component that only lets current flow one way","say":"dy-ode"},{"term":"thermistor","definition":"a resistor whose resistance falls as its temperature rises","say":"ther-mis-tor"},{"term":"light-dependent resistor","definition":"an LDR whose resistance falls as the light gets brighter","say":"el-dee-arr"}],"facts":["For an ohmic conductor at constant temperature, current is directly proportional to potential difference, so the I-V graph is a straight line through the origin.","A filament lamp's resistance increases as it heats up, so its I-V graph is an S-shaped curve.","A diode only allows current to flow in one direction and has a very high resistance the other way.","A thermistor's resistance decreases as its temperature rises, which is useful in temperature sensors.","A light-dependent resistor (LDR) has a resistance that decreases as the light intensity rises, useful in light sensors.","Required practical: investigate the I-V characteristics of a resistor, a filament lamp and a diode."],"misconceptions":[{"wrong":"A filament lamp is an ohmic conductor.","right":"Its resistance rises as it heats, so its I-V graph curves; it is not ohmic."},{"wrong":"A thermistor's resistance rises when it gets hotter.","right":"A thermistor's resistance falls as temperature rises."}],"questions":[{"type":"mcq","q":"What is the I-V graph of an ohmic conductor at constant temperature?","options":[{"t":"A straight line through the origin","correct":true},{"t":"An S-shaped curve","why":"That is a filament lamp."},{"t":"A line on one side of the origin only","why":"That is a diode."}],"ok":"For an ohmic conductor, current is proportional to p.d., a straight line through the origin."},{"type":"mcq","q":"Why does a filament lamp's I-V graph curve?","options":[{"t":"Its resistance increases as the filament heats up","correct":true},{"t":"Its resistance stays constant","why":"If it were constant the graph would be straight."},{"t":"It only conducts one way","why":"That describes a diode, not a lamp."}],"ok":"As the filament heats up its resistance rises, so the graph curves."},{"type":"mcq","q":"What does a diode do?","options":[{"t":"Lets current flow in one direction only","correct":true},{"t":"Stores charge for later","why":"That is a capacitor."},{"t":"Keeps resistance constant both ways","why":"A diode has a very high resistance one way."}],"ok":"A diode conducts one way and blocks the other."},{"type":"mcq","q":"What happens to a thermistor's resistance as it gets hotter?","options":[{"t":"It decreases","correct":true},{"t":"It increases","why":"A thermistor's resistance falls as it heats up."},{"t":"It stays the same","why":"A thermistor responds to temperature."}],"ok":"A thermistor's resistance falls as temperature rises."},{"type":"mcq","q":"An LDR is in bright light. What is its resistance like?","options":[{"t":"Low","correct":true},{"t":"High","why":"Bright light lowers an LDR's resistance."},{"t":"Infinite","why":"Bright light reduces its resistance, not switches it off."}],"ok":"Brighter light gives an LDR a lower resistance."},{"type":"categorise","q":"Match each component to its behaviour.","bins":["Resistance rises when hot","Resistance falls when hot","Resistance falls in bright light"],"items":[{"t":"Filament lamp","bin":"Resistance rises when hot"},{"t":"Thermistor","bin":"Resistance falls when hot"},{"t":"LDR","bin":"Resistance falls in bright light"}],"ok":"Filament lamp heats and gains resistance; thermistor loses it; LDR responds to light.","bad":"Filament lamp: more resistance when hot. Thermistor: less when hot. LDR: less in bright light."},{"type":"tf","q":"A diode has a very high resistance to current flowing the wrong way.","answer":true,"why":"A diode conducts one way and has a very high resistance in the reverse direction."}]},
"GL4":{"code":"GL4","title":"Series & parallel circuits","discipline":"physics","blurb":"The current, potential difference and resistance rules for series and parallel circuits.","vocab":[{"term":"series circuit","definition":"a circuit with a single loop, so the same current flows through every part","say":"seer-eez"},{"term":"parallel circuit","definition":"a circuit with branches, so each branch has the same potential difference","say":"pa-ra-lel"}],"facts":["In a series circuit the current is the same everywhere, the potential differences across components add up to the supply, and the total resistance is the sum of the resistors.","In a series circuit, a single break stops the whole circuit.","In a parallel circuit the potential difference is the same across each branch, and the branch currents add up to the total current from the supply.","Adding resistors in series increases the total resistance.","Adding resistors in parallel decreases the total resistance, because the current has more paths to flow through."],"misconceptions":[{"wrong":"Adding resistors in parallel increases the total resistance.","right":"Extra parallel paths let more current flow, so the total resistance decreases."},{"wrong":"Current is shared equally and used up around a series circuit.","right":"In series the current is the same everywhere; it is not used up."}],"questions":[{"type":"mcq","q":"How does the current vary around a series circuit?","options":[{"t":"It is the same everywhere","correct":true},{"t":"It is largest near the battery","why":"Current is the same all the way round a series loop."},{"t":"It splits between components","why":"Current splits in a parallel circuit, not a series one."}],"ok":"In series, the current is the same at every point."},{"type":"mcq","q":"In a parallel circuit, how does the potential difference compare across each branch?","options":[{"t":"It is the same across each branch","correct":true},{"t":"It adds up across the branches","why":"That is the series rule; in parallel the p.d. is shared equally."},{"t":"It is zero in every branch","why":"Each branch has the full supply p.d."}],"ok":"Each parallel branch has the same potential difference."},{"type":"categorise","q":"Sort each statement under series or parallel.","bins":["Series","Parallel"],"items":[{"t":"Same current everywhere","bin":"Series"},{"t":"Same p.d. across each branch","bin":"Parallel"},{"t":"P.d.s add up to the supply","bin":"Series"},{"t":"Branch currents add up","bin":"Parallel"},{"t":"One break stops everything","bin":"Series"}],"ok":"Series shares the current; parallel shares the voltage.","bad":"Remember: series = same current; parallel = same p.d. across each branch."},{"type":"numeric","kicker":"Work it out","q":"Two resistors, 4 ohm and 6 ohm, are connected in series. What is the total resistance?","hint":"In series, resistances add up.","answer":10,"unit":"ohm","ok":"4 + 6 = 10 ohm."},{"type":"multi","q":"Tap the true statements about a parallel circuit.","items":[{"t":"Each branch has the same p.d.","correct":true},{"t":"The branch currents add up to the total","correct":true},{"t":"Adding branches lowers the total resistance","correct":true},{"t":"The current is the same in every branch"}],"ok":"In parallel: equal p.d., branch currents add, lower total resistance.","bad":"The branch current is only equal if branches are identical; in general it splits."},{"type":"tf","q":"In a series circuit, a single break stops the whole circuit.","answer":true,"why":"There is only one path, so a break anywhere stops all the current."},{"type":"mcq","q":"What happens to the total resistance when you add another resistor in parallel?","options":[{"t":"It decreases","correct":true},{"t":"It increases","why":"Extra parallel paths reduce the total resistance."},{"t":"It stays the same","why":"More paths means less total resistance."}],"ok":"Adding a parallel branch gives more paths, lowering the total resistance."}]},
"GL5":{"code":"GL5","title":"Electrical power & energy","discipline":"physics","blurb":"Calculating electrical power and the energy transferred by appliances.","vocab":[{"term":"electrical power","definition":"the rate at which an appliance transfers energy, measured in watts","say":"ee-lec-tri-cal pow-er"},{"term":"energy transferred","definition":"the total energy an appliance moves, in joules","say":"energy transferred"}],"facts":["Electrical power = potential difference x current (P = V I).","Electrical power can also be found from P = current squared x resistance (P = I squared R).","Energy transferred = power x time (E = P t).","Energy transferred can also be found from E = charge x potential difference (E = Q V).","A higher power rating means the appliance transfers energy more quickly."],"misconceptions":[{"wrong":"A more powerful appliance always uses more energy in total.","right":"Power is the rate; total energy also depends on time (E = P x t)."},{"wrong":"Power and energy are the same thing.","right":"Power is energy per second; energy is power multiplied by time."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"An appliance runs at 230 V and draws a current of 3 A. What is its power?","hint":"P = V x I","answer":690,"unit":"W","ok":"230 x 3 = 690 W."},{"type":"numeric","kicker":"Work it out","q":"A current of 4 A flows through a 10 ohm resistor. What power is dissipated?","hint":"P = current squared x resistance","answer":160,"unit":"W","ok":"4 squared x 10 = 160 W."},{"type":"numeric","kicker":"Work it out","q":"A 1500 W heater runs for 120 s. How much energy does it transfer?","hint":"E = power x time","answer":180000,"unit":"J","ok":"1500 x 120 = 180 000 J."},{"type":"numeric","kicker":"Work it out","q":"A charge of 20 C moves through a p.d. of 12 V. How much energy is transferred?","hint":"E = charge x p.d.","answer":240,"unit":"J","ok":"20 x 12 = 240 J."},{"type":"mcq","q":"What does the power rating of an appliance tell you?","options":[{"t":"How much energy it transfers each second","correct":true},{"t":"How much energy it stores","why":"Power is a rate of transfer, not a store."},{"t":"How long it can run for","why":"Run time depends on the energy supply, not the power rating."}],"ok":"Power is the energy transferred per second, in watts."},{"type":"tf","q":"A 2000 W appliance transfers energy faster than a 1000 W one.","answer":true,"why":"Higher power means a faster rate of energy transfer."},{"type":"mcq","q":"Which equation gives the energy transferred by an appliance over time?","options":[{"t":"energy = power x time","correct":true},{"t":"energy = power / time","why":"Energy is power multiplied by time, not divided."},{"t":"energy = power x resistance","why":"That combination does not give energy."}],"ok":"Energy transferred = power x time (E = Pt)."}]},
"GL6":{"code":"GL6","title":"Mains electricity & the National Grid","discipline":"physics","blurb":"a.c. and d.c., the three-pin plug and safety, and how the National Grid transmits power.","vocab":[{"term":"alternating current","definition":"current that repeatedly reverses direction, like the UK mains","say":"al-ter-nay-ting"},{"term":"direct current","definition":"current that flows in one direction, like from a battery","say":"di-rect current"},{"term":"live wire","definition":"the brown wire that carries the 230 V supply","say":"live wire"},{"term":"earth wire","definition":"the green-and-yellow safety wire that only carries current in a fault","say":"erth wire"},{"term":"step-up transformer","definition":"a transformer that raises the potential difference for transmission","say":"step-up trans-form-er"}],"facts":["UK mains electricity is alternating current (a.c.) at about 230 V and a frequency of 50 Hz. Cells and batteries supply direct current (d.c.).","A three-core cable has a live wire (brown, at 230 V), a neutral wire (blue, near 0 V, completing the circuit) and an earth wire (green-and-yellow, a safety wire).","The earth wire and a fuse protect against faults; the earth wire only carries a current if there is a fault.","The National Grid uses step-up transformers to raise the voltage for transmission, which lowers the current.","A lower current means less energy is wasted heating the transmission cables, so transmission is more efficient. Step-down transformers then lower the voltage for safe use."],"misconceptions":[{"wrong":"The earth wire carries the current during normal use.","right":"The earth wire is a safety wire; it only carries current if there is a fault."},{"wrong":"Transformers create extra energy for the grid.","right":"Transformers change the voltage; they do not create energy."}],"questions":[{"type":"mcq","q":"UK mains electricity is supplied as...","options":[{"t":"alternating current at about 230 V and 50 Hz","correct":true},{"t":"direct current at 230 V","why":"Batteries give d.c.; the mains is a.c."},{"t":"alternating current at 12 V","why":"12 V is far too low for the UK mains."}],"ok":"UK mains: a.c., about 230 V, 50 Hz."},{"type":"categorise","q":"Match each wire to its job.","bins":["Live","Neutral","Earth"],"items":[{"t":"Brown, carries the 230 V supply","bin":"Live"},{"t":"Blue, completes the circuit","bin":"Neutral"},{"t":"Green-and-yellow safety wire","bin":"Earth"}],"ok":"Live (brown), neutral (blue), earth (green-and-yellow).","bad":"Live carries the supply, neutral completes the circuit, earth is for safety."},{"type":"mcq","q":"When does the earth wire carry a current?","options":[{"t":"Only when there is a fault","correct":true},{"t":"All the time, during normal use","why":"In normal use the earth carries no current."},{"t":"Never, under any circumstances","why":"It carries current in a fault, protecting the user."}],"ok":"The earth wire is a safety wire that carries current only in a fault."},{"type":"mcq","q":"Why does the National Grid use step-up transformers before long-distance transmission?","options":[{"t":"A higher voltage gives a lower current, so less energy is wasted heating the cables","correct":true},{"t":"A higher voltage makes the electricity travel faster","why":"Speed is not the point; it is reducing energy loss."},{"t":"Transformers create extra energy","why":"Transformers change voltage; they do not create energy."}],"ok":"Higher voltage means lower current, so less energy is lost as heat in the cables."},{"type":"tf","q":"Cells and batteries supply alternating current.","answer":false,"why":"Cells and batteries supply direct current (d.c.); the mains supplies a.c."},{"type":"mcq","q":"What do step-down transformers do in the National Grid?","options":[{"t":"Lower the voltage to a safer level for homes and factories","correct":true},{"t":"Raise the voltage for transmission","why":"That is a step-up transformer."},{"t":"Turn a.c. into d.c.","why":"Transformers change voltage; they do not change a.c. to d.c."}],"ok":"Step-down transformers lower the voltage for safe use."},{"type":"multi","q":"Tap the correct facts about the three-pin plug.","items":[{"t":"The live wire is brown and at 230 V","correct":true},{"t":"The neutral wire is blue","correct":true},{"t":"The earth wire is green-and-yellow","correct":true},{"t":"The earth wire carries current in normal use"}],"ok":"Live (brown), neutral (blue), earth (green-and-yellow), earth for safety only.","bad":"The earth carries current only in a fault, not in normal use."}]},
"GL-EX":{"code":"GL-EX","title":"Electricity — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Electricity: calculations, I–V graphs and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A resistor has a current of 0.5 A through it and a p.d. of 6 V across it. Calculate its resistance.","hint":"R = V / I","answer":12,"unit":"ohm","ok":"6 / 0.5 = 12 ohm."},{"type":"numeric","kicker":"Exam · calculate","q":"A 920 W microwave runs for 60 s. Calculate the energy it transfers.","hint":"energy = power x time","answer":55200,"unit":"J","ok":"920 x 60 = 55 200 J."},{"type":"numeric","kicker":"Exam · calculate","q":"A hairdryer works at 230 V and draws a current of 5 A. Calculate its power.","hint":"P = V x I","answer":1150,"unit":"W","ok":"230 x 5 = 1150 W."},{"type":"mcq","q":"A component's I-V graph is a straight line through the origin. What is the component?","options":[{"t":"An ohmic conductor (fixed resistor) at constant temperature","correct":true},{"t":"A filament lamp","why":"A filament lamp gives a curved graph."},{"t":"A diode","why":"A diode conducts on one side only."}],"ok":"A straight line through the origin shows current is proportional to p.d. — an ohmic conductor."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain why the National Grid uses transformers to transmit electrical power at very high voltage. Refer to current and energy loss in your answer.","scheme":["Step-up transformer raises the voltage (1)","For a given power, a higher voltage means a lower current (P = VI) (1)","The energy wasted heating the cables depends on the current (P = I squared R) (1)","A lower current means much less energy is wasted as heat (1)","so transmission is more efficient (1)","Step-down transformers then lower the voltage to a safe level for use (1)"],"model":"Step-up transformers raise the transmission voltage. For a fixed power, higher voltage means lower current. Because the heating loss in the cables depends on current squared (I squared R), a lower current wastes far less energy as heat, making transmission efficient. Step-down transformers then reduce the voltage to a safe level for homes."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A house has its lights wired in parallel rather than in series. Explain two advantages of this.","scheme":["Each lamp gets the full supply potential difference / is at full brightness (1)","because in parallel the p.d. is the same across each branch (1)","If one lamp breaks, the others stay on (1)","because each lamp is on its own branch / the circuit is not broken (1)"],"model":"In parallel each lamp has the full mains p.d., so all are at full brightness. Also, because each lamp is on its own branch, if one fails the others keep working — a break in one branch does not stop the rest."}]},
"GD1":{"code":"GD1","title":"Density","discipline":"physics","blurb":"What density is, the equation, and the required practical for measuring it.","vocab":[{"term":"density","definition":"the mass per unit volume of a material","say":"den-sit-ee"},{"term":"volume","definition":"the amount of space an object takes up, in cubic metres or cubic centimetres","say":"vol-yoom"},{"term":"mass","definition":"the amount of matter in an object, in kilograms","say":"mass"}],"facts":["Density is the mass per unit volume: density = mass / volume.","Density is measured in kilograms per cubic metre (kg/m cubed) or grams per cubic centimetre (g/cm cubed).","To find the density of a regular solid: measure the mass on a balance and calculate the volume from its dimensions.","To find the volume of an irregular solid, lower it into water and measure the volume of water it displaces.","An object floats on a liquid if it is less dense than that liquid."],"misconceptions":[{"wrong":"Heavier objects are always denser.","right":"Density compares mass to volume; a large light object can be less dense than a small heavy one."},{"wrong":"Density and mass are the same.","right":"Density is mass divided by volume, not just mass."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A block has a mass of 300 g and a volume of 60 cm cubed. What is its density?","hint":"density = mass / volume","answer":5,"unit":"g/cm3","ok":"300 / 60 = 5 g/cm cubed."},{"type":"numeric","kicker":"Work it out","q":"A liquid has a density of 0.8 g/cm cubed and a volume of 50 cm cubed. What is its mass?","hint":"mass = density x volume","answer":40,"unit":"g","ok":"0.8 x 50 = 40 g."},{"type":"numeric","kicker":"Work it out","q":"An object has a mass of 120 g and a density of 4 g/cm cubed. What is its volume?","hint":"volume = mass / density","answer":30,"unit":"cm3","ok":"120 / 4 = 30 cm cubed."},{"type":"mcq","q":"How can you find the volume of an irregular stone?","options":[{"t":"Lower it into water and measure the water it displaces","correct":true},{"t":"Measure its length, width and height","why":"That only works for a regular shape."},{"t":"Weigh it on a balance","why":"A balance gives mass, not volume."}],"ok":"An irregular object's volume equals the volume of water it displaces."},{"type":"tf","q":"A small lump of lead can be denser than a large block of polystyrene.","answer":true,"why":"Density compares mass to volume; lead packs much more mass into each cm cubed."},{"type":"mcq","q":"An object floats on water. What does this tell you?","options":[{"t":"It is less dense than water","correct":true},{"t":"It is heavier than water","why":"Floating depends on density, not just mass."},{"t":"It has no mass","why":"All objects have mass; floating is about density."}],"ok":"An object floats if it is less dense than the liquid."},{"type":"mcq","q":"What are the units of density?","options":[{"t":"kg/m cubed or g/cm cubed","correct":true},{"t":"kg or g","why":"Those are units of mass, not density."},{"t":"m cubed or cm cubed","why":"Those are units of volume, not density."}],"ok":"Density is mass per volume, so kg/m cubed or g/cm cubed."}]},
"GD2":{"code":"GD2","title":"States & internal energy","discipline":"physics","blurb":"The particle model of solids, liquids and gases, changes of state and internal energy.","vocab":[{"term":"internal energy","definition":"the total kinetic and potential energy of all the particles in a system","say":"in-ter-nal energy"},{"term":"change of state","definition":"melting, freezing, boiling, condensing or subliming — a physical change","say":"chaynj of stayt"},{"term":"particle model","definition":"the idea that all matter is made of tiny particles in constant motion","say":"par-ti-cle model"}],"facts":["In a solid the particles are packed in a fixed regular pattern and only vibrate; in a liquid they are close but can move past each other; in a gas they are far apart and move quickly in all directions.","Changes of state are physical changes: the substance stays the same and mass is conserved, so they can be reversed.","Melting, boiling and subliming take energy in; freezing and condensing give energy out.","Internal energy is the total kinetic and potential energy of the particles. Heating increases internal energy.","Sublimation is when a substance changes directly between solid and gas."],"misconceptions":[{"wrong":"When ice melts its mass increases.","right":"Melting is a physical change and mass is conserved — the water has the same mass as the ice."},{"wrong":"Heating always raises the temperature.","right":"During a change of state the temperature stays constant while bonds between particles break."}],"questions":[{"type":"mcq","q":"How are the particles arranged in a solid?","options":[{"t":"In a fixed regular pattern, vibrating in place","correct":true},{"t":"Far apart, moving quickly in all directions","why":"That is a gas."},{"t":"Close together but flowing past each other","why":"That is a liquid."}],"ok":"In a solid the particles are in a fixed pattern and only vibrate."},{"type":"categorise","q":"Does each change of state take energy in or give energy out?","bins":["Energy in","Energy out"],"items":[{"t":"Melting","bin":"Energy in"},{"t":"Boiling","bin":"Energy in"},{"t":"Freezing","bin":"Energy out"},{"t":"Condensing","bin":"Energy out"}],"ok":"Becoming more spread out (melting, boiling) takes energy in.","bad":"Going to a more spread-out state needs energy in; the reverse gives energy out."},{"type":"tf","q":"When 50 g of ice melts, you get 50 g of water.","answer":true,"why":"Changes of state conserve mass, so no particles are gained or lost."},{"type":"mcq","q":"Why is melting called a physical change?","options":[{"t":"The substance stays the same and the change can be reversed","correct":true},{"t":"A new substance is made","why":"No new substance forms in melting."},{"t":"Atoms are destroyed","why":"Atoms are never destroyed in a change of state."}],"ok":"Melting is physical: same substance, mass conserved, reversible."},{"type":"mcq","q":"What happens to a substance's internal energy when it is heated?","options":[{"t":"It increases","correct":true},{"t":"It decreases","why":"Heating adds energy, raising internal energy."},{"t":"It stays the same","why":"Heating always changes the energy of the particles."}],"ok":"Heating raises the internal energy of the particles."},{"type":"mcq","q":"What is sublimation?","options":[{"t":"A substance changing directly between solid and gas","correct":true},{"t":"A liquid freezing into a solid","why":"That is freezing."},{"t":"A gas condensing into a liquid","why":"That is condensing."}],"ok":"Sublimation goes straight from solid to gas, or gas to solid."},{"type":"multi","q":"Tap the true statements about gases.","items":[{"t":"The particles are far apart","correct":true},{"t":"The particles move quickly in all directions","correct":true},{"t":"A gas can be compressed easily","correct":true},{"t":"The particles are in fixed positions"}],"ok":"Gas particles are far apart, fast-moving and easily squashed.","bad":"Particles are only in fixed positions in a solid."}]},
"GD3":{"code":"GD3","title":"Specific latent heat","discipline":"physics","blurb":"The energy needed to change state without changing temperature, and the E = mL equation.","vocab":[{"term":"specific latent heat","definition":"the energy needed to change the state of 1 kg of a substance with no temperature change","say":"lay-tent heat"},{"term":"latent heat of fusion","definition":"the energy to melt, or freeze, 1 kg of a substance","say":"few-zhun"},{"term":"latent heat of vaporisation","definition":"the energy to boil, or condense, 1 kg of a substance","say":"vay-por-eye-zay-shun"}],"facts":["Specific latent heat is the energy needed to change the state of 1 kg of a substance with no change in temperature.","The energy for a change of state = mass x specific latent heat (E = m L).","Latent heat of fusion is for melting or freezing; latent heat of vaporisation is for boiling or condensing.","The latent heat of vaporisation is usually much larger than the latent heat of fusion.","During a change of state the temperature stays constant, shown as a flat section on a heating graph, because the energy is breaking bonds between particles."],"misconceptions":[{"wrong":"The temperature rises steadily while ice is melting.","right":"While melting, the temperature stays constant; the energy breaks bonds between particles."},{"wrong":"Boiling and melting need the same energy per kilogram.","right":"Vaporisation usually needs much more energy than fusion."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"The specific latent heat of fusion of ice is 334 000 J/kg. How much energy melts 2 kg of ice?","hint":"E = mass x specific latent heat","answer":668000,"unit":"J","ok":"2 x 334 000 = 668 000 J."},{"type":"numeric","kicker":"Work it out","q":"The specific latent heat of vaporisation of water is 2 260 000 J/kg. How much energy boils away 0.5 kg?","hint":"E = mass x specific latent heat","answer":1130000,"unit":"J","ok":"0.5 x 2 260 000 = 1 130 000 J."},{"type":"numeric","kicker":"Work it out","q":"It takes 100 200 J to melt 0.3 kg of a solid. What is its specific latent heat of fusion?","hint":"specific latent heat = energy / mass","answer":334000,"unit":"J/kg","ok":"100 200 / 0.3 = 334 000 J/kg."},{"type":"mcq","q":"What does the flat section on a heating graph show?","options":[{"t":"A change of state, where the temperature stays constant","correct":true},{"t":"The substance cooling down","why":"The substance is being heated, not cooled."},{"t":"The substance heating up fastest","why":"A flat line means no temperature change at all."}],"ok":"The flat part is a change of state, where energy breaks bonds, not raising temperature."},{"type":"mcq","q":"Which is usually larger for the same substance?","options":[{"t":"The latent heat of vaporisation","correct":true},{"t":"The latent heat of fusion","why":"Fusion (melting) usually needs less energy than vaporisation."},{"t":"They are always equal","why":"They are different; vaporisation is usually much larger."}],"ok":"Vaporisation usually needs much more energy than fusion."},{"type":"tf","q":"During a change of state, the energy supplied raises the temperature.","answer":false,"why":"During a change of state the temperature is constant; the energy breaks bonds between particles."},{"type":"mcq","q":"Where does the energy go while a pure substance is melting?","options":[{"t":"Into breaking the bonds between particles","correct":true},{"t":"Into raising the temperature","why":"Temperature is constant during melting."},{"t":"Into creating new particles","why":"Particles are not created; bonds are broken."}],"ok":"The energy breaks the bonds between particles, so the temperature stays constant."}]},
"GD4":{"code":"GD4","title":"Gas pressure & temperature","discipline":"physics","blurb":"How particle collisions cause gas pressure, and how temperature and work change it.","vocab":[{"term":"gas pressure","definition":"the force per unit area from gas particles colliding with the walls of their container","say":"gas presh-ure"}],"facts":["Gas pressure is caused by particles colliding with the walls of their container.","Raising the temperature makes the particles move faster, so they hit the walls harder and more often, increasing the pressure (at constant volume).","Squashing a gas into a smaller volume makes the collisions more frequent, so the pressure increases.","Higher tier: doing work on a gas, for example pushing in a bicycle pump, transfers energy to the particles and raises the gas's temperature, even with no heating."],"misconceptions":[{"wrong":"Gas pressure comes from the weight of the gas particles.","right":"Gas pressure comes from fast-moving particles colliding with the container walls."},{"wrong":"Heating a sealed gas does not change its pressure.","right":"Heating makes particles hit the walls harder and more often, so the pressure rises."}],"questions":[{"type":"mcq","q":"What causes the pressure of a gas on its container?","options":[{"t":"Particles colliding with the walls","correct":true},{"t":"Particles dissolving into the walls","why":"The particles bounce off; they do not dissolve."},{"t":"The weight of the still particles","why":"Gas particles are not still; they move quickly."}],"ok":"Gas pressure is caused by particle collisions with the walls."},{"type":"mcq","q":"A sealed, rigid container of gas is heated. What happens to the pressure?","options":[{"t":"It increases, because particles hit the walls harder and more often","correct":true},{"t":"It decreases, because the gas expands","why":"The container is rigid, so the gas cannot expand."},{"t":"It stays the same","why":"Hotter particles raise the pressure in a fixed volume."}],"ok":"Heating a gas in a fixed volume increases its pressure."},{"type":"mcq","q":"A gas is squashed into half the volume at the same temperature. What happens to the pressure?","options":[{"t":"It increases, because collisions are more frequent","correct":true},{"t":"It decreases","why":"Less space means more frequent collisions, so higher pressure."},{"t":"It stays the same","why":"Reducing the volume increases the pressure."}],"ok":"A smaller volume means more frequent collisions and a higher pressure."},{"type":"tf","q":"Heating a gas makes its particles move faster.","answer":true,"why":"More thermal energy means the particles move faster, hitting the walls harder and more often."},{"type":"mcq","q":"Higher tier: a bicycle pump warms up when you push the plunger in quickly with a finger over the end. Why?","options":[{"t":"Work is done on the gas, raising its internal energy and temperature","correct":true},{"t":"A hidden flame heats the gas","why":"There is no flame; the energy comes from the work you do."},{"t":"The metal creates new energy","why":"Energy is transferred by the work done, not created."}],"ok":"Doing work on a gas raises its internal energy and temperature."}]},
"GD-EX":{"code":"GD-EX","title":"Particle model — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for the Particle model: density, latent heat and gas pressure.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A metal cube has sides of 2 cm (volume 8 cm cubed) and a mass of 72 g. Calculate its density.","hint":"density = mass / volume","answer":9,"unit":"g/cm3","ok":"72 / 8 = 9 g/cm cubed."},{"type":"numeric","kicker":"Exam · calculate","q":"How much energy is needed to melt 0.2 kg of ice? (specific latent heat of fusion = 334 000 J/kg)","hint":"E = mass x specific latent heat","answer":66800,"unit":"J","ok":"0.2 x 334 000 = 66 800 J."},{"type":"mcq","q":"Why does the temperature stay constant while a pure substance boils?","options":[{"t":"The energy breaks bonds between particles instead of raising the temperature","correct":true},{"t":"No energy is being supplied","why":"Energy is still supplied; it changes the state."},{"t":"The substance has run out of particles","why":"No particles are lost; bonds are being broken."}],"ok":"During boiling the energy breaks bonds, so the temperature stays constant."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Use the particle model to explain why the pressure of a fixed mass of gas in a sealed, rigid container increases when it is heated.","scheme":["Gas pressure is caused by particles colliding with the container walls (1)","Heating transfers energy to the particles (1)","so the particles move faster / have more kinetic energy (1)","They collide with the walls more often (1)","and each collision exerts a larger force (1)","so the total force per unit area (pressure) increases (volume is fixed) (1)"],"model":"Gas pressure is due to particles hitting the walls. Heating gives the particles more energy so they move faster. They then hit the walls more often and harder, and as the volume is fixed, the force per unit area — the pressure — increases."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student heats a beaker of ice until it melts and then boils. Explain why the temperature stays constant during melting and boiling.","scheme":["During a change of state the temperature stays constant (1)","Energy supplied is used to break the bonds/forces between particles (1)","rather than to increase the kinetic energy of the particles (1)","so there is no temperature rise until the change of state is complete (1)"],"model":"While melting or boiling, the energy supplied breaks the bonds between particles rather than increasing their kinetic energy, so the temperature does not change until the change of state is complete."}]},
"GA1":{"code":"GA1","title":"The atom & isotopes","discipline":"physics","blurb":"The structure of the atom, atomic and mass number, isotopes and ions.","vocab":[{"term":"nucleus","definition":"the tiny, dense, positive centre of an atom, made of protons and neutrons","say":"new-clee-us"},{"term":"atomic number","definition":"the number of protons in an atom, which decides the element","say":"a-tom-ic number"},{"term":"mass number","definition":"the total number of protons and neutrons in the nucleus","say":"mass number"},{"term":"isotope","definition":"atoms of the same element with the same protons but different numbers of neutrons","say":"eye-so-tope"},{"term":"ion","definition":"an atom that has lost or gained electrons, so it has an overall charge","say":"eye-on"}],"facts":["An atom has a radius of about 1 x 10 to the minus 10 metres; its nucleus is around 1 ten-thousandth of that but holds almost all the mass.","The nucleus contains positive protons and neutral neutrons; negative electrons orbit it in energy levels called shells.","The atomic number is the number of protons (it identifies the element); the mass number is protons plus neutrons.","Isotopes are atoms of the same element with the same number of protons but different numbers of neutrons.","An atom becomes a charged ion if it loses or gains electrons; absorbing electromagnetic radiation can knock electrons out, forming positive ions."],"misconceptions":[{"wrong":"Isotopes are different elements.","right":"Isotopes are the same element (same protons); they differ only in their number of neutrons."},{"wrong":"Most of an atom is solid matter.","right":"Almost all the mass is in the tiny nucleus, so the atom is mostly empty space."}],"questions":[{"type":"mcq","q":"What is found in the nucleus of an atom?","options":[{"t":"Protons and neutrons","correct":true},{"t":"Protons and electrons","why":"Electrons orbit outside the nucleus."},{"t":"Only neutrons","why":"The nucleus also contains positive protons."}],"ok":"The nucleus holds protons and neutrons; electrons orbit around it."},{"type":"mcq","q":"What does the atomic number tell you?","options":[{"t":"The number of protons","correct":true},{"t":"The number of neutrons","why":"Neutrons = mass number minus atomic number."},{"t":"The total number of particles","why":"That is closer to the mass number."}],"ok":"Atomic number = the number of protons, which decides the element."},{"type":"numeric","kicker":"Work it out","q":"An atom has a mass number of 27 and an atomic number of 13. How many neutrons does it have?","hint":"neutrons = mass number minus atomic number","answer":14,"unit":"neutrons","ok":"27 - 13 = 14 neutrons."},{"type":"mcq","q":"What do two isotopes of an element share?","options":[{"t":"The same number of protons","correct":true},{"t":"The same number of neutrons","why":"That is what differs between isotopes."},{"t":"The same mass number","why":"Different neutron numbers give different mass numbers."}],"ok":"Isotopes share protons but differ in neutrons."},{"type":"mcq","q":"How does an atom become a positive ion?","options":[{"t":"It loses one or more electrons","correct":true},{"t":"It gains electrons","why":"Gaining electrons makes a negative ion."},{"t":"It loses protons","why":"Protons stay in the nucleus; electrons move."}],"ok":"Losing electrons leaves more protons than electrons, so a positive ion forms."},{"type":"tf","q":"Isotopes of carbon are different elements.","answer":false,"why":"They are all carbon, with the same protons; they differ only in neutrons."},{"type":"mcq","q":"Almost all an atom's mass is in its tiny nucleus. What does this mean?","options":[{"t":"An atom is mostly empty space","correct":true},{"t":"An atom is a solid ball","why":"Most of the atom is empty space around the nucleus."},{"t":"Electrons are the heaviest part","why":"Electrons are very light compared with the nucleus."}],"ok":"The mass is concentrated in a tiny nucleus, so the atom is mostly empty space."}]},
"GA2":{"code":"GA2","title":"Development of the model","discipline":"physics","blurb":"How the atomic model changed, from the plum pudding to the nuclear model and beyond.","vocab":[{"term":"plum pudding model","definition":"an early model of a ball of positive charge with electrons dotted in it","say":"plum pudding"},{"term":"alpha scattering","definition":"the experiment that fired alpha particles at gold foil and revealed the nucleus","say":"al-fa scattering"},{"term":"nuclear model","definition":"the model with a tiny, dense, positive nucleus surrounded by electrons","say":"new-clee-ar model"}],"facts":["Dalton pictured atoms as tiny solid spheres; then Thomson proposed the plum pudding model — a ball of positive charge with electrons embedded in it.","In the alpha-scattering experiment, alpha particles were fired at thin gold foil; most passed straight through, but a few were deflected and a very few bounced back.","This showed the atom is mostly empty space, with a tiny, dense, positively charged nucleus — the nuclear model (Rutherford).","Bohr then showed that electrons orbit the nucleus at set distances in energy levels (shells).","Later, Chadwick discovered the neutron in the nucleus."],"misconceptions":[{"wrong":"Scientists have always known about the nucleus.","right":"The model developed over time, from solid spheres to plum pudding to the nuclear model."},{"wrong":"The alpha-scattering experiment showed atoms are solid.","right":"Most particles passed straight through, showing the atom is mostly empty space."}],"questions":[{"type":"order","q":"Put these atomic models in the order they were developed.","items":["Plum pudding model","Nuclear model from alpha scattering","Electron shells (Bohr)","Discovery of the neutron"],"ok":"Plum pudding, then nuclear (Rutherford), then shells (Bohr), then the neutron (Chadwick)."},{"type":"mcq","q":"In alpha scattering, a few particles bounced straight back. What did this show?","options":[{"t":"The atom has a tiny, dense, positive nucleus","correct":true},{"t":"The atom is a solid sphere","why":"Most particles passed through, so it cannot be solid."},{"t":"Atoms are mostly nucleus","why":"Most particles passed through, so atoms are mostly empty space."}],"ok":"The rebounds revealed a small, dense, positively charged nucleus."},{"type":"mcq","q":"What was the plum pudding model?","options":[{"t":"A ball of positive charge with electrons dotted through it","correct":true},{"t":"A tiny dense nucleus with electrons in shells","why":"That is the later nuclear/Bohr model."},{"t":"A solid indivisible sphere","why":"That was Dalton's earlier idea."}],"ok":"The plum pudding model had electrons embedded in a ball of positive charge."},{"type":"mcq","q":"Who discovered the neutron?","options":[{"t":"Chadwick","correct":true},{"t":"Thomson","why":"Thomson proposed the plum pudding model and discovered the electron."},{"t":"Dalton","why":"Dalton pictured atoms as solid spheres."}],"ok":"Chadwick discovered the neutron in the nucleus."},{"type":"tf","q":"Most of the alpha particles fired at the gold foil passed straight through.","answer":true,"why":"This showed the atom is mostly empty space, with mass concentrated in a tiny nucleus."},{"type":"mcq","q":"What did Bohr add to the model of the atom?","options":[{"t":"Electrons orbit the nucleus at set distances in shells","correct":true},{"t":"The nucleus contains neutrons","why":"That was Chadwick's discovery."},{"t":"Atoms are solid spheres","why":"That was Dalton's much earlier idea."}],"ok":"Bohr showed electrons occupy energy levels (shells) at set distances."}]},
"GA3":{"code":"GA3","title":"Radioactive decay & radiation","discipline":"physics","blurb":"The types of nuclear radiation, how ionising they are and how far they penetrate.","vocab":[{"term":"alpha particle","definition":"a particle of 2 protons and 2 neutrons; highly ionising, weakly penetrating","say":"al-fa"},{"term":"beta particle","definition":"a fast-moving electron emitted from the nucleus","say":"bay-ta"},{"term":"gamma ray","definition":"a high-energy electromagnetic wave from the nucleus; weakly ionising, highly penetrating","say":"gam-ma"},{"term":"activity","definition":"the rate at which a source decays, measured in becquerel","say":"ac-tiv-it-ee"}],"facts":["Unstable nuclei decay and emit nuclear radiation: an alpha particle (2 protons and 2 neutrons), a beta particle (a fast electron), a gamma ray (electromagnetic), or a neutron.","Alpha is the most ionising but the least penetrating, and is stopped by paper.","Beta is moderately ionising and is stopped by a few millimetres of aluminium.","Gamma is the least ionising but the most penetrating, and is only reduced by thick lead or concrete.","Activity is the rate of decay of a source, measured in becquerel (Bq), and is detected with a Geiger-Muller tube as a count-rate."],"misconceptions":[{"wrong":"Gamma is the most dangerous because it is the most ionising.","right":"Gamma is the least ionising but most penetrating; alpha is the most ionising but is stopped by skin or paper."},{"wrong":"A beta particle is a type of light.","right":"A beta particle is a fast-moving electron, not electromagnetic radiation."}],"questions":[{"type":"mcq","q":"What is an alpha particle made of?","options":[{"t":"2 protons and 2 neutrons","correct":true},{"t":"A single fast electron","why":"That describes a beta particle."},{"t":"A high-energy electromagnetic wave","why":"That describes a gamma ray."}],"ok":"An alpha particle is 2 protons and 2 neutrons (a helium nucleus)."},{"type":"mcq","q":"What is a beta particle?","options":[{"t":"A fast-moving electron from the nucleus","correct":true},{"t":"A helium nucleus","why":"That is an alpha particle."},{"t":"An electromagnetic wave","why":"That is a gamma ray."}],"ok":"A beta particle is a high-speed electron."},{"type":"categorise","q":"Sort each type of radiation by what stops it.","bins":["Stopped by paper","Stopped by aluminium","Reduced by thick lead"],"items":[{"t":"Alpha","bin":"Stopped by paper"},{"t":"Beta","bin":"Stopped by aluminium"},{"t":"Gamma","bin":"Reduced by thick lead"}],"ok":"Penetration increases from alpha to beta to gamma.","bad":"Alpha: paper. Beta: aluminium. Gamma: thick lead."},{"type":"mcq","q":"Which radiation is the most ionising?","options":[{"t":"Alpha","correct":true},{"t":"Beta","why":"Beta is moderately ionising."},{"t":"Gamma","why":"Gamma is the least ionising."}],"ok":"Alpha is the most ionising but least penetrating."},{"type":"multi","q":"Tap the true statements about gamma radiation.","items":[{"t":"It is electromagnetic","correct":true},{"t":"It is the most penetrating","correct":true},{"t":"It is the least ionising","correct":true},{"t":"It is stopped by a sheet of paper"}],"ok":"Gamma is an EM wave: highly penetrating, weakly ionising.","bad":"Gamma passes through paper easily; only thick lead reduces it."},{"type":"tf","q":"Activity is measured in becquerel.","answer":true,"why":"Activity is the rate of decay of a source, measured in becquerel (Bq)."},{"type":"mcq","q":"What is used to detect the count-rate from a radioactive source?","options":[{"t":"A Geiger-Muller tube","correct":true},{"t":"A thermometer","why":"A thermometer measures temperature, not radiation."},{"t":"An ammeter","why":"An ammeter measures current, not radiation."}],"ok":"A Geiger-Muller tube detects radiation as a count-rate."}]},
"GA4":{"code":"GA4","title":"Nuclear equations & half-life","discipline":"physics","blurb":"How alpha and beta decay change the nucleus, and how to use half-life.","vocab":[{"term":"half-life","definition":"the time taken for half the unstable nuclei in a sample to decay","say":"harf life"},{"term":"alpha decay","definition":"decay in which the nucleus loses an alpha particle","say":"al-fa decay"},{"term":"beta decay","definition":"decay in which a neutron turns into a proton and emits an electron","say":"bay-ta decay"}],"facts":["In alpha decay the nucleus loses 2 protons and 2 neutrons, so the mass number falls by 4 and the atomic number falls by 2.","In beta decay a neutron turns into a proton and emits a fast electron, so the atomic number rises by 1 while the mass number is unchanged.","Half-life is the time taken for half the unstable nuclei in a sample to decay, which is also the time for the count-rate (activity) to halve.","After each half-life the activity halves: after 2 half-lives it is a quarter, after 3 it is an eighth.","Higher tier: the net decline after n half-lives can be given as a ratio, for example after 3 half-lives only 1 in 8 of the original nuclei remain."],"misconceptions":[{"wrong":"Beta decay changes the mass number of the nucleus.","right":"In beta decay the mass number stays the same; the atomic number rises by 1."},{"wrong":"After two half-lives all the nuclei have decayed.","right":"After two half-lives a quarter remain; the amount halves each half-life."}],"questions":[{"type":"mcq","q":"In alpha decay, how does the nucleus change?","options":[{"t":"Mass number falls by 4 and atomic number falls by 2","correct":true},{"t":"Atomic number rises by 1","why":"That is beta decay."},{"t":"Nothing changes","why":"Alpha decay removes 2 protons and 2 neutrons."}],"ok":"Alpha decay: mass number minus 4, atomic number minus 2."},{"type":"mcq","q":"In beta decay, how does the nucleus change?","options":[{"t":"Atomic number rises by 1, mass number stays the same","correct":true},{"t":"Mass number falls by 4","why":"That is alpha decay."},{"t":"Atomic number falls by 2","why":"That is alpha decay."}],"ok":"In beta decay a neutron becomes a proton, so the atomic number rises by 1."},{"type":"numeric","kicker":"Work it out","q":"A source has a count-rate of 800 Bq. What is the count-rate after one half-life?","hint":"After one half-life the count-rate halves.","answer":400,"unit":"Bq","ok":"Half of 800 is 400 Bq."},{"type":"numeric","kicker":"Work it out","q":"A source has an activity of 160 Bq and a half-life of 3 hours. What is its activity after 6 hours?","hint":"6 hours is two half-lives, so halve it twice.","answer":40,"unit":"Bq","ok":"160 to 80 to 40 Bq after two half-lives."},{"type":"numeric","kicker":"Higher tier","q":"A sample of 2400 Bq has a half-life of 5 years. What is the activity after 15 years?","hint":"15 years is three half-lives, so halve it three times.","answer":300,"unit":"Bq","ok":"2400 to 1200 to 600 to 300 Bq."},{"type":"numeric","kicker":"Higher tier","q":"An activity falls from 6400 Bq to 800 Bq. How many half-lives have passed?","hint":"Count how many times you halve 6400 to reach 800.","answer":3,"unit":"half-lives","ok":"6400 to 3200 to 1600 to 800 is three half-lives."},{"type":"tf","q":"After two half-lives, a quarter of the original nuclei remain.","answer":true,"why":"The amount halves each half-life: a half, then a quarter."}]},
"GA5":{"code":"GA5","title":"Hazards & uses of radiation","discipline":"physics","blurb":"Background radiation, contamination versus irradiation, safety precautions and uses.","vocab":[{"term":"irradiation","definition":"exposing an object to radiation from an outside source; it does not make it radioactive","say":"ir-ray-dee-ay-shun"},{"term":"contamination","definition":"getting radioactive atoms onto or into an object, which stays radioactive","say":"con-tam-in-ay-shun"},{"term":"background radiation","definition":"the low-level radiation that is around us all the time","say":"background radiation"}],"facts":["Background radiation is the low-level radiation around us all the time, from sources such as radon gas, rocks and soil, cosmic rays from space, and medical and food sources.","Irradiation is being exposed to radiation from an outside source; it does not make the object radioactive.","Contamination is getting radioactive atoms onto or into an object; the source then stays with it and keeps emitting radiation.","Contamination is often more dangerous over time because the radioactive source stays inside or on the body.","Radiation is used in medicine, for example as tracers, for sterilising equipment, and for treating cancer; precautions include shielding, keeping your distance and limiting your time near a source."],"misconceptions":[{"wrong":"Irradiating food makes the food radioactive.","right":"Irradiation exposes the food to radiation but adds nothing radioactive, so it does not become radioactive."},{"wrong":"Contamination and irradiation are the same.","right":"Irradiation is exposure from outside; contamination is radioactive atoms getting onto or into you."}],"questions":[{"type":"mcq","q":"What is contamination?","options":[{"t":"Radioactive atoms getting onto or into an object","correct":true},{"t":"Being near a source that gives off radiation","why":"That is irradiation."},{"t":"An object being heated by radiation","why":"Contamination is about radioactive atoms being present."}],"ok":"Contamination = radioactive atoms on/in you; irradiation = exposure from outside."},{"type":"tf","q":"Irradiating food with gamma rays to kill bacteria makes the food radioactive.","answer":false,"why":"Irradiation exposes the food to radiation but adds nothing radioactive, so it stays non-radioactive."},{"type":"multi","q":"Tap the sources of background radiation.","items":[{"t":"Radon gas","correct":true},{"t":"Rocks and soil","correct":true},{"t":"Cosmic rays from space","correct":true},{"t":"Mobile phone signals"}],"ok":"Background radiation comes from radon, rocks, cosmic rays and medical/food sources.","bad":"Mobile phone signals are low-energy radio waves, not a source of ionising background radiation."},{"type":"mcq","q":"Which is a sensible precaution when handling a radioactive source?","options":[{"t":"Use shielding and keep your distance","correct":true},{"t":"Hold it in your bare hand for a long time","why":"That increases your dose; you should limit contact and time."},{"t":"Eat near the source","why":"Eating near a source risks contamination."}],"ok":"Shielding, distance and limiting time all reduce the dose received."},{"type":"mcq","q":"Why is contamination often more dangerous than a single dose of irradiation?","options":[{"t":"The radioactive source stays with you and keeps emitting radiation","correct":true},{"t":"It heats you up","why":"The danger is continued radiation, not heating."},{"t":"It is not dangerous at all","why":"Contamination can be very dangerous over time."}],"ok":"With contamination the source stays on or in you, so it keeps irradiating you."},{"type":"mcq","q":"Which is a use of radioactivity in medicine?","options":[{"t":"Sterilising surgical equipment with gamma rays","correct":true},{"t":"Powering a torch","why":"Torches use batteries, not radioactivity."},{"t":"Cooling a patient down","why":"Radiation is not used for cooling."}],"ok":"Gamma radiation is used to sterilise equipment, as a tracer, and to treat cancer."},{"type":"categorise","q":"Sort each as irradiation or contamination.","bins":["Irradiation","Contamination"],"items":[{"t":"Standing near a sealed gamma source","bin":"Irradiation"},{"t":"Breathing in radioactive dust","bin":"Contamination"},{"t":"An X-ray scan at a hospital","bin":"Irradiation"},{"t":"Spilling a radioactive liquid on your skin","bin":"Contamination"}],"ok":"Exposure from outside is irradiation; radioactive atoms on/in you is contamination.","bad":"If radioactive atoms get on or in you, it is contamination; otherwise it is irradiation."}]},
"GA-EX":{"code":"GA-EX","title":"Atomic structure — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Atomic structure: half-life, decay and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A radioactive source has an activity of 480 Bq and a half-life of 2 days. Calculate the activity after 6 days.","hint":"6 days is three half-lives, so halve it three times.","answer":60,"unit":"Bq","ok":"480 to 240 to 120 to 60 Bq."},{"type":"mcq","q":"A nucleus emits an alpha particle. How do its mass number and atomic number change?","options":[{"t":"Mass number falls by 4, atomic number falls by 2","correct":true},{"t":"Mass number stays the same, atomic number rises by 1","why":"That is beta decay."},{"t":"Both stay the same","why":"Alpha decay removes 2 protons and 2 neutrons."}],"ok":"Alpha decay reduces the mass number by 4 and the atomic number by 2."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe the alpha-scattering experiment and explain what its results told scientists about the structure of the atom.","scheme":["Alpha particles were fired at a thin sheet of gold foil (1)","Most alpha particles passed straight through (1)","showing the atom is mostly empty space (1)","A few were deflected and a very small number bounced straight back (1)","showing there is a small, dense, positively charged region — the nucleus (1)","This led to the nuclear model, replacing the plum pudding model (1)"],"model":"Alpha particles were fired at thin gold foil. Most passed straight through, showing the atom is mostly empty space. A few deflected and a very few bounced back, showing a tiny, dense, positively charged nucleus. This evidence led to the nuclear model."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain the difference between irradiation and contamination, and why contamination can be more harmful.","scheme":["Irradiation is exposure to radiation from an outside source (1)","and does not make the object radioactive (1)","Contamination is radioactive atoms getting onto or into an object (1)","so the source stays and keeps emitting radiation, making it more harmful over time (1)"],"model":"Irradiation is being exposed to radiation from outside and does not make you radioactive. Contamination is radioactive atoms getting onto or into you; because the source stays, it keeps irradiating you, so it can be more harmful over time."}]},
"GF1":{"code":"GF1","title":"Forces, weight & resultants","discipline":"physics","blurb":"Scalars and vectors, weight, and finding the resultant of forces.","vocab":[{"term":"scalar","definition":"a quantity with size only, such as mass, speed or energy","say":"scay-lar"},{"term":"vector","definition":"a quantity with size and direction, such as force or velocity","say":"vec-tor"},{"term":"weight","definition":"the force of gravity on an object: weight = mass x gravitational field strength","say":"wait"},{"term":"resultant force","definition":"the single force with the same effect as all the forces acting together","say":"ree-zul-tant"},{"term":"centre of mass","definition":"the point at which the weight of an object appears to act","say":"centre of mass"}],"facts":["A scalar has size only (mass, speed, distance, energy); a vector has size and direction (force, velocity, acceleration, displacement).","Forces can be contact (friction, tension, normal) or non-contact (gravity, magnetism, electrostatic).","Weight is the force of gravity on a mass: weight = mass x gravitational field strength (W = m g). It acts at the centre of mass.","The resultant force is the single force equivalent to all the forces acting. If the forces are balanced the resultant is zero and the motion does not change.","Higher tier: a single force at an angle can be resolved into two perpendicular components, and a scale vector diagram or free-body diagram finds the resultant of forces that are not in a straight line."],"misconceptions":[{"wrong":"Mass and weight are the same thing.","right":"Mass (kg) is the amount of matter; weight (N) is the gravitational force on it and changes with gravitational field strength."},{"wrong":"Balanced forces mean the object must be still.","right":"Balanced forces give zero resultant, so the object stays still OR moves at constant velocity."}],"questions":[{"type":"categorise","q":"Sort each quantity as a scalar or a vector.","bins":["Scalar","Vector"],"items":[{"t":"Mass","bin":"Scalar"},{"t":"Force","bin":"Vector"},{"t":"Speed","bin":"Scalar"},{"t":"Velocity","bin":"Vector"},{"t":"Energy","bin":"Scalar"},{"t":"Acceleration","bin":"Vector"}],"ok":"Vectors have direction (force, velocity, acceleration); scalars do not.","bad":"If it needs a direction, it is a vector."},{"type":"numeric","kicker":"Work it out","q":"What is the weight of a 9 kg mass where g = 10 N/kg?","hint":"weight = mass x gravitational field strength","answer":90,"unit":"N","ok":"9 x 10 = 90 N."},{"type":"mcq","q":"Which is a non-contact force?","options":[{"t":"Gravity","correct":true},{"t":"Friction","why":"Friction is a contact force."},{"t":"Tension","why":"Tension is a contact force."}],"ok":"Gravity, magnetism and electrostatic forces are non-contact."},{"type":"mcq","q":"The forces on a moving car are balanced. What is its motion?","options":[{"t":"It keeps moving at a constant velocity","correct":true},{"t":"It speeds up","why":"Balanced forces give zero resultant, so no acceleration."},{"t":"It must stop immediately","why":"Balanced forces mean no change in motion, not a sudden stop."}],"ok":"Zero resultant means constant velocity (or staying still)."},{"type":"mcq","q":"Two forces act on a box in opposite directions: 12 N right and 5 N left. What is the resultant?","options":[{"t":"7 N to the right","correct":true},{"t":"17 N to the right","why":"Opposite forces subtract, not add."},{"t":"7 N to the left","why":"The larger force is to the right, so the resultant is to the right."}],"ok":"12 - 5 = 7 N, in the direction of the larger force (right)."},{"type":"tf","q":"Weight acts at an object's centre of mass.","answer":true,"why":"The weight of an object is taken to act at its centre of mass."},{"type":"mcq","q":"Higher tier: a force acts at an angle to the horizontal. How can you analyse it?","options":[{"t":"Resolve it into horizontal and vertical components","correct":true},{"t":"Ignore the vertical part","why":"Force is a vector; both components matter."},{"t":"Add its size to the mass","why":"Force and mass are different quantities."}],"ok":"An angled force can be resolved into two perpendicular components."}]},
"GF2":{"code":"GF2","title":"Work, springs & Hooke's law","discipline":"physics","blurb":"Work done by a force, and how springs stretch following Hooke's law.","vocab":[{"term":"work done","definition":"the energy transferred when a force moves an object: work = force x distance","say":"werk dun"},{"term":"spring constant","definition":"how stiff a spring is: force = spring constant x extension","say":"spring con-stant"},{"term":"limit of proportionality","definition":"the point beyond which a spring no longer follows Hooke's law","say":"limit of pro-por-shun-al-ity"},{"term":"elastic deformation","definition":"a change of shape that reverses when the force is removed","say":"ee-las-tic"}],"facts":["Work is done when a force moves an object: work done = force x distance (W = F s). One joule is one newton-metre.","A spring follows Hooke's law up to its limit of proportionality: force = spring constant x extension (F = k e).","The elastic potential energy stored in a spring is one half x spring constant x extension squared (Ee = 0.5 k e squared).","Elastic deformation reverses when the force is removed; inelastic deformation does not.","Required practical: hang masses on a spring and measure the extension, to find the spring constant and the limit of proportionality."],"misconceptions":[{"wrong":"A spring always follows Hooke's law no matter how far it is stretched.","right":"Hooke's law only holds up to the limit of proportionality; beyond it the spring stretches more for each extra newton."},{"wrong":"Work is done whenever a force is applied.","right":"Work is only done when the force makes the object move; W = F x distance moved."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A 30 N force pushes a box 5 m in the direction of the force. How much work is done?","hint":"work done = force x distance","answer":150,"unit":"J","ok":"30 x 5 = 150 J."},{"type":"numeric","kicker":"Work it out","q":"A spring has a spring constant of 50 N/m and is stretched 0.4 m. What force is needed?","hint":"force = spring constant x extension","answer":20,"unit":"N","ok":"50 x 0.4 = 20 N."},{"type":"numeric","kicker":"Work it out","q":"A spring with spring constant 200 N/m is stretched 0.2 m. What elastic potential energy is stored?","hint":"Ee = 0.5 x spring constant x extension squared","answer":4,"unit":"J","ok":"0.5 x 200 x 0.2 squared = 0.5 x 200 x 0.04 = 4 J."},{"type":"mcq","q":"What does Hooke's law require to stay true?","options":[{"t":"The spring must not be stretched past its limit of proportionality","correct":true},{"t":"The spring must be very long","why":"Length is not the condition."},{"t":"The force must be above 100 N","why":"The size of the force is not the condition."}],"ok":"Beyond the limit of proportionality the spring no longer obeys F = ke."},{"type":"mcq","q":"What is elastic deformation?","options":[{"t":"A change of shape that reverses when the force is removed","correct":true},{"t":"A change of shape that stays after the force is removed","why":"That is inelastic deformation."},{"t":"A spring snapping in half","why":"That is permanent damage, not elastic deformation."}],"ok":"Elastic deformation reverses; the spring returns to its original shape."},{"type":"numeric","kicker":"Work it out","q":"A spring extends 0.1 m when a force of 8 N is applied. What is its spring constant?","hint":"spring constant = force / extension","answer":80,"unit":"N/m","ok":"8 / 0.1 = 80 N/m."},{"type":"tf","q":"Work is done only when a force moves an object.","answer":true,"why":"Work done = force x distance moved, so a force that causes no movement does no work."}]},
"GF3":{"code":"GF3","title":"Speed, velocity & motion graphs","discipline":"physics","blurb":"Distance and displacement, speed and velocity, and reading distance–time graphs.","vocab":[{"term":"distance","definition":"how far something travels; a scalar with size only","say":"dis-tance"},{"term":"displacement","definition":"distance in a particular direction; a vector","say":"dis-place-ment"},{"term":"speed","definition":"how fast something moves: distance = speed x time","say":"speed"},{"term":"velocity","definition":"speed in a given direction; a vector","say":"vel-o-city"}],"facts":["Distance is a scalar (size only); displacement is a vector (distance in a particular direction).","Speed is a scalar; typical speeds are about 1.5 m/s walking, 3 m/s running and 6 m/s cycling. The speed of sound in air is about 330 m/s.","Velocity is speed in a given direction, so it is a vector.","distance travelled = speed x time.","On a distance-time graph the gradient is the speed; a flat line means the object is stationary. Higher tier: the speed at a point on a curve is the gradient of the tangent there."],"misconceptions":[{"wrong":"Distance and displacement always have the same value.","right":"Displacement is distance in a direction, so a runner doing a full lap has travelled a distance but has zero displacement."},{"wrong":"A flat line on a distance-time graph means high speed.","right":"A flat (horizontal) line means the distance is not changing, so the object is stationary."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A cyclist travels at 6 m/s for 20 s. How far does she travel?","hint":"distance = speed x time","answer":120,"unit":"m","ok":"6 x 20 = 120 m."},{"type":"numeric","kicker":"Work it out","q":"A car travels 300 m in 15 s. What is its speed?","hint":"speed = distance / time","answer":20,"unit":"m/s","ok":"300 / 15 = 20 m/s."},{"type":"mcq","q":"What is the difference between distance and displacement?","options":[{"t":"Distance is a scalar; displacement is distance in a direction (a vector)","correct":true},{"t":"They are exactly the same","why":"Displacement includes direction; distance does not."},{"t":"Distance has direction; displacement does not","why":"It is the other way round."}],"ok":"Displacement is distance in a particular direction, so it is a vector."},{"type":"mcq","q":"On a distance-time graph, what does the gradient (steepness) tell you?","options":[{"t":"The speed","correct":true},{"t":"The acceleration","why":"Acceleration comes from a velocity-time graph."},{"t":"The distance","why":"Distance is read off the axis, not the gradient."}],"ok":"The gradient of a distance-time graph is the speed."},{"type":"mcq","q":"Roughly what is a typical walking speed?","options":[{"t":"About 1.5 m/s","correct":true},{"t":"About 15 m/s","why":"15 m/s is far faster than walking pace."},{"t":"About 0.1 m/s","why":"0.1 m/s is much slower than walking."}],"ok":"A typical walking speed is about 1.5 m/s."},{"type":"tf","q":"A horizontal (flat) line on a distance-time graph means the object is stationary.","answer":true,"why":"A flat line means the distance is not changing, so the object is not moving."},{"type":"mcq","q":"Higher tier: how do you find the speed at one moment on a curved distance-time graph?","options":[{"t":"Find the gradient of the tangent at that point","correct":true},{"t":"Read the value off the time axis","why":"That gives time, not speed."},{"t":"Measure the area under the curve","why":"Area under a distance-time graph has no useful meaning here."}],"ok":"The instantaneous speed is the gradient of the tangent to the curve."}]},
