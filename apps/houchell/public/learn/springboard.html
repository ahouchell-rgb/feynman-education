\n    <rect x=\"234\" y=\"200\" width=\"30\" height=\"18\" rx=\"2\" fill=\"#C99528\" stroke=\"#8a6a1a\" stroke-width=\"1.5\"/>\n  </g>\n</g>","parts":[{"id":"cylinder","label":"Measuring cylinder","x":23,"y":34,"note":"We start with a measuring cylinder: its scale lets us read off a volume of liquid precisely, in cubic centimetres."},{"id":"water","label":"Water","x":15,"y":82,"note":"Pour in water and note the starting level. This water will do the measuring for us when the solid goes in."},{"id":"irregularSolid","label":"Irregular solid","x":29,"y":64,"note":"Lower in an odd-shaped solid you can't measure with a ruler. It sinks and pushes the water aside to make room."},{"id":"displacedLevel","label":"Displaced level","x":15,"y":48,"note":"The water rises: the volume it climbs by exactly equals the solid's volume, since it shoved that much water out of the way."},{"id":"balance","label":"Balance","x":85,"y":19,"note":"Now we weigh the solid on a balance to find its mass in grams, the top number in the density sum."},{"id":"regularSolid","label":"Regular solid","x":80,"y":40,"note":"For a neat block, skip the water: measure its sides with a ruler and multiply to get volume, then divide mass by it."},{"id":"floatingObject","label":"Floating object","x":70,"y":75,"note":"Drop an object in liquid and it floats if it's less dense: gram-for-gram it's lighter than the water it would replace."}]},
"d_GD2":{"vb":"0 0 320 230","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"230\" fill=\"#F4F6FC\"/>\n<text x=\"160\" y=\"20\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#7a8199\" text-anchor=\"middle\">cold  →  add energy  →  hot</text>\n<g data-part=\"solid\">\n  <rect x=\"16\" y=\"40\" width=\"82\" height=\"82\" rx=\"8\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g class=\"sm-osc\">\n    <circle cx=\"34\" cy=\"58\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"57\" cy=\"58\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"80\" cy=\"58\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n    <circle cx=\"34\" cy=\"81\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"57\" cy=\"81\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"80\" cy=\"81\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n    <circle cx=\"34\" cy=\"104\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"57\" cy=\"104\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"80\" cy=\"104\" r=\"6.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n  </g>\n</g>\n<g data-part=\"liquid\">\n  <path d=\"M120 68 v46 a8 8 0 0 0 8 8 h66 a8 8 0 0 0 8 -8 v-46 z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g class=\"sm-drift\">\n    <circle cx=\"136\" cy=\"86\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"159\" cy=\"82\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"182\" cy=\"88\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n    <circle cx=\"148\" cy=\"102\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"171\" cy=\"104\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n    <circle cx=\"137\" cy=\"112\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"184\" cy=\"110\" r=\"6.5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  </g>\n</g>\n<g data-part=\"gas\">\n  <rect x=\"222\" y=\"40\" width=\"82\" height=\"82\" rx=\"8\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/>\n  <g class=\"sm-drift\">\n    <circle cx=\"240\" cy=\"56\" r=\"6\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><line x1=\"244\" y1=\"50\" x2=\"253\" y2=\"45\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <circle cx=\"288\" cy=\"62\" r=\"6\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><line x1=\"284\" y1=\"68\" x2=\"294\" y2=\"73\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <circle cx=\"264\" cy=\"84\" r=\"6\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><line x1=\"260\" y1=\"90\" x2=\"251\" y2=\"97\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <circle cx=\"236\" cy=\"106\" r=\"6\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><line x1=\"240\" y1=\"102\" x2=\"230\" y2=\"98\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <circle cx=\"290\" cy=\"104\" r=\"6\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><line x1=\"286\" y1=\"100\" x2=\"296\" y2=\"94\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n  </g>\n</g>\n<g data-part=\"meltFreeze\">\n  <line x1=\"102\" y1=\"70\" x2=\"115\" y2=\"70\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"115,64 126,70 115,76\" fill=\"#B4341E\"/>\n  <line x1=\"118\" y1=\"90\" x2=\"105\" y2=\"90\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"105,84 94,90 105,96\" fill=\"#1E2761\"/>\n</g>\n<g data-part=\"boilCondense\">\n  <line x1=\"206\" y1=\"70\" x2=\"219\" y2=\"70\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"219,64 230,70 219,76\" fill=\"#B4341E\"/>\n  <line x1=\"222\" y1=\"90\" x2=\"209\" y2=\"90\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"209,84 198,90 209,96\" fill=\"#1E2761\"/>\n</g>\n<g data-part=\"sublime\">\n  <path d=\"M57 138 C57 190 263 190 263 138\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <polygon points=\"255,144 264,136 268,148\" fill=\"#2C5F2D\"/>\n</g>","parts":[{"id":"solid","label":"Solid","x":17,"y":42,"note":"We start cold: particles locked in a fixed regular pattern, only vibrating on the spot, so the solid holds its shape."},{"id":"liquid","label":"Liquid","x":50,"y":42,"note":"Add energy and bonds loosen: particles now slip and slide past each other, so the liquid flows and takes its container's shape."},{"id":"gas","label":"Gas","x":83,"y":42,"note":"Add more energy still: particles break free and zoom apart in all directions, spreading out to fill whatever space they're in."},{"id":"meltFreeze","label":"Melting / Freezing","x":34,"y":55,"note":"Heating in melts solid to liquid; cooling reverses it, freezing liquid back to solid and giving that energy out again."},{"id":"boilCondense","label":"Boiling / Condensing","x":66,"y":55,"note":"Boiling takes energy in to fling liquid particles into gas; condensing gives it out as gas collapses back to liquid."},{"id":"sublime","label":"Sublimation","x":50,"y":16,"note":"Sometimes a solid skips liquid entirely, taking energy in to jump straight to gas — like dry ice smoking away."}]},
"d_GD4":{"vb":"0 0 320 240","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"240\" fill=\"#F4F6FC\"/>\n<g data-part=\"container\">\n  <rect x=\"34\" y=\"60\" width=\"176\" height=\"130\" rx=\"6\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3.5\"/>\n</g>\n<g data-part=\"gasParticle\">\n  <circle cx=\"70\" cy=\"90\" r=\"8\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/>\n  <circle cx=\"150\" cy=\"80\" r=\"8\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/>\n  <circle cx=\"110\" cy=\"160\" r=\"8\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/>\n  <circle class=\"sm-drift\" cx=\"90\" cy=\"130\" r=\"8\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"98\" y1=\"123\" x2=\"150\" y2=\"80\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-dasharray=\"4 5\"/>\n  <polygon points=\"150,80 140,82 145,90\" fill=\"#7a8199\"/>\n</g>\n<g data-part=\"collision\">\n  <line x1=\"34\" y1=\"60\" x2=\"34\" y2=\"190\" stroke=\"#B4341E\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <circle class=\"sm-throb\" cx=\"45\" cy=\"125\" r=\"8\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <g class=\"sm-blink\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\">\n    <line x1=\"30\" y1=\"118\" x2=\"22\" y2=\"112\"/><line x1=\"28\" y1=\"125\" x2=\"18\" y2=\"125\"/><line x1=\"30\" y1=\"132\" x2=\"22\" y2=\"138\"/>\n  </g>\n</g>\n<g data-part=\"piston\">\n  <rect x=\"210\" y=\"56\" width=\"18\" height=\"138\" rx=\"4\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"228\" y1=\"125\" x2=\"278\" y2=\"125\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <rect x=\"278\" y=\"106\" width=\"34\" height=\"38\" rx=\"6\" fill=\"#F7F2E6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n</g>\n<g data-part=\"pushForce\">\n  <line class=\"sm-osc-x\" x1=\"272\" y1=\"90\" x2=\"236\" y2=\"90\" stroke=\"#B4341E\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n  <polygon class=\"sm-osc-x\" points=\"236,90 250,82 250,98\" fill=\"#B4341E\"/>\n</g>","parts":[{"id":"container","label":"Container","x":40,"y":33,"note":"The gas is trapped inside sealed walls. Every particle is bouncing about, and it is those walls the particles will keep hitting."},{"id":"gasParticle","label":"Gas particle","x":50,"y":63,"note":"One tiny particle zooms across the space, moving in a straight line until it strikes something. Billions of these are racing around at once."},{"id":"collision","label":"Collision with wall","x":11,"y":56,"note":"The particle slams into the wall and bounces back. Each tiny push adds up over billions of hits, and that total force is the pressure."},{"id":"piston","label":"Piston (movable wall)","x":62,"y":29,"note":"This wall slides in, squashing the gas smaller. The particles now hit it more often, so the pressure pushing back climbs higher."},{"id":"pushForce","label":"Pushing in / doing work","x":76,"y":42,"note":"Pushing the piston does work on the gas, handing energy to the particles. They speed up and warm the gas, even with no heating."}]},
"d_GE1":{"vb":"0 0 320 240","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"240\" fill=\"#F7F2E6\"/>\n<g data-part=\"surroundings\">\n  <rect x=\"6\" y=\"6\" width=\"308\" height=\"228\" rx=\"12\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-dasharray=\"2 6\"/>\n  <text x=\"292\" y=\"26\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#B4341E\" text-anchor=\"end\">warms</text>\n</g>\n<g data-part=\"systemBoundary\">\n  <rect x=\"34\" y=\"40\" width=\"230\" height=\"120\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-dasharray=\"9 6\"/>\n</g>\n<g data-part=\"sourceStore\">\n  <rect x=\"58\" y=\"66\" width=\"64\" height=\"80\" rx=\"8\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"3\"/>\n  <rect class=\"sm-fall\" x=\"61\" y=\"118\" width=\"58\" height=\"25\" rx=\"3\" fill=\"#2C5F2D\"/>\n</g>\n<g data-part=\"transfer\">\n  <line class=\"sm-flow\" x1=\"126\" y1=\"106\" x2=\"172\" y2=\"106\" stroke=\"#1E2761\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-dasharray=\"7 6\"/>\n  <polygon points=\"180,106 168,99 168,113\" fill=\"#1E2761\"/>\n</g>\n<g data-part=\"receivingStore\">\n  <rect x=\"182\" y=\"66\" width=\"64\" height=\"80\" rx=\"8\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <rect class=\"sm-rise\" x=\"185\" y=\"112\" width=\"58\" height=\"31\" rx=\"3\" fill=\"#AEB6D6\"/>\n</g>\n<g data-part=\"dissipation\">\n  <line class=\"sm-flow\" x1=\"150\" y1=\"162\" x2=\"150\" y2=\"196\" stroke=\"#B4341E\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-dasharray=\"7 6\"/>\n  <polygon points=\"150,204 143,192 157,192\" fill=\"#B4341E\"/>\n</g>\n<g>\n  <rect x=\"112\" y=\"200\" width=\"76\" height=\"30\" rx=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n  <path class=\"sm-rise\" d=\"M124 220 q9 -9 18 0 q9 9 18 0\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n</g>","parts":[{"id":"systemBoundary","label":"System","x":54,"y":16,"note":"We draw a boundary to pick out the objects we're studying; energy moves between stores inside, or across this line to the surroundings."},{"id":"sourceStore","label":"Energy store","x":27,"y":34,"note":"Inside the system, energy starts filled up in one store here, ready to be shifted somewhere else in the process."},{"id":"receivingStore","label":"Second store","x":57,"y":34,"note":"The energy has to arrive somewhere, so a second store fills up as the first one empties out."},{"id":"transfer","label":"Transfer","x":42,"y":42,"note":"Energy flows from the first store to the second, carried across mechanically, electrically, by heating, or by radiation like light and sound."},{"id":"dissipation","label":"Wasted energy","x":42,"y":82,"note":"As the transfer happens, some energy leaks away as wasted heat, spreading out and no longer useful to us."},{"id":"surroundings","label":"Surroundings","x":86,"y":86,"note":"The wasted energy warms the surroundings, but nothing is lost overall; the total energy across everything stays exactly the same."}]},

ts kinetic store; double the speed and the store grows four times, since speed is squared."},{"id":"workArrow","label":"Work done","x":30,"y":92,"note":"Gravity does work by pulling the object through a distance, and this work is exactly how the energy gets transferred, measured in joules."},{"id":"spring","label":"Spring extension","x":84,"y":34,"note":"Stretching the spring stores energy elastically; pull it further and the extension grows, so long as it springs back to its original length."},{"id":"elasticForce","label":"Elastic PE","x":84,"y":68,"note":"The stretched spring now holds an elastic store; released, it snaps back and pushes this energy into the object's kinetic store."}]},

ints=\"152,172 168,172 168,196 180,196 160,228 140,196 152,196\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>\n</g>\n<g data-part=\"lubrication\">\n  <ellipse cx=\"230\" cy=\"180\" rx=\"10\" ry=\"6\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path class=\"sm-fall\" d=\"M230 186 q-3 8 0 14 q3 -6 0 -14\" fill=\"#C99528\" stroke=\"#C99528\" stroke-width=\"1\"/>\n  <line x1=\"218\" y1=\"176\" x2=\"242\" y2=\"176\" stroke=\"#7a8199\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n</g>","parts":[{"id":"inputEnergy","label":"Input energy","x":18,"y":46,"note":"Energy flows into the device every second; how fast it arrives is the power, measured in joules per second (watts)."},{"id":"device","label":"Device","x":40,"y":34,"note":"Inside the device, the input energy is transferred into different forms; how well it does this is its efficiency."},{"id":"usefulOutput","label":"Useful output","x":85,"y":48,"note":"Some energy leaves as the useful transfer we actually want; the bigger this share, the more efficient the device."},{"id":"wastedEnergy","label":"Wasted (dissipated) energy","x":52,"y":90,"note":"The rest is dissipated to the surroundings, usually as heat; this is why no device can ever reach 100% efficient."},{"id":"insulation","label":"Insulation","x":37,"y":68,"note":"Insulation with low thermal conductivity wraps the device, slowing heat escaping so less useful energy is wasted."},{"id":"lubrication","label":"Lubricated part","x":52,"y":50,"note":"Oil between moving parts cuts friction, so less energy is wasted as heat and more becomes useful output."},{"id":"wall","label":"Thick wall","x":68,"y":30,"note":"A thicker wall of low-conductivity material slows heat passing through, trapping warmth and reducing wasted energy transfer."}]},

ll\" d=\"M164 152 l-8 18\" stroke=\"#1E2761\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path class=\"sm-fall\" d=\"M170 156 l-6 14\" stroke=\"#1E2761\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n</g>\n<g data-part=\"powerStation\">\n  <rect x=\"228\" y=\"128\" width=\"34\" height=\"42\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <rect x=\"266\" y=\"104\" width=\"14\" height=\"66\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path class=\"sm-throb\" d=\"M236 150 q8 -10 16 0\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n</g>\n<g data-part=\"emissions\">\n  <g class=\"sm-rise\" fill=\"#7a8199\" opacity=\"0.85\">\n    <ellipse cx=\"273\" cy=\"90\" rx=\"9\" ry=\"6\"/>\n    <ellipse cx=\"284\" cy=\"80\" rx=\"8\" ry=\"6\"/>\n    <ellipse cx=\"294\" cy=\"88\" rx=\"7\" ry=\"5\"/>\n  </g>\n</g>\n<g data-part=\"pylon\">\n  <line x1=\"290\" y1=\"200\" x2=\"290\" y2=\"176\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"290\" y1=\"200\" x2=\"300\" y2=\"220\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"290\" y1=\"200\" x2=\"280\" y2=\"220\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"276\" y1=\"184\" x2=\"304\" y2=\"184\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"280\" y1=\"192\" x2=\"300\" y2=\"192\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <polyline points=\"290,176 283,183 297,183 290,176\" fill=\"#F7F2E6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path class=\"sm-flow\" d=\"M276 184 q-40 6 -80 0\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"2\" stroke-dasharray=\"5 5\"/>\n</g>","parts":[{"id":"windTurbine","label":"Wind turbine","x":16,"y":34,"note":"Moving air pushes the blades round, spinning a generator to make electricity — and the wind keeps blowing, so it never runs out."},{"id":"solarPanel","label":"Solar panel","x":37,"y":58,"note":"Sunlight falls on the panel and is turned straight into electricity — a renewable supply that's topped up every day the sun shines."},{"id":"hydroDam","label":"Hydroelectric dam","x":57,"y":62,"note":"Water held behind the dam rushes down through turbines, spinning them to generate electricity from the never-ending rain cycle."},{"id":"pylon","label":"Pylon (electricity grid)","x":47,"y":33,"note":"Pylons carry the electricity along the grid, delivering it from every power source to homes, schools and factories that need it."},{"id":"powerStation","label":"Fossil-fuel power station","x":75,"y":58,"note":"Here coal, oil or gas is burned to boil water; the steam spins turbines — reliable, high-energy, but the fuel eventually runs out."},{"id":"emissions","label":"CO2 emissions","x":90,"y":36,"note":"Burning fossil fuels sends carbon dioxide into the air, a greenhouse gas warming the planet — the very reason we're shifting to renewables."}]},

\"#2C5F2D\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n</g>\n<g data-part=\"limitPoint\">\n  <path d=\"M272 96 q14 -18 30 -42\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <circle cx=\"272\" cy=\"96\" r=\"5\" fill=\"#fff\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n</g>","parts":[{"id":"spring","label":"Spring","x":20,"y":30,"note":"This coiled spring hangs from a stand, ready to stretch when we load it — the object whose stiffness we are measuring."},{"id":"mass","label":"Mass (force)","x":20,"y":50,"note":"We hang known masses on the spring; their weight pulls down, providing the measured force that stretches the spring further."},{"id":"ruler","label":"Ruler","x":36,"y":42,"note":"A ruler beside the spring lets us read how far the bottom moves, measuring the stretch caused by each added weight."},{"id":"extension","label":"Extension","x":67,"y":92,"note":"Extension is how much longer the spring gets; doubling the force doubles it, so together they give the spring constant k."},{"id":"linearRegion","label":"Hooke's law (linear)","x":62,"y":62,"note":"Here force and extension climb in a straight line: F equals k times e, so the spring stretches steadily and springs back."},{"id":"limitPoint","label":"Limit of proportionality","x":83,"y":36,"note":"Past this point the line bends: the spring is overstretched and deforms inelastically, no longer springing fully back when unloaded."}]},

"140\" y1=\"123\" x2=\"140\" y2=\"200\" stroke=\"#B4341E\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#ar5w)\"/>\n</g>\n<g data-part=\"normalForce\">\n  <line x1=\"120\" y1=\"106\" x2=\"120\" y2=\"54\" stroke=\"#2C5F2D\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#ar5n)\"/>\n</g>\n<g data-part=\"acceleration\">\n  <line x1=\"196\" y1=\"188\" x2=\"286\" y2=\"188\" stroke=\"#C99528\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#ar5a)\" class=\"sm-flow\" stroke-dasharray=\"10 8\"/>\n  <text x=\"234\" y=\"210\" font-family=\"sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"#C99528\">a</text>\n</g>","parts":[{"id":"trolley","label":"Trolley (mass)","x":50,"y":50,"note":"Here is our trolley with a set mass; we will push it and measure how quickly it speeds up along the track."},{"id":"track","label":"Track","x":28,"y":65,"note":"The trolley runs along this smooth, level track, so we can watch its motion without friction hiding the effect of our force."},{"id":"pullForce","label":"Resultant force","x":75,"y":53,"note":"We pull the trolley with a resultant force; a bigger force makes it accelerate faster, since force equals mass times acceleration."},{"id":"weight","label":"Weight","x":49,"y":79,"note":"Gravity pulls the trolley down with its weight; on a level track this alone cannot change its forward motion."},{"id":"normalForce","label":"Normal (reaction) force","x":49,"y":31,"note":"The track pushes up with a normal force, exactly balancing the weight, so the trolley neither sinks nor lifts off."},{"id":"acceleration","label":"Acceleration","x":26,"y":40,"note":"The resultant force makes the trolley accelerate, gaining speed each second; double the force and the acceleration doubles too."}]},
"d_GF6":{"vb":"0 0 320 230","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"230\" fill=\"#F4F6FC\"/>\n<rect x=\"14\" y=\"120\" width=\"292\" height=\"60\" fill=\"#E7EAF3\"/>\n<line x1=\"14\" y1=\"150\" x2=\"34\" y2=\"150\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n<line x1=\"286\" y1=\"150\" x2=\"306\" y2=\"150\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n<defs>\n  <marker id=\"ar6\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\"><path d=\"M0 0 L10 5 L0 10 z\" fill=\"#1E2761\"/></marker>\n  <marker id=\"ar6m\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\"><path d=\"M0 0 L10 5 L0 10 z\" fill=\"#C99528\"/></marker>\n</defs>\n<path d=\"M40 120 L52 100 L86 100 L102 120 Z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>\n<rect x=\"34\" y=\"118\" width=\"74\" height=\"20\" rx=\"6\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n<g data-part=\"momentumArrow\">\n  <line x1=\"108\" y1=\"108\" x2=\"168\" y2=\"108\" stroke=\"#C99528\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#ar6m)\" class=\"sm-flow\" stroke-dasharray=\"9 7\"/>\n  <text x=\"128\" y=\"100\" font-family=\"sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"#C99528\">p = mv</text>\n</g>\n<g data-part=\"wheel\">\n  <circle cx=\"92\" cy=\"138\" r=\"12\" fill=\"#1E2761\"/>\n  <circle cx=\"92\" cy=\"138\" r=\"5\" fill=\"#fff\"/>\n  <circle cx=\"60\" cy=\"138\" r=\"9\" fill=\"#1E2761\"/>\n  <circle cx=\"60\" cy=\"138\" r=\"3.5\" fill=\"#fff\"/>\n</g>\n<g data-part=\"thinkingDistance\">\n  <rect x=\"40\" y=\"156\" width=\"112\" height=\"20\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"1.5\"/>\n</g>\n<g data-part=\"brakingDistance\">\n  <rect x=\"152\" y=\"156\" width=\"126\" height=\"20\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"1.5\"/>\n</g>\n<g data-part=\"reactionPoint\">\n  <line x1=\"40\" y1=\"150\" x2=\"40\" y2=\"182\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <circle cx=\"40\" cy=\"150\" r=\"4\" fill=\"#B4341E\"/>\n</g>\n<g data-part=\"brakesApplied\">\n  <line x1=\"152\" y1=\"150\" x2=\"152\" y2=\"182\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-dasharray=\"6 5\" stroke-linecap=\"round\"/>\n  <circle cx=\"152\" cy=\"150\" r=\"4\" fill=\"#1E2761\"/>\n</g>\n<g data-part=\"stoppingDistance\">\n  <line x1=\"40\" y1=\"200\" x2=\"278\" y2=\"200\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\" marker-start=\"url(#ar6)\" marker-end=\"url(#ar6)\"/>\n  <line x1=\"40\" y1=\"194\" x2=\"40\" y2=\"206\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"278\" y1=\"194\" x2=\"278\" y2=\"206\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n</g>","parts":[{"id":"stoppingDistance","label":"Stopping distance","x":50,"y":91,"note":"The whole gap the car covers before it halts splits into two stretches: the thinking part plus the braking part added together."},{"id":"thinkingDistance","label":"Thinking distance","x":31,"y":74,"note":"Before the brakes even touch, the car keeps rolling while the driver notices the hazard; tiredness, alcohol or distraction stretch this further."},{"id":"brakingDistance","label":"Braking distance","x":68,"y":74,"note":"Once the brakes bite, the car still travels forward as it slows; wet, icy roads or worn tyres lengthen this stretch."},{"id":"reactionPoint","label":"Driver reacts","x":19,"y":25,"note":"Here the driver spots the danger and decides to act, but their reaction time means the car has already moved on."},{"id":"brakesApplied","label":"Brakes applied","x":49,"y":66,"note":"Now the driver presses the pedal and the brakes start slowing the car, beginning the braking part of the journey."},{"id":"wheel","label":"Braking wheel","x":82,"y":64,"note":"The brake grips the wheel, and a bigger braking force decelerates the car harder, though huge decelerations can be dangerous and overheat the brakes."},{"id":"momentumArrow","label":"Momentum (p = mv)","x":93,"y":55,"note":"The moving car carries momentum, mass times velocity; in a crash this total momentum is shared out but never lost overall."}]},
"d_GL1":{"vb":"0 0 320 220","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"216\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<!-- current-flow arrows drift around the loop (shared hint, outside groups) -->\n<g fill=\"#C99528\">\n  <path d=\"M150 30 l10 5 -10 5 z\" class=\"sm-drift\"/>\n  <path d=\"M292 110 l-5 10 -5 -10 z\" class=\"sm-drift\"/>\n  <path d=\"M170 194 l-10 -5 10 -5 z\" class=\"sm-drift\"/>\n  <path d=\"M28 118 l5 -10 5 10 z\" class=\"sm-drift\"/>\n</g>\n\n<!-- loop : the complete wire path -->\n<g data-part=\"loop\">\n  <path d=\"M40 40 H280 V180 H40 Z\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n</g>\n\n<!-- cell : left side, drives the loop -->\n<g data-part=\"cell\">\n  <line x1=\"40\" y1=\"96\" x2=\"40\" y2=\"112\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <line x1=\"40\" y1=\"90\" x2=\"40\" y2=\"102\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"30\" y1=\"98\" x2=\"50\" y2=\"98\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"30\" y1=\"112\" x2=\"50\" y2=\"112\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <text x=\"55\" y=\"96\" font-family=\"Georgia,serif\" font-size=\"11\" fill=\"#B4341E\">+</text>\n  <text x=\"55\" y=\"120\" font-family=\"Georgia,serif\" font-size=\"13\" fill=\"#1E2761\">-</text>\n</g>\n\n<!-- switch : top-left, gap open/closed -->\n<g data-part=\"switch\">\n  <line x1=\"82\" y1=\"40\" x2=\"98\" y2=\"40\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <circle cx=\"98\" cy=\"40\" r=\"3\" fill=\"#1E2761\"/>\n  <circle cx=\"126\" cy=\"40\" r=\"3\" fill=\"#1E2761\"/>\n  <line x1=\"126\" y1=\"40\" x2=\"142\" y2=\"40\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <line x1=\"98\" y1=\"40\" x2=\"123\" y2=\"29\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- ammeter : top-right -->\n<g data-part=\"ammeter\">\n  <line x1=\"205\" y1=\"40\" x2=\"235\" y2=\"40\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <circle cx=\"220\" cy=\"40\" r=\"15\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <text x=\"220\" y=\"45\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"14\" font-weight=\"bold\" fill=\"#1E2761\">A</text>\n</g>\n\n<!-- lamp : right side, glowing -->\n<g data-part=\"lamp\">\n  <line x1=\"280\" y1=\"95\" x2=\"280\" y2=\"125\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <circle cx=\"280\" cy=\"110\" r=\"15\" fill=\"#FBEFC8\" stroke=\"#1E2761\" stroke-width=\"3\" class=\"sm-glow\"/>\n  <line x1=\"269.4\" y1=\"99.4\" x2=\"290.6\" y2=\"120.6\" stroke=\"#C99528\" stroke-width=\"2.5\"/>\n  <line x1=\"290.6\" y1=\"99.4\" x2=\"269.4\" y2=\"120.6\" stroke=\"#C99528\" stroke-width=\"2.5\"/>\n  <g stroke=\"#C99528\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-glow\">\n    <line x1=\"280\" y1=\"86\" x2=\"280\" y2=\"80\"/>\n    <line x1=\"299\" y1=\"94\" x2=\"304\" y2=\"90\"/>\n    <line x1=\"299\" y1=\"126\" x2=\"304\" y2=\"130\"/>\n  </g>\n</g>\n\n<!-- resistor : bottom -->\n<g data-part=\"resistor\">\n  <line x1=\"128\" y1=\"180\" x2=\"192\" y2=\"180\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <rect x=\"130\" y=\"170\" width=\"60\" height=\"20\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n</g>\n","parts":[{"id":"cell","label":"Cell","x":39,"y":14,"note":"The cell is the pump: it provides the potential difference that pushes electric charge round the whole circuit."},{"id":"switch","label":"Switch","x":72,"y":14,"note":"The switch is the gate: closed it lets charge flow, open it breaks the loop and everything stops."},{"id":"ammeter","label":"Ammeter (A)","x":92,"y":50,"note":"The ammeter sits in the line, in series, counting how much charge flows past each second, measured in amperes."},{"id":"resistor","label":"Resistor","x":13,"y":50,"note":"The resistor squeezes the flow, opposing the charge and limiting how big the current can grow around the loop."},{"id":"lamp","label":"Lamp","x":50,"y":80,"note":"Charge pushed through the lamp heats its thin filament until it glows, turning electrical energy into light."},{"id":"loop","label":"Closed loop","x":28,"y":80,"note":"Now the loop is complete with no breaks, so charge can flow all the way round and the lamp lights."}]},
"d_GL2":{"vb":"0 0 320 250","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"246\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<g fill=\"#C99528\">\n  <path d=\"M150 42 l10 5 -10 5 z\" class=\"sm-drift\"/>\n  <path d=\"M60 200 l-10 -5 10 -5 z\" class=\"sm-drift\"/>\n</g>\n\n<!-- leads : the whole connecting wire loop -->\n<g data-part=\"leads\">\n  <path d=\"M50 52 H270 V196 H50 Z\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n</g>\n\n<!-- cell : left -->\n<g data-part=\"cell\">\n  <line x1=\"50\" y1=\"112\" x2=\"50\" y2=\"136\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <line x1=\"40\" y1=\"114\" x2=\"60\" y2=\"114\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"42\" y1=\"122\" x2=\"58\" y2=\"122\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <line x1=\"40\" y1=\"130\" x2=\"60\" y2=\"130\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"42\" y1=\"138\" x2=\"58\" y2=\"138\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- ammeter : top-left, in series -->\n<g data-part=\"ammeter\">\n  <line x1=\"95\" y1=\"52\" x2=\"125\" y2=\"52\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <circle cx=\"110\" cy=\"52\" r=\"15\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <text x=\"110\" y=\"57\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"14\" font-weight=\"bold\" fill=\"#1E2761\">A</text>\n</g>\n\n<!-- testWire : bottom, the resistance-wire under test -->\n<g data-part=\"testWire\">\n  <line x1=\"120\" y1=\"196\" x2=\"205\" y2=\"196\" stroke=\"#F4F6FC\" stroke-width=\"8\"/>\n  <path d=\"M120 196 q5 -6 10 0 t10 0 t10 0 t10 0 t10 0 t10 0 t10 0 t10 0\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- voltmeter : below the wire, connected in parallel across it -->\n<g data-part=\"voltmeter\">\n  <line x1=\"140\" y1=\"196\" x2=\"140\" y2=\"222\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"185\" y1=\"196\" x2=\"185\" y2=\"222\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"140\" y1=\"222\" x2=\"150\" y2=\"222\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"175\" y1=\"222\" x2=\"185\" y2=\"222\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <circle cx=\"162.5\" cy=\"222\" r=\"15\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <text x=\"162.5\" y=\"227\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"14\" font-weight=\"bold\" fill=\"#1E2761\">V</text>\n</g>\n","parts":[{"id":"cell","label":"Cell","x":50,"y":76,"note":"The cell pushes charge round the whole circuit, providing the potential difference that drives a current through the test wire."},{"id":"ammeter","label":"Ammeter","x":37,"y":44,"note":"Wired in series, the ammeter counts the current flowing through the wire in amps, one of your two key readings."},{"id":"testWire","label":"Test wire","x":67,"y":44,"note":"Current squeezes along this wire; make it longer and it resists more, so the same voltage pushes a smaller current through."},{"id":"voltmeter","label":"Voltmeter","x":77,"y":24,"note":"Connected in parallel across the wire, this reads the potential difference in volts, the energy given to each coulomb passing through."},{"id":"leads","label":"Connecting leads","x":19,"y":60,"note":"These low-resistance leads connect everything into one loop, so charge flows from cell, through wire and meters, and back."}]},
"d_GL3":{"vb":"0 0 320 300","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"296\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<!-- shared axes for the I-V graph on the right -->\n<g stroke=\"#1E2761\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\">\n  <line x1=\"180\" y1=\"150\" x2=\"308\" y2=\"150\"/>\n  <line x1=\"244\" y1=\"90\" x2=\"244\" y2=\"210\"/>\n</g>\n<text x=\"303\" y=\"145\" font-family=\"Georgia,serif\" font-size=\"10\" fill=\"#1E2761\">V</text>\n<text x=\"250\" y=\"98\" font-family=\"Georgia,serif\" font-size=\"10\" fill=\"#1E2761\">I</text>\n\n<!-- ohmicResistor : symbol top-left + straight line through origin -->\n<g data-part=\"ohmicResistor\">\n  <rect x=\"30\" y=\"34\" width=\"46\" height=\"16\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"14\" y1=\"42\" x2=\"30\" y2=\"42\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"76\" y1=\"42\" x2=\"92\" y2=\"42\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"196\" y1=\"192\" x2=\"296\" y2=\"108\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- filamentLamp : lamp symbol + S-curve -->\n<g data-part=\"filamentLamp\">\n  <circle cx=\"53\" cy=\"86\" r=\"14\" fill=\"#FBEFC8\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"43\" y1=\"76\" x2=\"63\" y2=\"96\" stroke=\"#C99528\" stroke-width=\"2.5\"/>\n  <line x1=\"63\" y1=\"76\" x2=\"43\" y2=\"96\" stroke=\"#C99528\" stroke-width=\"2.5\"/>\n  <line x1=\"14\" y1=\"86\" x2=\"39\" y2=\"86\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"67\" y1=\"86\" x2=\"92\" y2=\"86\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path d=\"M198 196 C222 176 232 172 244 150 C256 128 266 124 290 104\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- diode : symbol + one-sided curve -->\n<g data-part=\"diode\">\n  <line x1=\"14\" y1=\"138\" x2=\"42\" y2=\"138\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path d=\"M42 128 L62 138 L42 148 Z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n  <line x1=\"62\" y1=\"126\" x2=\"62\" y2=\"150\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"62\" y1=\"138\" x2=\"92\" y2=\"138\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path d=\"M196 150 L262 150 C280 150 286 132 292 108\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- thermistor : symbol + curve, with heat cue -->\n<g data-part=\"thermistor\">\n  <rect x=\"30\" y=\"182\" width=\"46\" height=\"16\" rx=\"3\" fill=\"#F1D2D8\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"28\" y1=\"202\" x2=\"74\" y2=\"176\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <line x1=\"14\" y1=\"190\" x2=\"30\" y2=\"190\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"76\" y1=\"190\" x2=\"92\" y2=\"190\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-rise\">\n    <path d=\"M40 172 q4 -5 0 -10\"/>\n    <path d=\"M52 172 q4 -5 0 -10\"/>\n    <path d=\"M64 172 q4 -5 0 -10\"/>\n  </g>\n</g>\n\n<!-- ldr : symbol + curve, with light arrows -->\n<g data-part=\"ldr\">\n  <circle cx=\"53\" cy=\"248\" r=\"16\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <rect x=\"42\" y=\"242\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"14\" y1=\"248\" x2=\"37\" y2=\"248\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"69\" y1=\"248\" x2=\"92\" y2=\"248\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g stroke=\"#C99528\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-glow\">\n    <line x1=\"70\" y1=\"228\" x2=\"60\" y2=\"238\"/><path d=\"M60 238 l6 -1 -1 -5 z\" fill=\"#C99528\" stroke=\"none\"/>\n    <line x1=\"82\" y1=\"238\" x2=\"70\" y2=\"245\"/><path d=\"M70 245 l6 0 -2 -5 z\" fill=\"#C99528\" stroke=\"none\"/>\n  </g>\n</g>\n\n<!-- testCircuit : small A & V meter pair driving the plot (top-right corner) -->\n<g data-part=\"testCircuit\">\n  <rect x=\"196\" y=\"30\" width=\"112\" height=\"46\" rx=\"8\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"2\"/>\n  <circle cx=\"220\" cy=\"53\" r=\"13\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <text x=\"220\" y=\"58\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"12\" font-weight=\"bold\" fill=\"#1E2761\">A</text>\n  <circle cx=\"284\" cy=\"53\" r=\"13\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <text x=\"284\" y=\"58\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"12\" font-weight=\"bold\" fill=\"#1E2761\">V</text>\n  <rect x=\"244\" y=\"47\" width=\"16\" height=\"12\" rx=\"2\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"233\" y1=\"53\" x2=\"244\" y2=\"53\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"260\" y1=\"53\" x2=\"271\" y2=\"53\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n</g>\n","parts":[{"id":"ohmicResistor","label":"Resistor","x":26,"y":21,"note":"Push harder with more p.d. and the current climbs in step, so the I-V line stays perfectly straight through the origin."},{"id":"filamentLamp","label":"Filament lamp","x":74,"y":21,"note":"As current heats the thin wire, its resistance rises and chokes the flow, bending the line into an S-shaped curve."},{"id":"diode","label":"Diode","x":26,"y":49,"note":"Current pours through one way but hits a near-infinite wall the other way, so the graph only rises on one side."},{"id":"thermistor","label":"Thermistor","x":74,"y":49,"note":"Warm it up and its resistance drops, letting more current through, which lets circuits sense temperature and respond automatically."},{"id":"ldr","label":"LDR","x":23,"y":77,"note":"Shine more light on it and its resistance falls, so current rises, letting a circuit detect brightness and switch things on."},{"id":"testCircuit","label":"Test circuit (A & V)","x":76,"y":77,"note":"The ammeter counts current while the voltmeter reads p.d., so we can plot each component's I-V graph point by point."}]},
"d_GL4":{"vb":"0 0 320 240","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"236\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<line x1=\"160\" y1=\"20\" x2=\"160\" y2=\"220\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"/>\n<text x=\"70\" y=\"30\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"11\" fill=\"#1E2761\">SERIES</text>\n<text x=\"238\" y=\"30\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"11\" fill=\"#1E2761\">PARALLEL</text>\n\n<!-- battery : bottom-left, the shared supply -->\n<g data-part=\"battery\">\n  <line x1=\"44\" y1=\"188\" x2=\"44\" y2=\"212\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <line x1=\"34\" y1=\"190\" x2=\"54\" y2=\"190\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"36\" y1=\"198\" x2=\"52\" y2=\"198\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <line x1=\"34\" y1=\"206\" x2=\"54\" y2=\"206\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"36\" y1=\"214\" x2=\"52\" y2=\"214\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- seriesLoop : the single loop wire on the left -->\n<g data-part=\"seriesLoop\">\n  <path d=\"M44 188 V50 H140 V212 H44\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n  <path d=\"M84 44 l10 5 -10 5 z\" fill=\"#C99528\" class=\"sm-drift\"/>\n</g>\n\n<!-- seriesResistor : two resistors in the top run of the series loop -->\n<g data-part=\"seriesResistor\">\n  <line x1=\"60\" y1=\"50\" x2=\"92\" y2=\"50\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <rect x=\"60\" y=\"42\" width=\"32\" height=\"16\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"100\" y1=\"50\" x2=\"132\" y2=\"50\" stroke=\"#F4F6FC\" stroke-width=\"7\"/>\n  <rect x=\"100\" y=\"42\" width=\"32\" height=\"16\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n</g>\n\n<!-- seriesBreak : a gap in the right vertical of the series loop -->\n<g data-part=\"seriesBreak\">\n  <line x1=\"140\" y1=\"118\" x2=\"140\" y2=\"142\" stroke=\"#F4F6FC\" stroke-width=\"8\"/>\n  <circle cx=\"140\" cy=\"118\" r=\"3.5\" fill=\"#B4341E\"/>\n  <circle cx=\"140\" cy=\"142\" r=\"3.5\" fill=\"#B4341E\"/>\n  <path d=\"M126 122 l16 16 M142 122 l-16 16\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- parallelJunction : node on the right where current splits -->\n<g data-part=\"parallelJunction\">\n  <path d=\"M210 188 V70 H300 V70\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n  <path d=\"M210 212 H300 V70\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n  <line x1=\"188\" y1=\"200\" x2=\"210\" y2=\"200\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <path d=\"M210 188 V212\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <circle cx=\"210\" cy=\"130\" r=\"4.5\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <circle cx=\"300\" cy=\"130\" r=\"4.5\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"188\" y1=\"200\" x2=\"188\" y2=\"200\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n</g>\n\n<!-- parallelBranch : two horizontal branches each with a resistor -->\n<g data-part=\"parallelBranch\">\n  <line x1=\"210\" y1=\"100\" x2=\"300\" y2=\"100\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"210\" y1=\"160\" x2=\"300\" y2=\"160\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <rect x=\"238\" y=\"92\" width=\"34\" height=\"16\" rx=\"3\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <rect x=\"238\" y=\"152\" width=\"34\" height=\"16\" rx=\"3\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <g fill=\"#C99528\" class=\"sm-drift\">\n    <path d=\"M258 94 l0 0\" />\n    <path d=\"M226 100 l8 4 -8 4 z\"/>\n    <path d=\"M226 160 l8 4 -8 4 z\"/>\n  </g>\n</g>\n","parts":[{"id":"battery","label":"Battery (supply)","x":13,"y":19,"note":"The battery pushes charge out and drives the whole circuit; this potential difference is shared out to everything connected to it."},{"id":"seriesLoop","label":"Series loop","x":41,"y":20,"note":"Here the parts sit in one single loop, so the same current flows through every component, one after another, all the way round."},{"id":"seriesResistor","label":"Resistor","x":38,"y":56,"note":"Each resistor added to the loop squeezes the current more, so the total resistance grows and less current flows overall."},{"id":"seriesBreak","label":"Single break","x":19,"y":86,"note":"Snap the loop anywhere and the current has no path back, so everything switches off at once, like old fairy lights."},{"id":"parallelJunction","label":"Junction","x":72,"y":25,"note":"At this junction the current splits, giving it extra paths to flow through; more paths mean the total resistance actually drops."},{"id":"parallelBranch","label":"Parallel branch","x":90,"y":41,"note":"Each branch feels the full supply voltage; their separate currents rejoin, adding up to the total current leaving the battery."}]},
"d_GL5":{"vb":"0 0 320 230","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"226\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n\n<!-- the wire loop (shared scaffold) -->\n<path d=\"M50 50 H270 V180 H50 Z\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n\n<!-- cell : left side -->\n<g data-part=\"cell\">\n  <line x1=\"50\" y1=\"100\" x2=\"50\" y2=\"130\" stroke=\"#F4F6FC\" stroke-width=\"6\"/>\n  <line x1=\"40\" y1=\"102\" x2=\"60\" y2=\"102\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"42\" y1=\"110\" x2=\"58\" y2=\"110\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <line x1=\"40\" y1=\"118\" x2=\"60\" y2=\"118\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n  <line x1=\"42\" y1=\"126\" x2=\"58\" y2=\"126\" stroke=\"#1E2761\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n</g>\n\n<!-- potentialDifference : voltmeter-style bracket across the cell -->\n<g data-part=\"potentialDifference\">\n  <path d=\"M74 96 H92 V134 H74\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n  <text x=\"97\" y=\"119\" font-family=\"Georgia,serif\" font-size=\"12\" fill=\"#B4341E\">V</text>\n</g>\n\n<!-- current : arrows along the top wire -->\n<g data-part=\"current\">\n  <line x1=\"120\" y1=\"50\" x2=\"200\" y2=\"50\" stroke=\"#C99528\" stroke-width=\"0\"/>\n  <g fill=\"#C99528\" class=\"sm-drift\">\n    <path d=\"M140 44 l12 6 -12 6 z\"/>\n    <path d=\"M172 44 l12 6 -12 6 z\"/>\n  </g>\n  <text x=\"150\" y=\"38\" font-family=\"Georgia,serif\" font-size=\"11\" fill=\"#C99528\">I</text>\n</g>\n\n<!-- charge : a moving charge dot on the bottom wire -->\n<g data-part=\"charge\">\n  <circle cx=\"150\" cy=\"180\" r=\"8\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\" class=\"sm-osc-x\"/>\n  <text x=\"150\" y=\"184\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"9\" font-weight=\"bold\" fill=\"#1E2761\">+</text>\n</g>\n\n<!-- resistor : right side -->\n<g data-part=\"resistor\">\n  <line x1=\"270\" y1=\"98\" x2=\"270\" y2=\"132\" stroke=\"#F4F6FC\" stroke-width=\"8\"/>\n  <rect x=\"258\" y=\"98\" width=\"24\" height=\"34\" rx=\"3\" fill=\"#F1D2D8\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n</g>\n\n<!-- energyOut : heat + light radiating from the resistor -->\n<g data-part=\"energyOut\">\n  <g stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\" class=\"sm-rise\">\n    <path d=\"M286 96 q6 -6 0 -12\"/>\n    <path d=\"M294 104 q6 -6 0 -12\"/>\n  </g>\n  <g stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linecap=\"round\" class=\"sm-glow\">\n    <line x1=\"290\" y1=\"115\" x2=\"302\" y2=\"115\"/>\n    <line x1=\"288\" y1=\"128\" x2=\"299\" y2=\"134\"/>\n    <line x1=\"288\" y1=\"102\" x2=\"299\" y2=\"96\"/>\n  </g>\n</g>\n","parts":[{"id":"cell","label":"Cell","x":50,"y":26,"note":"The cell pushes charge round the circuit, driving the current that will deliver electrical power to the components."},{"id":"potentialDifference","label":"Potential difference","x":37,"y":33,"note":"The potential difference is the push per unit charge; multiply it by the current and you get the power transferred."},{"id":"current","label":"Current","x":88,"y":44,"note":"Current is the flow of charge each second; a bigger current squared through resistance means more power delivered."},{"id":"resistor","label":"Resistor","x":50,"y":65,"note":"Charge squeezing through the resistor transfers energy as heat; a higher power rating shifts that energy faster."},{"id":"charge","label":"Charge","x":19,"y":46,"note":"As each unit of charge crosses the potential difference, it hands over energy equal to charge times voltage."},{"id":"energyOut","label":"Energy transferred","x":50,"y":47,"note":"Energy pours out here as heat and light; the higher the power, the quicker this energy is transferred."}]},
"d_GL6":{"vb":"0 0 320 260","svg":"\n<rect x=\"2\" y=\"2\" width=\"316\" height=\"256\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<!-- transmission line (shared scaffold) -->\n<line x1=\"86\" y1=\"46\" x2=\"234\" y2=\"46\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n<path d=\"M112 46 v14 M208 46 v14\" stroke=\"#7a8199\" stroke-width=\"1.5\"/>\n<g fill=\"#C99528\" class=\"sm-drift\"><path d=\"M150 40 l10 6 -10 6 z\"/></g>\n\n<!-- powerStation : far left, generates a.c. -->\n<g data-part=\"powerStation\">\n  <rect x=\"16\" y=\"46\" width=\"46\" height=\"40\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <path d=\"M28 46 l6 -14 6 14 z\" fill=\"#7a8199\"/>\n  <path d=\"M28 34 q4 -8 0 -14 M38 34 q4 -8 0 -14\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-rise\"/>\n  <path d=\"M44 66 q4 -5 8 0 t8 0\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n</g>\n\n<!-- stepUpTransformer : boosts voltage after station -->\n<g data-part=\"stepUpTransformer\">\n  <circle cx=\"80\" cy=\"66\" r=\"13\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <circle cx=\"93\" cy=\"66\" r=\"13\" fill=\"#fff\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n  <line x1=\"66\" y1=\"66\" x2=\"62\" y2=\"66\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"106\" y1=\"66\" x2=\"112\" y2=\"66\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"86\" y1=\"52\" x2=\"86\" y2=\"46\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-rise\">\n    <line x1=\"86\" y1=\"30\" x2=\"86\" y2=\"20\"/><path d=\"M86 20 l-3 6 6 0 z\" fill=\"#B4341E\" stroke=\"none\"/>\n  </g>\n</g>\n\n<!-- pylon suggestion (scaffold) -->\n<path d=\"M160 46 l-8 20 h16 z M160 46 v-8\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"1.5\"/>\n\n<!-- stepDownTransformer : drops voltage for homes -->\n<g data-part=\"stepDownTransformer\">\n  <circle cx=\"227\" cy=\"66\" r=\"13\" fill=\"#fff\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n  <circle cx=\"240\" cy=\"66\" r=\"13\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"227\" y1=\"52\" x2=\"227\" y2=\"46\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"253\" y1=\"66\" x2=\"258\" y2=\"66\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <g stroke=\"#2C5F2D\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-fall\">\n    <line x1=\"240\" y1=\"20\" x2=\"240\" y2=\"30\"/><path d=\"M240 30 l-3 -6 6 0 z\" fill=\"#2C5F2D\" stroke=\"none\"/>\n  </g>\n  <path d=\"M266 60 l14 -10 v20 z M280 46 h20 v28 h-20\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>\n</g>\n\n<!-- plug body (shared scaffold) -->\n<rect x=\"60\" y=\"120\" width=\"200\" height=\"118\" rx=\"12\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n<circle cx=\"160\" cy=\"140\" r=\"7\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\"/>\n<text x=\"160\" y=\"234\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-size=\"9\" fill=\"#7a8199\">three-pin plug</text>\n\n<!-- earthWire : green/yellow to the top (longest) earth pin -->\n<g data-part=\"earthWire\">\n  <line x1=\"160\" y1=\"147\" x2=\"160\" y2=\"120\" stroke=\"#2C5F2D\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <rect x=\"155\" y=\"106\" width=\"10\" height=\"16\" rx=\"2\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n</g>\n\n<!-- liveWire : brown, right side, 230 V, through the fuse -->\n<g data-part=\"liveWire\">\n  <line x1=\"228\" y1=\"160\" x2=\"228\" y2=\"196\" stroke=\"#7a8199\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <line x1=\"228\" y1=\"200\" x2=\"228\" y2=\"230\" stroke=\"#B4341E\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <rect x=\"223\" y=\"230\" width=\"10\" height=\"14\" rx=\"2\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <text x=\"243\" y=\"216\" font-family=\"Georgia,serif\" font-size=\"9\" fill=\"#B4341E\">230 V</text>\n</g>\n\n<!-- fuse : in the live wire, melts on fault -->\n<g data-part=\"fuse\">\n  <rect x=\"216\" y=\"160\" width=\"24\" height=\"14\" rx=\"3\" fill=\"#FBEFC8\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"220\" y1=\"167\" x2=\"236\" y2=\"167\" stroke=\"#B4341E\" stroke-width=\"2\" class=\"sm-glow\"/>\n</g>\n\n<!-- neutralWire : blue, left, ~0 V, return path -->\n<g data-part=\"neutralWire\">\n  <line x1=\"96\" y1=\"160\" x2=\"96\" y2=\"230\" stroke=\"#3766A8\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <rect x=\"91\" y=\"230\" width=\"10\" height=\"14\" rx=\"2\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <text x=\"70\" y=\"200\" font-family=\"Georgia,serif\" font-size=\"9\" fill=\"#3766A8\">0 V</text>\n</g>\n","parts":[{"id":"powerStation","label":"Power station","x":15,"y":21,"note":"Here the journey begins: the power station generates alternating current, the back-and-forth mains electricity that will feed the whole grid."},{"id":"stepUpTransformer","label":"Step-up transformer","x":34,"y":22,"note":"Straight away the voltage is boosted right up. Raising the voltage drops the current flowing on into the transmission lines."},{"id":"stepDownTransformer","label":"Step-down transformer","x":79,"y":22,"note":"The low current wasted little heat along the cables, so now this transformer drops the voltage back down for safe use in homes."},{"id":"liveWire","label":"Live wire","x":20,"y":52,"note":"Inside the home cable, the brown live wire arrives carrying the full 230 V, delivering the energy that drives the appliance."},{"id":"neutralWire","label":"Neutral wire","x":35,"y":56,"note":"The blue neutral wire sits near 0 V and carries the current back out, completing the circuit so charge keeps flowing."},{"id":"earthWire","label":"Earth wire","x":55,"y":60,"note":"The green-and-yellow earth wire stays quiet as a safety line, only carrying current if a fault sends charge astray."},{"id":"fuse","label":"Fuse","x":70,"y":60,"note":"If too big a current flows in a fault, the fuse wire melts and breaks the circuit, cutting the danger off."}]},

 and they flip direction, showing the field depends on current flow."}]},
"d_GM3":{"vb":"0 0 320 240","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"240\" fill=\"#ffffff\"/>\n\n<!-- Field lines N -> S across the gap -->\n<g data-part=\"fieldLines\">\n  <g stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\" class=\"sm-flow\" stroke-dasharray=\"7 5\">\n    <line x1=\"84\" y1=\"70\" x2=\"236\" y2=\"70\"/>\n    <line x1=\"84\" y1=\"96\" x2=\"236\" y2=\"96\"/>\n    <line x1=\"84\" y1=\"122\" x2=\"236\" y2=\"122\"/>\n  </g>\n  <polygon points=\"236,70 226,65 226,75\" fill=\"#7a8199\"/>\n  <polygon points=\"236,96 226,91 226,101\" fill=\"#7a8199\"/>\n  <polygon points=\"236,122 226,117 226,127\" fill=\"#7a8199\"/>\n</g>\n\n<!-- North pole -->\n<g data-part=\"northPole\">\n  <rect x=\"46\" y=\"52\" width=\"40\" height=\"92\" rx=\"4\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <text x=\"66\" y=\"104\" font-size=\"16\" fill=\"#ffffff\" text-anchor=\"middle\" font-family=\"sans-serif\" font-weight=\"bold\">N</text>\n</g>\n<!-- South pole -->\n<g data-part=\"southPole\">\n  <rect x=\"234\" y=\"52\" width=\"40\" height=\"92\" rx=\"4\" fill=\"#1E2761\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <text x=\"254\" y=\"104\" font-size=\"16\" fill=\"#ffffff\" text-anchor=\"middle\" font-family=\"sans-serif\" font-weight=\"bold\">S</text>\n</g>\n\n<!-- Current-carrying coil -->\n<g data-part=\"coil\">\n  <line x1=\"120\" y1=\"96\" x2=\"200\" y2=\"96\" stroke=\"#C99528\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n  <polygon points=\"200,96 190,91 190,101\" fill=\"#C99528\"/>\n</g>\n\n<!-- Upward force -->\n<g data-part=\"forceUp\">\n  <line x1=\"160\" y1=\"92\" x2=\"160\" y2=\"40\" stroke=\"#2C5F2D\" stroke-width=\"4\" stroke-linecap=\"round\" class=\"sm-throb\"/>\n  <polygon points=\"160,30 152,46 168,46\" fill=\"#2C5F2D\" class=\"sm-throb\"/>\n  <text x=\"176\" y=\"42\" font-size=\"11\" fill=\"#2C5F2D\" font-family=\"sans-serif\" font-weight=\"bold\">F</text>\n</g>\n\n<!-- Split-ring commutator -->\n<g data-part=\"commutator\">\n  <path d=\"M130 176 a18 18 0 0 1 16 0 l0 34 a18 18 0 0 1 -16 0 z\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path d=\"M150 176 a18 18 0 0 1 16 0 l0 34 a18 18 0 0 1 -16 0 z\" fill=\"#e0b45a\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <rect x=\"146\" y=\"174\" width=\"4\" height=\"38\" fill=\"#ffffff\"/>\n  <rect x=\"112\" y=\"188\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#1E2761\"/>\n  <rect x=\"170\" y=\"188\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#1E2761\"/>\n</g>\n\n<!-- Battery -->\n<g data-part=\"battery\">\n  <path d=\"M119 193 H100 V222 H150\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path d=\"M177 193 H220 V222 H150\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <line x1=\"143\" y1=\"212\" x2=\"143\" y2=\"232\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"157\" y1=\"217\" x2=\"157\" y2=\"227\" stroke=\"#1E2761\" stroke-width=\"6\"/>\n  <text x=\"135\" y=\"210\" font-size=\"11\" fill=\"#B4341E\" text-anchor=\"middle\" font-family=\"sans-serif\" font-weight=\"bold\">+</text>\n</g>","parts":[{"id":"northPole","label":"North pole","x":11,"y":50,"note":"The north pole sends invisible field lines out into the gap, ready to push on any current flowing through the wire here."},{"id":"southPole","label":"South pole","x":89,"y":50,"note":"The south pole pulls the field lines in, so the field runs straight across the gap from north to south."},{"id":"fieldLines","label":"Magnetic field","x":75,"y":35,"note":"These lines mark the field crossing the gap; the wire sits at 90 degrees to them, giving the biggest possible push."},{"id":"coil","label":"Current-carrying coil","x":50,"y":50,"note":"Current flows along the wire through this field, and where the two meet a force is created that shoves the wire sideways."},{"id":"forceUp","label":"Upward force","x":33,"y":15,"note":"One side gets pushed up while the other is pushed down, so the coil turns, spinning the motor round."},{"id":"commutator","label":"Split-ring commutator","x":50,"y":72,"note":"This split ring flips the current each half-turn, so the forces keep pushing the same way and the spin never stops."},{"id":"battery","label":"Battery","x":55,"y":98,"note":"The battery drives the current round the circuit and into the coil, powering the whole spinning motor."}]},

axy","label":"Distant galaxy","x":64,"y":28,"note":"This galaxy sits far out in space, and being furthest away it races away from us the fastest."},{"id":"nearGalaxy","label":"Nearer galaxy","x":34,"y":38,"note":"A closer galaxy is still fleeing, but being nearer it moves away more slowly than the distant one."},{"id":"expansion","label":"Moving apart","x":47,"y":18,"note":"Space itself stretches, carrying every galaxy apart from every other, like dots on an inflating balloon."},{"id":"shortWave","label":"Source light","x":27,"y":80,"note":"Each galaxy sends out light with its own wavelengths, our starting ruler before the journey across expanding space."},{"id":"redWave","label":"Red-shifted light","x":59,"y":85,"note":"As the galaxy speeds away, its light gets stretched to longer wavelengths, shifting towards red and proving the universe expands."}]},

\"26\" y=\"176\" width=\"268\" height=\"62\" rx=\"9\" fill=\"#FFFFFF\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<g data-part=\"longitudinalWave\">\n  <g fill=\"#7a8199\" class=\"sm-osc-x\">\n    <circle cx=\"42\" cy=\"207\" r=\"3.4\"/><circle cx=\"49\" cy=\"207\" r=\"3.4\"/><circle cx=\"56\" cy=\"207\" r=\"3.4\"/><circle cx=\"63\" cy=\"207\" r=\"3.4\"/>\n    <circle cx=\"79\" cy=\"207\" r=\"3.4\"/><circle cx=\"96\" cy=\"207\" r=\"3.4\"/><circle cx=\"113\" cy=\"207\" r=\"3.4\"/>\n    <circle cx=\"130\" cy=\"207\" r=\"3.4\"/><circle cx=\"137\" cy=\"207\" r=\"3.4\"/><circle cx=\"144\" cy=\"207\" r=\"3.4\"/><circle cx=\"151\" cy=\"207\" r=\"3.4\"/>\n    <circle cx=\"167\" cy=\"207\" r=\"3.4\"/><circle cx=\"184\" cy=\"207\" r=\"3.4\"/><circle cx=\"201\" cy=\"207\" r=\"3.4\"/>\n    <circle cx=\"218\" cy=\"207\" r=\"3.4\"/><circle cx=\"225\" cy=\"207\" r=\"3.4\"/><circle cx=\"232\" cy=\"207\" r=\"3.4\"/><circle cx=\"239\" cy=\"207\" r=\"3.4\"/>\n    <circle cx=\"256\" cy=\"207\" r=\"3.4\"/><circle cx=\"273\" cy=\"207\" r=\"3.4\"/>\n  </g>\n</g>\n<g data-part=\"compression\">\n  <polygon points=\"42,170 52,164 62,170\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>\n  <polygon points=\"130,170 140,164 150,170\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>\n  <polygon points=\"218,170 228,164 238,170\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>\n</g>\n<g data-part=\"rarefaction\">\n  <polygon points=\"86,246 96,252 106,246\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>\n  <polygon points=\"174,246 184,252 194,246\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>\n</g>","parts":[{"id":"transverseWave","label":"Transverse wave","x":70,"y":13,"note":"Watch the wave travel sideways while the particles bob up and down at right angles to it, carrying energy along without moving matter."},{"id":"amplitude","label":"Amplitude","x":18,"y":21,"note":"Measure from the rest line up to the crest: the bigger this height, the more energy the wave carries as it travels."},{"id":"wavelength","label":"Wavelength","x":38,"y":31,"note":"Measure from one crest across to the next crest: that gap is one complete wave repeating over and over as it moves."},{"id":"longitudinalWave","label":"Longitudinal wave","x":80,"y":68,"note":"Now the particles jiggle back and forth along the same direction the wave travels, squashing and stretching as sound does through air."},{"id":"compression","label":"Compression","x":15,"y":58,"note":"Here the particles bunch up tightly, squeezing together as the wave pushes through and momentarily raising the pressure."},{"id":"rarefaction","label":"Rarefaction","x":54.1,"y":58,"note":"Here the particles spread far apart, stretched thin between compressions, lowering the pressure before the next squeeze arrives."}]},

 196 Q282 186 288 196\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n  <path class=\"sm-osc-x\" d=\"M44 210 Q58 200 72 210 Q86 220 100 210 Q114 200 128 210 Q142 220 156 210 Q170 200 184 210 Q198 220 212 210 Q226 200 240 210 Q254 220 268 210 Q282 200 288 210\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n  <line x1=\"34\" y1=\"180\" x2=\"294\" y2=\"180\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <polygon points=\"296,180 288,177 288,183\" fill=\"#1E2761\"/>\n</g>","parts":[{"id":"crest","label":"Crest","x":17,"y":22,"note":"Here's the top of the wave, its highest point. Count how many crests pass each second and you have the frequency."},{"id":"trough","label":"Trough","x":35,"y":58,"note":"The wave dips to its lowest point here. A crest plus a trough makes one full wave carrying energy along."},{"id":"wavelength","label":"Wavelength","x":35,"y":18,"note":"Measure crest-to-crest and you have the wavelength. Multiply it by frequency and you get how fast the wave travels."},{"id":"amplitude","label":"Amplitude","x":70,"y":31,"note":"Measured from rest to the crest, this shows how much energy the wave carries, though it never changes the wave speed."},{"id":"restPosition","label":"Rest Position","x":85,"y":40,"note":"This is where the water or string sits still. The wave makes it wobble up and down about this line as energy passes."},{"id":"rippleTank","label":"Ripple Tank","x":50,"y":85,"note":"Send ripples across shallow water here, then time and measure them to work out the wave speed for real."}]},

ap=\"round\"/>\n  <polygon points=\"292,122 283,118 283,126\" fill=\"#B4341E\"/>\n</g>\n<line x1=\"160\" y1=\"30\" x2=\"160\" y2=\"126\" stroke=\"#7a8199\" stroke-width=\"1.4\" stroke-dasharray=\"3 3\"/>\n<g data-part=\"refractedRay\">\n  <rect x=\"26\" y=\"150\" width=\"268\" height=\"82\" rx=\"8\" fill=\"#FFFFFF\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <rect x=\"160\" y=\"150\" width=\"134\" height=\"82\" fill=\"#DCEAF6\"/>\n  <line x1=\"160\" y1=\"150\" x2=\"160\" y2=\"232\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"160\" y1=\"150\" x2=\"160\" y2=\"232\" stroke=\"#1E2761\" stroke-width=\"1\" stroke-dasharray=\"4 4\"/>\n  <line x1=\"160\" y1=\"146\" x2=\"160\" y2=\"236\" stroke=\"#7a8199\" stroke-width=\"1.2\" stroke-dasharray=\"4 4\"/>\n  <line class=\"sm-flow\" x1=\"42\" y1=\"160\" x2=\"160\" y2=\"200\" stroke=\"#B4341E\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-dasharray=\"7 6\"/>\n  <line class=\"sm-flow\" x1=\"160\" y1=\"200\" x2=\"280\" y2=\"220\" stroke=\"#B4341E\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-dasharray=\"7 6\"/>\n  <polygon points=\"280,220 270,218 273,227\" fill=\"#B4341E\"/>\n</g>","parts":[{"id":"spectrumBand","label":"Electromagnetic spectrum","x":50,"y":23,"note":"Here is the whole family of electromagnetic waves laid out in a band; every one is a transverse wave racing through vacuum at the speed of light."},{"id":"radioEnd","label":"Radio waves","x":15,"y":23,"note":"At this end sit radio waves, the lowest frequency and longest wavelength members, where the spectrum begins before frequency climbs across the band."},{"id":"gammaEnd","label":"Gamma rays","x":86,"y":23,"note":"At the far end come gamma rays, the highest frequency and shortest wavelength waves, showing how far frequency rises across the spectrum."},{"id":"transverseWave","label":"Transverse wave","x":40,"y":38,"note":"Each wave wobbles up and down at right angles to its direction of travel, marking every member of this family as transverse."},{"id":"wavelengthAxis","label":"Increasing wavelength","x":28,"y":52,"note":"Reading this way the waves stretch out longer, so wavelength grows towards the radio end while frequency drops the same direction."},{"id":"frequencyAxis","label":"Increasing frequency","x":72,"y":52,"note":"Reading the other way the waves pack tighter, so frequency climbs towards gamma rays even though the speed in vacuum never changes."},{"id":"refractedRay","label":"Refraction at a boundary","x":50,"y":88,"note":"Crossing a boundary the wave changes speed, and meeting it at an angle bends the ray as the change of speed refracts it."}]},

0 6 66 q-14 -4 -10 -18\" fill=\"#F1D2D8\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path class=\"sm-osc-x\" d=\"M286 54 L286 92\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n</g>\n<line x1=\"20\" y1=\"128\" x2=\"300\" y2=\"128\" stroke=\"#DCEAF6\" stroke-width=\"2\"/>\n<line x1=\"30\" y1=\"196\" x2=\"300\" y2=\"196\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n<line x1=\"30\" y1=\"150\" x2=\"30\" y2=\"242\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n<g data-part=\"transverseWave\">\n  <path class=\"sm-osc\" d=\"M30 196 C 52 150, 74 150, 96 196 S 140 242, 162 196 S 206 150, 228 196 S 272 242, 294 196\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n</g>\n<g data-part=\"wavelength\">\n  <line x1=\"63\" y1=\"150\" x2=\"63\" y2=\"138\" stroke=\"#1E2761\" stroke-width=\"1.4\"/>\n  <line x1=\"195\" y1=\"150\" x2=\"195\" y2=\"138\" stroke=\"#1E2761\" stroke-width=\"1.4\"/>\n  <line x1=\"63\" y1=\"144\" x2=\"195\" y2=\"144\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path d=\"M63 144 l10 -4 l0 8 z\" fill=\"#1E2761\"/>\n  <path d=\"M195 144 l-10 -4 l0 8 z\" fill=\"#1E2761\"/>\n</g>\n<g data-part=\"amplitude\">\n  <line x1=\"129\" y1=\"196\" x2=\"129\" y2=\"242\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  <path d=\"M129 196 l-4 10 l8 0 z\" fill=\"#B4341E\"/>\n  <path d=\"M129 242 l-4 -10 l8 0 z\" fill=\"#B4341E\"/>\n</g>","parts":[{"id":"transverseWave","label":"Transverse wave","x":63,"y":18,"note":"We start by drawing the wave that carries the energy along; here the wobble is up-and-down, across the direction it travels."},{"id":"wavelength","label":"Wavelength","x":40,"y":8,"note":"One full ripple, crest to crest, is the wavelength; squeeze more ripples per second and the pitch you hear climbs higher."},{"id":"amplitude","label":"Amplitude","x":26,"y":36,"note":"How tall the wave rises measures the amplitude; the bigger this swing, the more energy carried, so the louder the sound."},{"id":"source","label":"Vibrating source","x":11,"y":69,"note":"Every sound begins here as something vibrates back and forth, shaking whatever surrounds it and starting the wave off."},{"id":"airParticles","label":"Air particles (medium)","x":49,"y":63,"note":"The vibrating source pushes the air particles, making them oscillate and knock into neighbours, passing energy along without travelling themselves."},{"id":"compression","label":"Compression","x":36,"y":84,"note":"As particles bunch up they form a compression, a squeezed patch that moves outward, carrying the sound energy through the air."},{"id":"earDrum","label":"Ear drum / diaphragm","x":89,"y":65,"note":"Finally the wave hits your ear drum, or a microphone's diaphragm, making it vibrate so the sound gets detected."}]},

/>\n    <path d=\"M20 -3 q-10 14 -22 3 q-10 -8 -18 -2\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.2\" transform=\"rotate(15)\"/>\n    <circle r=\"4\" fill=\"#C99528\"/>\n    <circle cx=\"-14\" cy=\"-2\" r=\"1.2\" fill=\"#1E2761\"/>\n    <circle cx=\"12\" cy=\"3\" r=\"1.2\" fill=\"#1E2761\"/>\n    <circle cx=\"6\" cy=\"-5\" r=\"1.2\" fill=\"#1E2761\"/>\n  </g>\n</g>","parts":[{"id":"sun","label":"Sun (a star)","x":29,"y":59,"note":"It all starts here: the Sun, a giant ball of glowing gas, sits at the centre while eight planets circle around it."},{"id":"orbitPath","label":"Orbit","x":4,"y":78,"note":"Each planet travels this looping path, held in place by the Sun's gravity constantly pulling it inwards so it never flies off into space."},{"id":"rockyPlanet","label":"Rocky planet","x":46,"y":64,"note":"Closest to the Sun sit the four rocky planets — Mercury, Venus, Earth and Mars — small worlds with solid, stony surfaces you could stand on."},{"id":"moon","label":"Moon","x":57,"y":47,"note":"Some planets have moons, which loop around the planet the same way the planet loops the Sun, tugged along by the planet's gravity."},{"id":"gasPlanet","label":"Gas planet","x":62,"y":63,"note":"Further out sit the giant gas planets — Jupiter, Saturn, Uranus and Neptune — huge worlds with no solid ground, just thick swirling gas."},{"id":"galaxy","label":"Galaxy (Milky Way)","x":89,"y":28,"note":"Zoom right out and our whole Solar System is one tiny speck in the Milky Way, a spiral galaxy holding billions of stars."},{"id":"tiltAxis","label":"Tilted axis","x":42,"y":49,"note":"Earth spins around this tilted line once a day, turning us towards the Sun for daytime and away into darkness for night."}]},

    <line x1=\"96\" y1=\"160\" x2=\"96\" y2=\"184\"/><line x1=\"84\" y1=\"172\" x2=\"108\" y2=\"172\"/>\n  </g>\n</g>\n\n<g data-part=\"negObject\">\n  <circle cx=\"224\" cy=\"172\" r=\"26\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/>\n  <line x1=\"212\" y1=\"172\" x2=\"236\" y2=\"172\" stroke=\"#1E2761\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n</g>\n\n<g data-part=\"fieldLines\">\n  <path d=\"M124 160 q56 -24 74 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path d=\"M124 172 q56 0 74 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <path d=\"M124 184 q56 24 74 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n</g>\n\n<g data-part=\"fieldArrow\">\n  <polygon points=\"166,150 154,147 157,157\" fill=\"#1E2761\"/>\n  <polygon points=\"164,172 152,168 152,176\" fill=\"#1E2761\"/>\n  <polygon points=\"166,194 154,187 157,197\" fill=\"#1E2761\"/>\n</g>\n","parts":[{"id":"protonCharge","label":"Proton (+)","x":23,"y":47,"note":"Deep inside every atom sit positive protons; normally equal numbers of electrons balance them, so the whole material starts with no charge."},{"id":"posObject","label":"Positively Charged Object","x":26,"y":66,"note":"This object has lost some electrons to the cloth, leaving more protons than electrons, so it now carries an overall positive charge."},{"id":"cloth","label":"Rubbing Cloth","x":28,"y":24,"note":"As the cloth rubs the insulator, friction drags electrons across the surface, moving negative charge from one material to the other."},{"id":"negObject","label":"Negatively Charged Object","x":74,"y":66,"note":"The cloth's electrons pile up here, giving this object extra negative charge, so it now attracts the opposite positive object nearby."},{"id":"fieldLines","label":"Field Lines","x":50,"y":32,"note":"Field lines map the space around the charges where forces act; packed tightly they show a strong field, spread out they show a weaker one."},{"id":"fieldArrow","label":"Field Line Arrow","x":52,"y":53,"note":"Each arrow shows which way a positive charge would be pushed: away from the positive object and towards the negative one."},{"id":"electricField","label":"Electric Field","x":11,"y":80,"note":"The whole field region lets the charges push and pull each other without touching, exerting an electrostatic force across empty space."}]},
