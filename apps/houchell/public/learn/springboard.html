<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#1E2761">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KS3 Science">
<title>Feynman · KS3 Science — learn it, step by step</title>
<meta name="description" content="A Duolingo-style home-learning course for KS3 Science, following the Springboard pathway. Learn the vocabulary with your voice, practise, and watch your streak grow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E6; --paper:#FFFFFF; --ink:#1A1A1A; --navy:#1E2761;
    --grey:#5C6370; --line:#E4DDCB; --line-2:#D7DCEC;
    --green:#2C5F2D; --green-bg:#E6F0E0; --green-line:#BFD8B6;
    --wrong:#B4341E; --wrong-bg:#FBE7E2; --wrong-line:#EBB9AC;
    --gold:#C99528; --gold-bg:#FBF1D8; --lav:#AEB6D6; --lav-pale:#D7DCEC;
    --bio:#2C5F2D; --chem:#7A4FA3; --phys:#1E5F8C; --earth:#9A6A2C;
    --shadow:0 1px 0 rgba(26,26,26,.04), 0 8px 28px rgba(30,39,97,.08);
    --r:16px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ background:var(--cream); color-scheme:light only; }
  body{ font-family:'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:var(--ink); background:var(--cream); line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100dvh; }
  .fr{ font-family:'Fraunces', Georgia, serif; letter-spacing:-0.02em; font-variation-settings:'opsz' 110,'SOFT' 20; }
  .mono-kicker{ font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
  button{ font-family:inherit; cursor:pointer; }
  .sr{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }
  .app{ max-width:680px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

  /* ===== Home top bar (streak / xp / hearts) ===== */
  .hbar{ position:sticky; top:0; z-index:20; background:var(--cream); padding:14px 18px 12px; border-bottom:1px solid rgba(30,39,97,.06); }
  .hbar .stats{ display:flex; align-items:center; gap:16px; }
  .hbar .s{ display:flex; align-items:center; gap:6px; font-weight:700; font-size:16px; }
  .hbar .s .e{ font-size:19px; }
  .hbar .streak{ color:#D9831F; } .hbar .xp{ color:var(--gold); } .hbar .hearts-c{ color:var(--wrong); }
  .hbar .spacer{ flex:1; }
  .hbar .snd{ border:none; background:transparent; font-size:19px; width:34px; height:34px; border-radius:10px; }
  .hbar .snd:hover{ background:rgba(30,39,97,.07); }
  .seg{ display:flex; gap:6px; margin-top:12px; background:#EDE6D5; padding:4px; border-radius:12px; }
  .seg button{ flex:1; border:none; background:transparent; padding:9px; border-radius:9px; font-weight:600; font-size:14px; color:var(--grey); }
  .seg button.on{ background:var(--paper); color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .yearjump{ display:flex; gap:8px; margin-top:9px; }
  .yearjump button{ flex:1; border:1px solid var(--line); background:var(--paper); color:var(--grey); padding:7px 4px; border-radius:9px; font-size:12.5px; font-weight:600; }
  .yearjump button:active{ transform:translateY(1px); }

  .scroll{ flex:1; padding:6px 18px 40px; }

  /* ===== Path / course map ===== */
  .yr{ margin-top:22px; }
  .yr-head{ display:flex; align-items:center; gap:12px; margin:6px 0 14px; }
  .yr-head .yl{ font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--navy); white-space:nowrap; }
  .yr-head .hr{ flex:1; height:1px; background:var(--line); }
  .yr-head .hrs{ font-size:12px; color:var(--grey); }

  .unit{ background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:0; margin-bottom:14px; overflow:hidden; }
  .unit.locked{ background:#FBF9F2; box-shadow:none; border-color:#EFE8D6; }
  .unit-head{ display:flex; align-items:center; gap:13px; padding:17px 18px 14px; }
  .unit .badge{ width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:24px; flex:none; color:#fff; }
  .unit .meta{ flex:1; min-width:0; }
  .unit .meta .t{ font-size:17.5px; font-weight:600; color:var(--navy); line-height:1.2; }
  .unit .meta .sub{ font-size:12.5px; color:var(--grey); margin-top:4px; }
  .unit .meta .disc{ font-weight:600; }
  .ublurb{ padding:0 18px; margin-bottom:15px; font-size:13.5px; line-height:1.45; color:#6c6757; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; max-height:2.9em; }
  .crowns{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--gold); font-weight:700; flex:none; background:var(--gold-bg); padding:5px 10px; border-radius:999px; white-space:nowrap; }
  .lock-ic{ font-size:17px; color:#C3BBA4; flex:none; }

  /* lesson nodes inside a unit */
  .nodes{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); align-items:start; gap:18px 4px; padding:6px 14px 20px; }
  .node{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:7px; background:transparent; border:none; padding:0; appearance:none; -webkit-appearance:none; height:auto; min-height:0; font:inherit; color:inherit; }
  .node .ring{ width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:21px; border:2.5px solid var(--line-2); background:var(--paper); position:relative; transition:transform .06s; box-shadow:0 2px 0 rgba(30,39,97,.05); }
  .node:not(.locked):active .ring{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0); }
  .node.done .ring{ background:var(--green); border-color:var(--green); color:#fff; box-shadow:0 2px 0 rgba(44,95,45,.25); }
  .node.next .ring{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-bg); }
  .node.locked .ring{ opacity:.45; box-shadow:none; }
  .node .lab{ font-size:10px; text-align:center; color:var(--grey); line-height:1.18; min-height:24px; }
  .node.next .lab, .node.done .lab{ color:var(--navy); font-weight:600; }
  .node .start-pill{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--gold); color:#fff; font-size:8.5px; font-weight:700; letter-spacing:.05em; padding:2px 7px; border-radius:8px; text-transform:uppercase; white-space:nowrap; z-index:2; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .unit.locked .nodes{ display:none; }
  .ext-row{ padding:0 18px 18px; }
  .ext-btn{ display:block; width:100%; text-align:center; border:1.5px solid var(--green-line); background:var(--green-bg); color:var(--green); font-weight:700; padding:13px; border-radius:13px; font-size:14px; }

  /* ===== Dashboard ===== */
  .dash{ padding-top:8px; }
  .goalcard{ background:var(--navy); color:#fff; border-radius:20px; padding:22px; display:flex; align-items:center; gap:20px; margin-bottom:16px; }
  .ring-wrap{ position:relative; width:92px; height:92px; flex:none; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-wrap .ctr{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring-wrap .ctr .n{ font-size:22px; font-weight:700; line-height:1; }
  .ring-wrap .ctr .l{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.8; margin-top:2px; }
  .goalcard .gtext .h{ font-size:20px; margin-bottom:4px; }
  .goalcard .gtext .p{ font-size:13.5px; opacity:.85; }
  .goalcard .gtext .lev{ display:inline-block; margin-top:9px; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .mcard{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:16px 17px; }
  .mcard .v{ font-size:26px; font-weight:700; line-height:1; display:flex; align-items:center; gap:7px; }
  .mcard .l{ font-size:12px; color:var(--grey); margin-top:8px; }
  .mcard.streak .v{ color:#D9831F; } .mcard.xp .v{ color:var(--gold); }
  .mcard.crowns .v{ color:var(--navy); } .mcard.words .v{ color:var(--chem); }

  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:17px; margin-bottom:16px; }
  .panel h3{ font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; }
  .week{ display:flex; justify-content:space-between; gap:6px; }
  .day{ display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; }
  .day .dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:16px; background:#EFEADB; color:#B8B09A; }
  .day.act .dot{ background:var(--green-bg); }
  .day .dl{ font-size:10.5px; color:var(--grey); }
  .ubar{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .ubar .ue{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; color:#fff; flex:none; }
  .ubar .un{ flex:1; font-size:14px; font-weight:500; }
  .ubar .ut{ width:90px; height:8px; background:#EDE6D5; border-radius:999px; overflow:hidden; }
  .ubar .ut > i{ display:block; height:100%; background:var(--green); border-radius:999px; }
  .ubar .up{ font-size:12px; color:var(--grey); width:34px; text-align:right; }
  .resetbtn{ width:100%; border:1px solid var(--line); background:transparent; color:var(--grey); padding:11px; border-radius:12px; font-size:13px; margin-top:4px; }
  .srow{ display:flex; align-items:center; gap:13px; padding:7px 0; }
  .srow .snum{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-size:21px; font-weight:700; flex:none; }
  .srow .snum.due{ background:var(--gold-bg); color:var(--gold); }
  .srow .snum.tracked{ background:#F4F6FC; color:var(--navy); }
  .srow .sl{ display:flex; flex-direction:column; gap:1px; }
  .srow .sl b{ font-size:14.5px; color:var(--ink); }
  .srow .sl span{ font-size:12.5px; color:var(--grey); }
  .srdone{ text-align:center; font-size:13.5px; color:var(--green); background:var(--green-bg); border-radius:12px; padding:11px; margin-top:8px; }

  /* ===== Lesson player ===== */
  .topbar{ display:flex; align-items:center; gap:14px; padding:14px 16px; position:sticky; top:0; background:var(--cream); z-index:20; }
  .iconbtn{ border:none; background:transparent; color:var(--grey); font-size:22px; line-height:1; width:34px; height:34px; border-radius:10px; display:grid; place-items:center; }
  .iconbtn:hover{ background:rgba(30,39,97,.07); color:var(--navy); }
  .pbar{ flex:1; height:14px; background:#E9E2D1; border-radius:999px; overflow:hidden; }
  .pbar > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--green),#3f8a40); border-radius:999px; transition:width .45s cubic-bezier(.4,0,.2,1); }
  .hearts{ display:flex; align-items:center; gap:5px; font-weight:600; color:var(--wrong); font-size:15px; }
  .hearts .hh{ font-size:18px; line-height:1; }
  .stage{ flex:1; padding:8px 18px 160px; display:flex; flex-direction:column; }
  .step-kicker{ margin-bottom:10px; }
  .prompt{ font-size:25px; line-height:1.18; color:var(--navy); margin-bottom:4px; }
  @media (max-width:430px){ .prompt{ font-size:21px; } }

  .teach{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-top:6px; }
  .teach .emoji{ font-size:34px; display:block; margin-bottom:10px; }
  .teach h2{ font-size:23px; color:var(--navy); line-height:1.2; margin-bottom:12px; }
  .teach p{ font-size:16.5px; margin-bottom:12px; color:#2a2a28; }
  .teach p:last-child{ margin-bottom:0; }
  .teach b{ color:var(--navy); font-weight:600; }

  /* vocab card */
  .vcard{ text-align:center; padding:30px 22px; }
  .vcard .term{ font-size:34px; color:var(--navy); margin:6px 0 4px; }
  .vcard .say{ font-size:15px; color:var(--grey); font-style:italic; margin-bottom:14px; }
  .vcard .def{ font-size:17px; color:#2a2a28; max-width:34ch; margin:0 auto; }
  .etym{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:13px; padding:13px 14px; margin:4px auto 14px; max-width:36ch; }
  .etym-h{ font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--grey); margin-bottom:9px; }
  .etym-bits{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; }
  .ebit{ display:inline-flex; flex-direction:column; align-items:center; background:var(--paper); border:1px solid var(--line-2); border-radius:9px; padding:5px 10px; min-width:48px; }
  .ebit b{ font-size:15px; color:var(--navy); } .ebit span{ font-size:11px; color:var(--grey); }
  .eplus{ color:var(--lav); font-weight:700; }
  .etym-gloss{ font-size:14.5px; color:var(--navy); font-weight:600; margin-top:10px; }
  .speakbtn{ display:inline-flex; align-items:center; gap:10px; margin:6px auto 0; border:2px solid var(--lav); background:var(--paper); color:var(--navy); font-weight:600; font-size:16px; padding:13px 22px; border-radius:999px; }
  .speakbtn .ic{ font-size:22px; }
  .speakbtn:active{ transform:scale(.97); }

  /* mic / speak step */
  .mic-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:18px; }
  .micbtn{ width:108px; height:108px; border-radius:50%; border:none; background:var(--navy); color:#fff; font-size:46px; display:grid; place-items:center; box-shadow:0 6px 0 rgba(0,0,0,.18); }
  .micbtn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .micbtn.listening{ background:var(--wrong); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 0 rgba(180,52,30,.4); } 50%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 16px rgba(180,52,30,0); } }
  .mic-status{ font-size:15px; color:var(--grey); min-height:24px; text-align:center; }
  .mic-status b{ color:var(--navy); }
  .heard{ font-size:15px; color:var(--navy); font-weight:600; }

  /* type-what-you-hear */
  .listen-big{ display:flex; justify-content:center; margin:20px 0; }
  .listen-big button{ width:84px; height:84px; border-radius:20px; border:none; background:var(--navy); color:#fff; font-size:38px; box-shadow:0 5px 0 rgba(0,0,0,.16); }
  .listen-big button:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .tinput{ width:100%; padding:15px 16px; font-family:inherit; font-size:18px; border:2px solid var(--line-2); border-radius:14px; background:var(--paper); color:var(--ink); outline:none; }
  .tinput:focus{ border-color:var(--navy); }
  .tinput.ok{ border-color:var(--green); background:var(--green-bg); color:var(--green); }
  .tinput.bad{ border-color:var(--wrong); background:var(--wrong-bg); }

  .opts{ display:flex; flex-direction:column; gap:11px; margin-top:14px; }
  .opt{ position:relative; text-align:left; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:15px 16px 15px 52px; font-size:16.5px; color:var(--ink); transition:border-color .12s, background .12s, transform .04s; }
  .opt:hover:not(:disabled){ border-color:var(--lav); }
  .opt:active:not(:disabled){ transform:translateY(1px); }
  .opt .num{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:8px; border:1.5px solid var(--line-2); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--grey); }
  .opt.sel{ border-color:var(--navy); background:#F4F6FC; } .opt.sel .num{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .opt.correct{ border-color:var(--green-line); background:var(--green-bg); } .opt.correct .num{ border-color:var(--green); background:var(--green); color:#fff; }
  .opt.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); } .opt.wrong .num{ border-color:var(--wrong); background:var(--wrong); color:#fff; }
  .opt.dim{ opacity:.55; }
  .opt .mk{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-weight:700; font-size:17px; }
  .opt.correct .mk{ color:var(--green); } .opt.wrong .mk{ color:var(--wrong); }
  .hint{ font-size:13.5px; color:var(--grey); margin-top:10px; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:14px; }
  .chip{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:14px; font-size:16px; text-align:left; }
  .chip.sel{ border-color:var(--navy); background:#F4F6FC; }
  .chip.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }
  .chip.miss{ border-color:var(--green); border-style:dashed; }

  .sentence{ font-size:19px; line-height:2.1; margin-top:16px; color:#2a2a28; }
  .blank{ display:inline-block; min-width:96px; border-bottom:2.5px solid var(--lav); margin:0 3px; text-align:center; color:var(--navy); font-weight:600; padding:0 6px; }
  .blank.filled{ border-bottom-color:var(--navy); }
  .blank button{ border:none; background:#F4F6FC; border-radius:8px; padding:4px 10px; font-size:16px; font-weight:600; color:var(--navy); }
  .blank.ok{ color:var(--green); border-bottom-color:var(--green); } .blank.ok button{ background:var(--green-bg); color:var(--green); }
  .blank.bad{ color:var(--wrong); border-bottom-color:var(--wrong); } .blank.bad button{ background:var(--wrong-bg); color:var(--wrong); }
  .bank{ display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
  .token{ background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:12px; padding:11px 16px; font-size:16px; font-weight:500; color:var(--ink); }
  .token:hover:not(:disabled){ border-color:var(--lav); }
  .token.used{ opacity:.32; pointer-events:none; }

  .match{ display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-top:16px; }
  .match .col{ display:flex; flex-direction:column; gap:11px; }
  .mitem{ position:relative; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:13px 13px; font-size:14.5px; text-align:left; min-height:52px; }
  .mitem:hover:not(:disabled){ border-color:var(--lav); }
  .mitem.active{ border-color:var(--navy); background:#F4F6FC; }
  .mitem.paired{ border-color:var(--lav); background:#FBFAF5; }
  .mitem .dot{ position:absolute; top:8px; right:9px; width:13px; height:13px; border-radius:50%; }
  .mitem.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .mitem.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }

  /* spaced-retrieval review banner */
  .review-banner{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; border:none; border-radius:16px; padding:15px 17px; margin:18px 0 6px; box-shadow:var(--shadow); }
  .review-banner.due{ background:var(--navy); color:#fff; }
  .review-banner.clear{ background:var(--paper); border:1px solid var(--line); box-shadow:none; }
  .review-banner .rb-ic{ font-size:24px; flex:none; }
  .review-banner .rb-txt{ flex:1; display:flex; flex-direction:column; gap:2px; min-width:0; }
  .review-banner .rb-txt b{ font-size:15.5px; }
  .review-banner.due .rb-txt span{ font-size:12.5px; opacity:.82; }
  .review-banner.clear .rb-txt b{ color:var(--navy); }
  .review-banner.clear .rb-txt span{ font-size:12.5px; color:var(--grey); }
  .review-banner .rb-go{ flex:none; background:var(--gold); color:#fff; font-weight:700; font-size:13px; padding:8px 13px; border-radius:999px; }
  .review-banner.weak{ background:#fff; border:1.5px solid var(--gold); box-shadow:none; }
  .review-banner.weak .rb-txt b{ color:#8a6400; } .review-banner.weak .rb-txt span{ font-size:12.5px; color:var(--grey); }

  /* diagram (tap the part) */
  .diagram{ position:relative; width:100%; max-width:380px; margin:16px auto 8px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); }
  .diagram svg{ display:block; }

  .btn{ display:block; width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; box-shadow:0 4px 0 rgba(0,0,0,.14); transition:transform .05s, box-shadow .05s, background .15s; }

  .btn-primary{ background:var(--navy); color:#fff; } .btn-primary:disabled{ background:#D9D7CB; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.07); cursor:not-allowed; }
  .btn-go{ background:var(--green); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--grey); box-shadow:none; border:1.5px solid var(--line-2); text-transform:none; font-weight:600; padding:12px; }
  .footer .row2{ display:flex; gap:10px; }
  .footer .row2 .btn{ flex:1; }

  /* done */
  .complete{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:30px 24px 40px; text-align:center; }
  .complete .trophy{ font-size:66px; margin-bottom:6px; animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; }
  .complete h1{ font-size:30px; color:var(--navy); margin-bottom:6px; }
  .complete .sub{ font-size:15.5px; color:#3a3a36; margin-bottom:24px; }
  .dstats{ display:flex; gap:12px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  .dstat{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:15px 20px; min-width:96px; }
  .dstat .v{ font-size:28px; font-weight:700; line-height:1; } .dstat.xp .v{ color:var(--gold); } .dstat.acc .v{ color:var(--green); } .dstat.str .v{ color:#D9831F; }
  .dstat .l{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-top:7px; }
  .complete .actions{ max-width:340px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:11px; }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .fade{ animation:fade .28s ease both; } @keyframes fade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  /* cover */
  .cover{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:36px 24px; text-align:center; }
  .cover .badge2{ align-self:center; background:var(--navy); color:var(--lav-pale); font-size:11.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; padding:7px 14px; border-radius:999px; margin-bottom:20px; }
  .cover .mascot{ font-size:60px; margin-bottom:10px; }
  .cover h1{ font-size:34px; line-height:1.05; color:var(--navy); margin-bottom:12px; }
  .cover .lede{ font-size:16.5px; color:#3a3a36; max-width:40ch; margin:0 auto 24px; }
  .cover .cta{ max-width:340px; margin:0 auto; width:100%; }
  .colophon{ text-align:center; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--grey); opacity:.7; padding:18px; }

/* ============================================================================

/* ---------- AUTHORED UNIT CONTENT (real Springboard content) ------------- */
const CONTENT = {
"P1":{"code":"P1","title":"Energy","discipline":"physics","blurb":"How energy is stored, how it moves between stores, how fast (power), and where our energy comes from.",
"vocab":[
{"term":"fuel","definition":"a substance that releases stored energy when it is burned or used","say":"fuel"},
{"term":"joule","definition":"the standard unit we use to measure energy, symbol J","say":"joule"},
{"term":"chemical store","definition":"the energy store in fuels, food and batteries","say":"chemical store"},
{"term":"thermal store","definition":"an object's energy store linked to its temperature","say":"thermal store"},
{"term":"kinetic store","definition":"the energy store of any moving object","say":"kinetic store"},
{"term":"gravitational store","definition":"the energy store of an object that has been lifted up","say":"gravitational store"},
{"term":"elastic store","definition":"the energy store of a stretched, squashed or twisted object","say":"elastic store"},
{"term":"power","definition":"how much energy is transferred each second, measured in watts","say":"power"},
{"term":"renewable","definition":"a resource replaced by nature as fast as we use it","say":"renewable"}],
"facts":[
"A fuel is any substance that releases stored energy when it is burned or used. The energy is held in the fuel's chemical store, which goes down as the fuel is used up.",
"Energy is measured in joules (J). One kilojoule (kJ) is 1000 J, so we use kilojoules for larger amounts, such as the energy in food.",
"When a fuel burns, energy moves from its chemical store to the thermal store of whatever is heated. Heating always transfers energy from the hotter object to the colder one.",
"Energy cannot be created or destroyed; it only moves between stores. This is the law of conservation of energy, so the total amount always stays the same.",
"There are five energy stores here: chemical, thermal, kinetic (moving), gravitational (lifted) and elastic (stretched or squashed).",
"Energy can be transferred in four ways: by heating, by a force, by an electric current, and by waves such as light and sound.",
"Power is how much energy is transferred each second, measured in watts (W), where 1 W is 1 joule per second. The equation is energy = power × time.",
"Most electricity is made using a turbine that turns a generator. Wind, falling water and the steam from burning fuels can all turn the turbine.",
"Renewable resources like wind and water are replaced by nature as fast as we use them. Non-renewable fossil fuels will run out and release carbon dioxide."],
"misconceptions":[
{"wrong":"When a fuel burns it just disappears.","right":"Nothing disappears — the fuel changes (e.g. to ash and smoke) and energy is released from its chemical store."},
{"wrong":"Renewable means you reuse the same energy again.","right":"Renewable means the resource is replaced by nature as fast as we use it."}],
"questions":[
{"type":"mcq","q":"What is the standard unit we use to measure energy?","options":[{"t":"The joule (J)","correct":true},{"t":"The watt (W)","why":"The watt measures power (energy per second), not energy itself."},{"t":"The metre (m)","why":"The metre measures distance, not energy."}],"ok":"Energy is measured in joules, named after the scientist James Joule."},
{"type":"tf","q":"When a match burns, the wood simply disappears.","answer":false,"why":"Nothing disappears: the wood changes to ash and smoke, and energy is released from its chemical store."},
{"type":"mcq","q":"A fuel is burned to heat some water. Which store of the fuel decreases?","options":[{"t":"Its chemical store","correct":true},{"t":"Its thermal store","why":"The thermal store is what increases in the water — it's not what the fuel releases from."},{"t":"Its kinetic store","why":"The kinetic store is about movement, which isn't involved in simply burning a fuel."}],"ok":"Fuels hold energy in their chemical store, which decreases as the fuel burns."},
{"type":"mcq","q":"A match has 800 J in its chemical store. How much is left when a quarter has burned?","options":[{"t":"600 J","correct":true},{"t":"200 J","why":"200 J is the amount transferred away (a quarter), not the amount left."},{"t":"400 J","why":"400 J is half — but only a quarter has burned."}],"ok":"A quarter of 800 J is 200 J transferred away, so 600 J is left."},
{"type":"multi","q":"Tap all of the energy stores from this unit.","items":[{"t":"Kinetic store","correct":true},{"t":"Gravitational store","correct":true},{"t":"Elastic store","correct":true},{"t":"Wind store"}],"ok":"The stores are chemical, thermal, kinetic, gravitational and elastic.","bad":"Wind is a resource, not a store — moving air has energy in its kinetic store."},
{"type":"mcq","q":"A cyclist brakes and slows down. Where does the kinetic store energy go?","options":[{"t":"To the thermal store of the brakes, which get hotter","correct":true},{"t":"It is destroyed by the brakes","why":"Energy can't be destroyed — it only moves to another store."},{"t":"To the gravitational store of the bike","why":"The gravitational store changes when lifted, not when braking on level ground."}],"ok":"A force from the brakes moves energy from the kinetic store to the thermal store."},
{"type":"mcq","q":"Two cars go the same speed in opposite directions. How do their kinetic stores compare?","options":[{"t":"The same — the kinetic store depends on speed, not direction","correct":true},{"t":"The one going forwards has more","why":"The kinetic store has nothing to do with direction, only speed."},{"t":"The one going backwards has none","why":"Any moving object has a kinetic store, whatever its direction."}],"ok":"The kinetic store depends only on speed, so equal speeds mean equal stores."},
{"type":"mcq","q":"A TV has a power of 800 W and is on for 30 s. How much energy is transferred? (E = P × t)","options":[{"t":"24 000 J","correct":true},{"t":"830 J","why":"This adds power and time — the equation multiplies them."},{"t":"26.7 J","why":"This divides — energy = power × time, not power ÷ time."}],"ok":"E = P × t = 800 × 30 = 24 000 J."},
{"type":"tf","q":"Wind is a renewable energy resource.","answer":true,"why":"Wind is constantly replaced by nature, so unlike fossil fuels it is renewable."},
{"type":"mcq","q":"Why is coal a non-renewable energy resource?","options":[{"t":"It takes millions of years to form, so isn't replaced as fast as we use it","correct":true},{"t":"Because it can't be burned more than once","why":"Most fuels burn once — the real reason is it isn't replaced quickly enough."},{"t":"Because it contains no energy","why":"Coal holds energy in its chemical store — that's why we burn it."}],"ok":"Fossil fuels take millions of years to form, so they run out far faster than nature replaces them."},
{"type":"numeric","kicker":"Work it out","q":"A lamp transfers 1800 J of energy in 60 s. What is its power?","hint":"P = E ÷ t","answer":30,"unit":"W","ok":"P = E ÷ t = 1800 ÷ 60 = 30 W."},
{"type":"numeric","kicker":"Work it out","q":"A 2000 W heater is switched on for 5 s. How much energy does it transfer?","hint":"E = P × t","answer":10000,"unit":"J","ok":"E = P × t = 2000 × 5 = 10 000 J."},
{"type":"numeric","q":"How many watts (W) are there in 3 kilowatts (kW)?","hint":"1 kW = 1000 W","answer":3000,"unit":"W","ok":"1 kW = 1000 W, so 3 kW = 3000 W."},
{"type":"categorise","q":"Sort each resource as renewable or non-renewable.","bins":["Renewable","Non-renewable"],"items":[{"t":"Wind","bin":"Renewable"},{"t":"Coal","bin":"Non-renewable"},{"t":"Solar","bin":"Renewable"},{"t":"Natural gas","bin":"Non-renewable"},{"t":"Hydroelectric","bin":"Renewable"},{"t":"Oil","bin":"Non-renewable"}],"ok":"Renewables are replaced by nature as fast as we use them; fossil fuels are not.","bad":"Fossil fuels — coal, oil and gas — are non-renewable; wind, solar and water are renewable."},
{"type":"categorise","q":"Is each one an energy store or an energy resource?","bins":["Energy store","Energy resource"],"items":[{"t":"Chemical store","bin":"Energy store"},{"t":"Kinetic store","bin":"Energy store"},{"t":"Wind","bin":"Energy resource"},{"t":"Coal","bin":"Energy resource"},{"t":"Elastic store","bin":"Energy store"},{"t":"The Sun","bin":"Energy resource"}],"ok":"Stores hold energy (chemical, kinetic, elastic…); resources are where we get our energy from.","bad":"A store holds energy; a resource is something we take energy from, like wind or coal."},
{"type":"order","q":"Put these powers in order, smallest first.","items":["5 W","250 W","2 kW"],"ok":"2 kW = 2000 W, so it is the largest."},
{"type":"mcq","q":"A stretched elastic band stores energy in which store?","options":[{"t":"Elastic store","correct":true},{"t":"Kinetic store","why":"The kinetic store is for moving objects — the band is held still while stretched."},{"t":"Thermal store","why":"The thermal store is about temperature, not stretching."}],"ok":"Stretching, squashing or twisting fills the elastic store."},
{"type":"mcq","q":"Which of these transfers energy by waves?","options":[{"t":"Sunlight warming your face","correct":true},{"t":"Pushing a shopping trolley","why":"A push transfers energy by a force, not by waves."},{"t":"A wire carrying a current","why":"That transfers energy by an electric current, not by waves."}],"ok":"Light and sound are waves, so sunlight transfers energy by waves."},
{"type":"multi","q":"Tap all the ways energy can be transferred.","items":[{"t":"By heating","correct":true},{"t":"By a force","correct":true},{"t":"By an electric current","correct":true},{"t":"By waves","correct":true},{"t":"By weighing it"}],"ok":"The four transfer pathways are heating, a force, an electric current, and waves.","bad":"Weighing doesn't transfer energy — the four ways are heating, a force, a current, and waves."}]},

"C1":{"code":"C1","title":"The particle model","discipline":"chemistry","blurb":"Everything is made of tiny particles — how they're arranged and move explains solids, liquids and gases.",
"vocab":[
{"term":"particle","definition":"a tiny piece that all substances are made from","say":"particle"},
{"term":"solid","definition":"particles in a regular pattern that only vibrate","say":"solid"},
{"term":"liquid","definition":"particles that touch but can slide past each other","say":"liquid"},
{"term":"gas","definition":"particles that move freely and are far apart","say":"gas"},
{"term":"melting","definition":"a solid turning into a liquid as it is heated","say":"melting"},
{"term":"boiling","definition":"a liquid turning to gas throughout, at its boiling point","say":"boiling"},
{"term":"evaporation","definition":"a liquid turning to gas only at its surface","say":"evaporation"},
{"term":"compress","definition":"to squash a gas into a smaller space","say":"compress"},
{"term":"gas pressure","definition":"the push from gas particles hitting their container","say":"gas pressure"}],
"facts":[
"All substances are made of tiny particles. The particles in ice, water and steam are exactly the same — only their arrangement and movement differ.",
"In a solid, particles are held tightly in a regular pattern by strong forces. They are touching and can only vibrate around a fixed point.",
"In a liquid, weaker forces let particles slide past each other in a random arrangement, but they are still all touching.",
"In a gas, particles have broken free of the forces. They are far apart and move randomly in all directions until they bump into something.",
"Heating can change state: solids melt to liquids and liquids boil to gases. Cooling reverses this as gases condense and liquids freeze.",
"A substance melts and freezes at the same temperature (its melting point), and the temperature stays the same during a state change.",
"Gases can be compressed because there are spaces between the particles. Solids and liquids can't, because there are no large gaps.",
"Boiling and evaporation both turn a liquid to gas, but boiling happens throughout at the boiling point, while evaporation happens only at the surface, below it.",
"Gas pressure is caused by particles colliding with the container. It increases if you heat the gas, add more particles, or make the space smaller."],
"misconceptions":[
{"wrong":"Ice, water and steam are made of different substances.","right":"They are the same particles — only the arrangement and movement differ."},
{"wrong":"Particles get smaller when a gas is compressed.","right":"The particles stay the same size; they're just pushed into the spaces between them."}],
"questions":[
{"type":"mcq","q":"What are all substances made of?","options":[{"t":"Tiny particles","correct":true},{"t":"Solid blocks with nothing inside","why":"Even solids are made of separate particles, not one continuous block."},{"t":"Only liquids and gases","why":"Solids are made of particles too, just arranged differently."}],"ok":"Everything is made of tiny particles — even the air and the chair you sit on."},
{"type":"mcq","q":"What particles are in an ice cube made from pure water?","options":[{"t":"Water particles, just arranged differently","correct":true},{"t":"Ice particles, different from water particles","why":"Ice and water are the same substance — identical particles, different arrangement."},{"t":"Smaller particles than in the water","why":"Particles don't change size between states."}],"ok":"Ice, water and steam are all the same water particles."},
{"type":"tf","q":"The particles in a solid do not move at all.","answer":false,"why":"Particles in a solid vibrate around a fixed point — they just can't move past each other."},
{"type":"mcq","q":"Which state has the strongest forces between its particles?","options":[{"t":"Solid","correct":true},{"t":"Liquid","why":"Liquids have weaker forces, so particles can slide past each other."},{"t":"Gas","why":"Gases have the weakest forces, so particles move freely and far apart."}],"ok":"Strong forces hold solid particles tightly in a regular pattern."},
{"type":"multi","q":"Tap all the statements that are true about particles in a gas.","items":[{"t":"They move randomly in all directions","correct":true},{"t":"They are far apart, with spaces between them","correct":true},{"t":"They are arranged in a regular pattern"},{"t":"They are all touching each other"}],"ok":"Gas particles are far apart and move randomly until they collide.","bad":"A regular pattern and touching describe a solid — not a gas."},
{"type":"mcq","q":"Why can a gas be compressed but a solid cannot?","options":[{"t":"A gas has spaces between its particles; a solid has no large gaps","correct":true},{"t":"The gas particles shrink when squeezed","why":"Particles never change size — the gas squashes into the spaces between particles."},{"t":"A solid has more particles than a gas","why":"Compression depends on the spaces between particles, not how many there are."}],"ok":"Gases squash into the spaces between particles; solids have no room."},
{"type":"mcq","q":"A solid is heated until it melts. What happens to its temperature while melting?","options":[{"t":"It stays the same until all of it has melted","correct":true},{"t":"It keeps rising steadily as it melts","why":"During a state change the temperature stays the same; it only rises again afterwards."},{"t":"It drops as the solid turns to liquid","why":"It's being heated, so it doesn't cool — the temperature just holds steady."}],"ok":"Temperature pauses during a state change, then rises again afterwards."},
{"type":"mcq","q":"A pan of boiling water is later empty. What happened to the water?","options":[{"t":"It turned to gas; the particles still exist as steam in the air","correct":true},{"t":"The water particles were burned and destroyed","why":"Particles are never destroyed — the water just turned to steam."},{"t":"The water disappeared completely into nothing","why":"The particles still exist; they've spread into the air as a gas."}],"ok":"The water turned to gas and spread into the air — the particles aren't destroyed."},
{"type":"tf","q":"Heating a sealed can of gas makes the particles hit the walls more often, raising the pressure.","answer":true,"why":"Heating makes particles move faster, so they collide with the walls more and harder, increasing pressure."},
{"type":"categorise","q":"Sort each clue into the right state of matter.","bins":["Solid","Liquid","Gas"],"items":[{"t":"Fixed shape and volume","bin":"Solid"},{"t":"Fixed volume, but flows to fit its container","bin":"Liquid"},{"t":"Spreads out to fill its container","bin":"Gas"},{"t":"Particles vibrate in fixed places","bin":"Solid"},{"t":"Particles slide past each other","bin":"Liquid"},{"t":"Particles are far apart and fast","bin":"Gas"}],"ok":"Solid = fixed shape; liquid = fixed volume but flows; gas = fills any space.","bad":"Check again: solids keep their shape, liquids flow but keep volume, gases fill the container."},
{"type":"order","q":"Put the states in order of particle spacing, closest together first.","items":["Solid","Liquid","Gas"],"ok":"Particles are closest together in a solid and furthest apart in a gas."},
{"type":"order","q":"Order what water becomes as you keep heating ice.","items":["Ice (solid)","Water (liquid)","Steam (gas)"],"ok":"Heating melts the solid to a liquid, then boils the liquid to a gas."},
{"type":"numeric","q":"At what temperature, in °C, does pure water boil?","answer":100,"unit":"°C","ok":"Water boils at 100 °C — and steam condenses at the same temperature."},
{"type":"numeric","q":"At what temperature, in °C, does ice melt?","answer":0,"unit":"°C","ok":"Ice melts (and water freezes) at 0 °C."},
{"type":"mcq","q":"What is it called when a liquid turns to gas only at its surface, below boiling point?","options":[{"t":"Evaporation","correct":true},{"t":"Boiling","why":"Boiling happens throughout the liquid at its boiling point, not just at the surface."},{"t":"Condensing","why":"Condensing is a gas turning back into a liquid — the opposite direction."}],"ok":"Evaporation happens at the surface, below the boiling point."},
{"type":"mcq","q":"A gas is cooled until it condenses. What do its particles do?","options":[{"t":"Move closer together and slow down","correct":true},{"t":"Get smaller","why":"Particles never change size — only their spacing and speed change."},{"t":"Disappear","why":"Particles are never destroyed; they just come closer together to form a liquid."}],"ok":"Cooling makes particles slow down and move closer, forming a liquid."},
{"type":"tf","q":"Boiling happens only at the surface of a liquid.","answer":false,"why":"That describes evaporation — boiling happens throughout the liquid at its boiling point."},
{"type":"multi","q":"Tap all the true statements about a solid.","items":[{"t":"It has a fixed shape","correct":true},{"t":"Its particles touch and vibrate","correct":true},{"t":"It can be compressed easily"},{"t":"Its particles are far apart"}],"ok":"Solid particles are packed together, touching and vibrating in a fixed shape.","bad":"Solids can't be compressed and their particles aren't far apart — that's a gas."}]},

"B1":{"code":"B1","title":"Cells","discipline":"biology","blurb":"Cells are the tiny building blocks of every living thing — what's inside them and how they do their jobs.",
"vocab":[
{"term":"cell","definition":"the building block of all living things","say":"cell"},
{"term":"nucleus","definition":"controls the cell and holds the genetic material","say":"new-clee-us"},
{"term":"cytoplasm","definition":"gel where the cell's chemical reactions happen","say":"sigh-toh-plazm"},
{"term":"cell membrane","definition":"controls what enters and leaves the cell","say":"cell mem-brain"},
{"term":"chloroplast","definition":"green plant-cell part where photosynthesis happens","say":"klor-oh-plast"},
{"term":"mitochondria","definition":"where respiration releases energy from food","say":"my-toh-con-dree-uh"},
{"term":"magnification","definition":"how many times bigger an image is than the real object","say":"mag-nif-ih-cay-shun"},
{"term":"diffusion","definition":"movement of a substance from high to low concentration","say":"diff-yoo-zhun"},
{"term":"specialised cell","definition":"a cell shaped to do one job really well","say":"specialised cell"}],
"facts":[
"A cell is the building block of all living things, and most cells are far too small to see, so we use a microscope to magnify and focus them.",
"Organisms can be unicellular (one cell, like bacteria) or multicellular (many cells working together, like plants and animals).",
"All cells contain a cell membrane, cytoplasm, ribosomes and genetic material. Animal cells also have a nucleus and mitochondria.",
"Plant cells have everything an animal cell has, plus three extras: a cell wall for support, a permanent vacuole of sap, and chloroplasts for photosynthesis.",
"We work out how big an image looks with: image size = actual size × magnification.",
"Diffusion is the movement of a substance from a high concentration to a low concentration — like oxygen entering a cell through the membrane.",
"A larger surface area and a higher temperature both increase the rate of diffusion.",
"Specialised cells are adapted for a job: a red blood cell has no nucleus and a dimpled shape to carry more oxygen; a root hair cell is long to absorb water."],
"misconceptions":[
{"wrong":"All cells have a cell wall.","right":"Only plant cells and bacterial cells have a cell wall — animal cells do not."},
{"wrong":"A microscope just zooms in.","right":"A microscope does two things: it magnifies the image and focuses it to make it sharp."}],
"questions":[
{"type":"mcq","q":"What is a cell?","options":[{"t":"The building block of all living things","correct":true},{"t":"A type of microscope","why":"A microscope is the tool we use to view cells, not the cell itself."},{"t":"Something only found in animals","why":"All living things, including plants and bacteria, are made of cells."}],"ok":"Every living thing is made of cells."},
{"type":"mcq","q":"What two jobs does a microscope do?","options":[{"t":"Magnifies and focuses the image","correct":true},{"t":"Just zooms in on the image","why":"'Zooming in' misses focusing, which makes the image sharp."},{"t":"Makes the cell bigger in real life","why":"The cell stays the same size — only the image is made bigger."}],"ok":"It magnifies and focuses."},
{"type":"tf","q":"Animal cells have a cell wall.","answer":false,"why":"Only plant and bacterial cells have a cell wall. Animal cells do not."},
{"type":"mcq","q":"Which part controls what enters and leaves the cell?","options":[{"t":"Cell membrane","correct":true},{"t":"Cytoplasm","why":"The cytoplasm is where reactions happen, not the cell's gateway."},{"t":"Nucleus","why":"The nucleus controls the cell's activities; it doesn't control what enters."}],"ok":"The cell membrane is the gateway."},
{"type":"multi","q":"Tap all the parts found in plant cells but NOT animal cells.","items":[{"t":"Cell wall","correct":true},{"t":"Nucleus"},{"t":"Chloroplast","correct":true},{"t":"Permanent vacuole","correct":true},{"t":"Cell membrane"}],"ok":"Cell wall, chloroplast and permanent vacuole are the three extras.","bad":"The nucleus and cell membrane are found in animal cells too."},
{"type":"mcq","q":"In which part does photosynthesis happen?","options":[{"t":"Chloroplast","correct":true},{"t":"Mitochondria","why":"Mitochondria are where respiration happens, not photosynthesis."},{"t":"Nucleus","why":"The nucleus controls the cell; it doesn't do photosynthesis."}],"ok":"Chloroplasts trap sunlight for photosynthesis."},
{"type":"mcq","q":"A cell is 0.2 mm long, viewed at ×60. What is the image size?","options":[{"t":"12 mm","correct":true},{"t":"0.0033 mm","why":"That divides — image size = actual size × magnification."},{"t":"60 mm","why":"You must multiply actual size by magnification, not just use the magnification."}],"ok":"0.2 × 60 = 12 mm."},
{"type":"tf","q":"Bacterial cells have a nucleus.","answer":false,"why":"Bacterial cells are too small for a nucleus, so their genetic material sits free in the cytoplasm."},
{"type":"mcq","q":"What is diffusion?","options":[{"t":"Movement of a substance from high to low concentration","correct":true},{"t":"Movement from low to high concentration","why":"That's the wrong direction — substances spread from lots to fewer."},{"t":"When a cell makes proteins","why":"Making proteins is the job of ribosomes, not diffusion."}],"ok":"Substances diffuse from high to low concentration."},
{"type":"mcq","q":"Why does a red blood cell have no nucleus?","options":[{"t":"So it has more space to carry oxygen","correct":true},{"t":"Because it is a plant cell","why":"Red blood cells are animal cells; plant cells are different."},{"t":"Because it doesn't need to think","why":"No cell 'thinks' — the nucleus is removed to make room for oxygen."}],"ok":"No nucleus means more room for oxygen."},
{"type":"categorise","q":"Which cells have each part — both animal and plant, or plant only?","bins":["Animal & plant","Plant only"],"items":[{"t":"Nucleus","bin":"Animal & plant"},{"t":"Cell membrane","bin":"Animal & plant"},{"t":"Cytoplasm","bin":"Animal & plant"},{"t":"Mitochondria","bin":"Animal & plant"},{"t":"Cell wall","bin":"Plant only"},{"t":"Chloroplast","bin":"Plant only"},{"t":"Permanent vacuole","bin":"Plant only"}],"ok":"Plant cells have everything animal cells have, plus a cell wall, chloroplasts and a permanent vacuole.","bad":"Cell wall, chloroplast and permanent vacuole are plant-only; the rest are in animal cells too."},
{"type":"numeric","kicker":"Work it out","q":"A cell is 0.05 mm long, seen at ×200 magnification. What is the image size?","hint":"image size = actual size × magnification","answer":10,"unit":"mm","ok":"image size = 0.05 × 200 = 10 mm."},
{"type":"numeric","kicker":"Work it out","q":"An image is 30 mm long at ×150 magnification. What is the cell's actual size?","hint":"actual size = image size ÷ magnification","answer":0.2,"unit":"mm","ok":"actual size = 30 ÷ 150 = 0.2 mm."},
{"type":"mcq","q":"Which part of a cell releases energy from food during respiration?","options":[{"t":"Mitochondria","correct":true},{"t":"Chloroplast","why":"Chloroplasts carry out photosynthesis in plant cells, not respiration."},{"t":"Nucleus","why":"The nucleus controls the cell; it doesn't release energy."}],"ok":"Respiration happens in the mitochondria, releasing energy from food."},
{"type":"mcq","q":"What do we call an organism made of just one cell?","options":[{"t":"Unicellular","correct":true},{"t":"Multicellular","why":"Multicellular means made of many cells, like a plant or animal."},{"t":"Specialised","why":"Specialised describes a cell adapted for a job, not a whole one-celled organism."}],"ok":"Uni- means one, so a one-celled organism is unicellular, like bacteria."},
{"type":"multi","q":"Tap all the parts found in an animal cell.","items":[{"t":"Nucleus","correct":true},{"t":"Cell membrane","correct":true},{"t":"Cytoplasm","correct":true},{"t":"Cell wall"},{"t":"Chloroplast"}],"ok":"Animal cells have a nucleus, a membrane, cytoplasm and mitochondria.","bad":"Cell walls and chloroplasts are found in plant cells, not animal cells."},
{"type":"tf","q":"Diffusion is the movement of a substance from a low to a high concentration.","answer":false,"why":"It's the other way round — diffusion moves a substance from high to low concentration."},
{"type":"mcq","q":"How is a root hair cell adapted to absorb lots of water?","options":[{"t":"It has a long, thin extension to increase its surface area","correct":true},{"t":"It has no nucleus","why":"Losing the nucleus is a red blood cell's adaptation, for carrying oxygen."},{"t":"It is packed with chloroplasts","why":"Root hair cells are underground in the dark, so they don't need chloroplasts."}],"ok":"A long extension gives a bigger surface area to absorb water faster."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap the nucleus of this animal cell.","diagram":"animalCell","answer":"nucleus","ok":"The nucleus is the round structure near the centre that controls the cell."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap a mitochondrion.","diagram":"animalCell","answer":"mitochondria","ok":"Mitochondria are where respiration releases energy from food."}]},

"C2":{"code":"C2","title":"Atoms and elements","discipline":"chemistry","blurb":"What atoms are, how the periodic table is organised, and how atoms join to make elements and compounds.",
"vocab":[
{"term":"atom","definition":"the smallest unit of matter that can exist on its own","say":"atom"},
{"term":"element","definition":"a substance made of only one type of atom","say":"element"},
{"term":"compound","definition":"two or more types of atom chemically joined","say":"compound"},
{"term":"molecule","definition":"a particle made of a few atoms joined together","say":"molecule"},
{"term":"proton","definition":"a particle in the nucleus of an atom","say":"proton"},
{"term":"neutron","definition":"a particle in the nucleus of an atom","say":"neutron"},
{"term":"electron","definition":"a particle that moves in shells around the nucleus","say":"electron"},
{"term":"nucleus","definition":"the centre of an atom, holding protons and neutrons","say":"nucleus"},
{"term":"periodic table","definition":"a chart of all the types of atom in groups and periods","say":"periodic table"}],
"facts":[
"An atom is the smallest unit of matter that can exist on its own. There are 92 naturally occurring types of atom, and they make up everything around us.",
"All the types of atom are listed on the periodic table, arranged into groups (columns) and periods (rows).",
"Atoms are made of three smaller particles: protons, neutrons and electrons. Protons and neutrons sit in the nucleus; electrons move in shells around it.",
"The atomic number is the number of protons (and electrons). The atomic mass is protons + neutrons, so neutrons = atomic mass − atomic number.",
"Electrons fill shells from the inside out: the first shell holds up to 2, the second and third hold up to 8 each.",
"Every type of atom has a chemical symbol of one or two letters — one capital, or one capital and one lower-case (e.g. H, He, Na).",
"A chemical formula uses symbols and small numbers to show how many of each atom are present, such as H₂O for water and O₂ for oxygen.",
"An element is made of only one type of atom; a compound is two or more types chemically joined. Every chemical is one or the other.",
"Compounds are named from their elements: the one further left comes first, the second ends in '-ide', or '-ate' if oxygen is also present (e.g. sodium chloride, calcium carbonate)."],
"misconceptions":[
{"wrong":"A compound is just a mixture of elements.","right":"A compound's atoms are chemically bonded; a mixture is not bonded and is easier to separate."},
{"wrong":"An atom is a tiny solid ball.","right":"An atom is mostly empty space, with a tiny nucleus and electrons in shells around it."}],
"questions":[
{"type":"mcq","q":"What is the smallest unit of matter that can exist on its own?","options":[{"t":"An atom","correct":true},{"t":"A molecule","why":"A molecule is a few atoms joined, so not the smallest unit."},{"t":"A proton","why":"Protons can't easily exist on their own outside an atom."}],"ok":"An atom is the smallest unit of matter that can exist on its own."},
{"type":"mcq","q":"What is an element?","options":[{"t":"A substance made of only one type of atom","correct":true},{"t":"Any substance on the periodic table","why":"Being on the table isn't the definition — an element has only one type of atom."},{"t":"Two or more atoms chemically joined","why":"That describes a compound, not an element."}],"ok":"An element contains only one type of atom."},
{"type":"tf","q":"All the types of atom are listed on the periodic table.","answer":true,"why":"The periodic table lists every type of atom, arranged in groups and periods."},
{"type":"mcq","q":"Which two particles are found in the nucleus?","options":[{"t":"Protons and neutrons","correct":true},{"t":"Protons and electrons","why":"Electrons aren't in the nucleus — they move in shells around it."},{"t":"Neutrons and electrons","why":"Electrons are in shells, not the nucleus."}],"ok":"The nucleus holds the protons and neutrons."},
{"type":"mcq","q":"An atom has atomic number 3 and atomic mass 7. How many neutrons?","options":[{"t":"4","correct":true},{"t":"7","why":"7 is the atomic mass (protons + neutrons), not neutrons alone."},{"t":"3","why":"3 is the atomic number — that's protons, not neutrons."}],"ok":"Neutrons = atomic mass − atomic number = 7 − 3 = 4."},
{"type":"tf","q":"The first electron shell can hold up to eight electrons.","answer":false,"why":"The first shell holds up to 2; the second and third hold up to 8."},
{"type":"multi","q":"Tap all the correct ways to write a chemical symbol.","items":[{"t":"One capital letter, e.g. H","correct":true},{"t":"A capital then a lower-case letter, e.g. Na","correct":true},{"t":"Two capital letters, e.g. NA"},{"t":"A lower-case then a capital, e.g. nA"}],"ok":"Symbols are one capital, or one capital plus a lower-case letter.","bad":"A symbol is only ever one capital, or one capital plus a lower-case letter — never two capitals."},
{"type":"mcq","q":"The formula of water is H₂O. What does this tell you?","options":[{"t":"Two hydrogen atoms joined to one oxygen atom","correct":true},{"t":"Two oxygen atoms and one hydrogen atom","why":"The small 2 is on the H, so there are two hydrogens, not two oxygens."},{"t":"Water contains two atoms in total","why":"There are three atoms — two hydrogen and one oxygen."}],"ok":"H₂O means two hydrogen atoms joined to one oxygen atom."},
{"type":"multi","q":"Tap all the substances that are elements.","items":[{"t":"Oxygen, O₂","correct":true},{"t":"Iron, Fe","correct":true},{"t":"Water, H₂O"},{"t":"Sodium chloride, NaCl"}],"ok":"O₂ and Fe are each one type of atom, so they're elements.","bad":"H₂O and NaCl each contain two different types of atom, so they're compounds."},
{"type":"mcq","q":"Why is sodium chloride (NaCl) a compound, not a mixture?","options":[{"t":"Its sodium and chlorine atoms are chemically bonded","correct":true},{"t":"It has two elements sitting next to each other","why":"Just being near each other isn't enough — a mixture isn't bonded."},{"t":"It is listed on the periodic table","why":"The periodic table only lists elements, not compounds."}],"ok":"In a compound the atoms are chemically bonded, unlike in a mixture."},
{"type":"categorise","q":"Sort each substance into element or compound.","bins":["Element","Compound"],"items":[{"t":"Oxygen, O₂","bin":"Element"},{"t":"Water, H₂O","bin":"Compound"},{"t":"Iron, Fe","bin":"Element"},{"t":"Carbon dioxide, CO₂","bin":"Compound"},{"t":"Helium, He","bin":"Element"},{"t":"Sodium chloride, NaCl","bin":"Compound"}],"ok":"Elements have one type of atom; compounds have two or more types chemically joined.","bad":"O₂, Fe and He are one type of atom (elements); the others contain two types (compounds)."},
{"type":"categorise","q":"Where is each particle found in an atom?","bins":["In the nucleus","In shells around it"],"items":[{"t":"Proton","bin":"In the nucleus"},{"t":"Neutron","bin":"In the nucleus"},{"t":"Electron","bin":"In shells around it"}],"ok":"Protons and neutrons sit in the nucleus; electrons move in shells around it.","bad":"Protons and neutrons are in the nucleus; only electrons are in the shells."},
{"type":"numeric","q":"An atom has 11 protons. How many electrons does it have?","hint":"in an atom, protons = electrons","answer":11,"ok":"An atom has equal numbers of protons and electrons, so 11 protons means 11 electrons."},
{"type":"numeric","kicker":"Work it out","q":"An atom has atomic number 8 and atomic mass 16. How many neutrons does it have?","hint":"neutrons = atomic mass − atomic number","answer":8,"ok":"neutrons = 16 − 8 = 8."},
{"type":"numeric","q":"How many electrons can the first shell hold?","answer":2,"ok":"The first shell holds up to 2 electrons; the next two shells hold up to 8 each."},
{"type":"mcq","q":"About how many types of atom occur naturally?","options":[{"t":"92","correct":true},{"t":"8","why":"There are far more than 8 — about 92 types occur naturally."},{"t":"118","why":"118 includes ones made in labs too; about 92 occur naturally."}],"ok":"About 92 types of atom occur naturally and make up everything around us."},
{"type":"numeric","q":"How many atoms are there in total in one molecule of water, H₂O?","hint":"count every atom","answer":3,"ok":"Two hydrogen atoms plus one oxygen atom makes 3 atoms in total."},
{"type":"multi","q":"Tap all the correct facts about a compound.","items":[{"t":"Its atoms are chemically bonded","correct":true},{"t":"It contains two or more types of atom","correct":true},{"t":"It is just a mixture"},{"t":"It is made of only one type of atom"}],"ok":"A compound is two or more types of atom chemically bonded together.","bad":"A compound is bonded (not a mixture) and has more than one type of atom."},
{"type":"tf","q":"Electrons are found inside the nucleus of an atom.","answer":false,"why":"Electrons move in shells around the nucleus; only protons and neutrons sit inside it."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap the nucleus of this atom.","diagram":"atom","answer":"nucleus","ok":"The nucleus is the cluster of protons and neutrons at the centre."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap an electron.","diagram":"atom","answer":"electron","ok":"Electrons are the small particles moving in shells around the nucleus."}]},

"PWR":{"code":"PWR","title":"Power","discipline":"physics","blurb":"Power tells you how quickly energy is transferred each second, measured in watts.",
"vocab":[{"term":"power","definition":"how much energy is transferred each second","say":"POW-er"},{"term":"energy transferred","definition":"the energy moved from one store to another, in joules","say":"EN-er-jee"},{"term":"watt","definition":"the unit of power; one joule transferred per second","say":"watt (rhymes with hot)"},{"term":"joule","definition":"the unit of energy transferred","say":"jool (rhymes with cool)"},{"term":"kilowatt","definition":"a unit of power equal to 1000 watts","say":"KIL-oh-watt"},{"term":"kilojoule","definition":"a unit of energy equal to 1000 joules","say":"KIL-oh-jool"},{"term":"power rating","definition":"the power of a device, written in watts or kilowatts","say":"POW-er RAY-ting"},{"term":"time","definition":"how long a device is switched on, measured in seconds","say":"time"}],
"facts":["Power is how quickly energy is transferred. A high-power device transfers more energy each second than a low-power one.","Power and energy are not the same in science: energy is how much is transferred, power is how fast it is transferred.","Power is measured in watts (W). A power of 1 watt means 1 joule of energy is transferred every second.","To find power, divide the energy transferred by the time taken: P = E ÷ t.","The equation linking the three quantities is E = P × t. You can rearrange it to P = E ÷ t, or t = E ÷ P.","A kilowatt (kW) is a larger unit of power. 1 kW = 1000 W, so to change kilowatts into watts you multiply by 1000.","A kilojoule (kJ) is a larger unit of energy. 1 kJ = 1000 J, so to change joules into kilojoules you divide by 1000.","Time must be in seconds for the power equation. There are 60 seconds in a minute, so multiply minutes by 60 to get seconds."],
"misconceptions":[{"wrong":"Power and energy mean the same thing.","right":"Energy is how much is transferred; power is how quickly it is transferred each second."},{"wrong":"A bigger number of watts always means more energy is transferred.","right":"Energy also depends on time. A low-power device left on for longer can transfer more energy."},{"wrong":"You can compare 800 W and 1.2 kW directly because 800 is bigger than 1.2.","right":"Convert to the same unit first: 1.2 kW = 1200 W, which is more than 800 W."},{"wrong":"You can use time in minutes in the power equation.","right":"Time must be in seconds, so convert minutes to seconds by multiplying by 60."}],
"questions":[{"type":"tf","q":"In science, power means how quickly energy is transferred.","answer":true,"why":"Power tells you how much energy is transferred each second."},{"type":"mcq","q":"What is the unit of power?","options":[{"t":"The watt (W)","correct":true},{"t":"The joule (J)","why":"The joule is the unit of energy transferred, not power."},{"t":"The second (s)","why":"The second is the unit of time, not power."}],"ok":"Power is measured in watts, where 1 W means 1 joule transferred per second."},{"type":"mcq","q":"A power of 1 watt is the same as transferring how much energy each second?","options":[{"t":"1 joule per second","correct":true},{"t":"1 kilojoule per second","why":"That would be 1000 joules per second, which is 1000 watts."},{"t":"60 joules per second","why":"There is no factor of 60 here; 1 W is simply 1 joule per second."}],"ok":"By definition, 1 watt equals 1 joule transferred every second."},{"type":"categorise","q":"Sort each item by what it is a measure of.","bins":["Power","Energy"],"items":[{"t":"watt (W)","bin":"Power"},{"t":"joule (J)","bin":"Energy"},{"t":"kilowatt (kW)","bin":"Power"},{"t":"kilojoule (kJ)","bin":"Energy"}],"ok":"Watts and kilowatts measure power; joules and kilojoules measure energy transferred.","bad":"Power units are watts and kilowatts; energy units are joules and kilojoules."},{"type":"tf","q":"A heater that transfers 5 kJ in 1 s is more powerful than one that transfers 3 kJ in 1 s.","answer":true,"why":"In the same time of 1 s the first heater transfers more energy, so it has the higher power."},{"type":"mcq","q":"A fan has a rating of 50 W. What does this tell you?","options":[{"t":"It transfers 50 J of energy every second","correct":true},{"t":"It transfers a total of 50 J of energy","why":"A watt is a rate, so it means 50 J every second, not 50 J in total."},{"t":"It stays on for 50 seconds","why":"Watts measure power, not time; the 50 has nothing to do with how long it runs."}],"ok":"A power of 50 W means 50 joules are transferred each second."},{"type":"numeric","kicker":"Work it out","q":"A toaster transfers 200 J in 1 s. What is its power?","hint":"P = E ÷ t","answer":200,"unit":"W","ok":"P = 200 J ÷ 1 s = 200 W."},{"type":"mcq","q":"What happens to the energy transferred by a device if you leave it on for longer?","options":[{"t":"More energy is transferred","correct":true},{"t":"Less energy is transferred","why":"Running for longer means more time, so more energy is transferred, not less."},{"t":"The energy transferred stays the same","why":"Energy depends on time, so a longer time transfers more energy."}],"ok":"Energy transferred = power × time, so a longer time means more energy."},{"type":"numeric","kicker":"Work it out","q":"A lightbulb has a power of 5 W and is switched on for 2 s. How much energy is transferred?","hint":"E = P × t","answer":10,"unit":"J","ok":"E = 5 W × 2 s = 10 J."},{"type":"tf","q":"A 600 W toaster switched on for 10 s transfers 6000 J of energy.","answer":true,"why":"E = P × t = 600 W × 10 s = 6000 J."},{"type":"mcq","q":"Which equation correctly rearranges E = P × t to find the time?","options":[{"t":"t = E ÷ P","correct":true},{"t":"t = E × P","why":"Multiplying would make time larger as power grows, which is wrong; you divide energy by power."},{"t":"t = P ÷ E","why":"This is upside down; you divide the energy by the power, not the power by the energy."}],"ok":"Starting from E = P × t, dividing both sides by P gives t = E ÷ P."},{"type":"numeric","kicker":"Convert it","q":"Convert 3400 J into kilojoules.","hint":"divide joules by 1000","answer":3.4,"unit":"kJ","ok":"3400 J ÷ 1000 = 3.4 kJ."},{"type":"numeric","kicker":"Convert it","q":"A heater has a power of 2 kW. Convert this power into watts.","hint":"1 kW = 1000 W, so multiply by 1000","answer":2000,"unit":"W","ok":"2 kW × 1000 = 2000 W."},{"type":"numeric","kicker":"Work it out","q":"A kettle has a power of 2 kW and is left on for 30 s. How much energy is transferred, in joules?","hint":"First change 2 kW into 2000 W, then E = P × t","answer":60000,"unit":"J","ok":"2 kW = 2000 W, so E = 2000 W × 30 s = 60 000 J."},{"type":"mcq","q":"A student says: 'TV B transfers 1.2 kJ in 1 s and TV A transfers 800 J in 1 s. As 1.2 is less than 800, TV A is more powerful.' Why are they wrong?","options":[{"t":"1.2 kJ is actually 1200 J, which is more than 800 J, so TV B is more powerful","correct":true},{"t":"The TV left on longer is always more powerful","why":"Both transfer their energy in the same 1 s, so time is not the issue here; the units are."},{"t":"You cannot compare two televisions at all","why":"You can compare them once the energies are in the same unit."}],"ok":"Convert to the same unit first: 1.2 kJ = 1200 J, which is greater than 800 J."},{"type":"numeric","kicker":"Convert it","q":"Convert 5 minutes into seconds.","hint":"multiply minutes by 60","answer":300,"unit":"s","ok":"5 minutes × 60 = 300 s."},{"type":"numeric","kicker":"Work it out","q":"Headphones with a power rating of 20 W are left on for 5 minutes. How much energy is transferred?","hint":"Change 5 minutes to seconds, then E = P × t","answer":6000,"unit":"J","ok":"5 minutes = 300 s, so E = 20 W × 300 s = 6000 J."},{"type":"order","q":"Put these steps in order to find energy transferred when a 2 kW kettle runs for 2 minutes (rule: convert units first, then use the equation).","items":["Change 2 kW into 2000 W","Change 2 minutes into 120 s","Use E = P × t with the converted values","Write the answer with the unit joules"],"ok":"Always convert power to watts and time to seconds first, then use E = P × t."}]},

"MIC":{"code":"MIC","title":"Microscopes & magnification","discipline":"biology","blurb":"Microscopes let us see tiny cells by magnifying and focusing them, and a quick sum tells us how big the image is.",
"vocab":[{"term":"microscope","definition":"a device that magnifies and focuses tiny objects so we can see them","say":"my-kruh-scope"},{"term":"naked eye","definition":"looking with no lens to make things bigger","say":"nay-kid eye"},{"term":"magnify","definition":"to make the image of an object look bigger","say":"mag-nih-fy"},{"term":"magnification","definition":"how many times bigger the image is than the actual object","say":"mag-nif-ih-cay-shun"},{"term":"focus","definition":"to adjust a microscope so the image becomes sharp and clear","say":"foh-kuss"},{"term":"image","definition":"the magnified, focused view of an object seen down a microscope","say":"im-ij"},{"term":"eyepiece lens","definition":"the lens you look down; it provides some magnification","say":"eye-peess lenz"},{"term":"objective lens","definition":"lower lenses of different powers that control the magnification","say":"ob-jek-tiv lenz"},{"term":"stage","definition":"the flat part where the slide is clipped so light can pass through","say":"stayj"},{"term":"actual size","definition":"the real size of the object before the microscope magnifies it","say":"ak-choo-al size"}],
"facts":["We use microscopes because some objects, like cells, are far too small to see with the naked eye.","A microscope does two jobs: it magnifies the image to make it bigger, and it focuses the image to make it sharp and clear.","Saying a microscope 'zooms in' is wrong; the correct word for making the image bigger is magnifying.","You look down the eyepiece lens, while the objective lenses lower down let you choose how magnified the image is.","The stage holds the slide and has a hole so light from the mirror can shine up through the sample.","The magnification equation is: image size = actual size × magnification.","A microscope has two lenses that each magnify, so total magnification = eyepiece magnification × objective magnification.","There are 10 millimetres (mm) in 1 centimetre (cm), so to change cm to mm you multiply by 10.","To find a real size from an image you rearrange the equation: actual size = image size ÷ magnification."],
"misconceptions":[{"wrong":"A microscope just zooms in on the object.","right":"A microscope magnifies the image to make it bigger AND focuses it to make it clear."},{"wrong":"Only the eyepiece lens magnifies the image.","right":"Both the eyepiece lens and the objective lens magnify, so you multiply them for total magnification."},{"wrong":"You start on the highest power objective lens to see the cells.","right":"Start on the lowest power to find the cells first, then increase magnification for more detail."}],
"questions":[{"type":"mcq","q":"Why do we need microscopes?","options":[{"t":"Some objects are too small to see with the naked eye","correct":true},{"t":"They make objects move faster","why":"A microscope does not move anything; it makes small objects appear bigger and clearer."},{"t":"They turn objects a different colour","why":"A microscope magnifies and focuses; it does not change an object's colour."}],"ok":"Cells and other tiny objects are invisible to the naked eye, so we magnify them with a microscope."},{"type":"mcq","q":"What are the TWO functions of a microscope?","options":[{"t":"Magnify and focus the image","correct":true},{"t":"Zoom in and record the image","why":"'Zoom in' is the wrong word; the correct functions are magnifying and focusing."},{"t":"Shrink and colour the image","why":"A microscope enlarges the image, it does not shrink it or add colour."}],"ok":"A microscope magnifies the image to make it bigger and focuses it to make it sharp."},{"type":"tf","q":"A microscope only makes an object look bigger and does nothing else.","answer":false,"why":"As well as magnifying, a microscope focuses the image so it is clear enough to see."},{"type":"mcq","q":"Which part of the microscope do you look down?","options":[{"t":"The eyepiece lens","correct":true},{"t":"The stage","why":"The stage is the flat part where the slide is clipped, not the part you look through."},{"t":"The objective lens","why":"The objective lenses are lower down near the slide; you look down the eyepiece."}],"ok":"You look down the eyepiece lens, which provides some of the magnification."},{"type":"categorise","q":"Sort each microscope part by the job it does.","bins":["Magnifies the image","Holds or lights the slide"],"items":[{"t":"Eyepiece lens","bin":"Magnifies the image"},{"t":"Objective lens","bin":"Magnifies the image"},{"t":"Stage","bin":"Holds or lights the slide"},{"t":"Mirror","bin":"Holds or lights the slide"}],"ok":"Both lenses magnify; the stage clips the slide and the mirror reflects light up through it.","bad":"The stage and mirror do not magnify; only the eyepiece and objective lenses do."},{"type":"multi","q":"Tap all the things a microscope does to an object.","items":[{"t":"Magnifies the image","correct":true},{"t":"Focuses the image","correct":true},{"t":"Zooms in like a phone camera"},{"t":"Makes the object smaller"}],"ok":"A microscope magnifies and focuses; together that gives a bigger, sharper image.","bad":"It does not 'zoom in' or shrink the object; use the words magnify and focus."},{"type":"order","q":"Put these steps in order to view focused, magnified cells (rule: lowest power first, find the cells, then magnify more).","items":["Put the slide onto the stage","Turn the objective lens to the lowest power","Look down the eyepiece and focus on the cells","Increase the magnification to see more detail"],"ok":"You start on low power to find the cells, focus them, then increase magnification for detail."},{"type":"tf","q":"When you first use a microscope you should start on the highest power objective lens.","answer":false,"why":"Start on the lowest power to find the cells, then increase the magnification for more detail."},{"type":"mcq","q":"Which equation gives the size of the image you see?","options":[{"t":"image size = actual size × magnification","correct":true},{"t":"image size = actual size + magnification","why":"You multiply, not add; magnification is how many times bigger the image is."},{"t":"image size = actual size − magnification","why":"You multiply the actual size by the magnification, you do not subtract."}],"ok":"image size = actual size × magnification, so a bigger magnification gives a bigger image."},{"type":"numeric","kicker":"Work it out","q":"A cell has an actual size of 0.01 mm and is viewed at ×500 magnification. How long is the image?","hint":"image size = actual size × magnification","answer":5,"unit":"mm","ok":"0.01 × 500 = 5, so the image is 5 mm long."},{"type":"numeric","kicker":"Work it out","q":"A cell has an actual size of 0.2 mm and is viewed at ×60 magnification. What is the image size?","hint":"image size = actual size × magnification","answer":12,"unit":"mm","ok":"0.2 × 60 = 12, so the image is 12 mm."},{"type":"numeric","kicker":"Work it out","q":"A cell has an actual size of 0.05 mm and is viewed at ×100 magnification. What is the image size?","hint":"image size = actual size × magnification","answer":5,"unit":"mm","ok":"0.05 × 100 = 5, so the image is 5 mm."},{"type":"numeric","kicker":"Work it backwards","q":"An image is 12 mm long and the magnification is ×60. What is the actual size of the cell?","hint":"actual size = image size ÷ magnification","answer":0.2,"unit":"mm","ok":"12 ÷ 60 = 0.2, so the actual cell is 0.2 mm."},{"type":"numeric","kicker":"Work it backwards","q":"An image is 5 mm long and the magnification is ×100. What is the actual size of the cell?","hint":"actual size = image size ÷ magnification","answer":0.05,"unit":"mm","ok":"5 ÷ 100 = 0.05, so the actual cell is 0.05 mm."},{"type":"numeric","kicker":"Two lenses","q":"A microscope has an eyepiece lens of ×10 and an objective lens of ×50. What is the total magnification?","hint":"total magnification = eyepiece × objective","answer":500,"ok":"10 × 50 = 500, so the total magnification is ×500."},{"type":"numeric","kicker":"Two lenses","q":"A microscope has an eyepiece lens of ×10 and an objective lens of ×20. What is the total magnification?","hint":"total magnification = eyepiece × objective","answer":200,"ok":"10 × 20 = 200, so the total magnification is ×200."},{"type":"numeric","kicker":"Convert it","q":"How many millimetres are there in 3 cm?","hint":"there are 10 mm in 1 cm, so multiply cm by 10","answer":30,"unit":"mm","ok":"3 × 10 = 30, so 3 cm is 30 mm."},{"type":"numeric","kicker":"Convert it back","q":"An image is 30 mm long. How many centimetres is that?","hint":"there are 10 mm in 1 cm, so divide mm by 10","answer":3,"unit":"cm","ok":"30 ÷ 10 = 3, so 30 mm is 3 cm."},{"type":"mcq","q":"You can see some cells on low power but they are blurry. What should you do?","options":[{"t":"Focus the microscope to make the image sharp","correct":true},{"t":"Magnify more, which makes a blurry image clear","why":"Magnifying makes a blurry image bigger but still blurry; focusing is what makes it sharp."},{"t":"Move to a new slide","why":"The cells are there — they just need focusing to become clear."}],"ok":"Focusing is the job that turns a fuzzy image into a sharp, clear one."}]},

"ELC":{"code":"ELC","title":"Elements and compounds","discipline":"chemistry","blurb":"Crack the code chemists use to name atoms, count them in formulae, and tell elements, compounds and mixtures apart.",
"vocab":[{"term":"chemical symbol","definition":"one or two letters that stand for one type of atom","say":"KEM-ik-uhl SIM-buhl"},{"term":"chemical formula","definition":"symbols and numbers showing how many of each atom are in a substance","say":"KEM-ik-uhl FOR-myoo-luh"},{"term":"element","definition":"a substance made of only one type of atom","say":"EL-uh-muhnt"},{"term":"compound","definition":"two or more types of atom chemically bonded together","say":"KOM-pownd"},{"term":"mixture","definition":"substances together but not bonded, so easily separated","say":"MIKS-cher"},{"term":"molecule","definition":"a particle of a few atoms joined together","say":"MOL-uh-kyool"},{"term":"physical property","definition":"a feature like colour, state, melting point or hardness","say":"FIZ-ik-uhl PROP-er-tee"},{"term":"chemical property","definition":"how a substance reacts with other chemicals, like burning","say":"KEM-ik-uhl PROP-er-tee"}],
