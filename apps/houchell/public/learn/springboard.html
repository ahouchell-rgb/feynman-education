"GF4":{"code":"GF4","title":"Acceleration & equations of motion","discipline":"physics","blurb":"Acceleration, the equations of motion, velocity–time graphs and terminal velocity.","vocab":[{"term":"acceleration","definition":"how quickly velocity changes, in metres per second squared","say":"ac-sel-er-ay-shun"},{"term":"terminal velocity","definition":"the steady top speed of a falling object when drag balances its weight","say":"ter-min-al vel-o-city"}],"facts":["Acceleration = change in velocity / time taken (a = change-in-v / t), measured in metres per second squared.","The equation v squared minus u squared = 2 x acceleration x distance links final velocity, starting velocity, acceleration and distance.","On a velocity-time graph the gradient is the acceleration and the area under the line is the distance travelled.","A negative acceleration (deceleration) means the object is slowing down.","A falling object speeds up until drag grows to balance its weight; then the resultant force is zero and it falls at a steady terminal velocity."],"misconceptions":[{"wrong":"On a velocity-time graph the gradient gives the distance.","right":"The gradient gives the acceleration; the AREA under the line gives the distance."},{"wrong":"At terminal velocity gravity has switched off.","right":"Gravity is unchanged; drag has grown to balance the weight, so the resultant force is zero."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A car speeds up from 4 m/s to 24 m/s in 5 s. What is its acceleration?","hint":"acceleration = change in velocity / time","answer":4,"unit":"m/s2","ok":"(24 - 4) / 5 = 4 m/s squared."},{"type":"numeric","kicker":"Work it out","q":"A car accelerates at 3 m/s squared from rest over 6 m. Find its final velocity. (v squared = u squared + 2 a s)","hint":"v squared = 0 + 2 x 3 x 6 = 36, then take the square root","answer":6,"unit":"m/s","ok":"v squared = 36, so v = 6 m/s."},{"type":"mcq","q":"On a velocity-time graph, what does the area under the line represent?","options":[{"t":"The distance travelled","correct":true},{"t":"The acceleration","why":"Acceleration is the gradient, not the area."},{"t":"The force","why":"The graph does not directly show force."}],"ok":"The area under a velocity-time graph is the distance travelled."},{"type":"mcq","q":"On a velocity-time graph, what does the gradient represent?","options":[{"t":"The acceleration","correct":true},{"t":"The distance travelled","why":"Distance is the area under the line."},{"t":"The speed at the start","why":"The gradient shows how velocity changes, i.e. acceleration."}],"ok":"The gradient of a velocity-time graph is the acceleration."},{"type":"mcq","q":"Why does a skydiver reach a steady terminal velocity?","options":[{"t":"Drag grows until it balances their weight, giving zero resultant force","correct":true},{"t":"Gravity switches off","why":"Gravity stays the same; drag changes."},{"t":"Their weight disappears","why":"Their weight is constant; drag rises to match it."}],"ok":"At terminal velocity drag = weight, so no resultant force and constant velocity."},{"type":"numeric","kicker":"Work it out","q":"A train slows from 30 m/s to 10 m/s in 4 s. What is its acceleration?","hint":"acceleration = change in velocity / time (a negative value means slowing down)","answer":-5,"unit":"m/s2","ok":"(10 - 30) / 4 = -5 m/s squared (deceleration)."},{"type":"tf","q":"A negative acceleration means an object is slowing down.","answer":true,"why":"A negative acceleration (deceleration) means the velocity is decreasing."}]},
"GF5":{"code":"GF5","title":"Newton's laws of motion","discipline":"physics","blurb":"Newton's three laws, inertia, and F = ma.","vocab":[{"term":"inertia","definition":"the tendency of an object to resist a change in its motion","say":"in-er-sha"},{"term":"Newton's second law","definition":"resultant force = mass x acceleration","say":"new-tonz second law"}],"facts":["Newton's first law: an object stays still or keeps moving at constant velocity unless a resultant force acts on it.","Inertia is the tendency of an object to resist a change in its motion. Higher tier: inertial mass = force / acceleration.","Newton's second law: resultant force = mass x acceleration (F = m a).","Required practical: investigate how the acceleration of a trolley depends on the force applied and on its mass.","Newton's third law: when two objects interact they exert equal and opposite forces on each other (an action and reaction pair, on different objects)."],"misconceptions":[{"wrong":"A moving object needs a constant force to keep moving.","right":"By Newton's first law, with no resultant force an object keeps moving at constant velocity; force only changes motion."},{"wrong":"An action-reaction pair acts on the same object.","right":"The two forces act on different objects, which is why they do not cancel out."}],"questions":[{"type":"mcq","q":"What does Newton's first law say about an object with no resultant force?","options":[{"t":"It stays still or moves at constant velocity","correct":true},{"t":"It always slows down and stops","why":"Without a resultant force there is nothing to slow it down."},{"t":"It speeds up","why":"A resultant force is needed to change its motion."}],"ok":"With no resultant force, motion does not change."},{"type":"numeric","kicker":"Work it out","q":"A resultant force of 30 N acts on a 6 kg mass. What is its acceleration?","hint":"acceleration = force / mass","answer":5,"unit":"m/s2","ok":"30 / 6 = 5 m/s squared."},{"type":"numeric","kicker":"Work it out","q":"What resultant force gives a 1200 kg car an acceleration of 2.5 m/s squared?","hint":"force = mass x acceleration","answer":3000,"unit":"N","ok":"1200 x 2.5 = 3000 N."},{"type":"mcq","q":"A swimmer pushes back on the water. What is the Newton's third law pair?","options":[{"t":"The water pushes the swimmer forward with an equal force","correct":true},{"t":"The swimmer's weight pulls them down","why":"That is a different force, not the pair to the push."},{"t":"Drag slows the swimmer","why":"Drag is a separate force, not the third-law pair."}],"ok":"Action-reaction: swimmer pushes water back; water pushes swimmer forward, equal and opposite."},{"type":"mcq","q":"What is inertia?","options":[{"t":"The tendency of an object to resist a change in its motion","correct":true},{"t":"The force of gravity on an object","why":"That is weight, not inertia."},{"t":"The speed of an object","why":"Inertia is about resisting changes in motion, not speed itself."}],"ok":"Inertia is an object's resistance to a change in its motion."},{"type":"numeric","kicker":"Work it out","q":"A 4 kg trolley accelerates at 3 m/s squared. What resultant force acts on it?","hint":"force = mass x acceleration","answer":12,"unit":"N","ok":"4 x 3 = 12 N."},{"type":"tf","q":"The two forces in a Newton's third law pair act on different objects.","answer":true,"why":"Action-reaction forces act on different objects, which is why they do not cancel."}]},
"GF6":{"code":"GF6","title":"Stopping distance & momentum","discipline":"physics","blurb":"Thinking and braking distance, the factors that affect them, and momentum.","vocab":[{"term":"stopping distance","definition":"the total distance to stop: thinking distance plus braking distance","say":"stopping distance"},{"term":"thinking distance","definition":"the distance travelled during the driver's reaction time","say":"thinking distance"},{"term":"braking distance","definition":"the distance travelled while the brakes act to stop the car","say":"braking distance"},{"term":"momentum","definition":"mass in motion: momentum = mass x velocity","say":"mo-men-tum"}],"facts":["Stopping distance = thinking distance + braking distance.","Thinking distance increases with speed and with anything that slows the driver's reaction, such as tiredness, alcohol, drugs or distractions.","Braking distance increases with speed and with poor conditions, such as a wet or icy road, or worn tyres or brakes.","Higher tier: a greater braking force gives a larger deceleration; very large decelerations can be dangerous and can overheat the brakes.","Higher tier: momentum = mass x velocity (p = m v); in a closed system the total momentum before a collision equals the total momentum after it (conservation of momentum)."],"misconceptions":[{"wrong":"Tiredness increases the braking distance.","right":"Tiredness slows the driver's reaction, so it increases the THINKING distance, not the braking distance."},{"wrong":"Stopping distance is just the braking distance.","right":"Stopping distance is thinking distance plus braking distance."}],"questions":[{"type":"categorise","q":"Sort each factor by which part of the stopping distance it affects.","bins":["Thinking distance","Braking distance"],"items":[{"t":"Driver's reaction time","bin":"Thinking distance"},{"t":"Icy road","bin":"Braking distance"},{"t":"Worn tyres","bin":"Braking distance"},{"t":"Tiredness","bin":"Thinking distance"},{"t":"Faulty brakes","bin":"Braking distance"}],"ok":"Reaction-related factors change thinking distance; grip and brakes change braking distance.","bad":"Thinking distance is about the driver reacting; braking distance is about the car stopping."},{"type":"multi","q":"Tap everything that increases the THINKING distance.","items":[{"t":"Higher speed","correct":true},{"t":"Tiredness","correct":true},{"t":"Alcohol or drugs","correct":true},{"t":"Using a phone","correct":true},{"t":"Worn brakes"}],"ok":"Thinking distance grows with speed and anything that slows reaction.","bad":"Worn brakes increase the braking distance, not the thinking distance."},{"type":"numeric","kicker":"Higher tier","q":"What is the momentum of a 3 kg ball moving at 8 m/s?","hint":"momentum = mass x velocity","answer":24,"unit":"kg m/s","ok":"3 x 8 = 24 kg m/s."},{"type":"mcq","q":"What is the stopping distance of a car?","options":[{"t":"Thinking distance + braking distance","correct":true},{"t":"Just the braking distance","why":"Stopping distance also includes the thinking distance."},{"t":"Just the thinking distance","why":"Stopping distance also includes the braking distance."}],"ok":"Stopping distance = thinking distance + braking distance."},{"type":"tf","q":"Higher tier: in a closed system, total momentum before a collision equals total momentum after it.","answer":true,"why":"Momentum is conserved in a closed system, so total p before = total p after."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: a 2 kg trolley moves at 5 m/s and sticks to a stationary 3 kg trolley. Using conservation of momentum, find their common velocity afterwards.","hint":"total momentum before = 2 x 5 = 10 kg m/s; after, total mass = 5 kg; velocity = momentum / mass","answer":2,"unit":"m/s","ok":"Momentum before = 10 kg m/s; 10 / (2+3) = 2 m/s."},{"type":"mcq","q":"Higher tier: why is a very large deceleration in a crash dangerous?","options":[{"t":"It needs a very large force, which can injure the people inside","correct":true},{"t":"It makes the car lighter","why":"Deceleration does not change the mass."},{"t":"It has no effect on the people","why":"Large forces from rapid deceleration can cause injury."}],"ok":"A large deceleration needs a large force (F = ma), which can injure the occupants."}]},
"GF-EX":{"code":"GF-EX","title":"Forces — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Forces: calculations, motion graphs and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A 1400 kg car accelerates at 1.5 m/s squared. Calculate the resultant force on it.","hint":"force = mass x acceleration","answer":2100,"unit":"N","ok":"1400 x 1.5 = 2100 N."},{"type":"numeric","kicker":"Exam · calculate","q":"A motorbike accelerates from rest at 4 m/s squared over a distance of 50 m. Calculate its final velocity. (v squared = u squared + 2 a s)","hint":"v squared = 0 + 2 x 4 x 50 = 400, then take the square root","answer":20,"unit":"m/s","ok":"v squared = 400, so v = 20 m/s."},{"type":"mcq","q":"On a velocity-time graph, a car shows a straight line sloping up, then a flat horizontal line. What is the car doing?","options":[{"t":"Accelerating, then moving at a constant velocity","correct":true},{"t":"Accelerating, then decelerating","why":"A flat line means constant velocity, not slowing down."},{"t":"Slowing down, then stopping","why":"An upward slope means speeding up, not slowing."}],"ok":"A rising line is acceleration; a flat line is constant velocity."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the stopping distance of a car is affected by the driver and by the condition of the car and road. Refer to thinking distance and braking distance.","scheme":["Stopping distance = thinking distance + braking distance (1)","Thinking distance increases with the driver's reaction time (1)","e.g. tiredness, alcohol, drugs or distraction increase reaction time (1)","Braking distance increases with poor road conditions, e.g. wet or icy roads (1)","and with worn tyres or worn brakes (1)","Both thinking and braking distance increase with the car's speed (1)"],"model":"Stopping distance is thinking distance plus braking distance. Thinking distance grows with the driver's reaction time (increased by tiredness, alcohol, drugs or distraction). Braking distance grows with poor grip (wet/icy roads, worn tyres or brakes). Both increase with higher speed."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A skydiver jumps from a plane. Explain, in terms of forces, why she speeds up at first and then reaches a constant (terminal) velocity.","scheme":["At first weight is greater than air resistance, so there is a resultant downward force (1)","so she accelerates / speeds up (1)","As speed increases, air resistance (drag) increases (1)","until drag equals weight, the resultant force is zero, and she falls at constant (terminal) velocity (1)"],"model":"At first her weight is bigger than the air resistance, giving a resultant downward force, so she accelerates. As she speeds up the drag increases until it balances her weight; the resultant force becomes zero and she falls at a constant terminal velocity."}]},
"GW1":{"code":"GW1","title":"Wave properties","discipline":"physics","blurb":"Transverse and longitudinal waves and the meaning of amplitude, wavelength and frequency.","vocab":[{"term":"transverse wave","definition":"a wave where the oscillations are perpendicular to the direction of energy transfer","say":"tranz-verse"},{"term":"longitudinal wave","definition":"a wave where the oscillations are parallel to the direction of energy transfer","say":"lon-ji-tew-din-al"},{"term":"amplitude","definition":"the maximum displacement of a point from its rest position","say":"am-plit-ewd"},{"term":"wavelength","definition":"the distance from one point on a wave to the same point on the next wave","say":"wave-length"},{"term":"frequency","definition":"the number of waves passing a point each second, in hertz","say":"free-kwen-see"}],"facts":["All waves transfer energy from place to place without transferring matter; the particles or fields only oscillate about a fixed position.","In a transverse wave the oscillations are perpendicular to the direction of travel, such as light and water ripples.","In a longitudinal wave the oscillations are parallel to the direction of travel, such as sound, which has compressions and rarefactions.","Amplitude is the maximum displacement from rest; wavelength is the distance for one complete wave; frequency is the number of waves per second, in hertz.","The period is the time for one wave to pass: period = 1 / frequency."],"misconceptions":[{"wrong":"Waves carry matter along with them.","right":"Waves transfer energy only; the water, air or field oscillates and stays where it is."},{"wrong":"Amplitude and wavelength mean the same thing.","right":"Amplitude is the height from rest (linked to energy); wavelength is the length of one wave."}],"questions":[{"type":"mcq","q":"What does a wave transfer?","options":[{"t":"Energy, without transferring matter","correct":true},{"t":"Matter, without transferring energy","why":"It is the other way round: waves move energy, not matter."},{"t":"Both matter and energy","why":"The matter stays put; only energy is transferred."}],"ok":"Waves transfer energy and leave the matter where it is."},{"type":"categorise","q":"Sort each wave by its type.","bins":["Transverse","Longitudinal"],"items":[{"t":"Light","bin":"Transverse"},{"t":"Sound","bin":"Longitudinal"},{"t":"Water ripple","bin":"Transverse"},{"t":"A wave with compressions","bin":"Longitudinal"}],"ok":"Light and water ripples are transverse; sound is the key longitudinal wave.","bad":"Longitudinal waves oscillate along their direction of travel; sound is the main example."},{"type":"mcq","q":"What is the amplitude of a wave?","options":[{"t":"The maximum displacement from the rest position","correct":true},{"t":"The distance between two peaks","why":"That is the wavelength."},{"t":"The number of waves per second","why":"That is the frequency."}],"ok":"Amplitude is the maximum displacement from rest."},{"type":"mcq","q":"In a longitudinal wave, the oscillations are...","options":[{"t":"parallel to the direction of energy transfer","correct":true},{"t":"perpendicular to the direction of energy transfer","why":"That describes a transverse wave."},{"t":"at 45 degrees to the direction of travel","why":"Longitudinal oscillations run parallel to the wave."}],"ok":"Longitudinal oscillations are parallel to the wave's travel."},{"type":"numeric","kicker":"Work it out","q":"A wave has a frequency of 25 Hz. What is its period?","hint":"period = 1 / frequency","answer":0.04,"unit":"s","ok":"1 / 25 = 0.04 s."},{"type":"mcq","q":"What does the frequency of a wave count?","options":[{"t":"The number of complete waves passing a point each second","correct":true},{"t":"The distance between two peaks","why":"That is the wavelength."},{"t":"The height of the wave","why":"That is the amplitude."}],"ok":"Frequency is the number of waves per second, in hertz."},{"type":"tf","q":"A wave carries the particles of the medium along with it.","answer":false,"why":"Waves transfer energy only; the particles oscillate but stay in place."}]},
"GW2":{"code":"GW2","title":"The wave equation","discipline":"physics","blurb":"Linking wave speed, frequency and wavelength, and measuring wave speed.","vocab":[{"term":"wave speed","definition":"how fast a wave travels: wave speed = frequency x wavelength","say":"wave speed"},{"term":"period","definition":"the time for one complete wave to pass: period = 1 / frequency","say":"peer-ee-od"}],"facts":["The wave equation links speed, frequency and wavelength: wave speed = frequency x wavelength (v = f x wavelength).","The period is the time for one wave: period = 1 / frequency.","Required practical: measure the speed of water waves in a ripple tank, and of waves on a stretched string or solid.","For waves on a string, wave speed = frequency x wavelength, just as for any other wave.","The equation can be rearranged to find frequency (= speed / wavelength) or wavelength (= speed / frequency)."],"misconceptions":[{"wrong":"Higher frequency always means a faster wave.","right":"In one medium, higher frequency means a shorter wavelength; the speed can stay the same."},{"wrong":"Period and frequency are the same.","right":"They are reciprocals: period = 1 / frequency."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A wave has a frequency of 5 Hz and a wavelength of 4 m. What is its speed?","hint":"wave speed = frequency x wavelength","answer":20,"unit":"m/s","ok":"5 x 4 = 20 m/s."},{"type":"numeric","kicker":"Work it out","q":"A wave travels at 340 m/s with a wavelength of 2 m. What is its frequency?","hint":"frequency = wave speed / wavelength","answer":170,"unit":"Hz","ok":"340 / 2 = 170 Hz."},{"type":"numeric","kicker":"Work it out","q":"An 8 Hz wave travels at 24 m/s. What is its wavelength?","hint":"wavelength = wave speed / frequency","answer":3,"unit":"m","ok":"24 / 8 = 3 m."},{"type":"numeric","kicker":"Work it out","q":"A wave has a frequency of 4 Hz. What is its period?","hint":"period = 1 / frequency","answer":0.25,"unit":"s","ok":"1 / 4 = 0.25 s."},{"type":"mcq","q":"In the required practical for water waves, which equipment creates the waves?","options":[{"t":"A ripple tank with a vibrating dipper","correct":true},{"t":"A microphone","why":"A microphone detects sound; it does not make water waves."},{"t":"A thermometer","why":"A thermometer measures temperature, not waves."}],"ok":"A ripple tank with a vibrating dipper generates the water waves."},{"type":"tf","q":"Period and frequency are reciprocals of each other.","answer":true,"why":"period = 1 / frequency, so they are reciprocals."},{"type":"mcq","q":"What are the units of wave speed?","options":[{"t":"metres per second (m/s)","correct":true},{"t":"hertz (Hz)","why":"Hertz is the unit of frequency."},{"t":"metres (m)","why":"Metres is the unit of wavelength."}],"ok":"Wave speed is a speed, so it is measured in metres per second."}]},
"GW3":{"code":"GW3","title":"The electromagnetic spectrum","discipline":"physics","blurb":"The family of EM waves, their order, and how they all travel at the speed of light.","vocab":[{"term":"electromagnetic spectrum","definition":"the family of transverse waves from radio waves to gamma rays","say":"ee-lec-tro-mag-net-ic"},{"term":"refraction","definition":"the change of direction when a wave crosses a boundary and changes speed","say":"ree-frac-shun"}],"facts":["The electromagnetic spectrum is a continuous family of transverse waves that all travel at the same speed (the speed of light) in a vacuum.","In order of increasing frequency and decreasing wavelength, the spectrum is: radio, microwave, infrared, visible light, ultraviolet, X-rays and gamma rays.","All electromagnetic waves can travel through a vacuum, such as the space between the Sun and the Earth.","A higher-frequency electromagnetic wave has a shorter wavelength, but not a higher speed in a vacuum.","Higher tier: refraction happens because a wave changes speed at a boundary; if it meets the boundary at an angle, this change of speed bends the wave."],"misconceptions":[{"wrong":"Gamma rays travel faster than radio waves in a vacuum.","right":"All electromagnetic waves travel at the same speed in a vacuum; gamma rays just have a higher frequency."},{"wrong":"Some EM waves cannot travel through a vacuum.","right":"All EM waves can travel through a vacuum, which is how sunlight reaches Earth."}],"questions":[{"type":"order","q":"Order these parts of the EM spectrum from longest wavelength to shortest.","items":["Radio","Microwave","Infrared","Visible light","Ultraviolet","X-rays","Gamma rays"],"ok":"Radio has the longest wavelength; gamma rays have the shortest."},{"type":"mcq","q":"How do all electromagnetic waves compare in a vacuum?","options":[{"t":"They all travel at the same speed","correct":true},{"t":"Gamma rays travel the fastest","why":"All EM waves travel at the same speed in a vacuum."},{"t":"Radio waves travel the fastest","why":"All EM waves share the same speed."}],"ok":"In a vacuum every EM wave travels at the speed of light."},{"type":"multi","q":"Tap the true statements about the electromagnetic spectrum.","items":[{"t":"They are all transverse waves","correct":true},{"t":"They can travel through a vacuum","correct":true},{"t":"Higher frequency means shorter wavelength","correct":true},{"t":"They all have the same frequency"}],"ok":"EM waves are transverse, travel through a vacuum, and trade frequency for wavelength.","bad":"They cover a huge range of frequencies; they do not all share one."},{"type":"mcq","q":"A higher-frequency EM wave has a...","options":[{"t":"shorter wavelength","correct":true},{"t":"longer wavelength","why":"Higher frequency means a shorter wavelength."},{"t":"faster speed in a vacuum","why":"All EM waves share the same speed in a vacuum."}],"ok":"Frequency and wavelength are inversely related for EM waves."},{"type":"mcq","q":"Higher tier: why does a wave refract when it crosses into a different material at an angle?","options":[{"t":"Its speed changes at the boundary","correct":true},{"t":"Its frequency changes at the boundary","why":"Frequency stays the same; the speed and wavelength change."},{"t":"It loses all its energy","why":"It changes speed and bends; it does not lose all its energy."}],"ok":"Refraction is caused by a change of wave speed at the boundary."},{"type":"tf","q":"X-rays travel faster than radio waves in a vacuum.","answer":false,"why":"All electromagnetic waves travel at the same speed in a vacuum; X-rays just have a higher frequency."},{"type":"mcq","q":"Which can travel through the vacuum of space?","options":[{"t":"All electromagnetic waves","correct":true},{"t":"Only visible light","why":"All EM waves can cross a vacuum, not just light."},{"t":"None of them","why":"Sunlight reaches Earth through a vacuum, so EM waves can cross it."}],"ok":"Every electromagnetic wave can travel through a vacuum."}]},
"GW4":{"code":"GW4","title":"Uses & dangers of EM waves","discipline":"physics","blurb":"How each part of the spectrum is used, the dangers of high-frequency waves, and infrared.","vocab":[{"term":"infrared","definition":"electromagnetic waves used for heating and felt as radiant heat","say":"in-fra-red"},{"term":"ultraviolet","definition":"high-frequency waves that can damage skin and cause cancer","say":"ul-tra-vy-o-let"},{"term":"ionising radiation","definition":"radiation with enough energy to knock electrons off atoms, such as X-rays and gamma","say":"eye-on-eye-zing"}],"facts":["Uses span the spectrum: radio for broadcasting, microwaves for cooking and satellite signals, infrared for heating and remote controls, visible light for seeing and fibre optics, ultraviolet for security marking and tanning, X-rays and gamma rays for medical imaging and treatment.","The highest-frequency waves are the most dangerous: ultraviolet can damage skin cells and cause skin cancer.","X-rays and gamma rays are ionising and can damage cells and DNA, which can lead to cancer.","Infrared radiation is given out and absorbed best by black, matt surfaces and worst by shiny, white surfaces.","Required practical: use a Leslie cube to investigate how the infrared radiated by a surface depends on its colour and texture."],"misconceptions":[{"wrong":"Radio waves are dangerous because they are EM waves.","right":"Low-frequency radio waves are non-ionising and low energy; the danger rises towards the high-frequency end (UV, X-rays, gamma)."},{"wrong":"Shiny white surfaces are the best emitters of infrared.","right":"Black, matt surfaces are the best emitters and absorbers; shiny white ones are the worst."}],"questions":[{"type":"categorise","q":"Match each EM wave to a typical use.","bins":["Communication","Heating or cooking","Medical"],"items":[{"t":"Radio","bin":"Communication"},{"t":"Microwave oven","bin":"Heating or cooking"},{"t":"Infrared grill","bin":"Heating or cooking"},{"t":"X-ray imaging","bin":"Medical"},{"t":"Gamma treatment","bin":"Medical"},{"t":"Satellite signals","bin":"Communication"}],"ok":"Each part of the spectrum suits its energy and penetration.","bad":"Radio and microwaves for signals, infrared for heat, X-rays and gamma for medicine."},{"type":"mcq","q":"Why is ultraviolet radiation harmful to skin?","options":[{"t":"It can damage skin cells and cause skin cancer","correct":true},{"t":"It cannot reach the skin","why":"UV does reach the skin, which is why sun cream is used."},{"t":"It only makes you feel warm","why":"Feeling warm is more about infrared; UV damages cells."}],"ok":"UV damages skin cells and raises the risk of skin cancer."},{"type":"mcq","q":"Which EM waves are ionising and can damage DNA?","options":[{"t":"X-rays and gamma rays","correct":true},{"t":"Radio waves and microwaves","why":"These are low-frequency and non-ionising."},{"t":"Visible light","why":"Visible light is not ionising."}],"ok":"High-frequency X-rays and gamma rays are ionising."},{"type":"mcq","q":"Which surface is the best emitter and absorber of infrared radiation?","options":[{"t":"A black, matt surface","correct":true},{"t":"A shiny, white surface","why":"Shiny white surfaces are poor emitters and absorbers."},{"t":"A clear glass surface","why":"Black matt surfaces emit and absorb infrared best."}],"ok":"Black, matt surfaces are the best emitters and absorbers of infrared."},{"type":"mcq","q":"What equipment is used to compare infrared emitted by different surfaces?","options":[{"t":"A Leslie cube","correct":true},{"t":"A ripple tank","why":"A ripple tank is for water waves."},{"t":"A Geiger-Muller tube","why":"That detects nuclear radiation, not infrared."}],"ok":"A Leslie cube has differently coloured faces to compare infrared emission."},{"type":"multi","q":"Tap the dangers of high-frequency electromagnetic waves.","items":[{"t":"UV can cause skin cancer","correct":true},{"t":"X-rays can damage cells","correct":true},{"t":"Gamma rays can damage DNA","correct":true},{"t":"Radio waves cook your internal organs"}],"ok":"UV, X-rays and gamma can damage cells and DNA.","bad":"Radio waves are low-energy and non-ionising; they do not cook organs."},{"type":"tf","q":"Radio waves are more dangerous than gamma rays.","answer":false,"why":"Radio waves are low-energy and non-ionising; gamma rays are ionising and far more dangerous."}]},
"GW-EX":{"code":"GW-EX","title":"Waves — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Waves: the wave equation, the EM spectrum and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A sound wave has a frequency of 170 Hz and a wavelength of 2 m. Calculate its speed.","hint":"wave speed = frequency x wavelength","answer":340,"unit":"m/s","ok":"170 x 2 = 340 m/s."},{"type":"numeric","kicker":"Exam · calculate","q":"A radio wave travels at 300 000 000 m/s with a frequency of 100 000 000 Hz. Calculate its wavelength.","hint":"wavelength = wave speed / frequency","answer":3,"unit":"m","ok":"300 000 000 / 100 000 000 = 3 m."},{"type":"mcq","q":"Which lists the EM spectrum in order of increasing frequency?","options":[{"t":"Radio, microwave, infrared, visible, ultraviolet, X-ray, gamma","correct":true},{"t":"Gamma, X-ray, ultraviolet, visible, infrared, microwave, radio","why":"That is decreasing frequency."},{"t":"Visible, radio, gamma, infrared, X-ray, microwave, ultraviolet","why":"That order is jumbled."}],"ok":"Frequency increases from radio up to gamma rays."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe how you could use a Leslie cube to investigate how the amount of infrared radiation emitted by a surface depends on the surface. Include the variables you would control.","scheme":["Fill the Leslie cube with hot water at a set temperature (1)","The cube has faces of different colours/textures, e.g. matt black, shiny silver (1)","Use an infrared detector the same distance from each face (1)","Measure the infrared detected from each face (1)","Control variables: same water temperature, same distance, same detector (1)","Matt black emits the most infrared; shiny surfaces emit the least (1)"],"model":"Fill a Leslie cube with hot water. Hold an infrared detector the same distance from each face and record the reading for each surface. Keep the water temperature, distance and detector the same. The matt black face emits the most infrared and the shiny face the least."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Microwaves and gamma rays are both electromagnetic waves. Compare a use and a danger of each.","scheme":["Microwaves used for cooking or satellite/communication signals (1)","Microwaves can heat body tissue / internal heating (1)","Gamma rays used in medicine, e.g. treating cancer or sterilising equipment (1)","Gamma rays are ionising and can damage cells/DNA and cause cancer (1)"],"model":"Microwaves are used for cooking and satellite communication; a danger is internal heating of body tissue. Gamma rays are used to treat cancer and sterilise equipment; a danger is that they are ionising and can damage cells and DNA."}]},
"GM1":{"code":"GM1","title":"Magnets & magnetic fields","discipline":"physics","blurb":"Permanent and induced magnets, poles, magnetic fields and the Earth's field.","vocab":[{"term":"permanent magnet","definition":"a magnet that produces its own magnetic field all the time","say":"per-man-ent magnet"},{"term":"induced magnet","definition":"a material that becomes magnetic only when placed in a magnetic field","say":"in-dewsd magnet"},{"term":"magnetic field","definition":"the region around a magnet where it exerts a force, running from north to south","say":"mag-net-ic feeld"},{"term":"magnetic field line","definition":"a line showing the direction a north pole would feel a force; closer lines mean a stronger field","say":"feeld line"}],"facts":["There are two magnetic poles, north and south. Like poles repel and unlike poles attract, acting through a magnetic field as a non-contact force.","A permanent magnet makes its own field all the time; an induced magnet only becomes magnetic in a field, and the induced pole always causes attraction.","Magnetic field lines run from a magnet's north pole to its south pole; the closer the lines, the stronger the field, which is strongest at the poles.","The magnetic materials are iron, steel, nickel and cobalt; a plotting compass shows field direction because its needle is a tiny magnet.","The Earth behaves as if it has a giant bar magnet inside it, which is why a compass needle points roughly north."],"misconceptions":[{"wrong":"All metals are magnetic.","right":"Only iron, steel, nickel and cobalt are magnetic; metals like copper and aluminium are not."},{"wrong":"A permanent magnet and an induced magnet are the same.","right":"A permanent magnet is always magnetic; an induced magnet is only magnetic while it sits in a field."}],"questions":[{"type":"mcq","q":"What happens when the north poles of two magnets are brought together?","options":[{"t":"They repel","correct":true},{"t":"They attract","why":"Like poles repel; only unlike poles attract."},{"t":"Nothing happens","why":"There is a force between the poles."}],"ok":"Like poles repel; unlike poles attract."},{"type":"tf","q":"Magnetism is a non-contact force.","answer":true,"why":"Magnets attract or repel through a field without touching."},{"type":"mcq","q":"What is an induced magnet?","options":[{"t":"A material that is only magnetic while it is in a magnetic field","correct":true},{"t":"A magnet that makes its own field all the time","why":"That is a permanent magnet."},{"t":"A magnet made of copper","why":"Copper is not magnetic."}],"ok":"An induced magnet is only magnetic while it sits inside a field."},{"type":"multi","q":"Tap all the magnetic materials.","items":[{"t":"Iron","correct":true},{"t":"Steel","correct":true},{"t":"Nickel","correct":true},{"t":"Cobalt","correct":true},{"t":"Copper"}],"ok":"Iron, steel, nickel and cobalt are magnetic.","bad":"Copper and aluminium are not magnetic materials."},{"type":"mcq","q":"Which way do magnetic field lines point?","options":[{"t":"From north to south","correct":true},{"t":"From south to north","why":"The convention is north to south outside the magnet."},{"t":"In random directions","why":"Field lines have a definite direction, north to south."}],"ok":"Field lines run from north to south; closer lines mean a stronger field."},{"type":"mcq","q":"Where is a bar magnet's field strongest?","options":[{"t":"At the poles, where the field lines are closest","correct":true},{"t":"In the middle of the magnet","why":"The field lines are furthest apart there."},{"t":"Far away from the magnet","why":"The field gets weaker with distance."}],"ok":"The field is strongest at the poles."},{"type":"mcq","q":"Why does a compass needle point roughly north?","options":[{"t":"The Earth acts like a giant bar magnet","correct":true},{"t":"North is downhill","why":"Direction has nothing to do with going downhill."},{"t":"The Sun pulls the needle","why":"It is the Earth's magnetism that turns the needle."}],"ok":"Earth behaves like a huge magnet, so a compass points north."}]},
"GM2":{"code":"GM2","title":"Electromagnetism","discipline":"physics","blurb":"The magnetic field around a wire and a solenoid, and how electromagnets are used.","vocab":[{"term":"solenoid","definition":"a coil of wire that produces a strong, uniform magnetic field when a current flows","say":"so-len-oid"},{"term":"electromagnet","definition":"a solenoid with an iron core, whose magnetism can be switched on and off","say":"ee-lec-tro-magnet"}],"facts":["When a current flows through a straight wire it creates a circular magnetic field around the wire; reversing the current reverses the field direction.","Coiling the wire into a solenoid makes the field stronger and more uniform inside, like the field of a bar magnet.","Adding an iron core to a solenoid makes an electromagnet, whose magnetism can be switched on and off.","An electromagnet is made stronger by increasing the current, adding more turns to the coil, or adding an iron core.","Electromagnets are used in devices such as scrapyard cranes, electric bells and relays, where switchable magnetism is useful."],"misconceptions":[{"wrong":"A copper core makes an electromagnet stronger.","right":"Copper is not magnetic; an iron core is needed to strengthen the field."},{"wrong":"The field around a current-carrying wire is a straight line.","right":"The field forms circles around the wire."}],"questions":[{"type":"mcq","q":"What is produced around a straight wire when a current flows?","options":[{"t":"A circular magnetic field","correct":true},{"t":"A straight field along the wire","why":"The field circles the wire."},{"t":"No field at all","why":"A current always makes a magnetic field."}],"ok":"A current makes a circular magnetic field around the wire."},{"type":"mcq","q":"What happens to the field around a wire if the current is reversed?","options":[{"t":"The field direction reverses","correct":true},{"t":"The field gets stronger","why":"Reversing the current changes the direction, not the strength."},{"t":"The field disappears","why":"A current still flows, so a field is still present."}],"ok":"Reversing the current reverses the field direction."},{"type":"mcq","q":"What does coiling a wire into a solenoid do to the field inside?","options":[{"t":"Makes it stronger and more uniform","correct":true},{"t":"Cancels it out","why":"The coils add together to strengthen the field."},{"t":"Makes it point sideways","why":"The field inside a solenoid is uniform along its axis."}],"ok":"A solenoid gives a strong, uniform internal field."},{"type":"multi","q":"Tap everything that makes an electromagnet stronger.","items":[{"t":"Increasing the current","correct":true},{"t":"Adding more turns to the coil","correct":true},{"t":"Adding an iron core","correct":true},{"t":"Using a copper core instead of iron"}],"ok":"More current, more turns and an iron core all strengthen an electromagnet.","bad":"Copper is not magnetic; an iron core is needed."},{"type":"mcq","q":"What is the main advantage of an electromagnet over a permanent magnet?","options":[{"t":"It can be switched on and off","correct":true},{"t":"It never needs electricity","why":"An electromagnet needs a current."},{"t":"It is always weaker","why":"Electromagnets can be very strong."}],"ok":"An electromagnet can be switched on and off and its strength varied."},{"type":"mcq","q":"Which device uses an electromagnet?","options":[{"t":"A scrapyard crane that picks up and drops cars","correct":true},{"t":"A glass window","why":"A window has no electromagnet."},{"t":"A wooden ruler","why":"A ruler has no electromagnet."}],"ok":"A scrapyard crane uses a switchable electromagnet to pick up and drop metal."},{"type":"tf","q":"Coiling a wire into a solenoid produces a field like that of a bar magnet.","answer":true,"why":"A solenoid has a north and south end and a uniform internal field, like a bar magnet."}]},
"GM3":{"code":"GM3","title":"The motor effect","discipline":"physics","blurb":"The force on a current-carrying wire in a field, Fleming's left-hand rule and the d.c. motor.","vocab":[{"term":"motor effect","definition":"the force on a current-carrying wire placed in a magnetic field","say":"mo-tor eff-ect"},{"term":"magnetic flux density","definition":"the strength of a magnetic field, measured in tesla","say":"fluks den-sit-ee"},{"term":"Fleming's left-hand rule","definition":"a hand rule giving the direction of the force in the motor effect","say":"flem-ings left hand rule"}],"facts":["The motor effect is the force on a current-carrying wire placed in a magnetic field.","The force is greatest when the wire is at 90 degrees to the field and zero when the wire is parallel to it; it reverses if the current or the field is reversed.","Higher tier: for a wire at right angles to the field, force = magnetic flux density x current x length (F = B I L).","Higher tier: Fleming's left-hand rule gives the direction — thumb for force, first finger for field, second finger for current.","Higher tier: a simple d.c. motor uses the motor effect; forces act in opposite directions on the two sides of a current-carrying coil, making it spin, and a split-ring commutator swaps the current each half-turn to keep it turning the same way."],"misconceptions":[{"wrong":"The motor effect force is biggest when the wire is parallel to the field.","right":"The force is greatest at 90 degrees to the field and zero when the wire is parallel to it."},{"wrong":"The commutator generates the voltage for the motor.","right":"The commutator reverses the current each half-turn; it does not generate voltage."}],"questions":[{"type":"mcq","q":"What is the motor effect?","options":[{"t":"The force on a current-carrying wire in a magnetic field","correct":true},{"t":"A wire heating up when current flows","why":"That is the heating effect."},{"t":"A magnet losing its magnetism","why":"That is not the motor effect."}],"ok":"The motor effect is the force on a current-carrying wire in a field."},{"type":"mcq","q":"When is the force on a current-carrying wire greatest?","options":[{"t":"When the wire is at 90 degrees to the field","correct":true},{"t":"When the wire is parallel to the field","why":"The force is zero when parallel."},{"t":"When there is no current","why":"No current means no force."}],"ok":"The force is greatest at 90 degrees to the field, zero when parallel."},{"type":"mcq","q":"What happens to the force if the current is reversed?","options":[{"t":"The force reverses direction","correct":true},{"t":"The force gets bigger","why":"Reversing the current reverses the direction, not the size."},{"t":"The force disappears","why":"A current still flows, so there is still a force."}],"ok":"Reversing the current (or the field) reverses the direction of the force."},{"type":"numeric","kicker":"Higher tier","q":"Higher tier: a 0.4 m wire carries 5 A at right angles to a 0.3 T field. What is the force on it? (F = B x I x L)","hint":"force = magnetic flux density x current x length","answer":0.6,"unit":"N","ok":"0.3 x 5 x 0.4 = 0.6 N."},{"type":"mcq","q":"Higher tier: in Fleming's left-hand rule, what does the thumb represent?","options":[{"t":"The direction of the force (motion)","correct":true},{"t":"The direction of the field","why":"That is the first finger."},{"t":"The direction of the current","why":"That is the second finger."}],"ok":"Thumb = force, First finger = Field, seCond finger = Current."},{"type":"mcq","q":"Higher tier: what does the split-ring commutator do in a d.c. motor?","options":[{"t":"Reverses the current in the coil every half-turn so it keeps spinning one way","correct":true},{"t":"Supplies extra voltage","why":"The commutator does not generate voltage."},{"t":"Stops the coil turning","why":"It keeps the coil turning continuously."}],"ok":"The commutator swaps the current each half-turn to keep the motor rotating one way."},{"type":"tf","q":"Higher tier: the motor effect force can be increased by using a stronger magnetic field or a larger current.","answer":true,"why":"F = BIL, so a stronger field or larger current gives a larger force."}]},
"GM-EX":{"code":"GM-EX","title":"Magnetism — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Magnetism: the motor effect calculation and extended answers.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"Higher tier: a 0.25 m length of wire carries 8 A at right angles to a 0.5 T magnetic field. Calculate the force on the wire.","hint":"force = magnetic flux density x current x length","answer":1,"unit":"N","ok":"0.5 x 8 x 0.25 = 1 N."},{"type":"mcq","q":"A current-carrying wire lies parallel to a magnetic field. What force does it feel?","options":[{"t":"No force (the force is zero)","correct":true},{"t":"The maximum force","why":"The maximum force is when the wire is at 90 degrees to the field."},{"t":"A force along the wire","why":"The motor-effect force is zero when the wire is parallel to the field."}],"ok":"The force is zero when the wire is parallel to the field."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe three ways to make an electromagnet stronger, and explain why an iron core is used rather than a copper one.","scheme":["Increase the current through the coil (1)","Increase the number of turns on the coil (1)","Add an iron core (1)","Iron is magnetic so it strengthens the field, whereas copper is not magnetic (1)"],"model":"Increase the current, add more turns to the coil, and add an iron core. Iron is used because it is a magnetic material that strengthens the field; copper is not magnetic, so it would not help."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how a simple d.c. motor uses the motor effect to turn. (Higher tier)","scheme":["A current flows through a coil placed in a magnetic field (1)","Each side of the coil carries current at 90 degrees to the field (1)","so each side experiences a force (the motor effect) (1)","The forces on the two sides act in opposite directions (1)","creating a turning effect that rotates the coil (1)","A split-ring commutator reverses the current every half-turn so the coil keeps turning the same way (1)"],"model":"Current flows through a coil in a magnetic field. Each side of the coil feels a motor-effect force, and because the current flows in opposite directions on the two sides, the forces are opposite, creating a turning effect. A split-ring commutator reverses the current every half-turn so the coil keeps spinning in the same direction."}]},
"GS1":{"code":"GS1","title":"The solar system & orbits","discipline":"physics","blurb":"The solar system, natural and artificial satellites, and how gravity keeps things in orbit.","vocab":[{"term":"solar system","definition":"the Sun and everything orbiting it: planets, dwarf planets, moons and other objects","say":"so-lar system"},{"term":"satellite","definition":"an object that orbits a larger one; natural like a moon, or artificial like a GPS satellite","say":"sat-el-ite"},{"term":"orbit","definition":"the path one object takes around another in space","say":"or-bit"}],"facts":["Our solar system is the Sun, a star, plus the eight planets, dwarf planets such as Pluto, and the moons that orbit the planets.","A natural satellite is a moon orbiting a planet; an artificial satellite is one we launch, for example for communications, weather or GPS.","Gravity provides the force that keeps a satellite moving in its orbit.","For a stable orbit at a given radius, there is one particular speed; a smaller orbit radius needs a faster orbital speed.","Planets orbit the Sun, while moons orbit planets, all held by gravity."],"misconceptions":[{"wrong":"There is no gravity in space, so orbits just happen.","right":"Gravity acts across space and provides the force that keeps satellites in orbit."},{"wrong":"All satellites are built by people.","right":"A moon is a natural satellite; only the ones we launch are artificial."}],"questions":[{"type":"mcq","q":"What is at the centre of our solar system?","options":[{"t":"The Sun, a star","correct":true},{"t":"The Earth","why":"The planets, including Earth, orbit the Sun."},{"t":"A black hole","why":"The Sun, an ordinary star, is at the centre."}],"ok":"The Sun, a star, is at the centre of the solar system."},{"type":"categorise","q":"Sort each as a natural or an artificial satellite.","bins":["Natural satellite","Artificial satellite"],"items":[{"t":"The Moon","bin":"Natural satellite"},{"t":"A GPS satellite","bin":"Artificial satellite"},{"t":"A weather satellite","bin":"Artificial satellite"},{"t":"A planet's moon","bin":"Natural satellite"}],"ok":"Moons are natural; the ones we launch are artificial.","bad":"If people built and launched it, it is an artificial satellite."},{"type":"mcq","q":"What provides the force that keeps a satellite in orbit?","options":[{"t":"Gravity","correct":true},{"t":"Friction","why":"There is almost no friction in space."},{"t":"Magnetism","why":"It is gravity that holds an orbit."}],"ok":"Gravity provides the force that keeps a satellite in a stable orbit."},{"type":"mcq","q":"For a stable circular orbit, how does a smaller radius affect the speed needed?","options":[{"t":"A smaller radius needs a faster speed","correct":true},{"t":"A smaller radius needs a slower speed","why":"Closer orbits move faster."},{"t":"Speed does not matter","why":"Each orbit radius requires a particular speed."}],"ok":"Closer orbits require faster orbital speeds."},{"type":"mcq","q":"What do moons orbit?","options":[{"t":"Planets","correct":true},{"t":"The Sun directly","why":"Moons orbit planets; the planets orbit the Sun."},{"t":"Galaxies","why":"Moons orbit individual planets."}],"ok":"Moons are natural satellites that orbit planets."},{"type":"tf","q":"There is no gravity in space.","answer":false,"why":"Gravity acts across space; it is the force that keeps satellites and planets in orbit."},{"type":"order","q":"Order these from smallest to largest in scale.","items":["Moon","Planet","Star","Galaxy"],"ok":"A moon orbits a planet, a star is far bigger, and a galaxy holds billions of stars."}]},
"GS2":{"code":"GS2","title":"The life cycle of stars","discipline":"physics","blurb":"How stars form, the stable main sequence, and how stars like the Sun and bigger ones die.","vocab":[{"term":"protostar","definition":"a cloud of dust and gas pulled together by gravity, before fusion starts","say":"pro-toe-star"},{"term":"main sequence","definition":"the long, stable stage where fusion of hydrogen balances gravity","say":"mayn see-kwence"},{"term":"supernova","definition":"the huge explosion of a massive star at the end of its life","say":"soo-per-no-va"},{"term":"black hole","definition":"the remnant of the most massive stars, so dense not even light escapes","say":"black hole"}],"facts":["A star forms when gravity pulls a cloud of dust and gas (a nebula) together into a protostar; when it is hot and dense enough, hydrogen nuclei fuse and the star shines.","During the long, stable main-sequence stage, the outward pressure from fusion balances the inward pull of gravity, so the star's size stays steady.","A star like the Sun later swells into a red giant, then leaves a white dwarf that slowly cools.","A star much more massive than the Sun becomes a red supergiant, then explodes as a supernova, leaving a neutron star or, for the most massive, a black hole.","Fusion in stars makes elements up to iron; elements heavier than iron are made in supernova explosions, which scatter them into space."],"misconceptions":[{"wrong":"Every star, including the Sun, ends in a supernova.","right":"Only very massive stars end in a supernova; the Sun will become a red giant then a white dwarf."},{"wrong":"A star stays the same size because nothing pushes on it.","right":"On the main sequence the outward fusion pressure balances gravity pulling inwards."}],"questions":[{"type":"order","q":"Put the early stages of a star forming in order.","items":["A cloud of dust and gas (nebula)","Gravity pulls it into a protostar","Hydrogen nuclei begin to fuse","A stable main-sequence star shines"],"ok":"Gravity gathers a nebula into a protostar, fusion begins, then a main-sequence star shines."},{"type":"order","q":"Order the life cycle of a star like the Sun.","items":["Main sequence","Red giant","White dwarf","Black dwarf"],"ok":"A Sun-sized star: main sequence, red giant, white dwarf, then it cools to a black dwarf."},{"type":"mcq","q":"What keeps a main-sequence star a stable size?","options":[{"t":"Outward pressure from fusion balances gravity pulling inwards","correct":true},{"t":"There are no forces acting on it","why":"Two large forces act and balance."},{"t":"Gravity pushes outwards","why":"Gravity pulls inwards; fusion pushes outwards."}],"ok":"Fusion pressure out balances gravity in, so the size stays steady."},{"type":"mcq","q":"How does a star much more massive than the Sun end its life?","options":[{"t":"It explodes as a supernova, leaving a neutron star or black hole","correct":true},{"t":"It becomes a white dwarf only","why":"That is the fate of a Sun-sized star."},{"t":"It turns into a planet","why":"Massive stars end in a supernova, not as a planet."}],"ok":"Massive stars: supergiant, supernova, then neutron star or black hole."},{"type":"mcq","q":"Where are elements heavier than iron made?","options":[{"t":"In supernova explosions","correct":true},{"t":"Only inside small planets","why":"Planets do not fuse elements."},{"t":"In empty space","why":"Empty space cannot fuse new elements."}],"ok":"Fusion makes elements up to iron; heavier ones form in supernovae."},{"type":"mcq","q":"What process makes a star shine?","options":[{"t":"Nuclear fusion of hydrogen nuclei","correct":true},{"t":"Burning oxygen like a fire","why":"Stars shine by fusion, not chemical burning."},{"t":"Friction between gas clouds","why":"Friction does not power a star."}],"ok":"Stars shine because of nuclear fusion in their cores."},{"type":"multi","q":"Tap the possible remnants left after a star dies.","items":[{"t":"White dwarf","correct":true},{"t":"Neutron star","correct":true},{"t":"Black hole","correct":true},{"t":"A brand-new protostar from nothing"}],"ok":"Stars leave white dwarfs, neutron stars or black holes.","bad":"A protostar is the start of a star's life, not a remnant of its death."}]},
"GS3":{"code":"GS3","title":"Red-shift & the Big Bang","discipline":"physics","blurb":"Red-shift, the expanding universe and the evidence for the Big Bang.","vocab":[{"term":"red-shift","definition":"the shift of light from distant galaxies towards the red, longer-wavelength end","say":"red shift"},{"term":"Big Bang","definition":"the theory that the universe began from a tiny, hot, dense point and has expanded ever since","say":"big bang"}],"facts":["Light from distant galaxies is red-shifted: its wavelength is stretched towards the red end of the spectrum.","The further away a galaxy is, the greater its red-shift, which means it is moving away faster.","Red-shift is evidence that the whole universe is expanding.","The Big Bang theory states the universe began from a tiny, hot, dense point and has been expanding ever since.","There is still much we do not know, for example about dark matter and dark energy."],"misconceptions":[{"wrong":"Red-shift means galaxies are getting hotter or turning red.","right":"Red-shift means the light's wavelength is stretched because the galaxy is moving away."},{"wrong":"The universe has always been the same size.","right":"Red-shift shows the universe is expanding, which supports the Big Bang theory."}],"questions":[{"type":"mcq","q":"What is observed in the light from distant galaxies?","options":[{"t":"It is red-shifted to longer wavelengths","correct":true},{"t":"It is blue-shifted to shorter wavelengths","why":"Blue-shift would mean moving towards us."},{"t":"It shows no shift at all","why":"Distant galaxies clearly show a red-shift."}],"ok":"Light from distant galaxies is red-shifted to longer wavelengths."},{"type":"tf","q":"Red-shift is evidence that the universe is expanding.","answer":true,"why":"Distant galaxies are moving away, faster the further they are, which fits an expanding universe."},{"type":"mcq","q":"How does a galaxy's distance relate to its red-shift?","options":[{"t":"The further away, the greater the red-shift","correct":true},{"t":"All galaxies have the same red-shift","why":"Red-shift varies with distance."},{"t":"Closer galaxies have the most red-shift","why":"The most distant galaxies show the most red-shift."}],"ok":"More distant galaxies show a greater red-shift and move away faster."},{"type":"mcq","q":"What does the Big Bang theory state?","options":[{"t":"The universe began from a tiny, hot, dense point and has expanded ever since","correct":true},{"t":"The universe has always been the same size","why":"The universe is expanding."},{"t":"The Earth formed before the Sun","why":"That is not what the Big Bang theory is about."}],"ok":"The universe started tiny, hot and dense, and has expanded ever since."},{"type":"tf","q":"Every star, including the Sun, will eventually explode as a supernova.","answer":false,"why":"Only very massive stars end in a supernova; the Sun will become a red giant then a white dwarf."},{"type":"mcq","q":"Which of these is still not fully understood by scientists?","options":[{"t":"Dark matter and dark energy","correct":true},{"t":"That the Sun is a star","why":"We are confident the Sun is a star."},{"t":"That the Earth orbits the Sun","why":"This is well understood."}],"ok":"Dark matter and dark energy are areas scientists are still investigating."},{"type":"mcq","q":"Why does a red-shifted galaxy appear to have light stretched to longer wavelengths?","options":[{"t":"It is moving away from us","correct":true},{"t":"It is moving towards us","why":"Moving towards us would cause a blue-shift."},{"t":"It has stopped giving out light","why":"A red-shifted galaxy still gives out light; the wavelength is stretched."}],"ok":"Movement away stretches the light's wavelength, giving a red-shift."}]},
"GS-EX":{"code":"GS-EX","title":"Space — Exam practice","discipline":"physics","blurb":"Mixed exam-style questions for Space: orbits, star life cycles and the Big Bang.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A satellite moves to a lower orbit closer to the Earth. What must happen to its speed to stay in a stable orbit?","options":[{"t":"It must move faster","correct":true},{"t":"It must move slower","why":"A smaller orbit requires a faster speed."},{"t":"Its speed does not change","why":"Each orbit radius needs a particular speed."}],"ok":"A smaller orbit radius needs a faster orbital speed."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe the life cycle of a star about the same size as the Sun, from its formation to the end of its life.","scheme":["A cloud of dust and gas (nebula) is pulled together by gravity (1)","forming a protostar; when hot/dense enough, hydrogen fuses (1)","It becomes a stable main-sequence star (fusion balances gravity) (1)","When the hydrogen runs low it swells into a red giant (1)","It then sheds its outer layers and leaves a white dwarf (1)","The white dwarf slowly cools to a black dwarf (1)"],"model":"Gravity pulls a nebula into a protostar; once hot and dense enough, hydrogen fuses and it becomes a stable main-sequence star, with fusion balancing gravity. As the hydrogen runs low it swells into a red giant, then sheds its outer layers to leave a white dwarf, which slowly cools to a black dwarf."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how red-shift provides evidence for the Big Bang theory.","scheme":["Light from distant galaxies is red-shifted (1)","its wavelength is stretched / shifted towards the red end (1)","This shows the galaxies are moving away from us (1)","The further away a galaxy, the greater its red-shift, so it moves away faster (1)","This shows the universe is expanding (1)","which supports the idea that it began from a tiny hot dense point (the Big Bang) (1)"],"model":"Light from distant galaxies is red-shifted, meaning its wavelength is stretched, which shows the galaxies are moving away. More distant galaxies have greater red-shifts, so they move away faster — the universe is expanding. Tracing this expansion backwards supports the Big Bang, where the universe began from a tiny, hot, dense point."}]}

Object.assign(CONTENT, {"GCA1":{"code":"GCA1","title":"Atoms, elements, compounds & mixtures","discipline":"chemistry","blurb":"Elements, compounds and mixtures, and the methods used to separate mixtures.","vocab":[{"term":"element","definition":"a substance made of only one type of atom","say":"el-e-ment"},{"term":"compound","definition":"two or more elements chemically bonded together","say":"com-pound"},{"term":"mixture","definition":"substances mixed together but not chemically joined","say":"mix-ture"},{"term":"filtration","definition":"separating an insoluble solid from a liquid using filter paper","say":"fil-tray-shun"},{"term":"crystallisation","definition":"getting a soluble solid from solution by evaporating the solvent","say":"cris-tal-eye-zay-shun"},{"term":"chromatography","definition":"separating substances by how far they travel with a solvent","say":"crow-ma-tog-ra-fee"}],"facts":["An element is made of only one type of atom; there are about 100 elements in the periodic table.","A compound is two or more elements chemically bonded together; a mixture is substances that are not chemically joined.","A compound can only be separated by a chemical reaction, but a mixture can be separated by physical methods.","Filtration separates an insoluble solid from a liquid; crystallisation gets a soluble solid back from a solution by evaporating the solvent.","Distillation separates a liquid from a solution (simple) or separates liquids by their boiling points (fractional).","Chromatography separates substances in a mixture by how far they travel up the paper with the solvent."],"misconceptions":[{"wrong":"A mixture and a compound are the same thing.","right":"A compound is chemically bonded and needs a reaction to separate; a mixture is not bonded and separates physically."},{"wrong":"Air is a compound.","right":"Air is a mixture of gases that are not chemically joined."}],"questions":[{"type":"mcq","q":"What is an element?","options":[{"t":"A substance made of only one type of atom","correct":true},{"t":"Two elements bonded together","why":"That is a compound."},{"t":"Several substances mixed but not bonded","why":"That is a mixture."}],"ok":"An element contains only one type of atom."},{"type":"mcq","q":"How is a compound different from a mixture?","options":[{"t":"A compound is chemically bonded; a mixture is not","correct":true},{"t":"A compound is always a gas","why":"Compounds can be solids, liquids or gases."},{"t":"A mixture always contains a metal","why":"Mixtures need not contain a metal."}],"ok":"Compounds are chemically bonded and need a reaction to separate; mixtures do not."},{"type":"categorise","q":"Match each separation method to what it separates.","bins":["Insoluble solid from liquid","Soluble solid from solution","Coloured substances in a mixture"],"items":[{"t":"Filtration","bin":"Insoluble solid from liquid"},{"t":"Crystallisation","bin":"Soluble solid from solution"},{"t":"Chromatography","bin":"Coloured substances in a mixture"}],"ok":"Each method exploits a different physical property.","bad":"Filtration: insoluble solid. Crystallisation: dissolved solid. Chromatography: coloured mixtures."},{"type":"mcq","q":"Which method separates a soluble salt from its solution?","options":[{"t":"Crystallisation","correct":true},{"t":"Filtration","why":"Filtration only removes insoluble solids."},{"t":"Chromatography","why":"Chromatography separates coloured substances, not a salt from water."}],"ok":"Crystallisation evaporates the solvent to leave the soluble solid behind."},{"type":"mcq","q":"Which separates a liquid from a dissolved solid (e.g. getting pure water from salty water)?","options":[{"t":"Distillation","correct":true},{"t":"Filtration","why":"Filtration cannot remove a dissolved solid."},{"t":"Chromatography","why":"Chromatography does not collect a pure liquid."}],"ok":"Distillation evaporates and condenses the liquid, leaving the dissolved solid behind."},{"type":"tf","q":"A compound can be separated into its elements using physical methods alone.","answer":false,"why":"A compound is chemically bonded, so it needs a chemical reaction to separate it."},{"type":"mcq","q":"Why is sea water described as a mixture?","options":[{"t":"The salt and water are not chemically bonded","correct":true},{"t":"Salt and water are the same element","why":"They are different substances."},{"t":"It can only be separated by a reaction","why":"A mixture separates by physical methods, like distillation."}],"ok":"In a mixture the substances are not chemically joined."}]},"GCA2":{"code":"GCA2","title":"Atomic structure & isotopes","discipline":"chemistry","blurb":"Subatomic particles, atomic and mass number, isotopes and electronic structure.","vocab":[{"term":"proton","definition":"a positive subatomic particle in the nucleus","say":"pro-ton"},{"term":"neutron","definition":"a neutral subatomic particle in the nucleus","say":"new-tron"},{"term":"electron","definition":"a negative subatomic particle that orbits in shells","say":"ee-lec-tron"},{"term":"isotope","definition":"atoms of the same element with different numbers of neutrons","say":"eye-so-tope"},{"term":"electronic structure","definition":"how the electrons are arranged in shells, e.g. 2,8,1","say":"ee-lec-tron-ic structure"}],"facts":["An atom has a tiny central nucleus of protons and neutrons, with electrons arranged in shells around it; the radius of an atom is about 1 x 10 to the minus 10 metres.","Relative charges: a proton is +1, a neutron is 0 and an electron is -1. A proton and a neutron each have a relative mass of 1; an electron is almost nothing (about 1/1835).","The atomic number is the number of protons; in a neutral atom this equals the number of electrons. The mass number is the number of protons plus neutrons.","Isotopes are atoms of the same element with the same number of protons but different numbers of neutrons.","Electrons fill shells from the inside out: the first shell holds up to 2 electrons, then the next shells hold up to 8, for example sodium is 2,8,1."],"misconceptions":[{"wrong":"Electrons are found in the nucleus.","right":"The nucleus holds protons and neutrons; electrons orbit it in shells."},{"wrong":"Isotopes are different elements.","right":"Isotopes are the same element (same protons); they differ only in the number of neutrons."}],"questions":[{"type":"mcq","q":"Where in the atom are the protons and neutrons found?","options":[{"t":"In the nucleus","correct":true},{"t":"In the electron shells","why":"Electrons are in the shells; protons and neutrons are in the nucleus."},{"t":"Spread evenly through the atom","why":"They are concentrated in the central nucleus."}],"ok":"Protons and neutrons are found in the nucleus."},{"type":"mcq","q":"What is the relative charge of an electron?","options":[{"t":"-1","correct":true},{"t":"+1","why":"That is the charge of a proton."},{"t":"0","why":"That is the charge of a neutron."}],"ok":"An electron has a relative charge of -1."},{"type":"numeric","kicker":"Work it out","q":"An atom has an atomic number of 17 and a mass number of 35. How many neutrons does it have?","hint":"neutrons = mass number minus atomic number","answer":18,"unit":"neutrons","ok":"35 - 17 = 18 neutrons."},{"type":"mcq","q":"What do two isotopes of an element have in common?","options":[{"t":"The same number of protons","correct":true},{"t":"The same number of neutrons","why":"That is what differs between isotopes."},{"t":"The same mass number","why":"Different neutron numbers give different mass numbers."}],"ok":"Isotopes have the same number of protons but different neutrons."},{"type":"mcq","q":"How many electrons can the first shell of an atom hold?","options":[{"t":"2","correct":true},{"t":"8","why":"The first shell holds 2; later shells hold up to 8."},{"t":"18","why":"The first shell only holds 2 electrons."}],"ok":"The first electron shell holds a maximum of 2 electrons."},{"type":"numeric","kicker":"Work it out","q":"A neutral atom has 12 protons. How many electrons does it have?","hint":"In a neutral atom, electrons = protons","answer":12,"unit":"electrons","ok":"A neutral atom has equal protons and electrons, so 12."},{"type":"mcq","q":"What is the electronic structure of a sodium atom (11 electrons)?","options":[{"t":"2,8,1","correct":true},{"t":"8,2,1","why":"Shells fill from the inside out: 2 then 8 then 1."},{"t":"2,9","why":"The second shell only holds up to 8 electrons."}],"ok":"Sodium fills 2, then 8, leaving 1 in the third shell: 2,8,1."}]},"GCA3":{"code":"GCA3","title":"The periodic table","discipline":"chemistry","blurb":"How the table is arranged, groups and periods, and the trends in Groups 1, 7 and 0.","vocab":[{"term":"group","definition":"a column of the periodic table; elements share similar properties","say":"groop"},{"term":"period","definition":"a row of the periodic table","say":"peer-ee-od"},{"term":"alkali metal","definition":"a Group 1 metal that reacts vigorously with water","say":"al-ka-lye metal"},{"term":"halogen","definition":"a Group 7 non-metal that forms salts","say":"hal-o-jen"},{"term":"noble gas","definition":"a Group 0 element with a full outer shell, very unreactive","say":"no-bul gas"}],"facts":["The elements are arranged in order of increasing atomic number. Mendeleev arranged earlier versions by properties and left gaps for undiscovered elements.","Groups are the columns; elements in a group have the same number of outer electrons and similar properties. Periods are the rows.","Metals are on the left and centre; non-metals are on the right.","Group 1 (alkali metals) react with water to form hydrogen and an alkali, and get more reactive down the group. Higher tier: the outer electron is further from the nucleus, so it is lost more easily.","Group 7 (halogens) get less reactive down the group, and a more reactive halogen displaces a less reactive one. Group 0 (noble gases) have full outer shells, so they are unreactive."],"misconceptions":[{"wrong":"Group 1 metals get less reactive down the group.","right":"Group 1 metals get MORE reactive down the group, because the outer electron is lost more easily."},{"wrong":"Noble gases are unreactive because they have no electrons.","right":"Noble gases are unreactive because they have a full (stable) outer shell of electrons."}],"questions":[{"type":"mcq","q":"How are the elements ordered in the modern periodic table?","options":[{"t":"By increasing atomic number","correct":true},{"t":"By increasing mass only","why":"The modern table is ordered by atomic number, not just mass."},{"t":"Alphabetically","why":"Elements are not arranged alphabetically."}],"ok":"Elements are arranged in order of increasing atomic number."},{"type":"mcq","q":"What do elements in the same group have in common?","options":[{"t":"The same number of electrons in their outer shell","correct":true},{"t":"The same number of protons","why":"Different elements have different proton numbers."},{"t":"The same mass number","why":"Group members have different masses."}],"ok":"Same outer-shell electrons gives a group its similar properties."},{"type":"mcq","q":"What happens to the reactivity of Group 1 metals down the group?","options":[{"t":"It increases","correct":true},{"t":"It decreases","why":"Group 1 reactivity increases down the group."},{"t":"It stays the same","why":"Reactivity changes down the group."}],"ok":"Group 1 metals get more reactive down the group."},{"type":"mcq","q":"What happens to the reactivity of Group 7 halogens down the group?","options":[{"t":"It decreases","correct":true},{"t":"It increases","why":"Halogen reactivity decreases down the group."},{"t":"It stays the same","why":"Reactivity changes down the group."}],"ok":"Halogens get less reactive down the group."},{"type":"mcq","q":"Why are the Group 0 noble gases unreactive?","options":[{"t":"They have a full, stable outer shell of electrons","correct":true},{"t":"They have no protons","why":"They do have protons; it is the full outer shell that matters."},{"t":"They are all metals","why":"Noble gases are non-metals."}],"ok":"A full outer shell makes the noble gases very unreactive."},{"type":"mcq","q":"Why did Mendeleev leave gaps in his early periodic table?","options":[{"t":"For elements that had not yet been discovered","correct":true},{"t":"Because he ran out of space","why":"The gaps were deliberate, for undiscovered elements."},{"t":"To separate metals from gases","why":"The gaps were for missing elements, predicted by their properties."}],"ok":"He left gaps for undiscovered elements and predicted their properties."},{"type":"multi","q":"Tap the properties of Group 1 alkali metals.","items":[{"t":"They react with water","correct":true},{"t":"They form an alkali and hydrogen with water","correct":true},{"t":"They get more reactive down the group","correct":true},{"t":"They are unreactive like the noble gases"}],"ok":"Alkali metals react with water and get more reactive down the group.","bad":"Alkali metals are very reactive, unlike the noble gases."}]},"GCA-EX":{"code":"GCA-EX","title":"Atomic structure — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Atomic structure and the periodic table.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"An atom of potassium has an atomic number of 19 and a mass number of 39. Calculate its number of neutrons.","hint":"neutrons = mass number minus atomic number","answer":20,"unit":"neutrons","ok":"39 - 19 = 20 neutrons."},{"type":"mcq","q":"An atom has the electronic structure 2,8,7. Which group is it in?","options":[{"t":"Group 7","correct":true},{"t":"Group 2","why":"The number of outer-shell electrons gives the group; here it is 7."},{"t":"Group 8","why":"A full outer shell of 8 would be Group 0; this has 7."}],"ok":"7 electrons in the outer shell means Group 7 (a halogen)."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain why the reactivity of the Group 1 metals increases going down the group. (Higher tier)","scheme":["Group 1 atoms have one electron in their outer shell (1)","To react, this outer electron must be lost (1)","Going down the group, atoms have more shells / are larger (1)","so the outer electron is further from the nucleus (1)","and is less strongly attracted / more easily lost (1)","so the metal is more reactive (also outer electron is shielded by inner shells) (1)"],"model":"Group 1 atoms react by losing their single outer electron. Down the group the atoms are larger, so the outer electron is further from the nucleus and shielded by more inner shells. It is therefore held less strongly and lost more easily, making the metal more reactive."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe how you could use chromatography to find out whether a food colouring is a single dye or a mixture of dyes.","scheme":["Put a spot of the colouring on a pencil baseline on chromatography paper (1)","Place the paper in a solvent (below the baseline) (1)","Allow the solvent to rise and carry the dyes up the paper (1)","A single dye gives one spot; a mixture gives two or more spots (1)"],"model":"Spot the colouring on a pencil baseline, stand the paper in solvent below the line, and let the solvent rise. A single dye produces one spot; a mixture separates into two or more spots."}]},"GCB1":{"code":"GCB1","title":"Ionic, covalent & metallic bonding","discipline":"chemistry","blurb":"How the three types of chemical bond form and hold substances together.","vocab":[{"term":"ionic bond","definition":"the strong attraction between oppositely charged ions","say":"eye-on-ic bond"},{"term":"covalent bond","definition":"a shared pair of electrons between two non-metal atoms","say":"co-vay-lent bond"},{"term":"metallic bond","definition":"the attraction between positive metal ions and delocalised electrons","say":"met-al-ic bond"},{"term":"ion","definition":"an atom that has lost or gained electrons to become charged","say":"eye-on"},{"term":"delocalised electron","definition":"an electron free to move through a metal structure","say":"dee-loh-cal-ized"}],"facts":["Ionic bonding happens between a metal and a non-metal: electrons are transferred, forming oppositely charged ions that attract strongly.","Covalent bonding happens between non-metals: atoms share pairs of electrons.","Metallic bonding is in metals: positive metal ions sit in a sea of delocalised electrons that hold them together.","Atoms form ions to gain a full outer shell: metals lose electrons to form positive ions, non-metals gain electrons to form negative ions.","Ionic, covalent and metallic bonds are all strong; this strength explains many of a substance's properties."],"misconceptions":[{"wrong":"Covalent bonds form between a metal and a non-metal.","right":"Covalent bonds form between non-metals (shared electrons); ionic bonds form between a metal and a non-metal (transferred electrons)."},{"wrong":"In ionic bonding electrons are shared.","right":"In ionic bonding electrons are transferred from the metal to the non-metal; sharing is covalent bonding."}],"questions":[{"type":"mcq","q":"Ionic bonding occurs between...","options":[{"t":"a metal and a non-metal","correct":true},{"t":"two non-metals","why":"Two non-metals bond covalently."},{"t":"two metals","why":"Two metals bond metallically."}],"ok":"Ionic bonding is between a metal and a non-metal, by transferring electrons."},{"type":"mcq","q":"What is a covalent bond?","options":[{"t":"A shared pair of electrons between two non-metals","correct":true},{"t":"A transfer of electrons from metal to non-metal","why":"That is ionic bonding."},{"t":"A sea of delocalised electrons","why":"That is metallic bonding."}],"ok":"A covalent bond is a shared pair of electrons between non-metal atoms."},{"type":"mcq","q":"What holds a metal together?","options":[{"t":"Attraction between positive ions and delocalised electrons","correct":true},{"t":"Shared pai
