"misconceptions":[{"wrong":"The air is mostly oxygen and carbon dioxide.","right":"The air is mostly nitrogen (about 78%); oxygen is about 21% and carbon dioxide only about 0.04%."},{"wrong":"The greenhouse effect is bad because it makes us too hot.","right":"The natural greenhouse effect keeps the Earth warm enough for life; the problem is the extra warming from human-made greenhouse gases."},{"wrong":"Rocks never change once they have formed.","right":"Rocks continually change into one another over millions of years in the rock cycle."},{"wrong":"The whole core of the Earth is molten liquid.","right":"Only the outer core is molten liquid iron; the inner core is solid because the pressure is so great."}],
"questions":[{"type":"order","q":"Put the Earth's layers in order from the outside inwards.","items":["Crust","Mantle","Outer core","Inner core"],"ok":"Crust, mantle, outer core then inner core."},{"type":"mcq","q":"Which layer of the Earth do we live on?","options":[{"t":"The crust","correct":true},{"t":"The mantle","why":"The mantle is the thick middle layer of semi-molten rock underneath the crust."},{"t":"The outer core","why":"The outer core is deep inside the Earth and is molten liquid iron."}],"ok":"The crust is the thin, solid outer layer of rock with soil and oceans on top."},{"type":"tf","q":"The inner core is solid even though it is extremely hot.","answer":true,"why":"The pressure is so great that the iron is squeezed together as a solid, despite the high temperature."},{"type":"mcq","q":"What is the core of the Earth made mostly of?","options":[{"t":"Iron","correct":true},{"t":"Semi-molten rock","why":"Semi-molten rock makes up the mantle, not the core."},{"t":"Tectonic plates","why":"Tectonic plates of rock make up the crust, not the core."}],"ok":"The core is mostly iron — molten in the outer core and solid in the inner core."},{"type":"categorise","q":"Sort each rock into the type it belongs to.","bins":["Igneous","Sedimentary","Metamorphic"],"items":[{"t":"Granite","bin":"Igneous"},{"t":"Basalt","bin":"Igneous"},{"t":"Sandstone","bin":"Sedimentary"},{"t":"Limestone","bin":"Sedimentary"},{"t":"Marble","bin":"Metamorphic"},{"t":"Slate","bin":"Metamorphic"}],"ok":"Granite and basalt are igneous, sandstone and limestone are sedimentary, marble and slate are metamorphic.","bad":"Rocks are grouped by how they form, not by their colour or where you found them."},{"type":"mcq","q":"How are igneous rocks formed?","options":[{"t":"Molten rock cools and hardens","correct":true},{"t":"Layers of sediment are compressed over millions of years","why":"That describes how sedimentary rocks form, not igneous rocks."},{"t":"Existing rocks are changed by heat and pressure","why":"That describes how metamorphic rocks form, not igneous rocks."}],"ok":"Igneous rocks form when hot molten rock cools at or just below the surface."},{"type":"mcq","q":"Slowly cooled rock forms large crystals (granite); rapidly cooled rock forms tiny crystals (basalt). What controls the crystal size?","options":[{"t":"How quickly the molten rock cools","correct":true},{"t":"How deep the ocean above it is","why":"Crystal size depends on cooling speed, not the depth of any ocean."},{"t":"How many fossils are trapped inside","why":"Fossils are found in sedimentary rocks, not igneous rocks."}],"ok":"Slow cooling underground gives large crystals; rapid cooling at the surface gives small crystals."},{"type":"mcq","q":"How are metamorphic rocks formed?","options":[{"t":"Existing rocks are changed by heat and pressure underground","correct":true},{"t":"Molten rock cools at the surface","why":"That forms igneous rocks, not metamorphic rocks."},{"t":"Sediment settles and is compressed in the ocean","why":"That forms sedimentary rocks, not metamorphic rocks."}],"ok":"To 'morph' means to change — heat and pressure change existing rocks over millions of years."},{"type":"order","q":"Put the steps for forming a sedimentary rock in order.","items":["Rain weathers rock into sediment","Water transports the sediment","Sediment sinks in a lake or ocean","Layers are compressed over millions of years"],"ok":"Weathering breaks rock into sediment, water carries it, it sinks, and compression makes sedimentary rock."},{"type":"tf","q":"Fossils are usually found in sedimentary rocks, not in igneous rocks.","answer":true,"why":"Dead creatures get trapped in sediment as it forms; igneous rocks form from molten rock, which destroys them."},{"type":"multi","q":"Tap all the things that are true about the rock cycle.","items":[{"t":"All three rock types can change into each other","correct":true},{"t":"The process can take millions of years","correct":true},{"t":"Rocks always follow one fixed pathway"},{"t":"The Earth's crust is completely static and never changes"}],"ok":"Any rock type can be weathered or melted and turned into another type, over millions of years.","bad":"There is no single fixed route through the rock cycle, and the crust is not static."},{"type":"numeric","q":"About what percentage of the atmosphere is nitrogen?","unit":"%","answer":78,"ok":"Nitrogen makes up about 78% of the atmosphere — the majority of the air."},{"type":"numeric","q":"About what percentage of the atmosphere is oxygen?","unit":"%","answer":21,"ok":"Oxygen makes up about 21% of the atmosphere and is essential for aerobic respiration."},{"type":"mcq","q":"Which two gases together make up about 99% of the Earth's atmosphere?","options":[{"t":"Nitrogen and oxygen","correct":true},{"t":"Oxygen and carbon dioxide","why":"Carbon dioxide is only about 0.04% of the atmosphere."},{"t":"Carbon dioxide and argon","why":"Carbon dioxide is tiny and argon only about 1%, so together they are nowhere near 99%."}],"ok":"Nitrogen (about 78%) and oxygen (about 21%) together make up roughly 99% of the air."},{"type":"categorise","q":"Match each gas to its share of the atmosphere.","bins":["About 78%","About 21%","About 0.04%"],"items":[{"t":"Nitrogen","bin":"About 78%"},{"t":"Oxygen","bin":"About 21%"},{"t":"Carbon dioxide","bin":"About 0.04%"}],"ok":"Nitrogen 78%, oxygen 21% and carbon dioxide only about 0.04%.","bad":"Carbon dioxide is a very small part of the air — much less than oxygen or nitrogen."},{"type":"mcq","q":"Which biological process removes carbon dioxide from the atmosphere?","options":[{"t":"Photosynthesis","correct":true},{"t":"Respiration","why":"Respiration releases carbon dioxide rather than removing it."},{"t":"Combustion","why":"Combustion (burning) adds carbon dioxide to the atmosphere; it does not remove it."}],"ok":"Plants take carbon dioxide out of the atmosphere during photosynthesis."},{"type":"multi","q":"Tap all the human activities that have increased carbon dioxide in the atmosphere.","items":[{"t":"Burning fossil fuels","correct":true},{"t":"Cutting down lots of trees (deforestation)","correct":true},{"t":"Planting more trees"},{"t":"Breathing out"}],"ok":"Burning fossil fuels adds carbon dioxide, and deforestation slows the rate at which it is removed.","bad":"Planting trees and normal breathing are not the human-caused changes responsible for the rise."},{"type":"mcq","q":"A student says, 'The greenhouse effect is bad because it makes us too hot.' Why are they wrong?","options":[{"t":"The greenhouse effect is natural and keeps the Earth warm enough for life","correct":true},{"t":"The greenhouse effect does not really exist","why":"The greenhouse effect is real — greenhouse gases genuinely trap heat."},{"t":"Greenhouse gases cool the Earth down","why":"Greenhouse gases warm the Earth by trapping heat, not cool it."}],"ok":"The natural greenhouse effect keeps the Earth warm enough to live on — the problem is the extra warming from human-made gases."},{"type":"tf","q":"Recycling materials usually uses less energy than making them from scratch.","answer":true,"why":"Recycling avoids extracting and processing new raw materials, which usually saves energy."}]},

"ELE":{"code":"ELE","title":"Electricity in circuits","discipline":"physics","blurb":"How circuits transfer energy, what current, potential difference and resistance mean, and how series and parallel circuits behave.",
"vocab":[{"term":"circuit","definition":"A complete loop of conductors and a power supply that transfers energy.","say":"SUR-kit"},{"term":"conductor","definition":"A material that lets electric current flow through it.","say":"con-DUK-tor"},{"term":"insulator","definition":"A material with very high resistance that does not let current flow.","say":"IN-syuh-lay-tor"},{"term":"current","definition":"The rate of flow of charge, measured in amps with an ammeter.","say":"KUH-rent"},{"term":"potential difference","definition":"The energy transferred per unit of charge, measured in volts.","say":"poh-TEN-shul DIF-rens"},{"term":"resistance","definition":"The opposition to current; more resistance means less current flows.","say":"ree-ZIS-tans"},{"term":"ammeter","definition":"A meter connected in series to measure current in amps.","say":"AM-ee-ter"},{"term":"voltmeter","definition":"A meter connected in parallel to measure potential difference in volts.","say":"VOLT-mee-ter"},{"term":"series","definition":"Components connected one after another in a single loop.","say":"SEER-eez"},{"term":"parallel","definition":"Components connected in their own separate loops.","say":"PA-ruh-lel"}],
"facts":["A circuit is designed to transfer energy from a power supply, such as a battery, to a component like a bulb or motor.","A complete circuit needs a closed loop with no gaps and a power supply with both terminals connected.","Metals are electrical conductors because they have electrons that can move and carry energy; insulators like wood, plastic and glass do not let current flow.","Current is the rate of flow of charge and is measured in amps (A) with an ammeter, which is connected in series.","Potential difference is measured in volts (V) with a voltmeter connected across a component.","The equation linking the three quantities is current = potential difference ÷ resistance (I = V ÷ R).","Increasing the potential difference increases the current, while increasing the resistance decreases the current.","In a series circuit there is one loop and the current is the same everywhere, but the potential difference is shared between the components.","In a parallel circuit there is more than one loop, each loop is independent, and the potential difference is the same across each branch."],
"misconceptions":[{"wrong":"The electrons come out of the battery and travel to the bulb.","right":"The electrons are already in the wires; the battery just pushes them around the loop to carry energy."},{"wrong":"Potential difference and current are the same thing.","right":"Current is the rate of flow of charge in amps; potential difference is the energy per unit charge in volts."},{"wrong":"Adding more components to a series loop makes the current bigger.","right":"More components add more resistance, so the current gets smaller."},{"wrong":"In a parallel circuit the current always splits exactly in half.","right":"Each loop draws its own current depending on its resistance, and the currents add together where wires are shared."}],
"questions":[{"type":"mcq","q":"What is an electrical circuit designed to do?","options":[{"t":"Transfer energy from a power supply to a component","correct":true},{"t":"Create brand new electrons inside the battery","why":"The electrons are already in the wires; the battery does not make them."},{"t":"Store light energy until a switch is opened","why":"A circuit transfers energy; it does not store light."}],"ok":"A circuit transfers energy from a source, like a battery, to a component such as a bulb or motor."},{"type":"mcq","q":"Why are metals good electrical conductors?","options":[{"t":"They have electrons that can move and carry energy","correct":true},{"t":"They are heavier than insulators","why":"Mass has nothing to do with conducting; it is about free-moving electrons."},{"t":"They get hot when a circuit is switched on","why":"Getting hot is not what makes a material a conductor."}],"ok":"Conductors have free-moving electrons; insulators do not, so they do not let current flow."},{"type":"categorise","q":"Sort each material into conductor or insulator.","bins":["Conductor","Insulator"],"items":[{"t":"Copper","bin":"Conductor"},{"t":"Wood","bin":"Insulator"},{"t":"Gold","bin":"Conductor"},{"t":"Plastic","bin":"Insulator"},{"t":"A metal paperclip","bin":"Conductor"},{"t":"Glass","bin":"Insulator"}],"ok":"Metals conduct; wood, plastic and glass are insulators.","bad":"Metals are conductors, while wood, plastic and glass are insulators."},{"type":"mcq","q":"What does an ammeter measure, and how is it connected?","options":[{"t":"Current, connected in series","correct":true},{"t":"Potential difference, connected in series","why":"That describes what a voltmeter measures, not an ammeter."},{"t":"Current, connected in parallel","why":"Ammeters go in series, in the loop; voltmeters go in parallel."}],"ok":"An ammeter measures current in amps and is connected in series, in the loop."},{"type":"tf","q":"An ammeter is connected in series and a voltmeter is connected in parallel.","answer":true,"why":"Ammeters go in the loop (series); voltmeters go across a component (parallel)."},{"type":"mcq","q":"What does a voltmeter measure?","options":[{"t":"Potential difference, in volts","correct":true},{"t":"Current, in amps","why":"That is what an ammeter measures."},{"t":"Resistance, in ohms","why":"Voltmeters measure potential difference in volts, not resistance."}],"ok":"A voltmeter measures potential difference in volts, connected across a component."},{"type":"multi","q":"Tap all the things needed for a complete, working circuit.","items":[{"t":"A power supply, such as a battery","correct":true},{"t":"A closed loop with no gaps","correct":true},{"t":"Both terminals of the power supply connected","correct":true},{"t":"At least one insulator placed in the loop"}],"ok":"A closed loop, a power supply, and both its terminals connected make a circuit work.","bad":"An insulator in the loop would stop the current."},{"type":"mcq","q":"What is resistance?","options":[{"t":"The opposition to current, measured in ohms","correct":true},{"t":"The energy carried by each charge, measured in volts","why":"That describes potential difference, not resistance."},{"t":"The number of electrons in the battery","why":"Resistance is about how much components get in the way of charges, not a count of electrons."}],"ok":"Resistance opposes the current and is measured in ohms; more resistance means less current."},{"type":"tf","q":"If you increase the resistance while keeping the potential difference the same, the current gets smaller.","answer":true,"why":"More resistance gets in the way of the charges, so the current decreases."},{"type":"numeric","kicker":"Work it out","q":"A battery of 12 V is connected to a bulb with a resistance of 3 Ω. What is the current? (current = potential difference ÷ resistance)","hint":"Divide the potential difference by the resistance.","answer":4,"unit":"A","ok":"I = V ÷ R = 12 ÷ 3 = 4 A."},{"type":"numeric","kicker":"Work it out","q":"A 2 Ω bulb has a current of 4 A flowing through it. What is the potential difference across it? (V = I × R)","hint":"Multiply the current by the resistance.","answer":8,"unit":"V","ok":"V = I × R = 4 × 2 = 8 V."},{"type":"numeric","kicker":"Work it out","q":"A 24 V battery is connected to a bulb and the ammeter reads 4 A. What is the resistance of the bulb? (R = V ÷ I)","hint":"Divide the potential difference by the current.","answer":6,"unit":"Ω","ok":"R = V ÷ I = 24 ÷ 4 = 6 Ω."},{"type":"categorise","q":"Sort each statement into the type of circuit it describes.","bins":["Series","Parallel"],"items":[{"t":"There is only one loop","bin":"Series"},{"t":"The current is the same everywhere","bin":"Series"},{"t":"There is more than one loop","bin":"Parallel"},{"t":"Each loop is independent","bin":"Parallel"},{"t":"The potential difference is shared between components","bin":"Series"},{"t":"The potential difference is the same across each branch","bin":"Parallel"}],"ok":"Series means one loop with equal current; parallel means independent loops with equal p.d. across each branch.","bad":"Series has one loop and shares p.d.; parallel has independent loops and the same p.d. across each branch."},{"type":"numeric","kicker":"Work it out","q":"In a series circuit, an ammeter near the battery reads 3 A. The current is the same everywhere in series. What does a second ammeter further round the loop read?","hint":"In series there is one loop, so the current does not change.","answer":3,"unit":"A","ok":"In series the current is the same wherever you look, so it is still 3 A."},{"type":"numeric","kicker":"Work it out","q":"In a series circuit a 3 V battery has a bulb taking 1 V. The components' potential differences add up to the supply. How many volts does the resistor take?","hint":"The bulb and resistor must add up to 3 V.","answer":2,"unit":"V","ok":"In series the p.d.s add to the supply: 3 − 1 = 2 V for the resistor."},{"type":"mcq","q":"In a simple parallel circuit, the bulb in one loop is unscrewed and stops working. What happens to the motor in the other loop?","options":[{"t":"It keeps running normally, because the loops are independent","correct":true},{"t":"It stops, because the whole circuit is now broken","why":"That happens in series; in parallel each loop is independent."},{"t":"It speeds up, because all the current goes to it","why":"The motor's loop is unaffected, so it does not get faster or slower."}],"ok":"Each loop of a parallel circuit is independent, so breaking one loop does not affect the others."},{"type":"tf","q":"Adding more bulbs in series makes the current smaller because there is more resistance.","answer":true,"why":"Each extra component adds resistance, getting in the way of the charges, so the current falls."},{"type":"mcq","q":"Why is potential difference NOT the same as current?","options":[{"t":"Current is the flow of charge (amps); potential difference is the energy per charge (volts)","correct":true},{"t":"They are the same, just measured with different meters","why":"They are different quantities measured in different units."},{"t":"Current is measured in volts and p.d. in amps","why":"It is the other way round: current is in amps, p.d. in volts."}],"ok":"Current (amps) is how much charge flows; potential difference (volts) is the energy each charge carries."},{"type":"mcq","q":"Which way are electrons actually arranged in a circuit before it is switched on?","options":[{"t":"They are already spread throughout the wires","correct":true},{"t":"They are all stored inside the battery","why":"Electrons are already in the wires; the battery pushes the ones that are there."},{"t":"There are no electrons until the switch is closed","why":"The electrons are present all the time; closing the switch lets them flow."}],"ok":"Electrons are already in the wires; the battery pushes them round to carry energy."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap the cell (battery) in this circuit.","diagram":"circuit","answer":"cell","ok":"The cell is the power supply — one long thin line and one short thick line."},
{"type":"diagram","kicker":"Label the diagram","q":"Tap the switch.","diagram":"circuit","answer":"switch","ok":"The switch opens or closes the circuit to stop or start the current."}]},

"STA":{"code":"STA","title":"Static electricity","discipline":"physics","blurb":"How insulators gain charge when electrons are transferred by friction, and how charged objects exert a force through electric fields.",
"vocab":[{"term":"charge","definition":"A property of materials that can be positive, negative or neutral.","say":"charj"},{"term":"electron","definition":"A tiny negative particle in atoms that can move between insulators.","say":"ih-LEK-tron"},{"term":"friction","definition":"The contact force when solid surfaces rub against each other.","say":"FRIK-shun"},{"term":"insulator","definition":"A material that will not allow charge to flow through it.","say":"IN-suh-lay-tor"},{"term":"neutral","definition":"Having no overall charge; equal positive and negative charges.","say":"NYOO-tral"},{"term":"static electricity","definition":"Charge that builds up and stays on an insulator.","say":"STAT-ik"},{"term":"electrostatic force","definition":"A non-contact force that charged objects exert on each other.","say":"ih-lek-tro-STAT-ik"},{"term":"non-contact force","definition":"A force that acts without the objects needing to touch.","say":"non-KON-takt"},{"term":"electric field","definition":"The region around a charge where it exerts a force.","say":"ih-LEK-trik feeld"},{"term":"field lines","definition":"Lines showing the direction and strength of an electric field.","say":"feeld lynz"}],
"facts":["Atoms contain positive protons and negative electrons; a neutral material has equal numbers of each, so no overall charge.","When an insulator is rubbed with a cloth, friction transfers electrons between them.","An object that loses electrons becomes positively charged; an object that gains electrons becomes negatively charged.","Like charges repel and opposite charges attract; a charged object can also attract small neutral objects.","Only electrical insulators can hold a static charge; conductors such as metals cannot build one up.","Charged objects exert an electrostatic force, which is a non-contact force that can both attract and repel.","The nearer charged objects are, and the more they are charged, the stronger the electrostatic force between them.","Field line arrows always point away from positive charges and towards negative charges.","The closer the field lines, the stronger the electric field; lines further apart show a weaker field."],
"misconceptions":[{"wrong":"Protons move from one object to another to make it charged.","right":"Only electrons are transferred; the object losing electrons becomes positive."},{"wrong":"A metal rod can be rubbed with a cloth to hold a static charge.","right":"Metals are conductors, so charge cannot build up on them; only insulators can."},{"wrong":"A charged rod only attracts another object if it touches it.","right":"The electrostatic force is a non-contact force, so it acts at a distance."},{"wrong":"Rubbing always makes an insulator positively charged.","right":"It depends on the material; some gain electrons and become negatively charged."}],
"questions":[{"type":"mcq","q":"What happens to an insulator when it loses some of its electrons through friction?","options":[{"t":"It becomes positively charged","correct":true},{"t":"It becomes negatively charged","why":"Gaining electrons, not losing them, makes an object negative."},{"t":"It stays neutral","why":"Losing electrons leaves more positive charges than negative, so it is no longer neutral."}],"ok":"Fewer electrons means more positive charges than negative, so the object is positive."},{"type":"mcq","q":"An object becomes negatively charged. What must have happened to its electrons?","options":[{"t":"It gained electrons","correct":true},{"t":"It lost electrons","why":"Losing electrons makes an object positive, not negative."},{"t":"Its protons moved away","why":"Protons do not move; only electrons are transferred."}],"ok":"Gaining extra negative electrons gives the object an overall negative charge."},{"type":"categorise","q":"Sort each object by the charge it ends up with after electrons move during rubbing.","bins":["Becomes negative","Becomes positive"],"items":[{"t":"An object that gains electrons","bin":"Becomes negative"},{"t":"An object that loses electrons","bin":"Becomes positive"},{"t":"A rod that loses some electrons to a cloth","bin":"Becomes positive"},{"t":"A cloth that takes electrons from a rod","bin":"Becomes negative"}],"ok":"Gaining electrons makes an object negative; losing electrons makes it positive.","bad":"Electrons are negative, so gaining them makes an object negative."},{"type":"mcq","q":"Two charged rods are brought close together. Which pairing will attract?","options":[{"t":"A positive rod and a negative rod","correct":true},{"t":"A positive rod and a positive rod","why":"Two like charges repel rather than attract."},{"t":"A negative rod and a negative rod","why":"Two like charges repel rather than attract."}],"ok":"Opposite charges attract, so the positive and negative rods pull together."},{"type":"categorise","q":"Sort each pair of charges by how they will interact.","bins":["Attract","Repel"],"items":[{"t":"positive and negative","bin":"Attract"},{"t":"positive and positive","bin":"Repel"},{"t":"negative and negative","bin":"Repel"},{"t":"negative and positive","bin":"Attract"}],"ok":"Like charges repel and opposite charges attract.","bad":"Check whether the charges are the same (repel) or opposite (attract)."},{"type":"tf","q":"A charged rod can attract small pieces of neutral paper.","answer":true,"why":"Charged objects can attract small uncharged objects, like paper strips lifted by a charged rod."},{"type":"order","q":"Put the steps for charging a plastic rod positively by friction in the correct order.","items":["The rod starts neutral, with equal positive and negative charges","A cloth is rubbed against the plastic rod","Friction removes some electrons from the rod","The rod now has more positive charges than negative","The rod is positively charged"],"ok":"Friction transfers electrons off the rod, leaving it with an overall positive charge."},{"type":"mcq","q":"Why can a metal rod not build up a static charge when rubbed with a cloth?","options":[{"t":"It is a conductor, so charge cannot build up on it","correct":true},{"t":"It is an insulator, so the charge escapes","why":"Metals are conductors, not insulators; it is insulators that hold a charge."},{"t":"Metals have no electrons to transfer","why":"Metals do contain electrons; the issue is that charge cannot build up on a conductor."}],"ok":"Only electrical insulators can hold a static charge; metals are conductors."},{"type":"multi","q":"Tap all the statements that are true about a neutral material.","items":[{"t":"It has equal numbers of positive and negative charges","correct":true},{"t":"It has no overall charge","correct":true},{"t":"It is strongly attracted to every charged rod"},{"t":"It has only protons and no electrons"}],"ok":"Neutral means equal positive and negative charges, so no overall charge.","bad":"A neutral object has equal positive and negative charges and no overall charge."},{"type":"tf","q":"When an insulator is rubbed with a cloth, protons move between the two materials.","answer":false,"why":"Only electrons are transferred by friction; protons do not move."},{"type":"mcq","q":"What is the name of the force that charged objects exert on each other?","options":[{"t":"The electrostatic force","correct":true},{"t":"Friction","why":"Friction is the contact force that rubs electrons off; it is not the force between charged objects."},{"t":"Upthrust","why":"Upthrust is not involved in charged objects acting on each other."}],"ok":"Charged objects exert the electrostatic force on one another."},{"type":"tf","q":"The electrostatic force is a non-contact force.","answer":true,"why":"Charged objects can attract or repel without touching, so it is a non-contact force."},{"type":"mcq","q":"Two opposite charges are moved further apart. What happens to the electrostatic force between them?","options":[{"t":"It becomes weaker","correct":true},{"t":"It becomes stronger","why":"The force gets stronger when charges are nearer, not further apart."},{"t":"It stays exactly the same","why":"Distance changes the force; further apart means a weaker force."}],"ok":"The nearer charged objects are, the stronger the force, so moving apart weakens it."},{"type":"multi","q":"Tap all the ways to make the electrostatic force between two objects stronger.","items":[{"t":"Move the objects closer together","correct":true},{"t":"Charge the objects more","correct":true},{"t":"Move the objects further apart"},{"t":"Make the objects neutral"}],"ok":"The force is stronger when objects are nearer and when they are more charged.","bad":"Greater distance makes the force weaker, and neutral objects have no charge at all."},{"type":"mcq","q":"In which direction do electric field line arrows point?","options":[{"t":"Away from positive charges and towards negative charges","correct":true},{"t":"Away from negative charges and towards positive charges","why":"The rule is the opposite: arrows leave positives and aim at negatives."},{"t":"Always from left to right","why":"Field line direction depends on the charge, not a fixed left-to-right rule."}],"ok":"Arrows point away from positive charges and towards negative charges."},{"type":"mcq","q":"A charged object has field line arrows pointing towards it. What is its charge?","options":[{"t":"Negative","correct":true},{"t":"Positive","why":"Arrows point away from positive charges, not towards them."},{"t":"Neutral","why":"A neutral object has no charge, so it has no field lines at all."}],"ok":"Field line arrows aim towards negative charges, so the object is negative."},{"type":"tf","q":"Field lines that are drawn closer together show a stronger electric field.","answer":true,"why":"The closer the field lines, the stronger the field; lines further apart show a weaker field."},{"type":"mcq","q":"A student removing a fleece feels a small static shock. What caused the fleece and T-shirt to become charged?","options":[{"t":"Friction transferred electrons between the fleece and T-shirt","correct":true},{"t":"Protons moved between the fleece and T-shirt","why":"Protons do not move; only electrons are transferred during charging."},{"t":"A non-contact force charged them up","why":"The charging itself is caused by friction, which is a contact force."}],"ok":"Friction, a contact force, transfers electrons and causes the materials to become charged."}]},

"MAG":{"code":"MAG","title":"Magnets","discipline":"physics","blurb":"How magnets push and pull, how the Earth acts like a giant magnet, and how electricity can make magnets we switch on and off.",
"vocab":[{"term":"magnetic field","definition":"The region around a magnet where it can exert a force.","say":"mag-NET-ik feeld"},{"term":"pole","definition":"One of the two ends of a magnet, north or south.","say":"pohl"},{"term":"attract","definition":"To pull towards one another.","say":"uh-TRAKT"},{"term":"repel","definition":"To push apart from one another.","say":"ri-PEL"},{"term":"magnetic field line","definition":"A line showing the shape and direction of a magnetic field.","say":"mag-NET-ik feeld lyne"},{"term":"compass","definition":"A tiny magnet, free to spin, that lines up with a magnetic field.","say":"KUM-puss"},{"term":"solenoid","definition":"A coil of wire that makes a magnetic field like a bar magnet.","say":"SOH-luh-noyd"},{"term":"electromagnet","definition":"A coil of wire with a current, often wrapped around an iron core.","say":"ee-LEK-troh-mag-net"},{"term":"magnetic material","definition":"A material attracted to a magnet: iron, nickel or cobalt.","say":"mag-NET-ik"},{"term":"core","definition":"The very centre of the Earth, made of iron and nickel.","say":"kor"}],
"facts":["Only three chemical elements are magnetic: iron, nickel and cobalt.","Steel is magnetic because it is an alloy containing iron.","Every permanent magnet has a north pole and a south pole.","Like poles repel, and unlike (opposite) poles attract.","Magnetic field lines point from north to south, and the field is strongest at the poles where the lines are closest together.","Magnetism is a non-contact force, so a magnet can pull on iron without touching it.","The Earth has a magnetic field because its core is made of iron and nickel, and a compass lines up with it to point north.","A wire has a magnetic field around it only when a current is flowing.","An electromagnet can be made stronger with more turns on the coil, a larger current, or an iron core, and it can be switched off."],
"misconceptions":[{"wrong":"All metals are magnetic.","right":"Only iron, nickel and cobalt are magnetic; metals like copper, gold and aluminium are not."},{"wrong":"Magnetism is a contact force because the iron filings touch the magnet.","right":"Magnetism is a non-contact force; the magnetic field pulls the filings in even before they touch."},{"wrong":"The magnetic field is strongest only at the north pole.","right":"It is equally strong at both poles, where the field lines are closest together."},{"wrong":"An electromagnet keeps its magnetism when switched off.","right":"With no current flowing there is no magnetic field, which is why it can be turned on and off."}],
"questions":[{"type":"categorise","q":"Sort each material into the correct box.","bins":["Magnetic","Not magnetic"],"items":[{"t":"iron","bin":"Magnetic"},{"t":"nickel","bin":"Magnetic"},{"t":"cobalt","bin":"Magnetic"},{"t":"steel","bin":"Magnetic"},{"t":"copper","bin":"Not magnetic"},{"t":"aluminium","bin":"Not magnetic"},{"t":"wood","bin":"Not magnetic"},{"t":"plastic","bin":"Not magnetic"}],"ok":"Only iron, nickel and cobalt (and alloys like steel) are magnetic.","bad":"Most metals are not magnetic. Only iron, nickel and cobalt are."},{"type":"mcq","q":"How many magnetic chemical elements are there?","options":[{"t":"Three: iron, nickel and cobalt","correct":true},{"t":"All metals are magnetic","why":"Only three elements are magnetic, not all metals."},{"t":"Only iron","why":"Nickel and cobalt are magnetic too."}],"ok":"Just three: iron, nickel and cobalt."},{"type":"mcq","q":"Why is steel magnetic when it is an alloy?","options":[{"t":"It contains iron","correct":true},{"t":"All alloys are magnetic","why":"Brass is an alloy of copper and zinc, and it is not magnetic."},{"t":"It is a shiny metal","why":"Being shiny has nothing to do with being magnetic; copper is shiny but not magnetic."}],"ok":"Steel is magnetic because it contains iron."},{"type":"mcq","q":"What are the two ends of a permanent magnet called?","options":[{"t":"The poles","correct":true},{"t":"The fields","why":"The field is the region around the whole magnet, not its ends."},{"t":"The cores","why":"A core is the centre of an electromagnet or the Earth, not the end of a bar magnet."}],"ok":"We call them the north and south poles."},{"type":"mcq","q":"A north pole is brought near another north pole. What happens?","options":[{"t":"They repel (push apart)","correct":true},{"t":"They attract (pull together)","why":"Only unlike poles attract; two norths are like poles."},{"t":"Nothing happens","why":"Like poles always exert a pushing force on each other."}],"ok":"Like poles repel."},{"type":"mcq","q":"A north pole is brought near a south pole. What happens?","options":[{"t":"They attract (pull together)","correct":true},{"t":"They repel (push apart)","why":"Repelling only happens with like poles, such as north and north."},{"t":"Nothing happens","why":"Unlike poles always exert a pulling force on each other."}],"ok":"Unlike (opposite) poles attract."},{"type":"tf","q":"Like poles attract one another.","answer":false,"why":"Like poles repel; it is unlike (opposite) poles that attract."},{"type":"mcq","q":"In which direction do magnetic field lines point?","options":[{"t":"From north to south","correct":true},{"t":"From south to north","why":"Field lines point away from north and towards south, not the other way."},{"t":"In a circle around the magnet","why":"That is the shape around a current-carrying wire, not a bar magnet."}],"ok":"Magnetic field lines point from north to south."},{"type":"mcq","q":"Where is the magnetic field of a bar magnet strongest?","options":[{"t":"At the poles, where the lines are closest together","correct":true},{"t":"In the middle of the magnet","why":"The field lines are furthest apart in the middle, so it is weaker there."},{"t":"Far away from the magnet","why":"The field gets weaker as you move further away."}],"ok":"It is strongest at the poles where the field lines are closest together."},{"type":"tf","q":"When magnetic field lines are close together, the magnetic field is strong.","answer":true,"why":"Lines close together means a strong field; lines further apart means a weaker field."},{"type":"tf","q":"Magnetism is a non-contact force.","answer":true,"why":"A magnet can pull on iron filings without touching them, so it is a non-contact force."},{"type":"mcq","q":"What is a compass actually made of?","options":[{"t":"A tiny magnet, free to spin","correct":true},{"t":"A piece of copper that spins","why":"Copper is not magnetic, so it could not work as a compass."},{"t":"A coil of wire with a current","why":"That describes a solenoid, not a compass needle."}],"ok":"A compass is a small magnet free to spin on a spindle."},{"type":"mcq","q":"Why does a compass point north?","options":[{"t":"It lines up with the Earth's magnetic field","correct":true},{"t":"It is pulled towards the heaviest part of the Earth","why":"It is magnetism, not weight, that turns the needle."},{"t":"It is pushed by the wind","why":"A compass works inside a sealed case and indoors, with no wind."}],"ok":"The needle lines up with the Earth's magnetic field."},{"type":"mcq","q":"Why does the Earth have a magnetic field?","options":[{"t":"Its core is made of iron and nickel","correct":true},{"t":"It is covered in oceans of water","why":"Water is not magnetic and does not produce the field."},{"t":"It is the largest planet","why":"Size is not the reason; the iron and nickel core gives the field."}],"ok":"The iron and nickel core gives the Earth its magnetic field."},{"type":"multi","q":"Tap all the things you need to make a simple electromagnet.","items":[{"t":"A coil of wire (solenoid)","correct":true},{"t":"An electric current","correct":true},{"t":"An iron core","correct":true},{"t":"A bowl of water"},{"t":"A wooden block"}],"ok":"A coil of wire carrying a current, wrapped around an iron core.","bad":"An electromagnet is a coil of wire with a current, wrapped around an iron core."},{"type":"multi","q":"Tap all the ways to make an electromagnet stronger.","items":[{"t":"Add more turns to the coil","correct":true},{"t":"Increase the current","correct":true},{"t":"Add an iron core","correct":true},{"t":"Use fewer turns"},{"t":"Decrease the current"}],"ok":"More turns, a larger current and an iron core all make the field stronger.","bad":"Fewer turns or less current make it weaker."},{"type":"tf","q":"An electromagnet has a magnetic field even when it is switched off.","answer":false,"why":"With no current flowing there is no magnetic field, which is why it can be turned on and off."},{"type":"mcq","q":"What is one advantage of an electromagnet over a permanent magnet?","options":[{"t":"It can be switched on and off","correct":true},{"t":"It never needs any electricity","why":"An electromagnet only works while a current flows."},{"t":"It is made of copper, which is magnetic","why":"Copper is not magnetic; the core is usually iron."}],"ok":"An electromagnet can be turned on and off, and its strength can be changed."}]},

"DEN":{"code":"DEN","title":"Particle model and density","discipline":"physics","blurb":"Density tells us how much mass is packed into a space, and energy changes how particles are arranged.",
"vocab":[{"term":"density","definition":"How much mass is packed into a given volume of a substance","say":"DEN-sit-ee"},{"term":"mass","definition":"The amount of matter in an object, measured in kilograms or grams","say":"mass"},{"term":"volume","definition":"The amount of space an object takes up","say":"VOL-yoom"},{"term":"particle model","definition":"The idea that everything is made of tiny moving particles","say":"PAR-tik-ul MOD-el"},{"term":"Brownian motion","definition":"The random jiggling movement of particles, evidence that particles move","say":"BROW-nee-an MOH-shun"},{"term":"change of state","definition":"When a substance turns from solid to liquid, or liquid to gas, and back","say":"chaynj of stayt"},{"term":"melting point","definition":"The temperature at which a solid turns into a liquid","say":"MEL-ting point"},{"term":"boiling point","definition":"The temperature at which a liquid turns into a gas","say":"BOY-ling point"},{"term":"reproducible","definition":"When different people get similar results from the same experiment","say":"ree-pro-DEW-sib-ul"}],
"facts":["Density is calculated using density = mass ÷ volume.","Density is measured in kg/m³ or g/cm³.","To find mass, rearrange to mass = density × volume.","In a solid the particles are packed closely, so a solid is usually the densest state; in a gas the particles are spread far apart, so a gas is the least dense.","An object floats if it is less dense than the fluid around it, and sinks if it is more dense.","Water is unusual: its solid (ice) is less dense than its liquid, so ice floats.","Brownian motion is the random movement of particles, first noticed by Robert Brown, and it is evidence that particles move.","When a substance is heated, either its temperature rises or it changes state, but not both at once.","During a change of state the temperature stays the same, because the energy is used to pull particles apart instead of speeding them up."],
"misconceptions":[{"wrong":"Heavier objects always have a higher density.","right":"Density depends on mass AND volume; 1 kg of feathers and 1 kg of lead have the same mass but lead is far denser because it takes up much less space."},{"wrong":"All solids are denser than their liquids, so all ice should sink.","right":"Most substances are densest as solids, but water is special — solid ice is less dense than liquid water, so ice floats."},{"wrong":"The temperature keeps rising the whole time you heat a substance.","right":"During a change of state the temperature stays constant, because the energy goes into pulling particles apart."},{"wrong":"Mass and weight mean the same thing.","right":"Mass is the amount of matter in an object; the density equation always uses mass, not weight."}],
"questions":[{"type":"mcq","q":"What does density tell us?","options":[{"t":"How much mass is packed into a certain volume","correct":true},{"t":"How heavy an object feels in your hand","why":"That is closer to weight; density compares mass to volume."},{"t":"The total space an object takes up","why":"That is volume on its own, not density."}],"ok":"Density compares the mass of a substance to the space it takes up."},{"type":"mcq","q":"Which equation links density, mass and volume?","options":[{"t":"density = mass ÷ volume","correct":true},{"t":"density = mass × volume","why":"Denser substances pack more mass into less volume, so we divide, not multiply."},{"t":"density = volume ÷ mass","why":"This is upside down; mass goes on top of the equation."}],"ok":"density = mass ÷ volume. To find mass, rearrange to mass = density × volume."},{"type":"numeric","kicker":"Work it out","q":"A box has a mass of 8 kg and a volume of 4 m³. What is its density?","hint":"density = mass ÷ volume","answer":2,"unit":"kg/m³","ok":"8 ÷ 4 = 2 kg/m³."},{"type":"numeric","kicker":"Work it out","q":"A block has a volume of 6 m³ and a density of 6 kg/m³. What is its mass?","hint":"mass = density × volume","answer":36,"unit":"kg","ok":"6 × 6 = 36 kg."},{"type":"numeric","kicker":"Work it out","q":"Calculate the density of a 2.5 m³ box that has a mass of 12 kg.","hint":"density = mass ÷ volume","answer":4.8,"unit":"kg/m³","ok":"12 ÷ 2.5 = 4.8 kg/m³."},{"type":"numeric","kicker":"Work it out","q":"Iron has a density of 7800 kg/m³. Calculate the mass of 0.025 m³ of iron.","hint":"mass = density × volume","answer":195,"unit":"kg","ok":"7800 × 0.025 = 195 kg."},{"type":"numeric","kicker":"Work it out","q":"A stone has a mass of 0.26 kg and a volume of 0.0001 m³. Calculate its density.","hint":"density = mass ÷ volume","answer":2600,"unit":"kg/m³","ok":"0.26 ÷ 0.0001 = 2600 kg/m³."},{"type":"mcq","q":"Which state of matter is usually the densest?","options":[{"t":"Solid","correct":true},{"t":"Liquid","why":"In a liquid the particles are touching but more randomly arranged, so they take up slightly more volume."},{"t":"Gas","why":"In a gas the particles are spread far apart, making it the least dense state."}],"ok":"In a solid the particles are packed closely, so the same mass fits in the smallest volume."},{"type":"tf","q":"An object will float if it is less dense than the fluid around it.","answer":true,"why":"Less dense objects float on more dense fluids — that is why a cork floats on water."},{"type":"tf","q":"Ice sinks in liquid water because ice is more dense than water.","answer":false,"why":"Water is special: its solid form is LESS dense than its liquid, so ice floats."},{"type":"categorise","q":"A solid metal is placed on liquid copper (density 8020 kg/m³). Sort each metal by whether it floats or sinks.","bins":["Floats","Sinks"],"items":[{"t":"Magnesium, density 1738 kg/m³","bin":"Floats"},{"t":"Chromium, density 7200 kg/m³","bin":"Floats"},{"t":"Silver, density 10490 kg/m³","bin":"Sinks"},{"t":"Lead, density 11340 kg/m³","bin":"Sinks"}],"ok":"Metals less dense than liquid copper (8020 kg/m³) float; denser ones sink.","bad":"Compare each density to 8020 kg/m³ — lower floats, higher sinks."},{"type":"order","q":"Put these states of a substance in order from LEAST dense to MOST dense.","items":["Gas","Liquid","Solid"],"ok":"Gas is least dense (particles spread out), then liquid, then solid is densest (particles packed closely)."},{"type":"mcq","q":"What happens to the temperature of a substance during a change of state?","options":[{"t":"It stays the same","correct":true},{"t":"It keeps rising","why":"The energy is used to pull particles apart, not to raise the temperature, so it stays constant."},{"t":"It rises then suddenly drops","why":"The temperature simply holds steady during the change of state."}],"ok":"During a change of state, energy pulls particles apart instead of raising the temperature, so it stays constant."},{"type":"mcq","q":"When you heat a substance, what are the two possible outcomes?","options":[{"t":"Its temperature rises, or it changes state","correct":true},{"t":"It always gets heavier and bigger","why":"Heating does not add mass; it raises temperature or changes the state."},{"t":"It always changes colour","why":"Heating raises temperature or changes state, not colour."}],"ok":"Adding heat either raises the temperature or causes a change of state."},{"type":"multi","q":"Tap all the statements about Brownian motion that are TRUE.","items":[{"t":"It is the random movement of particles","correct":true},{"t":"It was first noticed by Robert Brown","correct":true},{"t":"It proves that particles can move","correct":true},{"t":"It only happens in solids"}],"ok":"Brownian motion is the random movement of particles, noticed by Robert Brown, and is evidence that particles move.","bad":"Solids' particles cannot move past each other, so Brownian motion is seen in fluids, not solids."},{"type":"tf","q":"When particles gain energy, they move faster.","answer":true,"why":"More energy means the particles move faster, and a higher temperature means faster particles."},{"type":"mcq","q":"Why might you measure density in g/cm³ rather than kg/m³ for a small object?","options":[{"t":"It is simpler than converting to kg/m³","correct":true},{"t":"Because g/cm³ is the only correct unit for density","why":"Both g/cm³ and kg/m³ are valid units for density."},{"t":"Because mass cannot be measured in grams","why":"A balance measures mass in grams, which is exactly what the practical uses."}],"ok":"For small objects measured with a ruler and balance, g/cm³ is simpler."},{"type":"mcq","q":"Two different scientists do the same experiment and get similar results. What does this make the results?","options":[{"t":"Reproducible","correct":true},{"t":"Repeatable","why":"Repeatable means the SAME person gets similar results when they repeat it themselves."},{"t":"Neither, because they used different equipment","why":"As long as the results are similar, different people getting them means they are reproducible."}],"ok":"When different people get similar results, the results are reproducible."},{"type":"tf","q":"1 kg of lead and 1 kg of feathers have the same mass, but lead has a higher density.","answer":true,"why":"They have equal mass, but lead takes up far less volume, so it is much denser."}]},

"SPC":{"code":"SPC","title":"Space","discipline":"physics","blurb":"The solar system, why we get day, night and seasons, and how weight differs from mass across the planets.",
"vocab":[{"term":"star","definition":"A huge ball of hot gas that gives out light, like the Sun.","say":"star"},{"term":"planet","definition":"A spherical object that orbits a star, such as Earth.","say":"plan-it"},{"term":"moon","definition":"A lump of rock that orbits a planet.","say":"moon"},{"term":"orbit","definition":"The path one object takes around another in space.","say":"or-bit"},{"term":"galaxy","definition":"A huge collection of billions of stars held together by gravity.","say":"gal-ax-ee"},{"term":"light year","definition":"The distance light travels in one year.","say":"light yeer"},{"term":"axis","definition":"The tilted line through the poles that the Earth spins around.","say":"ax-iss"},{"term":"mass","definition":"How much matter is in an object, measured in kilograms.","say":"mass"},{"term":"weight","definition":"The force of gravity on a mass, measured in newtons.","say":"wait"},{"term":"gravitational field strength","definition":"How strong a planet's pull of gravity is, in N/kg.","say":"grav-it-ay-shun-al"}],
"facts":["The Sun is a star, and eight planets orbit it: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus and Neptune.","Mercury, Venus, Earth and Mars are rocky planets; Jupiter, Saturn, Uranus and Neptune are gas planets.","Moons orbit planets, while planets orbit a star; orbits are caused by the gravitational pull of the central object.","Our galaxy is the Milky Way, a spiral galaxy made of billions of stars, and there are billions of galaxies.","A light year is the distance light travels in one year, used because space distances are so huge.","Earth spins on its tilted axis once every 24 hours, giving us day and night.","The Earth's axis is tilted, and this fixed tilt causes the seasons as Earth orbits the Sun.","Mass measures how much matter is in an object and stays the same everywhere; weight is the force of gravity on it and changes between planets.","Weight is measured in newtons (N) and is found using weight = mass × gravitational field strength."],
"misconceptions":[{"wrong":"We get day and night because the Earth orbits the Sun.","right":"Day and night happen because the Earth spins on its axis once every 24 hours; the orbit takes a whole year."},{"wrong":"The seasons happen because the Earth's tilt changes through the year.","right":"The tilt stays fixed; seasons happen because a hemisphere tilts towards or away from the Sun as Earth orbits."},{"wrong":"My mass and weight are the same and both stay the same in space.","right":"Mass is the amount of matter and never changes; weight is the gravitational force and changes on different planets."},{"wrong":"A light year is a really long amount of time.","right":"A light year is a distance, not a time: it is how far light travels in one year."}],
"questions":[{"type":"mcq","q":"What is the Sun?","options":[{"t":"A star","correct":true},{"t":"A planet","why":"Planets orbit a star; the Sun is the star at the centre of our solar system."},{"t":"A galaxy","why":"A galaxy is a huge collection of billions of stars; the Sun is a single star."}],"ok":"The Sun is a star, the same as billions of others out there."},{"type":"order","q":"Put the first four planets in order from closest to the Sun outwards.","items":["Mercury","Venus","Earth","Mars"],"ok":"Mercury, Venus, Earth, Mars are the four rocky planets, closest to the Sun."},{"type":"order","q":"Order these from smallest to largest in scale.","items":["Moon","Planet","Star","Galaxy"],"ok":"A moon orbits a planet, a star is far bigger, and a galaxy holds billions of stars."},{"type":"multi","q":"Tap all the rocky planets.","items":[{"t":"Mercury","correct":true},{"t":"Jupiter"},{"t":"Earth","correct":true},{"t":"Neptune"},{"t":"Mars","correct":true}],"ok":"Mercury, Venus, Earth and Mars are the four rocky planets.","bad":"Jupiter, Saturn, Uranus and Neptune are the gas planets, not rocky ones."},{"type":"mcq","q":"What do moons orbit?","options":[{"t":"Planets","correct":true},{"t":"The Sun directly","why":"Moons go around planets, while the planets themselves go around the Sun."},{"t":"Galaxies","why":"Galaxies are vast collections of stars; moons orbit individual planets."}],"ok":"Moons are lumps of rock that orbit planets."},{"type":"mcq","q":"What causes the planets to orbit the Sun?","options":[{"t":"The gravitational pull of the Sun","correct":true},{"t":"The spin of the planets","why":"Spinning gives day and night; it is gravity that holds a planet in orbit."},{"t":"A push from other planets","why":"Orbits are caused by the gravitational pull of the central object, the Sun."}],"ok":"Orbits are caused by the gravitational pull of the object in the centre."},{"type":"mcq","q":"What is the name of our galaxy?","options":[{"t":"The Milky Way","correct":true},{"t":"The Solar System","why":"The solar system is just the Sun and its planets; the galaxy is far bigger."},{"t":"Andromeda","why":"Andromeda is a neighbouring galaxy, not our own."}],"ok":"We live in the Milky Way, a spiral galaxy of billions of stars."},{"type":"tf","q":"A light year is a unit of distance, not time.","answer":true,"why":"A light year is the distance light travels in one year; space is too big for metres."},{"type":"mcq","q":"Why do we get day and night?","options":[{"t":"The Earth spins on its axis once every 24 hours","correct":true},{"t":"The Earth orbits the Sun once a year","why":"The orbit gives us the year; the daily spin gives us day and night."},{"t":"The Sun switches off at night","why":"The Sun shines all the time; the side facing away from it is simply in darkness."}],"ok":"As Earth spins, the side facing the Sun has day and the side facing away has night."},{"type":"tf","q":"The Earth's axis is tilted, which is what causes the seasons.","answer":true,"why":"The fixed tilt means a hemisphere leans towards or away from the Sun as the Earth orbits."},{"type":"tf","q":"When the northern hemisphere is tilted towards the Sun, it is summer there.","answer":true,"why":"The hemisphere tilted towards the Sun gets more, stronger sunlight, so it has summer."},{"type":"categorise","q":"Sort each cause into what it produces.","bins":["Day and night","Seasons"],"items":[{"t":"Earth spinning on its axis","bin":"Day and night"},{"t":"Earth's tilted axis","bin":"Seasons"},{"t":"One full spin every 24 hours","bin":"Day and night"},{"t":"A hemisphere tilting towards or away from the Sun","bin":"Seasons"}],"ok":"The daily spin gives day and night; the tilted axis gives the seasons.","bad":"Keep the spin (day and night) separate from the tilt (seasons)."},{"type":"mcq","q":"What is weight?","options":[{"t":"The force of gravity acting on a mass","correct":true},{"t":"The amount of matter in an object","why":"That is mass; weight is the gravitational force, measured in newtons."},{"t":"The size of an object","why":"Weight is a force from gravity, not how big something looks."}],"ok":"Weight is the force of gravity on a mass, measured in newtons."},{"type":"categorise","q":"Sort each statement under Mass or Weight.","bins":["Mass","Weight"],"items":[{"t":"Measured in kilograms","bin":"Mass"},{"t":"Measured in newtons","bin":"Weight"},{"t":"Stays the same on every planet","bin":"Mass"},{"t":"Is the force of gravity on an object","bin":"Weight"},{"t":"Changes on a planet with stronger gravity","bin":"Weight"}],"ok":"Mass is the matter in an object (kg); weight is the gravity force on it (N).","bad":"Weight is a force; mass is not."},{"type":"tf","q":"If an astronaut travels from Earth to the Moon, their mass stays the same but their weight gets smaller.","answer":true,"why":"Mass is the matter, which does not change; the Moon's weaker gravity gives less weight."},{"type":"numeric","kicker":"Work it out","q":"A 6 kg object sits on Earth, where g = 10 N/kg. What is its weight?","hint":"weight = mass × gravitational field strength","answer":60,"unit":"N","ok":"6 kg × 10 N/kg = 60 N."},{"type":"numeric","kicker":"Work it out","q":"On the Moon the gravitational field strength is 1.6 N/kg. What is the weight of a 2 kg mass there?","hint":"weight = mass × gravitational field strength","answer":3.2,"unit":"N","ok":"2 kg × 1.6 N/kg = 3.2 N, far less than on Earth."},{"type":"numeric","kicker":"Work it out","q":"Jupiter's gravitational field strength is about 25 N/kg. What is the weight of a 2 kg object on Jupiter?","hint":"weight = mass × gravitational field strength","answer":50,"unit":"N","ok":"2 kg × 25 N/kg = 50 N, because Jupiter's gravity is much stronger."},{"type":"mcq","q":"On the same planet, what happens to an object's weight as its mass increases?","options":[{"t":"Its weight increases","correct":true},{"t":"Its weight decreases","why":"More mass means more matter pulled by gravity, so weight goes up, not down."},{"t":"Its weight stays the same","why":"weight = mass × g, so if g is fixed, more mass means more weight."}],"ok":"On one planet, the more mass an object has, the more it weighs."}]},

/* === GCSE PHYSICS CONTENT (managed) === */
"GE1":{"code":"GE1","title":"Energy stores & transfers","discipline":"physics","blurb":"The energy stores, the four ways energy is transferred, and the conservation of energy.","vocab":[{"term":"energy store","definition":"where energy is held — kinetic, gravitational, elastic, thermal, chemical, electrostatic, magnetic or nuclear","say":"energy store"},{"term":"system","definition":"an object, or group of objects, that we choose to study","say":"sis-tem"},{"term":"dissipation","definition":"energy spreading out to the surroundings, usually as wasted thermal energy","say":"diss-ip-ay-shun"},{"term":"conservation of energy","definition":"the rule that energy cannot be created or destroyed, only transferred or stored","say":"con-ser-vay-shun"},{"term":"useful energy","definition":"the energy transferred to where we want it","say":"useful energy"},{"term":"wasted energy","definition":"energy transferred to stores that are not useful, usually heating the surroundings","say":"wasted energy"}],"facts":["Energy is held in stores: kinetic, gravitational, elastic, thermal, chemical, electrostatic, magnetic and nuclear.","A system is the object or group of objects we choose to study. Energy is transferred between stores inside a system, or to and from the surroundings.","Energy can be transferred four ways: mechanically (a force doing work), electrically (a charge moving), by heating, and by radiation such as light and sound.","Conservation of energy says energy cannot be created or destroyed, only transferred, stored or dissipated, so the total energy stays the same.","When energy is transferred, some is usually dissipated to the thermal store of the surroundings as wasted energy.","In a closed system there is no net transfer of energy in or out, so the total energy is constant."],"misconceptions":[{"wrong":"Energy gets used up and disappears.","right":"Energy is conserved; it is transferred to other stores or dissipated to the surroundings, never destroyed."},{"wrong":"Light and sound are energy stores.","right":"They are radiation transfer pathways; the stores include kinetic, thermal, chemical and so on."}],"questions":[{"type":"mcq","q":"Which of these is an energy store?","options":[{"t":"The chemical store","correct":true},{"t":"Heating","why":"Heating is a way of transferring energy, not a store."},{"t":"Radiation","why":"Radiation is a transfer pathway, not a store."}],"ok":"Stores include kinetic, thermal, chemical, gravitational and elastic."},{"type":"multi","q":"Tap all four ways energy can be transferred.","items":[{"t":"Mechanically (by a force)","correct":true},{"t":"Electrically (by charge)","correct":true},{"t":"By heating","correct":true},{"t":"By radiation","correct":true},{"t":"By weighing it"}],"ok":"The four pathways are mechanical, electrical, heating and radiation.","bad":"Weighing does not transfer energy; the four ways are mechanical, electrical, heating and radiation."},{"type":"categorise","q":"Sort each as an energy store or a transfer pathway.","bins":["Energy store","Transfer pathway"],"items":[{"t":"Kinetic","bin":"Energy store"},{"t":"Chemical","bin":"Energy store"},{"t":"Heating","bin":"Transfer pathway"},{"t":"Radiation","bin":"Transfer pathway"},{"t":"Elastic","bin":"Energy store"},{"t":"Mechanical working","bin":"Transfer pathway"}],"ok":"Stores hold energy; pathways move it between stores.","bad":"A store holds energy (kinetic, chemical...); a pathway moves it (heating, radiation...)."},{"type":"tf","q":"Energy can be created if you have a powerful enough machine.","answer":false,"why":"Energy is always conserved — it can only be transferred or stored, never created or destroyed."},{"type":"mcq","q":"A battery powers a torch that gives out light and gets warm. Which is the useful transfer?","options":[{"t":"Energy transferred by radiation as light","correct":true},{"t":"Energy dissipated as heat","why":"The heat is the wasted transfer, not the useful one."},{"t":"Energy stored in the battery","why":"That is the start point; the useful output is the light."}],"ok":"The light is useful; the heating of the torch is wasted (dissipated)."},{"type":"mcq","q":"What happens to wasted energy in most transfers?","options":[{"t":"It is dissipated to the thermal store of the surroundings","correct":true},{"t":"It is destroyed","why":"Energy cannot be destroyed."},{"t":"It is stored back in the battery","why":"Wasted energy spreads out to the surroundings; it is not recovered."}],"ok":"Wasted energy is dissipated, usually heating the surroundings."},{"type":"tf","q":"In a closed system the total energy stays the same.","answer":true,"why":"A closed system has no net energy transfer in or out, so the total energy is constant."},{"type":"mcq","q":"A car slows down using its brakes. Where does the energy in the kinetic store go?","options":[{"t":"To the thermal store of the brakes and surroundings","correct":true},{"t":"It is destroyed by friction","why":"Friction transfers energy; it does not destroy it."},{"t":"To the chemical store of the fuel","why":"Braking does not refill the fuel store."}],"ok":"Friction transfers the kinetic store to thermal stores that get hot."}]},
"GE2":{"code":"GE2","title":"Kinetic & potential energy","discipline":"physics","blurb":"Calculating kinetic energy, gravitational potential energy and elastic potential energy.","vocab":[{"term":"kinetic energy","definition":"the energy of a moving object; it depends on mass and speed squared","say":"kin-et-ic"},{"term":"gravitational potential energy","definition":"the energy stored when an object is raised up in a gravitational field","say":"grav-it-ay-shun-al"},{"term":"elastic potential energy","definition":"the energy stored in a stretched or squashed spring","say":"ee-las-tic"}],"facts":["Kinetic energy = one half x mass x speed squared (Ek = 0.5 m v squared). Because speed is squared, doubling the speed gives four times the kinetic energy.","Gravitational potential energy = mass x gravitational field strength x height (Ep = m g h).","Elastic potential energy = one half x spring constant x extension squared (Ee = 0.5 k e squared), provided the limit of proportionality is not passed.","As an object falls (with no air resistance), its gravitational store empties into its kinetic store, and energy is conserved.","Energy is transferred by work: work done = force x distance, measured in joules."],"misconceptions":[{"wrong":"Doubling an object's speed doubles its kinetic energy.","right":"Kinetic energy depends on speed squared, so doubling the speed gives four times the kinetic energy."},{"wrong":"A heavier object at the same height has the same GPE.","right":"GPE = mgh, so more mass at the same height stores more energy."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"Calculate the kinetic energy of a 4 kg object moving at 5 m/s.","hint":"Ek = 0.5 x mass x speed squared","answer":50,"unit":"J","ok":"0.5 x 4 x 25 = 50 J."},{"type":"numeric","kicker":"Work it out","q":"A 1200 kg car travels at 10 m/s. What is its kinetic energy?","hint":"Ek = 0.5 x 1200 x 10 squared","answer":60000,"unit":"J","ok":"0.5 x 1200 x 100 = 60 000 J."},{"type":"mcq","q":"A van doubles its speed. How does its kinetic energy change?","options":[{"t":"It becomes four times bigger","correct":true},{"t":"It doubles","why":"Speed is squared, so the energy quadruples."},{"t":"It stays the same","why":"More speed means more kinetic energy."}],"ok":"Ek depends on speed squared, so x2 speed gives x4 energy."},{"type":"numeric","kicker":"Work it out","q":"How much gravitational potential energy is gained lifting a 3 kg bag 2 m? (g = 10 N/kg)","hint":"Ep = m x g x h","answer":60,"unit":"J","ok":"3 x 10 x 2 = 60 J."},{"type":"numeric","kicker":"Work it out","q":"A 0.5 kg ball is lifted to a shelf 1.8 m high. What is its GPE? (g = 10 N/kg)","hint":"Ep = m x g x h","answer":9,"unit":"J","ok":"0.5 x 10 x 1.8 = 9 J."},{"type":"numeric","kicker":"Work it out","q":"A spring has a spring constant of 200 N/m and is stretched 0.1 m. What is the elastic potential energy stored?","hint":"Ee = 0.5 x k x extension squared","answer":1,"unit":"J","ok":"0.5 x 200 x 0.1 squared = 0.5 x 200 x 0.01 = 1 J."},{"type":"mcq","q":"A ball falls from a shelf (ignore air resistance). What energy transfer happens?","options":[{"t":"Gravitational store to kinetic store","correct":true},{"t":"Kinetic store to gravitational store","why":"That is what happens going up, not falling down."},{"t":"Chemical store to kinetic store","why":"There is no chemical store involved in a falling ball."}],"ok":"Falling transfers the gravitational store into the kinetic store."},{"type":"tf","q":"Lifting a heavier object to the same height stores more gravitational potential energy.","answer":true,"why":"Ep = mgh, so a larger mass at the same height stores more energy."},{"type":"numeric","kicker":"Higher tier","q":"An object has 90 J of kinetic energy and a mass of 5 kg. Use Ek = 0.5 m v squared to find v squared.","hint":"Rearrange: v squared = (2 x Ek) / m = (2 x 90) / 5","answer":36,"unit":"(m/s)squared","ok":"v squared = 180 / 5 = 36, so v = 6 m/s."}]},
"GE3":{"code":"GE3","title":"Specific heat capacity","discipline":"physics","blurb":"What specific heat capacity means, the equation, and the required practical to measure it.","vocab":[{"term":"specific heat capacity","definition":"the energy needed to raise the temperature of 1 kg of a substance by 1 degree Celsius","say":"spe-sif-ic heat capacity"},{"term":"temperature change","definition":"how much the temperature rises or falls, in degrees Celsius","say":"temperature change"},{"term":"thermal energy","definition":"energy in the thermal store, linked to an object's temperature","say":"ther-mal energy"}],"facts":["Specific heat capacity is the energy needed to raise the temperature of 1 kg of a substance by 1 degree Celsius.","Energy for a temperature change = mass x specific heat capacity x temperature change (E = m c temperature-change).","Water has a high specific heat capacity of about 4200 J/kg degC, so it needs a lot of energy to heat up.","A substance with a high specific heat capacity heats up and cools down slowly.","Required practical: heat a known mass with an electric heater, measure the energy supplied (power x time) and the temperature rise, then use c = energy / (mass x temperature change).","Insulating the block reduces energy lost to the surroundings and makes the result more accurate."],"misconceptions":[{"wrong":"All materials need the same energy to heat up.","right":"Each material has its own specific heat capacity; water needs much more than most metals."},{"wrong":"Specific heat capacity is the same as temperature.","right":"It is the energy per kilogram per degree, not a temperature."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"How much energy raises 2 kg of water (c = 4200 J/kg degC) by 10 degC?","hint":"E = mass x c x temperature change","answer":84000,"unit":"J","ok":"2 x 4200 x 10 = 84 000 J."},{"type":"numeric","kicker":"Work it out","q":"How much energy raises 0.5 kg of aluminium (c = 900 J/kg degC) by 20 degC?","hint":"E = mass x c x temperature change","answer":9000,"unit":"J","ok":"0.5 x 900 x 20 = 9000 J."},{"type":"numeric","kicker":"Work it out","q":"A 2 kg metal block gains 18 000 J and rises by 20 degC. What is its specific heat capacity?","hint":"c = energy / (mass x temperature change)","answer":450,"unit":"J/kg degC","ok":"18 000 / (2 x 20) = 450 J/kg degC."},{"type":"numeric","kicker":"Work it out","q":"4200 J is given to 0.1 kg of water (c = 4200 J/kg degC). What is the temperature rise?","hint":"temperature change = energy / (mass x c)","answer":10,"unit":"degC","ok":"4200 / (0.1 x 4200) = 10 degC."},{"type":"mcq","q":"What does a high specific heat capacity tell you about a material?","options":[{"t":"It needs a lot of energy to change its temperature","correct":true},{"t":"It heats up very quickly","why":"A high value means it heats up slowly, needing lots of energy."},{"t":"It cannot store thermal energy","why":"A high value means it stores a lot of thermal energy."}],"ok":"High specific heat capacity = lots of energy needed per degree, so it heats and cools slowly."},{"type":"mcq","q":"In the required practical, how is the energy supplied by the heater found?","options":[{"t":"power of the heater x time it is on","correct":true},{"t":"mass x temperature change","why":"That is part of finding c, not the energy supplied."},{"t":"voltage x resistance","why":"Energy is power x time; this is not the right combination."}],"ok":"Energy = power x time, often read from a joulemeter or calculated."},{"type":"tf","q":"Wrapping the block in insulation makes the specific heat capacity result more accurate.","answer":true,"why":"Insulation reduces energy lost to the surroundings, so more of the energy goes into the block."}]},
"GE4":{"code":"GE4","title":"Power & efficiency","discipline":"physics","blurb":"Power as the rate of transfer, efficiency, and reducing unwanted energy transfers.","vocab":[{"term":"power","definition":"the rate of transferring energy or doing work, measured in watts","say":"pow-er"},{"term":"watt","definition":"the unit of power; 1 watt is 1 joule per second","say":"watt"},{"term":"efficiency","definition":"the fraction of input energy that is transferred usefully","say":"eff-ish-en-see"},{"term":"thermal conductivity","definition":"how quickly a material transfers thermal energy through it","say":"ther-mal con-duc-tiv-ity"},{"term":"lubrication","definition":"adding oil to reduce friction between moving parts","say":"loo-bri-cay-shun"}],"facts":["Power is the rate of transferring energy, or the rate of doing work: power = energy transferred / time (P = E / t).","Power is measured in watts (W), where 1 watt is 1 joule per second.","Efficiency = useful output energy transfer / total input energy transfer (x 100 for a percentage).","No device can be more than 100% efficient, because some input energy is always dissipated.","Unwanted energy transfers are reduced by lubrication (less friction), and by insulation using materials with a low thermal conductivity.","Thicker walls and lower thermal conductivity slow down the rate of heat transfer through them."],"misconceptions":[{"wrong":"A really good machine can be over 100% efficient.","right":"Some input energy is always dissipated, so efficiency is always below 100%."},{"wrong":"A more powerful device always transfers more energy in total.","right":"Power is the rate of transfer; total energy also depends on the time it runs (E = P x t)."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A motor transfers 9000 J in 30 s. What is its power?","hint":"power = energy / time","answer":300,"unit":"W","ok":"9000 / 30 = 300 W."},{"type":"numeric","kicker":"Work it out","q":"A 60 W lamp is on for 120 s. How much energy does it transfer?","hint":"energy = power x time","answer":7200,"unit":"J","ok":"60 x 120 = 7200 J."},{"type":"numeric","kicker":"Work it out","q":"A device takes in 200 J and usefully transfers 150 J. What is its efficiency as a percentage?","hint":"efficiency = useful / total x 100","answer":75,"unit":"%","ok":"150 / 200 x 100 = 75%."},{"type":"numeric","kicker":"Work it out","q":"A lamp takes in 50 J and wastes 40 J as heat. What is its efficiency as a percentage?","hint":"useful = 50 - 40 = 10 J; efficiency = useful / total x 100","answer":20,"unit":"%","ok":"Useful = 10 J, so 10 / 50 x 100 = 20%."},{"type":"tf","q":"No device can be more than 100% efficient.","answer":true,"why":"Some input energy is always dissipated, so the useful output is always less than the input."},{"type":"mcq","q":"Why does oiling the moving parts of a machine reduce wasted energy?","options":[{"t":"It reduces friction, so less energy is dissipated as heat","correct":true},{"t":"It increases the power input","why":"Oil reduces friction; it does not add power."},{"t":"It makes the machine heavier","why":"Mass is not the reason; reduced friction is."}],"ok":"Lubrication lowers friction, so less energy is wasted heating the parts."},{"type":"mcq","q":"Loft insulation reduces heat loss because it has a...","options":[{"t":"low thermal conductivity, so heat passes through it slowly","correct":true},{"t":"high thermal conductivity, so heat passes quickly","why":"Low conductivity is what slows heat loss."},{"t":"shiny surface that makes electricity","why":"Insulation slows conduction; it does not make electricity."}],"ok":"Low thermal conductivity means heat is transferred through it slowly."},{"type":"mcq","q":"Two house walls are the same material. Which loses heat more slowly?","options":[{"t":"The thicker wall","correct":true},{"t":"The thinner wall","why":"A thinner wall lets heat through faster."},{"t":"They lose heat at the same rate","why":"Thickness changes the rate of heat transfer."}],"ok":"A thicker wall (and lower thermal conductivity) slows the rate of heat transfer."}]},
"GE5":{"code":"GE5","title":"Energy resources","discipline":"physics","blurb":"Renewable and non-renewable resources, their uses, reliability and environmental impact.","vocab":[{"term":"renewable","definition":"a resource replenished by nature as fast as it is used","say":"ree-new-able"},{"term":"non-renewable","definition":"a resource used up faster than nature replaces it","say":"non-ree-new-able"},{"term":"fossil fuel","definition":"coal, oil or natural gas, formed over millions of years","say":"foss-il fuel"},{"term":"nuclear fuel","definition":"uranium or plutonium, used in nuclear power stations","say":"new-clee-ar fuel"},{"term":"biofuel","definition":"a renewable fuel made from plants or other living material","say":"by-oh-fuel"}],"facts":["Renewable resources are replenished as fast as we use them: wind, solar, hydroelectricity, tidal, wave, geothermal and biofuel.","Non-renewable resources run out: the fossil fuels (coal, oil, natural gas) and nuclear fuel (uranium).","Energy resources are used for transport, generating electricity and heating.","Fossil fuels are reliable and provide a lot of energy, but burning them releases carbon dioxide (a greenhouse gas) and other pollutants.","Renewables are low-carbon, but some (such as wind and solar) are less reliable because they depend on the weather.","The trend is towards using more renewable resources to cut carbon dioxide emissions, though it must be balanced against cost and reliability."],"misconceptions":[{"wrong":"Renewable means the same energy is reused over and over.","right":"Renewable means the resource itself is replaced by nature as fast as we use it."},{"wrong":"Nuclear power is a fossil fuel.","right":"Nuclear fuel (uranium) is non-renewable but it is not a fossil fuel, and it does not release carbon dioxide."}],"questions":[{"type":"categorise","q":"Sort each resource as renewable or non-renewable.","bins":["Renewable","Non-renewable"],"items":[{"t":"Wind","bin":"Renewable"},{"t":"Coal","bin":"Non-renewable"},{"t":"Solar","bin":"Renewable"},{"t":"Nuclear (uranium)","bin":"Non-renewable"},{"t":"Tidal","bin":"Renewable"},{"t":"Natural gas","bin":"Non-renewable"}],"ok":"Renewables are replaced as fast as used; fossil and nuclear fuels are not.","bad":"Fossil fuels and nuclear fuel are non-renewable; wind, solar and tidal are renewable."},{"type":"multi","q":"Tap all the renewable energy resources.","items":[{"t":"Hydroelectricity","correct":true},{"t":"Geothermal","correct":true},{"t":"Biofuel","correct":true},{"t":"Coal"},{"t":"Wave","correct":true}],"ok":"Hydroelectric, geothermal, biofuel and wave power are all renewable.","bad":"Coal is a non-renewable fossil fuel."},{"type":"mcq","q":"Why is burning fossil fuels a problem for the environment?","options":[{"t":"It releases carbon dioxide, a greenhouse gas","correct":true},{"t":"It uses up sunlight","why":"Fossil fuels do not use sunlight."},{"t":"It makes no waste at all","why":"Burning fossil fuels releases carbon dioxide and pollutants."}],"ok":"Burning fossil fuels releases carbon dioxide and other pollutants."},{"type":"mcq","q":"What is a disadvantage of wind power?","options":[{"t":"It is unreliable — no electricity when there is no wind","correct":true},{"t":"It releases lots of carbon dioxide","why":"Wind power is low-carbon."},{"t":"It uses up a fossil fuel","why":"Wind is renewable, not a fossil fuel."}],"ok":"Wind is renewable and low-carbon, but it depends on the weather, so it is less reliable."},{"type":"tf","q":"Nuclear power stations release a lot of carbon dioxide as they generate electricity.","answer":false,"why":"Nuclear power does not burn fuel, so it releases very little carbon dioxide; its main issue is radioactive waste."},{"type":"mcq","q":"Why is coal described as non-renewable?","options":[{"t":"It forms over millions of years, far slower than we use it","correct":true},{"t":"It cannot be burned","why":"Coal is burned as a fuel."},{"t":"It contains no energy","why":"Coal stores chemical energy that we release by burning."}],"ok":"Fossil fuels are used much faster than nature replaces them."},{"type":"mcq","q":"What is the overall trend in the use of energy resources?","options":[{"t":"Increasing use of renewables to reduce carbon dioxide emissions","correct":true},{"t":"Switching back to more coal","why":"The trend is away from fossil fuels."},{"t":"Stopping all electricity generation","why":"Generation continues; the shift is towards renewables."}],"ok":"Use of renewables is increasing to cut greenhouse gas emissions."}]},
