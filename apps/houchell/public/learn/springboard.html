yme, changing the active site so the substrate no longer fits."},{"type":"categorise","q":"Match each digestive enzyme to what it breaks down.","bins":["Starch","Proteins","Lipids"],"items":[{"t":"Amylase (carbohydrase)","bin":"Starch"},{"t":"Protease","bin":"Proteins"},{"t":"Lipase","bin":"Lipids"}],"ok":"Carbohydrase digests starch, protease digests proteins, lipase digests lipids.","bad":"Amylase: starch. Protease: protein. Lipase: lipids."},{"type":"mcq","q":"Which food test uses iodine solution?","options":[{"t":"The test for starch (turns blue-black)","correct":true},{"t":"The test for protein","why":"Protein is tested with biuret solution."},{"t":"The test for sugar","why":"Sugar is tested with Benedict's solution."}],"ok":"Iodine turns blue-black in the presence of starch."},{"type":"mcq","q":"Benedict's solution is heated with a food and turns brick-red. What does this show?","options":[{"t":"Sugar is present","correct":true},{"t":"Starch is present","why":"Starch is tested with iodine."},{"t":"Protein is present","why":"Protein is tested with biuret solution."}],"ok":"A brick-red colour with Benedict's solution shows sugar."},{"type":"tf","q":"Enzymes are used up in the reactions they catalyse.","answer":false,"why":"Enzymes are catalysts; they are not used up and can be reused."}]},"GBO2":{"code":"GBO2","title":"Circulatory system & health","discipline":"biology","blurb":"The heart, blood vessels and blood, plus non-communicable disease and risk factors.","diagram":{"key":"d_GBO2","map":[["heart","lungs","body"],["artery","vein","capillary"],"bloodComposition","coronaryArtery",null]},"vocab":[{"term":"artery","definition":"a blood vessel that carries blood away from the heart at high pressure","say":"ar-ter-ee"},{"term":"vein","definition":"a blood vessel that carries blood back to the heart, with valves","say":"vayn"},{"term":"capillary","definition":"a tiny blood vessel where substances are exchanged with cells","say":"cap-ill-ar-ee"},{"term":"non-communicable disease","definition":"a disease that is not caused by a pathogen and is not spread","say":"non-com-yoon-ic-a-bul"}],"facts":["The heart pumps blood around a double circulatory system: one loop to the lungs and one to the rest of the body.","Arteries carry blood away from the heart at high pressure and have thick, muscular walls; veins carry blood back at low pressure and have valves; capillaries have very thin walls for exchanging substances.","Blood is made of red blood cells (carry oxygen), white blood cells (fight pathogens), platelets (help clotting) and plasma (carries dissolved substances).","Coronary heart disease happens when the coronary arteries narrow with fatty deposits, reducing blood flow to the heart muscle; it can be treated with stents or statins.","Non-communicable diseases are not caused by pathogens; risk factors include smoking, poor diet, lack of exercise and alcohol, which can raise the chance of conditions such as cancer."],"misconceptions":[{"wrong":"All arteries carry oxygen-rich blood.","right":"Most do, but the pulmonary artery carries deoxygenated blood to the lungs; arteries are defined by carrying blood AWAY from the heart."},{"wrong":"Non-communicable diseases can be caught from other people.","right":"Non-communicable diseases are not caused by pathogens and are not spread; risk factors like diet and smoking raise the chance of them."}],"questions":[{"type":"mcq","q":"What is the job of an artery?","options":[{"t":"To carry blood away from the heart at high pressure","correct":true},{"t":"To carry blood back to the heart","why":"That is a vein."},{"t":"To exchange substances with cells","why":"That is a capillary."}],"ok":"Arteries carry blood away from the heart at high pressure."},{"type":"mcq","q":"Which blood vessel has valves to stop blood flowing backwards?","options":[{"t":"Veins","correct":true},{"t":"Arteries","why":"Arteries are at high pressure and do not need valves."},{"t":"Capillaries","why":"Capillaries are tiny exchange vessels, without valves."}],"ok":"Veins have valves because blood in them is at low pressure."},{"type":"mcq","q":"What do red blood cells do?","options":[{"t":"Carry oxygen around the body","correct":true},{"t":"Fight pathogens","why":"That is the job of white blood cells."},{"t":"Help blood to clot","why":"That is the job of platelets."}],"ok":"Red blood cells carry oxygen, using haemoglobin."},{"type":"categorise","q":"Match each blood component to its job.","bins":["Carry oxygen","Fight pathogens","Help clotting","Carry dissolved substances"],"items":[{"t":"Red blood cells","bin":"Carry oxygen"},{"t":"White blood cells","bin":"Fight pathogens"},{"t":"Platelets","bin":"Help clotting"},{"t":"Plasma","bin":"Carry dissolved substances"}],"ok":"Each part of the blood has a distinct role.","bad":"Red cells: oxygen. White cells: defence. Platelets: clotting. Plasma: transport."},{"type":"mcq","q":"What causes coronary heart disease?","options":[{"t":"Fatty deposits narrow the coronary arteries, reducing blood flow to the heart","correct":true},{"t":"A virus infects the heart","why":"Coronary heart disease is non-communicable, not from a pathogen."},{"t":"Too many red blood cells","why":"It is caused by narrowed coronary arteries."}],"ok":"Fatty deposits narrow the coronary arteries, reducing the heart muscle's blood supply."},{"type":"multi","q":"Tap the risk factors for non-communicable diseases.","items":[{"t":"Smoking","correct":true},{"t":"Poor diet","correct":true},{"t":"Lack of exercise","correct":true},{"t":"Being vaccinated"}],"ok":"Smoking, poor diet, inactivity and alcohol all raise the risk of non-communicable disease.","bad":"Vaccination protects against communicable disease; it is not a risk factor."},{"type":"tf","q":"Coronary heart disease is a communicable disease that can be caught from others.","answer":false,"why":"Coronary heart disease is non-communicable; it is not caused by a pathogen and cannot be spread."}]},"GBO3":{"code":"GBO3","title":"Plant tissues & transport","discipline":"biology","blurb":"Plant organs and tissues, transpiration and translocation.","diagram":{"key":"d_GBO3","map":[["leaf","stem","root"],"xylem","phloem",["stomata","transpirationStream"],null]},"vocab":[{"term":"xylem","definition":"plant tissue that carries water and minerals up from the roots","say":"zy-lem"},{"term":"phloem","definition":"plant tissue that carries dissolved sugars around the plant","say":"floh-em"},{"term":"transpiration","definition":"the loss of water vapour from a plant's leaves","say":"tran-spir-ay-shun"},{"term":"stomata","definition":"tiny holes in a leaf that let gases in and out","say":"stoh-ma-ta"}],"facts":["Plant organs include roots, stems and leaves; the leaf is an organ for photosynthesis.","Xylem tissue carries water and dissolved minerals up from the roots to the leaves; it is made of dead, hollow cells.","Phloem tissue carries dissolved sugars made in the leaves to the rest of the plant (translocation); it is made of living cells.","Transpiration is the loss of water vapour from the leaves, mostly through the stomata; it pulls water up through the xylem (the transpiration stream).","The rate of transpiration increases with higher temperature, more air movement (wind), lower humidity and brighter light (which opens the stomata)."],"misconceptions":[{"wrong":"Xylem carries sugars and phloem carries water.","right":"Xylem carries water and minerals up; phloem carries dissolved sugars around the plant."},{"wrong":"Transpiration only happens in bright sunlight.","right":"It happens whenever stomata are open; its rate changes with temperature, wind, humidity and light."}],"questions":[{"type":"mcq","q":"What does xylem tissue carry?","options":[{"t":"Water and dissolved minerals, up from the roots","correct":true},{"t":"Dissolved sugars","why":"That is phloem."},{"t":"Oxygen only","why":"Xylem carries water and minerals, not oxygen."}],"ok":"Xylem carries water and minerals up from the roots."},{"type":"mcq","q":"What does phloem tissue carry?","options":[{"t":"Dissolved sugars around the plant","correct":true},{"t":"Water up from the roots","why":"That is xylem."},{"t":"Minerals only","why":"Phloem carries sugars made in the leaves."}],"ok":"Phloem carries dissolved sugars (translocation)."},{"type":"mcq","q":"What is transpiration?","options":[{"t":"The loss of water vapour from a plant's leaves","correct":true},{"t":"The making of sugar in the leaf","why":"That is photosynthesis."},{"t":"The movement of sugars in phloem","why":"That is translocation."}],"ok":"Transpiration is water vapour leaving the leaves, mostly through the stomata."},{"type":"mcq","q":"Through which structures does most water vapour leave a leaf?","options":[{"t":"The stomata","correct":true},{"t":"The xylem","why":"Xylem carries water inside the plant; it does not release vapour."},{"t":"The roots","why":"Water is lost from the leaves, not released as vapour from roots."}],"ok":"Most water vapour is lost through the stomata in the leaf."},{"type":"multi","q":"Tap the conditions that increase the rate of transpiration.","items":[{"t":"Higher temperature","correct":true},{"t":"More wind (air movement)","correct":true},{"t":"Brighter light","correct":true},{"t":"Higher humidity"}],"ok":"Heat, wind and light speed transpiration; high humidity slows it.","bad":"High humidity reduces transpiration, because the air is already moist."},{"type":"tf","q":"Phloem is made of living cells, while xylem is made of dead, hollow cells.","answer":true,"why":"Phloem cells are living and transport sugars; xylem is dead, hollow tissue that carries water."},{"type":"mcq","q":"What is translocation?","options":[{"t":"The transport of dissolved sugars in the phloem","correct":true},{"t":"The loss of water from leaves","why":"That is transpiration."},{"t":"The uptake of minerals by roots","why":"That is absorption, not translocation."}],"ok":"Translocation is the movement of dissolved sugars through the phloem."}]},"GBO-EX":{"code":"GBO-EX","title":"Organisation — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Organisation.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"An enzyme stops working after a solution is heated to 80 degC. Why?","options":[{"t":"The high temperature has denatured it, changing the active site","correct":true},{"t":"It has run out of substrate","why":"Heating denatures the enzyme regardless of substrate."},{"t":"It has turned into a sugar","why":"Enzymes do not turn into sugars."}],"ok":"High temperature denatures the enzyme, so the substrate no longer fits the active site."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the structures of arteries, veins and capillaries are each adapted to their function.","scheme":["Arteries carry blood away from the heart at high pressure (1)","so they have thick, muscular/elastic walls to withstand it (1)","Veins carry blood back at low pressure (1)","so they have valves to stop blood flowing backwards (1)","Capillaries exchange substances with cells (1)","so they have very thin (one-cell-thick) walls for a short diffusion distance (1)"],"model":"Arteries carry blood away from the heart at high pressure, so they have thick, muscular and elastic walls. Veins carry blood back at low pressure, so they have valves to prevent backflow. Capillaries exchange substances with cells, so they have walls only one cell thick to give a short diffusion distance."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain how lifestyle factors can increase a person's risk of a non-communicable disease.","scheme":["Non-communicable diseases are not caused by pathogens (1)","Risk factors such as smoking, poor diet, inactivity or alcohol (1)","increase the chance of developing the disease (1)","e.g. smoking increases the risk of lung cancer / poor diet increases heart disease (1)"],"model":"Non-communicable diseases are not caused by pathogens, but lifestyle risk factors raise the chance of getting them. For example, smoking increases the risk of lung cancer, and a poor diet and lack of exercise increase the risk of heart disease."}]},"GBI1":{"code":"GBI1","title":"Pathogens & disease","discipline":"biology","blurb":"The types of pathogen, the diseases they cause, and how disease spreads.","diagram":{"key":"d_GBI1","map":["pathogenTypes",["virus","hostCell"],null,["droplet","mosquito"],"vaccine"]},"vocab":[{"term":"pathogen","definition":"a microorganism that causes a communicable (infectious) disease","say":"path-o-jen"},{"term":"communicable disease","definition":"a disease that can be spread from one organism to another","say":"com-yoon-ic-a-bul"},{"term":"virus","definition":"a tiny pathogen that reproduces inside the cells it infects","say":"vy-russ"}],"facts":["A pathogen is a microorganism that causes a communicable (infectious) disease; pathogens can be bacteria, viruses, fungi or protists.","Bacteria can make you ill by producing toxins; viruses reproduce inside your cells and damage them.","Examples: measles and HIV are caused by viruses; salmonella food poisoning is bacterial; rose black spot is a fungal disease; malaria is caused by a protist spread by mosquitoes.","Pathogens spread by direct contact, in water, in the air (droplets), or by vectors such as insects.","Spread can be reduced by good hygiene, destroying vectors, isolating infected people and vaccination."],"misconceptions":[{"wrong":"Antibiotics kill viruses.","right":"Antibiotics kill bacteria, not viruses; viral diseases cannot be treated with antibiotics."},{"wrong":"All pathogens are bacteria.","right":"Pathogens can be bacteria, viruses, fungi or protists."}],"questions":[{"type":"mcq","q":"What is a pathogen?","options":[{"t":"A microorganism that causes a communicable disease","correct":true},{"t":"A type of white blood cell","why":"White blood cells fight pathogens; they are not pathogens."},{"t":"A vaccine","why":"A vaccine protects against pathogens."}],"ok":"A pathogen is a microorganism that causes infectious disease."},{"type":"categorise","q":"Match each disease to the type of pathogen that causes it.","bins":["Virus","Bacterium","Fungus","Protist"],"items":[{"t":"Measles","bin":"Virus"},{"t":"Salmonella","bin":"Bacterium"},{"t":"Rose black spot","bin":"Fungus"},{"t":"Malaria","bin":"Protist"}],"ok":"Pathogens can be viruses, bacteria, fungi or protists.","bad":"Measles: virus. Salmonella: bacterium. Rose black spot: fungus. Malaria: protist."},{"type":"mcq","q":"How do many bacteria make you feel ill?","options":[{"t":"They produce toxins that damage cells","correct":true},{"t":"They photosynthesise inside you","why":"Bacteria do not photosynthesise inside the body."},{"t":"They are too big to move","why":"Bacteria are tiny; illness is from toxins."}],"ok":"Many bacteria release toxins that make you ill."},{"type":"mcq","q":"How is malaria spread?","options":[{"t":"By mosquitoes acting as vectors","correct":true},{"t":"Through the air by coughing","why":"Malaria is spread by mosquito vectors, not droplets."},{"t":"By eating contaminated food","why":"That is how salmonella spreads, not malaria."}],"ok":"Malaria is caused by a protist spread by mosquito vectors."},{"type":"multi","q":"Tap ways the spread of disease can be reduced.","items":[{"t":"Good hygiene / hand washing","correct":true},{"t":"Vaccination","correct":true},{"t":"Isolating infected people","correct":true},{"t":"Sharing drinking cups"}],"ok":"Hygiene, vaccination, isolation and vector control all reduce spread.","bad":"Sharing cups spreads pathogens, rather than reducing the spread."},{"type":"tf","q":"Antibiotics can be used to cure a viral disease such as measles.","answer":false,"why":"Antibiotics only kill bacteria; they have no effect on viruses."},{"type":"mcq","q":"Why does a virus damage the body?","options":[{"t":"It reproduces inside cells and damages them","correct":true},{"t":"It photosynthesises","why":"Viruses do not photosynthesise."},{"t":"It is a type of white blood cell","why":"Viruses are pathogens, not white blood cells."}],"ok":"Viruses reproduce inside host cells, damaging or destroying them."}]},"GBI2":{"code":"GBI2","title":"Defence & medicines","discipline":"biology","blurb":"The body's defences, the immune system, vaccination and developing drugs.","diagram":{"key":"d_GBI2","map":[["skin","airwayCilia","stomachAcid"],["whiteBloodCell","pathogen"],null,"antibiotic","drugTrial"]},"vocab":[{"term":"immune system","definition":"the body's defence that destroys pathogens, using white blood cells","say":"im-yoon system"},{"term":"antibody","definition":"a protein made by white blood cells that targets a specific pathogen","say":"an-ti-bod-ee"},{"term":"vaccination","definition":"giving a harmless form of a pathogen to make the body immune","say":"vac-sin-ay-shun"},{"term":"antibiotic","definition":"a medicine that kills bacteria inside the body","say":"an-ti-by-ot-ic"}],"facts":["The body's first defences keep pathogens out: the skin, mucus and cilia in the airways, and acid in the stomach.","If pathogens get in, white blood cells defend the body by engulfing them (phagocytosis), producing antibodies, and producing antitoxins.","Vaccination introduces a small, harmless amount of a pathogen, so the white blood cells make antibodies; if the real pathogen invades later, the body responds quickly.","Antibiotics kill bacteria inside the body, but they do not work against viruses; overuse has led to resistant bacteria such as MRSA.","New drugs are tested for safety (toxicity), the right dose and effectiveness (efficacy) in preclinical and then clinical trials, often using placebos and double-blind tests."],"misconceptions":[{"wrong":"A vaccine gives you the full disease to fight off.","right":"A vaccine gives a small, harmless amount of the pathogen so the body makes antibodies without becoming seriously ill."},{"wrong":"Painkillers cure the disease.","right":"Painkillers treat the symptoms; they do not kill the pathogen."}],"questions":[{"type":"mcq","q":"How do white blood cells defend against pathogens?","options":[{"t":"By engulfing them, and making antibodies and antitoxins","correct":true},{"t":"By photosynthesising","why":"White blood cells do not photosynthesise."},{"t":"By carrying oxygen","why":"That is red blood cells, not white blood cells."}],"ok":"White blood cells engulf pathogens and produce antibodies and antitoxins."},{"type":"mcq","q":"How does a vaccine make you immune?","options":[{"t":"It introduces a harmless form of the pathogen so antibodies are made","correct":true},{"t":"It kills all bacteria in the body","why":"Vaccines trigger antibody production, not kill all bacteria."},{"t":"It replaces your white blood cells","why":"Vaccines stimulate your own white blood cells."}],"ok":"A vaccine triggers white blood cells to make antibodies, ready for the real pathogen."},{"type":"mcq","q":"What do antibiotics kill?","options":[{"t":"Bacteria","correct":true},{"t":"Viruses","why":"Antibiotics do not work on viruses."},{"t":"All pathogens","why":"Antibiotics work on bacteria only."}],"ok":"Antibiotics kill bacteria, but not viruses."},{"type":"mcq","q":"Why is the overuse of antibiotics a problem?","options":[{"t":"It leads to resistant bacteria, such as MRSA","correct":true},{"t":"It makes viruses stronger","why":"Antibiotics do not affect viruses."},{"t":"It boosts the immune system too much","why":"Overuse causes resistance, not an overactive immune system."}],"ok":"Overusing antibiotics has led to antibiotic-resistant bacteria."},{"type":"multi","q":"Tap the body's first-line defences that keep pathogens out.","items":[{"t":"The skin","correct":true},{"t":"Mucus and cilia in the airways","correct":true},{"t":"Stomach acid","correct":true},{"t":"Antibodies in a vaccine"}],"ok":"Skin, mucus, cilia and stomach acid are first-line defences.","bad":"Antibodies are part of the immune response, not a first-line barrier."},{"type":"tf","q":"Painkillers kill the pathogen causing a disease.","answer":false,"why":"Painkillers relieve symptoms; they do not kill the pathogen."},{"type":"order","q":"Put the stages of testing a new drug in order.","items":["Preclinical testing on cells and tissues","Testing on animals","Clinical trials on healthy volunteers","Clinical trials on patients"],"ok":"Drugs are tested on cells/tissues, then animals, then healthy volunteers, then patients."}]},"GBI-EX":{"code":"GBI-EX","title":"Infection — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Infection and response.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A doctor refuses to give antibiotics for a patient's cold. Why?","options":[{"t":"A cold is caused by a virus, and antibiotics do not kill viruses","correct":true},{"t":"Antibiotics are too expensive","why":"The reason is that antibiotics do not work on viruses."},{"t":"Colds cannot be treated at all","why":"Symptoms can be eased; antibiotics just will not help."}],"ok":"Colds are viral, and antibiotics only kill bacteria."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how vaccination protects a person from a disease and how it can protect a whole population.","scheme":["A vaccine contains a small/harmless amount of the pathogen (1)","White blood cells respond by producing antibodies (1)","and memory cells remain in the body (1)","If the real pathogen invades, antibodies are produced quickly and in large numbers (1)","so the person does not become ill (immunity) (1)","If most people are vaccinated, the pathogen cannot spread easily (herd immunity), protecting others (1)"],"model":"A vaccine introduces a small, harmless amount of the pathogen. White blood cells respond by making antibodies and memory cells. If the real pathogen later invades, antibodies are produced quickly and in large numbers, so the person does not become ill. If most of the population is vaccinated, the pathogen cannot spread easily, protecting even those who are not vaccinated (herd immunity)."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe why new medicines are tested in clinical trials before they are used widely.","scheme":["To check the drug is safe / not too toxic (1)","To find the most effective dose (1)","To check it actually works (efficacy) (1)","Trials may use a placebo / be double-blind to give fair, reliable results (1)"],"model":"Clinical trials check that a new medicine is safe (low toxicity), find the correct dose, and confirm it is effective. Using a placebo and a double-blind design makes the results fair and reliable before the drug is used widely."}]},"GBE1":{"code":"GBE1","title":"Photosynthesis","discipline":"biology","blurb":"The photosynthesis reaction, limiting factors, and what plants do with the glucose.","diagram":{"key":"d_GBE1","map":[["sunlight","chlorophyll","leaf","carbonDioxide","water","oxygen"],null,null,null,"starch"]},"vocab":[{"term":"photosynthesis","definition":"the reaction in which plants make glucose using light energy","say":"foh-toh-sin-the-sis"},{"term":"chlorophyll","definition":"the green pigment in chloroplasts that absorbs light","say":"klor-oh-fill"},{"term":"limiting factor","definition":"a factor that, when in short supply, holds back the rate of photosynthesis","say":"lim-it-ing factor"}],"facts":["Photosynthesis is an endothermic reaction: carbon dioxide + water make glucose + oxygen, using light energy absorbed by chlorophyll.","The rate of photosynthesis is affected by limiting factors: light intensity, carbon dioxide concentration and temperature.","As light intensity, carbon dioxide or temperature increases, the rate rises until another factor becomes limiting; too high a temperature denatures the enzymes.","Required practical: investigate how light intensity affects the rate of photosynthesis (for example by counting bubbles of oxygen from pondweed).","Plants use the glucose for respiration, to make cellulose for cell walls, to make amino acids (with nitrate), and to store as starch or convert to fats and oils."],"misconceptions":[{"wrong":"Plants only respire at night and photosynthesise in the day.","right":"Plants respire all the time; they also photosynthesise when there is light."},{"wrong":"Photosynthesis releases energy.","right":"Photosynthesis takes IN energy (endothermic), storing it in glucose."}],"questions":[{"type":"mcq","q":"What are the products of photosynthesis?","options":[{"t":"Glucose and oxygen","correct":true},{"t":"Carbon dioxide and water","why":"Those are the reactants, not the products."},{"t":"Glucose and carbon dioxide","why":"Oxygen is produced, not carbon dioxide."}],"ok":"Carbon dioxide + water make glucose + oxygen."},{"type":"mcq","q":"Where is light energy absorbed for photosynthesis?","options":[{"t":"By chlorophyll in the chloroplasts","correct":true},{"t":"By the cell wall","why":"The cell wall supports the cell; chlorophyll absorbs light."},{"t":"By the mitochondria","why":"Mitochondria are for respiration, not photosynthesis."}],"ok":"Chlorophyll in the chloroplasts absorbs the light energy."},{"type":"multi","q":"Tap the limiting factors of photosynthesis.","items":[{"t":"Light intensity","correct":true},{"t":"Carbon dioxide concentration","correct":true},{"t":"Temperature","correct":true},{"t":"Oxygen concentration"}],"ok":"Light, carbon dioxide and temperature can all limit the rate.","bad":"Oxygen is a product, not a limiting factor of photosynthesis."},{"type":"mcq","q":"What happens to the rate of photosynthesis if the temperature gets too high?","options":[{"t":"It falls, because the enzymes denature","correct":true},{"t":"It keeps rising forever","why":"Too high a temperature denatures the enzymes, lowering the rate."},{"t":"It is unaffected","why":"High temperature denatures enzymes, so the rate falls."}],"ok":"Above the optimum, the enzymes denature and the rate falls."},{"type":"mcq","q":"What is one use a plant makes of the glucose from photosynthesis?","options":[{"t":"To make cellulose for cell walls","correct":true},{"t":"To absorb sunlight","why":"Sunlight is absorbed by chlorophyll, not glucose."},{"t":"To act as a pathogen","why":"Glucose is a food molecule, not a pathogen."}],"ok":"Glucose is used for respiration, cellulose, amino acids and stored as starch."},{"type":"tf","q":"Photosynthesis is an endothermic reaction.","answer":true,"why":"Photosynthesis takes in (absorbs) light energy, so it is endothermic."},{"type":"mcq","q":"In the required practical, how can the rate of photosynthesis be measured?","options":[{"t":"By counting the bubbles of oxygen given off by pondweed","correct":true},{"t":"By weighing the light","why":"Light cannot be weighed; you measure oxygen produced."},{"t":"By measuring the pH of the air","why":"Bubble counting measures the oxygen produced."}],"ok":"Counting oxygen bubbles from pondweed measures the rate of photosynthesis."}]},"GBE2":{"code":"GBE2","title":"Respiration","discipline":"biology","blurb":"Aerobic and anaerobic respiration, and the body's response to exercise.","diagram":{"key":"d_GBE2","map":[["cell","glucose","energy"],["oxygen","aerobicProducts"],"lacticAcid",null,null]},"vocab":[{"term":"aerobic respiration","definition":"respiration that uses oxygen to release energy from glucose","say":"air-oh-bic"},{"term":"anaerobic respiration","definition":"respiration without oxygen, releasing less energy","say":"an-air-oh-bic"},{"term":"metabolism","definition":"all the chemical reactions happening in a body's cells","say":"me-tab-o-liz-um"}],"facts":["Respiration is an exothermic reaction, happening continuously in all living cells, that releases energy from glucose.","Aerobic respiration uses oxygen: glucose + oxygen make carbon dioxide + water, releasing a lot of energy.","Anaerobic respiration happens without oxygen and releases much less energy; in muscles it produces lactic acid, and in yeast it produces ethanol and carbon dioxide (fermentation).","During exercise the heart rate and breathing rate increase to supply more oxygen and glucose and remove carbon dioxide.","Metabolism is the sum of all the reactions in a cell or body, including building larger molecules and breaking them down."],"misconceptions":[{"wrong":"Respiration is the same as breathing.","right":"Breathing moves air in and out; respiration is the chemical reaction in cells that releases energy."},{"wrong":"Anaerobic respiration releases more energy than aerobic.","right":"Anaerobic respiration releases much LESS energy than aerobic respiration."}],"questions":[{"type":"mcq","q":"What is the word equation for aerobic respiration?","options":[{"t":"glucose + oxygen make carbon dioxide + water","correct":true},{"t":"carbon dioxide + water make glucose + oxygen","why":"That is photosynthesis."},{"t":"glucose makes lactic acid","why":"That is anaerobic respiration in muscles."}],"ok":"Aerobic respiration: glucose + oxygen make carbon dioxide + water."},{"type":"mcq","q":"How does anaerobic respiration compare with aerobic respiration?","options":[{"t":"It releases much less energy","correct":true},{"t":"It releases much more energy","why":"Anaerobic respiration releases less energy."},{"t":"It releases the same energy","why":"Aerobic respiration releases far more energy."}],"ok":"Anaerobic respiration releases much less energy than aerobic respiration."},{"type":"mcq","q":"What does anaerobic respiration produce in human muscles?","options":[{"t":"Lactic acid","correct":true},{"t":"Carbon dioxide and water","why":"Those are aerobic respiration products."},{"t":"Ethanol","why":"Ethanol is produced by yeast, not human muscles."}],"ok":"In muscles, anaerobic respiration produces lactic acid."},{"type":"mcq","q":"What does anaerobic respiration in yeast produce?","options":[{"t":"Ethanol and carbon dioxide","correct":true},{"t":"Lactic acid","why":"That is what happens in human muscles."},{"t":"Oxygen","why":"Anaerobic respiration does not use or produce oxygen."}],"ok":"In yeast, anaerobic respiration (fermentation) produces ethanol and carbon dioxide."},{"type":"mcq","q":"Why does heart rate increase during exercise?","options":[{"t":"To supply muscles with more oxygen and glucose and remove carbon dioxide","correct":true},{"t":"To cool the body down","why":"Heart rate rises to supply muscles, not mainly to cool down."},{"t":"To stop respiration","why":"Exercise increases respiration, not stops it."}],"ok":"A faster heart rate supplies more oxygen and glucose and removes carbon dioxide."},{"type":"tf","q":"Respiration only happens in animal cells.","answer":false,"why":"Respiration happens in all living cells, including plant cells, all the time."},{"type":"tf","q":"Respiration is an exothermic reaction.","answer":true,"why":"Respiration releases energy from glucose, so it is exothermic."}]},"GBE-EX":{"code":"GBE-EX","title":"Bioenergetics — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Bioenergetics.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A pondweed gives off more oxygen bubbles when a lamp is moved closer. Why?","options":[{"t":"More light increases the rate of photosynthesis","correct":true},{"t":"The water gets warmer, stopping photosynthesis","why":"More light raises the rate; the effect here is light intensity."},{"t":"Carbon dioxide is removed","why":"Bringing the lamp closer increases light, not removes carbon dioxide."}],"ok":"Higher light intensity increases the rate of photosynthesis, so more oxygen is produced."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"A student investigates how light intensity affects the rate of photosynthesis using pondweed. Describe a method, including how to change and measure the variables.","scheme":["Place pondweed in water with a lamp at a set distance (1)","Change the light intensity by moving the lamp to different distances (1)","Count the oxygen bubbles given off in a fixed time (or measure volume of gas) (1)","Repeat at each distance and take a mean (1)","Control variables: same pondweed, same temperature, same time (1)","As light intensity increases, the rate (bubbles per minute) increases until another factor limits it (1)"],"model":"Place pondweed in water and shine a lamp at a set distance. Change the light intensity by moving the lamp to measured distances, and count the oxygen bubbles given off in a fixed time at each distance, repeating for a mean. Keep the temperature, the pondweed and the time the same. The rate increases as light intensity increases until another factor becomes limiting."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Compare aerobic and anaerobic respiration in human cells.","scheme":["Aerobic respiration uses oxygen; anaerobic does not (1)","Aerobic produces carbon dioxide and water; anaerobic produces lactic acid (1)","Aerobic releases much more energy than anaerobic (1)","Anaerobic happens when oxygen runs low, e.g. during hard exercise (1)"],"model":"Aerobic respiration uses oxygen and produces carbon dioxide and water, releasing a lot of energy. Anaerobic respiration happens without oxygen (e.g. during hard exercise), produces lactic acid, and releases much less energy."}]},"GBH1":{"code":"GBH1","title":"Homeostasis & the nervous system","discipline":"biology","blurb":"Keeping conditions stable, and how nerves and reflexes work.","diagram":{"key":"d_GBH1","map":[null,["receptor","coordinationCentre","effector"],["sensoryNeurone","motorNeurone"],"synapse",null]},"vocab":[{"term":"homeostasis","definition":"keeping a stable internal environment in the body","say":"hoh-mee-oh-stay-sis"},{"term":"receptor","definition":"a cell that detects a stimulus (a change)","say":"ree-sep-tor"},{"term":"reflex action","definition":"a fast, automatic response that does not involve the conscious brain","say":"ree-fleks"},{"term":"synapse","definition":"the tiny gap between two neurones","say":"sy-naps"}],"facts":["Homeostasis is keeping a stable internal environment (such as temperature, blood glucose and water levels) despite changes inside or outside the body.","A control system has receptors that detect a stimulus, a coordination centre (such as the brain or spinal cord), and effectors (muscles or glands) that bring about a response.","The nervous system lets us react to surroundings: stimulus, receptor, sensory neurone, coordination centre, motor neurone, effector, response.","A reflex action is fast and automatic to protect the body; the signal passes through the spinal cord without involving the conscious brain (a reflex arc).","At a synapse, a chemical is released that diffuses across the gap and starts a new impulse in the next neurone."],"misconceptions":[{"wrong":"Reflexes are controlled by the conscious brain.","right":"Reflex actions are automatic and bypass the conscious brain, which makes them fast and protective."},{"wrong":"Nerve impulses jump across synapses electrically.","right":"At a synapse a chemical diffuses across the gap to start the next impulse."}],"questions":[{"type":"mcq","q":"What is homeostasis?","options":[{"t":"Keeping a stable internal environment in the body","correct":true},{"t":"Fighting off pathogens","why":"That is the immune response."},{"t":"Making glucose from light","why":"That is photosynthesis."}],"ok":"Homeostasis keeps internal conditions stable."},{"type":"order","q":"Put the parts of the nervous pathway in order.","items":["Stimulus","Receptor","Sensory neurone","Coordination centre","Motor neurone","Effector"],"ok":"Stimulus, receptor, sensory neurone, coordination centre, motor neurone, then effector."},{"type":"mcq","q":"What is a reflex action?","options":[{"t":"A fast, automatic response that bypasses the conscious brain","correct":true},{"t":"A slow, thought-out response","why":"Reflexes are fast and automatic, not thought-out."},{"t":"A response controlled by hormones","why":"Reflexes use the nervous system, not hormones."}],"ok":"A reflex is a fast, automatic response that protects the body."},{"type":"mcq","q":"What happens at a synapse?","options":[{"t":"A chemical diffuses across the gap to start a new impulse","correct":true},{"t":"The neurones touch and pass electricity directly","why":"There is a gap; a chemical crosses it."},{"t":"The impulse stops completely","why":"The impulse continues via the chemical messenger."}],"ok":"A chemical crosses the synapse gap to continue the impulse."},{"type":"mcq","q":"What does an effector do?","options":[{"t":"Brings about a response, e.g. a muscle contracting or a gland releasing a hormone","correct":true},{"t":"Detects the stimulus","why":"That is the receptor."},{"t":"Coordinates the response","why":"That is the coordination centre."}],"ok":"Effectors (muscles or glands) carry out the response."},{"type":"tf","q":"A reflex action is slower than a conscious decision.","answer":false,"why":"Reflexes are faster than conscious responses because they bypass the conscious brain."}]},"GBH2":{"code":"GBH2","title":"Hormones & the endocrine system","discipline":"biology","blurb":"Hormones, controlling blood glucose and diabetes, and reproduction hormones.","diagram":{"key":"d_GBH2","map":[["thyroid","bloodHormone"],["pancreas","liver"],null,["pituitary","ovaries"],null]},"vocab":[{"term":"hormone","definition":"a chemical messenger carried in the blood from a gland to a target organ","say":"hor-mohn"},{"term":"endocrine system","definition":"the glands that release hormones into the blood","say":"en-doh-crin"},{"term":"insulin","definition":"the hormone that lowers blood glucose","say":"in-sue-lin"}],"facts":["The endocrine system is made of glands that release hormones into the blood; hormones travel to target organs and act more slowly and for longer than nerves.","Blood glucose is controlled by the pancreas: when it is too high, the pancreas releases insulin, which makes cells take up glucose and the liver store it as glycogen.","In type 1 diabetes the pancreas does not make enough insulin, so it is treated with insulin injections; type 2 diabetes is linked to obesity and is often controlled by diet and exercise.","In reproduction, oestrogen is the main female hormone and testosterone the main male hormone; the menstrual cycle is controlled by hormones including FSH, LH, oestrogen and progesterone.","Contraception can be hormonal (such as the pill, which stops eggs maturing) or non-hormonal (such as condoms, which also help prevent infection)."],"misconceptions":[{"wrong":"Hormones act faster than nerve impulses.","right":"Hormones act more slowly than nerves but their effects last longer."},{"wrong":"Insulin raises blood glucose.","right":"Insulin lowers blood glucose by making cells take it up and the liver store it."}],"questions":[{"type":"mcq","q":"What is a hormone?","options":[{"t":"A chemical messenger carried in the blood to a target organ","correct":true},{"t":"A nerve impulse","why":"Hormones are chemicals in the blood, not nerve impulses."},{"t":"A type of white blood cell","why":"Hormones are messengers, not blood cells."}],"ok":"Hormones are chemical messengers carried in the blood."},{"type":"mcq","q":"How do hormones compare with nerve impulses?","options":[{"t":"They act more slowly, but their effects last longer","correct":true},{"t":"They act faster and for a shorter time","why":"Hormones are slower but longer-lasting."},{"t":"They are exactly the same","why":"Nerves are fast and brief; hormones are slow and long-lasting."}],"ok":"Hormonal responses are slower and longer-lasting than nervous ones."},{"type":"mcq","q":"What does insulin do when blood glucose is too high?","options":[{"t":"Makes cells take up glucose and the liver store it as glycogen","correct":true},{"t":"Raises the blood glucose further","why":"Insulin lowers blood glucose."},{"t":"Stops the heart beating","why":"Insulin controls glucose, not the heartbeat."}],"ok":"Insulin lowers blood glucose by promoting uptake and storage."},{"type":"mcq","q":"How is type 1 diabetes treated?","options":[{"t":"With insulin injections","correct":true},{"t":"With antibiotics","why":"Antibiotics treat bacterial infections, not diabetes."},{"t":"By avoiding all exercise","why":"Exercise is helpful; type 1 needs insulin."}],"ok":"Type 1 diabetes is treated with insulin injections, as the pancreas makes too little."},{"type":"mcq","q":"Which is the main female reproductive hormone?","options":[{"t":"Oestrogen","correct":true},{"t":"Testosterone","why":"Testosterone is the main male hormone."},{"t":"Insulin","why":"Insulin controls blood glucose, not reproduction."}],"ok":"Oestrogen is the main female reproductive hormone."},{"type":"tf","q":"Type 2 diabetes is linked to obesity and is often controlled by diet and exercise.","answer":true,"why":"Type 2 diabetes is associated with obesity and is often managed through diet and exercise."},{"type":"mcq","q":"How does the hormonal contraceptive pill work?","options":[{"t":"It uses hormones to stop eggs maturing/being released","correct":true},{"t":"It kills pathogens","why":"That is not how contraception works."},{"t":"It is a physical barrier","why":"A barrier method like a condom is non-hormonal."}],"ok":"The pill uses hormones to prevent eggs maturing and being released."}]},"GBH-EX":{"code":"GBH-EX","title":"Homeostasis — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Homeostasis and response.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A person touches a hot object and pulls their hand away before they feel pain. Why is this response so fast?","options":[{"t":"It is a reflex that bypasses the conscious brain","correct":true},{"t":"Hormones carried it quickly","why":"Reflexes use the nervous system, which is faster than hormones."},{"t":"The brain made a quick decision","why":"A reflex bypasses the conscious brain, making it faster."}],"ok":"Reflexes are fast because they do not involve the conscious brain."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the body controls blood glucose concentration when it rises after a meal.","scheme":["The rise in blood glucose is detected by the pancreas (1)","The pancreas releases the hormone insulin into the blood (1)","Insulin travels in the blood to the liver and body cells (1)","Cells take up glucose from the blood (1)","The liver stores excess glucose as glycogen (1)","so the blood glucose concentration falls back to normal (negative feedback) (1)"],"model":"After a meal, blood glucose rises. The pancreas detects this and releases insulin into the blood. Insulin causes body cells to take up glucose and the liver to store the excess as glycogen, so the blood glucose concentration falls back to normal."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Compare how the nervous system and the endocrine (hormonal) system bring about responses.","scheme":["The nervous system uses electrical impulses; the endocrine system uses chemical hormones in the blood (1)","Nervous responses are very fast; hormonal responses are slower (1)","Nervous responses are short-lived; hormonal effects last longer (1)","Nerve impulses act on a precise area; hormones can affect several target organs (1)"],"model":"The nervous system sends fast electrical impulses that act briefly on precise targets. The endocrine system releases hormones into the blood, which act more slowly but for longer and can affect several target organs."}]},"GBV1":{"code":"GBV1","title":"Reproduction & DNA","discipline":"biology","blurb":"Sexual and asexual reproduction, meiosis, and the basics of DNA and the genome.","diagram":{"key":"d_GBV1","map":[["eggCell","spermCell"],"asexualParent","chromosomes","zygote",["dnaHelix","basePair"]]},"vocab":[{"term":"sexual reproduction","definition":"reproduction involving two parents and the joining of gametes","say":"sex-yoo-al"},{"term":"asexual reproduction","definition":"reproduction from one parent, making genetically identical offspring","say":"ay-sex-yoo-al"},{"term":"meiosis","definition":"cell division that makes gametes with half the number of chromosomes","say":"my-oh-sis"},{"term":"gamete","definition":"a sex cell: a sperm or an egg in animals","say":"gam-eet"},{"term":"DNA","definition":"the molecule that carries the genetic code, found in chromosomes","say":"dee-en-ay"}],"facts":["Sexual reproduction involves two parents and the joining of gametes (egg and sperm); it mixes genetic information, giving variation.","Asexual reproduction involves only one parent and no gametes; the offspring are genetically identical clones.","Gametes are made by meiosis, which halves the chromosome number, so that when two gametes join the normal number is restored.","At fertilisation, the gametes fuse to make a cell with the full set of chromosomes, which then divides by mitosis.","DNA is a polymer made of two strands in a double helix; a gene is a small section of DNA, and the genome is all the DNA of an organism."],"misconceptions":[{"wrong":"Meiosis makes two identical cells.","right":"Meiosis makes four genetically different gametes, each with half the chromosomes; mitosis makes two identical cells."},{"wrong":"Asexual reproduction produces variation.","right":"Asexual reproduction produces genetically identical clones, with no variation."}],"questions":[{"type":"mcq","q":"What does sexual reproduction involve?","options":[{"t":"Two parents and the joining of gametes","correct":true},{"t":"One parent and no gametes","why":"That is asexual reproduction."},{"t":"Only cloning","why":"Sexual reproduction mixes genes, unlike cloning."}],"ok":"Sexual reproduction needs two parents and joins gametes, giving variation."},{"type":"mcq","q":"What are the offspring of asexual reproduction like?","options":[{"t":"Genetically identical clones of the parent","correct":true},{"t":"Genetically different from the parent","why":"Asexual offspring are identical clones."},{"t":"Always a different species","why":"They are the same species and genetically identical."}],"ok":"Asexual reproduction produces genetically identical clones."},{"type":"mcq","q":"What does meiosis produce?","options":[{"t":"Four genetically different gametes with half the chromosomes","correct":true},{"t":"Two identical cells","why":"That is mitosis."},{"t":"Cells with double the chromosomes","why":"Meiosis halves the chromosome number."}],"ok":"Meiosis makes four different gametes, each with half the chromosomes."},{"type":"mcq","q":"Why must gametes have half the normal number of chromosomes?","options":[{"t":"So that joining two gametes restores the full number","correct":true},{"t":"So the offspring are clones","why":"Halving and rejoining gives variation, not clones."},{"t":"So they can photosynthesise","why":"Gametes do not photosynthesise."}],"ok":"Halving the chromosomes means fertilisation restores the full set."},{"type":"mcq","q":"What is a gene?","options":[{"t":"A small section of DNA","correct":true},{"t":"A whole chromosome","why":"A chromosome contains many genes."},{"t":"A type of protein","why":"Genes code for proteins; they are made of DNA."}],"ok":"A gene is a short section of DNA that codes for a protein."},{"type":"tf","q":"DNA is arranged as a double helix of two strands.","answer":true,"why":"DNA is a polymer of two strands twisted into a double helix."},{"type":"mcq","q":"What is the genome of an organism?","options":[{"t":"All of the genetic material (DNA) of that organism","correct":true},{"t":"A single gene","why":"The genome is all the DNA, not one gene."},{"t":"A type of gamete","why":"The genome is the DNA, not a sex cell."}],"ok":"The genome is the entire genetic material of an organism."}]},"GBV2":{"code":"GBV2","title":"Genetics & inheritance","discipline":"biology","blurb":"Alleles, dominant and recessive, genetic crosses and inherited disorders.","diagram":{"key":"d_GBV2","map":[null,["dominantOffspring","recessiveOffspring"],"heterozygous",["parentAlleles","ratio"],"sexChromosomes"]},"vocab":[{"term":"allele","definition":"a different version of a gene","say":"al-eel"},{"term":"dominant","definition":"an allele that shows even if only one copy is present","say":"dom-in-ant"},{"term":"recessive","definition":"an allele that only shows if both copies are present","say":"ree-sess-iv"},{"term":"genotype","definition":"the alleles an organism has for a characteristic","say":"jee-no-type"}],"facts":["Most characteristics are controlled by many genes, but some are controlled by a single gene with different versions called alleles.","A dominant allele shows in the offspring if just one copy is present; a recessive allele only shows if both copies are recessive.","The genotype is the alleles present; the phenotype is the characteristic that shows. Homozygous means two of the same allele, heterozygous means two different alleles.","Genetic crosses can be shown with a Punnett square to predict the ratio of offspring; for two heterozygous parents the ratio is 3 dominant to 1 recessive.","In humans, females are XX and males are XY; some disorders are inherited, such as polydactyly (dominant) and cystic fibrosis (recessive)."],"misconceptions":[{"wrong":"A recessive characteristic shows whenever one recessive allele is present.","right":"A recessive characteristic only shows when both alleles are recessive."},{"wrong":"Genotype and phenotype are the same thing.","right":"The genotype is the alleles you have; the phenotype is the characteristic that actually shows."}],"questions":[{"type":"mcq","q":"What is an allele?","options":[{"t":"A different version of a gene","correct":true},{"t":"A whole chromosome","why":"A chromosome carries many genes."},{"t":"A type of protein","why":"Alleles are versions of genes, not proteins."}],"ok":"Alleles are different versions of the same gene."},{"type":"mcq","q":"When does a recessive characteristic show in an organism?","options":[{"t":"Only when both alleles are recessive","correct":true},{"t":"When one recessive allele is present","why":"One recessive allele is masked by a dominant one."},{"t":"Whenever a dominant allele is present","why":"A dominant allele hides a recessive one."}],"ok":"A recessive characteristic needs two recessive alleles to show."},{"type":"mcq","q":"Two parents are both heterozygous for a gene (Bb). What ratio of offspring shows the dominant characteristic?","options":[{"t":"3 dominant to 1 recessive","correct":true},{"t":"1 dominant to 1 recessive","why":"Bb x Bb gives a 3:1 ratio."},{"t":"All dominant","why":"One quarter (bb) shows the recessive characteristic."}],"ok":"A Bb x Bb cross gives a 3:1 ratio of dominant to recessive."},{"type":"mcq","q":"What are the sex chromosomes of a human female?","options":[{"t":"XX","correct":true},{"t":"XY","why":"XY is male."},{"t":"YY","why":"Humans do not have a YY combination."}],"ok":"Females are XX and males are XY."},{"type":"mcq","q":"What is the difference between genotype and phenotype?","options":[{"t":"Genotype is the alleles present; phenotype is the characteristic shown","correct":true},{"t":"They are the same thing","why":"Genotype is the alleles; phenotype is what shows."},{"t":"Genotype is what shows; phenotype is the alleles","why":"It is the other way round."}],"ok":"Genotype = alleles you have; phenotype = the characteristic that shows."},{"type":"tf","q":"Cystic fibrosis is caused by a recessive allele.","answer":true,"why":"Cystic fibrosis is a recessive inherited disorder, so two recessive alleles are needed."},{"type":"mcq","q":"A homozygous organism has...","options":[{"t":"two of the same allele for a gene","correct":true},{"t":"two different alleles","why":"That is heterozygous."},{"t":"only one allele","why":"Organisms have two alleles per gene (one from each parent)."}],"ok":"Homozygous means two identical alleles; heterozygous means two different ones."}]},"GBV3":{"code":"GBV3","title":"Variation & evolution","discipline":"biology","blurb":"Variation, natural selection, selective breeding, genetic engineering and evidence for evolution.","diagram":{"key":"d_GBV3","map":[["population","mutation"],["selectPressure","survivor"],"selectiveBreeding","nextGen","fossil"]},"vocab":[{"term":"variation","definition":"the differences in characteristics between individuals","say":"vair-ee-ay-shun"},{"term":"natural selection","definition":"the process by which better-adapted organisms survive and reproduce","say":"nat-yur-al selection"},{"term":"evolution","definition":"the gradual change in a species over many generations","say":"ev-oh-loo-shun"},{"term":"selective breeding","definition":"choosing organisms with useful traits to breed together","say":"selective breeding"}],"facts":["Variation between individuals can be due to their genes, their environment, or both; mutations are random changes in genes that produce new alleles.","Evolution by natural selection: there is variation; the best-adapted individuals are more likely to survive and reproduce; they pass on their alleles, so over many generations the species changes. This was proposed by Charles Darwin.","Selective breeding is choosing plants or animals with useful characteristics and breeding them together over generations, for example for high yield or disease resistance.","Genetic engineering transfers a gene from one organism to another, for example to make crops resistant to pests or to produce insulin from bacteria.","Evidence for evolution includes fossils and the way bacteria evolve resistance to antibiotics; extinction happens when a species cannot adapt to a change."],"misconceptions":[{"wrong":"Individual animals change themselves to suit the environment and pass this on.","right":"Evolution works on variation already present: better-adapted individuals survive and pass on their alleles."},{"wrong":"All variation is caused by genes.","right":"Variation can be caused by genes, the environment, or a combination of both."}],"questions":[{"type":"mcq","q":"What is natural selection?","options":[{"t":"Better-adapted organisms survive and reproduce, passing on their alleles","correct":true},{"t":"Animals choosing their own genes","why":"Organisms cannot choose their genes."},{"t":"Breeding chosen animals together","why":"That is selective breeding, done by humans."}],"ok":"In natural selection the best-adapted survive and pass on their alleles."},{"type":"mcq","q":"What can cause variation between individuals?","options":[{"t":"Their genes, their environment, or both","correct":true},{"t":"Only their genes","why":"Environment also causes variation."},{"t":"Only their environment","why":"Genes also cause variation."}],"ok":"Variation can be genetic, environmental, or a mix of both."},{"type":"mcq","q":"What is selective breeding?","options":[{"t":"Humans choosing organisms with useful traits to breed together","correct":true},{"t":"Transferring a gene between organisms","why":"That is genetic engineering."},{"t":"Random survival in the wild","why":"That is natural selection."}],"ok":"Selective breeding is choosing and breeding organisms for useful characteristics."},{"type":"mcq","q":"What is genetic engineering?","options":[{"t":"Transferring a gene from one organism to another","correct":true},{"t":"Breeding the strongest animals over generations","why":"That is selective breeding."},{"t":"Letting a species die out","why":"That is extinction."}],"ok":"Genetic engineering transfers a gene into another organism."},{"type":"mcq","q":"How do bacteria becoming resistant to antibiotics support evolution?","options":[{"t":"Resistant bacteria survive and reproduce, so resistance spreads","correct":true},{"t":"Antibiotics make bacteria stronger on purpose","why":"Resistance arises from variation and natural selection, not on purpose."},{"t":"It does not support evolution","why":"It is a clear, fast example of natural selection."}],"ok":"Resistant bacteria survive antibiotics and pass on resistance — natural selection in action."},{"type":"multi","q":"Tap pieces of evidence for evolution.","items":[{"t":"Fossils","correct":true},{"t":"Antibiotic resistance in bacteria","correct":true},{"t":"The colour of a painted wall"},{"t":"Similarities between related species","correct":true}],"ok":"Fossils, antibiotic resistance and species similarities are evidence for evolution.","bad":"A painted wall's colour is not biological evidence for evolution."},{"type":"tf","q":"Extinction happens when a species cannot adapt to a change in its environment.","answer":true,"why":"If a species cannot adapt to environmental change, it may die out (extinction)."}]},"GBV-EX":{"code":"GBV-EX","title":"Inheritance — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Inheritance, variation and evolution.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Two heterozygous parents (Bb) are crossed. What fraction of offspring are expected to show the recessive characteristic?","options":[{"t":"One quarter (1 in 4)","correct":true},{"t":"Three quarters","why":"Three quarters show the dominant characteristic; a quarter show recessive."},{"t":"None","why":"One quarter (bb) show the recessive characteristic."}],"ok":"Bb x Bb gives a 3:1 ratio, so one quarter are bb (recessive)."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how a population of bacteria can become resistant to an antibiotic, using ideas about natural selection.","scheme":["There is variation in the bacteria due to random mutations (1)","Some bacteria have a mutation that makes them resistant to the antibiotic (1)","When the antibiotic is used, non-resistant bacteria are killed (1)","The resistant bacteria survive and reproduce (1)","passing on the resistance allele to their offspring (1)","over time the whole population becomes resistant (1)"],"model":"Random mutations create variation, and by chance some bacteria are resistant to the antibiotic. When the antibiotic is used it kills the non-resistant bacteria, but the resistant ones survive and reproduce, passing on the resistance allele. Over many generations the resistant bacteria become common, so the whole population is resistant."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe the steps of selective breeding to produce cows that give more milk.","scheme":["Choose the cows that produce the most milk (parents with the desired trait) (1)","Breed these cows together (1)","From the offspring, again select those that give the most milk (1)","Repeat over many generations until milk yield is high (1)"],"model":"Choose the cows that produce the most milk and breed them together. From their offspring, again select those with the highest milk yield and breed them. Repeating this over many generations gradually increases the milk yield of the herd."}]},"GBY1":{"code":"GBY1","title":"Ecosystems & adaptation","discipline":"biology","blurb":"Communities, competition, adaptations and feeding relationships.","diagram":{"key":"d_GBY1","map":["soil",["cactus","producer"],"sun",null,["herbivore","predator"]]},"vocab":[{"term":"ecosystem","definition":"all the living things in an area plus their non-living surroundings","say":"ee-koh-sis-tem"},{"term":"community","definition":"all the populations of different species living in a habitat","say":"com-yoon-it-ee"},{"term":"adaptation","definition":"a feature that helps an organism survive in its environment","say":"ad-ap-tay-shun"},{"term":"food chain","definition":"a diagram showing what eats what, starting with a producer","say":"food chayn"}],"facts":["An ecosystem is all the living organisms (the community) plus the non-living (abiotic) factors in an area.","Organisms compete for resources: plants compete for light, water, space and minerals; animals compete for food, water, mates and territory.","Abiotic factors (such as temperature, light and water) and biotic factors (such as food, predators and disease) affect where organisms can live.","Adaptations help organisms survive, for example a cactus's spines and water storage, or an Arctic fox's white fur and small ears.","A food chain shows feeding relationships, always starting with a producer (usually a green plant) that makes food by photosynthesis."],"misconceptions":[{"wrong":"A food chain can start with an animal.","right":"A food chain always starts with a producer, usually a green plant, that makes its own food."},{"wrong":"Abiotic factors are living things.","right":"Abiotic factors are non-living (temperature, light, water); biotic factors are living (food, predators)."}],"questions":[{"type":"mcq","q":"What is an ecosystem?","options":[{"t":"All the living organisms plus the non-living factors in an area","correct":true},{"t":"Only the animals in an area","why":"An ecosystem includes plants and non-living factors too."},{"t":"A single food chain","why":"An ecosystem is much more than one food chain."}],"ok":"An ecosystem is the community plus its abiotic surroundings."},{"type":"categorise","q":"Sort each factor as abiotic or biotic.","bins":["Abiotic","Biotic"],"items":[{"t":"Temperature","bin":"Abiotic"},{"t":"Light intensity","bin":"Abiotic"},{"t":"Number of predators","bin":"Biotic"},{"t":"Availability of food","bin":"Biotic"},{"t":"Water availability","bin":"Abiotic"}],"ok":"Abiotic factors are non-living; biotic factors are living.","bad":"Temperature, light and water are abiotic; predators and food are biotic."},{"type":"mcq","q":"What do plants compete for?","options":[{"t":"Light, water, space and minerals","correct":true},{"t":"Mates and territory only","why":"Those are mainly animal competition; plants compete for light, water, space and minerals."},{"t":"Nothing — plants do not compete","why":"Plants do compete, e.g. for light and water."}],"ok":"Plants compete for light, water, space and minerals."},{"type":"mcq","q":"What always comes first in a food chain?","options":[{"t":"A producer (usually a green plant)","correct":true},{"t":"A predator","why":"Producers come first; predators are higher up."},{"t":"A decomposer","why":"Producers start the chain, making food by photosynthesis."}],"ok":"A food chain starts with a producer that makes food by photosynthesis."},{"type":"mcq","q":"How is a cactus adapted to a hot, dry desert?","options":[{"t":"It has spines and stores water in its stem","correct":true},{"t":"It has large flat leaves","why":"Large leaves would lose too much water; cacti have spines."},{"t":"It has thick white fur","why":"Fur is an animal adaptation, not a plant one."}],"ok":"Spines reduce water loss and the stem stores water."},{"type":"tf","q":"Animals may compete for food, water, mates and territory.","answer":true,"why":"Animals compete for resources such as food, water, mates and territory."},{"type":"mcq","q":"Which is an abiotic factor that affects where organisms live?","options":[{"t":"Temperature","correct":true},{"t":"Number of predators","why":"Predators are a biotic (living) factor."},{"t":"Availability of food","why":"Food is a biotic factor."}],"ok":"Temperature is a non-living (abiotic) factor."}]},"GBY2":{"code":"GBY2","title":"Cycles & biodiversity","discipline":"biology","blurb":"The carbon and water cycles, biodiversity, and human impacts on the environment.","diagram":{"key":"d_GBY2","map":[["carbonDioxide","plant"],"decomposer","rainCloud","animal","factory"]},"vocab":[{"term":"biodiversity","definition":"the variety of all the different species in an area","say":"by-oh-di-ver-sit-ee"},{"term":"decomposer","definition":"a microorganism that breaks down dead material, recycling nutrients","say":"dee-com-poh-zer"},{"term":"carbon cycle","definition":"the way carbon is recycled between living things, the air and the ground","say":"car-bon cycle"}],"facts":["Materials are recycled in ecosystems. In the carbon cycle, photosynthesis removes carbon dioxide from the air, while respiration, combustion and decomposition return it.","Decomposers (bacteria and fungi) break down dead organisms and waste, releasing nutrients back into the soil.","In the water cycle, water evaporates, condenses to form clouds, and falls as precipitation, providing fresh water on land.","Biodiversity is the variety of different species in an ecosystem; high biodiversity makes an ecosystem more stable.","Human activities reduce biodiversity: pollution, deforestation and land use destroy habitats, and burning fossil fuels increases carbon dioxide and methane, causing global warming. Conservation and replanting help protect biodiversity."],"misconceptions":[{"wrong":"Decomposers are harmful and should be removed.","right":"Decomposers are vital: they recycle nutrients back into the ecosystem."},{"wrong":"Higher biodiversity makes an ecosystem less stable.","right":"Higher biodiversity generally makes an ecosystem more stable and resilient."}],"questions":[{"type":"mcq","q":"Which process removes carbon dioxide from the air in the carbon cycle?","options":[{"t":"Photosynthesis","correct":true},{"t":"Respiration","why":"Respiration returns carbon dioxide to the air."},{"t":"Combustion","why":"Combustion (burning) releases carbon dioxide."}],"ok":"Photosynthesis takes carbon dioxide out of the air."},{"type":"multi","q":"Tap the processes that return carbon dioxide to the atmosphere.","items":[{"t":"Respiration","correct":true},{"t":"Combustion (burning)","correct":true},{"t":"Decomposition","correct":true},{"t":"Photosynthesis"}],"ok":"Respiration, combustion and decomposition return carbon dioxide; photosynthesis removes it.","bad":"Photosynthesis removes carbon dioxide; it does not return it."},{"type":"mcq","q":"What do decomposers do?","options":[{"t":"Break down dead material and recycle nutrients","correct":true},{"t":"Make food by photosynthesis","why":"Producers do that, not decomposers."},{"t":"Hunt and eat live prey","why":"Decomposers break down dead matter, not live prey."}],"ok":"Decomposers recycle nutrients by breaking down dead organisms and waste."},{"type":"mcq","q":"What is biodiversity?","options":[{"t":"The variety of different species in an area","correct":true},{"t":"The number of one species only","why":"Biodiversity is about the variety of species, not just one."},{"t":"The amount of water in an area","why":"Biodiversity is about species variety, not water."}],"ok":"Biodiversity is the variety of species in an ecosystem."},{"type":"multi","q":"Tap human activities that reduce biodiversity.","items":[{"t":"Deforestation","correct":true},{"t":"Pollution","correct":true},{"t":"Burning fossil fuels","correct":true},{"t":"Setting up nature reserves"}],"ok":"Deforestation, pollution and fossil fuel use harm biodiversity.","bad":"Nature reserves protect biodiversity, rather than reducing it."},{"type":"tf","q":"Higher biodiversity tends to make an ecosystem more stable.","answer":true,"why":"Greater variety of species makes an ecosystem more resilient and stable."},{"type":"mcq","q":"In the water cycle, what happens after water evaporates?","options":[{"t":"It condenses to form clouds, then falls as precipitation","correct":true},{"t":"It turns into carbon dioxide","why":"Water does not become carbon dioxide."},{"t":"It disappears permanently","why":"Water is recycled; it condenses and falls again."}],"ok":"Evaporated water condenses into clouds and falls as rain or snow."}]},"GBY-EX":{"code":"GBY-EX","title":"Ecology — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Ecology.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A food chain is: grass to rabbit to fox. What is the producer?","options":[{"t":"Grass","correct":true},{"t":"Rabbit","why":"The rabbit is a primary consumer, not the producer."},{"t":"Fox","why":"The fox is a predator, not the producer."}],"ok":"Grass is the producer; it makes food by photosynthesis."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how carbon is recycled in the carbon cycle, naming the main processes involved.","scheme":["Carbon dioxide is removed from the air by photosynthesis in plants (1)","Carbon becomes part of glucose / plant material (1)","It passes to animals when they eat plants (feeding) (1)","Respiration by plants and animals returns carbon dioxide to the air (1)","Decomposers break down dead organisms, releasing carbon dioxide (1)","Combustion (burning fossil fuels/wood) also returns carbon dioxide to the air (1)"],"model":"Plants remove carbon dioxide from the air by photosynthesis, turning carbon into glucose and plant material. Animals gain carbon by eating plants. Respiration in plants and animals returns carbon dioxide to the air, as does decomposition of dead organisms by decomposers, and combustion when fuels or wood are burned. This keeps carbon cycling between living things, the air and the ground."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe two ways human activity reduces biodiversity and one way it can be protected.","scheme":["Deforestation destroys habitats (1)","Pollution / burning fossil fuels harms organisms and warms the planet (1)","(any two human impacts for 2 marks)","Protection: setting up nature reserves / replanting forests / protecting habitats (1) (plus a second valid impact)"],"model":"Human activities such as deforestation destroy habitats, and pollution and burning fossil fuels harm organisms and contribute to global warming, both reducing biodiversity. Biodiversity can be protected by setting up nature reserves, replanting forests and protecting habitats."}]}});

Object.assign(CONTENT, {"GPP1":{"code":"GPP1","title":"Physics Paper 1 — practice","discipline":"physics","blurb":"Mixed exam questions across Energy, Electricity, Particle model and Atomic structure.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A motor lifts a 50 N load through 3 m in 5 s. Calculate the useful power output. (work = force x distance, power = work / time)","hint":"work = 50 x 3 = 150 J; power = 150 / 5","answer":30,"unit":"W","ok":"Work = 150 J, power = 150 / 5 = 30 W."},{"type":"numeric","kicker":"Exam · calculate","q":"A heater is connected to a 12 V supply and a current of 0.5 A flows. Calculate its resistance.","hint":"R = V / I","answer":24,"unit":"ohm","ok":"12 / 0.5 = 24 ohm."},{"type":"mcq","kicker":"Exam · structured","q":"A sealed, rigid container of gas is heated. What happens, and why?","options":[{"t":"The pressure rises, because particles hit the walls harder and more often","correct":true},{"t":"The pressure falls, because the gas expands","why":"The container is rigid, so it cannot expand."},{"t":"Nothing changes","why":"Hotter particles raise the pressure in a fixed volume."}],"ok":"Heating a gas at constant volume increases its pressure."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Use the particle model to describe the arrangement and movement of particles in solids, liquids and gases.","scheme":["Solid: particles in a fixed, regular arrangement (1) that only vibrate in place (1)","Liquid: particles close together (1) but able to move/flow past each other (1)","Gas: particles far apart (1) moving quickly in all directions (1)"],"model":"In a solid the particles are packed in a fixed, regular pattern and only vibrate. In a liquid they are still close together but can move past each other, so it flows. In a gas the particles are far apart and move quickly in all directions."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe the structure of an atom, including the relative charges of the particles.","scheme":["A small central nucleus containing protons and neutrons (1)","Electrons orbit the nucleus in shells (1)","Protons are positive (+1), electrons negative (-1) (1)","Neutrons have no charge / the atom is mostly empty space (1)"],"model":"An atom has a tiny central nucleus of positive protons and neutral neutrons, with negative electrons in shells around it. A proton is +1, an electron is -1 and a neutron is 0. Most of the atom is empty space."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe a method to measure the specific heat capacity of a metal block (required practical), and how to make the result more accurate.","scheme":["Measure the mass of the metal block (1)","Use an electric heater and measure the energy supplied (power x time / joulemeter) (1)","Measure the temperature rise with a thermometer (1)","Calculate c = energy / (mass x temperature change) (1)","Insulate the block to reduce energy lost to the surroundings (1)","Repeat / take readings carefully to improve reliability (1)"],"model":"Find the block's mass, heat it with an electric heater while measuring the energy supplied (power x time) and the temperature rise, then use c = energy / (mass x temperature change). Insulating the block reduces heat lost to the surroundings, making the result more accurate."}]},"GPP2":{"code":"GPP2","title":"Physics Paper 2 — practice","discipline":"physics","blurb":"Mixed exam questions across Forces, Waves, Magnetism and Space.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"A 1200 kg car decelerates at 5 m/s squared when braking. Calculate the size of the braking force. (F = m x a)","hint":"force = mass x acceleration","answer":6000,"unit":"N","ok":"1200 x 5 = 6000 N."},{"type":"numeric","kicker":"Exam · calculate","q":"A water wave has a frequency of 50 Hz and a wavelength of 6 m. Calculate its speed.","hint":"wave speed = frequency x wavelength","answer":300,"unit":"m/s","ok":"50 x 6 = 300 m/s."},{"type":"mcq","kicker":"Exam · structured","q":"A current-carrying wire sits in a magnetic field. When is the force on it greatest?","options":[{"t":"When the wire is at 90 degrees to the field","correct":true},{"t":"When the wire is parallel to the field","why":"The force is zero when parallel."},{"t":"When no current flows","why":"No current means no force."}],"ok":"The motor-effect force is greatest at 90 degrees to the field."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain the factors that affect the stopping distance of a car, referring to thinking distance and braking distance.","scheme":["Stopping distance = thinking distance + braking distance (1)","Thinking distance increases with speed and reaction time (1)","e.g. tiredness, alcohol, drugs or distraction (1)","Braking distance increases with speed and poor conditions (1)","e.g. wet/icy roads, worn tyres or brakes (1)","A greater braking force gives a larger deceleration which can be dangerous (1)"],"model":"Stopping distance is thinking distance plus braking distance. Thinking distance grows with speed and reaction time (tiredness, alcohol, distraction). Braking distance grows with speed and poor grip (wet/icy roads, worn tyres or brakes). Larger braking forces give larger, potentially dangerous decelerations."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Ultraviolet and gamma rays are both electromagnetic waves. Give a use and a danger of each.","scheme":["UV used for security marking / tanning / sterilising water (1)","UV can damage skin cells and cause skin cancer (1)","Gamma used in medicine, e.g. treating cancer or sterilising equipment (1)","Gamma is ionising and can damage cells/DNA (1)"],"model":"Ultraviolet is used for security marking and tanning, but can damage skin cells and cause cancer. Gamma rays are used to treat cancer and sterilise equipment, but are ionising and can damage cells and DNA."},{
