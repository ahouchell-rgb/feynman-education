he tank","At the bottom of the tank"],"ok":"The deeper you go, the greater the weight of water above, so the higher the pressure."},{"type":"mcq","q":"Why is a dam wall built thicker at the bottom than at the top?","options":[{"t":"The water pressure is greatest at the bottom, so the wall must be stronger there","correct":true},{"t":"The water is colder at the bottom and shrinks the wall","why":"Temperature is not the reason; it is the higher pressure deep down."},{"t":"The bottom of the wall has to hold up the top of the wall","why":"The wall is thick to resist the high water pressure, not to support its own top."}],"ok":"More water above means more weight pushing down, so the pressure is highest at the base."},{"type":"mcq","q":"An object floats in water. What do we know about the forces on it?","options":[{"t":"The upthrust is equal to the weight, so the resultant force is zero","correct":true},{"t":"The weight is greater than the upthrust","why":"If weight were greater, the resultant force would pull it down and it would sink."},{"t":"There is no upthrust acting on it at all","why":"Upthrust must act and balance the weight, or the object could not float."}],"ok":"Balanced weight and upthrust give a resultant force of zero, so a floating object stays put."},{"type":"multi","q":"Tap all the ways you could make a lump of metal float in water.","items":[{"t":"Spread it into a wide boat shape so more area touches the water","correct":true},{"t":"Shape it so the upthrust grows until it equals the weight","correct":true},{"t":"Squash it into a small dense ball"},{"t":"Make it heavier without changing its shape"}],"ok":"Changing the shape to increase the area in contact raises the upthrust until it balances the weight.","bad":"Floating is about increasing upthrust to match the weight, not about adding mass."},{"type":"tf","q":"A steel ship floats even though steel is denser than water, because its shape gives a large enough upthrust.","answer":true,"why":"Spreading the steel into a wide hull lets it push on lots of water, creating an upthrust that balances its weight."},{"type":"mcq","q":"What is the atmosphere?","options":[{"t":"The layer of gases that surrounds the Earth","correct":true},{"t":"The water that covers most of the Earth","why":"That is the oceans; the atmosphere is made of gases, not water."},{"t":"The solid rocky surface of the Earth","why":"The atmosphere is gas around the Earth, not its solid surface."}],"ok":"The atmosphere is the mixture of gases held around the Earth by gravity."},{"type":"mcq","q":"Why does atmospheric pressure decrease as you climb higher up a mountain?","options":[{"t":"The air is less dense and there is less weight of air above you","correct":true},{"t":"The air particles stop moving at high altitude","why":"The particles keep moving; there are just fewer of them, giving fewer collisions."},{"t":"Gravity disappears at the top of a mountain","why":"Gravity still acts; the pressure falls because the air is thinner higher up."}],"ok":"Higher up, fewer particles per volume means fewer collisions, and less air above means less weight pressing down."},{"type":"tf","q":"At the top of Mount Everest there are fewer air particles in each volume than at sea level.","answer":true,"why":"The air is less dense up high, which is why climbers may need oxygen masks."},{"type":"numeric","kicker":"Work it out","q":"A force of 50 N pushes on an area of 2 m². Calculate the pressure.","hint":"pressure = force ÷ area","answer":25,"unit":"N/m²","ok":"50 ÷ 2 = 25 N/m², which is the same as 25 Pa."},{"type":"numeric","kicker":"Work it out","q":"A surface has a force of 90 N acting on it over an area of 15 m². What is the pressure?","hint":"pressure = force ÷ area","answer":6,"unit":"N/m²","ok":"90 ÷ 15 = 6 N/m²."},{"type":"numeric","kicker":"Work it out","q":"A surface of area 40 m² has a total force of 8800 N acting on it. Calculate the pressure.","hint":"pressure = force ÷ area","answer":220,"unit":"N/m²","ok":"8800 ÷ 40 = 220 N/m²."},{"type":"numeric","kicker":"Rearrange it","q":"A box exerts a pressure of 5 N/m² over an area of 10 m². What force is the box applying?","hint":"force = pressure × area","answer":50,"unit":"N","ok":"5 × 10 = 50 N. Rearranging pressure = force ÷ area gives force = pressure × area."},{"type":"numeric","kicker":"Rearrange it","q":"A box weighs 100 N and exerts a pressure of 100 N/m² on the ground. What is its area of contact?","hint":"area = force ÷ pressure","answer":1,"unit":"m²","ok":"100 ÷ 100 = 1 m²."},{"type":"categorise","q":"Sort each change into whether it increases or decreases the pressure on the ground.","bins":["Increases pressure","Decreases pressure"],"items":[{"t":"Standing on one foot instead of two","bin":"Increases pressure"},{"t":"Pressing with the sharp point of a drawing pin","bin":"Increases pressure"},{"t":"A walker putting on wide snowshoes","bin":"Decreases pressure"},{"t":"A polar bear spreading its weight over four large paws","bin":"Decreases pressure"}],"ok":"For the same force, a smaller area gives a higher pressure and a larger area gives a lower pressure.","bad":"Think about the area: spreading a force over more area lowers the pressure."},{"type":"mcq","q":"What is the unit of pressure?","options":[{"t":"The pascal (Pa), which equals one newton per square metre","correct":true},{"t":"The newton (N)","why":"The newton is the unit of force, not pressure."},{"t":"The metre squared (m²)","why":"The square metre is the unit of area, not pressure."}],"ok":"Pressure is measured in pascals (Pa), the same as N/m²."}]},

"DIG":{"code":"DIG","title":"Digestive organs and gut bacteria","discipline":"biology","blurb":"Follow your food on its journey through the gut and meet the helpful bacteria that live there.",
"vocab":[{"term":"digestion","definition":"Breaking large insoluble food molecules into small soluble ones.","say":"dye-jess-chun"},{"term":"soluble","definition":"Able to dissolve and pass into the blood.","say":"sol-yoo-bul"},{"term":"insoluble","definition":"Cannot dissolve, so cannot pass into the blood.","say":"in-sol-yoo-bul"},{"term":"enzyme","definition":"A protein that speeds up the breakdown of food.","say":"en-zime"},{"term":"oesophagus","definition":"Muscular tube that pushes food from mouth to stomach.","say":"ee-sof-uh-gus"},{"term":"absorb","definition":"To take small food molecules into the bloodstream.","say":"ab-zorb"},{"term":"villi","definition":"Tiny finger-like bumps lining the small intestine.","say":"vil-eye"},{"term":"microvilli","definition":"Even smaller bumps on the villi for more surface area.","say":"my-kroh-vil-eye"},{"term":"bile","definition":"Greenish liquid from the liver that helps digest food.","say":"bile"},{"term":"gut bacteria","definition":"Microbes in the large intestine that help us digest.","say":"gut bak-teer-ee-uh"}],
"facts":["We digest food to break large insoluble molecules into small soluble ones that can be absorbed into the blood.","Food travels in order: mouth, oesophagus, stomach, small intestine, then large intestine.","Enzymes are proteins released in the mouth, stomach, pancreas and small intestine to break down food.","The stomach churns food and contains hydrochloric acid that helps enzymes work and kills bacteria.","Most nutrients are absorbed through the walls of the small intestine into the bloodstream.","The small intestine is long and its walls are only one cell thick, with villi and microvilli giving a huge surface area.","The large intestine absorbs water, leaving behind solid waste called faeces.","Most gut bacteria live in the large intestine and many are helpful, not harmful.","Helpful gut bacteria digest fibre, produce vitamins B and K, and compete with harmful bacteria."],
"misconceptions":[{"wrong":"Most digestion happens in the stomach.","right":"Digestion happens along the gut; the small intestine does much of the breakdown and absorption."},{"wrong":"All bacteria are harmful and cause disease.","right":"Many gut bacteria are helpful, digesting fibre and making vitamins B and K."},{"wrong":"Food falls down to the stomach because of gravity.","right":"Muscles in the oesophagus contract to push food down, even if you are upside down."},{"wrong":"The liver is not part of digestion because food does not pass through it.","right":"The liver makes bile, which mixes with food to help digestion."}],
"questions":[{"type":"order","q":"Put the parts of the digestive system in the order food passes through them.","items":["Mouth","Oesophagus","Stomach","Small intestine","Large intestine"],"ok":"That is the path food takes from mouth to large intestine."},{"type":"mcq","q":"Why do we digest food?","options":[{"t":"To break large insoluble molecules into small soluble ones that can be absorbed","correct":true},{"t":"To make food taste better before we swallow it","why":"Digestion is about breaking molecules down, not flavour."},{"t":"To add water to food so it becomes a liquid","why":"Saliva moistens food, but that is not the main reason we digest."}],"ok":"Small soluble molecules can diffuse into the blood and be carried to cells."},{"type":"mcq","q":"What do enzymes do during digestion?","options":[{"t":"Speed up the breakdown of food into smaller substances","correct":true},{"t":"Absorb nutrients directly into the bloodstream","why":"Absorption happens through the gut wall, not by enzymes."},{"t":"Push food along the oesophagus","why":"Muscle contractions push food, not enzymes."}],"ok":"Enzymes are proteins that speed up the breakdown of food."},{"type":"categorise","q":"Sort each organ by the main job it does.","bins":["Pushes or churns food","Absorbs into the blood"],"items":[{"t":"Oesophagus","bin":"Pushes or churns food"},{"t":"Stomach","bin":"Pushes or churns food"},{"t":"Small intestine","bin":"Absorbs into the blood"},{"t":"Large intestine","bin":"Absorbs into the blood"}],"ok":"The oesophagus and stomach move and churn food; the intestines absorb into the blood.","bad":"Look again: the small intestine absorbs nutrients and the large intestine absorbs water."},{"type":"tf","q":"The oesophagus uses rings of muscle that contract to push food towards the stomach.","answer":true,"why":"This is why food still reaches the stomach even if you are upside down."},{"type":"mcq","q":"What is the main job of the small intestine?","options":[{"t":"Absorbing nutrients from digested food into the bloodstream","correct":true},{"t":"Storing solid waste before it leaves the body","why":"That is the job of the rectum, not the small intestine."},{"t":"Adding hydrochloric acid to kill bacteria","why":"Acid is added in the stomach, not the small intestine."}],"ok":"Nutrients pass through the small intestine walls into the blood."},{"type":"multi","q":"Tap all the ways the small intestine is adapted for absorption.","items":[{"t":"It is long","correct":true},{"t":"Its walls are only one cell thick","correct":true},{"t":"It is covered in villi and microvilli","correct":true},{"t":"It is full of hydrochloric acid"}],"ok":"Being long, thin-walled and covered in villi gives a huge surface area for absorption.","bad":"Hydrochloric acid is in the stomach; the other three are small intestine adaptations."},{"type":"mcq","q":"How do villi and microvilli help the small intestine?","options":[{"t":"They increase the surface area so more food molecules can be absorbed","correct":true},{"t":"They make hydrochloric acid to kill bacteria","why":"Acid is made in the stomach, not by villi."},{"t":"They produce bile to break down fats","why":"Bile is made in the liver, not by villi."}],"ok":"A bigger surface area means more diffusion of food molecules into the blood."},{"type":"tf","q":"The walls of the villi are only one cell thick.","answer":true,"why":"Thin walls let food molecules pass through quickly and easily."},{"type":"mcq","q":"What does the large intestine mainly absorb?","options":[{"t":"Water","correct":true},{"t":"Nutrients from digested food","why":"Most nutrients are absorbed earlier, in the small intestine."},{"t":"Oxygen for the blood","why":"Oxygen is absorbed in the lungs, not the large intestine."}],"ok":"The large intestine absorbs water, leaving solid waste behind."},{"type":"mcq","q":"Why does the stomach contain hydrochloric acid?","options":[{"t":"To help enzymes work better and kill bacteria in the food","correct":true},{"t":"To absorb water from the food","why":"Water is absorbed in the large intestine, not the stomach."},{"t":"To produce vitamins B and K","why":"Those vitamins come from gut bacteria, not stomach acid."}],"ok":"Stomach acid helps enzymes work and kills bacteria in food."},{"type":"tf","q":"Bile is made in the liver and helps with the digestion of food.","answer":true,"why":"Bile is a greenish liquid that mixes with food as it leaves the stomach."},{"type":"categorise","q":"Sort each statement as true of helpful or harmful gut bacteria.","bins":["Helpful gut bacteria","Harmful gut bacteria"],"items":[{"t":"Digest fibre that has not been digested yet","bin":"Helpful gut bacteria"},{"t":"Produce vitamins B and K","bin":"Helpful gut bacteria"},{"t":"Release toxins that can harm us","bin":"Harmful gut bacteria"},{"t":"Compete with harmful bacteria to reduce their numbers","bin":"Helpful gut bacteria"}],"ok":"Helpful bacteria digest fibre, make vitamins and crowd out harmful ones; harmful ones release toxins.","bad":"Remember: only harmful bacteria release toxins. The rest are jobs of helpful bacteria."},{"type":"mcq","q":"Where are most gut bacteria found?","options":[{"t":"The large intestine","correct":true},{"t":"The stomach","why":"Stomach acid kills most bacteria; few live there."},{"t":"The oesophagus","why":"The oesophagus just pushes food through; bacteria live further along."}],"ok":"Both helpful and harmful gut bacteria are mainly found in the large intestine."},{"type":"multi","q":"Tap all the ways helpful gut bacteria help us.","items":[{"t":"They digest fibre","correct":true},{"t":"They produce vitamins B and K","correct":true},{"t":"They compete with harmful bacteria","correct":true},{"t":"They make hydrochloric acid"}],"ok":"Helpful bacteria digest fibre, make vitamins B and K and crowd out harmful bacteria.","bad":"Hydrochloric acid is made in the stomach, not by gut bacteria."},{"type":"tf","q":"A poor diet and some medicines can harm the helpful bacteria in our gut.","answer":true,"why":"A balanced diet with fruit and vegetables helps gut bacteria keep working well."},{"type":"mcq","q":"Which part of the digestive system stores solid waste before it leaves the body?","options":[{"t":"The rectum","correct":true},{"t":"The small intestine","why":"The small intestine absorbs nutrients; it does not store waste."},{"t":"The stomach","why":"The stomach churns food early on; it does not store faeces."}],"ok":"Solid waste is stored in the rectum and leaves through the anus."},{"type":"tf","q":"Most digestion happens in the stomach.","answer":false,"why":"Digestion happens all along the gut; the small intestine does much of the breakdown and absorption."}]},

"SND":{"code":"SND","title":"Waves and sound","discipline":"physics","blurb":"Discover how waves carry energy without carrying matter, and how vibrations become the sounds we hear.",
"vocab":[{"term":"wave","definition":"Something that transfers energy from place to place without transferring matter.","say":"wayv"},{"term":"oscillate","definition":"To move repeatedly backwards and forwards, or up and down.","say":"OSS-il-ate"},{"term":"transverse wave","definition":"A wave where the oscillation is perpendicular to the wave direction.","say":"tranz-VERS"},{"term":"longitudinal wave","definition":"A wave where the oscillation is parallel to the wave direction.","say":"lon-jih-TYOO-din-al"},{"term":"amplitude","definition":"The maximum distance a wave moves from its central line.","say":"AM-plih-tood"},{"term":"wavelength","definition":"The distance from one peak to the next peak.","say":"WAYV-length"},{"term":"frequency","definition":"The number of waves passing a point each second.","say":"FREE-kwen-see"},{"term":"hertz","definition":"The unit of frequency; one hertz means one oscillation per second.","say":"hurts"},{"term":"medium","definition":"The material a wave travels through, such as a solid, liquid or gas.","say":"MEE-dee-um"},{"term":"ultrasound","definition":"Sound with a frequency above 20,000 hertz, too high for humans to hear.","say":"UL-truh-sownd"}],
"facts":["Waves transfer energy from one place to another, but they do not transfer matter (particles).","Sound and light are both waves; sound is longitudinal and light is transverse.","In a transverse wave the oscillation is perpendicular to the wave; in a longitudinal wave it is parallel.","Sound is made when an object vibrates, making particles in the air oscillate and pass energy on.","Sound needs a medium to travel, so it cannot travel through a vacuum, but light can.","Sound travels fastest in solids (around 5000 m/s), slower in liquids (around 1500 m/s), and slowest in gases (around 330 m/s in air).","A larger amplitude makes a sound louder; a higher frequency makes a sound higher in pitch.","Humans can hear frequencies from about 20 Hz to about 20,000 Hz.","A microphone uses a diaphragm that vibrates like an ear drum, and ultrasound echoes are used to locate objects."],
"misconceptions":[{"wrong":"Waves carry particles along with them from one place to another.","right":"Waves transfer only energy; the particles just oscillate in place and stay put."},{"wrong":"Sound can travel through empty space, like in space films.","right":"Sound needs particles in a medium, so it cannot travel through a vacuum such as space."},{"wrong":"The amplitude is measured from the peak all the way down to the trough.","right":"The amplitude is measured from the central line to a peak, not peak to trough."},{"wrong":"Making a sound louder also makes it higher in pitch.","right":"Amplitude controls loudness; frequency controls pitch. They are separate features."}],
"questions":[{"type":"mcq","q":"What does a wave transfer from one place to another?","options":[{"t":"Energy","correct":true},{"t":"Particles of matter","why":"Waves leave the particles where they are; the particles only oscillate in place."},{"t":"Both energy and matter","why":"A wave transfers energy only, not matter."}],"ok":"All waves transfer energy and that is all they do."},{"type":"tf","q":"Sound can travel through a vacuum, such as the empty space between the Sun and Earth.","answer":false,"why":"Sound needs particles in a medium to travel, and a vacuum has no particles, so sound cannot travel through it."},{"type":"categorise","q":"Sort each wave by its type.","bins":["Transverse","Longitudinal"],"items":[{"t":"Light wave","bin":"Transverse"},{"t":"Water wave","bin":"Transverse"},{"t":"Stadium wave","bin":"Transverse"},{"t":"Sound wave","bin":"Longitudinal"}],"ok":"In transverse waves the oscillation is perpendicular to the wave; sound is the main longitudinal example.","bad":"Remember: sound is the main longitudinal wave, while light, water and stadium waves are transverse."},{"type":"mcq","q":"In a longitudinal wave, how does the oscillation compare to the direction the wave travels?","options":[{"t":"It is parallel to the wave direction","correct":true},{"t":"It is perpendicular to the wave direction","why":"That describes a transverse wave; longitudinal oscillations are parallel."},{"t":"It is at exactly 45 degrees to the wave direction","why":"Longitudinal oscillations run parallel to the wave, not at an angle."}],"ok":"In a longitudinal wave the oscillation is parallel to the direction of travel."},{"type":"mcq","q":"How is the amplitude of a transverse wave measured?","options":[{"t":"From the central line up to a peak","correct":true},{"t":"From a peak all the way down to a trough","why":"That distance is double the amplitude; amplitude is measured from the central line."},{"t":"From one peak to the next peak","why":"That is the wavelength, not the amplitude."}],"ok":"Amplitude is the distance from the central line to a peak or trough."},{"type":"mcq","q":"What is the wavelength of a wave?","options":[{"t":"The distance from one peak to the next peak","correct":true},{"t":"The height of the wave above the central line","why":"That is the amplitude, not the wavelength."},{"t":"The number of waves passing each second","why":"That is the frequency, not the wavelength."}],"ok":"The distance from one peak to the next is the wavelength."},{"type":"multi","q":"Tap all the statements about frequency that are true.","items":[{"t":"It is measured in hertz (Hz)","correct":true},{"t":"It is the number of oscillations per second","correct":true},{"t":"It is measured in metres"},{"t":"A higher frequency gives a higher pitch","correct":true}],"ok":"Frequency is measured in hertz and controls the pitch.","bad":"Frequency is measured in hertz, not metres. It counts oscillations per second and sets the pitch."},{"type":"numeric","kicker":"Work it out","q":"Eight complete oscillations pass a point every second. What is the frequency?","hint":"Frequency is the number of oscillations per second, measured in hertz.","answer":8,"unit":"Hz","ok":"Eight oscillations per second is 8 Hz."},{"type":"mcq","q":"What must happen for any object to make a sound?","options":[{"t":"It must vibrate","correct":true},{"t":"It must get hot","why":"Heating an object does not make a sound; vibration does."},{"t":"It must change colour","why":"Colour is to do with light, not making sounds."}],"ok":"A vibrating object makes the air particles oscillate and a sound wave spreads out."},{"type":"tf","q":"Increasing the amplitude of a sound wave makes the sound higher in pitch.","answer":false,"why":"Increasing the amplitude makes a sound louder. It is the frequency that changes the pitch."},{"type":"categorise","q":"Decide whether each change alters the loudness or the pitch of a sound.","bins":["Loudness","Pitch"],"items":[{"t":"Increasing the amplitude","bin":"Loudness"},{"t":"Decreasing the amplitude","bin":"Loudness"},{"t":"Increasing the frequency","bin":"Pitch"},{"t":"Decreasing the frequency","bin":"Pitch"}],"ok":"Amplitude changes loudness; frequency changes pitch.","bad":"Keep these separate: amplitude is linked to loudness, and frequency is linked to pitch."},{"type":"order","q":"Order these materials from the slowest speed of sound to the fastest.","items":["Gas (air)","Liquid (water)","Solid"],"ok":"Particles are closest together in a solid, so they pass energy on fastest."},{"type":"mcq","q":"Why does sound travel fastest through a solid?","options":[{"t":"The particles are close together, so energy passes on most easily","correct":true},{"t":"Solids are always warmer than liquids and gases","why":"Temperature is not the reason; it is about how close the particles are."},{"t":"Solids contain no particles at all","why":"Solids are packed full of particles; that is why sound travels well through them."}],"ok":"Closely packed particles transfer the energy of the wave most quickly."},{"type":"numeric","kicker":"Work it out","q":"Ultrasound travels at 200 m/s and takes 4 s to travel from A to B. How far is it from A to B? (distance = speed × time)","hint":"Multiply the speed by the time: 200 × 4.","answer":800,"unit":"m","ok":"200 m/s × 4 s = 800 m."},{"type":"numeric","kicker":"Work it out","q":"What is the approximate speed of sound in air, in metres per second?","hint":"Sound is slowest in gases; in air it is around three hundred and thirty.","answer":330,"unit":"m/s","ok":"The speed of sound in air is about 330 m/s."},{"type":"multi","q":"Tap all the parts of the journey when we hear a sound.","items":[{"t":"Air particles oscillate and carry energy to the ear","correct":true},{"t":"The sound wave makes the ear drum vibrate","correct":true},{"t":"The cochlea turns the vibration into an electrical signal","correct":true},{"t":"The ear drum sends particles of air to the brain"}],"ok":"The ear drum vibrates and the cochlea creates a signal for the brain.","bad":"No particles travel to the brain. The ear drum vibrates and the cochlea makes an electrical signal."},{"type":"mcq","q":"Which part of a microphone vibrates to detect a sound, just like the ear drum?","options":[{"t":"The diaphragm","correct":true},{"t":"The cochlea","why":"The cochlea is part of the ear, not the microphone; the matching part is the diaphragm."},{"t":"The auditory nerve","why":"The auditory nerve carries signals in the ear; in a microphone the vibrating part is the diaphragm."}],"ok":"A microphone's diaphragm vibrates exactly like an ear drum."},{"type":"mcq","q":"Above which frequency is a sound called ultrasound?","options":[{"t":"20,000 Hz","correct":true},{"t":"20 Hz","why":"20 Hz is the lowest frequency humans can hear, not the ultrasound limit."},{"t":"330 Hz","why":"330 is the speed of sound in air in m/s, not a hearing limit."}],"ok":"Anything above 20,000 Hz is ultrasound, too high for humans to hear."},{"type":"tf","q":"Ultrasound is a completely different kind of wave from ordinary sound.","answer":false,"why":"Ultrasound is exactly the same kind of longitudinal sound wave; it just has a very high frequency we cannot hear."},{"type":"order","q":"Put the steps of using ultrasound echolocation in order.","items":["Emit an ultrasound pulse and start a stopwatch","The ultrasound travels through the medium","It echoes off a surface and travels back","Detect the echo, stop the stopwatch and work out the distance"],"ok":"Knowing the speed and the time lets us work out the distance to the object."}]},

"GAS":{"code":"GAS","title":"Gas exchange systems","discipline":"biology","blurb":"Discover how your breathing system pulls in oxygen and pushes out carbon dioxide every single moment.",
"vocab":[{"term":"ventilation","definition":"The movement of air into and out of the lungs.","say":"ven-ti-LAY-shun"},{"term":"trachea","definition":"The windpipe; the tube that carries air down towards the lungs.","say":"tra-KEE-ah"},{"term":"bronchi","definition":"The two larger tubes that branch from the trachea into the lungs.","say":"BRONK-eye"},{"term":"bronchioles","definition":"The smaller branching tubes air moves into after the bronchi.","say":"BRONK-ee-oles"},{"term":"alveoli","definition":"Tiny air sacs in the lungs where gas exchange takes place.","say":"al-VEE-oh-lye"},{"term":"diaphragm","definition":"A sheet of muscle under the lungs that helps with breathing.","say":"DY-a-fram"},{"term":"gas exchange","definition":"Oxygen moving into the blood and carbon dioxide moving out.","say":"gas ex-CHAYNJ"},{"term":"diffusion","definition":"Movement of particles from high concentration to low concentration.","say":"dif-YOO-zhun"},{"term":"intercostal muscles","definition":"Muscles between the ribs that move the ribcage when breathing.","say":"in-ter-KOS-tal"},{"term":"asthma","definition":"A condition where airways become irritated and inflamed.","say":"ASS-ma"}],
"facts":["Air passes through the nose or mouth, then the trachea, bronchi, bronchioles and finally the alveoli.","The trachea has rings of cartilage that hold it open so gases can pass through easily.","When you breathe in, the intercostal muscles contract and the diaphragm flattens and moves down.","Breathing in increases the volume of the chest, which lowers the pressure inside the lungs so air rushes in.","Gas exchange happens in the alveoli: oxygen diffuses into the blood and carbon dioxide diffuses out.","Inhaled air is about 21% oxygen, but exhaled air is only about 16% oxygen.","Nitrogen makes up about 78% of the air, and our bodies do not use it, so we breathe it back out.","Alveoli are adapted with a large surface area, walls one-cell thick, a good blood supply and a moist surface.","During exercise your breathing rate increases so more oxygen enters and more carbon dioxide is removed."],
"misconceptions":[{"wrong":"We only breathe in oxygen.","right":"Inhaled air is mostly nitrogen (about 78%), with oxygen and small amounts of other gases."},{"wrong":"We breathe out only carbon dioxide.","right":"Exhaled air is still about 78% nitrogen and 16% oxygen, with carbon dioxide rising to about 4%."},{"wrong":"Inhaling and ventilation are the same thing.","right":"Ventilation is air moving both in and out; inhaling is only the breathing-in part."},{"wrong":"Asthma can be cured with an inhaler.","right":"There is no cure for asthma, but an inhaler reduces swelling and widens the airways to manage symptoms."}],
"questions":[{"type":"order","q":"Put these in the order air passes through them when you breathe in.","items":["Mouth and nose","Trachea","Bronchi","Bronchioles","Alveoli"],"ok":"Air travels nose or mouth, trachea, bronchi, bronchioles, then into the alveoli."},{"type":"mcq","q":"Where in the lungs does gas exchange actually take place?","options":[{"t":"In the alveoli","correct":true},{"t":"In the trachea","why":"The trachea only carries air down towards the lungs."},{"t":"In the diaphragm","why":"The diaphragm is a muscle that helps move air, not exchange gases."}],"ok":"Gas exchange takes place in the tiny air sacs called alveoli."},{"type":"categorise","q":"Sort what happens in the body when you breathe IN versus breathe OUT.","bins":["Breathing in","Breathing out"],"items":[{"t":"Intercostal muscles contract","bin":"Breathing in"},{"t":"Diaphragm flattens and moves down","bin":"Breathing in"},{"t":"Ribcage moves up and out","bin":"Breathing in"},{"t":"Intercostal muscles relax","bin":"Breathing out"},{"t":"Diaphragm moves upwards","bin":"Breathing out"},{"t":"Ribcage drops and moves inwards","bin":"Breathing out"}],"ok":"When you breathe in, muscles contract and the chest gets bigger; breathing out is the opposite.","bad":"Remember: breathing in makes the chest bigger, breathing out makes it smaller."},{"type":"categorise","q":"Sort each gas by whether there is MORE of it in inhaled air or in exhaled air.","bins":["More in inhaled air","More in exhaled air"],"items":[{"t":"Oxygen","bin":"More in inhaled air"},{"t":"Carbon dioxide","bin":"More in exhaled air"},{"t":"Water vapour","bin":"More in exhaled air"}],"ok":"We breathe in more oxygen, and breathe out more carbon dioxide and water vapour.","bad":"Oxygen drops from about 21% to 16%, while carbon dioxide and water vapour rise."},{"type":"multi","q":"Tap all the ways the alveoli are adapted for efficient gas exchange.","items":[{"t":"Large surface area","correct":true},{"t":"Walls that are one-cell thick","correct":true},{"t":"A good blood supply","correct":true},{"t":"A moist surface","correct":true},{"t":"A thick, waterproof lining"},{"t":"Rings of cartilage to stay open"}],"ok":"Alveoli have a large surface area, thin walls, a good blood supply and a moist surface.","bad":"Thick or waterproof linings would slow diffusion down, not speed it up."},{"type":"mcq","q":"By what process do oxygen and carbon dioxide move during gas exchange?","options":[{"t":"Diffusion","correct":true},{"t":"Ventilation","why":"Ventilation is air moving in and out of the lungs, not gases crossing into blood."},{"t":"Contraction","why":"Contraction is what muscles do; it does not move gases across membranes."}],"ok":"Gases move by diffusion, from high concentration to low concentration."},{"type":"tf","q":"Oxygen diffuses from the alveolus into the blood.","answer":true,"why":"There is more oxygen in the alveolus than the blood, so it diffuses into the blood."},{"type":"tf","q":"Carbon dioxide diffuses from the alveolus into the blood.","answer":false,"why":"It is the other way round: carbon dioxide diffuses from the blood into the alveolus to be breathed out."},{"type":"mcq","q":"Roughly what percentage of inhaled air is oxygen?","options":[{"t":"About 21%","correct":true},{"t":"About 78%","why":"That is the percentage of nitrogen, the most abundant gas in air."},{"t":"About 4%","why":"That is roughly the percentage of carbon dioxide in exhaled air."}],"ok":"Inhaled air is about 21% oxygen; exhaled air drops to about 16%."},{"type":"mcq","q":"Which gas makes up the largest share of the air we breathe in?","options":[{"t":"Nitrogen","correct":true},{"t":"Oxygen","why":"Oxygen is only about 21% of inhaled air."},{"t":"Carbon dioxide","why":"There is only a tiny amount of carbon dioxide in inhaled air."}],"ok":"Nitrogen is the most abundant gas, making up about 78% of inhaled air."},{"type":"tf","q":"All the nitrogen we breathe in is used up by the body.","answer":false,"why":"Our bodies do not need nitrogen, so the same 78% we inhale is breathed back out."},{"type":"mcq","q":"What is the job of the rings of cartilage in the trachea?","options":[{"t":"To hold the trachea open so gases can pass through easily","correct":true},{"t":"To carry out gas exchange","why":"Gas exchange happens in the alveoli, not the trachea."},{"t":"To trap dust and germs","why":"Mucus and cilia trap and remove dust and germs, not the cartilage."}],"ok":"Cartilage rings stop the trachea collapsing under the pressure made when we breathe."},{"type":"mcq","q":"What happens to your breathing rate when you exercise?","options":[{"t":"It increases","correct":true},{"t":"It decreases","why":"During exercise the body needs more oxygen, so breathing speeds up, not slows."},{"t":"It stays exactly the same","why":"Exercise raises your need for oxygen and removal of carbon dioxide, so it must change."}],"ok":"Breathing rate increases so more oxygen enters and more carbon dioxide is removed."},{"type":"mcq","q":"Why does your breathing rate go up during exercise?","options":[{"t":"Cells need more oxygen and produce more carbon dioxide","correct":true},{"t":"The alveoli shrink to save energy","why":"The alveoli do not shrink during exercise."},{"t":"The trachea closes to slow airflow","why":"The trachea stays open; closing it would make breathing harder, not help."}],"ok":"Exercising cells need extra oxygen and make extra carbon dioxide that must be removed."},{"type":"tf","q":"During an asthma attack, the airways become narrower and less air can pass through.","answer":true,"why":"The airways become inflamed, the muscles contract and extra mucus is released, narrowing them."},{"type":"multi","q":"Tap all the things that happen in the airways during an asthma attack.","items":[{"t":"The airways become inflamed","correct":true},{"t":"The muscles around the airways contract","correct":true},{"t":"Extra mucus is released","correct":true},{"t":"The airways get wider and smoother"},{"t":"More cartilage rings grow"}],"ok":"Inflammation, muscle contraction and extra mucus all narrow the airways.","bad":"The airways get narrower, not wider, during an attack."},{"type":"mcq","q":"How can a person with asthma manage their symptoms?","options":[{"t":"By using an inhaler to reduce swelling and widen the airways","correct":true},{"t":"By taking medicine that cures the asthma","why":"There is no cure for asthma; an inhaler manages it but does not cure it."},{"t":"By breathing in more dust and pollen","why":"Dust and pollen are triggers that can cause an attack, not treatments."}],"ok":"An inhaler reduces swelling in the airways and widens them so more air can pass."},{"type":"tf","q":"Smoking damages the cilia so they cannot sweep mucus out of the trachea as well.","answer":true,"why":"Damaged cilia let mucus build up, which can lead to a persistent smoker's cough."},{"type":"mcq","q":"Why does the chest pressure drop when you breathe in, making air rush in?","options":[{"t":"The chest volume increases as the ribs lift and the diaphragm flattens","correct":true},{"t":"The chest volume decreases as the ribs drop","why":"That describes breathing out, when air is forced out instead."},{"t":"The alveoli pump air inwards themselves","why":"Alveoli do not pump; air moves because of pressure changes in the chest."}],"ok":"A bigger chest volume lowers the pressure inside the lungs, so air rushes in."}]},

"ENR":{"code":"ENR","title":"Energy resources","discipline":"physics","blurb":"Discover how we turn wind, water and fossil fuels into electricity, and why some choices warm the planet.",
"vocab":[{"term":"energy resource","definition":"A source we use to power machines or generate electricity.","say":"EN-uh-jee ree-SORS"},{"term":"fossil fuel","definition":"A fuel made from the remains of ancient living things.","say":"FOSS-il FYOO-uhl"},{"term":"generator","definition":"A machine that uses movement to generate electric current.","say":"JEN-uh-ray-tuh"},{"term":"turbine","definition":"A part that spins to turn a generator.","say":"TUR-bine"},{"term":"National Grid","definition":"The system of cables that carries electricity to homes and factories.","say":"NASH-uh-nul GRID"},{"term":"renewable","definition":"A resource replaced naturally as quickly as we use it.","say":"ree-NYOO-uh-bul"},{"term":"non-renewable","definition":"A resource that runs out because it cannot be replaced quickly.","say":"non-ree-NYOO-uh-bul"},{"term":"carbon dioxide","definition":"A gas released by burning fossil fuels that warms the planet.","say":"KAR-bun die-OK-side"},{"term":"hydroelectric","definition":"Generating electricity using water trapped behind a dam.","say":"hy-droh-ee-LEK-trik"},{"term":"biofuel","definition":"A fuel made from biological material we can regrow.","say":"BY-oh-fyoo-uhl"}],
"facts":["In every method of generating electricity, a turbine turns a generator, and the generator produces the electric current.","Fossil fuels are coal, oil and natural gas, made from the remains of living things over millions of years.","Burning fossil fuels releases large amounts of carbon dioxide, which contributes to global warming.","In a fossil fuel power station, fuel is burned to boil water; the steam turns the turbine.","In a hydroelectric power station, water released from behind a dam turns the turbine.","The National Grid is the system of cables that carries electricity to homes, businesses and factories.","Renewable resources like wind and water are replaced naturally, so they will not run out.","Fossil fuels are non-renewable because we use them far faster than they can ever be replaced.","Wind and hydroelectric power have no fuel cost, and neither produces large amounts of carbon dioxide."],
"misconceptions":[{"wrong":"The generator makes the turbine spin to create electricity.","right":"Something else spins the turbine first; the spinning turbine then turns the generator, which makes the current."},{"wrong":"Non-renewable resources will run out very soon.","right":"They could last a long time with care; the point is they are not replaced naturally on a useful timescale."},{"wrong":"All power stations release carbon dioxide.","right":"Only burning fossil fuels releases large amounts of carbon dioxide; wind and hydroelectric do not."},{"wrong":"Wood is a fossil fuel because it comes from trees.","right":"Fossil fuels form from remains over millions of years; fresh wood is not a fossil, so it is not a fossil fuel."}],
"questions":[{"type":"mcq","q":"In all three methods of generating electricity, which machine actually produces the electric current?","options":[{"t":"The generator","correct":true},{"t":"The turbine","why":"The turbine spins and turns the generator, but it does not make the current itself."},{"t":"The dam","why":"A dam only holds back water in a hydroelectric station; it does not produce current."}],"ok":"Whatever spins the turbine, it is always the generator that makes the current."},{"type":"order","q":"Put the steps of a fossil fuel power station in order, from start to electricity.","items":["Fossil fuel is burned","Water is boiled into steam","Steam turns the turbine","The turbine turns the generator","The generator produces electric current"],"ok":"Burn the fuel, make steam, spin the turbine, turn the generator, and out comes the current."},{"type":"categorise","q":"Sort these energy resources into renewable and non-renewable.","bins":["Renewable","Non-renewable"],"items":[{"t":"Wind","bin":"Renewable"},{"t":"Water (hydroelectric)","bin":"Renewable"},{"t":"Biofuel","bin":"Renewable"},{"t":"Coal","bin":"Non-renewable"},{"t":"Oil","bin":"Non-renewable"},{"t":"Natural gas","bin":"Non-renewable"}],"ok":"Wind, water and biofuels are replaced naturally; coal, oil and gas are not.","bad":"Check again: fossil fuels (coal, oil, gas) are non-renewable, while wind, water and biofuels are renewable."},{"type":"tf","q":"Burning fossil fuels releases large amounts of carbon dioxide, which contributes to global warming.","answer":true,"why":"This is the main environmental disadvantage of fossil fuel power stations."},{"type":"multi","q":"Tap all the resources that do NOT produce large amounts of carbon dioxide when generating electricity.","items":[{"t":"Wind power","correct":true},{"t":"Hydroelectric power","correct":true},{"t":"Fossil fuel power station"},{"t":"Coal-burning power station"}],"ok":"Wind and hydroelectric power are clean of large carbon dioxide releases.","bad":"Any station that burns fossil fuels releases lots of carbon dioxide, so it should not be selected."},{"type":"mcq","q":"Why are fossil fuels described as non-renewable?","options":[{"t":"They are used far faster than they can be replaced","correct":true},{"t":"They do not contain any stored energy","why":"Fossil fuels are chemical energy stores, so they certainly hold energy."},{"t":"They are too expensive to dig up","why":"Cost is a separate issue; non-renewable refers to not being replaced naturally in time."}],"ok":"They take millions of years to form, but we burn them in moments."},{"type":"mcq","q":"What turns the turbine in a hydroelectric power station?","options":[{"t":"Water released from behind a dam","correct":true},{"t":"Steam from boiling water","why":"That is how a fossil fuel station works, not a hydroelectric one."},{"t":"The wind blowing across the dam","why":"Hydroelectric stations use moving water, not wind, to spin the turbine."}],"ok":"The trapped water rushes through a channel and spins the turbine."},{"type":"tf","q":"The National Grid is the system of cables that carries electricity to homes, businesses and factories.","answer":true,"why":"It transfers energy by electric current across the whole country."},{"type":"categorise","q":"Sort each statement as an advantage or a disadvantage of using wind power.","bins":["Advantage","Disadvantage"],"items":[{"t":"Wind is free","bin":"Advantage"},{"t":"Wind is replaced naturally each day","bin":"Advantage"},{"t":"Does not produce carbon dioxide","bin":"Advantage"},{"t":"Turbines are expensive to build","bin":"Disadvantage"},{"t":"It may not be windy enough","bin":"Disadvantage"}],"ok":"Free, clean fuel is the upside; build cost and unreliable wind are the downsides.","bad":"Look again: free and clean are advantages, while build cost and calm days are disadvantages."},{"type":"mcq","q":"Why is coal called a fossil fuel but fresh wood is not?","options":[{"t":"Coal formed from ancient remains over millions of years; fresh wood has not","correct":true},{"t":"Coal is black and wood is brown","why":"Colour has nothing to do with whether a fuel is a fossil fuel."},{"t":"Wood cannot be burned for energy","why":"Wood can certainly be burned; it just is not a fossil."}],"ok":"A fossil fuel is made from a fossil, an organism that lived long ago."},{"type":"mcq","q":"Which method of generating electricity is least affected by the weather?","options":[{"t":"Fossil fuel power station","correct":true},{"t":"Wind turbine","why":"Wind turbines stop generating when it is not windy enough."},{"t":"Hydroelectric power station","why":"Hydroelectric output can fall during a drought, so weather still matters."}],"ok":"A fossil fuel station can burn fuel whatever the weather is doing."},{"type":"numeric","kicker":"Work it out","q":"Power station A burns 50 tonnes of coal per hour. Station B burns 30 tonnes per hour. How many more tonnes per hour does A burn?","hint":"Find the difference between the two amounts of coal.","answer":20,"unit":"tonnes","ok":"50 − 30 = 20 tonnes more per hour. Burning more fuel means more electricity, but also more carbon dioxide."},{"type":"tf","q":"Renewable means we can use the very same energy over and over again.","answer":false,"why":"It means the resource is replaced naturally as fast as we use it, not that the energy is reused."},{"type":"multi","q":"Tap all the resources that need a fuel to be burned to generate electricity.","items":[{"t":"Coal","correct":true},{"t":"Natural gas","correct":true},{"t":"Wind"},{"t":"Water behind a dam"}],"ok":"Fossil fuels are burned, while wind and water are not.","bad":"Wind and falling water turn the turbine directly with no burning involved."},{"type":"mcq","q":"A house on a remote island is not connected to the National Grid. What does this mean?","options":[{"t":"It cannot receive mains electricity through the Grid's cables","correct":true},{"t":"It can never use any electricity at all","why":"It could still make its own electricity, for example with a solar panel or generator."},{"t":"It must use only fossil fuels","why":"There is no such rule; off-grid homes often use renewables."}],"ok":"No Grid connection means no mains electricity delivered by those cables."},{"type":"categorise","q":"Sort each resource by whether it releases carbon dioxide when used to generate electricity.","bins":["Releases CO₂","No large CO₂"],"items":[{"t":"Coal","bin":"Releases CO₂"},{"t":"Oil","bin":"Releases CO₂"},{"t":"Natural gas","bin":"Releases CO₂"},{"t":"Wind","bin":"No large CO₂"},{"t":"Hydroelectric","bin":"No large CO₂"}],"ok":"Burning fossil fuels releases carbon dioxide; wind and water do not.","bad":"Only the fossil fuels that get burned release large amounts of carbon dioxide."},{"type":"tf","q":"In a wind turbine, the spinning fan turns a generator, which produces the electric current.","answer":true,"why":"The wind moves the fan, the fan turns the generator, and the generator makes the current."},{"type":"mcq","q":"Compared with fossil fuels, why are wind and water easier to rely on long-term?","options":[{"t":"They are replaced naturally, while fossil fuels are not","correct":true},{"t":"They contain far more energy than any fuel","why":"The point is not how much energy they hold, but that they are naturally replaced."},{"t":"They are mined from deep underground","why":"Wind and water are not mined; fossil fuels are the ones found underground."}],"ok":"Nature keeps replacing wind and water, but fossil fuels run down."}]},

"ACD":{"code":"ACD","title":"Acids and alkalis","discipline":"chemistry","blurb":"Meet acids, alkalis and the pH scale, then watch them react to make salts, water and a squeaky pop of hydrogen.",
"vocab":[{"term":"acid","definition":"A family of chemicals with a pH below 7.","say":"ASS-id"},{"term":"alkali","definition":"A soluble base with a pH above 7.","say":"AL-kuh-lye"},{"term":"neutral","definition":"A substance that is neither acidic nor alkaline, exactly pH 7.","say":"NEW-trull"},{"term":"pH scale","definition":"The scale from 0 to 14 measuring acid and alkali strength.","say":"pee-AYCH scale"},{"term":"indicator","definition":"A chemical that changes colour depending on the pH.","say":"IN-dih-kay-tor"},{"term":"universal indicator","definition":"An indicator showing the whole range of pH values by colour.","say":"yoo-nih-VER-sal IN-dih-kay-tor"},{"term":"base","definition":"Any chemical that can cancel out an acid.","say":"bayss"},{"term":"neutralisation","definition":"A reaction where acid and alkali make salt and water.","say":"new-truh-lie-ZAY-shun"},{"term":"salt","definition":"A chemical made when an acid reacts with a base or metal.","say":"sawlt"},{"term":"corrosive","definition":"Able to burn or damage skin, eyes and materials.","say":"kuh-ROH-siv"}],
"facts":["The pH scale runs from 0 to 14, with neutral substances at exactly pH 7.","Any substance with a pH below 7 is an acid; any substance above 7 is an alkali.","Strong laboratory acids have pH 0-2; weak acids like vinegar and lemon juice have pH 4-6.","Weak alkalis like toothpaste and soap have pH 8-10; strong alkalis like sodium hydroxide have pH 12-14.","Universal indicator turns red in strong acids, green in neutral solutions and purple in strong alkalis.","An alkali is a soluble base; all alkalis are bases, but not all bases are alkalis.","Neutralisation follows the rule: acid + alkali → salt + water.","Metals react with acids following the rule: metal + acid → salt + hydrogen.","Hydrogen gas is tested with a lit splint, giving a squeaky pop sound."],
"misconceptions":[{"wrong":"Universal indicator showing red means the acid itself is red.","right":"The colour is the indicator's colour at that pH; it is not the colour of the acid."},{"wrong":"All acids are extremely dangerous and corrosive.","right":"Strong laboratory acids are corrosive, but weak acids like fizzy drinks and lemon juice are safe."},{"wrong":"Every base is an alkali.","right":"Only bases that dissolve in water are alkalis; insoluble bases are still bases."},{"wrong":"A metal reacting with an acid makes salt and water.","right":"A metal and acid make salt and hydrogen, not water; the bubbles are hydrogen gas."},{"wrong":"Neutral covers a range of pH values around the middle.","right":"Neutral is exactly pH 7 only, a single point rather than a range."}],
"questions":[{"type":"mcq","q":"What does the pH scale measure?","options":[{"t":"How acidic or alkaline a substance is","correct":true},{"t":"The mass of a substance","why":"pH measures acidity, not mass."},{"t":"The temperature of a solution","why":"Temperature is measured in degrees, not pH."}],"ok":"The pH scale runs from 0 to 14."},{"type":"numeric","q":"What is the pH of a neutral substance like water?","answer":7,"ok":"Neutral is exactly pH 7."},{"type":"tf","q":"Any substance with a pH less than 7 is an acid.","answer":true,"why":"Acids sit below 7 on the pH scale; alkalis are above 7."},{"type":"tf","q":"An alkali has a pH below 7.","answer":false,"why":"Alkalis have a pH greater than 7; it is acids that are below 7."},{"type":"categorise","q":"Sort each substance by what it is, using its pH.","bins":["Acid","Neutral","Alkali"],"items":[{"t":"Hydrochloric acid (pH 1)","bin":"Acid"},{"t":"Lemon juice (pH 5)","bin":"Acid"},{"t":"Water (pH 7)","bin":"Neutral"},{"t":"Soap (pH 9)","bin":"Alkali"},{"t":"Sodium hydroxide (pH 13)","bin":"Alkali"}],"ok":"Below 7 is acid, exactly 7 is neutral, above 7 is alkali.","bad":"Check the pH: below 7 means acid, 7 is neutral, above 7 is alkali."},{"type":"order","q":"Put these in order from strongest acid to strongest alkali.","items":["Strong acid (pH 1)","Weak acid (pH 5)","Neutral (pH 7)","Weak alkali (pH 9)","Strong alkali (pH 13)"],"ok":"pH rises from 0 at the acid end to 14 at the alkali end."},{"type":"mcq","q":"What is an indicator?","options":[{"t":"A chemical that changes colour depending on the pH","correct":true},{"t":"A chemical that makes acids stronger","why":"Indicators show pH; they do not change a substance's strength."},{"t":"A type of strong alkali","why":"An indicator is not an alkali; it detects pH."}],"ok":"Indicators change colour with pH."},{"type":"categorise","q":"Match each universal indicator colour to the type of solution.","bins":["Acid","Neutral","Alkali"],"items":[{"t":"Red","bin":"Acid"},{"t":"Orange","bin":"Acid"},{"t":"Green","bin":"Neutral"},{"t":"Blue","bin":"Alkali"},{"t":"Purple","bin":"Alkali"}],"ok":"Red and orange mean acid, green means neutral, blue and purple mean alkali.","bad":"Remember: reds and oranges are acids, green is neutral, blues and purples are alkalis."},{"type":"mcq","q":"What colour does universal indicator turn in a neutral solution?","options":[{"t":"Green","correct":true},{"t":"Red","why":"Red shows a strong acid, not neutral."},{"t":"Purple","why":"Purple shows a strong alkali, not neutral."}],"ok":"Green is the colour for neutral, around pH 7."},{"type":"mcq","q":"What colour does universal indicator turn in a strong alkali like sodium hydroxide?","options":[{"t":"Purple","correct":true},{"t":"Green","why":"Green means neutral, not a strong alkali."},{"t":"Red","why":"Red means a strong acid, not an alkali."}],"ok":"Strong alkalis turn universal indicator purple."},{"type":"tf","q":"A red colour from universal indicator means the acid itself is red.","answer":false,"why":"It is the indicator's colour at that pH, not the colour of the acid."},{"type":"mcq","q":"What is an alkali?","options":[{"t":"A soluble base","correct":true},{"t":"Any acid that dissolves in water","why":"Alkalis are bases, the chemical opposites of acids, not acids."},{"t":"A neutral substance","why":"Neutral substances are pH 7; alkalis are above 7."}],"ok":"An alkali is a base that dissolves in water."},{"type":"tf","q":"All alkalis are bases, but not all bases are alkalis.","answer":true,"why":"An alkali is a soluble base; insoluble bases are bases but not alkalis."},{"type":"mcq","q":"What happens to the pH when a base is added to an acid?","options":[{"t":"It increases towards 7","correct":true},{"t":"It decreases towards 0","why":"Bases cancel out acids and raise the pH, not lower it."},{"t":"It stays exactly the same","why":"A base reacts with the acid and changes its pH."}],"ok":"Bases cancel out acids and raise the pH towards 7."},{"type":"mcq","q":"Complete the rule: acid + alkali → ?","options":[{"t":"salt + water","correct":true},{"t":"salt + hydrogen","why":"That is the rule for a metal and an acid, not an alkali."},{"t":"two acids","why":"Neutralisation makes new products: salt and water."}],"ok":"This reaction is called neutralisation."},{"type":"multi","q":"Tap all the products of a neutralisation reaction.","items":[{"t":"Salt","correct":true},{"t":"Water","correct":true},{"t":"Hydrogen"},{"t":"Oxygen"}],"ok":"Acid + alkali makes salt and water.","bad":"Neutralisation makes salt and water only, not a gas."},{"type":"mcq","q":"Hydrochloric acid reacts with sodium hydroxide. What salt is made?","options":[{"t":"Sodium chloride","correct":true},{"t":"Sodium sulfate","why":"Sulfates come from sulfuric acid, not hydrochloric acid."},{"t":"Sodium nitrate","why":"Nitrates come from nitric acid, not hydrochloric acid."}],"ok":"Hydrochloric acid makes a chloride, and the metal is sodium."},{"type":"mcq","q":"Complete the rule: metal + acid → ?","options":[{"t":"salt + hydrogen","correct":true},{"t":"salt + water","why":"That is neutralisation with an alkali; metals make hydrogen instead."},{"t":"salt + oxygen","why":"The gas made is hydrogen, not oxygen."}],"ok":"Remember MASH: metal, acid, salt, hydrogen."},{"type":"multi","q":"Tap all the signs that a metal is reacting with an acid.","items":[{"t":"Bubbles of gas are produced","correct":true},{"t":"The test tube gets hot","correct":true},{"t":"The acid turns into a solid metal"},{"t":"Nothing changes at all"}],"ok":"Bubbles of hydrogen form and heat is given off.","bad":"Look for bubbles of hydrogen gas and the test tube warming up."},{"type":"mcq","q":"How do you test that a gas is hydrogen?","options":[{"t":"A lit splint makes a squeaky pop","correct":true},{"t":"A lit splint relights and glows brighter","why":"That is the test for oxygen, not hydrogen."},{"t":"Limewater turns cloudy","why":"That is the test for carbon dioxide, not hydrogen."}],"ok":"The squeaky pop is hydrogen reacting with oxygen in the air."}]},

"LGT":{"code":"LGT","title":"Light","discipline":"physics","blurb":"Light races through space in straight lines, bounces off mirrors, bends through glass and splashes the world in colour.",
"vocab":[{"term":"ray","definition":"A straight line showing the path that light travels along.","say":"ray"},{"term":"vacuum","definition":"A space with no particles at all, such as outer space.","say":"VAK-yoom"},{"term":"reflection","definition":"When light bounces off a change in medium, like a mirror.","say":"rih-FLEK-shun"},{"term":"refraction","definition":"When light bends as it changes from one medium to another.","say":"rih-FRAK-shun"},{"term":"transparent","definition":"A material that lets all light pass straight through it.","say":"trans-PAIR-unt"},{"term":"translucent","definition":"A material that lets some light through, so it looks dimmer.","say":"trans-LOO-sunt"},{"term":"opaque","definition":"A material that lets no light pass through it.","say":"oh-PAYK"},{"term":"normal","definition":"An imaginary line drawn at 90 degrees to a surface.","say":"NOR-mul"},{"term":"spectrum","definition":"The smooth range of colours white light splits into.","say":"SPEK-trum"},{"term":"filter","definition":"A coloured material that only lets some colours of light through.","say":"FIL-ter"}],
"facts":["Light always travels in straight lines, which is why we draw it as straight arrows.","Light travels incredibly fast, at nearly 300 million metres per second in a vacuum.","Light can travel through a vacuum, but sound cannot because sound needs particles.","When light hits a new material it can be transmitted, absorbed or reflected.","In reflection the angle of incidence always equals the angle of reflection, measured from the normal.","Refraction happens when light changes speed crossing into a new medium at an angle, bending its path.","We see an object when light reflects off it and travels into our eyes.","A prism refracts white light and splits it into a spectrum: red, orange, yellow, green, blue, indigo, violet.","A coloured object reflects its own colour of light and absorbs the others."],
"misconceptions":[{"wrong":"Light needs particles to travel, just like sound does.","right":"Light can travel through a vacuum with no particles at all, unlike sound."},{"wrong":"We see objects because our eyes send out light onto them.","right":"We see objects because light reflects off them and enters our eyes."},{"wrong":"A black object gives out its own black light.","right":"Black is the absence of light; a black object absorbs all colours and reflects none."},{"wrong":"White light is a single pure colour on its own.","right":"White light is a mixture of all the colours of the spectrum combined."}],
"questions":[{"type":"mcq","q":"What path does light take to travel from one point to another?","options":[{"t":"A straight line","correct":true},{"t":"A curved line","why":"Light cannot bend around objects; it always goes straight."},{"t":"A zig-zag line","why":"Light travels straight until it hits a change in medium."}],"ok":"Light always travels in straight lines, so we draw it as straight arrows."},{"type":"tf","q":"Light can travel through a vacuum, but sound cannot.","answer":true,"why":"Sound needs particles to travel; light does not, so only light crosses a vacuum like space."},{"type":"mcq","q":"Roughly how fast does light travel in a vacuum?","options":[{"t":"Nearly 300 million metres per second","correct":true},{"t":"About 330 metres per second","why":"That is roughly the speed of sound in air, not light."},{"t":"About 300 metres per second","why":"Light is far faster than this; it is close to 300 million m/s."}],"ok":"Light travels at nearly 300 000 000 m/s in a vacuum, far faster than sound."},{"type":"categorise","q":"Sort each material by how much light passes through it.","bins":["Transparent","Translucent","Opaque"],"items":[{"t":"Clear glass","bin":"Transparent"},{"t":"Clean air","bin":"Transparent"},{"t":"Frosted bathroom window","bin":"Translucent"},{"t":"Tracing paper","bin":"Translucent"},{"t":"A wooden door","bin":"Opaque"},{"t":"A mirror","bin":"Opaque"}],"ok":"Transparent lets all light through, translucent lets some through, opaque lets none through.","bad":"Remember: a mirror is opaque because no light passes through it, even though it reflects."},{"type":"mcq","q":"What happens to light when it hits an opaque material?","options":[{"t":"It is absorbed or reflected, but not transmitted","correct":true},{"t":"It passes straight through","why":"That would make the material transparent, not opaque."},{"t":"Some passes through, making it look dimmer","why":"That describes a translucent material."}],"ok":"Opaque materials transmit no light; they only absorb it or reflect it."},{"type":"numeric","kicker":"Work it out","q":"A ray of light hits a mirror with an angle of incidence of 40 degrees. What is the angle of reflection?","hint":"angle of reflection = angle of incidence","answer":40,"unit":"degrees","ok":"The law of reflection says the angle of reflection always equals the angle of incidence."},{"type":"numeric","kicker":"Work it out","q":"A light ray reflects off a mirror with an angle of reflection of 55 degrees. What was the angle of incidence?","hint":"angle of reflection = angle of incidence","answer":55,"unit":"degrees","ok":"Because the two angles are always equal, the angle of incidence is also 55 degrees."},{"type":"mcq","q":"When we measure the angle of incidence and angle of reflection, which line do we measure from?","options":[{"t":"The normal line, drawn at 90 degrees to the surface","correct":true},{"t":"The surface of the mirror itself","why":"We always measure to the normal, never to the line of the surface."},{"t":"The edge of the ray box","why":"Angles are measured between the ray and the normal line."}],"ok":"We always measure angles to the normal, the imaginary line at 90 degrees to the surface."},{"type":"categorise","q":"Decide whether each situation is reflection or refraction.","bins":["Reflection","Refraction"],"items":[{"t":"Light bounces off a mirror","bin":"Reflection"},{"t":"You see yourself in a still pond","bin":"Reflection"},{"t":"Light bends as it enters a glass block at an angle","bin":"Refraction"},{"t":"White light splits into colours in a prism","bin":"Refraction"}],"ok":"Reflection is light bouncing back; refraction is light bending as it changes medium.","bad":"Bouncing back is reflection; bending into a new medium is refraction."},{"type":"tf","q":"Refraction happens when light changes speed as it crosses into a new medium at an angle.","answer":true,"why":"One edge of the beam slows or speeds up before the other, so the light changes direction."},{"type":"mcq","q":"When does light NOT refract as it enters a new medium?","options":[{"t":"When it hits the boundary at 90 degrees, along the normal","correct":true},{"t":"When it hits at 45 degrees","why":"At an angle the light bends, so it does refract here."},{"t":"Light always refracts no matter the angle","why":"Light goes straight through if it meets the boundary along the normal."}],"ok":"Light travelling along the normal (at 90 degrees) passes straight through without bending."},{"type":"mcq","q":"How do we see an object such as a chair?","options":[{"t":"Light reflects off the chair and travels into our eyes","correct":true},{"t":"Our eyes send out light onto the chair","why":"Eyes detect light; they do not produce it."},{"t":"The chair gives out its own light","why":"Most objects do not emit light; they reflect it."}],"ok":"We see objects when light reflects off them and enters our eyes to be detected."},{"type":"multi","q":"Tap all the parts of the eye involved in detecting light.","items":[{"t":"Pupil (lets light in)","correct":true},{"t":"Lens (focuses the light)","correct":true},{"t":"Retina (detects the light)","correct":true},{"t":"Cochlea"},{"t":"Optic nerve (carries signals to the brain)","correct":true}],"ok":"Light enters the pupil, the lens focuses it, the retina detects it and the optic nerve carries the signal.","bad":"The cochlea is part of the ear, not the eye."},{"type":"mcq","q":"What does a lens do to light?","options":[{"t":"It refracts the rays so they meet, focusing them to a point","correct":true},{"t":"It absorbs all the light that hits it","why":"A lens is transparent; it lets light through and bends it."},{"t":"It reflects light back the way it came","why":"That is what a mirror does, not a lens."}],"ok":"A lens has a curved shape that refracts light rays to focus them to a single point."},{"type":"mcq","q":"Why must a pinhole camera have a very tiny hole?","options":[{"t":"So there is only one path for light from each part of the object, forming a clear image","correct":true},{"t":"So the camera weighs less","why":"The hole size affects the image, not the weight."},{"t":"So more light can flood in at once","why":"A large hole lets light in at many angles and just makes a blurry bright spot."}],"ok":"A tiny hole gives one path per ray, so a clear image forms; a big hole gives only a bright blur."},{"type":"tf","q":"The image formed on the screen of a pinhole camera is upside down.","answer":true,"why":"Light from the top of the object passes through the hole to the bottom of the screen, flipping the image."},{"type":"order","q":"Put the colours of the visible spectrum in order, starting with the one that refracts least (red).","items":["Red","Orange","Yellow","Green","Blue","Indigo","Violet"],"ok":"White light splits into red, orange, yellow, green, blue, indigo, violet; red bends least, violet most."},{"type":"mcq","q":"What happens when white light is shone through a glass prism?","options":[{"t":"It refracts and splits into a spectrum of colours","correct":true},{"t":"It is absorbed and disappears","why":"The light passes through; the prism is transparent."},{"t":"It bounces straight back as white light","why":"The prism refracts the light and separates its colours."}],"ok":"A prism refracts white light and splits it into the spectrum because each colour bends a different amount."},{"type":"mcq","q":"Why does a red jumper look red in white light?","options":[{"t":"It reflects red light and absorbs the other colours","correct":true},{"t":"It absorbs red light and reflects the rest","why":"The colour you see is the one reflected, not absorbed."},{"t":"It makes its own red light","why":"The jumper reflects red from the white light; it does not emit light."}],"ok":"A coloured object reflects its own colour into your eyes and absorbs the others."},{"type":"mcq","q":"What does a green filter do to white light shone through it?","options":[{"t":"It transmits only green light and blocks the rest","correct":true},{"t":"It turns the light black","why":"The filter still lets its own colour through, so light appears green."},{"t":"It lets all the colours through unchanged","why":"A filter only transmits some colours; the others are not transmitted."}],"ok":"A coloured filter transmits only its own colour, so white light through a green filter appears green."}]},

"REP":{"code":"REP","title":"Reproduction","discipline":"biology","blurb":"Discover how humans and plants make new life, from sex cells joining to seeds being scattered far and wide.",
"vocab":[{"term":"gamete","definition":"A specialised sex cell; sperm or ovum in humans.","say":"GAM-eet"},{"term":"sperm","definition":"The male gamete; it swims to reach the ovum.","say":"sperm"},{"term":"ovum","definition":"The female gamete, also called the egg cell.","say":"OH-vum"},{"term":"fertilisation","definition":"When the sperm nucleus fuses with the ovum nucleus.","say":"fur-til-eye-ZAY-shun"},{"term":"zygote","definition":"The first single cell made when an ovum is fertilised.","say":"ZY-goht"},{"term":"embryo","definition":"The ball of cells formed when a zygote divides.","say":"EM-bree-oh"},{"term":"fetus","definition":"What an embryo is called after about 8 weeks.","say":"FEE-tus"},{"term":"placenta","definition":"Organ where substances pass between mother and fetus.","say":"plah-SEN-tah"},{"term":"gestation","definition":"The 40-week period of a fetus growing in the uterus.","say":"jess-TAY-shun"},{"term":"pollination","definition":"When pollen lands on the stigma of a flower.","say":"poll-in-AY-shun"}],
"facts":["Sexual reproduction needs two parents and two gametes: a sperm and an ovum.","Sperm are made in the testes; ova are made in the ovaries, which release one ovum each month.","Sperm are adapted with a streamlined head, a tail for swimming, many mitochondria for energy, and enzymes to enter the ovum.","Fertilisation happens in the oviduct when the sperm's nucleus fuses with the ovum's nucleus to make a zygote.","Only one sperm can fertilise an ovum, because the ovum's cell membrane changes to block the rest.","The fetus gets oxygen and nutrients from the mother and passes waste back, all by diffusion across the placenta.","The umbilical cord connects the fetus to the placenta, and amniotic fluid protects the fetus from knocks.","Gestation lasts on average 40 weeks, and the menstrual cycle lasts on average 28 days.","In flowers, the anther makes pollen and the ovule holds the ovum; after fertilisation the ovule becomes a seed and the ovary becomes a fruit."],
"misconceptions":[{"wrong":"Fertilisation happens in the ovary, where the sperm swims to meet the egg.","right":"Fertilisation happens in the oviduct, not the ovary, and we call it the ovum not the egg cell."},{"wrong":"A fetus is the name for the baby from the very moment of fertilisation.","right":"It is a zygote first, then an embryo, and only becomes a fetus after about 8 weeks."},{"wrong":"Plants cannot reproduce sexually because that needs two parents.","right":"Plants still use gametes that fuse, so it is sexual reproduction even when a plant self-pollinates."}],
"questions":[{"type":"mcq","q":"What is the general scientific name for a sex cell?","options":[{"t":"A gamete","correct":true},{"t":"A zygote","why":"A zygote is the cell made after fertilisation, not a sex cell."},{"t":"An embryo","why":"An embryo is a ball of cells formed when a zygote divides."}],"ok":"Sperm and ova are both gametes."},{"type":"mcq","q":"Where are sperm made in the male reproductive system?","options":[{"t":"The testes","correct":true},{"t":"The glands","why":"The glands add fluid to the sperm; they do not make them."},{"t":"The sperm duct","why":"The sperm duct is a tube that carries sperm; it does not make them."}],"ok":"The testes make millions of sperm a day."},{"type":"mcq","q":"In which part of the female reproductive system does fertilisation happen?","options":[{"t":"The oviduct","correct":true},{"t":"The ovary","why":"The ovary only releases the ovum; fertilisation happens later in the oviduct."},{"t":"The uterus","why":"The uterus is where the baby develops, after fertilisation has already happened."}],"ok":"The sperm meets the ovum in the oviduct."},{"type":"mcq","q":"What is made when the sperm nucleus fuses with the ovum nucleus?","options":[{"t":"A zygote","correct":true},{"t":"A fetus","why":"A fetus is much later, after the embryo has grown for about 8 weeks."},{"t":"A gamete","why":"Gametes are the sperm and ovum that join; the new cell is not a gamete."}],"ok":"The first cell of a new offspring is a zygote."},{"type":"mcq","q":"Which organ allows substances to pass between the mother's blood and the fetus's blood?","options":[{"t":"The placenta","correct":true},{"t":"The umbilical cord","why":"The cord connects the fetus to the placenta, but the exchange happens in the placenta."},{"t":"The cervix","why":"The cervix protects the uterus; it is not where blood substances are exchanged."}],"ok":"In the placenta the two blood supplies come very close so substances diffuse across."},{"type":"mcq","q":"In a flower, where is pollen made?","options":[{"t":"The anther","correct":true},{"t":"The stigma","why":"The stigma is the sticky end where pollen lands, not where it is made."},{"t":"The ovule","why":"The ovule holds the ovum, the female gamete, not pollen."}],"ok":"The anther makes the pollen, which contains the male gamete."},{"type":"mcq","q":"After fertilisation in a flower, what does the ovary grow into?","options":[{"t":"A fruit","correct":true},{"t":"A seed","why":"The ovule, not the ovary, grows into the seed."},{"t":"A petal","why":"Petals attract pollinators; they are not formed from the ovary."}],"ok":"The ovary becomes a fruit, which helps spread the seeds."},{"type":"multi","q":"Tap all of the adaptations of a sperm cell.","items":[{"t":"A streamlined head","correct":true},{"t":"A tail for swimming","correct":true},{"t":"Many mitochondria for energy","correct":true},{"t":"A huge volume of cytoplasm"},{"t":"A jelly coat"}],"ok":"The head, tail and mitochondria all help the sperm swim to the ovum.","bad":"A large cytoplasm and jelly coat are adaptations of the ovum, not the sperm."},{"type":"multi","q":"Tap all of the substances that move from the mother to the fetus across the placenta.","items":[{"t":"Oxygen","correct":true},{"t":"Nutrients","correct":true},{"t":"Waste"},{"t":"Sperm"}],"ok":"The fetus needs oxygen and nutrients, which diffuse in from the mother.","bad":"Waste moves the other way, from fetus to mother; sperm are not involved here."},{"type":"multi","q":"Tap all of the ways animals help to disperse seeds.","items":[{"t":"Eating tasty fruits","correct":true},{"t":"Burying nuts and forgetting them","correct":true},{"t":"Spiky burrs sticking to fur","correct":true},{"t":"Being blown by the wind"}],"ok":"Fruits, buried nuts and sticky burrs all use animals to spread seeds.","bad":"Wind dispersal does not rely on animals."},{"type":"tf","q":"Only one sperm can fertilise a single ovum.","answer":true,"why":"Once one sperm enters, the ovum's cell membrane changes to block all the others."},{"type":"tf","q":"The ovaries make millions of ova every day.","answer":false,"why":"The ovaries release just one ovum each month, usually taking turns."},{"type":"tf","q":"Plant reproduction by self-pollination is not sexual reproduction.","answer":false,"why":"It still uses gametes that fuse, so it counts as sexual reproduction."},{"type":"numeric","q":"On average, how many weeks does gestation last?","unit":"weeks","answer":40,"ok":"From the forming of the zygote to birth is normally about 40 weeks."},{"type":"numeric","q":"How many days does an average menstrual cycle last?","unit":"days","answer":28,"ok":"The menstrual cycle lasts on average 28 days, with ovulation around day 14."},{"type":"categorise","q":"Sort each organ into the male or female reproductive system.","bins":["Male","Female"],"items":[{"t":"Testes","bin":"Male"},{"t":"Sperm duct","bin":"Male"},{"t":"Ovary","bin":"Female"},{"t":"Oviduct","bin":"Female"},{"t":"Uterus","bin":"Female"}],"ok":"The testes and sperm duct are male; the ovary, oviduct and uterus are female.","bad":"Check again: the ovary, oviduct and uterus belong to the female system."},{"type":"categorise","q":"Sort each flower part into male or female.","bins":["Male part","Female part"],"items":[{"t":"Anther","bin":"Male part"},{"t":"Stigma","bin":"Female part"},{"t":"Ovary","bin":"Female part"},{"t":"Ovule","bin":"Female part"}],"ok":"The anther makes pollen so it is male; the stigma, ovary and ovule are female.","bad":"Remember the anther is the male part; the others are female."},{"type":"order","q":"Put the stages of human development in the correct order.","items":["Zygote","Embryo","Fetus","Baby"],"ok":"A zygote divides into an embryo, grows into a fetus, then is born as a baby."},{"type":"order","q":"Put these stages of plant reproduction in the correct order.","items":["Pollination","Fertilisation","Seed forms","Dispersal"],"ok":"Pollen lands, the ovum is fertilised, the ovule becomes a seed, then the seed is dispersed."}]},

"ENC":{"code":"ENC","title":"Energy changes","discipline":"chemistry","blurb":"Discover how changes of state and reactions move energy in and out, making things heat up or cool down.",
"vocab":[{"term":"energy change","definition":"Energy being transferred during a change of state or a reaction.","say":"EN-er-jee CHAYNJ"},{"term":"surroundings","definition":"Everything around a reaction, including the air and the thermometer.","say":"suh-ROWN-dings"},{"term":"exothermic","definition":"A change that transfers energy out to the surroundings, so temperature rises.","say":"ek-soh-THUR-mik"},{"term":"endothermic","definition":"A change that takes energy in from the surroundings, so temperature falls.","say":"en-doh-THUR-mik"},{"term":"thermometer","definition":"Apparatus used to measure a temperature change.","say":"thur-MOM-it-er"},{"term":"temperature change","definition":"The temperature after, minus the temperature before.","say":"TEM-pruh-cher CHAYNJ"},{"term":"neutralisation","definition":"A reaction between an acid and an alkali, forming a salt and water.","say":"new-truh-ly-ZAY-shun"},{"term":"combustion","definition":"Burning a fuel in oxygen, releasing energy to the surroundings.","say":"kom-BUST-yun"},{"term":"mean","definition":"Add all repeat values, then divide by how many there are.","say":"MEEN"},{"term":"range","definition":"The largest value minus the smallest value.","say":"RAYNJ"}],
"facts":["Energy is transferred during changes of state and during chemical reactions.","Exothermic changes transfer energy out to the surroundings, so the temperature of the surroundings rises.","Combustion and neutralisation are exothermic; hand warmers and self-heating cans use exothermic changes.","Endothermic changes take energy in from the surroundings, so the temperature of the surroundings falls.","Thermal decomposition is endothermic, and an instant icepack uses an endothermic change.","The surroundings include the thermometer, which is why it measures the temperature change.","You tell the two apart by measuring temperature: rise means exothermic, fall means endothermic.","Temperature change is the temperature after take away the temperature before.","Repeat readings are combined using the mean, and the spread is described using the range."],
"misconceptions":[{"wrong":"Exothermic means the reaction itself gets hot and the surroundings stay the same.","right":"In an exothermic change, energy is transferred out to the surroundings, so they get hotter."},{"wrong":"Only chemical reactions can be endothermic or exothermic.","right":"Changes of state, like melting and freezing, are energy changes too."},{"wrong":"If a reaction needs heating to keep going, it must be giving out energy.","right":"A reaction that must be heated continuously is taking energy in, so it is endothermic."},{"wrong":"An instant icepack feels cold because it makes coldness.","right":"It takes energy in from its surroundings, including your hand, so they cool down."}],
