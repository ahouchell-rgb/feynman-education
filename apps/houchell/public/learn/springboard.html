function viewDiagram(s){
  const d=DIAGRAMS[s.diagram]; if(!d) return `<h1 class="prompt fr">${s.q}</h1>`;
  const wh=d.vb.split(" "); const ratio=wh[2]+" / "+wh[3];
  const spots=d.parts.map(p=>`<button class="hotspot" data-id="${p.id}" style="left:${p.x}%;top:${p.y}%" aria-label="${p.label}"></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Label the diagram"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="diagram" style="aspect-ratio:${ratio}"><svg viewBox="${d.vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">${d.svg}</svg>${spots}</div>
    <div class="hint">Tap the right part of the diagram.</div>`;
}
function wireDiagram(s){
  L.payload={pick:null};
  const d=DIAGRAMS[s.diagram]; const spots=[...document.querySelectorAll(".hotspot")];
  spots.forEach(b=>b.onclick=()=>{ if(L.checked)return; L.payload.pick=b.dataset.id; spots.forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); enableCheck(true); });
  setCheck(()=>{ const ok=L.payload.pick===s.answer; const lbl=((d.parts.find(p=>p.id===s.answer)||{}).label||"part").toLowerCase();
    spots.forEach(b=>{ b.disabled=true; if(b.dataset.id===s.answer) b.classList.add("correct"); else if(b.dataset.id===L.payload.pick) b.classList.add("wrong"); });
    gradeQ(ok, ok?(s.ok||"Correct!"):`Not quite — the highlighted spot is the <b>${lbl}</b>.`);
  });
}

/* DIAGRAM CHECKPOINT — auto-generated from the build-up diagram: right after a fact
   adds a part, the pupil must tap that part with all labels hidden. Only parts already
   taught are tappable, so the choice set grows as the picture assembles. */
function viewDcheck(s){
  const d=DIAGRAMS[s.dgram]; if(!d) return `<h1 class="prompt fr">Tap the part you just learned.</h1>`;
  const t=d.parts.find(p=>p.id===s.target)||{label:"new part"};
  const wh=d.vb.split(" "); const ratio=wh[2]+" / "+wh[3];
  const spots=d.parts.filter(p=>(s.dreveal||[]).indexOf(p.id)>=0)
    .map(p=>`<button class="hotspot" data-id="${p.id}" style="left:${p.x}%;top:${p.y}%" aria-label="diagram part"></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"📍 Find it on the diagram"}</div>
    <h1 class="prompt fr">Tap the <b>${t.label.toLowerCase()}</b></h1>
    <div class="bdiagram dq" style="aspect-ratio:${ratio}"><svg viewBox="${d.vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">${d.svg}</svg>${spots}</div>
    <div class="hint">No labels this time — find it from memory.</div>`;
}
function wireDcheck(s){
  L.payload={pick:null};
  const d=DIAGRAMS[s.dgram]; const spots=[...document.querySelectorAll(".hotspot")];
  spots.forEach(b=>b.onclick=()=>{ if(L.checked)return; L.payload.pick=b.dataset.id; spots.forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); enableCheck(true); });
  setCheck(()=>{ const ok=L.payload.pick===s.target;
    const right=((d&&d.parts.find(p=>p.id===s.target))||{}).label||"part";
    const picked=(d&&L.payload.pick&&(d.parts.find(p=>p.id===L.payload.pick)||{}).label)||"";
    spots.forEach(b=>{ b.disabled=true; if(b.dataset.id===s.target) b.classList.add("correct"); else if(b.dataset.id===L.payload.pick) b.classList.add("wrong"); });
    gradeQ(ok, ok?`Yes — that's the <b>${right.toLowerCase()}</b>.`:`Not quite — you tapped the <b>${(picked||"wrong part").toLowerCase()}</b>; the highlighted one is the <b>${right.toLowerCase()}</b>.`);
  });
}

/* EXAM — guided answer builder. Instead of "write on paper, reveal, self-assess",
   the pupil is coached through the answer: a command-word tip says what kind of
   answer scores, they type (or plan on paper), then mark it point-by-point against
   the scheme — with points their answer already contains pre-ticked — for a real
   score out of the marks, not a binary gut-feel. */
const EXAM_TIPS={
  explain:"Say <b>why</b>, not just what — link each point with <i>because…</i> or <i>so…</i>.",
  describe:"Say <b>what happens</b>, step by step or as a pattern. No reasons needed.",
  compare:"Every sentence should mention <b>both</b> things: “X is …, <i>whereas</i> Y is …”.",
  evaluate:"Give points <b>for</b>, points <b>against</b>, then a conclusion that picks a side.",
  discuss:"Give points <b>for</b>, points <b>against</b>, then a conclusion that picks a side.",
  suggest:"Apply what you know to this <b>new</b> situation — sensible science beats guessing.",
  calculate:"Show every step: <b>equation → substitute → answer with unit</b>. Working scores marks.",
  state:"One precise sentence is enough — no explanation needed.",
  define:"Give the exact meaning, using the key scientific words.",
  outline:"The main steps only, in order — brief but complete.",
  justify:"Use <b>evidence</b> for your choice: “… which shows that …”.",
  predict:"Say what will happen <b>and</b> the science that tells you so.",
  "why":"Say <b>why</b> — link each point with <i>because…</i> or <i>so…</i>."
};
function examTip(q){
  const m=(q||"").replace(/<[^>]*>/g,"").toLowerCase().match(/\b(explain|describe|compare|evaluate|discuss|suggest|calculate|state|define|outline|justify|predict|why)\b/);
  return m?{word:m[1],tip:EXAM_TIPS[m[1]]}:null;
}
const EXAM_STOP=new Set(["the","and","that","this","with","from","which","because","when","then","they","there","their","have","has","been","will","would","into","more","less","than","also","each","some","must","can","are","its","it's","for","not","but","any","all","one","two","a","an","of","to","in","on","is","it","as","or","so","by","at"]);
// Does the typed answer already contain this scheme point? Crude stemmed-keyword match
// used only to PRE-tick — the pupil stays the marker and can toggle every point.
function pointInAnswer(ans, point){
  const a=(ans||"").toLowerCase(); if(!a.trim()) return false;
  const sig=((point||"").replace(/<[^>]*>/g,"").toLowerCase().match(/[a-z][a-z-]{3,}/g)||[]).filter(w=>!EXAM_STOP.has(w));
  if(!sig.length) return false;
  const hits=sig.filter(w=>a.includes(w.length>6?w.slice(0,w.length-2):w));
  return hits.length>=Math.min(2,sig.length);
}
function viewExam(s){
  const tip=examTip(s.q);
  const n=(s.scheme||[]).length;
  return `<div class="step-kicker mono-kicker">${s.kicker||"Exam practice"}</div>
    <div class="exam-marks">${s.marks?`[${s.marks} mark${s.marks>1?"s":""}]`:"Extended answer"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    ${s.context?`<div class="exam-stem">${s.context}</div>`:''}
    ${tip&&tip.tip?`<div class="exam-coach"><span class="cw">${tip.word}</span> ${tip.tip}</div>`:''}
    <textarea id="examta" class="exam-ta" rows="5" placeholder="Type your answer here${n?` — aim for ${n} clear point${n>1?"s":""}`:""}. (Or write it on paper first, then mark it here.)"></textarea>
    <div id="schemebox"></div>`;
}
function wireExam(s){
  footerButton("Mark my answer","btn-primary",true,()=>{
    const ta=document.getElementById("examta");
    const ans=ta?ta.value:""; if(ta) ta.readOnly=true;
    const pts=s.scheme||[];
    const ticked=pts.map(p=>pointInAnswer(ans,p));
    const box=document.getElementById("schemebox");
    const total=s.marks||pts.length||1;
    if(box){
      box.innerHTML=`<div class="scheme">
        <div class="scheme-h">Mark it yourself — tap each point you made</div>
        ${pts.map((p,i)=>`<button class="spt${ticked[i]?" on":""}" data-i="${i}"><span class="tick">${ticked[i]?"✓":""}</span><span class="pt-t">${p}</span></button>`).join("")}
        <div class="exam-score" id="examscore"></div>
        ${s.model?`<div class="model"><b>Model answer:</b> ${s.model}</div>`:""}
      </div>`;
      const score=()=>{ const got=Math.min(total,[...box.querySelectorAll(".spt.on")].length*(pts.length?total/pts.length:1));
        const g=Math.round(got);
        document.getElementById("examscore").innerHTML=`Your marks: <b>${g} / ${total}</b>${g>=total?" — full marks! 🏆":g/total>=0.65?" — solid, nearly there.":" — keep this one for revision."}`;
        return g; };
      box.querySelectorAll(".spt").forEach(b=>b.onclick=()=>{ b.classList.toggle("on"); b.querySelector(".tick").textContent=b.classList.contains("on")?"✓":""; score(); });
      score();
      try{ box.scrollIntoView({behavior:"smooth",block:"nearest"}); }catch(e){}
      footerButton("Continue","btn-go",true,()=>{
        const got=score();
        gradeExam(got/total>=0.65, got, total);
      });
    } else gradeExam(false,0,total);
  });
}
function gradeExam(ok, got, total){
  L.checked=true; L.asked+=1; if(ok){ L.correct+=1; L.xp+=10; }
  const st=L.steps[L.i];
  if(st && st.qid){ State.s.exam=State.s.exam||{}; State.s.exam[st.qid]={rating:ok?"good":"revise", last:todayStr(), unit:st.qid.split("#")[0], marks:st.marks||null, got:(typeof got==="number"?got:null), total:(typeof total==="number"?total:null)}; State.save(); recordAnswer(st.qid, ok, "exam"); }
  next();
}

/* ---------- Footer / grading ---------- */
function footerShell(){ return `<div class="footer" id="footer"><div class="inner" id="finner"></div></div>`; }
function footerButton(label,cls,enabled,onClick){ const f=document.getElementById("footer"); f.className="footer"; document.getElementById("finner").innerHTML=`<button class="btn ${cls}" id="fbtn" ${enabled?"":"disabled"}>${label}</button>`; document.getElementById("fbtn").onclick=onClick; }
function footerRow(btns){ const f=document.getElementById("footer"); f.className="footer"; document.getElementById("finner").innerHTML=`<div class="row2">${btns.map((b,i)=>`<button class="btn ${b.cls}" data-i="${i}">${b.label}</button>`).join("")}</div>`; [...document.querySelectorAll("#finner .row2 .btn")].forEach((el,i)=> el.onclick=btns[i].on); }
let _checkFn=null;
function setCheck(fn){ _checkFn=fn; footerButton("Check","btn-primary",false,()=>_checkFn&&_checkFn()); }
function enableCheck(on){ const b=document.getElementById("fbtn"); if(b&&!L.checked) b.disabled=!on; }

// Which session this answer came from — tags the mastery signal so dashboards can
// tell first-encounter (lesson) from spaced retrieval (review/weak/recap/exam).
function sessionKind(){ return L.isReview?"review":L.isWeak?"weak":L.isRecap?"recap":L.isExam?"exam":"lesson"; }

// On-mistake re-teach card. Reuses the .teach styling to recap the concept the
// pupil just missed, drawn from the unit's content (a matching misconception, else
// the step's own explanation). Returns "" when there's nothing useful to add (e.g.
// the feedback already says it), so we never show an empty card.
function reteachCard(step){
  const code = step.qid ? step.qid.split("#")[0] : (L && L.code);
  const c = code && CONTENT[code];
  let html = "";
  // 1) a misconception whose "right" answer addresses this exact concept, if any
  if(c && Array.isArray(c.misconceptions) && c.misconceptions.length){
    const qtext = (step.q||"").toLowerCase();
    const hit = c.misconceptions.find(m=> m && m.right && qtext && (qtext.includes((m.wrong||"").slice(0,18).toLowerCase()) || (m.right||"").toLowerCase().split(/\W+/).some(w=> w.length>5 && qtext.includes(w))));
    const m = hit || c.misconceptions[0];
    if(m && m.right) html = `<p><b>Watch out:</b> ${m.wrong||""}</p><p><b>Remember:</b> ${m.right}</p>`;
  }
  // 2) fall back to the step's own model answer / explanation
  if(!html){ const expl = step.ok || step.why || ""; if(expl) html = `<p>${expl}</p>`; }
  if(!html) return "";
  const emoji = (c && DISC_EMOJI[c.discipline]) || "💡";
  return `<div class="teach reteach"><span class="emoji">${emoji}</span><div class="rt-k">Quick re-teach</div>${html}</div>`;
}

function gradeQ(ok, whyHtml){
  L.checked=true; L.asked+=1;
  if(ok){ L.correct+=1; L.xp+=10; } else { L.hearts=Math.max(0,L.hearts-1); if(L.hearts===0) L.hearts=5; }
  const step=L.steps[L.i]; if(step && step.qid){ recordReview(step.qid, ok); recordAnswer(step.qid, ok, sessionKind()); }   // spaced-retrieval scheduling + mastery-graph signal
  // On-mistake re-teach: while hearts remain, append a small re-teach card (reuses
  // the .teach styling) recapping the concept before they move on.
  let why = whyHtml;
  if(!ok && L.hearts>0 && step){ const rt=reteachCard(step); if(rt) why = whyHtml + rt; }
  showFeedback(ok, ok?pickPraise():"Not quite", why, false);
  const h=document.querySelector(".hearts .hh"); if(h) h.textContent="❤️".repeat(L.hearts)+"🤍".repeat(5-L.hearts);
}
function showFeedback(ok, head, whyHtml, gentle){
  const f=document.getElementById("footer"); f.className="footer "+(ok?"fb-ok":"fb-bad");
  document.getElementById("finner").innerHTML=`
    <div class="fbhead"><span class="ic">${ok?"✓":(gentle?"🎤":"✕")}</span><h3 class="fr">${head}</h3></div>
    <div class="fbwhy">${whyHtml}</div>
    <button class="btn ${ok?"btn-go":"btn-primary"}" id="cont">Continue</button>`;
  document.getElementById("cont").onclick=()=>next();
}
const PRAISE=["Nice!","Well done!","Correct!","Exactly!","Spot on!","You've got it!","Brilliant!"];
function pickPraise(){ return PRAISE[L.correct % PRAISE.length]; }
function next(){ L.checked=false; L.payload=null; if(L.rec){try{L.rec.abort();}catch(e){} L.rec=null;} L.i+=1; renderStep(); }

/* ---------- Lesson complete ---------- */
function finishLesson(){
  const acc = L.asked? Math.round(L.correct/L.asked*100) : 100;
  const first = !State.lessonDone(L.id);
  const perfect = (L.hearts===5 && acc===100 && L.asked>0);
  const bonus = perfect ? 5 : 0;
  const xp = L.xp + (first?5:0) + bonus;
  State.completeLesson(L.id, xp, first?L.newWords:0);
  if(perfect) State.s.flags.perfect=true;
  if(L.isReview) State.s.flags.reviewed=true;
  if(L.isWeak) State.s.flags.weakFixed=true;
  State.save();
  const badges=checkBadges();
  go("done", { acc, xp, streak:State.s.streak, review:!!L.isReview, weak:!!L.isWeak, recap:!!L.isRecap, exam:!!L.isExam, code:L.code, li:L.li, badges });
}
function renderDone(){
  const {acc,xp,streak,review,weak,recap,exam,badges}=view;
  const emoji = exam?"📝":recap?"🔄":weak?"💪":review?"🔄":acc>=80?"🏆":acc>=50?"🎉":"💪";
  const title = exam?"Exam practice done!":recap?"Recap done!":weak?"Weak spots fixed!":review?"Review done!":"Lesson complete!";
  const sub = exam?"Self-marking against the mark scheme shows you exactly what to revise next."
    :recap?"You warmed up on earlier topics — now the new topic is unlocked."
    :weak?"You went back over the tricky ones — that's exactly how it sticks."
    :review?"You kept earlier topics fresh — that's how memory sticks."
    :acc>=80?"Brilliant — that knowledge is sticking.":acc>=50?"Good work — another go will lock it in.":"Nice effort — practice makes it stick.";
  const badgeHTML=(badges&&badges.length)?`<div class="badge-won">${badges.map(b=>`<div class="bw"><span class="bwi">${b.icon}</span><div><b>New badge!</b><span>${b.name}</span></div></div>`).join("")}</div>`:"";
  app.innerHTML=`<div class="complete fade">
    <div class="trophy">${emoji}</div>
    <h1 class="fr">${title}</h1>
    <p class="sub">${sub}</p>
    <div class="dstats">
      <div class="dstat xp"><div class="v">+${xp}</div><div class="l">XP</div></div>
      <div class="dstat acc"><div class="v">${acc}%</div><div class="l">Accuracy</div></div>
      <div class="dstat str"><div class="v">🔥 ${streak}</div><div class="l">Day streak</div></div>
    </div>
    ${badgeHTML}
    <div class="actions">
      <button class="btn btn-go" id="cont">Continue</button>
      ${(review||weak||recap||exam)?"":`<button class="btn btn-ghost" id="again" style="text-transform:none">Practise this again</button>`}
    </div>
    <div class="colophon">Houchell · learn it, joined up</div>
  </div>`;
  document.getElementById("cont").onclick=()=>go("home",{tab:"path"});
  const again=document.getElementById("again"); if(again) again.onclick=()=>startLesson(view.code, view.li);
}

/* ---------- Keyboard ---------- */
document.addEventListener("keydown",(e)=>{
  if(view.name!=="lesson"||!L||L.i>=L.steps.length) return;
  const s=L.steps[L.i];
  if(e.key==="Enter"){ const c=document.getElementById("cont"); if(c){c.click();e.preventDefault();return;} const fb=document.getElementById("fbtn"); if(fb&&!fb.disabled){fb.click();e.preventDefault();return;} }
  if(!L.checked && /^[1-9]$/.test(e.key)){ const n=+e.key-1;
    if(s.type==="mcq"){ const b=document.querySelector(`.opt[data-idx="${n}"]`); if(b)b.click(); }
    if(s.type==="multi"){ const b=document.querySelector(`.chip[data-idx="${n}"]`); if(b)b.click(); } }
});

/* ---------- Delegated dashboard reset (re-bound each render) ---------- */
document.addEventListener("click",(e)=>{
  if(e.target && e.target.id==="reset"){ if(confirm("Reset all your progress, XP and streak?")){ State.reset(); render(); } }
  if(e.target && (e.target.id==="dash-review")){ startReview(); }
  if(e.target && (e.target.id==="dash-exam")){ startExamRevise(); }
  const wb=e.target&&e.target.closest&&e.target.closest("#weak,#dash-weak"); if(wb){ startWeak(); }
});

render();

/* ---------- Cross-device sync (optional; only when opened via a pupil link ?t=…) ----------
   Anonymous use is unchanged (localStorage only). With a token we hydrate from the
   server and merge (never clobber: keep the furthest progress per field), then push
   saves back, debounced. Offline-safe — a failed push just retries on the next save. */
var SYNC_TOKEN = null, SYNC_TIMER = null;
function mergeState(local, remote){
  if(!remote || typeof remote!=="object") return local;
  const out = Object.assign({}, remote, local);
  out.xp = Math.max(local.xp||0, remote.xp||0);
  out.words = Math.max(local.words||0, remote.words||0);
  const ll=local.lastDay||"", rl=remote.lastDay||"";
  if(rl>ll){ out.lastDay=rl; out.streak=remote.streak||0; } else { out.lastDay=ll||rl; out.streak=local.streak||0; }
  out.lessons = Object.assign({}, remote.lessons||{});
  const lz=local.lessons||{}; for(const k in lz){ const a=lz[k], b=out.lessons[k]; if(!b || (a&&(a.xp||0)>=(b.xp||0))) out.lessons[k]=a; }
  out.dailyXP = Object.assign({}, remote.dailyXP||{});
  const ld=local.dailyXP||{}; for(const d in ld){ out.dailyXP[d]=Math.max(out.dailyXP[d]||0, ld[d]||0); }
  out.review = Object.assign({}, remote.review||{});
  const lr=local.review||{}; for(const q in lr){ const a=lr[q], b=out.review[q];
    if(!b){ out.review[q]=a; } else { const al=a.last||"", bl=b.last||""; out.review[q]= al>bl? a : (bl>al? b : ((a.box||0)>=(b.box||0)? a : b)); } }
  out.badges = Array.from(new Set([...(remote.badges||[]), ...(local.badges||[])]));
  out.flags = Object.assign({}, remote.flags||{}, local.flags||{});
  out.a11y = local.a11y || remote.a11y;                                  // device prefs: keep local
  out.sound = (typeof local.sound==="boolean")? local.sound : remote.sound;
  out.seen = local.seen || remote.seen;
  return out;
}
function syncPull(){
  fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN))
    .then(r=> r.ok? r.json() : null)
    .then(d=>{ if(d && d.state){ State.s = mergeState(State.s, d.state); State.save(); if(view.name==="home"||view.name==="done") render(); } })
    .catch(()=>{});
}
function syncPush(){
  if(!SYNC_TOKEN) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(()=>{
    fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN), { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ state: State.s }) }).catch(()=>{});
  }, 1500);
}
function syncInit(){
  try{ const t=new URLSearchParams(location.search).get("t"); if(t && /^[A-Za-z0-9_-]{16,64}$/.test(t)){ SYNC_TOKEN=t; syncPull(); } }catch(e){}
}
syncInit();

/* ---------- Mastery-graph signal (additive; only with a pupil token) ----------
   Alongside the opaque state-blob sync above, send a lightweight per-question
   outcome (qid + correct + session) to /api/springboard/mastery. The server maps
   each qid's unit code to a curriculum objective and upserts an objective-level
   mastery row, so self-study feeds the same per-pupil × per-objective mastery graph
   as the rest of the product. Buffered + debounced; offline-safe (a failed flush
   just keeps the buffer for the next answer). No token ⇒ no-op (anon use unchanged). */
var MASTERY_BUF = [], MASTERY_TIMER = null;
function recordAnswer(qid, ok, session){
  if(!SYNC_TOKEN || !qid) return;
  MASTERY_BUF.push({ qid:qid, correct:!!ok, session:session||"lesson", at:new Date().toISOString() });
  clearTimeout(MASTERY_TIMER);
  MASTERY_TIMER = setTimeout(flushMastery, 2500);
  if(MASTERY_BUF.length >= 40) flushMastery();   // don't let a long session grow the buffer unbounded
}
function flushMastery(){
  if(!SYNC_TOKEN || !MASTERY_BUF.length) return;
  clearTimeout(MASTERY_TIMER);
  const batch = MASTERY_BUF; MASTERY_BUF = [];
  fetch("/api/springboard/mastery?t="+encodeURIComponent(SYNC_TOKEN), { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ answers: batch }) })
    .catch(()=>{ MASTERY_BUF = batch.concat(MASTERY_BUF); });   // re-queue on failure
}
// Best-effort flush when the pupil leaves mid-session.
window.addEventListener("pagehide", ()=>{ try{ if(SYNC_TOKEN && MASTERY_BUF.length && navigator.sendBeacon){ navigator.sendBeacon("/api/springboard/mastery?t="+encodeURIComponent(SYNC_TOKEN), new Blob([JSON.stringify({ answers:MASTERY_BUF })], {type:"application/json"})); MASTERY_BUF=[]; } else { flushMastery(); } }catch(e){} });

/* ============================================================================
   STREAK REMINDER NOTIFICATIONS (item C9)
   ---------------------------------------------------------------------------
   LOCAL-ONLY, opt-in daily "keep your streak alive" reminder. There is no push
   server and no Web Push subscription here — everything is client/SW-local:
     • Where supported, we use the Periodic Background Sync API so the installed
       SW can wake roughly once a day and (if the pupil hasn't studied today and
       still has a streak) show a local notification.
     • Periodic Background Sync is Chromium-only and best-effort (the browser
       decides if/when it fires). So we ALSO fall back to a foreground check on
       every app open: if it's a new day, the pupil hasn't studied today and has
       a live streak, we fire the same reminder via the SW. This is the practical
       floor — a true "remind me even when the app is closed" guarantee would need
       a real push server, which is explicitly out of scope.
   The reminder is gated on State.s.notify (the opt-in, persisted in localStorage)
   and NEVER fires if the pupil already studied today (State.s.lastDay===today).
   ========================================================================== */
function studiedToday(){ return State.s.lastDay === todayStr(); }
function canNotify(){ return ("Notification" in window) && State.s.notify && Notification.permission === "granted"; }

// Ask the SW to show the streak notification (it owns showNotification + click handling).
function fireStreakReminder(){
  if(!canNotify() || studiedToday() || (State.s.streak||0) < 1) return;
  const n = State.s.streak||0;
  const body = "🔥 Keep your "+n+"-day streak alive — 2 minutes of science?";
  navigator.serviceWorker.ready.then(reg=>{
    reg.showNotification("Houchell · KS3 Science", {
      body, tag:"streak-reminder", renotify:true, icon:"icon-192.png", badge:"icon-192.png",
      data:{ url:"springboard.html" }
    });
  }).catch(()=>{
    // Fallback if the SW isn't controlling yet: a page-level notification.
    try{ new Notification("Houchell · KS3 Science", { body, icon:"icon-192.png", tag:"streak-reminder" }); }catch(e){}
  });
}

// Best-effort: register a daily Periodic Background Sync so the SW can remind even
// when the app is closed (Chromium only; silently no-ops elsewhere).
async function registerPeriodicReminder(){
  try{
    const reg = await navigator.serviceWorker.ready;
    if("periodicSync" in reg){
      const status = await navigator.permissions.query({ name:"periodic-background-sync" }).catch(()=>({state:"denied"}));
      if(status.state === "granted"){
        await reg.periodicSync.register("streak-reminder", { minInterval: 24*60*60*1000 });
      }
    }
  }catch(e){ /* unsupported — the on-open fallback below still covers us */ }
}

// Opt-in flow: request permission, then persist + schedule. Returns the new state.
async function enableNotifications(){
  if(!("Notification" in window)) return false;
  let perm = Notification.permission;
  if(perm === "default"){ try{ perm = await Notification.requestPermission(); }catch(e){ perm = "denied"; } }
  const ok = perm === "granted";
  State.s.notify = ok; State.save();
  if(ok){ registerPeriodicReminder(); }
  return ok;
}
function disableNotifications(){ State.s.notify = false; State.save(); }

// On every open: if opted in, keep the periodic sync registered and run the
// foreground fallback reminder (covers browsers without Periodic Background Sync).
function initStreakReminders(){
  if(!("serviceWorker" in navigator) || !("Notification" in window)) return;
  // If a previous grant was later revoked at the OS/browser level, reflect that.
  if(State.s.notify && Notification.permission !== "granted"){ State.s.notify = false; State.save(); }
  if(!State.s.notify) return;
  registerPeriodicReminder();
  // Slight delay so we don't race the SW becoming ready on a cold load.
  setTimeout(fireStreakReminder, 4000);
}

// PWA: register the service worker for offline use + install.
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js")
      .then(()=>{ initStreakReminders(); })
      .catch(()=>{});
  });
}
</script>
