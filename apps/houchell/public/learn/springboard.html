const TOPIC_IX={ C1:"particles", DEN:"particles", ELE:"circuit", GL1:"circuit", B1:"cell", GA3:"decay", GA4:"decay", LGT:"light", PHO:"photo", GBE1:"photo", ENC:"profile", GCE1:"profile", SPC:"solar", GS1:"solar", SND:"wave", GW1:"wave", GBO2:"heart" };
function ixCleanup(){ if(typeof L!=="undefined" && L && L._cleanup){ try{L._cleanup();}catch(e){} L._cleanup=null; } }

function buildLessons(c){
  const disc=c.discipline, V=c.vocab;
  const rawFacts = (TIER==="foundation") ? c.facts.filter(f=>!isHTFact(f)) : c.facts;
  const dg = c.diagram || null;   // progressive build-up diagram (DIAGRAMS resolved later at render time, in teachDiagram)
  // Key words are visually anchored in the sentence that teaches them (longest
  // term first so "gravitational store" isn't split by a bolded "store").
  const boldable=V.map(v=>v.term).filter(Boolean).sort((a,b)=>b.length-a.length);
  const facts=rawFacts.map(f=>{
    const st=teachFact(f,disc);
    if(dg){ const fi=c.facts.indexOf(f); if(fi>=0){
      const flat=[]; for(let k=0;k<=fi;k++){ const m=dg.map[k]; if(m) flat.push(...(Array.isArray(m)?m:[m])); }
      const cm=dg.map[fi]; st.dgram=dg.key; st.dreveal=[...new Set(flat)]; st.dcur=cm?(Array.isArray(cm)?cm:[cm]):[];
    } }
    return st;
  });
  let QP=c.questions.map((q,idx)=>({q,idx}));
  if(TIER==="foundation") QP=QP.filter(x=>!isHTQ(x.q));
  const Q=QP.map(x=>{ const s=toStep(x.q); s.qid=c.code+"#"+x.idx; return s; });   // qid keeps ORIGINAL index
  // Tie each word to the first fact that actually explains (mentions) it, so a key
  // word is taught immediately after the fact that introduces it.
  const wordsByFact={}, unmatched=[];
  V.forEach(v=>{ const fi=rawFacts.findIndex(f=>termInFact(v.term,f)); if(fi>=0){ (wordsByFact[fi]=wordsByFact[fi]||[]).push(v); } else unmatched.push(v); });

  // ── CHECK AS YOU LEARN (Rosenshine: check for understanding after each step).
  //    For each fact, splice in a copy of the ONE bank question that most clearly
  //    tests that fact, straight after the fact's block — retrieval moments while
  //    the idea is fresh, instead of a wall of input with no checks. Matching is
  //    conservative: quick question types only, ≥2 distinctive words shared with
  //    the fact, argmax over facts (ties go to the LATER fact so a question never
  //    lands before all the content it needs). The original question stays in the
  //    practice lessons — meeting it again later is spaced repetition, not waste.
  const cfuOf={};
  {
    const factWords=rawFacts.map(f=>new Set(cfuWords(f)));
    const claims={};                          // fact index -> {step, score}
    Q.filter(s=>s.type==="mcq"||s.type==="gap"||s.type==="multi").forEach(s=>{
      const key=s.q+" "+(s.options?(s.options.find(o=>o.correct)||{}).t||"":(s.blanks?s.blanks.join(" "):""));
      const ws=cfuWords(key);
      let best=-1, bs=0;
      factWords.forEach((fw,fi)=>{ const sc=ws.filter(w=>fw.has(w)||fw.has(w+"s")||fw.has(w.replace(/s$/,""))).length; if(sc>=bs && sc>0){ best=fi; bs=sc; } });
      if(bs>=2){ const cur=claims[best]; if(!cur || bs>cur.score) claims[best]={step:s, score:bs}; }
    });
    Object.keys(claims).forEach(fi=> cfuOf[fi]=Object.assign({}, claims[fi].step, { kicker:"✅ Quick check", cfu:true }));
  }

  // Cognitive load — segment the build-up so only ONE new part (and its one
  // explanation) appears per step. A fact that adds several parts at once would
  // otherwise dump 3–7 labels + captions together (working memory overload), so we
  // split it into the fact step (first part) + a light "keep building" micro-step
  // per remaining part, each revealing a single part with its own note.
  function revealSteps(fs){
    if(!(fs.dgram && Array.isArray(fs.dcur) && fs.dcur.length>1)) return [fs];
    const prior=(fs.dreveal||[]).filter(id=>fs.dcur.indexOf(id)<0);
    return fs.dcur.map((pid,i)=>{
      const dreveal=prior.concat(fs.dcur.slice(0,i+1));
      if(i===0) return Object.assign({},fs,{dreveal,dcur:[pid]});
      return { type:"teach", kicker:"Keep building the picture", emoji:"", h:"", html:"", dgram:fs.dgram, dreveal, dcur:[pid] };
    });
  }

  // ── TEACH FIRST (the handbook model: Guided explanation → Check for understanding
  //    → Independent practice). Build the whole diagram and teach every fact and its
  //    vocabulary BEFORE any bank question is asked, so nothing is quizzed before it
  //    has been taught. The only checks inside teaching are "find the part you just
  //    revealed" and the hear-it/say-it word cards — both on content already shown. ──
  const teachSteps=[];
  facts.forEach((fs,fi)=>{
    teachSteps.push(...revealSteps(fs));
    (wordsByFact[fi]||[]).forEach(v=>teachSteps.push(vocabStep(v,disc)));
    if(fs.dgram && fs.dcur && fs.dcur.length && fs.dreveal && fs.dreveal.length>=2)
      teachSteps.push({ type:"dcheck", dgram:fs.dgram, dreveal:fs.dreveal, target:fs.dcur[fs.dcur.length-1], kicker:"📍 Find it on the diagram" });
    if(cfuOf[fi]) teachSteps.push(cfuOf[fi]);   // quick check on the fact just taught
  });
  unmatched.forEach(v=>teachSteps.push(vocabStep(v,disc)));       // words with no explaining fact
  if(V.length>=2) teachSteps.push(matchVocabStep(V.slice()));      // consolidate — all words now taught
  if(V.length)    teachSteps.push(listenTypeStep(V[V.length-1]));

  // ── THEN PRACTISE: the full question bank, every item now resting on taught content.
  // Interleave by question type (round-robin the type buckets) so consecutive items
  // aren't the same s.type where possible — interleaving beats blocking for retention.
  let practiceSteps=interleaveByType(Q.slice());
  // Generative recall (strongest retention lever): spread a few "say it in your own
  // words" prompts for the key words through practice, so words are recalled, not
  // just re-recognised. Capped so practice stays mostly bank questions. No qid — a
  // self-rated recall doesn't schedule spaced review (it has no fixed right answer).
  const recallWords=V.slice(0, Math.min(4, V.length));
  if(recallWords.length) practiceSteps=interleaveReviews(practiceSteps, recallWords.map(recallStep));
  // Worked example: model the method just before the first numeric question ("I do"
  // before "you do"), spliced into the practice stream.
  if(c.worked && c.worked.steps && c.worked.steps.length){
    const wstep={ type:"worked", kicker:"🧮 Worked example", title:c.worked.title, q:c.worked.q, steps:c.worked.steps, answer:c.worked.answer, unit:c.worked.unit };
    let k=practiceSteps.findIndex(s=>s.type==="numeric"); if(k<0) k=practiceSteps.length;
    practiceSteps.splice(k,0,wstep);
  }

  // Chunk into lessons: teaching lessons first, practice lessons after.
  const lessons=[];
  const wordsIn=a=>a.filter(s=>s&&s.type==="vocab").length;
  const learnTitles=["Learn","Build"], learnIcons=["📖","🧩"];
  const pracTitles=["Practise","Apply","Master"], pracIcons=["✍️","🔬","🏆"];
  const tChunks=chunk(teachSteps,7).filter(a=>a.length);
  tChunks.forEach((steps,i)=>{
    const nWords=wordsIn(steps);
    lessons.push({ title: tChunks.length>1?(learnTitles[i]||("Learn "+(i+1))):"Learn",
                   icon: learnIcons[i]||"📖", kind:"learn", words:nWords, steps });
  });
  chunk(practiceSteps,6).filter(a=>a.length).forEach((steps,i)=>{
    lessons.push({ title: pracTitles[i]||("Master "+(i+1)), icon: pracIcons[i]||"🏆", kind:"practice", words:0, steps });
  });
  if(!lessons.length) lessons.push({ title:"Learn", icon:"📖", kind:"learn", words:0, steps:[] });
  // Capstone: once every fact has been taught the build-up diagram is complete, so
  // the final lesson ends by asking the pupil to label the WHOLE picture from memory —
  // all pins blank, labels shuffled in a bank. Works for any diagram with ≥3 parts,
  // straight from its existing part data (no per-topic authoring).
  if(dg && dg.map){
    const distinct=[...new Set(dg.map.flat().filter(Boolean))];
    if(distinct.length>=3 && lessons.length){
      lessons[lessons.length-1].steps.push({ type:"dmatch", dgram:dg.key, kicker:"🏷️ Label the diagram" });
    }
  }
  // Lead the topic with its interactive widget (an engaging "explore" hook), if it has one.
  if(TOPIC_IX[c.code] && lessons[0]) lessons[0].steps.unshift({ type:"interactive", widget:TOPIC_IX[c.code], kicker:"Explore" });
  return lessons;
}

const LESSONS = {}; // code -> [lessons]
let TIER = "higher";   // "higher" | "foundation" — Foundation hides Higher-only content

/* ---------- Tracks, sequential gating & recaps (learn-it-all path) ----------
   Each "track" is a sequence a learner unlocks topic by topic: KS3 is one track,
   and each GCSE subject (Physics/Chemistry/Biology) is its own track. A topic is
   complete when all its lessons AND its recap warm-up are done; the next topic in
   the track unlocks only then. Every topic after the first in a track opens with a
   recap drawn from earlier learned material. */
let UNIT_POS = {}; // code -> {track, idx, prev:{code,t}}
function sectionTrack(sec){
  const y=sec.year||"";
  if(/^Year /.test(y)) return "ks3";
  if(/Physics/.test(y)) return "gcse-physics";
  if(/Chemistry/.test(y)) return "gcse-chem";
  if(/Biology/.test(y)) return "gcse-bio";
  return "ks3";
}
function indexTracks(){
  const tr={}; UNIT_POS={};
  PATHWAY.forEach(sec=>{ const t=sectionTrack(sec);
    sec.units.forEach(u=>{ if(u.code && LESSONS[u.code]){ (tr[t]=tr[t]||[]).push(u); } }); });
  Object.keys(tr).forEach(t=> tr[t].forEach((u,i)=>{ UNIT_POS[u.code]={track:t, idx:i, prev:i>0?{code:tr[t][i-1].code,t:tr[t][i-1].t}:null}; }));
}
// (Re)build all lessons for the current tier, then re-index the tracks. Called at
// load and whenever the Higher/Foundation tier is switched in Settings.
function rebuildLessons(){
  TIER = (State.s && State.s.tier) || "higher";
  Object.keys(CONTENT).forEach(code=> LESSONS[code]=buildLessons(CONTENT[code]));
  indexTracks();
}
rebuildLessons();
function unitHasRecap(code){ const p=UNIT_POS[code]; return !!(p && p.idx>0); }
function unitComplete(code){
  const L=LESSONS[code]; if(!L) return false;
  for(let i=0;i<L.length;i++) if(!State.lessonDone(code+"-L"+i)) return false;
  if(unitHasRecap(code) && !State.lessonDone(code+"-RECAP")) return false;
  return true;
}
function unitUnlocked(code){
  const p=UNIT_POS[code]; if(!p) return true;          // special/non-tracked units stay open
  if(p.idx===0) return true;                           // first topic of a track is always open
  return p.prev ? unitComplete(p.prev.code) : true;    // previous topic must be complete
}
// Pool of question ids from earlier units the learner has already started (for recaps).
function earlierQuestionPool(code){
  const pool=[];
  for(const sec of PATHWAY){ for(const u of sec.units){
    if(!u.code || !LESSONS[u.code]) continue;
    if(u.code===code) return pool;
    const total=LESSONS[u.code].length;
    const started = State.unitCrowns(u.code,total)>0 || State.lessonDone(u.code+"-RECAP");
    if(started && CONTENT[u.code]) CONTENT[u.code].questions.forEach((q,idx)=>{ if(q.type!=="exam") pool.push(u.code+"#"+idx); });
  }}
  return pool;
}
function buildRecapSteps(code){
  const steps=[], seen=new Set();
  const add=(qid)=>{ if(steps.length>=6||seen.has(qid))return; const st=retrievalStep(qid); if(st){ st.kicker="🔄 Recap"; steps.push(st); seen.add(qid);} };
  shuffle(dueReviews(code)).forEach(d=>add(d.qid));  // spaced-repetition first, shuffled across units (interleave topics)
  shuffle(weakQuestions()).forEach(w=>add(w.qid));   // then tricky ones, mixed
  shuffle(earlierQuestionPool(code)).forEach(qid=>add(qid)); // then a spread of earlier topics
  return steps;
}
function startRecap(code){
  const steps=buildRecapSteps(code);
  if(!steps.length){ State.completeLesson(code+"-RECAP", 5, 0); render(); return; }
  L={ code, li:-2, id:code+"-RECAP", title:"Recap", steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isRecap:true };
  go("lesson");
}

    crowns += State.unitCrowns(code, LESSONS[code].length);
    const c=CONTENT[code]||{};
    words += (c.vocab||[]).length;
    checks += (c.questions||[]).length;
  });
  return { units, lessons, crowns, words, checks };
}

// The next thing to do across the whole course, in pathway order: a gating recap
// first if one is pending, otherwise the first incomplete lesson of the first
// unlocked, unfinished unit. Powers the "Jump back in" hero so the learner never
// has to scroll the path hunting for the gold node.
function nextUp(){
  for(const sec of PATHWAY){ for(const u of sec.units){
    if(!u.code || !LESSONS[u.code]) continue;
    if(!unitUnlocked(u.code)) continue;
    if(unitHasRecap(u.code) && !State.lessonDone(u.code+"-RECAP"))
      return { recap:true, code:u.code, unit:u, label:"Recap warm-up" };
    const total=LESSONS[u.code].length, li=firstIncomplete(u.code,total);
    if(li<total) return { code:u.code, li, unit:u, label:LESSONS[u.code][li].title+" · lesson "+(li+1)+" of "+total };
  }}
  return null;
}
function continueHeroHTML(){
  const n=nextUp(); if(!n) return "";

    <span class="ch-go">▶</span>

}

    return `<div class="unit locked">

  const recapGate = hasRecap && !recapDone;     // must do the recap before new content
  const nextIdx = firstIncomplete(u.code, total);
  let nodes = "";
  if(hasRecap){
    nodes += `<button class="node recap ${recapDone?'done':'next'}" data-recap="1" data-code="${u.code}">

  return `<div class="unit${unitComplete(u.code)?' complete':''}">

      <div class="crowns">${crowns}/${total} 👑</div>
    </div>

    <div class="unit-stats">
      <span class="unit-chip good">🎯 ${factCount} ideas</span>
      <span class="unit-chip blue">🔤 ${vocabCount} words</span>

}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function firstIncomplete(code,total){ for(let i=0;i<total;i++) if(!State.lessonDone(code+"-L"+i)) return i; return total; }

function wirePath(){

/* ---------- Lesson session ---------- */
function startLesson(code, li){
  const ls = LESSONS[code][li];
  let steps = ls.steps;
  // Interleaving: mix a few earlier-unit due-review questions THROUGHOUT the practice
  // block (not all at the front) — interleaving topics beats blocking in KS3 science.
  if(ls.kind === "practice"){
    // shuffle due candidates across units so we don't pull a long run from one unit
    const due = shuffle(dueReviews(code)).slice(0, 4).map(d=>retrievalStep(d.qid)).filter(Boolean);
    if(due.length) steps = interleaveReviews(ls.steps, due);
  }
  L = { code, li, id:code+"-L"+li, title:ls.title, steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:ls.words||0, rec:null };
  go("lesson");
}

function startReview(){
  // Take the most-overdue items, then shuffle so topics interleave (mix units, not grouped).
  const due = shuffle(dueReviews(null).slice(0, 14)).map(d=>retrievalStep(d.qid)).filter(Boolean);
  if(!due.length) return;
  L = { code:"REVIEW", li:-1, id:"review-"+todayStr(), title:"Daily review", steps:due, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isReview:true };
  go("lesson");
}

// Open learner model: focused review of one unit (due → weak → any tracked), else jump to it on the path.
function startUnitReview(code){
  if(!code||!CONTENT[code]) return;
  const seen=new Set(), qids=[];
  const push=(qid)=>{ if(qid&&!seen.has(qid)){ seen.add(qid); qids.push(qid); } };
  dueReviews(null).filter(d=>d.unit===code).forEach(d=>push(d.qid));
  weakQuestions().filter(w=>w.unit===code).forEach(w=>push(w.qid));
  for(const qid in State.s.review){ const r=State.s.review[qid]; if(r&&r.unit===code) push(qid); }
  const steps=qids.slice(0,12).map(retrievalStep).filter(Boolean);
  if(steps.length){
    L={ code:"REVIEW", li:-1, id:"unitrev-"+code+"-"+todayStr(), title:(CONTENT[code].title||"Review")+" review", steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isReview:true };
    go("lesson");
  } else {
    go("home",{tab:"path"});   // nothing to review yet — take them to the learning path
  }
}

    <button class="iconbtn" id="quit" aria-label="Quit">✕</button>
    <div class="pbar" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"><i style="width:${pct}%"></i></div>

/* Living-diagram reveal: hide every tagged SVG part until the fact that introduces
   it has been taught, so the picture assembles in step with the labels. Parts with
   no data-part tag (scaffolding: axes, outlines, ground) always stay visible.
   Newly revealed parts get a brief pop so the eye lands on what just appeared. */
function applyLiveDiagram(s){
  const wrap=document.querySelector('.bdiagram'); if(!wrap) return;
  const rev=new Set(s.dreveal||[]);
  const cur=new Set(s.dcur || (s.target?[s.target]:[]));
  wrap.querySelectorAll('.diagram-art [data-part]').forEach(el=>{
    const ids=(el.getAttribute('data-part')||'').trim().split(/\s+/);
    const shown=ids.some(id=>rev.has(id));
    const current=shown && ids.some(id=>cur.has(id));
    el.classList.toggle('dg-hidden', !shown);
    el.classList.toggle('dg-revealed', shown);
    el.classList.toggle('dg-current', current);
    el.style.opacity='';
  });
  layoutDiagramSpots(wrap);
  drawDiagramFocus(wrap, cur);
}

/* Place every labelled overlay (build-up labels, "find it" hotspots, capstone pins)
   on its actual shape, computed from the SVG geometry rather than hand-typed x/y —
   so a label/dot always lands on the thing it names. For a part drawn as one big
   outline/background (e.g. a cell membrane or electron shell) the marker goes on the
   top edge instead of dead-centre, where it would otherwise sit over inner detail;
   for a part drawn as several pieces (e.g. two electrons) it goes on the largest
   piece. Falls back to the authored x/y only when the part has no drawable geometry. */
const SPOT_SHAPES='path,rect,circle,ellipse,line,polygon,polyline';
function diagramDefs(){
  return `<defs>
    <linearGradient id="dg-bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset=".55" stop-color="#fbfdff"/><stop offset="1" stop-color="#eef9ff"/></linearGradient>
    <filter id="dg-art-shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <filter id="dg-pop-shadow" x="-35%" y="-35%" width="170%" height="170%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#3f9f00" flood-opacity=".34"/></filter>
    <filter id="dg-halo-blur" x="-35%" y="-35%" width="170%" height="170%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#58cc02" flood-opacity=".55"/></filter>
  </defs>`;
}
function diagramSvg(d){
  const vb=(d.vb||"0 0 320 220").trim().split(/\s+/).map(Number);
  const x=vb[0]||0, y=vb[1]||0, w=vb[2]||320, h=vb[3]||220;
  return `<svg viewBox="${d.vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">${diagramDefs()}<rect class="diagram-stage-bg" x="${x}" y="${y}" width="${w}" height="${h}" rx="${Math.max(10,Math.min(w,h)*.045)}"/><g class="diagram-art">${d.svg}</g><g class="diagram-focus-layer"></g></svg>`;
}
function diagramBuildChip(d, rev){
  const total=(d.parts||[]).length || 1;
  const done=Math.min(total, new Set(rev||[]).size);
  const pct=Math.round(done/total*100);
  return `<div class="diagram-build-chip"><b>${done}/${total}</b><span>building</span><span class="diagram-progress"><i style="width:${pct}%"></i></span></div>`;
}
function partBox(svg,id){
  const groups=[...svg.querySelectorAll('.diagram-art [data-part]')].filter(g=>
    (g.getAttribute('data-part')||'').trim().split(/\s+/).indexOf(id)>=0);
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  groups.forEach(g=>{ let bb; try{ bb=g.getBBox(); }catch(e){ return; }
    if(!bb.width && !bb.height) return;
    x0=Math.min(x0,bb.x); y0=Math.min(y0,bb.y); x1=Math.max(x1,bb.x+bb.width); y1=Math.max(y1,bb.y+bb.height);
  });
  if(!isFinite(x0)) return null;
  return { x:x0, y:y0, width:x1-x0, height:y1-y0 };
}
function drawDiagramFocus(wrap, cur){
  const svg=wrap.querySelector('svg'), layer=wrap.querySelector('.diagram-focus-layer');
  if(!svg || !layer) return;
  layer.innerHTML='';
  [...cur].forEach(id=>{
    const bb=partBox(svg,id); if(!bb) return;
    const pad=Math.max(8, Math.min(22, Math.max(bb.width,bb.height)*.18));
    const x=bb.x-pad, y=bb.y-pad, w=bb.width+pad*2, h=bb.height+pad*2;
    const rx=Math.max(8, Math.min(24, Math.min(w,h)*.22));
    const cx=bb.x+bb.width/2, cy=bb.y+bb.height/2;
    layer.insertAdjacentHTML('beforeend', `<rect class="dg-halo" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}"/><circle class="dg-pop-dot" cx="${cx}" cy="${cy}" r="${Math.max(5, Math.min(10, Math.min(w,h)*.11))}"/>`);
  });
}
function layoutDiagramSpots(wrap){
  const svg=wrap.querySelector('svg'); if(!svg) return;
  const vb=svg.viewBox && svg.viewBox.baseVal; if(!vb || !vb.width) return;
  wrap.querySelectorAll('[data-id]').forEach(node=>{
    const id=node.getAttribute('data-id');
    const groups=[...svg.querySelectorAll('[data-part]')].filter(g=>
      (g.getAttribute('data-part')||'').trim().split(/\s+/).indexOf(id)>=0);
    if(!groups.length) return;                         // no geometry — keep authored x/y
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity, leaves=[];
    groups.forEach(g=>{
      let bb; try{bb=g.getBBox();}catch(e){return;}
      if(!bb.width && !bb.height) return;
      x0=Math.min(x0,bb.x); y0=Math.min(y0,bb.y); x1=Math.max(x1,bb.x+bb.width); y1=Math.max(y1,bb.y+bb.height);
      const shapes=g.matches(SPOT_SHAPES)?[g]:[...g.querySelectorAll(SPOT_SHAPES)];
      shapes.forEach(sh=>{ let b; try{b=sh.getBBox();}catch(e){return;} if(b.width||b.height) leaves.push(b); });
    });
    if(!isFinite(x0)) return;
    const uw=x1-x0, uh=y1-y0, frac=(uw*uh)/(vb.width*vb.height);
    let px,py;
    if(frac>0.4 || !leaves.length){ px=x0+uw/2; py=y0+Math.min(uh*0.12, vb.height*0.07); }  // outline → top edge
    else { leaves.sort((a,b)=>b.width*b.height-a.width*a.height); const L=leaves[0]; px=L.x+L.width/2; py=L.y+L.height/2; }
    const lp=(px-vb.x)/vb.width*100, tp=(py-vb.y)/vb.height*100;
    node.dataset.baseLeft=lp;
    node.dataset.baseTop=tp;
    node.style.left=lp+'%';
    node.style.top=tp+'%';
  });
  requestAnimationFrame(()=>clampDiagramOverlays(wrap));
}
function clampDiagramOverlays(wrap){
  const wr=wrap.getBoundingClientRect();
  if(!wr.width || !wr.height) return;
  wrap.querySelectorAll('.dlabel,.hotspot,.dpin').forEach(node=>{
    const baseLeft=parseFloat(node.dataset.baseLeft || node.style.left);
    const baseTop=parseFloat(node.dataset.baseTop || node.style.top);
    if(!Number.isFinite(baseLeft) || !Number.isFinite(baseTop)) return;
    node.classList.remove('edge-left','edge-right');
    node.style.left=baseLeft+'%';
    node.style.top=baseTop+'%';
    let measure=node.classList.contains('dlabel') ? (node.querySelector('.dtag') || node) : node;
    let r=measure.getBoundingClientRect();
    if(node.classList.contains('dlabel') && r.left < wr.left + 10){
      node.classList.add('edge-left');
      r=measure.getBoundingClientRect();
    } else if(node.classList.contains('dlabel') && r.right > wr.right - 10){
      node.classList.add('edge-right');
      r=measure.getBoundingClientRect();
    }
    let dx=0, dy=0;
    const pad=10;
    if(r.left < wr.left + pad) dx = wr.left + pad - r.left;
    else if(r.right > wr.right - pad) dx = wr.right - pad - r.right;
    if(r.top < wr.top + pad) dy = wr.top + pad - r.top;
    else if(r.bottom > wr.bottom - pad) dy = wr.bottom - pad - r.bottom;
    if(dx) node.style.left=`calc(${baseLeft}% + ${dx}px)`;
    if(dy) node.style.top=`calc(${baseTop}% + ${dy}px)`;
  });
}

// Progressive build-up diagram: shows the topic's picture with one label revealed
// per fact taught so far (s.dreveal), the newest one (s.dcur) highlighted.
function teachDiagram(s){
  const d=DIAGRAMS[s.dgram]; if(!d) return "";
  const wh=d.vb.split(" "); const ratio=wh[2]+" / "+wh[3];
  const rev=s.dreveal||[], cur=s.dcur||[];
  const labels=d.parts.filter(p=>rev.indexOf(p.id)>=0).map(p=>
    `<div class="dlabel${cur.indexOf(p.id)>=0?' cur':''}" data-id="${p.id}" aria-label="${p.label}" style="left:${p.x}%;top:${p.y}%"><span class="ddot"></span></div>`).join("");
  // Narrate the build-up: the part(s) this fact just added get an explanation caption
  // saying what is happening there and why — so the diagram teaches, not just labels.
  const notes=d.parts.filter(p=>cur.indexOf(p.id)>=0 && p.note).map(p=>
    `<div class="dnote"><span class="dnote-t">${p.note}</span><span class="dnote-k">Science name: ${p.label}</span></div>`).join("");
  return `<div class="bdiagram" style="aspect-ratio:${ratio}">${diagramSvg(d)}${diagramBuildChip(d,rev)}${labels}</div>${notes?`<div class="dnotes">${notes}</div>`:''}`;
}

  rights.forEach(r=> r.onclick=()=>{ if(L.checked||L.payload.activeLeft==null)return; const li=L.payload.activeLeft, ri=+r.dataset.idx;
    for(const k of Object.keys(L.payload.links)) if(L.payload.links[k]===ri) delete L.payload.links[k];
    if(L.payload.colorOf[li]==null) L.payload.colorOf[li]=PAIR_COLORS[(cn++)%PAIR_COLORS.length];
    L.payload.links[li]=ri; L.payload.activeLeft=null; clearActive(); paint(); });
  setCheck(()=>{ let ok=true; lefts.forEach(l=>l.disabled=true); rights.forEach(r=>r.disabled=true);
    Object.entries(L.payload.links).forEach(([li,ri])=>{ const good=s.left[li].key===s.right[ri].key; lefts[li].classList.add(good?"correct":"wrong"); rights[ri].classList.add(good?"correct":"wrong"); if(!good)ok=false; });
    gradeQ(ok, ok?s.ok:s.bad);
  });
}

/* NUMERIC (type a number) */
function viewNumeric(s){
  return `<div class="step-kicker mono-kicker">${s.kicker||"Work it out"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    ${s.hint?`<div class="formula">${s.hint}</div>`:''}
    <div class="num-row">
      <input class="tinput num" id="nin" inputmode="decimal" autocomplete="off" placeholder="Answer">
      ${s.unit?`<span class="num-unit">${s.unit}</span>`:''}
    </div>
    <div class="hint">Type the number${s.unit?` (in ${s.unit})`:''}, then press Check.</div>`;
}
function numMatch(typed, s){
  const v=parseFloat(String(typed).replace(/[, ]/g,""));
  if(isNaN(v)) return false;
  const accept = s.accept || [s.answer];
  const tol = s.tolerance!=null ? s.tolerance : 0;
  return accept.some(a=> Math.abs(v-a) <= tol);
}
function wireNumeric(s){
  const inp=document.getElementById("nin"); inp.focus();
  inp.oninput=()=> enableCheck(inp.value.trim().length>0);
  setCheck(()=>{
    const ok=numMatch(inp.value, s);
    inp.disabled=true; inp.classList.add(ok?"ok":"bad");
    gradeQ(ok, ok? (s.ok||"That's right.") : `The answer is <span class="ans">${s.answer}${s.unit?(" "+s.unit):""}</span>.${s.ok?" "+s.ok:""}`);
  });
}

/* CATEGORISE (sort items into bins) */
function viewCategorise(s){
  const bins=s.bins.map((b,bi)=>`<div class="bin" data-bin="${bi}"><div class="bin-head">${b}</div><div class="bin-body" data-bin="${bi}"></div></div>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Sort them"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="cat-pool" id="pool"></div>
    <div class="cat-bins" style="grid-template-columns:${s.bins.length>=3?'1fr':'repeat('+s.bins.length+',minmax(0,1fr))'}">${bins}</div>
    <div class="hint">Tap an item, then tap a box to sort it.</div>`;
}
function wireCategorise(s){
  L.payload={assign:{}, active:null};   // assign[itemIdx]=binIdx
  const pool=document.getElementById("pool");
  const bodies=[...document.querySelectorAll(".bin-body")];
  const bins=[...document.querySelectorAll(".bin")];
  function chipHTML(i){ return `<button class="cat-chip" data-i="${i}">${s.items[i].t}</button>`; }
  function refresh(){
    pool.innerHTML = s.items.map((it,i)=> L.payload.assign[i]==null? chipHTML(i):"").join("");
    bodies.forEach((b,bi)=>{ b.innerHTML = s.items.map((it,i)=> L.payload.assign[i]===bi? chipHTML(i):"").join(""); });
    [...document.querySelectorAll(".cat-chip")].forEach(c=>{
      c.classList.toggle("active", +c.dataset.i===L.payload.active);
      c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.i;
        if(L.payload.assign[i]!=null){ delete L.payload.assign[i]; L.payload.active=i; }
        else { L.payload.active = (L.payload.active===i? null : i); }
        refresh(); };
    });
    bins.forEach(b=> b.onclick=(e)=>{ if(L.checked||L.payload.active==null)return;
      if(e.target.classList.contains("cat-chip"))return;
      L.payload.assign[L.payload.active]=+b.dataset.bin; L.payload.active=null; refresh(); });
    enableCheck(s.items.every((_,i)=>L.payload.assign[i]!=null));
  }
  refresh();
  setCheck(()=>{ let ok=true;
    s.items.forEach((it,i)=>{ const good=s.bins[L.payload.assign[i]]===it.bin; if(!good)ok=false;
      const chip=document.querySelector(`.cat-chip[data-i="${i}"]`); if(chip){ chip.classList.add(good?"correct":"wrong"); chip.disabled=true; } });
    bins.forEach(b=>b.style.pointerEvents="none");
    gradeQ(ok, ok?(s.ok||"All sorted correctly!"):(s.bad||"Some are in the wrong group — check the feedback."));
  });
}

/* ORDER (put in sequence) */
function viewOrder(s){
  const shuffled = (L.payload && L.payload.order) || shuffle(s.items.map((t,i)=>i));
  if(!L.payload || L.payload.order==null) L.payload={ order:shuffled, placed:[] };
  const slots = s.items.map((_,i)=>`<div class="order-slot" data-slot="${i}"><span class="nidx">${i+1}</span><span class="slot-fill" data-slot="${i}"></span></div>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Put in order"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="order-ans" id="ans">${slots}</div>
    <div class="order-pool" id="opool"></div>
    <div class="hint">Tap the items in order. Tap a placed one to send it back.</div>`;
}
function wireOrder(s){
  const ansFills=[...document.querySelectorAll(".slot-fill")];
  const pool=document.getElementById("opool");
  function chip(itemIdx, where){ return `<button class="order-chip" data-i="${itemIdx}" data-where="${where}">${s.items[itemIdx]}</button>`; }
  function refresh(){
    pool.innerHTML = L.payload.order.filter(i=>!L.payload.placed.includes(i)).map(i=>chip(i,"pool")).join("");
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; f.innerHTML = i!=null? chip(i,"ans") : ""; });
    [...document.querySelectorAll(".order-chip")].forEach(c=> c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.i;
      if(c.dataset.where==="pool"){ if(L.payload.placed.length<s.items.length) L.payload.placed.push(i); }
      else { L.payload.placed = L.payload.placed.filter(x=>x!==i); }
      refresh(); });
    enableCheck(L.payload.placed.length===s.items.length);
  }
  refresh();
  setCheck(()=>{ let ok=true;
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; const good=(i===slot); if(!good)ok=false;
      const c=f.querySelector(".order-chip"); if(c){ c.classList.add(good?"correct":"wrong"); c.disabled=true; } });
    gradeQ(ok, ok?(s.ok||"Perfect order!"):`The correct order is: ${s.items.map((t,i)=>`<b>${i+1}.</b> ${t}`).join("  ")}`);
  });
}

" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"230,98 224,110 236,110\" fill=\"#2C5F2D\"/></g>","parts":[{"id":"reactants","label":"Reactants","x":15,"y":33,"note":"We start with the reactants sitting here, holding chemical energy in their bonds, ready to react and rearrange into new substances."},{"id":"activation","label":"Activation energy","x":31,"y":18,"note":"First we climb this energy hill: activation energy is put in to break the starting bonds before any new bonds can form."},{"id":"products","label":"Products","x":40,"y":63,"note":"New products settle here, lower down, because making their bonds released more energy than breaking the old bonds took in."},{"id":"energyOut","label":"Energy released","x":42,"y":44,"note":"The drop from reactants to products is energy dumped into the surroundings, warming them up, like in combustion or a hand warmer."},{"id":"endoCurve","label":"Endothermic profile","x":73,"y":40,"note":"Now the endothermic case: products end up higher than reactants, so this reaction has soaked up energy overall."},{"id":"energyIn","label":"Energy taken in","x":92,"y":54,"note":"This upward gap is energy pulled in from the surroundings, cooling them down, as a sports cold pack chills an injury."}]},
"d_GCN1":{"vb":"0 0 300 280","svg":"<rect x=\"0\" y=\"0\" width=\"300\" height=\"280\" fill=\"#fff\"/><path d=\"M56 196 v54 a10 10 0 0 0 10 10 h130 a10 10 0 0 0 10 -10 v-54 z\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/><g data-part=\"solvent\"><path d=\"M58 214 v36 a8 8 0 0 0 8 8 h126 a8 8 0 0 0 8 -8 v-36 z\" fill=\"#DCEAF6\" stroke=\"none\"/><path class=\"sm-osc\" d=\"M58 214 H200\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"1.8\"/><path class=\"sm-rise\" d=\"M96 210 v-14\" stroke=\"#1E2761\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-dasharray=\"3 4\" opacity=\"0.7\"/><path class=\"sm-rise\" d=\"M160 210 v-14\" stroke=\"#1E2761\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-dasharray=\"3 4\" opacity=\"0.7\"/></g><g data-part=\"paper\"><rect x=\"86\" y=\"44\" width=\"88\" height=\"192\" rx=\"4\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"3\"/></g><g data-part=\"baseline\"><path d=\"M88 224 H172\" stroke=\"#7a8199\" stroke-width=\"2.5\" stroke-dasharray=\"6 4\"/><circle cx=\"176\" cy=\"224\" r=\"2\" fill=\"#7a8199\"/></g><g data-part=\"solventFront\"><path d=\"M88 66 H172\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-dasharray=\"6 4\"/><circle cx=\"176\" cy=\"66\" r=\"2\" fill=\"#B4341E\"/></g><g data-part=\"spot\"><circle cx=\"110\" cy=\"200\" r=\"6\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"1.5\" opacity=\"0.4\"/><circle cx=\"110\" cy=\"150\" r=\"8\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/><circle cx=\"130\" cy=\"200\" r=\"6\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"1.5\" opacity=\"0.4\"/><circle cx=\"130\" cy=\"110\" r=\"8\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.5\"/><circle cx=\"150\" cy=\"200\" r=\"6\" fill=\"#1E2761\" stroke=\"#1E2761\" stroke-width=\"1.5\" opacity=\"0.4\"/><circle cx=\"150\" cy=\"90\" r=\"8\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"distance\"><line x1=\"60\" y1=\"66\" x2=\"60\" y2=\"224\" stroke=\"#C99528\" stroke-width=\"2.5\"/><line x1=\"54\" y1=\"66\" x2=\"66\" y2=\"66\" stroke=\"#C99528\" stroke-width=\"2.5\"/><line x1=\"54\" y1=\"224\" x2=\"66\" y2=\"224\" stroke=\"#C99528\" stroke-width=\"2.5\"/><polygon points=\"60,72 55,62 65,62\" fill=\"#C99528\"/><polygon points=\"60,218 55,228 65,228\" fill=\"#C99528\"/></g>","parts":[{"id":"paper","label":"Chromatography paper (stationary phase)","x":67,"y":22,"note":"The paper stays still as the stationary phase, holding onto each dye more or less strongly as the solvent creeps up it."},{"id":"solvent","label":"Solvent (mobile phase)","x":24,"y":83,"note":"The solvent soaks up the paper as the mobile phase, carrying the dissolved substances along with it as it rises."},{"id":"baseline","label":"Pencil baseline","x":80,"y":75,"note":"We mark the start line in pencil, not ink, so it won't dissolve and run up the paper, spoiling our measurement."},{"id":"solventFront","label":"Solvent front","x":80,"y":29,"note":"The highest point the solvent reaches; we mark it fast before it dries, as it's the bottom of our Rf sum."},{"id":"spot","label":"Separated spot","x":50,"y":48,"note":"Each substance travels its own distance and separates into a spot, because some cling to the paper while others race up with the solvent."},{"id":"distance","label":"Distance moved (Rf)","x":13,"y":52,"note":"We divide the spot's distance by the solvent's distance to get the Rf value, always between 0 and 1, to identify the substance."}]},

=\"sm-rise\" cx=\"210\" cy=\"164\" r=\"2.6\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"1.4\"/><circle class=\"sm-rise\" cx=\"204\" cy=\"176\" r=\"3\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"1.4\"/><path d=\"M204 118 v-40\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><polygon points=\"204,116 200,106 208,106\" fill=\"#7a8199\"/></g><g data-part=\"litmusPaper\"><rect x=\"272\" y=\"86\" width=\"20\" height=\"40\" rx=\"2\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2\"/><rect x=\"272\" y=\"86\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#2C5F2D\" opacity=\"0.5\"/><path class=\"sm-fall\" d=\"M282 76 v8\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><path d=\"M296 96 l8 -3 M296 110 l8 0\" stroke=\"#C99528\" stroke-width=\"1.8\" stroke-linecap=\"round\"/></g>","parts":[{"id":"hydrogenTest","label":"Hydrogen: squeaky pop","x":10,"y":30,"note":"Hold a lighted splint at the tube mouth: the hydrogen ignites suddenly, giving that tell-tale squeaky pop as it burns."},{"id":"oxygenTest","label":"Oxygen: relights splint","x":36,"y":12,"note":"Push a glowing splint into the gas: oxygen feeds the embers so fiercely the flame bursts back to life and relights."},{"id":"limewater","label":"Limewater turns milky","x":60,"y":54,"note":"Bubble the gas through clear limewater: carbon dioxide reacts with it, forming a solid that turns the liquid cloudy and milky."},{"id":"litmusPaper","label":"Chlorine: bleaches litmus","x":85,"y":12,"note":"Hold damp litmus paper in the gas: chlorine strips out its colour, bleaching the paper white to reveal itself."},{"id":"splint","label":"Splint","x":22,"y":4,"note":"A thin wooden splint is your basic tool here — lit or glowing, it reacts differently depending on which gas surrounds it."}]},
"d_GCO1":{"vb":"0 0 320 300","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"300\" fill=\"#F4F6FC\"/>\n<!-- scaffolding: column body (tall tower, wider at base) -->\n<g data-part=\"column\">\n  <path d=\"M112 46 L208 46 L226 272 L94 272 Z\" fill=\"#ffffff\" stroke=\"#1E2761\" stroke-width=\"3.2\" stroke-linejoin=\"round\"/>\n  <!-- internal trays -->\n  <line x1=\"104\" y1=\"94\" x2=\"216\" y2=\"94\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n  <line x1=\"100\" y1=\"140\" x2=\"220\" y2=\"140\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n  <line x1=\"97\" y1=\"186\" x2=\"223\" y2=\"186\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n  <line x1=\"95\" y1=\"230\" x2=\"225\" y2=\"230\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n</g>\n<!-- COOL TOP: cold zone marker + thermometer high, blue tint -->\n<g data-part=\"coolTop\">\n  <rect x=\"118\" y=\"50\" width=\"84\" height=\"40\" rx=\"5\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <text x=\"160\" y=\"75\" font-family=\"sans-serif\" font-size=\"15\" fill=\"#1E2761\" text-anchor=\"middle\" font-weight=\"700\">20&#176;C</text>\n</g>\n<!-- HOT BOTTOM furnace: red flames under base -->\n<g data-part=\"hotBottom\">\n  <rect x=\"96\" y=\"234\" width=\"128\" height=\"36\" rx=\"4\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"1.6\"/>\n  <text x=\"160\" y=\"258\" font-family=\"sans-serif\" font-size=\"15\" fill=\"#B4341E\" text-anchor=\"middle\" font-weight=\"700\">350&#176;C</text>\n  <g class=\"sm-glow\">\n    <path d=\"M120 292 q6 -18 14 -8 q4 -14 12 -2 q6 -14 12 0 q8 -12 14 2 q8 -12 14 6 q6 -10 12 2\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n    <path d=\"M150 292 q4 -14 10 -4 q5 -12 10 2 q6 -10 10 2\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n  </g>\n</g>\n<!-- CRUDE OIL IN: pipe entering base, arrow -->\n<g data-part=\"crudeOilInlet\">\n  <line x1=\"36\" y1=\"252\" x2=\"96\" y2=\"252\" stroke=\"#1E2761\" stroke-width=\"3.4\" stroke-linecap=\"round\"/>\n  <circle cx=\"34\" cy=\"252\" r=\"9\" fill=\"#1E2761\"/>\n  <polyline points=\"84,244 96,252 84,260\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- vapour rising arrow inside column (scaffolding, always shown) -->\n<g class=\"sm-rise\">\n  <line x1=\"160\" y1=\"228\" x2=\"160\" y2=\"110\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-dasharray=\"5 5\"/>\n  <polyline points=\"153,120 160,108 167,120\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- SHORT-CHAIN FRACTION: tapped off high, light/runny, outlet pipe top-right -->\n<g data-part=\"topFraction\">\n  <line x1=\"216\" y1=\"98\" x2=\"272\" y2=\"98\" stroke=\"#2C5F2D\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n  <polyline points=\"262,90 272,98 262,106\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  <rect x=\"272\" y=\"88\" width=\"26\" height=\"20\" rx=\"4\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n  <!-- short molecule -->\n  <circle cx=\"279\" cy=\"98\" r=\"3.2\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"1.6\"/>\n  <circle cx=\"290\" cy=\"98\" r=\"3.2\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"1.6\"/>\n</g>\n<!-- LONG-CHAIN FRACTION: tapped off low, thick/sticky, outlet bottom-right -->\n<g data-part=\"bottomFraction\">\n  <line x1=\"220\" y1=\"216\" x2=\"278\" y2=\"216\" stroke=\"#B4341E\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n  <polyline points=\"268,208 278,216 268,224\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  <rect x=\"278\" y=\"206\" width=\"30\" height=\"20\" rx=\"4\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <!-- long molecule -->\n  <circle cx=\"284\" cy=\"216\" r=\"3.2\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <circle cx=\"293\" cy=\"216\" r=\"3.2\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <circle cx=\"302\" cy=\"216\" r=\"3.2\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n</g>","parts":[{"id":"crudeOilInlet","label":"Crude oil in","x":22,"y":86,"note":"Crude oil, a finite mixture of hydrocarbon chains of many different lengths, is pumped in ready to be separated."},{"id":"column","label":"Fractionating column","x":38,"y":18,"note":"The mixture is heated so it evaporates, then the vapours rise up this tall tower to be split into useful fractions."},{"id":"coolTop","label":"Cool top","x":63,"y":29,"note":"Up here it's coolest, so only the lightest vapours reach this far before condensing back into liquid and being tapped off."},{"id":"topFraction","label":"Short-chain fraction","x":50,"y":44,"note":"Short chains have low boiling points, so they rise highest as vapour; runny, volatile and flammable, ideal for fuels like petrol."},{"id":"bottomFraction","label":"Long-chain fraction","x":50,"y":68,"note":"Long chains have high boiling points, so they barely rise and drain out low down; thick, sticky liquids like bitumen."},{"id":"hotBottom","label":"Hot bottom (furnace)","x":56,"y":95,"note":"The furnace heats the base hardest, boiling the mixture so vapours rise and each fraction condenses where the tower cools enough."}]},
"d_GCO2":{"vb":"0 0 320 240","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"240\" fill=\"#ffffff\"/>\n<!-- LARGE HYDROCARBON: long chain entering left -->\n<g data-part=\"largeHydrocarbon\">\n  <line x1=\"20\" y1=\"60\" x2=\"96\" y2=\"60\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  <circle cx=\"20\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n  <circle cx=\"34\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n  <circle cx=\"48\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n  <circle cx=\"62\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n  <circle cx=\"76\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n  <circle cx=\"90\" cy=\"60\" r=\"7\" fill=\"#1E2761\"/>\n</g>\n<!-- HOT CATALYST: heated vessel, red flames, arrow through -->\n<g data-part=\"catalyst\">\n  <rect x=\"118\" y=\"34\" width=\"84\" height=\"56\" rx=\"10\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"3\"/>\n  <path class=\"sm-glow\" d=\"M126 90 q6 12 12 4 q6 12 12 4 q6 12 12 4 q6 12 12 4 q6 12 12 4\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n  <text x=\"160\" y=\"68\" font-family=\"sans-serif\" font-size=\"13\" fill=\"#B4341E\" text-anchor=\"middle\" font-weight=\"700\">heat</text>\n</g>\n<!-- arrow into catalyst (scaffolding) -->\n<line x1=\"98\" y1=\"60\" x2=\"116\" y2=\"60\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n<polyline points=\"109,54 118,60 109,66\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n<!-- split arrows out of catalyst (scaffolding) -->\n<path d=\"M202 55 Q230 40 250 34\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n<polyline points=\"243,32 252,32 250,42\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n<path d=\"M202 70 Q230 92 250 106\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n<polyline points=\"243,108 252,106 250,96\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n<!-- SMALL ALKANE (fuel): short saturated chain top-right -->\n<g data-part=\"smallAlkane\">\n  <line x1=\"258\" y1=\"32\" x2=\"298\" y2=\"32\" stroke=\"#2C5F2D\" stroke-width=\"2.4\"/>\n  <circle cx=\"258\" cy=\"32\" r=\"7\" fill=\"#2C5F2D\"/>\n  <circle cx=\"278\" cy=\"32\" r=\"7\" fill=\"#2C5F2D\"/>\n  <circle cx=\"298\" cy=\"32\" r=\"7\" fill=\"#2C5F2D\"/>\n</g>\n<!-- ALKENE: shorter unsaturated molecule lower-right -->\n<g data-part=\"alkene\">\n  <circle cx=\"262\" cy=\"110\" r=\"7\" fill=\"#C99528\"/>\n  <circle cx=\"286\" cy=\"110\" r=\"7\" fill=\"#C99528\"/>\n</g>\n<!-- C=C DOUBLE BOND: the two parallel lines between alkene carbons -->\n<g data-part=\"doubleBond\">\n  <line x1=\"269\" y1=\"106\" x2=\"279\" y2=\"106\" stroke=\"#B4341E\" stroke-width=\"2.8\" stroke-linecap=\"round\"/>\n  <line x1=\"269\" y1=\"114\" x2=\"279\" y2=\"114\" stroke=\"#B4341E\" stroke-width=\"2.8\" stroke-linecap=\"round\"/>\n</g>\n<!-- BROMINE WATER TEST: test tube, orange -> colourless -->\n<g data-part=\"bromineTest\">\n  <!-- tube -->\n  <path d=\"M132 150 h44 v70 a22 22 0 0 1 -44 0 z\" fill=\"#ffffff\" stroke=\"#1E2761\" stroke-width=\"2.6\" stroke-linejoin=\"round\"/>\n  <!-- orange bromine water turning clear (gradient-ish via two fills) -->\n  <path d=\"M134 190 h40 v30 a20 20 0 0 1 -40 0 z\" fill=\"#F5E6C8\" stroke=\"none\"/>\n  <path d=\"M134 172 h40 v20 h-40 z\" fill=\"#E8A13C\" opacity=\"0.85\"/>\n  <!-- alkene added, drifting -->\n  <g class=\"sm-drift\">\n    <circle cx=\"150\" cy=\"182\" r=\"3\" fill=\"#C99528\"/>\n    <circle cx=\"160\" cy=\"200\" r=\"3\" fill=\"#C99528\"/>\n  </g>\n  <text x=\"154\" y=\"238\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#1E2761\" text-anchor=\"middle\">colourless</text>\n</g>","parts":[{"id":"largeHydrocarbon","label":"Large hydrocarbon","x":18,"y":43,"note":"A long, less useful hydrocarbon chain arrives from crude oil, ready to be broken down into smaller molecules people actually want."},{"id":"catalyst","label":"Hot catalyst","x":48,"y":43,"note":"The big molecule is heated and passed over a hot catalyst, which snaps the long chain apart into shorter pieces."},{"id":"smallAlkane","label":"Small alkane (fuel)","x":74,"y":30,"note":"Out comes a short-chain alkane, a saturated molecule burned as fuel like petrol, meeting the high demand for fuels."},{"id":"alkene","label":"Alkene","x":67,"y":52,"note":"The leftover piece is an alkene, a shorter unsaturated molecule that becomes a building block for making polymers like plastics."},{"id":"doubleBond","label":"C=C double bond","x":80,"y":62,"note":"Two carbons share a double bond here, so the molecule holds fewer hydrogens (CnH2n) and is far more reactive than an alkane."},{"id":"bromineTest","label":"Bromine water test","x":36,"y":94,"note":"Shake the alkene with orange bromine water and its double bond grabs the bromine, turning the mixture colourless to prove it is unsaturated."}]},
"d_GCQ1":{"vb":"0 0 320 240","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"300\" fill=\"#F4F6FC\"/>\n<!-- BALANCE BEAM: central stand + level beam + fulcrum -->\n<g data-part=\"balanceBeam\">\n  <!-- stand -->\n  <rect x=\"152\" y=\"80\" width=\"16\" height=\"150\" rx=\"4\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <!-- base -->\n  <rect x=\"110\" y=\"228\" width=\"100\" height=\"16\" rx=\"5\" fill=\"#1E2761\"/>\n  <!-- beam (level) -->\n  <line x1=\"52\" y1=\"84\" x2=\"268\" y2=\"84\" stroke=\"#1E2761\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  <!-- pointer / fulcrum -->\n  <polygon points=\"160,66 151,84 169,84\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n</g>\n<!-- REACTANTS pan (left) -->\n<g data-part=\"reactantsPan\">\n  <line x1=\"60\" y1=\"84\" x2=\"60\" y2=\"118\" stroke=\"#1E2761\" stroke-width=\"2.2\" stroke-linecap=\"round\"/>\n  <path d=\"M28 118 h64 l-14 30 h-36 z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.6\" stroke-linejoin=\"round\"/>\n</g>\n<!-- PRODUCTS pan (right) -->\n<g data-part=\"productsPan\">\n  <line x1=\"260\" y1=\"84\" x2=\"260\" y2=\"118\" stroke=\"#1E2761\" stroke-width=\"2.2\" stroke-linecap=\"round\"/>\n  <path d=\"M228 118 h64 l-14 30 h-36 z\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.6\" stroke-linejoin=\"round\"/>\n</g>\n<!-- ATOMS: same atoms on both pans (2 red + 1 green each) -->\n<g data-part=\"atoms\">\n  <!-- left -->\n  <circle cx=\"46\" cy=\"128\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  <circle cx=\"62\" cy=\"128\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  <circle cx=\"54\" cy=\"140\" r=\"7\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n  <!-- right (rearranged but same count) -->\n  <circle cx=\"246\" cy=\"128\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  <circle cx=\"270\" cy=\"128\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  <circle cx=\"258\" cy=\"140\" r=\"7\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n  <!-- equals sign in middle to stress same atoms -->\n  <line x1=\"150\" y1=\"132\" x2=\"170\" y2=\"132\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n  <line x1=\"150\" y1=\"142\" x2=\"170\" y2=\"142\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n</g>\n<!-- ESCAPING GAS: bubbles rising & drifting off (mass falls) - lower left -->\n<g data-part=\"escapingGas\">\n  <g class=\"sm-rise\">\n    <circle cx=\"70\" cy=\"200\" r=\"4\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\"/>\n    <circle cx=\"80\" cy=\"184\" r=\"3\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\"/>\n    <circle cx=\"90\" cy=\"170\" r=\"2.5\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\"/>\n  </g>\n  <!-- down arrow = mass falls -->\n  <line x1=\"50\" y1=\"196\" x2=\"50\" y2=\"222\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <polyline points=\"44,214 50,224 56,214\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- INCOMING GAS: gas from air joining (mass rises) - lower right -->\n<g data-part=\"incomingGas\">\n  <g class=\"sm-fall\">\n    <circle cx=\"250\" cy=\"170\" r=\"2.5\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"1.8\"/>\n    <circle cx=\"240\" cy=\"184\" r=\"3\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"1.8\"/>\n    <circle cx=\"230\" cy=\"200\" r=\"4\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"1.8\"/>\n  </g>\n  <!-- up arrow = mass rises -->\n  <line x1=\"272\" y1=\"222\" x2=\"272\" y2=\"196\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <polyline points=\"266,204 272,194 278,204\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>","parts":[{"id":"balanceBeam","label":"Balance beam","x":50,"y":14,"note":"The beam sits level to show the reaction's total mass never changes: atoms are only rearranged, never made or destroyed."},{"id":"reactantsPan","label":"Reactants","x":18,"y":38,"note":"We load the starting chemicals onto this side; these atoms will be shuffled into new arrangements during the reaction."},{"id":"productsPan","label":"Products","x":82,"y":38,"note":"The new substances land here, built from exactly the same atoms, so this pan weighs the same as the reactants."},{"id":"atoms","label":"Atoms (same on both sides)","x":50,"y":31,"note":"Count each type of atom: the numbers match on both sides, which is why the beam stays perfectly balanced."},{"id":"escapingGas","label":"Gas escaping (mass falls)","x":36,"y":24,"note":"A gas bubbles off into the air and drifts away, so the mass left on the pan seems to drop."},{"id":"incomingGas","label":"Gas taken in (mass rises)","x":66,"y":22,"note":"Gas from the air joins the solid, like a metal rusting, so extra atoms are added and the mass seems to climb."}]},
"d_GCQ2":{"vb":"0 0 320 230","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"230\" fill=\"#ffffff\"/>\n<!-- BALANCE: digital balance weighing solute on the left -->\n<g data-part=\"balance\">\n  <rect x=\"16\" y=\"150\" width=\"96\" height=\"40\" rx=\"6\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.6\"/>\n  <rect x=\"30\" y=\"132\" width=\"68\" height=\"18\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <rect x=\"66\" y=\"168\" width=\"36\" height=\"14\" rx=\"3\" fill=\"#1E2761\"/>\n  <text x=\"84\" y=\"179\" font-family=\"monospace\" font-size=\"10\" fill=\"#CDE5C6\" text-anchor=\"middle\">8.0g</text>\n</g>\n<!-- SOLUTE: pile of solid crystals on the balance pan -->\n<g data-part=\"solute\">\n  <polygon points=\"52,132 58,120 64,132\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <polygon points=\"60,132 66,116 72,132\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <polygon points=\"68,132 74,122 80,132\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n</g>\n<!-- pouring arrow (scaffolding) -->\n<path d=\"M112 130 Q150 120 176 128\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-dasharray=\"5 5\"/>\n<polyline points=\"169,121 178,128 168,135\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n<!-- SOLVENT (water) label: droplet + arrow from top -->\n<g data-part=\"solvent\">\n  <path d=\"M222 20 q-12 18 0 26 a13 13 0 0 0 0 -26 z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\" transform=\"rotate(0 222 33)\"/>\n  <line x1=\"222\" y1=\"48\" x2=\"222\" y2=\"74\" stroke=\"#1E2761\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n  <polyline points=\"216,66 222,76 228,66\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- measuring cylinder body (scaffolding container, not a labelled part) -->\n<path d=\"M180 80 h80 v128 a10 10 0 0 1 -10 10 h-60 a10 10 0 0 1 -10 -10 z\" fill=\"#ffffff\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n<!-- SOLUTION: dissolved liquid filling the cylinder, dissolved particles spread -->\n<g data-part=\"solution\">\n  <path d=\"M182 120 h76 v88 a9 9 0 0 1 -9 9 h-58 a9 9 0 0 1 -9 -9 z\" fill=\"#F5E6C8\" opacity=\"0.75\"/>\n  <g class=\"sm-drift\">\n    <circle cx=\"200\" cy=\"150\" r=\"2.6\" fill=\"#C99528\"/>\n    <circle cx=\"228\" cy=\"168\" r=\"2.6\" fill=\"#C99528\"/>\n    <circle cx=\"212\" cy=\"188\" r=\"2.6\" fill=\"#C99528\"/>\n    <circle cx=\"242\" cy=\"150\" r=\"2.6\" fill=\"#C99528\"/>\n    <circle cx=\"222\" cy=\"200\" r=\"2.6\" fill=\"#C99528\"/>\n  </g>\n</g>\n<!-- MENISCUS: curved liquid surface, read bottom at eye level -->\n<g data-part=\"meniscus\">\n  <path d=\"M182 120 q38 12 76 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>\n  <!-- eye-level dashed sightline to bottom of curve -->\n  <line x1=\"150\" y1=\"126\" x2=\"220\" y2=\"126\" stroke=\"#B4341E\" stroke-width=\"1.8\" stroke-dasharray=\"4 4\"/>\n  <circle cx=\"220\" cy=\"126\" r=\"2.6\" fill=\"#B4341E\"/>\n</g>\n<!-- VOLUME SCALE: tick marks + units on the cylinder -->\n<g data-part=\"scaleMarks\">\n  <line x1=\"260\" y1=\"120\" x2=\"272\" y2=\"120\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"260\" y1=\"150\" x2=\"270\" y2=\"150\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <line x1=\"260\" y1=\"180\" x2=\"272\" y2=\"180\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n  <line x1=\"260\" y1=\"210\" x2=\"270\" y2=\"210\" stroke=\"#1E2761\" stroke-width=\"1.6\"/>\n  <text x=\"292\" y=\"124\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#1E2761\" text-anchor=\"middle\">100</text>\n  <text x=\"290\" y=\"184\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#1E2761\" text-anchor=\"middle\">50</text>\n</g>","parts":[{"id":"balance","label":"Balance (mass)","x":21,"y":68,"note":"The balance weighs out an exact mass of substance; divide that mass by the relative formula mass to count how many moles you have."},{"id":"solute","label":"Solute","x":31,"y":56,"note":"This is the solid you dissolve; weighing it lets you work out what fraction of its mass is each element inside the compound."},{"id":"solution","label":"Solution","x":55,"y":68,"note":"As the solute dissolves it spreads through the liquid, making a solution whose concentration is that dissolved mass divided by the volume."},{"id":"solvent","label":"Solvent (water)","x":55,"y":50,"note":"Water is added as the solvent to dissolve the solute; more water for the same mass gives a lower concentration in g/dm cubed."},{"id":"meniscus","label":"Meniscus","x":83,"y":40,"note":"The liquid curves at the surface; read the bottom of this meniscus at eye level so your volume measurement is accurate and repeatable."},{"id":"scaleMarks","label":"Volume scale","x":92,"y":58,"note":"These marks let you read the volume, but every reading carries some uncertainty, so measure carefully and repeat to improve reliability."}]},
"d_GCR1":{"vb":"0 0 320 280","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"280\" fill=\"#ffffff\"/>\n<!-- ================= TOP: collision scene in a reaction box ================= -->\n<rect x=\"14\" y=\"14\" width=\"292\" height=\"104\" rx=\"10\" fill=\"#F4F6FC\" stroke=\"#7a8199\" stroke-width=\"1.6\"/>\n<!-- REACTANT PARTICLES (left) moving toward each other -->\n<g data-part=\"reactants\">\n  <g class=\"sm-osc-x\">\n    <circle cx=\"46\" cy=\"52\" r=\"11\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n    <circle cx=\"52\" cy=\"82\" r=\"11\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  </g>\n  <!-- motion arrow -->\n  <line x1=\"66\" y1=\"66\" x2=\"118\" y2=\"66\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n  <polyline points=\"110,60 120,66 110,72\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- COLLISION (centre): two particles smashing, burst -->\n<g data-part=\"collision\">\n  <circle cx=\"150\" cy=\"66\" r=\"11\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.4\"/>\n  <circle cx=\"172\" cy=\"66\" r=\"11\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.4\"/>\n  <g class=\"sm-throb\">\n    <line x1=\"161\" y1=\"46\" x2=\"161\" y2=\"38\" stroke=\"#C99528\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n    <line x1=\"177\" y1=\"52\" x2=\"184\" y2=\"46\" stroke=\"#C99528\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n    <line x1=\"145\" y1=\"52\" x2=\"138\" y2=\"46\" stroke=\"#C99528\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n    <line x1=\"161\" y1=\"86\" x2=\"161\" y2=\"94\" stroke=\"#C99528\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n  </g>\n</g>\n<!-- arrow to products -->\n<line x1=\"196\" y1=\"66\" x2=\"228\" y2=\"66\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n<polyline points=\"220,60 230,66 220,72\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n<!-- PRODUCT PARTICLES (right): rearranged, joined -->\n<g data-part=\"products\">\n  <circle cx=\"256\" cy=\"58\" r=\"10\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.4\"/>\n  <circle cx=\"274\" cy=\"76\" r=\"10\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  <line x1=\"263\" y1=\"65\" x2=\"267\" y2=\"69\" stroke=\"#2C5F2D\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n</g>\n<!-- TEMPERATURE (heat) makes particles faster: thermometer + fast marks, below-left -->\n<g data-part=\"temperature\">\n  <!-- thermometer -->\n  <rect x=\"30\" y=\"150\" width=\"12\" height=\"70\" rx=\"6\" fill=\"#ffffff\" stroke=\"#B4341E\" stroke-width=\"2.4\"/>\n  <circle cx=\"36\" cy=\"226\" r=\"12\" fill=\"#B4341E\"/>\n  <rect x=\"33\" y=\"188\" width=\"6\" height=\"34\" fill=\"#B4341E\"/>\n  <g class=\"sm-glow\">\n    <line x1=\"50\" y1=\"162\" x2=\"62\" y2=\"158\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <line x1=\"50\" y1=\"178\" x2=\"64\" y2=\"176\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <line x1=\"50\" y1=\"194\" x2=\"62\" y2=\"196\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n  </g>\n  <!-- fast particles zooming -->\n  <g class=\"sm-osc-x\">\n    <circle cx=\"92\" cy=\"170\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n    <circle cx=\"116\" cy=\"200\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n    <circle cx=\"80\" cy=\"210\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  </g>\n</g>\n<!-- ================= BOTTOM-RIGHT: energy barrier profile ================= -->\n<!-- axes (scaffolding) -->\n<line x1=\"150\" y1=\"255\" x2=\"304\" y2=\"255\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<line x1=\"150\" y1=\"255\" x2=\"150\" y2=\"140\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n<text x=\"146\" y=\"150\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#1E2761\" text-anchor=\"end\">energy</text>\n<!-- ACTIVATION ENERGY: the high barrier hump on the profile -->\n<g data-part=\"activationEnergy\">\n  <path d=\"M158 238 L188 238 Q210 238 224 168 Q238 238 262 238 L298 238\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  <!-- barrier height marker -->\n  <line x1=\"188\" y1=\"238\" x2=\"188\" y2=\"172\" stroke=\"#B4341E\" stroke-width=\"1.8\" stroke-dasharray=\"4 3\"/>\n  <polyline points=\"184,180 188,172 192,180\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- CATALYST PATHWAY: lower barrier alternative route -->\n<g data-part=\"catalystPath\">\n  <path d=\"M158 238 L188 238 Q206 238 224 206 Q242 238 262 238 L298 238\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"7 4\"/>\n  <text x=\"256\" y=\"200\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#2C5F2D\" text-anchor=\"middle\">lower</text>\n</g>","parts":[{"id":"reactants","label":"Reactant particles","x":20,"y":20,"note":"We start with reactant particles zipping about, each carrying energy and needing to meet another to react."},{"id":"collision","label":"Collision","x":50,"y":21,"note":"Two particles smash together with enough energy and the right angle, so old bonds break and the reaction happens."},{"id":"products","label":"Product particles","x":80,"y":24,"note":"That successful collision rearranges the atoms, and out come the product particles the reaction was making."},{"id":"temperature","label":"Faster particles (heat)","x":82,"y":42,"note":"Heating gives particles more energy, so they zoom faster and collide more often and harder, speeding the reaction up."},{"id":"activationEnergy","label":"Activation energy","x":50,"y":68,"note":"Collisions only work if they clear this energy barrier; below it particles just bounce off without reacting."},{"id":"catalystPath","label":"Catalyst pathway","x":58,"y":80,"note":"A catalyst opens a lower-energy route over the barrier, so more collisions succeed, yet it emerges unchanged itself."}]},
"d_GCR2":{"vb":"0 0 320 250","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"250\" fill=\"#ffffff\"/>\n<!-- CLOSED SYSTEM: sealed round-bottom flask / sealed box container -->\n<g data-part=\"closedSystem\">\n  <path d=\"M60 60 h200 a14 14 0 0 1 14 14 v122 a14 14 0 0 1 -14 14 h-200 a14 14 0 0 1 -14 -14 v-122 a14 14 0 0 1 14 -14 z\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"3.4\" stroke-linejoin=\"round\"/>\n  <!-- sealed stopper on top -->\n  <rect x=\"146\" y=\"44\" width=\"28\" height=\"18\" rx=\"4\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  <text x=\"160\" y=\"30\" font-family=\"sans-serif\" font-size=\"11\" fill=\"#1E2761\" text-anchor=\"middle\" font-weight=\"600\">sealed</text>\n</g>\n<!-- REACTANTS: cluster on the left, blue particles -->\n<g data-part=\"reactants\">\n  <circle cx=\"78\" cy=\"110\" r=\"10\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  <circle cx=\"98\" cy=\"140\" r=\"10\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n  <circle cx=\"74\" cy=\"168\" r=\"10\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.4\"/>\n</g>\n<!-- PRODUCTS: cluster on the right, green particles -->\n<g data-part=\"products\">\n  <circle cx=\"242\" cy=\"110\" r=\"10\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.4\"/>\n  <circle cx=\"222\" cy=\"140\" r=\"10\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.4\"/>\n  <circle cx=\"246\" cy=\"168\" r=\"10\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.4\"/>\n</g>\n<!-- FORWARD REACTION: top arrow L->R -->\n<g data-part=\"forwardReaction\">\n  <path class=\"sm-flow\" d=\"M118 122 H202\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-dasharray=\"8 6\"/>\n  <polyline points=\"194,115 204,122 194,129\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- REVERSE REACTION: bottom arrow R->L -->\n<g data-part=\"reverseReaction\">\n  <path class=\"sm-flow\" d=\"M202 150 H118\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-dasharray=\"8 6\"/>\n  <polyline points=\"126,143 116,150 126,157\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>\n<!-- DOUBLE ARROW symbol: the reversible sign, centred below flask -->\n<g data-part=\"doubleArrow\">\n  <line x1=\"132\" y1=\"224\" x2=\"188\" y2=\"224\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <polyline points=\"182,218 190,224 182,230\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n  <line x1=\"188\" y1=\"236\" x2=\"132\" y2=\"236\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <polyline points=\"138,230 130,236 138,242\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n</g>","parts":[{"id":"closedSystem","label":"Closed system","x":50,"y":12,"note":"Seal everything in a closed container so nothing escapes; this lets the forward and reverse reactions balance and settle into equilibrium."},{"id":"reactants","label":"Reactants","x":24,"y":52,"note":"The starting substances go in on the left; once at equilibrium their amount stays steady even though they keep reacting."},{"id":"products","label":"Products","x":76,"y":50,"note":"The new substances build up on the right, but they don't run out or pile up endlessly because their amount now holds constant."},{"id":"forwardReaction","label":"Forward reaction","x":62,"y":36,"note":"Reactants turn into products, racing left to right; this forward change happens at exactly the same rate as the reverse one."},{"id":"reverseReaction","label":"Reverse reaction","x":40,"y":62,"note":"Meanwhile products change back into reactants, running right to left, so nothing truly stops; the two directions just cancel out."},{"id":"doubleArrow","label":"Reversible arrow","x":50,"y":48,"note":"The special double arrow replaces the single one, signalling the reaction runs both ways so products can reform the original reactants."}]},

-dasharray=\"5 4\"/><polygon points=\"194,159 186,155 186,163\"/>\n  </g>\n  <text x=\"140\" y=\"200\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#B4341E\" text-anchor=\"middle\">high P</text>\n  <text x=\"180\" y=\"200\" font-family=\"sans-serif\" font-size=\"9\" fill=\"#2C5F2D\" text-anchor=\"middle\">pure</text>\n</g>\n<g data-part=\"settlingTank\">\n  <path d=\"M228 138 L300 138 L288 190 L240 190 Z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>\n  <path d=\"M244 178 L284 178 L280 190 L248 190 Z\" fill=\"#8A6A52\" stroke=\"#5c4632\" stroke-width=\"1.5\"/>\n  <g class=\"sm-fall\" fill=\"#8A6A52\"><circle cx=\"258\" cy=\"160\" r=\"2.4\"/><circle cx=\"272\" cy=\"166\" r=\"2.4\"/><circle cx=\"264\" cy=\"152\" r=\"2.4\"/></g>\n  <path d=\"M236 150 q14 -4 28 0 t28 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"1.6\" opacity=\"0.5\"/>\n</g>","parts":[{"id":"sourceWater","label":"Fresh water source","x":14,"y":24,"note":"We start with fresh water from a river or reservoir; it looks clean but carries mud, grit and microbes we must remove."},{"id":"filterBed","label":"Filtration","x":43,"y":24,"note":"The water trickles through beds of sand and gravel that trap solid bits, so insoluble dirt is left behind and the water clears."},{"id":"steriliser","label":"Sterilising","x":73,"y":24,"note":"Next we kill remaining microbes by adding chlorine or bubbling ozone, or shining ultraviolet light through, making the water safe to drink."},{"id":"potableTap","label":"Potable water","x":92,"y":30,"note":"Out comes potable water, safe to drink; it still holds dissolved salts, so it is safe but not chemically pure."},{"id":"desalUnit","label":"Desalination","x":16,"y":63,"note":"Where fresh water is scarce, we feed in salty seawater instead and desalinate it, though this step swallows a lot of energy."},{"id":"settlingTank","label":"Sedimentation tank","x":57,"y":64,"note":"In waste-water treatment, sewage sits still in a tank so heavy solids sink out as sludge, separating it from the liquid above."},{"id":"reverseOsmosis","label":"Reverse osmosis","x":89,"y":63,"note":"Here the salty water is forced under high pressure through a membrane that blocks the salt, letting only pure water squeeze through."}]},

e=\"#B4341E\" stroke-width=\"2.5\"/>\n  <path d=\"M56 168 L104 168 L100 192 L60 192 Z\" fill=\"#B0B7C9\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linejoin=\"round\"/>\n  <line x1=\"52\" y1=\"168\" x2=\"108\" y2=\"168\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <line x1=\"80\" y1=\"162\" x2=\"80\" y2=\"168\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <line x1=\"72\" y1=\"176\" x2=\"74\" y2=\"188\" stroke=\"#B4341E\" stroke-width=\"1.5\"/><line x1=\"84\" y1=\"176\" x2=\"84\" y2=\"188\" stroke=\"#B4341E\" stroke-width=\"1.5\"/><line x1=\"94\" y1=\"176\" x2=\"92\" y2=\"188\" stroke=\"#B4341E\" stroke-width=\"1.5\"/>\n</g>\n<g data-part=\"recycleLoop\">\n  <path class=\"sm-flow\" d=\"M50 150 C34 122 34 100 50 74\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3.5\" stroke-dasharray=\"8 6\" stroke-linecap=\"round\"/>\n  <polygon points=\"55 70 42 76 52 84\" fill=\"#2C5F2D\"/>\n  <g transform=\"translate(30,112)\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n    <path d=\"M-8 -6 L0 -12 L4 -4\"/><path d=\"M8 -2 L10 8 L2 6\"/><path d=\"M-6 8 L-10 0 L-2 2\"/>\n  </g>\n</g>\n<g data-part=\"biasScale\">\n  <line x1=\"160\" y1=\"232\" x2=\"160\" y2=\"288\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <path d=\"M140 288 L180 288\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  <g class=\"sm-osc\">\n    <line x1=\"112\" y1=\"238\" x2=\"208\" y2=\"226\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <path d=\"M100 238 a12 8 0 0 0 24 0 Z\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/>\n    <path d=\"M196 226 a12 8 0 0 0 24 0 Z\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/>\n  </g>\n  <circle cx=\"160\" cy=\"230\" r=\"4\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/>\n</g>","parts":[{"id":"rawMaterials","label":"Raw materials","x":25,"y":20,"note":"The story starts here: we dig up or grow the raw materials, tracking the energy used and habitats disturbed to extract them."},{"id":"manufacture","label":"Manufacture","x":75,"y":20,"note":"Next, factories turn those raw materials into the product, burning energy and often releasing pollutants we must add to the tally."},{"id":"use","label":"Use product","x":75,"y":59,"note":"Now the product is used, sometimes for years; any energy, water or waste it needs while working also counts in the assessment."},{"id":"disposal","label":"Disposal","x":25,"y":59,"note":"At the end, the product is thrown away, burned or buried, so we weigh up the waste and pollution its disposal creates."},{"id":"recycleLoop","label":"Recycle loop","x":29,"y":40,"note":"Instead of dumping it, we can loop the material back to be reused or recycled, saving resources and energy since recycling metal beats extracting fresh ore."},{"id":"biasScale","label":"Bias / judgement","x":50,"y":85,"note":"Some impacts, like pollution effects, are hard to measure and judged differently, so an LCA can be tilted to make a product look greener than it is."}]},
