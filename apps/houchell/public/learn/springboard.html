/* GAP */
function viewGap(s){
  let html=""; s.parts.forEach(p=>{ html += typeof p==="string"?p:`<span class="blank" data-b="${p.b}"></span>`; });
  const bank=s.bank.map((w,i)=>`<button class="token" data-w="${i}">${w}</button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="sentence" id="sentence">${html}</div><div class="bank" id="bank">${bank}</div>`;
}
function wireGap(s){
  L.payload={fill:{}};
  const blanks=[...document.querySelectorAll(".blank")], tokens=[...document.querySelectorAll(".token")];
  function refresh(){
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, tk=L.payload.fill[bi]; bl.classList.toggle("filled",tk!=null);
      bl.innerHTML = tk!=null?`<button>${s.bank[tk]}</button>`:""; if(tk!=null) bl.querySelector("button").onclick=(e)=>{ if(L.checked)return; e.stopPropagation(); delete L.payload.fill[bi]; refresh(); }; });
    tokens.forEach(t=> t.classList.toggle("used", Object.values(L.payload.fill).includes(+t.dataset.w)));
    enableCheck(s.blanks.every((_,bi)=>L.payload.fill[bi]!=null));
  }
  function firstEmpty(){ for(let bi=0;bi<s.blanks.length;bi++) if(L.payload.fill[bi]==null) return bi; return -1; }
  tokens.forEach(t=> t.onclick=()=>{ if(L.checked)return; const bi=firstEmpty(); if(bi<0)return; L.payload.fill[bi]=+t.dataset.w; refresh(); });
  blanks.forEach(bl=> bl.onclick=()=>{ if(L.checked)return; const bi=+bl.dataset.b; if(L.payload.fill[bi]!=null){ delete L.payload.fill[bi]; refresh(); } });
  refresh();
  setCheck(()=>{ let ok=true;
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, word=s.bank[L.payload.fill[bi]], good=word===s.blanks[bi]; bl.classList.add(good?"ok":"bad"); if(!good)ok=false; const inner=bl.querySelector("button"); if(inner)inner.disabled=true; });
    tokens.forEach(t=>t.disabled=true);
    const correct=s.parts.map(p=> typeof p==="string"?p:`<b>${s.blanks[p.b]}</b>`).join("");
    gradeQ(ok, ok?s.ok:`The answer is: “${correct}”`);
  });
}

/* MATCH */
const PAIR_COLORS=["#1E2761","#C99528","#2C5F2D","#7A4FA3","#1E5F8C"];
function viewMatch(s){
  const left=s.left.map((l,i)=>`<button class="mitem mleft" data-idx="${i}">${l.t}<span class="dot"></span></button>`).join("");
  const right=s.right.map((r,i)=>`<button class="mitem mright" data-idx="${i}">${r.t}<span class="dot"></span></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="match"><div class="col">${left}</div><div class="col">${right}</div></div>
    <div class="hint">Tap one on the left, then its match on the right.</div>`;
}
function wireMatch(s){
  L.payload={links:{}, activeLeft:null, colorOf:{}};
  const lefts=[...document.querySelectorAll(".mleft")], rights=[...document.querySelectorAll(".mright")]; let cn=0;
  function clearActive(){ lefts.forEach(l=>l.classList.remove("active")); }
  function paint(){
    lefts.forEach(l=>{ const i=+l.dataset.idx, on=L.payload.links[i]!=null; l.classList.toggle("paired",on); l.querySelector(".dot").style.background=on?L.payload.colorOf[i]:"transparent"; });
    rights.forEach(r=>{ const i=+r.dataset.idx, li=Object.keys(L.payload.links).find(k=>L.payload.links[k]===i), on=li!=null; r.classList.toggle("paired",on); r.querySelector(".dot").style.background=on?L.payload.colorOf[li]:"transparent"; });
    enableCheck(Object.keys(L.payload.links).length===s.left.length);
  }
  lefts.forEach(l=> l.onclick=()=>{ if(L.checked)return; clearActive(); l.classList.add("active"); L.payload.activeLeft=+l.dataset.idx; });
  rights.forEach(r=> r.onclick=()=>{ if(L.checked||L.payload.activeLeft==null)return; const li=L.payload.activeLeft, ri=+r.dataset.idx;
    for(const k of Object.keys(L.payload.links)) if(L.payload.links[k]===ri) delete L.payload.links[k];
    if(L.payload.colorOf[li]==null) L.payload.colorOf[li]=PAIR_COLORS[(cn++)%PAIR_COLORS.length];
    L.payload.links[li]=ri; L.payload.activeLeft=null; clearActive(); paint(); });
  setCheck(()=>{ let ok=true; lefts.forEach(l=>l.disabled=true); rights.forEach(r=>r.disabled=true);
    Object.entries(L.payload.links).forEach(([li,ri])=>{ const good=s.left[li].key===s.right[ri].key; lefts[li].classList.add(good?"correct":"wrong"); rights[ri].classList.add(good?"correct":"wrong"); if(!good)ok=false; });
    gradeQ(ok, ok?s.ok:s.bad);
  });
}

/* NUMERIC (type a number) */
function viewNumeric(s){
  return `<div class="step-kicker mono-kicker">${s.kicker||"Work it out"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    ${s.hint?`<div class="formula">${s.hint}</div>`:''}
    <div class="num-row">
      <input class="tinput num" id="nin" inputmode="decimal" autocomplete="off" placeholder="Answer">
      ${s.unit?`<span class="num-unit">${s.unit}</span>`:''}
    </div>
    <div class="hint">Type the number${s.unit?` (in ${s.unit})`:''}, then press Check.</div>`;
}
function numMatch(typed, s){
  const v=parseFloat(String(typed).replace(/[, ]/g,""));
  if(isNaN(v)) return false;
  const accept = s.accept || [s.answer];
  const tol = s.tolerance!=null ? s.tolerance : 0;
  return accept.some(a=> Math.abs(v-a) <= tol);
}
function wireNumeric(s){
  const inp=document.getElementById("nin"); inp.focus();
  inp.oninput=()=> enableCheck(inp.value.trim().length>0);
  setCheck(()=>{
    const ok=numMatch(inp.value, s);
    inp.disabled=true; inp.classList.add(ok?"ok":"bad");
    gradeQ(ok, ok? (s.ok||"That's right.") : `The answer is <span class="ans">${s.answer}${s.unit?(" "+s.unit):""}</span>.${s.ok?" "+s.ok:""}`);
  });
}

/* CATEGORISE (sort items into bins) */
function viewCategorise(s){
  const bins=s.bins.map((b,bi)=>`<div class="bin" data-bin="${bi}"><div class="bin-head">${b}</div><div class="bin-body" data-bin="${bi}"></div></div>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Sort them"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="cat-pool" id="pool"></div>
    <div class="cat-bins" style="grid-template-columns:${s.bins.length>=3?'1fr':'repeat('+s.bins.length+',minmax(0,1fr))'}">${bins}</div>
    <div class="hint">Tap an item, then tap a box to sort it.</div>`;
}
function wireCategorise(s){
  L.payload={assign:{}, active:null};   // assign[itemIdx]=binIdx
  const pool=document.getElementById("pool");
  const bodies=[...document.querySelectorAll(".bin-body")];
  const bins=[...document.querySelectorAll(".bin")];
  function chipHTML(i){ return `<button class="cat-chip" data-i="${i}">${s.items[i].t}</button>`; }
  function refresh(){
    pool.innerHTML = s.items.map((it,i)=> L.payload.assign[i]==null? chipHTML(i):"").join("");
    bodies.forEach((b,bi)=>{ b.innerHTML = s.items.map((it,i)=> L.payload.assign[i]===bi? chipHTML(i):"").join(""); });
    [...document.querySelectorAll(".cat-chip")].forEach(c=>{
      c.classList.toggle("active", +c.dataset.i===L.payload.active);
      c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.i;
        if(L.payload.assign[i]!=null){ delete L.payload.assign[i]; L.payload.active=i; }
        else { L.payload.active = (L.payload.active===i? null : i); }
        refresh(); };
    });
    bins.forEach(b=> b.onclick=(e)=>{ if(L.checked||L.payload.active==null)return;
      if(e.target.classList.contains("cat-chip"))return;
      L.payload.assign[L.payload.active]=+b.dataset.bin; L.payload.active=null; refresh(); });
    enableCheck(s.items.every((_,i)=>L.payload.assign[i]!=null));
  }
  refresh();
  setCheck(()=>{ let ok=true;
    s.items.forEach((it,i)=>{ const good=s.bins[L.payload.assign[i]]===it.bin; if(!good)ok=false;
      const chip=document.querySelector(`.cat-chip[data-i="${i}"]`); if(chip){ chip.classList.add(good?"correct":"wrong"); chip.disabled=true; } });
    bins.forEach(b=>b.style.pointerEvents="none");
    gradeQ(ok, ok?(s.ok||"All sorted correctly!"):(s.bad||"Some are in the wrong group — check the feedback."));
  });
}

/* ORDER (put in sequence) */
function viewOrder(s){
  const shuffled = (L.payload && L.payload.order) || shuffle(s.items.map((t,i)=>i));
  if(!L.payload) L.payload={ order:shuffled, placed:[] };
  const slots = s.items.map((_,i)=>`<div class="order-slot" data-slot="${i}"><span class="nidx">${i+1}</span><span class="slot-fill" data-slot="${i}"></span></div>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Put in order"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="order-ans" id="ans">${slots}</div>
    <div class="order-pool" id="opool"></div>
    <div class="hint">Tap the items in order. Tap a placed one to send it back.</div>`;
}
function wireOrder(s){
  const ansFills=[...document.querySelectorAll(".slot-fill")];
  const pool=document.getElementById("opool");
  function chip(itemIdx, where){ return `<button class="order-chip" data-i="${itemIdx}" data-where="${where}">${s.items[itemIdx]}</button>`; }
  function refresh(){
    pool.innerHTML = L.payload.order.filter(i=>!L.payload.placed.includes(i)).map(i=>chip(i,"pool")).join("");
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; f.innerHTML = i!=null? chip(i,"ans") : ""; });
    [...document.querySelectorAll(".order-chip")].forEach(c=> c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.i;
      if(c.dataset.where==="pool"){ if(L.payload.placed.length<s.items.length) L.payload.placed.push(i); }
      else { L.payload.placed = L.payload.placed.filter(x=>x!==i); }
      refresh(); });
    enableCheck(L.payload.placed.length===s.items.length);
  }
  refresh();
  setCheck(()=>{ let ok=true;
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; const good=(i===slot); if(!good)ok=false;
      const c=f.querySelector(".order-chip"); if(c){ c.classList.add(good?"correct":"wrong"); c.disabled=true; } });
    gradeQ(ok, ok?(s.ok||"Perfect order!"):`The correct order is: ${s.items.map((t,i)=>`<b>${i+1}.</b> ${t}`).join("  ")}`);
  });
}

function wireDiagram(s){

/* ---------- Footer / grading ---------- */
function footerShell(){ return `<div class="footer" id="footer"><div class="inner" id="finner"></div></div>`; }
function footerButton(label,cls,enabled,onClick){ const f=document.getElementById("footer"); f.className="footer"; document.getElementById("finner").innerHTML=`<button class="btn ${cls}" id="fbtn" ${enabled?"":"disabled"}>${label}</button>`; document.getElementById("fbtn").onclick=onClick; }
function footerRow(btns){ const f=document.getElementById("footer"); f.className="footer"; document.getElementById("finner").innerHTML=`<div class="row2">${btns.map((b,i)=>`<button class="btn ${b.cls}" data-i="${i}">${b.label}</button>`).join("")}</div>`; [...document.querySelectorAll("#finner .row2 .btn")].forEach((el,i)=> el.onclick=btns[i].on); }
let _checkFn=null;
function setCheck(fn){ _checkFn=fn; footerButton("Check","btn-primary",false,()=>_checkFn&&_checkFn()); }
function enableCheck(on){ const b=document.getElementById("fbtn"); if(b&&!L.checked) b.disabled=!on; }

function gradeQ(ok, whyHtml){
  L.checked=true; L.asked+=1;
  if(ok){ L.correct+=1; L.xp+=10; } else { L.hearts=Math.max(0,L.hearts-1); if(L.hearts===0) L.hearts=5; }
  const step=L.steps[L.i]; if(step && step.qid) recordReview(step.qid, ok);   // spaced-retrieval scheduling
  showFeedback(ok, ok?pickPraise():"Not quite", whyHtml, false);
  const h=document.querySelector(".hearts .hh"); if(h) h.textContent="❤️".repeat(L.hearts)+"🤍".repeat(5-L.hearts);
}
function showFeedback(ok, head, whyHtml, gentle){
  const f=document.getElementById("footer"); f.className="footer "+(ok?"fb-ok":"fb-bad");
  document.getElementById("finner").innerHTML=`
    <div class="fbhead"><span class="ic">${ok?"✓":(gentle?"🎤":"✕")}</span><h3 class="fr">${head}</h3></div>
    <div class="fbwhy">${whyHtml}</div>
    <button class="btn ${ok?"btn-go":"btn-primary"}" id="cont">Continue</button>`;
  document.getElementById("cont").onclick=()=>next();
}
const PRAISE=["Nice!","Well done!","Correct!","Exactly!","Spot on!","You've got it!","Brilliant!"];
function pickPraise(){ return PRAISE[L.correct % PRAISE.length]; }
function next(){ L.checked=false; L.payload=null; if(L.rec){try{L.rec.abort();}catch(e){} L.rec=null;} L.i+=1; renderStep(); }

/* ---------- Lesson complete ---------- */
function finishLesson(){
  const acc = L.asked? Math.round(L.correct/L.asked*100) : 100;
  const first = !State.lessonDone(L.id);
  const perfect = (L.hearts===5 && acc===100 && L.asked>0);
  const bonus = perfect ? 5 : 0;
  const xp = L.xp + (first?5:0) + bonus;
  State.completeLesson(L.id, xp, first?L.newWords:0);
  if(perfect) State.s.flags.perfect=true;
  if(L.isReview) State.s.flags.reviewed=true;
  if(L.isWeak) State.s.flags.weakFixed=true;
  State.save();
  const badges=checkBadges();
  go("done", { acc, xp, streak:State.s.streak, review:!!L.isReview, weak:!!L.isWeak, code:L.code, li:L.li, badges });
}
function renderDone(){
  const {acc,xp,streak,review,weak,badges}=view;
  const emoji = weak?"💪":review?"🔄":acc>=80?"🏆":acc>=50?"🎉":"💪";
  const title = weak?"Weak spots fixed!":review?"Review done!":"Lesson complete!";
  const sub = weak?"You went back over the tricky ones — that's exactly how it sticks."
    :review?"You kept earlier topics fresh — that's how memory sticks."
    :acc>=80?"Brilliant — that knowledge is sticking.":acc>=50?"Good work — another go will lock it in.":"Nice effort — practice makes it stick.";
  const badgeHTML=(badges&&badges.length)?`<div class="badge-won">${badges.map(b=>`<div class="bw"><span class="bwi">${b.icon}</span><div><b>New badge!</b><span>${b.name}</span></div></div>`).join("")}</div>`:"";
  app.innerHTML=`<div class="complete fade">
    <div class="trophy">${emoji}</div>
    <h1 class="fr">${title}</h1>
    <p class="sub">${sub}</p>
    <div class="dstats">
      <div class="dstat xp"><div class="v">+${xp}</div><div class="l">XP</div></div>
      <div class="dstat acc"><div class="v">${acc}%</div><div class="l">Accuracy</div></div>
      <div class="dstat str"><div class="v">🔥 ${streak}</div><div class="l">Day streak</div></div>
    </div>
    ${badgeHTML}
    <div class="actions">
      <button class="btn btn-go" id="cont">Continue</button>
      ${(review||weak)?"":`<button class="btn btn-ghost" id="again" style="text-transform:none">Practise this again</button>`}
    </div>
    <div class="colophon">Feynman · learn it, joined up</div>
  </div>`;
  document.getElementById("cont").onclick=()=>go("home",{tab:"path"});
  const again=document.getElementById("again"); if(again) again.onclick=()=>startLesson(view.code, view.li);
}

/* ---------- Keyboard ---------- */
document.addEventListener("keydown",(e)=>{
  if(view.name!=="lesson"||!L||L.i>=L.steps.length) return;
  const s=L.steps[L.i];
  if(e.key==="Enter"){ const c=document.getElementById("cont"); if(c){c.click();e.preventDefault();return;} const fb=document.getElementById("fbtn"); if(fb&&!fb.disabled){fb.click();e.preventDefault();return;} }
  if(!L.checked && /^[1-9]$/.test(e.key)){ const n=+e.key-1;
    if(s.type==="mcq"){ const b=document.querySelector(`.opt[data-idx="${n}"]`); if(b)b.click(); }
    if(s.type==="multi"){ const b=document.querySelector(`.chip[data-idx="${n}"]`); if(b)b.click(); } }
});

/* ---------- Delegated dashboard reset (re-bound each render) ---------- */
document.addEventListener("click",(e)=>{
  if(e.target && e.target.id==="reset"){ if(confirm("Reset all your progress, XP and streak?")){ State.reset(); render(); } }
  if(e.target && (e.target.id==="dash-review")){ startReview(); }
  const wb=e.target&&e.target.closest&&e.target.closest("#weak,#dash-weak"); if(wb){ startWeak(); }
});

render();

/* ---------- Cross-device sync (optional; only when opened via a pupil link ?t=…) ----------
   Anonymous use is unchanged (localStorage only). With a token we hydrate from the
   server and merge (never clobber: keep the furthest progress per field), then push
   saves back, debounced. Offline-safe — a failed push just retries on the next save. */
var SYNC_TOKEN = null, SYNC_TIMER = null;
function mergeState(local, remote){
  if(!remote || typeof remote!=="object") return local;
  const out = Object.assign({}, remote, local);
  out.xp = Math.max(local.xp||0, remote.xp||0);
  out.words = Math.max(local.words||0, remote.words||0);
  const ll=local.lastDay||"", rl=remote.lastDay||"";
  if(rl>ll){ out.lastDay=rl; out.streak=remote.streak||0; } else { out.lastDay=ll||rl; out.streak=local.streak||0; }
  out.lessons = Object.assign({}, remote.lessons||{});
  const lz=local.lessons||{}; for(const k in lz){ const a=lz[k], b=out.lessons[k]; if(!b || (a&&(a.xp||0)>=(b.xp||0))) out.lessons[k]=a; }
  out.dailyXP = Object.assign({}, remote.dailyXP||{});
  const ld=local.dailyXP||{}; for(const d in ld){ out.dailyXP[d]=Math.max(out.dailyXP[d]||0, ld[d]||0); }
  out.review = Object.assign({}, remote.review||{});
  const lr=local.review||{}; for(const q in lr){ const a=lr[q], b=out.review[q];
    if(!b){ out.review[q]=a; } else { const al=a.last||"", bl=b.last||""; out.review[q]= al>bl? a : (bl>al? b : ((a.box||0)>=(b.box||0)? a : b)); } }
  out.badges = Array.from(new Set([...(remote.badges||[]), ...(local.badges||[])]));
  out.flags = Object.assign({}, remote.flags||{}, local.flags||{});
  out.a11y = local.a11y || remote.a11y;                                  // device prefs: keep local
  out.sound = (typeof local.sound==="boolean")? local.sound : remote.sound;
  out.seen = local.seen || remote.seen;
  return out;
}
function syncPull(){
  fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN))
    .then(r=> r.ok? r.json() : null)
    .then(d=>{ if(d && d.state){ State.s = mergeState(State.s, d.state); State.save(); if(view.name==="home"||view.name==="done") render(); } })
    .catch(()=>{});
}
function syncPush(){
  if(!SYNC_TOKEN) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(()=>{
    fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN), { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ state: State.s }) }).catch(()=>{});
  }, 1500);
}
function syncInit(){
  try{ const t=new URLSearchParams(location.search).get("t"); if(t && /^[A-Za-z0-9_-]{16,64}$/.test(t)){ SYNC_TOKEN=t; syncPull(); } }catch(e){}
}
syncInit();

// PWA: register the service worker for offline use + install.
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
