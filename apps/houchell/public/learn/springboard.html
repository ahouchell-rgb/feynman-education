ermal decomposition","bin":"Endothermic"},{"t":"An instant icepack activating","bin":"Endothermic"}],"ok":"Energy out (temperature rises) is exothermic; energy in (temperature falls) is endothermic.","bad":"Check which way the energy moves: out warms the surroundings, in cools them."},{"type":"mcq","q":"The thermometer reading drops from 21 °C to 16 °C during a reaction. What type is it?","options":[{"t":"Endothermic, because energy was taken in from the surroundings","correct":true},{"t":"Exothermic, because energy was transferred out to the surroundings","why":"A falling temperature shows energy was taken in, not given out."},{"t":"Neither, because the temperature changed at all","why":"A temperature change is exactly how we classify these reactions."}],"ok":"Temperature fell, so the surroundings lost energy to the reaction: endothermic."},{"type":"numeric","kicker":"Work it out","q":"The temperature before a reaction is 21 °C and after is 18 °C. What is the temperature change?","hint":"temperature change = temperature after − temperature before","answer":-3,"unit":"°C","ok":"18 − 21 = −3 °C. The minus sign shows the temperature fell."},{"type":"mcq","q":"A reaction's temperature change is −3 °C. What does this tell you?","options":[{"t":"It is endothermic, because the temperature fell","correct":true},{"t":"It is exothermic, because energy went out","why":"A negative change means the temperature fell, so energy was taken in."},{"t":"It is combustion, because all reactions with a minus sign burn","why":"A falling temperature points to endothermic, not combustion."}],"ok":"A negative temperature change means the surroundings cooled: endothermic."},{"type":"multi","q":"Tap all the changes that are exothermic.","items":[{"t":"Combustion","correct":true},{"t":"Neutralisation","correct":true},{"t":"Thermal decomposition"},{"t":"A hand warmer activating","correct":true},{"t":"An instant icepack activating"}],"ok":"Combustion, neutralisation and hand warmers all transfer energy out to the surroundings.","bad":"Thermal decomposition and the icepack take energy in, so they are endothermic."},{"type":"tf","q":"The surroundings of a reaction include the thermometer.","answer":true,"why":"The thermometer is part of the surroundings, which is why it shows the temperature change."},{"type":"mcq","q":"Why does an instant icepack feel cold when it is activated?","options":[{"t":"It takes energy in from its surroundings, including your hand, so they cool","correct":true},{"t":"It makes coldness and sends it into your hand","why":"Coldness is not made; the pack takes energy in, so things around it cool."},{"t":"It transfers energy out, making your hand warmer","why":"That would make it warm; an icepack is endothermic and cools things."}],"ok":"Endothermic: energy is taken in from the surroundings, so they get colder."},{"type":"mcq","q":"A reaction must be heated continuously to keep going. What does this suggest?","options":[{"t":"It is endothermic, because it keeps taking energy in","correct":true},{"t":"It is exothermic, because heating means energy goes out","why":"Needing constant heating shows it is taking energy in, not giving it out."},{"t":"It cannot be classified without a colour change","why":"The need for continuous heating already tells us it is endothermic."}],"ok":"If it needs energy supplied to continue, it is taking energy in: endothermic."},{"type":"numeric","kicker":"Work it out","q":"Four groups measured temperature changes of 45 °C, 7 °C, 8 °C and 8 °C. What is the mean?","hint":"Add all four values, then divide by how many there are.","answer":17,"unit":"°C","ok":"45 + 7 + 8 + 8 = 68, and 68 ÷ 4 = 17 °C."},{"type":"numeric","kicker":"Work it out","q":"Repeat readings were 18 °C, 11 °C, 30 °C and 38 °C. What is the range?","hint":"range = largest value − smallest value","answer":27,"unit":"°C","ok":"38 − 11 = 27 °C, the spread of the readings."},{"type":"order","q":"Put these steps in order to find out if a reaction is exothermic or endothermic.","items":["Measure the temperature before the reaction","Mix the reactants and stir gently","Record the highest or lowest temperature reached","Work out the temperature change","Decide if energy went out (exothermic) or in (endothermic)"],"ok":"Measure before, react, record after, find the change, then classify it."},{"type":"mcq","q":"All neutralisation reactions do what to the temperature of their surroundings?","options":[{"t":"Increase it, because they are exothermic","correct":true},{"t":"Decrease it, because they are endothermic","why":"Neutralisation transfers energy out, so the surroundings warm up."},{"t":"Leave it unchanged, because no energy moves","why":"Energy is transferred out, so the temperature rises."}],"ok":"Neutralisation is exothermic, so the surroundings heat up."},{"type":"tf","q":"Melting is an energy change even though it is not a chemical reaction.","answer":true,"why":"Changes of state, like melting, transfer energy too, so they are energy changes."},{"type":"mcq","q":"Give one everyday use of an exothermic change.","options":[{"t":"A hand warmer or self-heating can","correct":true},{"t":"An instant icepack","why":"An icepack is endothermic, taking energy in to feel cold."},{"t":"A fridge cooling food","why":"That is not the exothermic example taught here; hand warmers are."}],"ok":"Hand warmers and self-heating cans release energy to warm their surroundings."}]},

"PHO":{"code":"PHO","title":"Photosynthesis","discipline":"biology","blurb":"How plants use light energy to make their own food from carbon dioxide and water.",
"vocab":[{"term":"photosynthesis","definition":"How plants make glucose from carbon dioxide and water using light energy.","say":"foe-toe-SIN-thuh-sis"},{"term":"chlorophyll","definition":"Green pigment in chloroplasts that absorbs light for photosynthesis.","say":"klor-oh-fil"},{"term":"chloroplast","definition":"Green sub-cellular structure where photosynthesis happens.","say":"klor-oh-plast"},{"term":"glucose","definition":"Sugar made in photosynthesis; the food a plant builds.","say":"GLOO-kohss"},{"term":"reactant","definition":"A substance that reacts together at the start of a reaction.","say":"ree-AK-tant"},{"term":"product","definition":"A substance that is made in a chemical reaction.","say":"PROD-ukt"},{"term":"stomata","definition":"Tiny pores in the leaf that let gases enter and leave.","say":"STOH-mah-tah"},{"term":"guard cell","definition":"Curved cell that opens or closes a stoma.","say":"gard sell"},{"term":"palisade mesophyll","definition":"Leaf layer of cells with many chloroplasts; main site of photosynthesis.","say":"pal-ih-SAYD MEZ-oh-fil"},{"term":"variegated leaf","definition":"A leaf with green parts and parts of another colour.","say":"VAIR-ee-uh-gay-tid leef"}],
"facts":["The word equation for photosynthesis is: carbon dioxide + water → glucose + oxygen.","Photosynthesis needs light energy, which is absorbed by chlorophyll.","Photosynthesis happens in chloroplasts, which are green because they contain chlorophyll.","The reactants are carbon dioxide and water; the products are glucose and oxygen.","Oxygen is a waste product of photosynthesis and is given out by the plant.","Plants use glucose in respiration, to build new cell walls, and to store as starch.","We test a leaf for starch because this shows whether photosynthesis has happened.","Iodine solution turns from orange-brown to black if starch is present.","Leaves are adapted for photosynthesis: broad surface area, thin, many chloroplasts, stomata for gases and veins."],
"misconceptions":[{"wrong":"Plants get their food and mass mainly by eating soil through their roots.","right":"Plants make their own glucose by photosynthesis, gaining mass mostly from carbon dioxide and water."},{"wrong":"Leaves are green because of the chloroplasts; chlorophyll has nothing to do with it.","right":"Chloroplasts are green because they contain chlorophyll, the pigment that absorbs light."},{"wrong":"Oxygen is the useful food the plant makes in photosynthesis.","right":"Glucose is the food; oxygen is a waste product that is given out by the plant."},{"wrong":"We test leaves for glucose to check if photosynthesis happened.","right":"We test for starch with iodine, because glucose is quickly converted to starch and is easier to detect."}],
"questions":[{"type":"mcq","q":"Which two substances are the reactants of photosynthesis?","options":[{"t":"Carbon dioxide and water","correct":true},{"t":"Glucose and oxygen","why":"These are the products, made in the reaction, not the reactants that go in."},{"t":"Oxygen and water","why":"Oxygen is a product, not a reactant; the reactants are carbon dioxide and water."}],"ok":"Carbon dioxide and water react together using light energy."},{"type":"mcq","q":"What colour is chlorophyll?","options":[{"t":"Green","correct":true},{"t":"Orange-brown","why":"That is the colour of iodine solution, not chlorophyll."},{"t":"Black","why":"Black is what iodine turns when starch is present, not the colour of chlorophyll."}],"ok":"Chlorophyll is a green pigment, which is why leaves look green."},{"type":"tf","q":"Photosynthesis happens inside chloroplasts.","answer":true,"why":"Chloroplasts contain chlorophyll, which absorbs the light needed for photosynthesis."},{"type":"mcq","q":"Which sub-cellular structure absorbs light for photosynthesis?","options":[{"t":"Chlorophyll in the chloroplasts","correct":true},{"t":"The cell wall","why":"The cell wall gives support; it does not absorb light for photosynthesis."},{"t":"The mitochondria","why":"Mitochondria are where respiration releases energy, not where light is absorbed."}],"ok":"Chlorophyll, the green pigment inside chloroplasts, absorbs the light."},{"type":"tf","q":"Oxygen made in photosynthesis is the plant's food.","answer":false,"why":"Glucose is the food the plant makes; oxygen is a waste product given out by the plant."},{"type":"categorise","q":"Sort each substance into reactant or product of photosynthesis.","bins":["Reactant","Product"],"items":[{"t":"Carbon dioxide","bin":"Reactant"},{"t":"Water","bin":"Reactant"},{"t":"Glucose","bin":"Product"},{"t":"Oxygen","bin":"Product"}],"ok":"Carbon dioxide and water go in; glucose and oxygen are made.","bad":"Reactants react together at the start; products are made by the reaction."},{"type":"order","q":"Put the word equation for photosynthesis in the correct order.","items":["carbon dioxide","+ water","→ glucose","+ oxygen"],"ok":"Carbon dioxide + water → glucose + oxygen, using light energy absorbed by chlorophyll."},{"type":"mcq","q":"Why does a plant make glucose?","options":[{"t":"To use as food for respiration, growth and storage","correct":true},{"t":"To get rid of it as a waste gas","why":"Glucose is useful food, not waste; oxygen is the waste product released."},{"t":"To absorb light from the Sun","why":"It is chlorophyll that absorbs light; glucose is the food that is then made."}],"ok":"Glucose is the food the plant makes and then uses in several ways."},{"type":"multi","q":"Tap all the ways a plant uses the glucose it makes.","items":[{"t":"In respiration to release energy","correct":true},{"t":"To build new cell walls","correct":true},{"t":"Stored as starch","correct":true},{"t":"Given out as a waste gas"}],"ok":"Glucose is used in respiration, to build cell walls and stored as starch.","bad":"One of these is what happens to oxygen, not to glucose."},{"type":"mcq","q":"Which chemical is used to test a leaf for starch?","options":[{"t":"Iodine solution","correct":true},{"t":"Ethanol","why":"Ethanol is used to remove chlorophyll from the leaf, not to test for starch."},{"t":"Limewater","why":"Limewater tests for carbon dioxide, not for starch."}],"ok":"Iodine solution is added to test for the presence of starch."},{"type":"tf","q":"If starch is present, iodine solution turns from orange-brown to black.","answer":true,"why":"A black colour shows starch is present; if no starch is there, the iodine stays orange-brown."},{"type":"order","q":"Put the steps of the starch test in the correct order.","items":["Place the leaf in boiling water to stop reactions","Heat the leaf in ethanol to remove the chlorophyll","Dip the leaf back in hot water to soften it","Spread the leaf on a tile and add iodine solution"],"ok":"Boil to stop reactions, ethanol to remove chlorophyll, soften, then add iodine."},{"type":"mcq","q":"In the starch test, why is the leaf heated in ethanol?","options":[{"t":"To remove the chlorophyll so a colour change can be seen","correct":true},{"t":"To add starch to the leaf","why":"The test detects starch already in the leaf; ethanol does not add any."},{"t":"To kill the plant's stomata","why":"Ethanol removes the green chlorophyll; it is not about the stomata."}],"ok":"Removing the green chlorophyll lets you see the iodine colour change clearly."},{"type":"multi","q":"Tap all the features that adapt a leaf for efficient photosynthesis.","items":[{"t":"Broad surface area to absorb lots of light","correct":true},{"t":"Thin, giving a short diffusion pathway for gases","correct":true},{"t":"Many chloroplasts in the cells","correct":true},{"t":"A thick, dark layer to block out light"}],"ok":"Broad, thin, full of chloroplasts: all help the leaf photosynthesise.","bad":"Leaves need to let light in, not block it out."},{"type":"mcq","q":"What is the job of the stomata in a leaf?","options":[{"t":"To let gases enter and leave the leaf","correct":true},{"t":"To absorb water from the soil","why":"Water is absorbed by the roots, not by the stomata."},{"t":"To make the leaf waterproof","why":"That is the job of the waxy cuticle, not the stomata."}],"ok":"Carbon dioxide diffuses in and oxygen diffuses out through the stomata."},{"type":"categorise","q":"Match each leaf part to the job it does.","bins":["Lets gases in and out","Absorbs most light"],"items":[{"t":"Stomata","bin":"Lets gases in and out"},{"t":"Guard cells","bin":"Lets gases in and out"},{"t":"Palisade mesophyll","bin":"Absorbs most light"},{"t":"Upper epidermis (transparent)","bin":"Absorbs most light"}],"ok":"Stomata and guard cells control gases; the palisade layer and clear top layer handle light.","bad":"Think about which parts deal with gases and which deal with letting light reach the chloroplasts."},{"type":"mcq","q":"By which process do gases move through the leaf?","options":[{"t":"Diffusion","correct":true},{"t":"Respiration","why":"Respiration releases energy from glucose; it is not how gases move through the leaf."},{"t":"Photosynthesis","why":"Photosynthesis makes glucose; the gases themselves move by diffusion."}],"ok":"Gases diffuse through the air spaces of the leaf and through the stomata."},{"type":"numeric","kicker":"Work it out","q":"A leaf is tested for starch. The black region was 9 cm² and the orange-brown region was 3 cm². What was the total area tested?","hint":"Add the black (starch) area to the orange-brown (no starch) area.","answer":12,"unit":"cm²","ok":"9 + 3 = 12 cm²; the black 9 cm² is where photosynthesis happened."},{"type":"mcq","q":"A variegated leaf is tested for starch. The white (non-green) parts stay orange-brown. Why?","options":[{"t":"They have no chlorophyll, so no photosynthesis and no starch","correct":true},{"t":"They had too much light, which destroyed the starch","why":"All parts of the leaf had the same light; the difference is the chlorophyll."},{"t":"The iodine could not reach the white parts","why":"Iodine reaches the whole leaf; the white parts simply had no starch to detect."}],"ok":"No chlorophyll means no photosynthesis there, so no glucose, no starch, and no colour change."}]},

"RES":{"code":"RES","title":"Respiration","discipline":"biology","blurb":"Respiration is the chemical reaction that releases energy from glucose inside every living cell.",
"vocab":[{"term":"respiration","definition":"chemical reaction that releases energy from glucose in cells","say":"res-pir-AY-shun"},{"term":"glucose","definition":"sugar made from digested carbohydrates; the fuel for respiration","say":"GLOO-kose"},{"term":"aerobic respiration","definition":"respiration that uses oxygen and releases the most energy","say":"air-OH-bik"},{"term":"anaerobic respiration","definition":"respiration without oxygen that releases less energy","say":"an-air-OH-bik"},{"term":"mitochondria","definition":"sub-cellular structures where aerobic respiration takes place","say":"my-toh-KON-dree-uh"},{"term":"lactic acid","definition":"substance made when animal cells respire without oxygen","say":"LAK-tik AS-id"},{"term":"fermentation","definition":"anaerobic respiration in yeast making ethanol and carbon dioxide","say":"fer-men-TAY-shun"},{"term":"ethanol","definition":"the alcohol made by yeast during fermentation","say":"ETH-an-ol"},{"term":"reactant","definition":"a substance used up in a reaction; written before the arrow","say":"ree-AK-tant"},{"term":"product","definition":"a substance made in a reaction; written after the arrow","say":"PROD-ukt"}],
"facts":["Respiration releases energy from glucose; it is a chemical reaction, not breathing.","All living things respire to release the energy they need to live.","Aerobic respiration happens in the mitochondria of animal, plant and fungal cells.","The word equation for aerobic respiration is glucose + oxygen → carbon dioxide + water.","Energy is not written in the equation because energy is not a chemical substance.","Aerobic respiration releases the most energy, so it is the normal type used.","In humans, anaerobic respiration breaks glucose down into lactic acid, releasing less energy.","In yeast, anaerobic respiration is called fermentation: glucose → ethanol + carbon dioxide.","Glucose comes from digesting carbohydrates; oxygen is breathed in through the lungs."],
"misconceptions":[{"wrong":"Respiration is just another word for breathing.","right":"Respiration is a chemical reaction in cells that releases energy from glucose; breathing only brings oxygen in."},{"wrong":"Energy should be written into the respiration word equation.","right":"Energy is not a chemical substance, so it is left out; it is released as the products form."},{"wrong":"Anaerobic respiration releases more energy than aerobic.","right":"Aerobic respiration releases the most energy; anaerobic releases less."},{"wrong":"All organisms make lactic acid when they respire without oxygen.","right":"Animals make lactic acid, but yeast makes ethanol and carbon dioxide instead."}],
"questions":[{"type":"mcq","q":"What does respiration actually do?","options":[{"t":"Releases energy from glucose","correct":true},{"t":"Moves air in and out of the lungs","why":"That is breathing; respiration is a chemical reaction in cells."},{"t":"Builds glucose using sunlight","why":"That is photosynthesis, not respiration."}],"ok":"Respiration is the reaction that releases the energy stored in glucose."},{"type":"tf","q":"Respiration and breathing are the same thing.","answer":false,"why":"Respiration is a chemical reaction in cells that releases energy; breathing just moves air in and out."},{"type":"mcq","q":"Where does aerobic respiration take place in a cell?","options":[{"t":"The mitochondria","correct":true},{"t":"The nucleus","why":"The nucleus stores DNA; it is not where respiration happens."},{"t":"The cell membrane","why":"The membrane controls what enters and leaves; the reaction occurs in the mitochondria."}],"ok":"Mitochondria are the sub-cellular structures that specialise in aerobic respiration."},{"type":"order","q":"Put the aerobic respiration word equation in the correct order.","items":["glucose","+ oxygen","→","carbon dioxide","+ water"],"ok":"glucose + oxygen → carbon dioxide + water."},{"type":"multi","q":"Tap all the reactants of aerobic respiration.","items":[{"t":"Glucose","correct":true},{"t":"Oxygen","correct":true},{"t":"Carbon dioxide"},{"t":"Water"}],"ok":"Glucose and oxygen are the reactants – they go before the arrow.","bad":"Carbon dioxide and water are products, not reactants."},{"type":"multi","q":"Tap all the products of aerobic respiration.","items":[{"t":"Carbon dioxide","correct":true},{"t":"Water","correct":true},{"t":"Glucose"},{"t":"Oxygen"}],"ok":"Carbon dioxide and water are the products – they come after the arrow.","bad":"Glucose and oxygen are reactants, not products."},{"type":"tf","q":"Energy should be written in the word equation for respiration.","answer":false,"why":"Energy is not a chemical substance, so it is left out of the equation."},{"type":"mcq","q":"What does the word 'aerobic' mean?","options":[{"t":"Requires oxygen","correct":true},{"t":"Not using oxygen","why":"That is what 'anaerobic' means."},{"t":"Releases water","why":"Aerobic describes the use of oxygen, not a product."}],"ok":"Aerobic means 'requires oxygen'."},{"type":"mcq","q":"Why does the body use aerobic respiration most of the time?","options":[{"t":"It releases the most energy","correct":true},{"t":"It does not need glucose","why":"All respiration needs glucose as a reactant."},{"t":"It works without oxygen","why":"Aerobic respiration needs oxygen; the oxygen-free type is anaerobic."}],"ok":"Aerobic respiration is normal because it releases the most energy."},{"type":"tf","q":"Anaerobic respiration releases more energy than aerobic respiration.","answer":false,"why":"Aerobic respiration releases the most energy; anaerobic releases less."},{"type":"mcq","q":"When human muscles respire without enough oxygen, what do they make?","options":[{"t":"Lactic acid","correct":true},{"t":"Ethanol","why":"Ethanol is made by yeast, not by animal muscles."},{"t":"Carbon dioxide and water","why":"Those are the products of aerobic respiration."}],"ok":"Animal cells make lactic acid during anaerobic respiration, which builds up and hurts."},{"type":"mcq","q":"What is anaerobic respiration in yeast called?","options":[{"t":"Fermentation","correct":true},{"t":"Digestion","why":"Digestion breaks down food into glucose; it is not respiration."},{"t":"Photosynthesis","why":"Photosynthesis makes glucose using light; it is not respiration."}],"ok":"Anaerobic respiration in yeast is called fermentation."},{"type":"order","q":"Put the fermentation (anaerobic respiration in yeast) word equation in order.","items":["glucose","→","ethanol","+ carbon dioxide"],"ok":"glucose → ethanol + carbon dioxide."},{"type":"categorise","q":"Sort each statement into the correct type of respiration.","bins":["Aerobic","Anaerobic"],"items":[{"t":"Uses oxygen","bin":"Aerobic"},{"t":"Releases the most energy","bin":"Aerobic"},{"t":"Makes carbon dioxide and water","bin":"Aerobic"},{"t":"Does not use oxygen","bin":"Anaerobic"},{"t":"Makes lactic acid in animals","bin":"Anaerobic"},{"t":"Includes fermentation in yeast","bin":"Anaerobic"}],"ok":"Aerobic uses oxygen and releases the most energy; anaerobic does not use oxygen and releases less.","bad":"Check whether oxygen is used and how much energy is released."},{"type":"categorise","q":"Sort each substance as a reactant or a product of aerobic respiration.","bins":["Reactant","Product"],"items":[{"t":"Glucose","bin":"Reactant"},{"t":"Oxygen","bin":"Reactant"},{"t":"Carbon dioxide","bin":"Product"},{"t":"Water","bin":"Product"}],"ok":"Reactants (glucose, oxygen) go before the arrow; products (carbon dioxide, water) come after.","bad":"Reactants are used up; products are made in the reaction."},{"type":"multi","q":"Tap all the products of fermentation in yeast.","items":[{"t":"Ethanol","correct":true},{"t":"Carbon dioxide","correct":true},{"t":"Lactic acid"},{"t":"Oxygen"}],"ok":"Yeast makes ethanol and carbon dioxide when it ferments.","bad":"Lactic acid is made by animals, and oxygen is not a product of anaerobic respiration."},{"type":"mcq","q":"Why are the bubbles of carbon dioxide from yeast useful in baking?","options":[{"t":"They make bread rise, becoming soft and spongy","correct":true},{"t":"They turn the dough into alcohol","why":"The ethanol is the alcohol; the carbon dioxide makes the bubbles."},{"t":"They add oxygen so the bread can respire","why":"The bubbles are carbon dioxide, a product of fermentation, not oxygen."}],"ok":"Carbon dioxide bubbles pump up the dough, making bread rise."},{"type":"tf","q":"Yeast cells can respire anaerobically for a long time because they do not make lactic acid.","answer":true,"why":"Unlike animals, yeast makes ethanol and carbon dioxide, so no lactic acid builds up."},{"type":"mcq","q":"Where does the glucose used in respiration come from?","options":[{"t":"Digesting carbohydrates in food","correct":true},{"t":"Breathing it in from the air","why":"We breathe in oxygen, not glucose."},{"t":"The kidneys making it from water","why":"The kidneys remove waste; glucose comes from digested food."}],"ok":"Glucose is made when carbohydrates are digested and is absorbed into the blood."}]},

"ECO":{"code":"ECO","title":"Ecosystems","discipline":"biology","blurb":"How energy flows through food chains and webs, how organisms depend on one another, and why insects matter for our food.",
"vocab":[{"term":"producer","definition":"An organism that makes its own food, like a plant.","say":"pro-DEW-ser"},{"term":"consumer","definition":"An organism that gains energy by eating other organisms.","say":"con-SEW-mer"},{"term":"food chain","definition":"Organisms linked by arrows showing energy and nutrient flow.","say":"food chayn"},{"term":"food web","definition":"Many connected food chains joined together.","say":"food web"},{"term":"interdependence","definition":"The idea that all organisms are affected by changes in feeding relationships.","say":"in-ter-dee-PEN-dence"},{"term":"predator","definition":"An animal that hunts other animals for food.","say":"PRED-a-tor"},{"term":"prey","definition":"An animal that is hunted and eaten by a predator.","say":"pray"},{"term":"bioaccumulation","definition":"Build-up of a chemical to higher levels along a food chain.","say":"buy-oh-a-cue-mew-LAY-shun"},{"term":"pollination","definition":"When insects move pollen from one flower to another.","say":"poll-in-AY-shun"},{"term":"food security","definition":"Having enough affordable, nutritious food for everyone.","say":"food se-CURE-it-ee"}],
"facts":["Producers, such as plants, make their own food by photosynthesis and get their energy from the Sun.","Consumers are animals that gain nutrients and energy by eating other organisms.","The arrow in a food chain shows the direction in which energy and nutrients flow.","Because of the variety of foods organisms eat, they appear in many food chains, which join to make a food web.","If even one species in a food web changes in number, there are knock-on effects throughout the web.","Chemicals that are not broken down build up to higher concentrations further up a food chain, so top consumers can be most harmed.","As prey numbers rise, predator numbers rise after a lag; as predators eat more prey, prey numbers fall, and the cycle continues.","Bees are by far the most important pollinating insects, and more pollination means more fruits, seeds and food.","Scientists estimate populations by sampling with a quadrat, taking a mean, then scaling up to the whole area."],
"misconceptions":[{"wrong":"The arrow in a food chain points to whatever an animal eats.","right":"The arrow points the other way: it shows energy flowing from the food to the eater."},{"wrong":"Any green animal must be a producer.","right":"Only organisms that make their own food are producers; a green frog is still a consumer."},{"wrong":"All prey animals must be herbivores.","right":"An animal can be prey to one species while being a predator of another."},{"wrong":"A quadrat sample gives the exact population of a field.","right":"Sampling only gives an estimate, because not every individual is counted."}],
"questions":[{"type":"mcq","q":"What is a producer?","options":[{"t":"An organism that makes its own food, such as a plant","correct":true},{"t":"An animal that eats other animals","why":"That is a consumer, not a producer."},{"t":"An animal that is hunted for food","why":"That describes prey, not a producer."}],"ok":"Producers make their own food by photosynthesis."},{"type":"mcq","q":"What does the arrow in a food chain show?","options":[{"t":"The direction in which energy and nutrients flow","correct":true},{"t":"Which animal is the strongest","why":"The arrow has nothing to do with strength."},{"t":"The direction the animal walks","why":"It shows energy flow, not movement."}],"ok":"The arrow shows energy and nutrients flowing from the food to the eater."},{"type":"order","q":"Put this food chain in order (energy flows along the arrows).","items":["Carrot","Rabbit","Fox"],"ok":"Energy flows carrot to rabbit to fox: the producer comes first."},{"type":"order","q":"Put this river food chain in order (energy flows along the arrows).","items":["Phytoplankton","Insects","Fish","Bird of prey"],"ok":"Phytoplankton are the producer, and energy flows up to the bird of prey."},{"type":"categorise","q":"Sort each organism as a producer or a consumer.","bins":["Producer","Consumer"],"items":[{"t":"Grass","bin":"Producer"},{"t":"Grasshopper","bin":"Consumer"},{"t":"Oak tree","bin":"Producer"},{"t":"Bird","bin":"Consumer"},{"t":"Phytoplankton","bin":"Producer"},{"t":"Fox","bin":"Consumer"}],"ok":"Producers make their own food; consumers eat other organisms.","bad":"Remember: only organisms that make their own food are producers."},{"type":"categorise","q":"In a hunt, sort each animal as the predator or the prey.","bins":["Predator","Prey"],"items":[{"t":"Lion","bin":"Predator"},{"t":"Antelope","bin":"Prey"},{"t":"Owl","bin":"Predator"},{"t":"Vole","bin":"Prey"}],"ok":"A predator hunts; prey is hunted and eaten.","bad":"A predator hunts other animals, while prey is the animal that gets eaten."},{"type":"tf","q":"A frog that is green must be a producer.","answer":false,"why":"A frog eats other organisms, so it is a consumer; being green does not make it a producer."},{"type":"tf","q":"If an animal is a herbivore, it must be prey and can never be a predator.","answer":false,"why":"An animal can be prey to one species while still being a predator of another."},{"type":"mcq","q":"Why do plants count as producers?","options":[{"t":"They make their own food by photosynthesis using energy from the Sun","correct":true},{"t":"They eat insects that land on them","why":"Producers do not need to eat other organisms; they make their own food."},{"t":"They are always at the top of the food chain","why":"Producers are at the start of a food chain, not the top."}],"ok":"Plants make glucose by photosynthesis, so they are producers."},{"type":"multi","q":"Tap all the statements about food webs that are correct.","items":[{"t":"A food web is many connected food chains joined together","correct":true},{"t":"The arrows still show the direction of energy and nutrient flow","correct":true},{"t":"Organisms appear in only one food chain each"},{"t":"Changing one species can affect many others in the web","correct":true}],"ok":"Food webs join chains, keep the energy-flow arrows, and link species together.","bad":"Most are true, but organisms appear in many food chains, not just one."},{"type":"mcq","q":"In a food chain grass → grasshopper → bird, what happens to the birds if most of the grass is dug up?","options":[{"t":"The grasshoppers starve, so the birds have less food and also starve","correct":true},{"t":"The birds are not affected because they do not eat grass","why":"Through interdependence, a change lower down still affects the birds."},{"t":"The birds make their own food instead","why":"Birds are consumers and cannot make their own food."}],"ok":"This shows interdependence: a change lower in the chain affects organisms higher up."},{"type":"mcq","q":"What is interdependence?","options":[{"t":"The idea that all organisms are affected by changes in feeding relationships","correct":true},{"t":"The idea that organisms live completely separately","why":"Interdependence is the opposite: organisms depend on one another."},{"t":"The idea that only predators matter in a habitat","why":"Interdependence involves all organisms, not just predators."}],"ok":"Interdependence means changes to one species ripple through the whole web."},{"type":"mcq","q":"What is bioaccumulation?","options":[{"t":"A chemical that is not broken down building up to higher levels along a food chain","correct":true},{"t":"Animals eating less food in winter","why":"Bioaccumulation is about chemicals building up, not seasonal eating."},{"t":"Producers making extra glucose","why":"That is photosynthesis, not bioaccumulation."}],"ok":"Chemicals that are not broken down build up as they pass along the chain."},{"type":"mcq","q":"Why did the bird of prey suffer most from a pesticide when the fish did not?","options":[{"t":"It ate many fish, so the pesticide built up to a much higher level in its body","correct":true},{"t":"Birds of prey are allergic to all fish","why":"The problem was the build-up of the chemical, not an allergy."},{"t":"It absorbed the pesticide straight from the water","why":"The bird gained most of the chemical by eating contaminated fish, not from the water."}],"ok":"Because the chemical bioaccumulates, the top consumer ends up with the most."},{"type":"multi","q":"Tap all the things that happen during a predator–prey cycle (owls and voles).","items":[{"t":"More voles means more food, so owl numbers rise","correct":true},{"t":"As owls hunt more, vole numbers fall","correct":true},{"t":"With fewer voles, owls starve and their numbers drop","correct":true},{"t":"Owl and vole numbers stay exactly the same forever"}],"ok":"Predator and prey numbers rise and fall in a repeating cycle.","bad":"The numbers cycle up and down with a lag; they do not stay constant."},{"type":"tf","q":"There is a lag before predator numbers respond to a change in prey numbers.","answer":true,"why":"It takes time for the effect to be felt, so the predator line follows the prey line a little later."},{"type":"mcq","q":"Why are bees so important for food security?","options":[{"t":"They pollinate flowers, so more fruits, seeds and food can be grown","correct":true},{"t":"We eat bees as our main source of food","why":"We do not normally eat bees; they matter because they pollinate."},{"t":"They scare away all crop pests","why":"Bees are linked to pollination, not to controlling pests."}],"ok":"More bees means more pollination, more fruits and seeds, and more food."},{"type":"numeric","q":"A quadrat sample finds a mean of 8 plants per 1 m² square. The field is 250 m². Estimate the total number of plants.","answer":2000,"ok":"Multiply the mean per square (8) by the total area (250 m²) to estimate 2000 plants."},{"type":"mcq","q":"Why is a quadrat result only an estimate of the population?","options":[{"t":"Only a small sample is counted, not every individual","correct":true},{"t":"Quadrats always give the exact number","why":"Sampling cannot count every organism, so it gives an estimate."},{"t":"Plants cannot be counted at all","why":"Plants in the quadrat are counted; the whole field is then estimated."}],"ok":"We sample a few squares and scale up, so the total is an estimate."}]},

"INH":{"code":"INH","title":"Inheritance","discipline":"biology","blurb":"How DNA, chromosomes and genes pass characteristics from parents to offspring, what causes variation, and how natural selection shapes living things.",
"vocab":[{"term":"DNA","definition":"The molecule that carries genetic information; shaped like a double helix","say":"dee-en-ay"},{"term":"chromosome","definition":"A long coiled thread of DNA found in the cell nucleus","say":"kroh-muh-zohm"},{"term":"gene","definition":"A section of DNA that codes for one protein","say":"jeen"},{"term":"nucleus","definition":"The part of a cell that holds the genetic material","say":"new-klee-uss"},{"term":"heredity","definition":"Passing genetic information from one generation to the next","say":"huh-red-it-ee"},{"term":"double helix","definition":"The twisted-ladder shape of a DNA molecule","say":"dub-ul hee-lix"},{"term":"variation","definition":"The differences between individuals in a population","say":"vair-ee-ay-shun"},{"term":"competition","definition":"When organisms struggle for the same limited resources","say":"com-puh-tish-un"},{"term":"natural selection","definition":"Best-adapted organisms survive, reproduce and pass on their genes","say":"nach-rul sel-ek-shun"},{"term":"species","definition":"Organisms that can breed together to make fertile offspring","say":"spee-sheez"}],
"facts":["Most human body cells have 46 chromosomes, arranged in 23 pairs.","One chromosome of each pair comes from each parent, so half your genetic information is from your mother and half from your father.","Chromosomes are made of a long molecule called DNA, which is shaped like a twisted ladder called a double helix.","A gene is a section of DNA that carries the coded instructions to make a protein, and there are many genes on each chromosome.","Sperm and ovum cells each carry 23 chromosomes, so a fertilised zygote has 46.","Variation can be caused by genes, by the environment, or by a combination of both.","Continuous variation falls anywhere within a range (e.g. height), while discontinuous variation falls into separate categories (e.g. blood group).","Animals compete for food, mates and territory; plants compete for sunlight, water, minerals and space.","In natural selection, organisms best adapted to their environment are more likely to survive, reproduce and pass on their genes."],
"misconceptions":[{"wrong":"An organism can choose to change or adapt itself so it survives better.","right":"Organisms cannot choose to adapt; natural variation already exists, and the best-adapted ones survive and reproduce."},{"wrong":"All variation is inherited from your parents through your genes.","right":"Some variation is caused by the environment, such as scars, dyed hair or a suntan, and is not passed on through genes."},{"wrong":"A gene is the same thing as a chromosome.","right":"A chromosome is a long thread of DNA, and a gene is just one small section of it that codes for a protein."},{"wrong":"Watson and Crick discovered the structure of DNA entirely on their own.","right":"They used X-ray evidence (Photograph 51) from Rosalind Franklin and Raymond Gosling, working alongside Maurice Wilkins."}],
"questions":[{"type":"numeric","q":"How many chromosomes are in a human body cell?","answer":46,"ok":"Most human body cells contain 46 chromosomes, arranged in 23 pairs."},{"type":"numeric","q":"How many chromosomes are in a human sperm cell?","answer":23,"ok":"A sperm cell carries 23 chromosomes, half the number in a body cell."},{"type":"mcq","q":"In which part of the cell is the genetic material found?","options":[{"t":"The nucleus","correct":true},{"t":"The cell membrane","why":"The membrane controls what enters and leaves the cell, not the genetic material."},{"t":"The cytoplasm","why":"The cytoplasm is where reactions happen, but the genetic material is held in the nucleus."}],"ok":"The genetic material is stored in the nucleus of the cell."},{"type":"mcq","q":"What is a gene?","options":[{"t":"A section of DNA that codes for a protein","correct":true},{"t":"A long coiled thread made of many chromosomes","why":"That is the wrong way round; chromosomes are made of DNA, and a gene is a section of DNA."},{"t":"The twisted-ladder shape of DNA","why":"That is the double helix, which is the shape of DNA, not a gene."}],"ok":"A gene is a section of DNA that codes for one protein."},{"type":"mcq","q":"What name is given to the twisted-ladder shape of DNA?","options":[{"t":"The double helix","correct":true},{"t":"A chromosome","why":"A chromosome is a coiled thread of DNA, not the name of its shape."},{"t":"A gene","why":"A gene is a section of DNA, not the name of its overall shape."}],"ok":"The shape of DNA is called the double helix."},{"type":"order","q":"Put the steps of natural selection in order.","items":["There is variation in a characteristic within a population","Organisms compete for limited resources to survive","The best-adapted organisms are more likely to survive","Survivors reproduce and pass on their genes to offspring"],"ok":"Variation leads to competition, the best adapted survive, and they reproduce and pass on their genes."},{"type":"categorise","q":"Sort each example into variation caused by genes (inherited) or by the environment.","bins":["Inherited","Environmental"],"items":[{"t":"Natural eye colour","bin":"Inherited"},{"t":"Blood group","bin":"Inherited"},{"t":"Natural hair colour","bin":"Inherited"},{"t":"A scar","bin":"Environmental"},{"t":"Dyed hair colour","bin":"Environmental"},{"t":"A suntan","bin":"Environmental"}],"ok":"Inherited variation comes from your genes; environmental variation is caused by things that happen during your life.","bad":"Genes give eye colour, blood group and natural hair colour; the environment causes scars, dyed hair and suntans."},{"type":"categorise","q":"Sort each example into continuous or discontinuous variation.","bins":["Continuous","Discontinuous"],"items":[{"t":"Human height","bin":"Continuous"},{"t":"Foot length","bin":"Continuous"},{"t":"Hand width","bin":"Continuous"},{"t":"Blood group","bin":"Discontinuous"},{"t":"Eye colour","bin":"Discontinuous"}],"ok":"Continuous variation falls anywhere in a range; discontinuous variation falls into separate categories.","bad":"Height, foot length and hand width can take any value (continuous); blood group and eye colour fall into set categories (discontinuous)."},{"type":"multi","q":"Tap all the things that animals compete with each other for.","items":[{"t":"Food","correct":true},{"t":"Mates","correct":true},{"t":"Territory","correct":true},{"t":"Sunlight for photosynthesis"}],"ok":"Animals compete for food, mates and territory.","bad":"Sunlight is something plants compete for, not animals."},{"type":"multi","q":"Tap all the things that plants compete with each other for.","items":[{"t":"Sunlight","correct":true},{"t":"Water","correct":true},{"t":"Minerals","correct":true},{"t":"Space","correct":true}],"ok":"Plants compete for sunlight, water, minerals and space.","bad":"Plants compete for sunlight, water, minerals and space."},{"type":"multi","q":"Tap all the scientists involved in working out the structure of DNA.","items":[{"t":"James Watson","correct":true},{"t":"Francis Crick","correct":true},{"t":"Rosalind Franklin","correct":true},{"t":"Charles Darwin"}],"ok":"Watson, Crick, Wilkins, Franklin and Gosling were all involved in discovering the structure of DNA.","bad":"Charles Darwin worked on natural selection, not the structure of DNA."},{"type":"tf","q":"Half of your genetic information comes from your mother and half from your father.","answer":true,"why":"You inherit 23 chromosomes from the sperm and 23 from the ovum, giving 46 in total."},{"type":"tf","q":"A deer can choose to grow longer antlers so it can compete more successfully for mates.","answer":false,"why":"Organisms cannot choose to change; natural variation in antler size already exists in the population."},{"type":"tf","q":"The shape of DNA is a single straight strand.","answer":false,"why":"DNA is a double helix made of two strands twisted like a ladder."},{"type":"mcq","q":"Why are offspring not exactly like either parent?","options":[{"t":"They inherit half their DNA from each parent, in a new combination","correct":true},{"t":"Their DNA changes completely as they grow up","why":"The genetic information you inherit is set at fertilisation; it does not swap over as you grow."},{"t":"They only inherit DNA from one parent","why":"Offspring inherit half their genetic information from each parent, not all from one."}],"ok":"Offspring get half their genes from each parent, creating a new combination of characteristics."},{"type":"mcq","q":"On an island with plenty of fruit but few insects, which finches increased over many generations?","options":[{"t":"Fruit-eating finches, because they got enough food, survived and reproduced","correct":true},{"t":"Insect-eating finches, because they changed their beaks to eat fruit","why":"Finches cannot change their own beaks; the best-adapted ones simply survive and reproduce more."},{"t":"Neither, because beak shape has no effect on survival","why":"Beak shape strongly affects which food a finch can eat, and so affects its survival."}],"ok":"Fruit-eating finches were better adapted, so they survived, reproduced and increased in number."},{"type":"mcq","q":"Two organisms belong to the same species if they can do what?","options":[{"t":"Reproduce together to produce fertile offspring","correct":true},{"t":"Live in the same area as each other","why":"Many different species live in the same area; sharing a habitat does not make them one species."},{"t":"Look roughly the same size and colour","why":"Looking similar is a clue, but the test is whether they can produce fertile offspring."}],"ok":"Members of the same species can breed together to produce fertile offspring."},{"type":"tf","q":"A chromosome is made of a long molecule called DNA.","answer":true,"why":"Each chromosome is a long, coiled molecule of DNA."}]},

"BIO":{"code":"BIO","title":"Biodiversity","discipline":"biology","blurb":"Biodiversity is the range of different species in an area, why it matters, how species become extinct and how we protect it.",
"vocab":[{"term":"biodiversity","definition":"The range of different species in an area.","say":"by-oh-dy-VER-sit-ee"},{"term":"species","definition":"Organisms that can reproduce to make fertile offspring.","say":"SPEE-sheez"},{"term":"classification","definition":"Putting organisms into groups so we can study them.","say":"klass-if-ih-KAY-shun"},{"term":"vertebrate","definition":"An animal that has a backbone.","say":"VER-tuh-brit"},{"term":"invertebrate","definition":"An animal that does not have a backbone.","say":"in-VER-tuh-brit"},{"term":"extinct","definition":"When the last of a species has died; numbers reach zero.","say":"ex-TINKT"},{"term":"endangered","definition":"A species with very low numbers, close to extinction.","say":"en-DANE-jerd"},{"term":"habitat","definition":"The place where an organism lives.","say":"HAB-it-at"},{"term":"conservation","definition":"Protecting existing habitats to maintain biodiversity.","say":"kon-ser-VAY-shun"},{"term":"afforestation","definition":"Planting a forest where there were no trees before.","say":"uh-for-ess-TAY-shun"}],
"facts":["Biodiversity is the range of different species in an area, such as a meadow with many plants and insects.","Putting organisms into groups is called classification; Carl Linnaeus devised the system we mostly use today.","All organisms are sorted into five kingdoms: Animals, Plants, Fungi, Prokaryotes and Protoctists.","Animals are split into vertebrates (with a backbone) and invertebrates (without a backbone).","Two organisms are the same species if they can reproduce to produce fertile offspring.","We keep biodiversity high because some species are useful (e.g. medicines), it supports our food supply, food webs are affected if one species is lost, and it is morally right.","Organisms can become extinct due to loss of habitat, new predators, competition, hunting and pollution.","We maintain biodiversity through breeding programmes, afforestation, conservation of habitats, and seed and gene banks.","A global seed vault stores millions of seeds so crops can be grown again if disease destroys them."],
"misconceptions":[{"wrong":"Biodiversity just means how many animals live somewhere.","right":"Biodiversity is the range of different species in an area, not simply the total number of animals."},{"wrong":"Endangered and extinct mean the same thing.","right":"Endangered means very low numbers and close to extinction; extinct means the numbers have reached zero."},{"wrong":"Animals that look very different must be different species.","right":"If organisms can reproduce to produce fertile offspring they are the same species, however different they look."},{"wrong":"A field growing one crop has high biodiversity because it is full of plants.","right":"A field growing only one crop has low biodiversity; it supports fewer species than a meadow with many plants."}],
"questions":[{"type":"mcq","q":"What does biodiversity mean?","options":[{"t":"The range of different species in an area","correct":true},{"t":"The total number of animals in a country","why":"Biodiversity is about the variety of species, not just how many animals there are."},{"t":"The number of plants in a single field","why":"Biodiversity covers all living things in an area, not just plants."}],"ok":"Biodiversity is the range of different species in an area."},{"type":"mcq","q":"Which scientist devised the classification system we mostly use today?","options":[{"t":"Carl Linnaeus","correct":true},{"t":"Charles Darwin","why":"Darwin is known for evolution by natural selection, not the classification system."},{"t":"Gregor Mendel","why":"Mendel is known for his work on inheritance, not classification."}],"ok":"Carl Linnaeus came up with the classification system."},{"type":"mcq","q":"When are two organisms said to belong to the same species?","options":[{"t":"When they can reproduce to make fertile offspring","correct":true},{"t":"When they look exactly the same","why":"Members of a species can look different, like a male and female bird."},{"t":"When they live in the same habitat","why":"Different species can share a habitat; what matters is making fertile offspring."}],"ok":"Same species means they can reproduce to make fertile offspring."},{"type":"multi","q":"Tap all of the five kingdoms organisms are classified into.","items":[{"t":"Animals","correct":true},{"t":"Plants","correct":true},{"t":"Fungi","correct":true},{"t":"Vertebrates"},{"t":"Prokaryotes","correct":true},{"t":"Mammals"}],"ok":"Animals, Plants, Fungi, Prokaryotes and Protoctists are the five kingdoms.","bad":"Vertebrates and mammals are groups within the Animal kingdom, not kingdoms themselves."},{"type":"tf","q":"An animal with a backbone is called a vertebrate.","answer":true,"why":"Vertebrates have a backbone; invertebrates do not."},{"type":"tf","q":"A field growing only one crop has higher biodiversity than a meadow full of different plants.","answer":false,"why":"A single-crop field supports fewer species, so it has lower biodiversity than a varied meadow."},{"type":"categorise","q":"Sort each activity into whether it increases or decreases biodiversity.","bins":["Increases","Decreases"],"items":[{"t":"Planting a forest where there were no trees","bin":"Increases"},{"t":"Breeding an endangered animal in captivity","bin":"Increases"},{"t":"Conserving an existing habitat","bin":"Increases"},{"t":"Cutting down a forest to build houses","bin":"Decreases"},{"t":"Hunting a species near to extinction","bin":"Decreases"},{"t":"Overfishing until fish become endangered","bin":"Decreases"}],"ok":"Afforestation, captive breeding and conservation increase biodiversity; deforestation, hunting and overfishing decrease it.","bad":"Actions that protect or add species increase biodiversity; those that destroy habitats or kill species decrease it."},{"type":"categorise","q":"Sort each one as a threat to biodiversity or a way to protect it.","bins":["Threat","Protection"],"items":[{"t":"Loss of habitat","bin":"Threat"},{"t":"Pollution of air, water and land","bin":"Threat"},{"t":"Hunting by humans","bin":"Threat"},{"t":"Seed and gene banks","bin":"Protection"},{"t":"Breeding programmes in zoos","bin":"Protection"},{"t":"Conservation of habitats","bin":"Protection"}],"ok":"Habitat loss, pollution and hunting threaten biodiversity; seed banks, breeding programmes and conservation protect it.","bad":"Threats reduce species numbers, while protections help maintain or rebuild them."},{"type":"mcq","q":"Why does cutting down a forest reduce biodiversity?","options":[{"t":"It destroys the habitats of the organisms living there","correct":true},{"t":"It makes the soil too warm for animals","why":"The problem is that habitats are destroyed, not that the soil overheats."},{"t":"It stops new species being classified","why":"Classification is about grouping organisms, not why numbers fall."}],"ok":"Deforestation destroys habitats, so the numbers of organisms living there fall."},{"type":"multi","q":"Tap all of the reasons we want to keep biodiversity high.","items":[{"t":"Some species are useful, for example for medicines","correct":true},{"t":"It supports our food supply","correct":true},{"t":"Food webs are affected if a species is lost","correct":true},{"t":"It makes more land available for houses"},{"t":"Morally, it is the right thing to do","correct":true}],"ok":"Useful species, food supply, food webs and moral responsibility are all reasons to keep biodiversity high.","bad":"Building more houses is not a reason to keep biodiversity high; it can actually reduce it."},{"type":"mcq","q":"What does it mean for a species to be extinct?","options":[{"t":"The last of the species has died and numbers have reached zero","correct":true},{"t":"The species has very low numbers but some are left","why":"That describes endangered, not extinct."},{"t":"The species has moved to a new habitat","why":"Moving habitat does not make a species extinct; extinction means numbers reach zero."}],"ok":"Extinct means none of that species is left; numbers have reached zero."},{"type":"mcq","q":"A species of bird falls from 100,000 to just 10 in a few decades. How should we describe it?","options":[{"t":"Endangered, because its numbers are very low and close to zero","correct":true},{"t":"Extinct, because its numbers have fallen a lot","why":"Extinct only applies when numbers reach zero; 10 are still alive."},{"t":"Of no concern, because some are still alive","why":"Such a steep fall to very low numbers is a serious concern."}],"ok":"With very low numbers close to zero, the bird is endangered, not yet extinct."},{"type":"order","q":"Put these stages in order as a species declines towards extinction.","items":["Thousands of the species live in the area","A new predator, competitor or habitat loss reduces their numbers","Only hundreds remain, so the species is endangered","Numbers reach zero and the species is extinct"],"ok":"Numbers fall from thousands, the species becomes endangered, then reaches zero and is extinct."},{"type":"multi","q":"Tap all of the causes of extinction.","items":[{"t":"Loss of habitat","correct":true},{"t":"New predators","correct":true},{"t":"Competition from another species","correct":true},{"t":"Being classified into a kingdom"},{"t":"Hunting by humans","correct":true}],"ok":"Habitat loss, new predators, competition and hunting can all cause extinction.","bad":"Being classified into a kingdom is just grouping organisms; it does not cause extinction."},{"type":"mcq","q":"How can a breeding programme help maintain biodiversity?","options":[{"t":"A species is bred in captivity, then released into the wild","correct":true},{"t":"Forests are cut down to give animals more space","why":"Cutting down forests destroys habitats and reduces biodiversity."},{"t":"The species is classified into a new kingdom","why":"Classification groups organisms; it does not raise their numbers."}],"ok":"Breeding in captivity builds up numbers that can be released back into the wild."},{"type":"mcq","q":"What is afforestation?","options":[{"t":"Planting a forest in an area that had no trees before","correct":true},{"t":"Cutting down a forest to build farms","why":"That is deforestation, which reduces biodiversity."},{"t":"Storing seeds in a freezing seed vault","why":"That describes a seed bank, not afforestation."}],"ok":"Afforestation means planting trees where there were none, increasing biodiversity."},{"type":"tf","q":"Seed and gene banks store seeds and DNA so species can be grown again or researched.","answer":true,"why":"Seed vaults store seeds and genetic material so species can be reintroduced or studied."},{"type":"mcq","q":"A poodle and a Great Dane look very different. Why are they still the same species?","options":[{"t":"They can reproduce together to make fertile offspring","correct":true},{"t":"They are both pets kept by humans","why":"Being kept as pets has nothing to do with what makes a species."},{"t":"They are both vertebrates","why":"Many different species are vertebrates; this alone does not make them one species."}],"ok":"Despite looking different, they can produce fertile offspring, so they are the same species."}]},

"PER":{"code":"PER","title":"The periodic table","discipline":"chemistry","blurb":"How the periodic table sorts elements into metals and non-metals, groups and periods, and the reactivity trends in Groups 1, 7 and 0.",
"vocab":[{"term":"element","definition":"A pure substance made of only one type of atom.","say":"EL-uh-ment"},{"term":"property","definition":"A characteristic of a substance, including how it reacts.","say":"PROP-er-tee"},{"term":"metal","definition":"Element that is usually strong, malleable and a good conductor.","say":"MET-uhl"},{"term":"non-metal","definition":"Element that is usually brittle, soft and an insulator.","say":"non-MET-uhl"},{"term":"group","definition":"A column of the periodic table; elements react in similar ways.","say":"groop"},{"term":"period","definition":"A row of the periodic table.","say":"PEER-ee-od"},{"term":"alkali metal","definition":"A Group 1 element with one electron in its outer shell.","say":"AL-kuh-lye MET-uhl"},{"term":"halogen","definition":"A Group 7 element with seven electrons in its outer shell.","say":"HAL-uh-jen"},{"term":"noble gas","definition":"A Group 0 element with a full outer shell; very unreactive.","say":"NOH-buhl gas"},{"term":"Mendeleev","definition":"Russian scientist who arranged elements into the periodic table.","say":"men-DEL-ay-ev"}],
"facts":["Most elements are metals; there are only about 18 non-metals.","Metals are strong, malleable, hard, good thermal and electrical conductors, and can be magnetic.","Non-metals are brittle, soft, electrical insulators and thermal insulators.","Metal oxides are basic, while most non-metal oxides are acidic.","Mendeleev grouped elements by their properties, then ordered them by atomic weight, but the group took priority.","Mendeleev left gaps for undiscovered elements and predicted their properties accurately.","Groups are the columns of the periodic table; periods are the rows.","Group 1 elements (alkali metals) get more reactive as you go down the group.","Group 7 elements (halogens) get less reactive as you go down the group.","Group 0 elements (noble gases) have full outer shells and are very unreactive."],
"misconceptions":[{"wrong":"Most elements are non-metals.","right":"Most elements are metals; only about 18 are non-metals."},{"wrong":"All metals are magnetic.","right":"Only iron, nickel and cobalt are magnetic; there are no magnetic non-metals."},{"wrong":"Reactivity increases down every group.","right":"Group 1 gets more reactive down the group, but Group 7 gets less reactive."},{"wrong":"Noble gases are unreactive because they have no electrons.","right":"They are unreactive because their outer shell is already full."}],
"questions":[{"type":"mcq","q":"In the periodic table, what is a group?","options":[{"t":"A column of elements that react in similar ways","correct":true},{"t":"A row of elements","why":"A row is called a period, not a group."},{"t":"A set of elements with the same atomic mass","why":"Groups are columns; mass does not define them."}],"ok":"Groups are the columns, and elements in the same group react in similar ways."},{"type":"mcq","q":"What is a row of the periodic table called?","options":[{"t":"A period","correct":true},{"t":"A group","why":"A group is a column, not a row."},{"t":"A shell","why":"A shell holds electrons in an atom; it is not a row of the table."}],"ok":"The rows are periods, which is where the periodic table gets its name."},{"type":"categorise","q":"Sort each property into metal or non-metal.","bins":["Metal","Non-metal"],"items":[{"t":"Malleable","bin":"Metal"},{"t":"Good electrical conductor","bin":"Metal"},{"t":"Brittle","bin":"Non-metal"},{"t":"Electrical insulator","bin":"Non-metal"},{"t":"Hard","bin":"Metal"},{"t":"Produces acidic oxides","bin":"Non-metal"}],"ok":"Metals are strong, malleable, hard conductors; non-metals are brittle, soft insulators.","bad":"Metals conduct and bend, while non-metals snap and insulate."},{"type":"mcq","q":"When a metal reacts with oxygen, what kind of oxide forms?","options":[{"t":"A basic oxide","correct":true},{"t":"An acidic oxide","why":"Acidic oxides come from non-metals reacting with oxygen."},{"t":"A neutral oxide","why":"Metal oxides are basic, not neutral."}],"ok":"Metal + oxygen makes a metal oxide, and metal oxides are basic."},{"type":"tf","q":"Most non-metal oxides are acidic.","answer":true,"why":"Non-metal + oxygen makes a non-metal oxide, and most non-metal oxides are acidic."},{"type":"multi","q":"Tap all the properties that are typical of metals.","items":[{"t":"Strong","correct":true},{"t":"Good thermal conductor","correct":true},{"t":"Brittle"},{"t":"Hard","correct":true},{"t":"Electrical insulator"}],"ok":"Metals are strong, hard and good conductors of heat and electricity.","bad":"Brittle and insulating are non-metal properties."},{"type":"mcq","q":"Roughly how many of the elements are non-metals?","options":[{"t":"About 18","correct":true},{"t":"About half of them","why":"Most elements are metals, not half."},{"t":"Almost all of them","why":"Most elements are metals; only about 18 are non-metals."}],"ok":"There are only about 18 non-metals; most elements are metals."},{"type":"multi","q":"Tap all the elements that ARE magnetic.","items":[{"t":"Iron","correct":true},{"t":"Nickel","correct":true},{"t":"Cobalt","correct":true},{"t":"Copper"},{"t":"Sulfur"}],"ok":"The only three magnetic elements are iron, nickel and cobalt.","bad":"Only iron, nickel and cobalt are magnetic — and no non-metals are."},{"type":"mcq","q":"How did Mendeleev first arrange the elements?","options":[{"t":"He grouped them by their properties","correct":true},{"t":"He listed them alphabetically","why":"He grouped by properties, not by name."},{"t":"He sorted them by colour only","why":"Properties, not colour alone, guided his grouping."}],"ok":"He grouped elements by how they behaved, then ordered them by atomic weight."},{"type":"tf","q":"Mendeleev sometimes kept elements out of strict atomic-weight order so they stayed in the correct group.","answer":true,"why":"He let the group take priority, keeping elements with their chemical family."},{"type":"mcq","q":"What made Mendeleev's periodic table so impressive?","options":[{"t":"He left gaps for undiscovered elements and predicted their properties","correct":true},{"t":"He included every element ever found","why":"Many elements were undiscovered; his genius was leaving gaps for them."},{"t":"He arranged them only by colour","why":"He arranged by properties and atomic weight, not colour."}],"ok":"He left gaps, predicted the missing elements, and his predictions were accurate."},{"type":"mcq","q":"What is Group 1 called?","options":[{"t":"The alkali metals","correct":true},{"t":"The halogens","why":"The halogens are Group 7, not Group 1."},{"t":"The noble gases","why":"The noble gases are Group 0."}],"ok":"Group 1 elements are the alkali metals, each with one outer electron."},{"type":"mcq","q":"How does the reactivity of the alkali metals change as you go DOWN Group 1?","options":[{"t":"They get more reactive","correct":true},{"t":"They get less reactive","why":"That is the Group 7 trend; Group 1 gets MORE reactive down the group."},{"t":"Reactivity stays the same","why":"There is a clear trend — they become more reactive."}],"ok":"The outer electron is further from the nucleus, so it is lost more easily."},{"type":"order","q":"Put these Group 1 metals in order of reactivity, from LEAST to MOST reactive.","items":["Lithium","Sodium","Potassium"],"ok":"Reactivity increases down Group 1, so lithium is least and potassium is most reactive."},{"type":"mcq","q":"Why is potassium more reactive than lithium?","options":[{"t":"Its outer electron is further from the nucleus, so it is lost more easily","correct":true},{"t":"It has more electrons in its outer shell","why":"Both have one outer electron; the difference is distance from the nucleus."},{"t":"It is a non-metal","why":"Potassium is a metal, like all of Group 1."}],"ok":"The further the outer electron is from the nucleus, the easier it is to lose."},{"type":"mcq","q":"What is Group 7 called, and how many outer electrons do they have?","options":[{"t":"The halogens, with seven outer electrons","correct":true},{"t":"The alkali metals, with one outer electron","why":"That describes Group 1, not Group 7."},{"t":"The noble gases, with full outer shells","why":"That describes Group 0, not Group 7."}],"ok":"Group 7 elements are the halogens, each with seven outer electrons."},{"type":"mcq","q":"How does the reactivity of the halogens change as you go DOWN Group 7?","options":[{"t":"They get less reactive","correct":true},{"t":"They get more reactive","why":"That is the Group 1 trend; halogens get LESS reactive down the group."},{"t":"They become magnetic","why":"Halogens are non-metals and are not magnetic."}],"ok":"The outer shell is further from the nucleus, so it is harder to gain an electron."},{"type":"mcq","q":"Why are the noble gases (Group 0) so unreactive?","options":[{"t":"They have full outer shells, so they do not need to lose or gain electrons","correct":true},{"t":"They have one outer electron to lose","why":"That describes Group 1; noble gases have full outer shells."},{"t":"They have no electrons at all","why":"They do have electrons — their outer shell is simply full."}],"ok":"A full outer shell means noble gases are stable and very unreactive."},{"type":"categorise","q":"Sort each element into its correct group family.","bins":["Alkali metal","Halogen","Noble gas"],"items":[{"t":"Lithium","bin":"Alkali metal"},{"t":"Sodium","bin":"Alkali metal"},{"t":"Chlorine","bin":"Halogen"},{"t":"Fluorine","bin":"Halogen"},{"t":"Helium","bin":"Noble gas"},{"t":"Neon","bin":"Noble gas"}],"ok":"Group 1 are alkali metals, Group 7 are halogens, Group 0 are noble gases.","bad":"Alkali metals have one outer electron, halogens seven, noble gases a full shell."}]},

"MAT":{"code":"MAT","title":"Materials","discipline":"chemistry","blurb":"How reactive different metals are, how we extract them from ores using carbon, and what makes ceramics, polymers and composites useful.",
"vocab":[{"term":"reactivity series","definition":"A list of metals placed in order of how reactive they are.","say":"ree-ak-TIV-it-ee"},{"term":"displacement reaction","definition":"A reaction where a more reactive metal takes the place of a less reactive one.","say":"diss-PLAYSS-munt"},{"term":"ore","definition":"A rock that contains enough metal to be worth extracting.","say":"or"},{"term":"extraction","definition":"Getting a pure metal out of its compound in an ore.","say":"ex-TRAK-shun"},{"term":"reduction","definition":"A reaction where oxygen is removed from a compound.","say":"ree-DUK-shun"},{"term":"ceramic","definition":"A hard, brittle material made by heating wet clay until dry.","say":"suh-RAM-ik"},{"term":"polymer","definition":"A material made of very long chains of repeating units called monomers.","say":"POL-ih-mer"},{"term":"monomer","definition":"A single repeating unit that joins into chains to form a polymer.","say":"MON-oh-mer"},{"term":"composite","definition":"A material combining two materials to use the best properties of both.","say":"KOM-puh-zit"},{"term":"furnace","definition":"A very hot oven-like machine used to extract metals from ores.","say":"FUR-niss"}],
"facts":["When a metal reacts with an acid, a salt and hydrogen are formed; we see the hydrogen as bubbles.","Some metals react more vigorously than others, so we can put them in order of reactivity called the reactivity series.","A more reactive metal will displace a less reactive metal from its compound in a displacement reaction.","Metals less reactive than carbon, such as zinc, iron, copper, silver and gold, can be extracted by heating their ore with carbon.","Extracting iron with carbon is a reduction reaction because the carbon removes oxygen from the iron oxide.","Ceramics form when wet clay is heated to evaporate the water; the molecules can no longer slide, leaving a hard, brittle material.","Ceramics are strong when squashed but brittle, and are good electrical and thermal insulators.","Polymers are long chains of monomers; chains that can slide over each other make plastics that stretch and melt when hot.","Reinforced concrete is a composite of flexible steel and strong concrete, making it both flexible and strong."],
"misconceptions":[{"wrong":"Carbon can be used to extract any metal from its ore.","right":"Carbon can only extract metals less reactive than carbon; more reactive metals cannot be displaced by carbon."},{"wrong":"Removing oxygen from a compound is an oxidation reaction.","right":"Removing oxygen is reduction; adding oxygen to an element is oxidation."},{"wrong":"All polymers melt when they get hot.","right":"Polymers with bonds between the chains do not melt when heated; they burn instead."},{"wrong":"A composite is just one material on its own.","right":"A composite combines two materials, such as steel in concrete, to use the best properties of both."}],
"questions":[{"type":"mcq","q":"When a metal reacts with an acid, which two products are formed?","options":[{"t":"A salt and hydrogen","correct":true},{"t":"A salt and oxygen","why":"The gas given off when a metal reacts with acid is hydrogen, not oxygen."},{"t":"A metal oxide and water","why":"Metal oxides form when metals react with oxygen, not with acid."}],"ok":"Metal + acid → salt + hydrogen, and we see the hydrogen as bubbles."},{"type":"mcq","q":"What is the reactivity series?","options":[{"t":"A list of metals placed in order of how reactive they are","correct":true},{"t":"A list of acids placed in order of strength","why":"The reactivity series orders metals by reactivity, not acids."},{"t":"A list of metals placed in order of their mass","why":"It is based on how vigorously metals react, not their mass."}],"ok":"The reactivity series lets us predict how metals will react."},{"type":"mcq","q":"Magnesium fizzes vigorously in acid, zinc fizzes a little, and copper does not react. Which is most reactive?","options":[{"t":"Magnesium","correct":true},{"t":"Zinc","why":"Zinc only fizzed a little, so it is less reactive than magnesium."},{"t":"Copper","why":"Copper did not react at all, so it is the least reactive here."}],"ok":"The more vigorous the reaction with acid, the more reactive the metal."},{"type":"order","q":"Order these metals from most reactive to least reactive.","items":["magnesium","zinc","copper"],"ok":"Magnesium reacts most vigorously, zinc a little, and copper does not react with acid."},{"type":"order","q":"Using their reactions with acid, order these metals from most reactive to least reactive.","items":["calcium","iron","silver"],"ok":"Calcium reacts very vigorously, iron slowly, and silver does not react at all."},{"type":"tf","q":"A more reactive metal can displace a less reactive metal from its compound.","answer":true,"why":"This is a displacement reaction: the more reactive metal takes the place of the less reactive one."},{"type":"mcq","q":"Why is it called a displacement reaction when sodium reacts with calcium chloride?","options":[{"t":"The more reactive sodium takes the place of the less reactive calcium","correct":true},{"t":"The acid displaces the hydrogen from the metal","why":"No acid is involved here; displacement is one metal replacing another."},{"t":"Oxygen is added to the calcium","why":"Adding oxygen is oxidation, not displacement."}],"ok":"Sodium is more reactive than calcium, so it displaces it from the compound."},{"type":"mcq","q":"What is an ore?","options":[{"t":"A rock that contains enough metal to be worth extracting","correct":true},{"t":"A pure metal dug straight out of the ground","why":"Metals in ores are part of a compound, not pure."},{"t":"A type of acid used to dissolve metals","why":"An ore is a rock containing a metal compound, not an acid."}],"ok":"The metal in an ore is part of a compound, like iron oxide."},{"type":"mcq","q":"How is iron extracted from iron oxide using carbon?","options":[{"t":"The ore is heated with carbon in a furnace, and the carbon removes the oxygen","correct":true},{"t":"The ore is dissolved in acid to release the iron","why":"Iron is extracted by heating with carbon, not by dissolving in acid."},{"t":"The ore is cooled until the iron separates out","why":"Extraction needs a very hot furnace, not cooling."}],"ok":"iron oxide + carbon → carbon dioxide + iron, in a very hot furnace."},{"type":"tf","q":"Removing oxygen from a compound is called reduction.","answer":true,"why":"Reduction is the removal of oxygen; adding oxygen to an element is oxidation."},{"type":"mcq","q":"Why can carbon NOT be used to extract lithium from its ore?","options":[{"t":"Lithium is more reactive than carbon, so carbon cannot displace it","correct":true},{"t":"Lithium is less reactive than carbon, so it stays in the rock","why":"It is the other way round: lithium is more reactive than carbon."},{"t":"Lithium does not form a compound in its ore","why":"Metals in ores are always part of a compound; the issue is reactivity."}],"ok":"Carbon can only extract metals less reactive than carbon."},{"type":"multi","q":"Tap all the metals that CAN be extracted from their ore using carbon.","items":[{"t":"iron","correct":true},{"t":"copper","correct":true},{"t":"potassium"},{"t":"zinc","correct":true},{"t":"lithium"}],"ok":"Iron, copper and zinc are less reactive than carbon, so carbon can extract them.","bad":"Potassium and lithium are more reactive than carbon, so carbon cannot displace them."},{"type":"mcq","q":"How are ceramics formed?","options":[{"t":"Wet clay is heated to evaporate the water until it becomes hard","correct":true},{"t":"Metal is melted and poured into a mould","why":"That describes casting a metal, not making a ceramic from clay."},{"t":"Long chains of monomers are joined together","why":"That describes how polymers form, not ceramics."}],"ok":"Once the water has gone, the molecules can no longer slide, leaving a hard ceramic."},{"type":"multi","q":"Tap all the properties of ceramics.","items":[{"t":"Brittle","correct":true},{"t":"Good electrical insulator","correct":true},{"t":"Good electrical conductor"},{"t":"Strong when squashed","correct":true},{"t":"Easy to bend"}],"ok":"Ceramics are brittle, strong when compressed, and good electrical and thermal insulators.","bad":"Ceramics are insulators, not conductors, and they cannot be bent."},{"type":"mcq","q":"What is a polymer made from?","options":[{"t":"Lots of repeating units called monomers joined into long chains","correct":true},{"t":"Wet clay that has been heated and dried","why":"That makes a ceramic, not a polymer."},{"t":"A network of steel rods inside concrete","why":"That is a composite, not a polymer."}],"ok":"Monomers join into very long chains to make a polymer."},{"type":"tf","q":"A polymer with bonds between its chains will melt easily when heated.","answer":false,"why":"When the chains are bonded together the polymer cannot slide, so it does not melt; it burns instead."},{"type":"mcq","q":"What is a composite?","options":[{"t":"A material that combines two materials to use the best properties of both","correct":true},{"t":"A pure metal extracted from its ore","why":"A composite is a combination of materials, not a single pure metal."},{"t":"A single long chain of monomers","why":"That describes a polymer, not a composite."}],"ok":"Reinforced concrete combines flexible steel with strong concrete."},{"type":"categorise","q":"Sort each material into the correct group.","bins":["Ceramic","Polymer","Composite"],"items":[{"t":"porcelain","bin":"Ceramic"},{"t":"brick","bin":"Ceramic"},{"t":"plastic bag","bin":"Polymer"},{"t":"reinforced concrete","bin":"Composite"},{"t":"fibreglass","bin":"Composite"}],"ok":"Ceramics come from fired clay, polymers are chains of monomers, and composites combine two materials.","bad":"Composites combine two materials, while ceramics are fired clay and polymers are monomer chains."},{"type":"mcq","q":"Why is reinforced concrete used to construct large buildings?","options":[{"t":"The flexible steel prevents collapse and the strong concrete supports the weight","correct":true},{"t":"Concrete on its own bends easily in the wind","why":"Concrete is strong but brittle; the steel adds the flexibility."},{"t":"Steel on its own can support a whole building","why":"Steel alone would bend under the weight, so concrete is needed too."}],"ok":"Combining the two gives a material that is both flexible and strong."}]},

"EAR":{"code":"EAR","title":"Earth and atmosphere","discipline":"earth","blurb":"The Earth's layered structure, the three rock types and rock cycle, the gases in our atmosphere, the carbon cycle and recycling.",
"vocab":[{"term":"crust","definition":"The thin, solid outer layer of the Earth that we live on.","say":"krust"},{"term":"mantle","definition":"The thick middle layer of slow-moving, semi-molten rock.","say":"MAN-tul"},{"term":"core","definition":"The very hot centre of the Earth, made mostly of iron.","say":"kor"},{"term":"igneous rock","definition":"Rock formed when molten rock cools and hardens.","say":"IG-nee-us"},{"term":"sedimentary rock","definition":"Rock formed from layers of sediment compressed over millions of years.","say":"sed-ih-MEN-tuh-ree"},{"term":"metamorphic rock","definition":"Rock changed by heat and pressure underground over millions of years.","say":"met-uh-MOR-fik"},{"term":"weathering","definition":"The physical breaking of rock into small pieces called sediment.","say":"WETH-er-ing"},{"term":"atmosphere","definition":"The thin layer of gases held around the Earth by gravity.","say":"AT-muss-fear"},{"term":"greenhouse effect","definition":"Gases trapping heat near the Earth, keeping it warm enough for life.","say":"GREEN-howss"},{"term":"recycling","definition":"Using the material an object is made from to make a new object.","say":"ree-SY-kling"}],
"facts":["The Earth's layers from the outside inwards are the crust, the mantle, the outer core and the inner core.","The crust is thin compared with the layers below — only a few tens of kilometres thick.","The outer core is molten liquid iron, while the inner core is solid iron because the pressure squeezes it together.","Igneous rocks form when molten rock cools; sedimentary rocks form from compressed layers of sediment; metamorphic rocks form from heat and pressure.","Today's atmosphere is roughly 78% nitrogen, 21% oxygen and about 1% other gases, including a tiny amount of carbon dioxide.","Carbon dioxide is only about 0.04% of the atmosphere but plays an important role in the Earth's temperature.","Photosynthesis removes carbon dioxide from the atmosphere, while respiration and combustion put it back.","The greenhouse effect is natural and necessary; without it the Earth would be too cold for us to live on.","Recycling materials avoids digging more raw materials, is cheaper and usually uses less energy than making them from scratch."],
