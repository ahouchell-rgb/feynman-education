<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#1E2761">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KS3 Science">
<title>Houchell · KS3 Science — learn it, step by step</title>
<meta name="description" content="A Duolingo-style home-learning course for KS3 Science, following the Springboard pathway. Learn the vocabulary with your voice, practise, and watch your streak grow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E6; --paper:#FFFFFF; --ink:#1A1A1A; --navy:#1E2761;
    --grey:#5C6370; --line:#E4DDCB; --line-2:#D7DCEC;
    --green:#2C5F2D; --green-bg:#E6F0E0; --green-line:#BFD8B6;
    --wrong:#B4341E; --wrong-bg:#FBE7E2; --wrong-line:#EBB9AC;
    --gold:#C99528; --gold-bg:#FBF1D8; --lav:#AEB6D6; --lav-pale:#D7DCEC;
    --bio:#2C5F2D; --chem:#7A4FA3; --phys:#1E5F8C; --earth:#9A6A2C;
    --shadow:0 1px 0 rgba(26,26,26,.04), 0 8px 28px rgba(30,39,97,.08);
    --r:16px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ background:var(--cream); color-scheme:light only; }
  body{ font-family:'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:var(--ink); background:var(--cream); line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100dvh; }
  .fr{ font-family:'Fraunces', Georgia, serif; letter-spacing:-0.02em; font-variation-settings:'opsz' 110,'SOFT' 20; }
  .mono-kicker{ font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
  button{ font-family:inherit; cursor:pointer; }
  .sr{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }
  .app{ max-width:680px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

  /* ===== Home top bar (streak / xp / hearts) ===== */
  .hbar{ position:sticky; top:0; z-index:20; background:var(--cream); padding:14px 18px 12px; border-bottom:1px solid rgba(30,39,97,.06); }
  .hbar .stats{ display:flex; align-items:center; gap:16px; }
  .hbar .s{ display:flex; align-items:center; gap:6px; font-weight:700; font-size:16px; }
  .hbar .s .e{ font-size:19px; }
  .hbar .streak{ color:#D9831F; } .hbar .xp{ color:var(--gold); } .hbar .hearts-c{ color:var(--wrong); }
  .hbar .spacer{ flex:1; }
  .hbar .snd{ border:none; background:transparent; font-size:19px; width:34px; height:34px; border-radius:10px; }
  .hbar .snd:hover{ background:rgba(30,39,97,.07); }
  .seg{ display:flex; gap:6px; margin-top:12px; background:#EDE6D5; padding:4px; border-radius:12px; }
  .seg button{ flex:1; border:none; background:transparent; padding:9px; border-radius:9px; font-weight:600; font-size:14px; color:var(--grey); }
  .seg button.on{ background:var(--paper); color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .yearjump{ display:flex; gap:8px; margin-top:9px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; }
  .yearjump::-webkit-scrollbar{ display:none; }
  .yearjump button{ flex:0 0 auto; min-width:62px; white-space:nowrap; border:1px solid var(--line); background:var(--paper); color:var(--grey); padding:7px 12px; border-radius:9px; font-size:12.5px; font-weight:600; }
  .yearjump button:active{ transform:translateY(1px); }

  .scroll{ flex:1; padding:6px 18px 40px; }

  /* ===== Path / course map ===== */
  .yr{ margin-top:22px; }
  .yr-head{ display:flex; align-items:center; gap:12px; margin:6px 0 14px; }
  .yr-head .yl{ font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--navy); white-space:nowrap; }
  .yr-head .hr{ flex:1; height:1px; background:var(--line); }
  .yr-head .hrs{ font-size:12px; color:var(--grey); }

  .unit{ background:var(--paper); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:0; margin-bottom:14px; overflow:hidden; }
  .unit.locked{ background:#FBF9F2; box-shadow:none; border-color:#EFE8D6; }
  .unit-head{ display:flex; align-items:center; gap:13px; padding:17px 18px 14px; }
  .unit .badge{ width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:24px; flex:none; color:#fff; }
  .unit .meta{ flex:1; min-width:0; }
  .unit .meta .t{ font-size:17.5px; font-weight:600; color:var(--navy); line-height:1.2; }
  .unit .meta .sub{ font-size:12.5px; color:var(--grey); margin-top:4px; }
  .unit .meta .disc{ font-weight:600; }
  .ublurb{ padding:0 18px; margin-bottom:15px; font-size:13.5px; line-height:1.45; color:#6c6757; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; max-height:2.9em; }
  .crowns{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--gold); font-weight:700; flex:none; background:var(--gold-bg); padding:5px 10px; border-radius:999px; white-space:nowrap; }
  .lock-ic{ font-size:17px; color:#C3BBA4; flex:none; }

  /* lesson nodes inside a unit */
  .nodes{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); align-items:start; gap:18px 4px; padding:6px 14px 20px; }
  .node{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:7px; background:transparent; border:none; padding:0; appearance:none; -webkit-appearance:none; height:auto; min-height:0; font:inherit; color:inherit; }
  .node .ring{ width:52px; height:52px; border-radius:50%; display:grid; place-items:center; font-size:21px; border:2.5px solid var(--line-2); background:var(--paper); position:relative; transition:transform .06s; box-shadow:0 2px 0 rgba(30,39,97,.05); }
  .node:not(.locked):active .ring{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0); }
  .node.done .ring{ background:var(--green); border-color:var(--green); color:#fff; box-shadow:0 2px 0 rgba(44,95,45,.25); }
  .node.next .ring{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-bg); }
  .node.locked .ring{ opacity:.45; box-shadow:none; }
  .node .lab{ font-size:10px; text-align:center; color:var(--grey); line-height:1.18; min-height:24px; }
  .node.next .lab, .node.done .lab{ color:var(--navy); font-weight:600; }
  .node .start-pill{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--gold); color:#fff; font-size:8.5px; font-weight:700; letter-spacing:.05em; padding:2px 7px; border-radius:8px; text-transform:uppercase; white-space:nowrap; z-index:2; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .unit.locked .nodes{ display:none; }
  .lockmsg{ padding:0 18px 16px; margin-top:-4px; font-size:12.5px; color:#8c856f; }
  .lockmsg b{ color:#6c6757; }
  .node.recap .ring{ background:#FFF6DE; border-color:var(--gold); color:#B8860B; }
  .node.recap.done .ring{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .ext-row{ padding:0 18px 18px; }
  .ext-btn{ display:block; width:100%; text-align:center; border:1.5px solid var(--green-line); background:var(--green-bg); color:var(--green); font-weight:700; padding:13px; border-radius:13px; font-size:14px; }

  /* ===== Dashboard ===== */
  .dash{ padding-top:8px; }
  .goalcard{ background:var(--navy); color:#fff; border-radius:20px; padding:22px; display:flex; align-items:center; gap:20px; margin-bottom:16px; }
  .ring-wrap{ position:relative; width:92px; height:92px; flex:none; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-wrap .ctr{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
  .ring-wrap .ctr .n{ font-size:22px; font-weight:700; line-height:1; }
  .ring-wrap .ctr .l{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.8; margin-top:2px; }
  .goalcard .gtext .h{ font-size:20px; margin-bottom:4px; }
  .goalcard .gtext .p{ font-size:13.5px; opacity:.85; }
  .goalcard .gtext .lev{ display:inline-block; margin-top:9px; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .mcard{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:16px 17px; }
  .mcard .v{ font-size:26px; font-weight:700; line-height:1; display:flex; align-items:center; gap:7px; }
  .mcard .l{ font-size:12px; color:var(--grey); margin-top:8px; }
  .mcard.streak .v{ color:#D9831F; } .mcard.xp .v{ color:var(--gold); }
  .mcard.crowns .v{ color:var(--navy); } .mcard.words .v{ color:var(--chem); }

  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:17px; margin-bottom:16px; }
  .panel h3{ font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; }
  .week{ display:flex; justify-content:space-between; gap:6px; }
  .day{ display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; }
  .day .dot{ width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:16px; background:#EFEADB; color:#B8B09A; }
  .day.act .dot{ background:var(--green-bg); }
  .day .dl{ font-size:10.5px; color:var(--grey); }
  .ubar{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .ubar .ue{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; color:#fff; flex:none; }
  .ubar .un{ flex:1; font-size:14px; font-weight:500; }
  .ubar .ut{ width:90px; height:8px; background:#EDE6D5; border-radius:999px; overflow:hidden; }
  .ubar .ut > i{ display:block; height:100%; background:var(--green); border-radius:999px; }
  .ubar .up{ font-size:12px; color:var(--grey); width:34px; text-align:right; }
  .resetbtn{ width:100%; border:1px solid var(--line); background:transparent; color:var(--grey); padding:11px; border-radius:12px; font-size:13px; margin-top:4px; }
  .srow{ display:flex; align-items:center; gap:13px; padding:7px 0; }
  .srow .snum{ width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-size:21px; font-weight:700; flex:none; }
  .srow .snum.due{ background:var(--gold-bg); color:var(--gold); }
  .srow .snum.tracked{ background:#F4F6FC; color:var(--navy); }
  .srow .sl{ display:flex; flex-direction:column; gap:1px; }
  .srow .sl b{ font-size:14.5px; color:var(--ink); }
  .srow .sl span{ font-size:12.5px; color:var(--grey); }
  .srdone{ text-align:center; font-size:13.5px; color:var(--green); background:var(--green-bg); border-radius:12px; padding:11px; margin-top:8px; }

  /* ===== Lesson player ===== */
  .topbar{ display:flex; align-items:center; gap:14px; padding:14px 16px; position:sticky; top:0; background:var(--cream); z-index:20; }
  .iconbtn{ border:none; background:transparent; color:var(--grey); font-size:22px; line-height:1; width:34px; height:34px; border-radius:10px; display:grid; place-items:center; }
  .iconbtn:hover{ background:rgba(30,39,97,.07); color:var(--navy); }
  .pbar{ flex:1; height:14px; background:#E9E2D1; border-radius:999px; overflow:hidden; }
  .pbar > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--green),#3f8a40); border-radius:999px; transition:width .45s cubic-bezier(.4,0,.2,1); }
  .hearts{ display:flex; align-items:center; gap:5px; font-weight:600; color:var(--wrong); font-size:15px; }
  .hearts .hh{ font-size:18px; line-height:1; }
  .stage{ flex:1; padding:8px 18px 160px; display:flex; flex-direction:column; }
  .step-kicker{ margin-bottom:10px; }
  .prompt{ font-size:25px; line-height:1.18; color:var(--navy); margin-bottom:4px; }
  @media (max-width:430px){ .prompt{ font-size:21px; } }

  .teach{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-top:6px; }
  .teach .emoji{ font-size:34px; display:block; margin-bottom:10px; }
  .teach h2{ font-size:23px; color:var(--navy); line-height:1.2; margin-bottom:12px; }
  .teach p{ font-size:16.5px; margin-bottom:12px; color:#2a2a28; }
  .teach p:last-child{ margin-bottom:0; }
  .teach b{ color:var(--navy); font-weight:600; }
  /* on-mistake re-teach: a compact .teach card shown inside the feedback sheet */
  .teach.reteach{ padding:14px 16px; margin-top:12px; box-shadow:none; border-radius:14px; }
  .teach.reteach .emoji{ font-size:24px; margin-bottom:6px; }
  .teach.reteach p{ font-size:15px; margin-bottom:7px; }
  .teach.reteach .rt-k{ font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--grey); margin-bottom:7px; }

  /* vocab card */
  .vcard{ text-align:center; padding:30px 22px; }
  .vcard .vlead{ font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-bottom:10px; }
  .vcard .term{ font-size:34px; color:var(--navy); margin:6px 0 4px; }
  .vcard .vlabel{ font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin:16px 0 2px; }
  .vcard .say{ font-size:15px; color:var(--grey); font-style:italic; margin-bottom:14px; }
  .vcard .def{ font-size:17px; color:#2a2a28; max-width:34ch; margin:0 auto; }
  .etym{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:13px; padding:13px 14px; margin:4px auto 14px; max-width:36ch; }
  .etym-h{ font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--grey); margin-bottom:9px; }
  .etym-bits{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; }
  .ebit{ display:inline-flex; flex-direction:column; align-items:center; background:var(--paper); border:1px solid var(--line-2); border-radius:9px; padding:5px 10px; min-width:48px; }
  .ebit b{ font-size:15px; color:var(--navy); } .ebit span{ font-size:11px; color:var(--grey); }
  .eplus{ color:var(--lav); font-weight:700; }
  .etym-gloss{ font-size:14.5px; color:var(--navy); font-weight:600; margin-top:10px; }
  .speakbtn{ display:inline-flex; align-items:center; gap:10px; margin:6px auto 0; border:2px solid var(--lav); background:var(--paper); color:var(--navy); font-weight:600; font-size:16px; padding:13px 22px; border-radius:999px; }
  .speakbtn .ic{ font-size:22px; }
  .speakbtn:active{ transform:scale(.97); }

  /* mic / speak step */
  .mic-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:18px; }
  .micbtn{ width:108px; height:108px; border-radius:50%; border:none; background:var(--navy); color:#fff; font-size:46px; display:grid; place-items:center; box-shadow:0 6px 0 rgba(0,0,0,.18); }
  .micbtn:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .micbtn.listening{ background:var(--wrong); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 0 rgba(180,52,30,.4); } 50%{ box-shadow:0 6px 0 rgba(0,0,0,.18), 0 0 0 16px rgba(180,52,30,0); } }
  .mic-status{ font-size:15px; color:var(--grey); min-height:24px; text-align:center; }
  .mic-status b{ color:var(--navy); }
  .heard{ font-size:15px; color:var(--navy); font-weight:600; }

  /* type-what-you-hear */
  .listen-big{ display:flex; justify-content:center; margin:20px 0; }
  .listen-big button{ width:84px; height:84px; border-radius:20px; border:none; background:var(--navy); color:#fff; font-size:38px; box-shadow:0 5px 0 rgba(0,0,0,.16); }
  .listen-big button:active{ transform:translateY(2px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .tinput{ width:100%; padding:15px 16px; font-family:inherit; font-size:18px; border:2px solid var(--line-2); border-radius:14px; background:var(--paper); color:var(--ink); outline:none; }
  .tinput:focus{ border-color:var(--navy); }
  .tinput.ok{ border-color:var(--green); background:var(--green-bg); color:var(--green); }
  .tinput.bad{ border-color:var(--wrong); background:var(--wrong-bg); }

  .opts{ display:flex; flex-direction:column; gap:11px; margin-top:14px; }
  .opt{ position:relative; text-align:left; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:15px 16px 15px 52px; font-size:16.5px; color:var(--ink); transition:border-color .12s, background .12s, transform .04s; }
  .opt:hover:not(:disabled){ border-color:var(--lav); }
  .opt:active:not(:disabled){ transform:translateY(1px); }
  .opt .num{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:8px; border:1.5px solid var(--line-2); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--grey); }
  .opt.sel{ border-color:var(--navy); background:#F4F6FC; } .opt.sel .num{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .opt.correct{ border-color:var(--green-line); background:var(--green-bg); } .opt.correct .num{ border-color:var(--green); background:var(--green); color:#fff; }
  .opt.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); } .opt.wrong .num{ border-color:var(--wrong); background:var(--wrong); color:#fff; }
  .opt.dim{ opacity:.55; }
  .opt .mk{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-weight:700; font-size:17px; }
  .opt.correct .mk{ color:var(--green); } .opt.wrong .mk{ color:var(--wrong); }
  .hint{ font-size:13.5px; color:var(--grey); margin-top:10px; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:14px; }
  .chip{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:14px; font-size:16px; text-align:left; }
  .chip.sel{ border-color:var(--navy); background:#F4F6FC; }
  .chip.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }
  .chip.miss{ border-color:var(--green); border-style:dashed; }

  .sentence{ font-size:19px; line-height:2.1; margin-top:16px; color:#2a2a28; }
  .blank{ display:inline-block; min-width:96px; border-bottom:2.5px solid var(--lav); margin:0 3px; text-align:center; color:var(--navy); font-weight:600; padding:0 6px; }
  .blank.filled{ border-bottom-color:var(--navy); }
  .blank button{ border:none; background:#F4F6FC; border-radius:8px; padding:4px 10px; font-size:16px; font-weight:600; color:var(--navy); }
  .blank.ok{ color:var(--green); border-bottom-color:var(--green); } .blank.ok button{ background:var(--green-bg); color:var(--green); }
  .blank.bad{ color:var(--wrong); border-bottom-color:var(--wrong); } .blank.bad button{ background:var(--wrong-bg); color:var(--wrong); }
  .bank{ display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
  .token{ background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:12px; padding:11px 16px; font-size:16px; font-weight:500; color:var(--ink); }
  .token:hover:not(:disabled){ border-color:var(--lav); }
  .token.used{ opacity:.32; pointer-events:none; }

  .match{ display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-top:16px; }
  .match .col{ display:flex; flex-direction:column; gap:11px; }
  .mitem{ position:relative; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:14px; padding:13px 13px; font-size:14.5px; text-align:left; min-height:52px; }
  .mitem:hover:not(:disabled){ border-color:var(--lav); }
  .mitem.active{ border-color:var(--navy); background:#F4F6FC; }
  .mitem.paired{ border-color:var(--lav); background:#FBFAF5; }
  .mitem .dot{ position:absolute; top:8px; right:9px; width:13px; height:13px; border-radius:50%; }
  .mitem.correct{ border-color:var(--green-line); background:var(--green-bg); }
  .mitem.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); }

  /* "Jump back in" hero — the one obvious next thing to do on the path */
  .cont-hero{ display:flex; align-items:center; gap:14px; width:100%; text-align:left; border:none; border-radius:18px; padding:16px 18px; margin:16px 0 4px; background:#1E2761; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.18); cursor:pointer; transition:transform .05s, box-shadow .05s; }
  .cont-hero:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.18); }
  .cont-hero .ch-ic{ width:52px; height:52px; border-radius:15px; background:rgba(255,255,255,.14); display:grid; place-items:center; font-size:26px; flex:none; }
  .cont-hero .ch-txt{ flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }
  .cont-hero .ch-k{ font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#C99528; }
  .cont-hero .ch-txt b{ font-size:17px; line-height:1.2; }
  .cont-hero .ch-l{ font-size:12.5px; opacity:.82; }
  .cont-hero .ch-go{ flex:none; width:40px; height:40px; border-radius:50%; background:#2C5F2D; display:grid; place-items:center; font-size:15px; color:#fff; box-shadow:0 3px 0 rgba(0,0,0,.2); }

  /* daily-goal chip in the top bar */
  .hbar .goal{ color:var(--grey); font-size:14px; }
  .hbar .goal.met{ color:var(--green); }

  /* feedback extras: combo bonus + "you'll see it again" note */
  .combo-xp{ font-size:13px; font-weight:700; color:var(--gold); margin-top:8px; }
  .redo-note{ font-size:13px; color:var(--grey); margin-top:8px; }

  /* completion celebrations */
  .cele{ margin:0 auto 10px; max-width:340px; background:#FFF1E3; border:1px solid #EFCBA0; color:#B4581E; border-radius:13px; padding:10px 14px; font-size:14.5px; font-weight:700; animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; }
  .cele.gold{ background:var(--gold-bg); border-color:#ECD9A8; color:#8a6400; }

  /* spaced-retrieval review banner */
  .review-banner{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; border:none; border-radius:16px; padding:15px 17px; margin:18px 0 6px; box-shadow:var(--shadow); }
  .review-banner.due{ background:var(--navy); color:#fff; }
  .review-banner.clear{ background:var(--paper); border:1px solid var(--line); box-shadow:none; }
  .review-banner .rb-ic{ font-size:24px; flex:none; }
  .review-banner .rb-txt{ flex:1; display:flex; flex-direction:column; gap:2px; min-width:0; }
  .review-banner .rb-txt b{ font-size:15.5px; }
  .review-banner.due .rb-txt span{ font-size:12.5px; opacity:.82; }
  .review-banner.clear .rb-txt b{ color:var(--navy); }
  .review-banner.clear .rb-txt span{ font-size:12.5px; color:var(--grey); }
  .review-banner .rb-go{ flex:none; background:var(--gold); color:#fff; font-weight:700; font-size:13px; padding:8px 13px; border-radius:999px; }
  .review-banner.weak{ background:#fff; border:1.5px solid var(--gold); box-shadow:none; }
  .review-banner.weak .rb-txt b{ color:#8a6400; } .review-banner.weak .rb-txt span{ font-size:12.5px; color:var(--grey); }

  /* diagram (tap the part) */
  .diagram{ position:relative; width:100%; max-width:560px; margin:16px auto 8px; background:var(--paper); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .diagram svg{ display:block; }
  .hotspot{ position:absolute; width:50px; height:50px; transform:translate(-50%,-50%); border-radius:50%; border:3px solid var(--navy); background:rgba(255,255,255,.86); cursor:pointer; box-shadow:0 4px 0 rgba(30,39,97,.2),0 0 0 7px rgba(255,255,255,.78),0 0 0 11px rgba(30,39,97,.08); z-index:5; touch-action:manipulation; }
  .hotspot:after{ content:""; position:absolute; inset:13px; border-radius:50%; background:var(--navy); opacity:.3; }
  .hotspot:hover:not(:disabled){ background:#fff; box-shadow:0 4px 0 rgba(30,39,97,.2),0 0 0 9px var(--lav-pale),0 0 0 14px rgba(30,39,97,.08); }
  .hotspot.sel{ border-color:var(--lav); background:#fff; box-shadow:0 4px 0 rgba(30,39,97,.2),0 0 0 9px var(--lav-pale),0 0 0 14px rgba(30,39,97,.08); }
  .hotspot.sel:after{ background:var(--lav); opacity:.85; }
  .hotspot.correct{ border-color:var(--green); background:#fff; box-shadow:0 4px 0 rgba(30,39,97,.12),0 0 0 7px var(--green-bg); }
  .hotspot.correct:after{ background:var(--green); opacity:.9; }
  .hotspot.wrong{ border-color:var(--wrong); background:#fff; box-shadow:0 4px 0 rgba(30,39,97,.12),0 0 0 7px var(--wrong-bg); }
  .hotspot.wrong:after{ background:var(--wrong); opacity:.9; }
  /* Diagram labelling capstone (dmatch) */
  .dpin{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:2px; padding:0; border:0; background:none; cursor:pointer; z-index:2; }
  .dpin .pn{ width:34px; height:34px; border-radius:50%; background:var(--navy); color:#fff; font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; border:3px solid #fff; box-shadow:0 2px 0 rgba(30,39,97,.18),0 0 0 6px rgba(255,255,255,.72); }
  .dpin .pl{ font-size:11px; font-weight:600; line-height:1.15; max-width:96px; text-align:center; background:var(--navy); color:#fff; padding:2px 6px; border-radius:7px; }
  .dpin .pl.corr{ background:var(--green); }
  .dpin.filled .pn{ background:var(--phys); }
  .dpin.correct .pn{ background:var(--green); } .dpin.correct .pl{ background:var(--green); }
  .dpin.wrong .pn{ background:var(--wrong); }
  .dbank{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0 4px; }
  .dchip{ font:inherit; font-size:14px; font-weight:600; padding:8px 13px; border-radius:999px; border:1.5px solid var(--line-2); background:var(--paper); color:var(--ink); cursor:pointer; box-shadow:var(--shadow); }
  .dchip.sel{ border-color:var(--navy); background:var(--lav-pale); box-shadow:0 0 0 3px var(--lav-pale); }
  .dchip.used{ opacity:.32; text-decoration:line-through; cursor:default; }
  /* Worked example */
  .teach.worked{ text-align:left; }
  .worked-q{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:12px; padding:12px 15px; margin:6px 0 4px; font-size:15.5px; line-height:1.5; color:var(--ink); font-weight:600; }
  .worked-steps{ margin-top:6px; }
  .wstep{ padding:11px 0 3px; border-top:1px dashed var(--line); margin-top:10px; }
  .wstep:first-child{ border-top:0; }
  .ws-label{ display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:700; color:var(--grey); text-transform:uppercase; letter-spacing:.04em; }
  .ws-n{ flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:var(--navy); color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; }
  .ws-line{ margin-top:6px; padding-left:31px; font-family:'IBM Plex Sans',monospace; font-size:16px; font-weight:600; color:var(--navy); line-height:1.5; }
  .wanswer{ margin-top:14px; padding:10px 15px; border-radius:12px; background:rgba(44,95,45,.1); border:1px solid var(--line-2); font-size:15.5px; color:var(--ink); }
  .wanswer b{ color:var(--green); font-size:17px; }
  .pop{ animation:dpop .32s ease-out; }

  /* progressive build-up diagram (one label revealed per fact) */
  .bdiagram{ position:relative; width:100%; max-width:520px; margin:14px auto 4px; background:#fbfdff; border:2px solid #dbe4ee; border-bottom-width:5px; border-radius:26px; box-shadow:var(--shadow); overflow:hidden; }
  .bdiagram svg{ display:block; }
  .diagram-stage-bg{ fill:url(#dg-bg); }
  .diagram-art{ filter:url(#dg-art-shadow); }
  .diagram-art [stroke="#1E2761"], .diagram-art [stroke='#1E2761']{ stroke:#243144; }
  .diagram-art [fill="#1E2761"], .diagram-art [fill='#1E2761']{ fill:#243144; }
  .diagram-focus-layer{ pointer-events:none; }
  .dg-halo{ fill:none; stroke:#58cc02; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; filter:url(#dg-halo-blur); animation:dg-halo 1.4s ease-in-out infinite; pointer-events:none; }
  .dg-pop-dot{ fill:#58cc02; stroke:#fff; stroke-width:3; filter:url(#dg-pop-shadow); animation:dg-pop .36s cubic-bezier(.2,1.35,.35,1) both; pointer-events:none; }
  .diagram-art [data-part]{ transform-box:fill-box; transform-origin:center; transition:opacity .34s ease, transform .34s cubic-bezier(.2,1.15,.35,1), filter .34s ease; }
  .diagram-art [data-part].dg-hidden{ opacity:.14; transform:none; filter:grayscale(1); pointer-events:none; }
  .bdiagram.dq .diagram-art [data-part].dg-hidden{ opacity:0; transform:translateY(8px) scale(.94); }
  .diagram-art [data-part].dg-revealed{ opacity:1; transform:none; }
  .diagram-art [data-part].dg-current{ opacity:1; transform:none; filter:url(#dg-pop-shadow); animation:dg-pop .36s cubic-bezier(.2,1.35,.35,1) both; }
  .diagram-build-chip{ position:absolute; top:12px; left:12px; z-index:4; display:flex; align-items:center; gap:9px; padding:8px 10px; border:2px solid #dbe4ee; border-radius:999px; background:rgba(255,255,255,.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:#243144; font-size:12px; font-weight:1000; box-shadow:0 4px 16px rgba(15,23,42,.08); }
  .diagram-build-chip b{ color:#3f9f00; }
  .diagram-progress{ width:68px; height:8px; border-radius:999px; background:#e9eef5; overflow:hidden; border:1px solid #dbe4ee; }
  .diagram-progress i{ display:block; height:100%; width:0; border-radius:999px; background:linear-gradient(90deg,#58cc02,#9be600); }
  @keyframes dg-pop{ 0%{ opacity:0; transform:scale(.82); } 100%{ opacity:1; transform:none; } }
  @keyframes dg-halo{ 0%,100%{ opacity:.35; } 50%{ opacity:.95; } }
  .dlabel{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none; z-index:2; }
  .dlabel.edge-left{ transform:translate(0,-50%); align-items:flex-start; }
  .dlabel.edge-right{ transform:translate(-100%,-50%); align-items:flex-end; }
  .ddot{ width:15px; height:15px; border-radius:50%; background:#fff; border:3px solid #1cb0f6; box-shadow:0 2px 0 rgba(30,39,97,.16),0 0 0 5px rgba(28,176,246,.14); }
  .dtag{ font:900 11px/1.1 ui-rounded,system-ui; color:#243144; background:rgba(255,255,255,.94); border:2px solid #dbe4ee; border-radius:999px; padding:4px 8px; white-space:nowrap; box-shadow:0 8px 20px rgba(15,23,42,.12); }
  /* Cognitive load: already-taught parts keep only a faint dot as a spatial anchor —
     their text tags hide so the one part being explained now is the only label to read.
     (The full label set returns in the "label the diagram" capstone.) */
  .dlabel:not(.cur){ opacity:.55; }
  .dlabel .dtag{ display:none; }
  .dlabel.cur{ z-index:3; animation:dpop .35s ease-out; }
  .dlabel.cur .ddot{ background:#58cc02; border-color:#fff; box-shadow:0 0 0 5px rgba(88,204,2,.22),0 4px 0 rgba(63,159,0,.24); animation:dpulse 1.5s ease-out infinite; }
  @keyframes dpulse{ 0%{box-shadow:0 0 0 0 rgba(30,39,97,.45)} 100%{box-shadow:0 0 0 11px rgba(30,39,97,0)} }
  @keyframes dpop{ 0%{transform:translate(-50%,-50%) scale(.6); opacity:0} 100%{transform:translate(-50%,-50%) scale(1); opacity:1} }
  .motion-off .dlabel.cur,.motion-off .dlabel.cur .ddot{ animation:none; }
  /* Per-part explanation caption — narrates what's happening at the newly revealed part */
  .dnotes{ margin:2px auto 4px; max-width:400px; }
  .dnote{ display:flex; flex-direction:column; gap:2px; background:var(--lav-pale); border:1px solid var(--line-2); border-left:3px solid var(--navy); border-radius:10px; padding:9px 13px; margin-top:8px; text-align:left; animation:dpop .3s ease-out; }
  .dnote-k{ font-size:12px; font-weight:800; letter-spacing:.02em; color:var(--navy); text-transform:uppercase; }
  .dnote-t{ font-size:14.5px; line-height:1.45; color:var(--ink); }
  .motion-off .dnote{ animation:none; }

  /* ===== Living-diagram simulation layer =====
     SVG elements tagged class="sm-…" come alive; elements tagged data-part="id"
     stay hidden until the matching fact reveals them (set by applyLiveDiagram),
     so the picture assembles AND moves as the student learns. The global
     a11y-motion-off / prefers-reduced-motion rules above already stop all of it. */
  .bdiagram svg [class*="sm-"]{ transform-box:fill-box; transform-origin:center; }
  .bdiagram svg [data-part]{ transition:opacity .55s ease, transform .55s ease; }
  .sm-spin{ animation:sm-spin 3s linear infinite; }
  .sm-spin-slow{ animation:sm-spin 9s linear infinite; }
  .sm-spin-rev{ animation:sm-spin 3s linear infinite reverse; }
  .sm-flow{ animation:sm-flow 1s linear infinite; }
  .sm-flow-slow{ animation:sm-flow 2.2s linear infinite; }
  .sm-flow-rev{ animation:sm-flow-rev 1.4s linear infinite; }
  .sm-pulse{ animation:sm-pulse 1.6s ease-in-out infinite; }
  .sm-throb{ animation:sm-throb 1s ease-in-out infinite; }
  .sm-drift{ animation:sm-drift 2.6s ease-in-out infinite; }
  .sm-osc{ animation:sm-osc 1.8s ease-in-out infinite; }
  .sm-osc-x{ animation:sm-osc-x 1.8s ease-in-out infinite; }
  .sm-rise{ animation:sm-rise 2.6s ease-in infinite; }
  .sm-fall{ animation:sm-fall 2.6s ease-in infinite; }
  .sm-blink{ animation:sm-blink 1.4s ease-in-out infinite; }
  .sm-glow{ animation:sm-glow 2s ease-in-out infinite; }
  .sm-shake{ animation:sm-shake .3s ease-in-out infinite; }
  .sm-sweep{ animation:sm-sweep 2.8s ease-in-out infinite; }
  @keyframes sm-spin{ to{ transform:rotate(360deg); } }
  @keyframes sm-flow{ to{ stroke-dashoffset:-24; } }
  @keyframes sm-flow-rev{ to{ stroke-dashoffset:24; } }
  @keyframes sm-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.13); } }
  @keyframes sm-throb{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  @keyframes sm-drift{ 0%{ transform:translate(0,0); } 25%{ transform:translate(2px,-2.5px); } 50%{ transform:translate(-2.5px,1.5px); } 75%{ transform:translate(1.5px,2px); } 100%{ transform:translate(0,0); } }
  @keyframes sm-osc{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  @keyframes sm-osc-x{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(5px); } }
  @keyframes sm-rise{ 0%{ transform:translateY(2px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(-16px); opacity:0; } }
  @keyframes sm-fall{ 0%{ transform:translateY(-14px); opacity:0; } 25%{ opacity:.85; } 100%{ transform:translateY(4px); opacity:0; } }
  @keyframes sm-blink{ 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
  @keyframes sm-glow{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  @keyframes sm-shake{ 0%,100%{ transform:translate(0,0); } 25%{ transform:translate(.9px,-.9px); } 75%{ transform:translate(-.9px,.9px); } }
  @keyframes sm-sweep{ 0%{ transform:translateX(-6px); opacity:.35; } 50%{ opacity:1; } 100%{ transform:translateX(6px); opacity:.35; } }

  /* settings sheet */
  .sheet-ov{ position:fixed; inset:0; z-index:80; background:rgba(20,20,20,.45); display:flex; align-items:flex-end; justify-content:center; }
  .sheet{ width:100%; max-width:680px; background:var(--cream); border-radius:20px 20px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); animation:slideup .22s ease both; }
  @keyframes slideup{ from{ transform:translateY(40px); opacity:.6; } to{ transform:none; opacity:1; } }
  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .sheet-head h2{ font-size:22px; color:var(--navy); }
  .set-row{ display:flex; align-items:center; gap:12px; padding:14px 2px; border-top:1px solid var(--line); }
  .set-l{ flex:1; display:flex; flex-direction:column; gap:2px; }
  .set-l b{ font-size:15px; } .set-l span{ font-size:12.5px; color:var(--grey); }
  .seg-opts{ display:flex; gap:6px; }
  .seg-opt{ width:38px; height:38px; border:1.5px solid var(--line); background:var(--paper); border-radius:10px; color:var(--navy); }
  .seg-opt:nth-child(1){ font-size:13px; } .seg-opt:nth-child(2){ font-size:17px; } .seg-opt:nth-child(3){ font-size:22px; }
  .seg-opt.on{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .a11y-toggle{ flex:none; width:52px; height:30px; border-radius:999px; border:none; background:#D9D7CB; position:relative; transition:background .15s; }
  .a11y-toggle.on{ background:var(--green); }
  .a11y-toggle .knob{ position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .a11y-toggle.on .knob{ left:25px; }

  /* badges */
  .badge-won{ display:flex; flex-direction:column; gap:8px; margin:4px auto 18px; max-width:340px; }
  .badge-won .bw{ display:flex; align-items:center; gap:11px; background:#FFF7E8; border:1px solid #ECD9A8; border-radius:13px; padding:11px 14px; text-align:left; }
  .badge-won .bwi{ font-size:26px; } .badge-won .bw b{ display:block; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:#8a6400; } .badge-won .bw span{ font-size:15px; font-weight:600; color:var(--navy); }
  .badge-sub{ font-size:13px; color:var(--grey); margin-bottom:12px; }
  .badges{ display:grid; grid-template-columns:repeat(3,1fr); gap:11px; }
  .badge{ display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; padding:13px 6px; border-radius:14px; border:1px solid var(--line); background:var(--paper); }
  .badge .bi{ font-size:28px; } .badge .bn{ font-size:11.5px; font-weight:600; line-height:1.2; }
  .badge.off{ opacity:.42; filter:grayscale(1); }
  .badge.on{ border-color:var(--gold); background:#FFFDF6; }

  /* accessibility modes */
  html.a11y-lg{ zoom:1.12; } html.a11y-xl{ zoom:1.26; }
  html.a11y-readable body, html.a11y-readable .fr, html.a11y-readable .prompt, html.a11y-readable .term{ font-family:'Trebuchet MS','Verdana',sans-serif !important; letter-spacing:.012em; word-spacing:.06em; }
  html.a11y-readable .teach p, html.a11y-readable .opt, html.a11y-readable .def{ line-height:1.7; }
  html.a11y-contrast{ --ink:#0e0e0e; --grey:#33363f; --line:#9a958a; --line-2:#6b76a8; --cream:#fbf9f3; }
  html.a11y-contrast .opt, html.a11y-contrast .chip, html.a11y-contrast .mitem, html.a11y-contrast .token{ border-width:2px; }
  html.a11y-motion-off *{ animation:none !important; transition:none !important; }

  /* numeric */
  .formula{ display:inline-block; font-family:'IBM Plex Sans',monospace; background:#F4F6FC; border:1px solid var(--line-2); color:var(--navy); font-weight:600; padding:7px 13px; border-radius:10px; margin:4px 0 6px; font-size:15px; }
  .num-row{ display:flex; align-items:center; gap:12px; margin-top:14px; }
  .tinput.num{ max-width:200px; font-size:22px; font-weight:600; text-align:center; }
  .num-unit{ font-size:18px; font-weight:600; color:var(--navy); }

  /* exam-style cards (reveal mark scheme) */
  .exam-marks{ display:inline-block; font-family:'IBM Plex Sans',monospace; background:var(--navy); color:#fff; font-weight:700; padding:3px 11px; border-radius:999px; font-size:12.5px; letter-spacing:.02em; margin-bottom:8px; }
  .exam-stem{ background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:16px 18px; margin-top:8px; font-size:15px; line-height:1.5; color:var(--ink); }
  .scheme{ background:#F4F6FC; border:1px solid var(--line-2); border-radius:14px; padding:14px 16px; margin-top:16px; }
  .scheme-h{ font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--grey); margin-bottom:8px; }
  .scheme ul{ margin:0; padding:0; list-style:none; }
  .scheme li{ position:relative; padding:5px 0 5px 24px; font-size:14.5px; color:var(--ink); line-height:1.42; }
  .scheme li:before{ content:"✓"; position:absolute; left:0; top:5px; color:var(--phys); font-weight:800; }
  .scheme .model{ margin-top:11px; padding-top:11px; border-top:1px dashed var(--line); font-size:14px; color:var(--ink); line-height:1.45; }
  /* Guided exam builder */
  .exam-coach{ display:block; background:rgba(30,39,97,.06); border:1px solid var(--line-2); border-radius:12px; padding:10px 14px; margin-top:10px; font-size:14px; line-height:1.45; color:var(--ink); }
  .exam-coach .cw{ display:inline-block; font-family:'IBM Plex Sans',monospace; font-weight:700; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; background:var(--navy); color:#fff; border-radius:999px; padding:2px 9px; margin-right:7px; }
  .exam-ta{ width:100%; box-sizing:border-box; margin-top:12px; padding:12px 14px; border:1.5px solid var(--line-2); border-radius:14px; background:var(--paper); color:var(--ink); font:inherit; font-size:15px; line-height:1.5; resize:vertical; min-height:110px; }
  .exam-ta:focus{ outline:none; border-color:var(--navy); }
  .exam-ta[readonly]{ opacity:.75; }
  .scheme .spt{ display:flex; gap:10px; align-items:flex-start; width:100%; text-align:left; background:none; border:0; border-radius:10px; padding:7px 6px; margin:0; cursor:pointer; font:inherit; font-size:14.5px; color:var(--ink); line-height:1.42; }
  .scheme .spt:hover{ background:rgba(30,39,97,.05); }
  .scheme .spt .tick{ flex:0 0 auto; width:22px; height:22px; margin-top:1px; border-radius:7px; border:2px solid var(--line-2); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#fff; background:transparent; transition:all .15s ease; }
  .scheme .spt.on .tick{ background:var(--green); border-color:var(--green); }
  .scheme .spt.on .pt-t{ font-weight:600; }
  .exam-score{ margin-top:12px; padding:9px 14px; border-radius:999px; background:var(--navy); color:#fff; display:inline-block; font-size:14px; }
  .exam-score b{ font-size:16px; }
  .exam-head{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .exam-head .exam-marks{ margin-bottom:0; }
  .lvl{ font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:999px; background:rgba(44,95,45,.16); color:var(--green); }
  .lvl.exam{ background:rgba(180,52,30,.14); color:var(--wrong); }
  .exam-coach.ghost{ background:rgba(180,52,30,.05); border-color:var(--line-2); font-size:13.5px; }
  .exam-plan{ background:rgba(44,95,45,.06); border:1px solid var(--line-2); border-radius:14px; padding:12px 16px 14px; margin-top:12px; }
  .plan-h{ font-size:13.5px; font-weight:700; color:var(--ink); margin-bottom:8px; line-height:1.4; }
  .plan-list{ margin:0; padding-left:20px; }
  .plan-list li{ font-size:14px; color:var(--ink); line-height:1.42; padding:3px 0; }
  .plan-note{ margin-top:9px; font-size:12.5px; color:var(--grey); font-style:italic; }

  /* categorise */
  .cat-pool{ display:flex; flex-wrap:wrap; gap:9px; margin:14px 0 16px; min-height:46px; padding:8px; border:1.5px dashed var(--line); border-radius:14px; }
  .cat-chip{ background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:12px; padding:10px 13px; font-size:14.5px; text-align:left; color:var(--ink); }
  .cat-chip:hover:not(:disabled){ border-color:var(--lav); }
  .cat-chip.active{ border-color:var(--navy); background:#F4F6FC; box-shadow:0 0 0 3px var(--lav-pale); }
  .cat-chip.correct{ border-color:var(--green-line); background:var(--green-bg); color:var(--green); }
  .cat-chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); color:var(--wrong); }
  .cat-bins{ display:grid; gap:10px; }
  .bin{ background:#FBFAF5; border:1.5px solid var(--line-2); border-radius:14px; padding:10px 9px; min-height:96px; }
  .bin-head{ font-size:11.5px; font-weight:700; color:var(--navy); text-transform:uppercase; letter-spacing:.03em; margin-bottom:9px; text-align:center; }
  .bin-body{ display:flex; flex-direction:column; gap:8px; }
  .bin-body .cat-chip{ width:100%; }

  /* order */
  .order-ans{ display:flex; flex-direction:column; gap:9px; margin:14px 0 14px; }
  .order-slot{ display:flex; align-items:center; gap:11px; background:#FBFAF5; border:1.5px solid var(--line-2); border-radius:12px; padding:5px 8px; min-height:52px; }
  .order-slot .nidx{ width:28px; height:28px; border-radius:8px; background:var(--lav-pale); color:var(--navy); display:grid; place-items:center; font-weight:700; font-size:14px; flex:none; }
  .slot-fill{ flex:1; }
  .order-pool{ display:flex; flex-wrap:wrap; gap:9px; }
  .order-chip{ width:100%; background:var(--paper); border:1.5px solid var(--line); border-bottom-width:3px; border-radius:11px; padding:11px 14px; font-size:15px; text-align:left; color:var(--ink); }
  .order-pool .order-chip{ width:auto; }
  .order-chip:hover:not(:disabled){ border-color:var(--lav); }
  .order-chip.correct{ border-color:var(--green-line); background:var(--green-bg); color:var(--green); }
  .order-chip.wrong{ border-color:var(--wrong-line); background:var(--wrong-bg); color:var(--wrong); }

  .footer{ position:fixed; left:0; right:0; bottom:0; z-index:30; }
  .footer .inner{ max-width:680px; margin:0 auto; padding:16px 18px calc(16px + env(safe-area-inset-bottom)); background:var(--cream); border-top:1px solid var(--line); }
  .footer.fb-ok .inner{ background:var(--green-bg); border-top-color:var(--green-line); }
  .footer.fb-bad .inner{ background:var(--wrong-bg); border-top-color:var(--wrong-line); }
  .fbhead{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .fbhead .ic{ width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-weight:800; color:#fff; flex:none; }
  .fb-ok .fbhead .ic{ background:var(--green); } .fb-bad .fbhead .ic{ background:var(--wrong); }
  .fbhead h3{ font-size:18px; } .fb-ok .fbhead h3{ color:var(--green); } .fb-bad .fbhead h3{ color:var(--wrong); }
  .fbwhy{ font-size:15px; color:#2a2a28; margin-bottom:14px; } .fbwhy b{ color:var(--navy); } .fb-bad .fbwhy .ans{ color:var(--green); font-weight:600; }
  .btn{ display:block; width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; box-shadow:0 4px 0 rgba(0,0,0,.14); transition:transform .05s, box-shadow .05s, background .15s; }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.14); }
  .btn-primary{ background:var(--navy); color:#fff; } .btn-primary:disabled{ background:#D9D7CB; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.07); cursor:not-allowed; }
  .btn-go{ background:var(--green); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--grey); box-shadow:none; border:1.5px solid var(--line-2); text-transform:none; font-weight:600; padding:12px; }
  .footer .row2{ display:flex; gap:10px; }
  .footer .row2 .btn{ flex:1; }

  /* done */
  .complete{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:30px 24px 40px; text-align:center; }
  .complete .trophy{ font-size:66px; margin-bottom:6px; animation:pop .5s cubic-bezier(.2,1.4,.4,1) both; }
  .complete h1{ font-size:30px; color:var(--navy); margin-bottom:6px; }
  .complete .sub{ font-size:15.5px; color:#3a3a36; margin-bottom:24px; }
  .dstats{ display:flex; gap:12px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  .dstat{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:15px 20px; min-width:96px; }
  .dstat .v{ font-size:28px; font-weight:700; line-height:1; } .dstat.xp .v{ color:var(--gold); } .dstat.acc .v{ color:var(--green); } .dstat.str .v{ color:#D9831F; }
  .dstat .l{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey); margin-top:7px; }
  .complete .actions{ max-width:340px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:11px; }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .fade{ animation:fade .28s ease both; } @keyframes fade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  /* cover */
  .cover{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:36px 24px; text-align:center; }
  .cover .badge2{ align-self:center; background:var(--navy); color:var(--lav-pale); font-size:11.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; padding:7px 14px; border-radius:999px; margin-bottom:20px; }
  .cover .mascot{ font-size:60px; margin-bottom:10px; }
  .cover h1{ font-size:34px; line-height:1.05; color:var(--navy); margin-bottom:12px; }
  .cover .lede{ font-size:16.5px; color:#3a3a36; max-width:40ch; margin:0 auto 24px; }
  .cover .cta{ max-width:340px; margin:0 auto; width:100%; }
  .colophon{ text-align:center; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--grey); opacity:.7; padding:18px; }

  /* interactive widgets (canvas, mounted in a lesson step) */
  .ixfact{ font:500 16px/1.45 "Fraunces",Georgia,serif; color:#26261f; margin:4px 2px 12px; min-height:46px; }
  .ixcanvas{ display:block; width:100%; border-radius:16px; background:radial-gradient(130% 120% at 50% 0,#fcfdff,#eceef7); }
  .ixctrls{ display:flex; gap:8px; margin-top:14px; }
  .ixbtn{ flex:1; font:800 14px/1 inherit; padding:11px; border-radius:12px; border:2px solid var(--navy); background:#fff; color:var(--navy); cursor:pointer; }
  .ixbtn.primary{ background:var(--navy); color:#fff; }
  .ixbtn:disabled{ opacity:.4; cursor:default; }
  .ixread{ text-align:center; font:700 13px ui-monospace,monospace; color:var(--navy); margin-top:10px; }
  .ixbar{ display:inline-block; width:110px; height:8px; background:var(--lav-pale); border-radius:5px; vertical-align:middle; margin:0 6px; overflow:hidden; }
  .ixbar i{ display:block; height:100%; background:var(--wrong); width:0; transition:width .3s; }
  .ixslider{ display:flex; align-items:center; gap:10px; margin:8px 2px; font:700 12px inherit; color:var(--navy); }
  .ixslider input{ flex:1; accent-color:var(--navy); }
  /* Backward-faded worked example: the final step the learner completes */
  .wstep-fade{ border-top-style:solid; border-top-color:var(--navy); }
  .wfill{ display:flex; align-items:center; gap:10px; margin-top:6px; padding-left:31px; }
  .wfill .tinput{ font-family:'IBM Plex Sans',monospace; }
  .wfade-hint{ padding-left:31px; margin-top:8px; }
  .wstep-model{ margin-top:2px; padding-top:0; border-top:0; }

  /* Open learner model — mastery heat-grid */
  .mastery-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:8px; margin-top:4px; }
  .mtile{ position:relative; aspect-ratio:1; border-radius:12px; display:grid; place-items:center; font-size:20px; border:1.5px solid transparent; cursor:default; }
  .mtile[data-mastery-code]{ cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .mtile:active[data-mastery-code]{ transform:scale(.94); }
  .mtile .mbar{ position:absolute; left:5px; right:5px; bottom:5px; height:4px; border-radius:999px; background:rgba(0,0,0,.12); overflow:hidden; }
  .mtile .mbar > i{ display:block; height:100%; border-radius:999px; }
  .mtile.weak{ background:var(--gold-bg); border-color:var(--gold); }
  .mtile.weak .mbar > i{ background:var(--gold); }
  .mtile.dev{ background:var(--lav-pale); border-color:var(--lav); }
  .mtile.dev .mbar > i{ background:var(--lav); }
  .mtile.strong{ background:var(--green-bg); border-color:var(--green); }
  .mtile.strong .mbar > i{ background:var(--green); }
  .mlegend{ display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; font-size:11.5px; color:var(--grey); }
  .mlegend span{ display:inline-flex; align-items:center; gap:5px; }
  .mlegend i{ width:11px; height:11px; border-radius:4px; display:inline-block; }
  .mlegend i.weak{ background:var(--gold); } .mlegend i.dev{ background:var(--lav); } .mlegend i.strong{ background:var(--green); }
  .mhint{ font-size:11.5px; color:var(--grey); margin-top:8px; }

  /* Recall / self-explanation / confidence / streak-freeze */
  .recall-prompt{ font-size:18px; font-weight:600; color:var(--ink); line-height:1.4; margin:2px 0 4px; }
  .recall-model{ margin-top:14px; padding:12px 15px; border-radius:12px; background:rgba(44,95,45,.1); border:1px solid var(--line-2); font-size:15.5px; color:var(--ink); line-height:1.45; }
  .recall-model b{ color:var(--green); }
  .recall-model .rm-k{ display:block; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--grey); margin-bottom:5px; }
  .conf-pills{ display:flex; gap:9px; align-items:center; margin:12px 0 2px; }
  .conf-pills .cl{ font-size:12.5px; color:var(--grey); margin-right:2px; }
  .conf-pill{ border:1.5px solid var(--line-2); background:var(--paper); color:var(--ink); border-radius:999px; padding:5px 13px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; }
  .conf-pill.on{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .calib-nudge{ margin-top:10px; font-size:13.5px; color:#B26A00; font-weight:600; }
  .selfx{ margin-top:12px; }
  .selfx-btn{ border:1.5px dashed var(--line-2); background:transparent; color:var(--ink); border-radius:12px; padding:9px 14px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .selfx-btn:hover{ background:rgba(30,39,97,.05); }
  .selfx-hint{ font-size:13px; color:var(--grey); margin-bottom:7px; }
  .freeze-chip{ display:inline-flex; align-items:center; gap:4px; font-size:12.5px; font-weight:700; color:#2E6DB4; }

  /* ============ DARK THEME (Duolingo-style glassmorphism) ============ */
  :root{
    --cream:#0a1626; --paper:rgba(255,255,255,.065); --ink:#eef4ff; --navy:#cfe0ff;
    --grey:#9fb0c7; --line:rgba(255,255,255,.12); --line-2:rgba(255,255,255,.16);
    --green:#58e0c2; --green-bg:rgba(88,224,194,.14); --green-line:rgba(88,224,194,.34);
    --wrong:#ff7da3; --wrong-bg:rgba(255,107,154,.15); --wrong-line:rgba(255,107,154,.34);
    --gold:#ffd166; --gold-bg:rgba(255,209,102,.16); --lav:#79a7ff; --lav-pale:rgba(255,255,255,.14);
    --line-2:rgba(255,255,255,.16);
    --shadow:0 18px 50px rgba(0,0,0,.34);
    --accent:linear-gradient(135deg,#58e0c2,#79a7ff);
  }
  body{ color:#eef4ff;
    background:
      radial-gradient(circle at 15% 0%, rgba(88,224,194,.16), transparent 32%),
      radial-gradient(circle at 90% 8%, rgba(121,167,255,.18), transparent 34%),
      linear-gradient(180deg,#06111f 0%,#081528 48%,#05101e 100%);
    background-attachment:fixed; }
  /* top bar */
  .hbar{ background:rgba(8,18,33,.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,.10); }
  .hbar .streak{ color:#ffce63; }
  .hbar .snd:hover{ background:rgba(255,255,255,.10); }
  .seg{ background:rgba(255,255,255,.06); }
  .seg button.on{ background:rgba(255,255,255,.14); color:#fff; box-shadow:none; }
  .yearjump button{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.12); color:#cdd8ea; }
  /* year + unit cards */
  .yr-head .yl{ color:#9af0dd; }
  .unit{ background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 18px 50px rgba(0,0,0,.30); }
  .unit.locked{ background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.07); }
  .unit .meta .t{ color:#f1f6ff; }
  /* path nodes */
  .node .ring{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); color:#eef4ff; box-shadow:0 8px 20px rgba(0,0,0,.32); }
  .node.done .ring{ background:linear-gradient(135deg,#58e0c2,#7dffd4); border-color:#58e0c2; color:#04201a; box-shadow:0 10px 24px rgba(88,224,194,.28); }
  .node.next .ring{ background:rgba(255,209,102,.12); border-color:#ffd166; color:#ffe6a3; box-shadow:0 0 0 4px rgba(255,209,102,.2),0 10px 24px rgba(0,0,0,.3); }
  .node.locked .ring{ background:rgba(255,255,255,.04); }
  .node.recap .ring{ background:rgba(255,209,102,.12); border-color:#ffd166; color:#ffe6a3; }
  .node.recap.done .ring{ background:linear-gradient(135deg,#ffd166,#ffe39a); color:#3a2c00; }
  .node .start-pill{ background:linear-gradient(135deg,#ffd166,#ffb443); color:#3a2c00; }
  /* lesson content cards */
  .teach{ background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
  .teach h2,.prompt,.vcard .term,.teach b,.etym-gloss,.ebit b,.vcard,.mic-status b,.heard{ color:#eaf1ff; }
  .teach p,.vcard .def,.sentence{ color:#d4e0f3; }
  /* keep diagram + interactive SCREENS light so navy line-art stays legible */
  .bdiagram{ background:#fff; border-color:rgba(255,255,255,.25); }
  .dchip{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.18); color:#eef4ff; }
  .dchip.sel{ background:rgba(88,224,194,.16); border-color:#58e0c2; box-shadow:0 0 0 3px rgba(88,224,194,.18); }
  .dnote{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.14); border-left-color:var(--accent); }
  .dnote-k{ color:var(--accent); }
  .dnote-t{ color:#eaf1ff; }
  .worked-q{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.14); color:#eaf1ff; }
  .ws-line{ color:#bfe6ff; }
  .wanswer{ background:rgba(88,224,194,.08); border-color:rgba(255,255,255,.14); color:#eaf1ff; }
  .wanswer b{ color:#58e0c2; }
  .wstep-fade{ border-top-color:var(--accent); }
  .ixfact{ color:#eaf1ff; } .ixread{ color:#cdd8ea; }
  .ixbtn{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.22); color:#eef4ff; }
  .ixbtn.primary{ background:var(--accent); border-color:transparent; color:#06111f; }
  /* question elements */
  .opt,.chip,.token,.tinput{ background:rgba(255,255,255,.05); color:#eef4ff; }
  .opt .num{ color:#9fb0c7; }
  .opt.sel{ background:rgba(121,167,255,.16); } .opt.sel .num{ background:#79a7ff; border-color:#79a7ff; }
  .opt:hover:not(:disabled),.token:hover:not(:disabled){ border-color:#79a7ff; }
  .etym,.ebit,.blank button{ background:rgba(255,255,255,.06); }
  .blank button{ color:#cfe0ff; }
  /* buttons */
  .btn-primary{ background:var(--accent); color:#06111f; box-shadow:0 6px 0 rgba(0,0,0,.3); }
  .btn-primary:disabled{ background:rgba(255,255,255,.1); color:#7d8aa3; box-shadow:0 6px 0 rgba(0,0,0,.18); }
  .btn-go{ background:linear-gradient(135deg,#58e0c2,#34c9a6); color:#04201a; }
  .btn-ghost{ border-color:rgba(255,255,255,.2); color:#cdd8ea; }
  .micbtn,.listen-big button{ background:var(--accent); color:#06111f; }
  .speakbtn{ background:rgba(255,255,255,.06); border-color:#79a7ff; color:#eaf1ff; }
  /* lesson chrome */
  .footer .inner{ background:rgba(8,18,33,.85); border-top:1px solid rgba(255,255,255,.1); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
  .footer.fb-ok .inner{ background:rgba(88,224,194,.14); border-top-color:var(--green-line); }
  .footer.fb-bad .inner{ background:rgba(255,107,154,.14); border-top-color:var(--wrong-line); }
  /* categorise */
  .cat-chip,.bin{ background:rgba(255,255,255,.05); }
  .bin-head{ color:#cfe0ff; }
  /* settings sheet + cover */
  .sheet{ background:#0c1b30; }
  .seg-opt{ background:rgba(255,255,255,.06); color:#eaf1ff; }
  .seg-opt.on{ background:var(--accent); border-color:transparent; color:#06111f; }
  .cover{ background:transparent; } .cover h1{ color:#eaf1ff; }
  .cover .badge2{ background:var(--accent); color:#06111f; }
  /* lesson progress track */
  .pbar{ background:rgba(255,255,255,.12); }
  .pbar > i{ background:linear-gradient(90deg,#58e0c2,#79a7ff); }
  /* unit discipline-tinted badge keeps its colour; dim locked badges */
  .unit.locked .badge{ filter:grayscale(.4) opacity(.7); }
  /* dashboard: hero goal card + tracked chip (were var(--navy)/light) */
  .goalcard{ background:linear-gradient(135deg, rgba(88,224,194,.18), rgba(121,167,255,.13)); border:1px solid rgba(255,255,255,.14); color:#eef4ff; box-shadow:var(--shadow); }
  .goalcard .gtext .lev{ background:rgba(255,255,255,.14); }
  .srow .snum.tracked{ background:rgba(255,255,255,.1); color:#cfe0ff; }
  .mcard.streak .v{ color:#ffce63; }
  /* exam: marks pill + mark-scheme box (had hardcoded light bg vs now-light --ink text) */
  .exam-marks{ background:var(--accent); color:#06111f; }
  .scheme{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.14); }
  .scheme li:before{ color:#58e0c2; }
  .exam-coach{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.14); }
  .exam-coach .cw{ background:var(--accent); color:#06111f; }
  .exam-ta{ background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.18); }
  .exam-plan{ background:rgba(88,224,194,.06); border-color:rgba(255,255,255,.14); }
  .lvl{ background:rgba(88,224,194,.16); color:#58e0c2; }
  .lvl.exam{ background:rgba(255,150,120,.16); color:#ff9678; }
  .scheme .spt:hover{ background:rgba(255,255,255,.06); }
  .scheme .spt .tick{ border-color:rgba(255,255,255,.28); }
  .scheme .spt.on .tick{ background:#58e0c2; border-color:#58e0c2; color:#06111f; }
  .exam-score{ background:var(--accent); color:#06111f; }

/* ---------- Voice (Web Speech API) -------------------------------------- */
const Voice = {
  synth: window.speechSynthesis || null,
  SR: window.SpeechRecognition || window.webkitSpeechRecognition || null,
  voice: null,
  ready(){ return !!this.synth; },
  canListen(){ return !!this.SR; },
  pickVoice(){
    if(!this.synth) return;
    const vs = this.synth.getVoices();
    this.voice = vs.find(v=>/en-GB/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || vs[0] || null;
  },
  speak(text, rate){
    if(!this.synth || !State.s.sound) return;
    try{
      this.synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-GB"; u.rate = rate || 0.92; u.pitch = 1;
      if(this.voice) u.voice = this.voice;
      this.synth.speak(u);
    }catch(e){}
  },
  say(text, rate){   // explicit read-aloud: speaks even when ambient sound is off
    if(!this.synth) return;
    try{ this.synth.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="en-GB"; u.rate=rate||0.92; u.pitch=1; if(this.voice)u.voice=this.voice; this.synth.speak(u); }catch(e){}
  },
  listen(onResult, onErr){
    if(!this.SR){ onErr && onErr("unsupported"); return null; }
    try{
      const r = new this.SR();
      r.lang = "en-GB"; r.interimResults = false; r.maxAlternatives = 3;
      r.onresult = (e)=>{ const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript); onResult(alts); };
      r.onerror = (e)=> onErr && onErr(e.error || "error");
      r.start();
      return r;
    }catch(e){ onErr && onErr("error"); return null; }
  }
};

/* ---------- Feedback sounds (WebAudio) & haptics -------------------------
   Duolingo-style instant reward: a bright chime on a correct answer, a soft low
   buzz on a mistake, a little arpeggio on lesson complete. Gated by the same
   sound toggle as speech; built lazily on first use (always after a tap, so
   autoplay policies are satisfied). */
const SFX = {
  ctx: null,
  ensure(){
    if(!this.ctx){ const AC=window.AudioContext||window.webkitAudioContext; if(AC){ try{ this.ctx=new AC(); }catch(e){} } }
    if(this.ctx && this.ctx.state==="suspended"){ try{ this.ctx.resume(); }catch(e){} }
    return this.ctx;

  tone(freq, at, dur, type, vol){
    const c=this.ctx, o=c.createOscillator(), g=c.createGain(), t=c.currentTime+at;
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.16, t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+0.05);
  },
  play(kind){
    if(!State.s || !State.s.sound || !this.ensure()) return;
    try{
      if(kind==="ok"){ this.tone(659.25,0,.12); this.tone(880,.09,.18); }
      else if(kind==="combo"){ this.tone(659.25,0,.1); this.tone(880,.08,.1); this.tone(1174.66,.16,.22); }
      else if(kind==="bad"){ this.tone(196,0,.2,"triangle",.13); this.tone(147,.09,.26,"triangle",.11); }
      else if(kind==="done"){ this.tone(523.25,0,.13); this.tone(659.25,.11,.13); this.tone(783.99,.22,.13); this.tone(1046.5,.33,.3); }
    }catch(e){}
  }
};
function buzz(pattern){ try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){} }

const norm = s => String(s||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
function lev(a,b){ const m=a.length,n=b.length; const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); } return d[m][n]; }
function saidMatch(heardAlts, target){
  const t = norm(target); if(!t) return false;
  const tol = Math.max(1, Math.floor(t.length/5));
  return (heardAlts||[]).some(h=>{ const hh=norm(h); if(!hh) return false;
    if(hh===t || hh.includes(t) || t.includes(hh)) return true;
    if(lev(hh,t) <= tol) return true;
    const tw=t.split(" ").filter(w=>w.length>2); if(tw.length && tw.every(w=>hh.includes(w))) return true;
    return false; });
}
function typedMatch(typed, target){ const a=norm(typed), b=norm(target); return a===b || lev(a,b)<=1; }
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }

/* ---------- State & persistence ----------------------------------------- */
const KEY = "feynman-springboard-v1";
const DAY_MS = 86400000;
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/DAY_MS); }
function addDays(dateStr, n){ const d=new Date(dateStr+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }

// Spaced retrieval. Kept for migrating legacy box-based items to the ease/ivl model below.
const REVIEW_INTERVALS = [1, 2, 4, 9, 20];
// Per-item ease/interval model (lightweight FSRS/SM-2-style personalised half-life).
// r.ease scales the interval each success; r.ivl is the current interval in days.
// r.box kept for back-compat with any UI that reads it.
function recordReview(qid, ok){
  if(!qid) return;
  const code = qid.split("#")[0];
  const r = State.s.review[qid] || { box:0, unit:code };
  // MIGRATION: derive ivl/ease for legacy items that predate this model.
  if(r.ivl == null) r.ivl = REVIEW_INTERVALS[Math.min(REVIEW_INTERVALS.length-1, r.box||0)];
  if(r.ease == null) r.ease = 2.3;
  if(ok){
    r.ivl = r.ivl ? Math.round(r.ivl * r.ease) : 2;   // first success = 2 days (more effortful than old 1)
    r.ease = Math.min(3.0, r.ease + 0.08);
    r.box = Math.min(4, (r.box||0)+1);                 // kept for any UI that reads box
  } else {
    r.ivl = 1;
    r.ease = Math.max(1.3, r.ease - 0.2);
    r.box = 0;
    r.misses = (r.misses||0)+1;   // track for adaptive "fix weak spots"
  }
  r.due = addDays(todayStr(), r.ivl);
  r.unit = code; r.last = todayStr();
  State.s.review[qid] = r;
  State.save();
}
function dueReviews(excludeUnit){
  const t = todayStr(), out = [];
  for(const qid in State.s.review){
    const r = State.s.review[qid];
    if(!r || !r.due) continue;
    if(excludeUnit && r.unit === excludeUnit) continue;
    if(!CONTENT[r.unit]) continue;
    if(r.due <= t) out.push({ qid, unit:r.unit, due:r.due, box:r.box });
  }
  out.sort((a,b)=> a.due<b.due ? -1 : a.due>b.due ? 1 : (a.box-b.box)); // most overdue, then least-learned first
  return out;
}
// Spread `reviews` evenly THROUGH `base` (interleaving), instead of front-loading them.
function interleaveReviews(base, reviews){
  if(!reviews || !reviews.length) return base.slice();
  const out = base.slice();
  const gap = Math.max(1, Math.floor(out.length / (reviews.length + 1)));
  reviews.forEach((r, k)=>{
    // insert at spread positions; +k accounts for prior insertions shifting the array
    const pos = Math.min(out.length, gap*(k+1) + k);
    out.splice(pos, 0, r);
  });
  return out;
}
// Round-robin questions by type so consecutive items rarely share s.type (interleaving).
// Preserves each type's original relative order; stable for arrays with one type.
function interleaveByType(arr){
  const buckets=[], byType={};
  for(const s of arr){ const t=(s&&s.type)||"_"; if(!byType[t]){ byType[t]=[]; buckets.push(byType[t]); } byType[t].push(s); }
  if(buckets.length<=1) return arr.slice();
  const out=[]; let added=true;
  while(added){ added=false; for(const b of buckets){ if(b.length){ out.push(b.shift()); added=true; } } }
  return out;
}
function retrievalStep(qid){
  const [code, idx] = qid.split("#");
  const q = CONTENT[code] && CONTENT[code].questions[+idx];
  if(!q) return null;
  if(TIER==="foundation" && isHTQ(q)) return null;   // don't resurface Higher-only content in Foundation
  const s = toStep(q); s.qid = qid; s.retrieval = true;
  s.kicker = "🔄 Retrieval · " + CONTENT[code].title;
  return s;
}

const State = {

    this.s = Object.assign({ xp:0, streak:0, lastDay:null, lessons:{}, dailyXP:{}, words:0, sound:true, seen:false, review:{}, exam:{}, tier:"higher", badges:[], flags:{}, notify:false, freezes:2, freezeUsedOn:null, calib:{sureRight:0,sureWrong:0,unsureRight:0,unsureWrong:0}, a11y:{textSize:"m", readable:false, contrast:false, motionOff:false} }, d||{});
    if(!this.s.review) this.s.review = {};
    if(typeof this.s.freezes !== "number") this.s.freezes = 2;
    if(!this.s.calib) this.s.calib = {sureRight:0,sureWrong:0,unsureRight:0,unsureWrong:0};
    if(!this.s.exam) this.s.exam = {};
    if(!this.s.tier) this.s.tier = "higher";
    if(!this.s.badges) this.s.badges = [];

  },
  save(){ try{ localStorage.setItem(KEY, JSON.stringify(this.s)); }catch(e){} syncPush(); },
  lessonDone(id){ return !!this.s.lessons[id]; },
  unitCrowns(code, total){ let c=0; for(let i=0;i<total;i++) if(this.lessonDone(code+"-L"+i)) c++; return c; },
  completeLesson(id, xp, newWords){
    const t=todayStr();
    if(!this.s.lessons[id] || (this.s.lessons[id].xp||0) < xp) this.s.lessons[id]=Object.assign(this.s.lessons[id]||{}, {done:true, xp:xp});
    this.s.xp += xp;
    this.s.dailyXP[t] = (this.s.dailyXP[t]||0) + xp;
    this.s.words += (newWords||0);
    // streak
    if(this.s.lastDay !== t){
      const gap = this.s.lastDay ? daysBetween(this.s.lastDay,t) : null;
      if(gap===1) this.s.streak += 1;
      else if(gap===2 && (this.s.freezes||0)>0){   // one missed day → spend a freeze, keep the streak
        this.s.freezes -= 1; this.s.freezeUsedOn = t; this.s.streak += 1;
      } else this.s.streak = 1;
      this.s.lastDay = t;
    }
    this.save();
  },
  reset(){ localStorage.removeItem(KEY); this.load(); }
};

// Bold the first occurrence of each key word in a plain-text fact, longest term
// first, never inside an already-bolded longer term — so the vocabulary being
// taught is visually anchored in the sentence that teaches it.
function boldTerms(fact, terms){
  if(String(fact).indexOf("<")>=0) return fact;      // already formatted — leave alone
  let segs=[{t:String(fact), b:false}];
  terms.forEach(term=>{
    const esc=String(term).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    let re; try{ re=new RegExp("\\b("+esc+"s?)\\b","i"); }catch(e){ return; }
    let done=false;
    segs=segs.flatMap(seg=>{
      if(done || seg.b) return [seg];
      const m=seg.t.match(re); if(!m) return [seg];
      done=true;
      return [{t:seg.t.slice(0,m.index),b:false}, {t:m[0],b:true}, {t:seg.t.slice(m.index+m[0].length),b:false}];
    });
  });

}
