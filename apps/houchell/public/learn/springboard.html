"questions":[{"type":"mcq","q":"Which of these is a correctly written chemical symbol for one type of atom?","options":[{"t":"Mg","correct":true},{"t":"MG","why":"A symbol is never two capital letters; the second letter, if there is one, is lower-case."},{"t":"mg","why":"The first letter of a symbol must always be a capital letter."}],"ok":"Magnesium is Mg: one capital letter then one lower-case letter."},{"type":"tf","q":"A chemical symbol can be a single capital letter on its own, like O for oxygen.","answer":true,"why":"Symbols are either one capital letter, or a capital letter followed by a lower-case letter."},{"type":"mcq","q":"In the formula H₂O, what does the small 2 tell us?","options":[{"t":"There are two hydrogen atoms","correct":true},{"t":"There are two oxygen atoms","why":"The 2 sits after the H, so it counts the hydrogen atoms, not the oxygen."},{"t":"There are two water molecules","why":"The subscript number counts atoms inside one molecule, not how many molecules there are."}],"ok":"The subscript 2 after H means two hydrogen atoms, joined to one oxygen atom."},{"type":"numeric","q":"How many atoms in total are in a particle of ammonia, NH₃?","hint":"count every atom: the N, then the H atoms","answer":4,"ok":"One nitrogen atom plus three hydrogen atoms makes 4 atoms in total."},{"type":"numeric","q":"How many atoms in total are in one unit of calcium carbonate, CaCO₃?","hint":"count every atom: Ca, C, then the three O atoms","answer":5,"ok":"One calcium, one carbon and three oxygen atoms make 1 + 1 + 3 = 5 atoms."},{"type":"mcq","q":"What is an element?","options":[{"t":"A substance made of only one type of atom","correct":true},{"t":"Two or more types of atom bonded together","why":"That describes a compound, not an element."},{"t":"Any substance you can find on the periodic table","why":"Being on the periodic table is not the definition; an element has only one type of atom."}],"ok":"An element contains only one type of atom, such as O₂ or Cu."},{"type":"tf","q":"Iodine, with the formula I₂, is a compound because it has two atoms.","answer":false,"why":"Both atoms are the same type, so iodine is an element; a compound needs two or more different types of atom."},{"type":"categorise","q":"Sort each substance by its formula into element, compound or mixture.","bins":["Element","Compound","Mixture"],"items":[{"t":"copper, Cu","bin":"Element"},{"t":"oxygen gas, O₂","bin":"Element"},{"t":"carbon dioxide, CO₂","bin":"Compound"},{"t":"magnesium oxide, MgO","bin":"Compound"},{"t":"iron filings and sulfur stirred together","bin":"Mixture"},{"t":"H₂ gas and O₂ gas in a balloon","bin":"Mixture"}],"ok":"One type of atom is an element; different atoms bonded make a compound; substances together but not bonded make a mixture.","bad":"Two types of atom only make a compound if they are bonded; loose, they are a mixture."},{"type":"multi","q":"Tap all the substances that are elements.","items":[{"t":"Cu","correct":true},{"t":"CO₂"},{"t":"S₈","correct":true},{"t":"NaCl"},{"t":"Br₂","correct":true}],"ok":"Cu, S₈ and Br₂ each contain only one type of atom, so they are all elements.","bad":"CO₂ and NaCl each have more than one chemical symbol, so they are compounds, not elements."},{"type":"mcq","q":"A balloon holds hydrogen gas (H₂) and oxygen gas (O₂), not bonded. What is it?","options":[{"t":"A mixture of two elements","correct":true},{"t":"A compound, because there are two types of atom","why":"Two types of atom only make a compound if they are bonded; here they are not, so it is a mixture."},{"t":"A single element","why":"There are two different types of atom present, so it cannot be a single element."}],"ok":"The gases are not bonded, so it is a mixture of the two elements hydrogen and oxygen."},{"type":"tf","q":"A mixture of iron filings and sulfur can be separated with a magnet because they are not bonded together.","answer":true,"why":"In a mixture the substances are not chemically bonded, so the magnetic iron can simply be pulled away."},{"type":"mcq","q":"Which rule decides which element is named first in a compound?","options":[{"t":"The element further to the left in the periodic table comes first","correct":true},{"t":"The element with the smaller symbol comes first","why":"Naming order depends on position in the periodic table, not the length of the symbol."},{"t":"Whichever element you happen to say first","why":"The order is fixed by the periodic table position, not by how you say it."}],"ok":"The element further to the left, usually a metal, is named first."},{"type":"mcq","q":"What is the compound formed when magnesium and oxygen bond together?","options":[{"t":"magnesium oxide","correct":true},{"t":"oxygen magneside","why":"Magnesium is further left in the periodic table, so it is named first, not oxygen."},{"t":"magnesium oxate","why":"The '-ate' ending is only used when oxygen is a third element; with two elements it ends in '-ide'."}],"ok":"Magnesium comes first and oxygen becomes oxide, giving magnesium oxide."},{"type":"mcq","q":"Calcium, carbon and oxygen bond together in one compound. What is it called?","options":[{"t":"calcium carbonate","correct":true},{"t":"calcium carbide","why":"Because oxygen is also present as a third element, the ending becomes '-ate', not '-ide'."},{"t":"carbon calcate","why":"Calcium is further left in the periodic table, so it must be named first."}],"ok":"Calcium comes first, and because oxygen is the third element, carbon becomes carbonate."},{"type":"order","q":"Name the compound made from potassium, nitrogen and oxygen. Put the naming steps in order (leftmost first; oxygen makes the ending '-ate').","items":["Put potassium first, as it is furthest left in the periodic table","Take nitrogen as the second element","Change the ending to '-ate' because oxygen is also present, giving potassium nitrate"],"ok":"Leftmost element first, then the ending becomes '-ate' because oxygen is the third element: potassium nitrate."},{"type":"categorise","q":"Sort each statement as a physical property or a chemical property.","bins":["Physical property","Chemical property"],"items":[{"t":"Gold is a soft metal, easy to bend","bin":"Physical property"},{"t":"Water melts at 0 °C","bin":"Physical property"},{"t":"Sodium chloride is a white solid","bin":"Physical property"},{"t":"Methane burns easily in oxygen","bin":"Chemical property"},{"t":"Sodium reacts violently with water","bin":"Chemical property"}],"ok":"Physical properties are features like colour, state and melting point; chemical properties are about how a substance reacts.","bad":"How a substance reacts or burns is a chemical property; appearance, state and melting point are physical properties."},{"type":"mcq","q":"Sodium is a soft silver metal and chlorine a toxic green gas. What is sodium chloride, the compound they form?","options":[{"t":"A white solid that is safe to eat, with completely different properties","correct":true},{"t":"A soft silver metal, like the sodium it came from","why":"A compound does not keep its elements' properties; sodium chloride is nothing like soft silver sodium."},{"t":"A toxic green gas, like the chlorine it came from","why":"A compound's properties differ from its elements; salt is a harmless white solid, not toxic green chlorine."}],"ok":"A compound has completely different properties from its elements; salt is a safe white solid."},{"type":"tf","q":"To find the name of a compound, you should look it up on the periodic table.","answer":false,"why":"The periodic table only lists elements; compound names are worked out from the elements bonded inside them."}]},

"SPD":{"code":"SPD","title":"Speed","discipline":"physics","blurb":"Work out how fast things move, read it off a graph, and add up speeds when objects pass each other.",
"vocab":[{"term":"speed","definition":"how far an object travels in one second of time","say":"SPEED"},{"term":"distance","definition":"how far an object has travelled, measured in metres","say":"DISS-tance"},{"term":"metres per second","definition":"the standard scientific unit of speed, written m/s","say":"MEE-ters per SEK-ond"},{"term":"miles per hour","definition":"an everyday unit of speed used on UK roads","say":"MY-uls per OW-er"},{"term":"stationary","definition":"not moving, so the speed is zero","say":"STAY-shun-ree"},{"term":"distance–time graph","definition":"a graph showing how far an object has travelled over time","say":"DISS-tance time graf"},{"term":"slope","definition":"a sloping line on a graph that shows an object is moving","say":"SLOHP"},{"term":"relative speed","definition":"how fast two objects move compared with each other","say":"RELL-uh-tiv speed"}],
"facts":["Speed is how far something travels in one second. The further it goes each second, the faster it is.","We calculate speed with the equation speed = distance ÷ time.","The standard scientific unit of speed is metres per second (m/s). The slash means 'per', which means divide.","The speed equation can be rearranged: distance = speed × time, and time = distance ÷ speed.","On a distance–time graph, time goes on the x-axis (across) and distance goes on the y-axis (up).","A flat, horizontal line on a distance–time graph means the object is stationary; a sloping line means it is moving. The steeper the slope, the faster the object.","When two objects move towards each other, you add their speeds to get the relative speed, because they meet faster.","When two objects move in the same direction, you subtract their speeds to get the relative speed, because they feel slower to each other."],
"misconceptions":[{"wrong":"Metres per second should be written 'mps', like miles per hour is 'mph'.","right":"In science we write metres per second as m/s, because the slash is the divide sign that means 'per'."},{"wrong":"To find speed you just read the start and end values off a distance–time graph.","right":"You must subtract the start value from the end value to find the distance and the time first."},{"wrong":"A stationary object is shown by a straight line on a distance–time graph.","right":"All the lines are straight; a stationary object is shown by a flat, horizontal line that does not go up."},{"wrong":"When another car drives towards you, your own actual speed increases.","right":"Your actual speed stays the same; it is the relative speed between the two cars that is larger."}],
"questions":[{"type":"mcq","q":"What does speed tell us about an object?","options":[{"t":"How far it travels in one second of time","correct":true},{"t":"How heavy the object is","why":"Speed is about motion, not how heavy something is."},{"t":"How far away the object started","why":"Speed measures distance travelled each second, not the starting position."}],"ok":"Speed is how far an object travels in one second; the further it goes each second, the faster it is."},{"type":"mcq","q":"What is the standard scientific unit of speed?","options":[{"t":"metres per second (m/s)","correct":true},{"t":"miles per hour (mph)","why":"Miles per hour is an everyday unit; science uses metres and seconds."},{"t":"metres (m)","why":"Metres measure distance alone, not speed, which needs distance ÷ time."}],"ok":"In science we measure distance in metres and time in seconds, so speed is in metres per second (m/s)."},{"type":"tf","q":"A speed of 5 m/s means the object travels 5 metres in each second.","answer":true,"why":"The slash means 'per', so 5 m/s is 5 metres travelled every second."},{"type":"mcq","q":"Why is it wrong to write metres per second as 'mps' like 'mph'?","options":[{"t":"The slash in m/s is the divide sign for 'per', so we write m/s","correct":true},{"t":"Because mps is too short to read","why":"It is not about length; the correct form uses the divide symbol for 'per'."},{"t":"Because seconds cannot be used for speed","why":"Seconds are exactly what we use; the issue is how 'per' is written."}],"ok":"In science 'per' is written with the divide symbol /, so metres per second is m/s, not mps."},{"type":"numeric","kicker":"Work it out","q":"A fly travels 8 m in 4 s. Calculate the speed of the fly.","hint":"speed = distance ÷ time","answer":2,"unit":"m/s","ok":"speed = 8 ÷ 4 = 2 m/s."},{"type":"numeric","kicker":"Work it out","q":"It takes 3 s for a mouse to sprint 12 m. Calculate its speed.","hint":"speed = distance ÷ time","answer":4,"unit":"m/s","ok":"speed = 12 ÷ 3 = 4 m/s."},{"type":"numeric","kicker":"Work it out","q":"A bat flies for 30 s and travels 45 m. What is the bat's speed?","hint":"speed = distance ÷ time","answer":1.5,"unit":"m/s","ok":"speed = 45 ÷ 30 = 1.5 m/s."},{"type":"numeric","kicker":"Work it out","q":"A cricket ball is hit at 41 m/s. How far does the ball travel in 1 s?","hint":"distance = speed × time","answer":41,"unit":"m","ok":"distance = 41 × 1 = 41 m, because 41 m/s means 41 metres every second."},{"type":"order","q":"Put these animals in order from SLOWEST to FASTEST (smaller m/s = slower).","items":["snail (0.025 m/s)","bat (1.5 m/s)","fly (2 m/s)","mouse (4 m/s)"],"ok":"Slowest to fastest means smallest m/s to largest: snail, bat, fly, mouse."},{"type":"numeric","kicker":"Work it out","q":"A van travels 2 km in 80 s. Calculate its speed in m/s. (Convert 2 km to metres first.)","hint":"convert km to m (×1000), then speed = distance ÷ time","answer":25,"unit":"m/s","ok":"2 km = 2000 m, so speed = 2000 ÷ 80 = 25 m/s."},{"type":"mcq","q":"On a distance–time graph, what goes on each axis?","options":[{"t":"Time on the x-axis (across), distance on the y-axis (up)","correct":true},{"t":"Distance on the x-axis, time on the y-axis","why":"It is the other way round: time goes across and distance goes up."},{"t":"Speed on the x-axis, time on the y-axis","why":"A distance–time graph plots distance against time, not speed."}],"ok":"Time goes on the horizontal x-axis and distance on the vertical y-axis."},{"type":"categorise","q":"Sort each distance–time graph line into what it shows.","bins":["Stationary","Moving"],"items":[{"t":"A flat, horizontal line","bin":"Stationary"},{"t":"A line that does not go up over time","bin":"Stationary"},{"t":"A sloping line going upwards","bin":"Moving"},{"t":"A steep slope going upwards","bin":"Moving"}],"ok":"A horizontal line means the distance is not changing, so the object is stationary; any upward slope means it is moving.","bad":"Do not say a stationary object is just a 'straight' line — moving lines are straight too; it must be flat and horizontal."},{"type":"mcq","q":"On a distance–time graph, what does a steeper sloping line tell you?","options":[{"t":"The object is moving faster","correct":true},{"t":"The object is moving slower","why":"A shallower line means slower; a steeper line covers more distance each second, so it is faster."},{"t":"The object is stationary","why":"A stationary object has a flat horizontal line, not a slope."}],"ok":"The steeper the slope, the more distance is covered each second, so the faster the object."},{"type":"numeric","kicker":"Read the graph","q":"On a distance–time graph an object starts at 2 m and finishes at 5 m. How far did it travel?","hint":"distance travelled = end − start","answer":3,"unit":"m","ok":"You must subtract: 5 − 2 = 3 m. You cannot just read the final value of 5."},{"type":"numeric","kicker":"Work it out","q":"From a graph, an object travels 4 m in 8 s. Calculate its speed.","hint":"speed = distance ÷ time","answer":0.5,"unit":"m/s","ok":"speed = 4 ÷ 8 = 0.5 m/s."},{"type":"tf","q":"When two cars drive directly towards each other, you add their speeds to find the relative speed.","answer":true,"why":"Moving towards each other, they meet faster, so the relative speed is the two speeds added."},{"type":"numeric","kicker":"Work it out","q":"Phoebe drives at 5 m/s. Evie drives directly towards Phoebe at 8 m/s. What is their relative speed?","hint":"moving towards each other: add the speeds","answer":13,"unit":"m/s","ok":"They move towards each other, so add: 5 + 8 = 13 m/s."},{"type":"numeric","kicker":"Work it out","q":"A car drives at 25 m/s. Another overtakes it in the same direction at 28 m/s. What is their relative speed?","hint":"same direction: subtract the speeds","answer":3,"unit":"m/s","ok":"They move the same way, so subtract: 28 − 25 = 3 m/s, which is why the overtake feels slow."},{"type":"mcq","q":"Two cars drive towards each other. A passenger says 'our own speed has increased because the other car is coming towards us.' Why are they wrong?","options":[{"t":"Their actual speed is unchanged; only the relative speed between the cars is larger","correct":true},{"t":"They are right, your speed really does increase","why":"Your own speed does not change; it is the speed between the two cars that adds up."},{"t":"Because you should subtract the speeds when facing each other","why":"You add speeds when moving towards each other; but it is the relative speed that grows, not your own."}],"ok":"Each car keeps its own actual speed; adding the speeds gives the relative speed between them."}]},

"SKL":{"code":"SKL","title":"Human skeleton and muscles","discipline":"biology","blurb":"How your bones, joints and muscles team up to hold you upright and get you moving.",
"vocab":[{"term":"skeleton","definition":"the framework of bones that supports and protects the body","say":"skel-uh-tun"},{"term":"bone marrow","definition":"tissue inside bones that makes new blood cells","say":"bone ma-roh"},{"term":"joint","definition":"a place where two bones meet and the body can bend","say":"joynt"},{"term":"cartilage","definition":"a strong, flexible material that covers the ends of bones","say":"kar-til-ij"},{"term":"synovial fluid","definition":"a natural lubricant in joints that stops bones rubbing","say":"sy-noh-vee-al"},{"term":"ligament","definition":"a tough structure that holds bones together at a joint","say":"lig-uh-ment"},{"term":"tendon","definition":"a structure that joins a muscle to a bone","say":"ten-dun"},{"term":"contract","definition":"when a muscle gets shorter and pulls","say":"kun-trakt"},{"term":"antagonistic pair","definition":"two muscles where one contracts as the other relaxes","say":"an-tag-on-istic"},{"term":"tissue","definition":"a group of specialised cells working together","say":"tish-oo"}],
"facts":["The skeleton has four jobs: support, protection of organs, movement, and making blood cells.","Bones are hard because they contain the mineral calcium; the spine supports the body so you can stand upright.","Bone marrow inside bones makes new red and white blood cells, because blood cells do not live very long.","A joint is where two bones meet. Cartilage covers the bone ends and synovial fluid lubricates them to reduce friction; ligaments hold the bones together so the joint is stable.","Muscles work by contracting (getting shorter) and pulling. They can only pull, never push.","Because a muscle can only pull, muscles work in antagonistic pairs: one contracts while the other relaxes.","In the arm, the biceps and triceps are an antagonistic pair. The biceps contracts to bend the arm; the triceps contracts to straighten it.","Tendons join muscles to bones, so that when a muscle contracts it pulls on the bone and moves it.","Living things are organised in levels: cells form tissues, tissues form organs, and organs form organ systems."],
"misconceptions":[{"wrong":"Bone marrow makes blood.","right":"Bone marrow makes blood cells (red and white blood cells), not blood itself."},{"wrong":"Tendons hold the bones together in a joint.","right":"Ligaments hold bones together in a joint; tendons join muscle to bone."},{"wrong":"Muscles can push as well as pull.","right":"Muscles can only contract and pull. To move a bone back they work in antagonistic pairs."},{"wrong":"When you lift your arm, both the biceps and triceps contract.","right":"Only one contracts at a time. The biceps contracts and the triceps relaxes; they are antagonistic."}],
"questions":[{"type":"mcq","q":"What is the skeleton mainly made of?","options":[{"t":"Bones","correct":true},{"t":"Muscles","why":"Muscles move the skeleton, but the skeleton itself is made of bones."},{"t":"Cartilage","why":"Cartilage only covers the ends of bones at joints; the skeleton is made of bones."}],"ok":"The skeleton is the framework of bones in the body."},{"type":"mcq","q":"Which mineral makes bones hard?","options":[{"t":"Calcium","correct":true},{"t":"Iron","why":"Iron is important in red blood cells, not for making bones hard."},{"t":"Oxygen","why":"Oxygen is a gas used in respiration, not the mineral that hardens bones."}],"ok":"Bones are hard because they contain the mineral calcium."},{"type":"tf","q":"A joint is a place where two bones meet.","answer":true,"why":"Joints are where bones are joined, which lets the body bend and move."},{"type":"mcq","q":"What is made in the bone marrow?","options":[{"t":"New red and white blood cells","correct":true},{"t":"Blood","why":"The marrow makes blood cells, not blood itself; 'blood' is not precise enough."},{"t":"Calcium","why":"Calcium is found in bones, but the marrow's job is making blood cells."}],"ok":"Bone marrow makes new red and white blood cells to replace old ones."},{"type":"categorise","q":"Sort each example by the skeleton function it shows.","bins":["Support","Protection","Movement","Making blood cells"],"items":[{"t":"The spine holds the body upright","bin":"Support"},{"t":"The skull around the brain","bin":"Protection"},{"t":"The ribs around the lungs","bin":"Protection"},{"t":"Arms and legs with muscles and joints","bin":"Movement"},{"t":"Bone marrow making new blood cells","bin":"Making blood cells"}],"ok":"The skeleton supports the body, protects organs, allows movement, and makes blood cells.","bad":"Protection means shielding organs like the brain and lungs, not holding the body up."},{"type":"mcq","q":"What covers the ends of the bones inside a joint?","options":[{"t":"Cartilage","correct":true},{"t":"Synovial fluid","why":"Synovial fluid is the lubricant; cartilage is the material covering the bone ends."},{"t":"Ligaments","why":"Ligaments hold the bones together; cartilage covers and protects the bone ends."}],"ok":"Cartilage is a strong, flexible material that covers and protects the ends of the bones."},{"type":"mcq","q":"What does synovial fluid do in a joint?","options":[{"t":"Acts as a lubricant so the bones do not rub together","correct":true},{"t":"Holds the bones together","why":"Holding bones together is the job of ligaments, not synovial fluid."},{"t":"Makes the bones hard","why":"Calcium makes bones hard; synovial fluid is a lubricant that reduces friction."}],"ok":"Synovial fluid is a natural lubricant that stops the bones rubbing together."},{"type":"tf","q":"Tendons hold the bones together in a joint.","answer":false,"why":"Ligaments hold bones together in a joint; tendons join muscle to bone."},{"type":"multi","q":"Tap all three things found in a joint that help it work.","items":[{"t":"Cartilage covering the bone ends","correct":true},{"t":"Synovial fluid for lubrication","correct":true},{"t":"Ligaments holding the bones together","correct":true},{"t":"Bone marrow making blood cells"}],"ok":"Cartilage, synovial fluid and ligaments all help a joint move smoothly and stay stable.","bad":"Bone marrow makes blood cells inside bones; it is not part of how a joint works."},{"type":"mcq","q":"How does a muscle work?","options":[{"t":"It contracts (gets shorter) and pulls","correct":true},{"t":"It pushes bones into place","why":"Muscles cannot push; they can only contract and pull."},{"t":"It holds bones together","why":"Holding bones together is the job of ligaments, not muscles."}],"ok":"A muscle works by contracting, which means getting shorter and pulling."},{"type":"tf","q":"Muscles can both push and pull bones.","answer":false,"why":"Muscles can only contract and pull, never push, which is why they work in antagonistic pairs."},{"type":"mcq","q":"What joins a muscle to a bone?","options":[{"t":"A tendon","correct":true},{"t":"A ligament","why":"Ligaments join bone to bone; a tendon joins muscle to bone."},{"t":"Cartilage","why":"Cartilage covers the ends of bones; a tendon connects muscle to bone."}],"ok":"A tendon joins a muscle to a bone, so the muscle can pull the bone when it contracts."},{"type":"mcq","q":"What is an antagonistic pair of muscles?","options":[{"t":"Two muscles where one contracts as the other relaxes","correct":true},{"t":"Two muscles that both contract at the same time","why":"In an antagonistic pair only one contracts at a time while the other relaxes."},{"t":"Two muscles joined directly to each other","why":"They are not joined to each other; they pull a bone in opposite directions."}],"ok":"In an antagonistic pair, one muscle contracts while its partner relaxes, moving the bone back and forth."},{"type":"mcq","q":"When you bend your arm to lift your forearm, which muscle contracts?","options":[{"t":"The biceps","correct":true},{"t":"The triceps","why":"The triceps relaxes as the arm bends; it contracts to straighten the arm."},{"t":"Both at the same time","why":"Only one contracts at a time. The biceps contracts and the triceps relaxes."}],"ok":"The biceps contracts and gets shorter to pull the forearm up and bend the arm."},{"type":"categorise","q":"When you BEND your arm to lift your forearm, sort what each muscle is doing.","bins":["Contracted","Relaxed"],"items":[{"t":"Biceps (front of upper arm)","bin":"Contracted"},{"t":"Triceps (back of upper arm)","bin":"Relaxed"}],"ok":"To bend the arm the biceps contracts and the triceps relaxes.","bad":"They cannot both contract at once; in an antagonistic pair one contracts while the other relaxes."},{"type":"mcq","q":"What do we call a group of specialised cells working together?","options":[{"t":"A tissue","correct":true},{"t":"An organ","why":"An organ is made of more than one tissue; a single group of similar cells is a tissue."},{"t":"An organ system","why":"An organ system is a group of organs; a group of cells is a tissue."}],"ok":"A group of specialised cells working together, such as muscle cells, forms a tissue."},{"type":"mcq","q":"Why is the heart described as an organ?","options":[{"t":"It is made of more than one tissue working together","correct":true},{"t":"It is made of many specialised cells","why":"Many specialised cells make a tissue; an organ needs more than one tissue working together."},{"t":"It is a group of organ systems","why":"A group of organ systems forms an organism; the heart is a single organ."}],"ok":"An organ, like the heart, is made of more than one tissue working together to do a job."},{"type":"order","q":"Put the levels of organisation in order, smallest first.","items":["Cell","Tissue","Organ","Organ system"],"ok":"Cells join to form tissues, tissues form organs, and organs form organ systems."}]},

"PUR":{"code":"PUR","title":"Pure and impure substances","discipline":"chemistry","blurb":"What makes a substance pure, how things dissolve, and the clever ways scientists pull mixtures apart.",
"vocab":[{"term":"pure substance","definition":"a substance made of only one type of particle","say":"pyoor"},{"term":"mixture","definition":"two or more substances that are not chemically bonded together","say":"miks-cher"},{"term":"solute","definition":"the substance that dissolves into a solvent","say":"sol-yoot"},{"term":"solvent","definition":"the substance that does the dissolving, often water","say":"sol-vent"},{"term":"solution","definition":"what forms when a solute dissolves in a solvent","say":"so-loo-shun"},{"term":"soluble","definition":"able to dissolve in a given solvent","say":"sol-yuh-bull"},{"term":"insoluble","definition":"does not dissolve in a given solvent","say":"in-sol-yuh-bull"},{"term":"filtrate","definition":"the liquid that passes through the filter paper","say":"fil-trayt"},{"term":"chromatography","definition":"separating dissolved substances by how far they travel up paper","say":"kroh-mat-og-raf-ee"}],
"facts":["A pure substance is made of only one type of particle. It can be a solid, liquid or gas.","A mixture (an impure substance) contains more than one substance that are not chemically bonded together.","When a solute dissolves in a solvent it forms a solution. The solute does not disappear; its particles spread out between the solvent particles.","A substance is soluble if it dissolves in a given solvent, and insoluble if it does not. You must always name the solvent.","Diffusion is the movement of particles from an area of high concentration to an area of low concentration, until it is even.","Filtration separates an insoluble solid from a liquid: the solid is trapped as the residue and the liquid passes through as the filtrate.","Evaporation separates a dissolved solid from its solution by letting the solvent evaporate, leaving the solute behind as crystals.","Distillation separates liquids using their different boiling points; chromatography separates dissolved colours by their different solubilities."],
"misconceptions":[{"wrong":"When a solute dissolves, the particles disappear.","right":"The particles do not disappear; they spread out between the solvent particles, so you just cannot see them."},{"wrong":"Filtration can separate a solution like salt water.","right":"In a solution both particles are small enough to pass through the filter paper, so filtration cannot separate them."},{"wrong":"A substance is simply 'soluble' or 'insoluble'.","right":"Solubility depends on the solvent, so you must name it: nail polish is insoluble in water but soluble in remover."},{"wrong":"A substance is pure only if every particle is identical and simple.","right":"A substance is pure if it contains only one type of particle, even if that particle is a compound like carbon dioxide."}],
"questions":[{"type":"mcq","q":"What is a pure substance?","options":[{"t":"A substance made of only one type of particle","correct":true},{"t":"A substance that is always a liquid","why":"Pure substances can be solids, liquids or gases, not just liquids."},{"t":"A substance that is clean and safe to drink","why":"'Pure' in science means one type of particle, not clean or safe."}],"ok":"A pure substance contains only one type of particle, in any state."},{"type":"tf","q":"A mixture contains two or more substances that are not chemically bonded together.","answer":true,"why":"That is exactly what a mixture is; the substances are simply mixed, not joined."},{"type":"mcq","q":"What is diffusion?","options":[{"t":"The movement of particles from high concentration to low concentration","correct":true},{"t":"The movement of particles from low concentration to high concentration","why":"Diffusion goes the other way, from high to low, until it is even."},{"t":"Particles being pushed out by a force","why":"Nothing pushes the particles; they are always moving randomly and spread out on their own."}],"ok":"Diffusion is particles spreading from where there are many to where there are few."},{"type":"mcq","q":"When sugar dissolves in water, the sugar is the…","options":[{"t":"solute","correct":true},{"t":"solvent","why":"The solvent is the substance that does the dissolving; here that is the water."},{"t":"solution","why":"The solution is the whole mixture of sugar and water together, not the sugar alone."}],"ok":"The solute is the substance that dissolves, so the sugar is the solute."},{"type":"tf","q":"When a solute dissolves, its particles disappear completely.","answer":false,"why":"The particles do not disappear; they spread out between the solvent particles so you cannot see them."},{"type":"mcq","q":"A student adds copper oxide to water and stirs. It sinks and stays at the bottom. What does this tell you?","options":[{"t":"Copper oxide is insoluble in water","correct":true},{"t":"Copper oxide is soluble in water","why":"If it had dissolved you would no longer see it; here it stays visible at the bottom."},{"t":"Copper oxide has turned into a gas","why":"It stays as a solid at the bottom, so no change of state has happened."}],"ok":"You can still see it, so it has not dissolved, meaning it is insoluble in water."},{"type":"categorise","q":"Sort each substance into pure or a mixture.","bins":["Pure substance","Mixture"],"items":[{"t":"A gas made of only one type of particle","bin":"Pure substance"},{"t":"Carbon dioxide on its own","bin":"Pure substance"},{"t":"Salt dissolved in water","bin":"Mixture"},{"t":"Iron filings stirred with sulfur (not bonded)","bin":"Mixture"}],"ok":"A pure substance has only one type of particle; a mixture has more than one that are not bonded.","bad":"Carbon dioxide is pure even though it is a compound, because every particle is the same."},{"type":"multi","q":"Tap all the statements that are true about diffusion.","items":[{"t":"It happens from high concentration to low concentration","correct":true},{"t":"It is faster in gases than in liquids","correct":true},{"t":"It only happens in solids"},{"t":"It carries on until the particles are evenly spread","correct":true}],"ok":"Diffusion goes from high to low concentration, is faster in gases, and continues until particles are even.","bad":"Diffusion does not happen in solids because the particles cannot move past each other."},{"type":"mcq","q":"Why is the word 'soluble' on its own not enough?","options":[{"t":"A substance is only soluble in a particular solvent, which must be named","correct":true},{"t":"Because soluble means the same as insoluble","why":"They are opposites: soluble means it dissolves, insoluble means it does not."},{"t":"Because all substances dissolve in every solvent","why":"Different substances dissolve in different solvents, which is why naming the solvent matters."}],"ok":"Nail polish is insoluble in water but soluble in remover, so you must always name the solvent."},{"type":"mcq","q":"Which technique separates an insoluble solid, like sand, from water?","options":[{"t":"Filtration","correct":true},{"t":"Distillation","why":"Distillation separates liquids by their boiling points, not a solid from a liquid."},{"t":"Chromatography","why":"Chromatography separates dissolved colours, not an insoluble solid from a liquid."}],"ok":"The sand is trapped by the filter paper while the water passes through."},{"type":"mcq","q":"Why can filtration NOT separate salt from salt water?","options":[{"t":"The salt and water particles are both small enough to pass through the filter paper","correct":true},{"t":"The salt is too big to fit through the filter paper","why":"The salt has dissolved, so its particles are now small enough to pass straight through."},{"t":"The funnel is the wrong shape","why":"It is the filter paper, not the funnel, that separates, and the dissolved particles slip through it."}],"ok":"In a solution both particles fit through the holes, so nothing is left as residue."},{"type":"order","q":"Put the steps of filtration in order, from setting up to collecting the liquid.","items":["Place a filter paper inside a funnel","Stand the funnel over a beaker","Pour the mixture of insoluble solid and liquid into the filter paper","The solid is trapped in the filter paper as the residue","The liquid passes through and is collected as the filtrate"],"ok":"The insoluble solid stays as residue while the liquid runs through as filtrate."},{"type":"mcq","q":"How do you separate a dissolved solid, like salt, from its solution?","options":[{"t":"Evaporation, letting the solvent evaporate to leave the solute behind","correct":true},{"t":"Filtration through filter paper","why":"The salt has dissolved, so its particles pass straight through the filter paper."},{"t":"Chromatography on paper","why":"Chromatography separates dissolved colours, not a dissolved solid you want to recover."}],"ok":"The solvent evaporates away and the solute is left behind as crystals."},{"type":"mcq","q":"Two liquids with different boiling points are mixed. Which technique separates them?","options":[{"t":"Distillation","correct":true},{"t":"Filtration","why":"Both liquids would pass straight through the filter paper, so nothing is separated."},{"t":"Evaporation","why":"Evaporation leaves a solid behind, but here both parts are liquids that would be lost."}],"ok":"In distillation the liquid with the lower boiling point evaporates first, then is cooled back to a liquid."},{"type":"order","q":"Put the steps to get pure water from salt water by distillation in order.","items":["Heat the salt water in the flask","The water reaches its boiling point and turns into a gas","The water gas travels into the condenser","Cold water cools the gas back into a liquid","The pure liquid water drips into the beaker, leaving the salt behind"],"ok":"The water evaporates and is condensed back to a liquid, while the salt stays in the flask."},{"type":"mcq","q":"On a chromatogram, a sample splits into two colours while another stays as one. What does this show?","options":[{"t":"The one that split is a mixture; the single colour is pure","correct":true},{"t":"Both samples are pure substances","why":"A pure substance stays as one colour, so the one that split into two must be a mixture."},{"t":"Both samples are mixtures","why":"The sample that stayed as a single colour did not separate, so it is pure."}],"ok":"More soluble inks travel further, so a mixture separates into its colours while a pure one stays as one."},{"type":"categorise","q":"Match each separation technique to what it separates.","bins":["Filtration","Evaporation","Distillation","Chromatography"],"items":[{"t":"An insoluble solid from a liquid","bin":"Filtration"},{"t":"A dissolved solid from its solution","bin":"Evaporation"},{"t":"Two liquids using their boiling points","bin":"Distillation"},{"t":"Dissolved colours in an ink","bin":"Chromatography"}],"ok":"Each technique suits a different kind of mixture, so you choose by what you need to separate.","bad":"Filtration cannot separate a solution because the dissolved particles slip through the filter paper."},{"type":"numeric","q":"In 100 cm³ of water, 5 g of solute A can dissolve. If you double the volume to 200 cm³, how much of solute A could dissolve?","unit":"g","answer":10,"ok":"Doubling the solvent doubles the mass that can dissolve, so 5 g becomes 10 g."}]},

"FRC":{"code":"FRC","title":"Forces","discipline":"physics","blurb":"Pushes, pulls and turning forces — from stretchy springs to balanced seesaws, learn what forces really do.",
"vocab":[{"term":"force","definition":"a push or a pull on an object","say":"forss"},{"term":"newton","definition":"the unit we measure force in, written N","say":"NYOO-tun"},{"term":"weight","definition":"the force pulling an object down because gravity acts on its mass","say":"wayt"},{"term":"friction","definition":"a contact force that opposes movement when surfaces rub","say":"FRIK-shun"},{"term":"contact force","definition":"a force that only acts when two objects are touching","say":"KON-takt forss"},{"term":"non-contact force","definition":"a force that acts without the objects needing to touch","say":"non-KON-takt forss"},{"term":"extension","definition":"how much longer an object becomes when it is stretched","say":"ik-STEN-shun"},{"term":"spring constant","definition":"the force needed to stretch a spring by one metre","say":"spring KON-stunt"},{"term":"moment","definition":"the turning effect of a force around a pivot","say":"MOH-munt"},{"term":"resultant force","definition":"the overall force left when all forces are combined","say":"ri-ZUL-tunt forss"}],
"facts":["A force is simply a push or a pull, and we measure how big it is in newtons (N) using a newtonmeter.","On a force diagram we draw an arrow: its direction shows which way the force acts, and its length shows how big the force is.","Contact forces such as friction, air resistance, tension and the normal contact force only act when objects touch; non-contact forces such as weight and magnetism act across a gap.","Stretching makes an object longer and we call the increase the extension; squashing makes it shorter, which we call compression.","Hooke's law says force = spring constant × extension, so for a given spring doubling the force doubles the extension — but only up to the elastic limit.","A moment is the turning effect of a force, worked out as moment = force × distance from the pivot, measured in newton metres (N m).","Levers and spanners are simple machines: a long arm makes a bigger moment, so a small force can do a big job.","When forces are balanced the resultant force is zero, so a stationary object stays still and a moving object keeps the same speed and direction.","An unbalanced (non-zero) resultant force changes motion: the object speeds up, slows down or changes direction in the direction of the resultant force."],
"misconceptions":[{"wrong":"Air resistance is a non-contact force because you cannot see the air.","right":"Air resistance is a contact force — it only happens because air particles bump into the moving object."},{"wrong":"A very stretchy spring must have a large spring constant.","right":"A stretchy spring has a small spring constant; a large spring constant means a stiff spring, hard to stretch."},{"wrong":"If the resultant force is zero, a moving object must stop.","right":"With a zero resultant force a moving object simply keeps going at the same speed in the same direction."},{"wrong":"Gravity is the name of the force pulling you towards the Earth.","right":"The force pulling you down is called weight; it is caused by gravity acting on your mass."}],
"questions":[{"type":"mcq","q":"What is a force?","options":[{"t":"A push or a pull","correct":true},{"t":"A type of energy stored in an object","why":"A force is not energy; it is a push or a pull that can change how an object moves."},{"t":"The speed an object is moving at","why":"Speed describes motion, not the force; a force is simply a push or a pull."}],"ok":"Every force acts as either a push or a pull."},{"type":"mcq","q":"What unit do we measure forces in?","options":[{"t":"Newtons (N)","correct":true},{"t":"Metres (m)","why":"Metres measure distance; force is measured in newtons (N)."},{"t":"Joules (J)","why":"Joules measure energy; force is measured in newtons (N), named after Isaac Newton."}],"ok":"Force is measured in newtons (N), using a newtonmeter."},{"type":"mcq","q":"What is the correct name for the force that pulls you towards the Earth?","options":[{"t":"Weight","correct":true},{"t":"Gravity","why":"Gravity causes the force, but the force itself is called weight."},{"t":"Upthrust","why":"Upthrust pushes floating objects up; the downward pull is called weight."}],"ok":"Weight is the force caused when gravity pulls on an object with mass."},{"type":"categorise","q":"Sort each force into contact or non-contact.","bins":["Contact force","Non-contact force"],"items":[{"t":"Friction","bin":"Contact force"},{"t":"Air resistance","bin":"Contact force"},{"t":"Normal contact force","bin":"Contact force"},{"t":"Weight","bin":"Non-contact force"},{"t":"Magnetism","bin":"Non-contact force"}],"ok":"Contact forces need objects to touch; non-contact forces (weight and magnetism) act across a gap.","bad":"Air resistance feels invisible, but it is a contact force — it needs air particles to hit the object."},{"type":"multi","q":"Tap all the forces that are contact forces.","items":[{"t":"Friction","correct":true},{"t":"Tension","correct":true},{"t":"Upthrust","correct":true},{"t":"Weight"},{"t":"Magnetism"}],"ok":"Friction, tension and upthrust all need the objects to be touching, so they are contact forces.","bad":"Weight and magnetism act across a gap with no touching, so they are non-contact forces."},{"type":"mcq","q":"An object is stretched until it is longer. What do we call the increase in its length?","options":[{"t":"The extension","correct":true},{"t":"The compression","why":"Compression is when something gets shorter; getting longer is the extension."},{"t":"The moment","why":"A moment is a turning effect; the increase in length when stretched is the extension."}],"ok":"When an object is stretched, the extra length it gains is called the extension."},{"type":"numeric","kicker":"Work it out","q":"An elastic band is 143 mm long. A force stretches it to 233 mm. What is the extension?","hint":"extension = stretched length − original length","answer":90,"unit":"mm","ok":"233 − 143 = 90 mm."},{"type":"tf","q":"An elastic material returns to its original shape once the forces stretching it are removed.","answer":true,"why":"Elastic materials like springs and rubber spring back; inelastic materials like plasticine stay deformed."},{"type":"mcq","q":"Two springs are pulled with the same force. Spring A has a larger spring constant than spring B. Which stretches more?","options":[{"t":"Spring B, because a smaller spring constant means it is easier to stretch","correct":true},{"t":"Spring A, because a larger spring constant makes it stretchier","why":"A larger spring constant makes a spring stiffer, so it stretches less, not more."},{"t":"They stretch the same amount because the force is equal","why":"The spring constant matters too; the stiffer spring (A) stretches less for the same force."}],"ok":"A large spring constant means a stiff spring, so spring B with the smaller constant stretches more."},{"type":"numeric","kicker":"Work it out","q":"A spring has a spring constant of 250 N/m and is extended by 0.2 m. What force was applied?","hint":"force = spring constant × extension","answer":50,"unit":"N","ok":"F = k × e = 250 × 0.2 = 50 N."},{"type":"numeric","kicker":"Work it out","q":"A spring extends by 2 m when 10 N is added. Hooke's law applies, so how far will it extend with 30 N added?","hint":"extension is proportional to force: triple the force, triple the extension","answer":6,"unit":"m","ok":"30 N is three times 10 N, so the extension is three times 2 m = 6 m."},{"type":"mcq","q":"Why does a spring stop obeying Hooke's law if you pull it with a very large force?","options":[{"t":"It is stretched past its elastic limit and is permanently deformed","correct":true},{"t":"The spring constant suddenly becomes zero","why":"The spring constant does not vanish; the spring is simply stretched beyond its elastic limit."},{"t":"Springs never obey Hooke's law in the first place","why":"Springs do obey Hooke's law, but only up to the elastic limit, beyond which it breaks down."}],"ok":"Beyond the elastic limit the spring no longer returns to its original length and Hooke's law no longer holds."},{"type":"mcq","q":"What do we call the turning effect of a force around a pivot?","options":[{"t":"A moment","correct":true},{"t":"An extension","why":"An extension is how far something stretches; the turning effect of a force is a moment."},{"t":"Upthrust","why":"Upthrust is the upward push from a fluid; a turning force is called a moment."}],"ok":"A turning force around a pivot is called a moment, measured in newton metres (N m)."},{"type":"numeric","kicker":"Work it out","q":"A force of 25 N acts 1.2 m away from a pivot. What is the moment?","hint":"moment = force × distance from the pivot","answer":30,"unit":"N m","ok":"moment = 25 × 1.2 = 30 N m."},{"type":"mcq","q":"Why is a long spanner better than a short one for loosening a stiff nut?","options":[{"t":"The longer arm increases the distance from the pivot, making a bigger moment","correct":true},{"t":"The longer spanner applies a much larger force by itself","why":"Your force can stay the same; the longer arm increases the distance, which increases the moment."},{"t":"A longer spanner is heavier, so gravity turns the nut","why":"It is the longer distance from the pivot, not the weight, that increases the turning moment."}],"ok":"moment = force × distance, so a longer arm gives a bigger moment for the same force."},{"type":"mcq","q":"A book rests still on a table; the forces on it are balanced. What is the resultant force?","options":[{"t":"Zero","correct":true},{"t":"Equal to the book's weight, acting downwards","why":"The upward normal force cancels the weight, so the resultant force is zero, not the weight."},{"t":"A small force pushing the book sideways","why":"Balanced forces cancel completely, leaving a resultant force of zero."}],"ok":"Balanced forces cancel out, so the resultant force is zero and the book stays still."},{"type":"tf","q":"A box is sliding at a steady speed and the resultant force on it is zero. It will keep moving at the same speed.","answer":true,"why":"With a zero resultant force there is no change to motion, so a moving object carries on at the same speed and direction."},{"type":"categorise","q":"Sort each situation by whether the forces are balanced or unbalanced.","bins":["Balanced forces","Unbalanced forces"],"items":[{"t":"A plant sitting still on a shelf","bin":"Balanced forces"},{"t":"A boat floating without sinking or rising","bin":"Balanced forces"},{"t":"A box being pushed and speeding up","bin":"Unbalanced forces"},{"t":"A car slowing down as it brakes","bin":"Unbalanced forces"},{"t":"A ball swerving to change direction","bin":"Unbalanced forces"}],"ok":"Balanced forces give a zero resultant and no change in motion; unbalanced forces speed up, slow down or change direction.","bad":"If the speed or direction is changing, the forces cannot be balanced — there is a non-zero resultant force."},{"type":"mcq","q":"A stationary trolley feels a resultant force to the right. What happens to it?","options":[{"t":"It speeds up, moving to the right","correct":true},{"t":"It stays still because it started off stationary","why":"A non-zero resultant force changes motion, so the trolley starts to move and speed up."},{"t":"It moves to the left, against the force","why":"An object accelerates in the same direction as the resultant force, so it moves to the right."}],"ok":"An unbalanced resultant force makes a stationary object speed up in the direction of that force."}]},

"DIET":{"code":"DIET","title":"Diet and health","discipline":"biology","blurb":"Discover the nutrients your body needs, why energy needs differ, and what happens when a diet is out of balance.",
"vocab":[{"term":"nutrient","definition":"A component of food the body needs to work properly.","say":"NEW-tree-ent"},{"term":"balanced diet","definition":"Eating the right amounts of all the nutrients and enough energy.","say":"balanced diet"},{"term":"carbohydrate","definition":"A nutrient that is the body's main source of energy.","say":"car-bo-HY-drate"},{"term":"protein","definition":"A nutrient used for the growth and repair of cells.","say":"PRO-teen"},{"term":"fibre","definition":"A nutrient that keeps digestion healthy and prevents constipation.","say":"FY-ber"},{"term":"mineral","definition":"A nutrient like iron or calcium needed in small amounts.","say":"MIN-er-al"},{"term":"energy requirement","definition":"How much energy a person needs each day.","say":"energy requirement"},{"term":"deficiency disease","definition":"An illness caused by missing a key nutrient in the diet.","say":"de-FISH-en-see"},{"term":"anaemia","definition":"A disease caused by too little iron in the diet.","say":"a-NEE-mee-a"},{"term":"obesity","definition":"Having too much body mass from taking in more energy than is used.","say":"oh-BEE-si-tee"}],
"facts":["A healthy diet has seven nutrient groups: carbohydrates, proteins, fats, vitamins, minerals, fibre and water. No single food contains them all, so we eat a variety.","Carbohydrates are the body's main source of energy, while proteins are needed for the growth and repair of cells.","Fats insulate and cushion our organs, but too much fat in the diet can harm our health.","Minerals such as calcium build strong bones, and the mineral iron is needed by red blood cells to carry oxygen. Vitamins help things like eyesight and the immune system.","Fibre keeps digestion healthy and prevents constipation, and water lets chemical reactions happen and transports substances around the body.","Different people need different amounts of energy: someone who moves a lot needs more, and growing children also need plenty of energy.","If more energy is taken in than is used, body mass increases; if less is taken in than is used, body mass decreases.","Obesity can cause fatty substances to build up in the arteries, raising the risk of heart attack, stroke, type 2 diabetes and cancer.","A lack of iron means fewer red blood cells, so less oxygen is carried around the body. This deficiency disease, anaemia, causes tiredness and shortness of breath."],
"misconceptions":[{"wrong":"A healthy diet only needs to include fruits and vegetables.","right":"A healthy diet needs all seven nutrient groups, so we must eat a variety of foods, not just fruit and vegetables."},{"wrong":"Everyone of the same age should eat the same amount of energy.","right":"Energy needs also depend on things like how active a person is, so two people of the same age can need different amounts."},{"wrong":"Fats are bad and should be left out of the diet completely.","right":"Fats are needed to insulate and cushion our organs, but too much fat in the diet can harm our health."}],
"questions":[{"type":"mcq","q":"Which nutrient is the body's main source of energy?","options":[{"t":"Carbohydrates","correct":true},{"t":"Proteins","why":"Proteins are mainly used for the growth and repair of cells, not as the main energy source."},{"t":"Minerals","why":"Minerals such as iron and calcium are needed in small amounts for jobs like building bones, not for energy."}],"ok":"Carbohydrates are the body's main source of energy so we can move."},{"type":"mcq","q":"Why are proteins needed in the body?","options":[{"t":"For the growth and repair of cells","correct":true},{"t":"To insulate and cushion the organs","why":"That is the job of fats, not proteins."},{"t":"To carry oxygen around the body","why":"Oxygen is carried by red blood cells, which need the mineral iron."}],"ok":"Proteins are the nutrient used for the growth and repair of cells and tissues."},{"type":"tf","q":"Fruits contain all the key nutrients needed to be healthy.","answer":false,"why":"No single food has all the nutrients, so we must eat a variety of foods to be healthy."},{"type":"mcq","q":"Which nutrient keeps digestion healthy and helps prevent constipation?","options":[{"t":"Fibre","correct":true},{"t":"Protein","why":"Protein is used for growth and repair of cells, not for keeping digestion moving."},{"t":"Carbohydrate","why":"Carbohydrates are mainly the body's source of energy, not the nutrient that prevents constipation."}],"ok":"Fibre is the nutrient group important for healthy digestion and preventing constipation."},{"type":"mcq","q":"Why do our bodies need water in the diet?","options":[{"t":"It lets chemical reactions happen and transports substances around the body","correct":true},{"t":"It is the body's main store of energy","why":"Carbohydrates are the main energy source; water provides no energy."},{"t":"It is used to build strong bones","why":"Strong bones need the mineral calcium, not water."}],"ok":"Water allows chemical reactions to take place and transports substances around the body."},{"type":"multi","q":"Tap all of the seven nutrient groups in a healthy diet.","items":[{"t":"Carbohydrates","correct":true},{"t":"Proteins","correct":true},{"t":"Fibre","correct":true},{"t":"Sunlight"},{"t":"Vitamins","correct":true},{"t":"Exercise"}],"ok":"The seven nutrient groups are carbohydrates, proteins, fats, vitamins, minerals, fibre and water.","bad":"Sunlight and exercise are good for health but they are not nutrient groups in the diet."},{"type":"categorise","q":"Sort each nutrient into the job it does in the body.","bins":["Energy","Growth and repair","Strong bones"],"items":[{"t":"Carbohydrates","bin":"Energy"},{"t":"Fats","bin":"Energy"},{"t":"Proteins","bin":"Growth and repair"},{"t":"Calcium","bin":"Strong bones"}],"ok":"Carbohydrates and fats give energy, proteins are for growth and repair, and calcium builds strong bones.","bad":"Each nutrient group has its own main purpose, so match the nutrient to the job it is needed for."},{"type":"mcq","q":"Which mineral do red blood cells need to carry oxygen around the body?","options":[{"t":"Iron","correct":true},{"t":"Calcium","why":"Calcium is the mineral used to build strong bones, not to carry oxygen."},{"t":"Vitamin C","why":"Vitamin C is a vitamin that helps fight infections; it is not the mineral red blood cells need."}],"ok":"Iron is the mineral that red blood cells need to carry oxygen around the body."},{"type":"tf","q":"Fats are needed in the diet, but eating too much fat can harm our health.","answer":true,"why":"Fats insulate and cushion our organs, yet a high-fat intake can damage health, so balance is needed."},{"type":"categorise","q":"Sort each food by the main nutrient group it provides.","bins":["Carbohydrate","Protein"],"items":[{"t":"Pasta","bin":"Carbohydrate"},{"t":"Potatoes","bin":"Carbohydrate"},{"t":"Eggs","bin":"Protein"},{"t":"Fish","bin":"Protein"}],"ok":"Pasta and potatoes are good sources of carbohydrate, while eggs and fish provide protein.","bad":"Some foods provide more than one nutrient, but here sort by the main group each one gives."},{"type":"mcq","q":"Two people are the same age. Why might one need more energy each day than the other?","options":[{"t":"One is much more active and moves around more","correct":true},{"t":"Everyone the same age must use exactly the same energy","why":"Energy needs also depend on things like activity, so people the same age can need different amounts."},{"t":"Energy needs only depend on how tall a person is","why":"Energy needs are linked to activity and growth, not just height."}],"ok":"Moving more means contracting more muscles, which needs more energy, so an active person needs more."},{"type":"tf","q":"A growing child can need a lot of energy because their body is growing and developing.","answer":true,"why":"Children are growing and developing, so they need plenty of energy for this."},{"type":"numeric","kicker":"Read the chart","q":"On a bar chart, a child aged 1 year has a bar of height 3500. What is this child's energy requirement?","hint":"The bar height equals the number for that person on the y-axis.","answer":3500,"unit":"kJ","ok":"The bar height equals the energy requirement, so this child needs 3500 kJ."},{"type":"order","q":"Put these age groups in order of energy needed per day, from least to most (energy rises with age in this data).","items":["0-5 years","6-10 years","11-15 years","16-20 years"],"ok":"In the data the energy needed per day rose with age."},{"type":"mcq","q":"A person takes in more energy than their body uses, every day. What is likely to happen?","options":[{"t":"Their body mass increases and they may become overweight","correct":true},{"t":"Their body mass decreases and they may become underweight","why":"Body mass only decreases when less energy is taken in than is used."},{"t":"Their body mass stays exactly the same","why":"Extra energy taken in is stored as fat, so body mass tends to increase over time."}],"ok":"When more energy is taken in than used, the extra is stored as fat and body mass increases."},{"type":"mcq","q":"How can obesity lead to a heart attack or stroke?","options":[{"t":"Fatty substances build up in the arteries, leaving less space for blood to flow","correct":true},{"t":"The bones become too weak to support the body","why":"Weak bones come from a lack of calcium; obesity affects the arteries and blood flow."},{"t":"The body suddenly runs out of all its energy stores","why":"Obesity comes from too much stored energy, not from running out of it."}],"ok":"Fatty substances build up in the arteries so blood has less space to flow."},{"type":"multi","q":"Tap all the symptoms of anaemia.","items":[{"t":"Tiredness","correct":true},{"t":"Shortness of breath","correct":true},{"t":"Stronger bones"},{"t":"Lack of energy","correct":true},{"t":"Better eyesight"}],"ok":"Anaemia causes tiredness, lack of energy and shortness of breath.","bad":"Stronger bones and better eyesight are not symptoms; anaemia makes a person feel tired and breathless."},{"type":"mcq","q":"A person lacks iron in their diet. Which deficiency disease are they most likely to get?","options":[{"t":"Anaemia","correct":true},{"t":"Obesity","why":"Obesity comes from taking in too much energy, not from a lack of iron."},{"t":"Type 2 diabetes","why":"Type 2 diabetes is linked to obesity, whereas a lack of iron causes anaemia."}],"ok":"A lack of iron means fewer red blood cells are made, which causes anaemia."},{"type":"tf","q":"A deficiency disease is caused by missing a key nutrient in the diet.","answer":true,"why":"When a person does not get enough of a key nutrient, they can develop a deficiency disease."}]},

"CHR":{"code":"CHR","title":"Chemical reactions","discipline":"chemistry","blurb":"Discover how atoms rearrange to make brand-new substances, and learn the clues that tell you a reaction has happened.",
"vocab":[{"term":"chemical reaction","definition":"A change where atoms rearrange to make new substances.","say":"KEM-ih-kuhl ree-AK-shun"},{"term":"reactant","definition":"A starting chemical, written on the left of the arrow.","say":"ree-AK-tunt"},{"term":"product","definition":"A chemical made in the reaction, written on the right of the arrow.","say":"PROD-ukt"},{"term":"word equation","definition":"The reaction written with chemical names and an arrow.","say":"WURD ih-KWAY-zhun"},{"term":"combustion","definition":"Burning a fuel in oxygen to release energy.","say":"kum-BUST-yun"},{"term":"thermal decomposition","definition":"Using heat to break one chemical into two or more.","say":"THUR-mul dee-kom-puh-ZISH-un"},{"term":"oxidation","definition":"A reaction where an element joins with oxygen.","say":"ok-sih-DAY-shun"},{"term":"precipitate","definition":"A solid that forms inside a liquid during a reaction.","say":"prih-SIP-ih-tut"},{"term":"effervescence","definition":"The fizzing made when a gas is given off.","say":"ef-er-VESS-unce"},{"term":"conservation of mass","definition":"In a reaction, total mass of products equals total mass of reactants.","say":"kon-ser-VAY-shun of MASS"}],
"facts":["In a chemical reaction, atoms are rearranged to make new substances with new properties.","Reactants go on the left of the arrow; products go on the right.","Chemical equations use an arrow (→) meaning 'turn into', not an equals sign.","Five signs of a reaction are: temperature change, light or flame, colour change, fizzing (effervescence) and a precipitate forming.","Combustion is burning a fuel in oxygen; for most fuels the products are carbon dioxide and water.","Thermal decomposition uses heat to break one reactant into two or more products, such as a metal carbonate into a metal oxide and carbon dioxide.","Oxidation is when an element reacts with oxygen, for example iron + oxygen → iron oxide (rust).","The law of conservation of mass says the total mass of the products equals the total mass of the reactants.","Melting, boiling and dissolving are physical changes, not chemical reactions, because no new substance is made."],
"misconceptions":[{"wrong":"Melting ice or boiling water is a chemical reaction because bubbles form and it gets hot.","right":"These are physical changes; the substance is still water, so no new substance is made."},{"wrong":"The equals sign should be used in chemical equations, like in maths.","right":"The chemicals before and after are different, so we use an arrow (→) meaning 'turn into'."},{"wrong":"When wood burns away to ash, mass is destroyed.","right":"Mass is conserved; gases like carbon dioxide and water vapour escape into the air carrying the missing mass."},{"wrong":"In thermal decomposition two chemicals react together.","right":"Only one reactant is heated, and it breaks down into two or more products."}],
"questions":[{"type":"mcq","q":"What always happens in a chemical reaction?","options":[{"t":"New substances are made as atoms rearrange","correct":true},{"t":"A substance just changes state","why":"Changing state is a physical change, with no new substance."},{"t":"Atoms are destroyed and disappear","why":"Atoms are never destroyed; they are only rearranged."}],"ok":"Atoms rearrange into new substances with new properties."},{"type":"categorise","q":"Sort each chemical into reactant or product for: sodium + chlorine → sodium chloride.","bins":["Reactant","Product"],"items":[{"t":"sodium","bin":"Reactant"},{"t":"chlorine","bin":"Reactant"},{"t":"sodium chloride","bin":"Product"}],"ok":"Reactants are on the left of the arrow, products on the right.","bad":"Remember: left of the arrow = reactants, right of the arrow = products."},{"type":"mcq","q":"Why do chemical equations use an arrow (→) instead of an equals sign?","options":[{"t":"The chemicals turn into different substances, so they are not the same","correct":true},{"t":"Arrows look tidier than equals signs","why":"It is about meaning, not appearance."},{"t":"Maths and chemistry are not allowed to share symbols","why":"They can share symbols; the reason is the chemicals differ."}],"ok":"The arrow means 'turn into', because reactants and products are different."},{"type":"multi","q":"Tap all the signs that a chemical reaction has taken place.","items":[{"t":"A colour change","correct":true},{"t":"Bubbles of gas (fizzing)","correct":true},{"t":"The object gets bigger when stretched"},{"t":"A temperature change","correct":true},{"t":"A precipitate (solid) forming","correct":true}],"ok":"Those are four of the five signs — light or flame is the fifth.","bad":"Stretching is a physical change; look for new substances and the five signs."},{"type":"tf","q":"Melting an ice cube is a chemical reaction.","answer":false,"why":"It is a physical change — the substance is still water, so no new substance forms."},{"type":"mcq","q":"What is the scientific name for burning a fuel in oxygen?","options":[{"t":"Combustion","correct":true},{"t":"Oxidation","why":"Oxidation is any element joining with oxygen; combustion is burning a fuel."},{"t":"Thermal decomposition","why":"That is breaking one chemical down using heat, not burning a fuel."}],"ok":"Burning a fuel in oxygen is called combustion."},{"type":"mcq","q":"For most fuels, what are the two products of combustion?","options":[{"t":"Carbon dioxide and water","correct":true},{"t":"Oxygen and hydrogen","why":"Oxygen is a reactant, not a product, in combustion."},{"t":"Carbon dioxide and oxygen","why":"Oxygen is used up; the products are carbon dioxide and water."}],"ok":"fuel + oxygen → carbon dioxide + water."},{"type":"order","q":"Put the parts of this combustion word equation in order: methane + oxygen → carbon dioxide + water.","items":["methane","oxygen","carbon dioxide","water"],"ok":"Reactants methane and oxygen turn into carbon dioxide and water."},{"type":"multi","q":"Tap all three things needed for combustion (the fire triangle).","items":[{"t":"Fuel","correct":true},{"t":"Oxygen","correct":true},{"t":"Heat","correct":true},{"t":"Water"},{"t":"Carbon dioxide"}],"ok":"Fuel, oxygen and heat — remove any one and the fire stops.","bad":"Water and carbon dioxide help put fires out; the triangle is fuel, oxygen and heat."},{"type":"mcq","q":"In thermal decomposition, how many reactants are broken down?","options":[{"t":"One reactant breaks into two or more products","correct":true},{"t":"Two reactants join into one product","why":"That describes a different reaction; decomposition starts with one chemical."},{"t":"Three reactants make three products","why":"Thermal decomposition starts with just one reactant."}],"ok":"Heat breaks one reactant into two or more products."},{"type":"mcq","q":"A metal carbonate is heated and breaks down. What are the two products?","options":[{"t":"A metal oxide and carbon dioxide","correct":true},{"t":"A metal and oxygen","why":"The metal stays joined to oxygen as a metal oxide; carbon dioxide is also released."},{"t":"Water and carbon dioxide","why":"Those are combustion products; carbonates give a metal oxide and carbon dioxide."}],"ok":"metal carbonate → metal oxide + carbon dioxide."},{"type":"tf","q":"When copper carbonate is heated it turns from green to black, which is a sign a reaction has happened.","answer":true,"why":"The colour change from green to black shows a new substance (copper oxide) has formed."},{"type":"mcq","q":"What is an oxidation reaction?","options":[{"t":"An element reacting with oxygen","correct":true},{"t":"A fuel breaking apart when heated","why":"That is thermal decomposition, not oxidation."},{"t":"A solid dissolving in water","why":"Dissolving is a physical change, not a reaction with oxygen."}],"ok":"Oxidation is an element joining with oxygen, like metal + oxygen → metal oxide."},{"type":"mcq","q":"Rust forms when iron reacts with oxygen. What is the word equation?","options":[{"t":"iron + oxygen → iron oxide","correct":true},{"t":"iron → iron oxide + oxygen","why":"Oxygen is a reactant here; it joins the iron, it is not produced."},{"t":"iron + water → iron oxide","why":"In this unit rust is iron reacting with oxygen to make iron oxide."}],"ok":"iron + oxygen → iron oxide, and iron oxide is rust."},{"type":"tf","q":"In a chemical reaction, atoms can be created or destroyed, so mass changes.","answer":false,"why":"Atoms are only rearranged, never created or destroyed, so the total mass stays the same."},{"type":"numeric","kicker":"Work it out","q":"22.4 g of iron reacts with 9.6 g of oxygen to make iron oxide. Using conservation of mass, what mass of iron oxide is made?","hint":"Add the masses of the reactants — the product has the same total mass.","answer":32,"unit":"g","ok":"22.4 + 9.6 = 32 g, because mass is conserved."},{"type":"numeric","kicker":"Work it out","q":"4 g of methane burns to make 11 g of carbon dioxide and 9 g of water. What mass of oxygen reacted?","hint":"Products total 11 + 9 = 20 g. Reactants must total the same, so subtract the methane.","answer":16,"unit":"g","ok":"Products are 20 g, so oxygen = 20 − 4 = 16 g."},{"type":"categorise","q":"Is each change a chemical reaction or a physical change?","bins":["Chemical reaction","Physical change"],"items":[{"t":"Wood burning in air","bin":"Chemical reaction"},{"t":"Iron going rusty","bin":"Chemical reaction"},{"t":"Ice melting into water","bin":"Physical change"},{"t":"Salt dissolving in water","bin":"Physical change"}],"ok":"Chemical reactions make new substances; physical changes do not.","bad":"Ask: has a new substance formed? If not, it is a physical change."},{"type":"numeric","kicker":"Work it out","q":"In a sealed flask, the reactants have a total mass of 50 g. What is the total mass of the products?","hint":"Conservation of mass means the products weigh exactly the same as the reactants.","answer":50,"unit":"g","ok":"Mass is conserved, so the products also have a mass of 50 g."},{"type":"tf","q":"When iron wool is burned in air it gains mass because oxygen atoms from the air join the iron.","answer":true,"why":"The oxygen was in the air; once it bonds to the iron, the mass on the balance increases."}]},

"PRS":{"code":"PRS","title":"Pressure","discipline":"physics","blurb":"Find out why water squeezes harder the deeper you dive, why huge metal ships still float, and how to work out pressure.",
"vocab":[{"term":"fluid","definition":"A substance that can flow: any liquid or gas.","say":"FLOO-id"},{"term":"pressure","definition":"The force pushing on each unit of area of a surface.","say":"PRESH-er"},{"term":"upthrust","definition":"The upward push a fluid gives to an object in it.","say":"UP-thrust"},{"term":"weight","definition":"The downward force on an object caused by gravity.","say":"WAYT"},{"term":"density","definition":"How many particles are packed into a fixed volume.","say":"DEN-sit-ee"},{"term":"atmosphere","definition":"The layer of gases that surrounds the Earth.","say":"AT-moss-feer"},{"term":"atmospheric pressure","definition":"The pressure caused by air particles colliding with an object.","say":"at-moss-FERR-ik PRESH-er"},{"term":"pascal","definition":"The unit of pressure, equal to one newton per square metre.","say":"PASS-kal"},{"term":"area","definition":"The size of a surface, measured in square metres.","say":"AIR-ee-uh"},{"term":"resultant force","definition":"The single overall force left after combining all forces.","say":"ree-ZUL-tant FORS"}],
"facts":["A fluid is anything that can flow, so liquids and gases are both fluids, but solids are not.","Particles in a liquid or gas constantly collide with surfaces, and these collisions create pressure.","Pressure in a liquid increases with depth, because there is a greater weight of water pushing down from above.","Pressure in a fluid acts in all directions, which is why a dam wall is built thicker at the bottom.","An object floats when its weight is balanced by an equal upthrust, giving a resultant force of zero.","Spreading a material into a wide shape increases the area touching the water, so the upthrust grows and it can float.","Atmospheric pressure falls as you go higher up, because the air is less dense and there is less weight of air above you.","Pressure is the force per unit area, found using the equation pressure = force ÷ area.","The unit of pressure is the pascal (Pa), which is the same as one newton per square metre (N/m²)."],
"misconceptions":[{"wrong":"Sand is a liquid because it can be poured and flow.","right":"Sand is made of tiny solid grains; each grain keeps its fixed shape, so sand is not a true fluid."},{"wrong":"Heavy objects always sink and light objects always float.","right":"What matters is whether upthrust balances weight; a huge steel ship floats because its shape gives a large upthrust."},{"wrong":"Atmospheric pressure drops higher up because the particles stop moving.","right":"The particles still move; there are simply fewer of them in each volume, so fewer collisions and lower pressure."},{"wrong":"Standing on one foot gives less pressure than two feet because it feels lighter.","right":"The same weight on a smaller area means a higher pressure, so one foot presses harder, not softer."}],
"questions":[{"type":"mcq","q":"Which of these is the best description of a fluid?","options":[{"t":"A substance that can flow, such as a liquid or a gas","correct":true},{"t":"Any substance that is wet to touch","why":"Gases are fluids too, and they are not wet."},{"t":"A substance with a fixed shape","why":"Fluids have no fixed shape; that describes a solid."}],"ok":"A fluid is anything that can flow, so both liquids and gases count."},{"type":"tf","q":"A solid is a fluid because its particles are touching.","answer":false,"why":"Solids cannot flow; their particles only vibrate in fixed positions, so solids are not fluids."},{"type":"categorise","q":"Sort each substance into fluid or not a fluid.","bins":["Fluid","Not a fluid"],"items":[{"t":"Water","bin":"Fluid"},{"t":"Air","bin":"Fluid"},{"t":"Carbon dioxide gas","bin":"Fluid"},{"t":"A wooden block","bin":"Not a fluid"},{"t":"A metal brick","bin":"Not a fluid"}],"ok":"Liquids and gases flow, so they are fluids; solids keep a fixed shape.","bad":"Remember: if it can flow and take the shape of its container, it is a fluid."},{"type":"mcq","q":"What causes a liquid to exert a pressure on the sides of its container?","options":[{"t":"The liquid particles colliding with the container walls","correct":true},{"t":"The container squeezing the liquid inwards","why":"It is the liquid's own particles hitting the walls that creates the pressure."},{"t":"Air being trapped inside the liquid","why":"Pressure comes from the liquid particles themselves colliding, not from trapped air."}],"ok":"Countless particle collisions with the walls add up to the pressure of the liquid."},{"type":"tf","q":"As you go deeper into water, the pressure the water exerts increases.","answer":true,"why":"There is a greater weight of water above you pushing down, so the pressure is higher."},{"type":"order","q":"Order these submarine positions from lowest water pressure to highest water pressure.","items":["Just below the surface","At mid-depth in the tank","At the bottom of the tank"],"ok":"The deeper you go, the greater the weight of water above, so the higher the pressure."},{"type":"mcq","q":"Why is a dam wall built thicker at the bottom than at the top?","options":[{"t":"The water pressure is greatest at the bottom, so the wall must be stronger there","correct":true},{"t":"The water is colder at the bottom and shrinks the wall","why":"Temperature is not the reason; it is the higher pressure deep down."},{"t":"The bottom of the wall has to hold up the top of the wall","why":"The wall is thick to resist the high water pressure, not to support its own top."}],"ok":"More water above means more weight pushing down, so the pressure is highest at the base."},{"type":"mcq","q":"An object floats in water. What do we know about the forces on it?","options":[{"t":"The upthrust is equal to the weight, so the resultant force is zero","correct":true},{"t":"The weight is greater than the upthrust","why":"If weight were greater, the resultant force would pull it down and it would sink."},{"t":"There is no upthrust acting on it at all","why":"Upthrust must act and balance the weight, or the object could not float."}],"ok":"Balanced weight and upthrust give a resultant force of zero, so a floating object stays put."},{"type":"multi","q":"Tap all the ways you could make a lump of metal float in water.","items":[{"t":"Spread it into a wide boat shape so more area touches the water","correct":true},{"t":"Shape it so the upthrust grows until it equals the weight","correct":true},{"t":"Squash it into a small dense ball"},{"t":"Make it heavier without changing its shape"}],"ok":"Changing the shape to increase the area in contact raises the upthrust until it balances the weight.","bad":"Floating is about increasing upthrust to match the weight, not about adding mass."},{"type":"tf","q":"A steel ship floats even though steel is denser than water, because its shape gives a large enough upthrust.","answer":true,"why":"Spreading the
