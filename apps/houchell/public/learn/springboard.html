:[{"t":"two of the same allele for a gene","correct":true},{"t":"two different alleles","why":"That is heterozygous."},{"t":"only one allele","why":"Organisms have two alleles per gene (one from each parent)."}],"ok":"Homozygous means two identical alleles; heterozygous means two different ones."}]},"GBV3":{"code":"GBV3","title":"Variation & evolution","discipline":"biology","blurb":"Variation, natural selection, selective breeding, genetic engineering and evidence for evolution.","vocab":[{"term":"variation","definition":"the differences in characteristics between individuals","say":"vair-ee-ay-shun"},{"term":"natural selection","definition":"the process by which better-adapted organisms survive and reproduce","say":"nat-yur-al selection"},{"term":"evolution","definition":"the gradual change in a species over many generations","say":"ev-oh-loo-shun"},{"term":"selective breeding","definition":"choosing organisms with useful traits to breed together","say":"selective breeding"}],"facts":["Variation between individuals can be due to their genes, their environment, or both; mutations are random changes in genes that produce new alleles.","Evolution by natural selection: there is variation; the best-adapted individuals are more likely to survive and reproduce; they pass on their alleles, so over many generations the species changes. This was proposed by Charles Darwin.","Selective breeding is choosing plants or animals with useful characteristics and breeding them together over generations, for example for high yield or disease resistance.","Genetic engineering transfers a gene from one organism to another, for example to make crops resistant to pests or to produce insulin from bacteria.","Evidence for evolution includes fossils and the way bacteria evolve resistance to antibiotics; extinction happens when a species cannot adapt to a change."],"misconceptions":[{"wrong":"Individual animals change themselves to suit the environment and pass this on.","right":"Evolution works on variation already present: better-adapted individuals survive and pass on their alleles."},{"wrong":"All variation is caused by genes.","right":"Variation can be caused by genes, the environment, or a combination of both."}],"questions":[{"type":"mcq","q":"What is natural selection?","options":[{"t":"Better-adapted organisms survive and reproduce, passing on their alleles","correct":true},{"t":"Animals choosing their own genes","why":"Organisms cannot choose their genes."},{"t":"Breeding chosen animals together","why":"That is selective breeding, done by humans."}],"ok":"In natural selection the best-adapted survive and pass on their alleles."},{"type":"mcq","q":"What can cause variation between individuals?","options":[{"t":"Their genes, their environment, or both","correct":true},{"t":"Only their genes","why":"Environment also causes variation."},{"t":"Only their environment","why":"Genes also cause variation."}],"ok":"Variation can be genetic, environmental, or a mix of both."},{"type":"mcq","q":"What is selective breeding?","options":[{"t":"Humans choosing organisms with useful traits to breed together","correct":true},{"t":"Transferring a gene between organisms","why":"That is genetic engineering."},{"t":"Random survival in the wild","why":"That is natural selection."}],"ok":"Selective breeding is choosing and breeding organisms for useful characteristics."},{"type":"mcq","q":"What is genetic engineering?","options":[{"t":"Transferring a gene from one organism to another","correct":true},{"t":"Breeding the strongest animals over generations","why":"That is selective breeding."},{"t":"Letting a species die out","why":"That is extinction."}],"ok":"Genetic engineering transfers a gene into another organism."},{"type":"mcq","q":"How do bacteria becoming resistant to antibiotics support evolution?","options":[{"t":"Resistant bacteria survive and reproduce, so resistance spreads","correct":true},{"t":"Antibiotics make bacteria stronger on purpose","why":"Resistance arises from variation and natural selection, not on purpose."},{"t":"It does not support evolution","why":"It is a clear, fast example of natural selection."}],"ok":"Resistant bacteria survive antibiotics and pass on resistance — natural selection in action."},{"type":"multi","q":"Tap pieces of evidence for evolution.","items":[{"t":"Fossils","correct":true},{"t":"Antibiotic resistance in bacteria","correct":true},{"t":"The colour of a painted wall"},{"t":"Similarities between related species","correct":true}],"ok":"Fossils, antibiotic resistance and species similarities are evidence for evolution.","bad":"A painted wall's colour is not biological evidence for evolution."},{"type":"tf","q":"Extinction happens when a species cannot adapt to a change in its environment.","answer":true,"why":"If a species cannot adapt to environmental change, it may die out (extinction)."}]},"GBV-EX":{"code":"GBV-EX","title":"Inheritance — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Inheritance, variation and evolution.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Two heterozygous parents (Bb) are crossed. What fraction of offspring are expected to show the recessive characteristic?","options":[{"t":"One quarter (1 in 4)","correct":true},{"t":"Three quarters","why":"Three quarters show the dominant characteristic; a quarter show recessive."},{"t":"None","why":"One quarter (bb) show the recessive characteristic."}],"ok":"Bb x Bb gives a 3:1 ratio, so one quarter are bb (recessive)."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how a population of bacteria can become resistant to an antibiotic, using ideas about natural selection.","scheme":["There is variation in the bacteria due to random mutations (1)","Some bacteria have a mutation that makes them resistant to the antibiotic (1)","When the antibiotic is used, non-resistant bacteria are killed (1)","The resistant bacteria survive and reproduce (1)","passing on the resistance allele to their offspring (1)","over time the whole population becomes resistant (1)"],"model":"Random mutations create variation, and by chance some bacteria are resistant to the antibiotic. When the antibiotic is used it kills the non-resistant bacteria, but the resistant ones survive and reproduce, passing on the resistance allele. Over many generations the resistant bacteria become common, so the whole population is resistant."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe the steps of selective breeding to produce cows that give more milk.","scheme":["Choose the cows that produce the most milk (parents with the desired trait) (1)","Breed these cows together (1)","From the offspring, again select those that give the most milk (1)","Repeat over many generations until milk yield is high (1)"],"model":"Choose the cows that produce the most milk and breed them together. From their offspring, again select those with the highest milk yield and breed them. Repeating this over many generations gradually increases the milk yield of the herd."}]},"GBY1":{"code":"GBY1","title":"Ecosystems & adaptation","discipline":"biology","blurb":"Communities, competition, adaptations and feeding relationships.","vocab":[{"term":"ecosystem","definition":"all the living things in an area plus their non-living surroundings","say":"ee-koh-sis-tem"},{"term":"community","definition":"all the populations of different species living in a habitat","say":"com-yoon-it-ee"},{"term":"adaptation","definition":"a feature that helps an organism survive in its environment","say":"ad-ap-tay-shun"},{"term":"food chain","definition":"a diagram showing what eats what, starting with a producer","say":"food chayn"}],"facts":["An ecosystem is all the living organisms (the community) plus the non-living (abiotic) factors in an area.","Organisms compete for resources: plants compete for light, water, space and minerals; animals compete for food, water, mates and territory.","Abiotic factors (such as temperature, light and water) and biotic factors (such as food, predators and disease) affect where organisms can live.","Adaptations help organisms survive, for example a cactus's spines and water storage, or an Arctic fox's white fur and small ears.","A food chain shows feeding relationships, always starting with a producer (usually a green plant) that makes food by photosynthesis."],"misconceptions":[{"wrong":"A food chain can start with an animal.","right":"A food chain always starts with a producer, usually a green plant, that makes its own food."},{"wrong":"Abiotic factors are living things.","right":"Abiotic factors are non-living (temperature, light, water); biotic factors are living (food, predators)."}],"questions":[{"type":"mcq","q":"What is an ecosystem?","options":[{"t":"All the living organisms plus the non-living factors in an area","correct":true},{"t":"Only the animals in an area","why":"An ecosystem includes plants and non-living factors too."},{"t":"A single food chain","why":"An ecosystem is much more than one food chain."}],"ok":"An ecosystem is the community plus its abiotic surroundings."},{"type":"categorise","q":"Sort each factor as abiotic or biotic.","bins":["Abiotic","Biotic"],"items":[{"t":"Temperature","bin":"Abiotic"},{"t":"Light intensity","bin":"Abiotic"},{"t":"Number of predators","bin":"Biotic"},{"t":"Availability of food","bin":"Biotic"},{"t":"Water availability","bin":"Abiotic"}],"ok":"Abiotic factors are non-living; biotic factors are living.","bad":"Temperature, light and water are abiotic; predators and food are biotic."},{"type":"mcq","q":"What do plants compete for?","options":[{"t":"Light, water, space and minerals","correct":true},{"t":"Mates and territory only","why":"Those are mainly animal competition; plants compete for light, water, space and minerals."},{"t":"Nothing — plants do not compete","why":"Plants do compete, e.g. for light and water."}],"ok":"Plants compete for light, water, space and minerals."},{"type":"mcq","q":"What always comes first in a food chain?","options":[{"t":"A producer (usually a green plant)","correct":true},{"t":"A predator","why":"Producers come first; predators are higher up."},{"t":"A decomposer","why":"Producers start the chain, making food by photosynthesis."}],"ok":"A food chain starts with a producer that makes food by photosynthesis."},{"type":"mcq","q":"How is a cactus adapted to a hot, dry desert?","options":[{"t":"It has spines and stores water in its stem","correct":true},{"t":"It has large flat leaves","why":"Large leaves would lose too much water; cacti have spines."},{"t":"It has thick white fur","why":"Fur is an animal adaptation, not a plant one."}],"ok":"Spines reduce water loss and the stem stores water."},{"type":"tf","q":"Animals may compete for food, water, mates and territory.","answer":true,"why":"Animals compete for resources such as food, water, mates and territory."},{"type":"mcq","q":"Which is an abiotic factor that affects where organisms live?","options":[{"t":"Temperature","correct":true},{"t":"Number of predators","why":"Predators are a biotic (living) factor."},{"t":"Availability of food","why":"Food is a biotic factor."}],"ok":"Temperature is a non-living (abiotic) factor."}]},"GBY2":{"code":"GBY2","title":"Cycles & biodiversity","discipline":"biology","blurb":"The carbon and water cycles, biodiversity, and human impacts on the environment.","vocab":[{"term":"biodiversity","definition":"the variety of all the different species in an area","say":"by-oh-di-ver-sit-ee"},{"term":"decomposer","definition":"a microorganism that breaks down dead material, recycling nutrients","say":"dee-com-poh-zer"},{"term":"carbon cycle","definition":"the way carbon is recycled between living things, the air and the ground","say":"car-bon cycle"}],"facts":["Materials are recycled in ecosystems. In the carbon cycle, photosynthesis removes carbon dioxide from the air, while respiration, combustion and decomposition return it.","Decomposers (bacteria and fungi) break down dead organisms and waste, releasing nutrients back into the soil.","In the water cycle, water evaporates, condenses to form clouds, and falls as precipitation, providing fresh water on land.","Biodiversity is the variety of different species in an ecosystem; high biodiversity makes an ecosystem more stable.","Human activities reduce biodiversity: pollution, deforestation and land use destroy habitats, and burning fossil fuels increases carbon dioxide and methane, causing global warming. Conservation and replanting help protect biodiversity."],"misconceptions":[{"wrong":"Decomposers are harmful and should be removed.","right":"Decomposers are vital: they recycle nutrients back into the ecosystem."},{"wrong":"Higher biodiversity makes an ecosystem less stable.","right":"Higher biodiversity generally makes an ecosystem more stable and resilient."}],"questions":[{"type":"mcq","q":"Which process removes carbon dioxide from the air in the carbon cycle?","options":[{"t":"Photosynthesis","correct":true},{"t":"Respiration","why":"Respiration returns carbon dioxide to the air."},{"t":"Combustion","why":"Combustion (burning) releases carbon dioxide."}],"ok":"Photosynthesis takes carbon dioxide out of the air."},{"type":"multi","q":"Tap the processes that return carbon dioxide to the atmosphere.","items":[{"t":"Respiration","correct":true},{"t":"Combustion (burning)","correct":true},{"t":"Decomposition","correct":true},{"t":"Photosynthesis"}],"ok":"Respiration, combustion and decomposition return carbon dioxide; photosynthesis removes it.","bad":"Photosynthesis removes carbon dioxide; it does not return it."},{"type":"mcq","q":"What do decomposers do?","options":[{"t":"Break down dead material and recycle nutrients","correct":true},{"t":"Make food by photosynthesis","why":"Producers do that, not decomposers."},{"t":"Hunt and eat live prey","why":"Decomposers break down dead matter, not live prey."}],"ok":"Decomposers recycle nutrients by breaking down dead organisms and waste."},{"type":"mcq","q":"What is biodiversity?","options":[{"t":"The variety of different species in an area","correct":true},{"t":"The number of one species only","why":"Biodiversity is about the variety of species, not just one."},{"t":"The amount of water in an area","why":"Biodiversity is about species variety, not water."}],"ok":"Biodiversity is the variety of species in an ecosystem."},{"type":"multi","q":"Tap human activities that reduce biodiversity.","items":[{"t":"Deforestation","correct":true},{"t":"Pollution","correct":true},{"t":"Burning fossil fuels","correct":true},{"t":"Setting up nature reserves"}],"ok":"Deforestation, pollution and fossil fuel use harm biodiversity.","bad":"Nature reserves protect biodiversity, rather than reducing it."},{"type":"tf","q":"Higher biodiversity tends to make an ecosystem more stable.","answer":true,"why":"Greater variety of species makes an ecosystem more resilient and stable."},{"type":"mcq","q":"In the water cycle, what happens after water evaporates?","options":[{"t":"It condenses to form clouds, then falls as precipitation","correct":true},{"t":"It turns into carbon dioxide","why":"Water does not become carbon dioxide."},{"t":"It disappears permanently","why":"Water is recycled; it condenses and falls again."}],"ok":"Evaporated water condenses into clouds and falls as rain or snow."}]},"GBY-EX":{"code":"GBY-EX","title":"Ecology — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Ecology.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A food chain is: grass to rabbit to fox. What is the producer?","options":[{"t":"Grass","correct":true},{"t":"Rabbit","why":"The rabbit is a primary consumer, not the producer."},{"t":"Fox","why":"The fox is a predator, not the producer."}],"ok":"Grass is the producer; it makes food by photosynthesis."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how carbon is recycled in the carbon cycle, naming the main processes involved.","scheme":["Carbon dioxide is removed from the air by photosynthesis in plants (1)","Carbon becomes part of glucose / plant material (1)","It passes to animals when they eat plants (feeding) (1)","Respiration by plants and animals returns carbon dioxide to the air (1)","Decomposers break down dead organisms, releasing carbon dioxide (1)","Combustion (burning fossil fuels/wood) also returns carbon dioxide to the air (1)"],"model":"Plants remove carbon dioxide from the air by photosynthesis, turning carbon into glucose and plant material. Animals gain carbon by eating plants. Respiration in plants and animals returns carbon dioxide to the air, as does decomposition of dead organisms by decomposers, and combustion when fuels or wood are burned. This keeps carbon cycling between living things, the air and the ground."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe two ways human activity reduces biodiversity and one way it can be protected.","scheme":["Deforestation destroys habitats (1)","Pollution / burning fossil fuels harms organisms and warms the planet (1)","(any two human impacts for 2 marks)","Protection: setting up nature reserves / replanting forests / protecting habitats (1) (plus a second valid impact)"],"model":"Human activities such as deforestation destroy habitats, and pollution and burning fossil fuels harm organisms and contribute to global warming, both reducing biodiversity. Biodiversity can be protected by setting up nature reserves, replanting forests and protecting habitats."}]}});

/* ---------- Voice (Web Speech API) -------------------------------------- */
const Voice = {
  synth: window.speechSynthesis || null,
  SR: window.SpeechRecognition || window.webkitSpeechRecognition || null,
  voice: null,
  ready(){ return !!this.synth; },
  canListen(){ return !!this.SR; },
  pickVoice(){
    if(!this.synth) return;
    const vs = this.synth.getVoices();
    this.voice = vs.find(v=>/en-GB/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || vs[0] || null;
  },
  speak(text, rate){
    if(!this.synth || !State.s.sound) return;
    try{
      this.synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-GB"; u.rate = rate || 0.92; u.pitch = 1;
      if(this.voice) u.voice = this.voice;
      this.synth.speak(u);
    }catch(e){}
  },
  say(text, rate){   // explicit read-aloud: speaks even when ambient sound is off
    if(!this.synth) return;
    try{ this.synth.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="en-GB"; u.rate=rate||0.92; u.pitch=1; if(this.voice)u.voice=this.voice; this.synth.speak(u); }catch(e){}
  },
  listen(onResult, onErr){
    if(!this.SR){ onErr && onErr("unsupported"); return null; }
    try{
      const r = new this.SR();
      r.lang = "en-GB"; r.interimResults = false; r.maxAlternatives = 3;
      r.onresult = (e)=>{ const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript); onResult(alts); };
      r.onerror = (e)=> onErr && onErr(e.error || "error");
      r.start();
      return r;
    }catch(e){ onErr && onErr("error"); return null; }
  }
};
if(Voice.synth){ Voice.pickVoice(); window.speechSynthesis.onvoiceschanged = ()=>Voice.pickVoice(); }

const norm = s => String(s||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
function lev(a,b){ const m=a.length,n=b.length; const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]); for(let j=0;j<=n;j++)d[0][j]=j; for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){ d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1)); } return d[m][n]; }
function saidMatch(heardAlts, target){
  const t = norm(target); if(!t) return false;
  const tol = Math.max(1, Math.floor(t.length/5));
  return (heardAlts||[]).some(h=>{ const hh=norm(h); if(!hh) return false;
    if(hh===t || hh.includes(t) || t.includes(hh)) return true;
    if(lev(hh,t) <= tol) return true;
    const tw=t.split(" ").filter(w=>w.length>2); if(tw.length && tw.every(w=>hh.includes(w))) return true;
    return false; });
}
function typedMatch(typed, target){ const a=norm(typed), b=norm(target); return a===b || lev(a,b)<=1; }
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }

/* ---------- State & persistence ----------------------------------------- */
const KEY = "feynman-springboard-v1";
const DAY_MS = 86400000;
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/DAY_MS); }
function addDays(dateStr, n){ const d=new Date(dateStr+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }

// Spaced retrieval (Leitner). Box -> days until due again. Expanding intervals.
const REVIEW_INTERVALS = [1, 2, 4, 9, 20];
function recordReview(qid, ok){
  if(!qid) return;
  const code = qid.split("#")[0];
  const r = State.s.review[qid] || { box:0, unit:code };
  if(!ok) r.misses = (r.misses||0)+1;   // track for adaptive "fix weak spots"
  r.box = ok ? Math.min(REVIEW_INTERVALS.length-1, (r.box||0)+1) : 0;
  r.due = addDays(todayStr(), REVIEW_INTERVALS[r.box]);
  r.unit = code; r.last = todayStr();
  State.s.review[qid] = r;
  State.save();
}
function dueReviews(excludeUnit){
  const t = todayStr(), out = [];
  for(const qid in State.s.review){
    const r = State.s.review[qid];
    if(!r || !r.due) continue;
    if(excludeUnit && r.unit === excludeUnit) continue;
    if(!CONTENT[r.unit]) continue;
    if(r.due <= t) out.push({ qid, unit:r.unit, due:r.due, box:r.box });
  }
  out.sort((a,b)=> a.due<b.due ? -1 : a.due>b.due ? 1 : (a.box-b.box)); // most overdue, then least-learned first
  return out;
}
function retrievalStep(qid){
  const [code, idx] = qid.split("#");
  const q = CONTENT[code] && CONTENT[code].questions[+idx];
  if(!q) return null;
  if(TIER==="foundation" && isHTQ(q)) return null;   // don't resurface Higher-only content in Foundation
  const s = toStep(q); s.qid = qid; s.retrieval = true;
  s.kicker = "🔄 Retrieval · " + CONTENT[code].title;
  return s;
}

const State = {
  s: null,

    let d=null; try{ d=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
    this.s = Object.assign({ xp:0, streak:0, lastDay:null, lessons:{}, dailyXP:{}, words:0, sound:true, seen:false, review:{}, exam:{}, tier:"higher", badges:[], flags:{}, a11y:{textSize:"m", readable:false, contrast:false, motionOff:false} }, d||{});
    if(!this.s.review) this.s.review = {};
    if(!this.s.exam) this.s.exam = {};
    if(!this.s.tier) this.s.tier = "higher";
    if(!this.s.badges) this.s.badges = [];
    if(!this.s.flags) this.s.flags = {};
    if(!this.s.a11y) this.s.a11y = {textSize:"m", readable:false, contrast:false, motionOff:false};
  },
  save(){ try{ localStorage.setItem(KEY, JSON.stringify(this.s)); }catch(e){} syncPush(); },
  lessonDone(id){ return !!this.s.lessons[id]; },
  unitCrowns(code, total){ let c=0; for(let i=0;i<total;i++) if(this.lessonDone(code+"-L"+i)) c++; return c; },
  completeLesson(id, xp, newWords){
    const t=todayStr();
    if(!this.s.lessons[id] || (this.s.lessons[id].xp||0) < xp) this.s.lessons[id]=Object.assign(this.s.lessons[id]||{}, {done:true, xp:xp});
    this.s.xp += xp;
    this.s.dailyXP[t] = (this.s.dailyXP[t]||0) + xp;
    this.s.words += (newWords||0);
    // streak
    if(this.s.lastDay !== t){
      if(this.s.lastDay && daysBetween(this.s.lastDay,t)===1) this.s.streak += 1;
      else this.s.streak = 1;
      this.s.lastDay = t;
    }
    this.save();
  },
  reset(){ localStorage.removeItem(KEY); this.load(); }
};

function stripHtml(h){ return String(h||"").replace(/<[^>]+>/g," ").replace(/&[a-z]+;/g," ").replace(/\s+/g," ").trim(); }
function stepReadText(s){
  if(!s) return "";
  if(s.type==="teach") return (s.h?s.h+". ":"")+stripHtml(s.html);
  if(s.type==="vocab") return s.term+". "+s.def;
  if(s.type==="speak") return "Say the word: "+s.term;
  if(s.type==="listenType") return "Type the word you hear.";
  let t=s.q||"";
  if(s.options) t+=". The options are: "+s.options.map(o=>o.t).join("; ");
  else if(s.items && s.type==="multi") t+=". The options are: "+s.items.map(o=>o.t).join("; ");
  else if(s.bins) t+=". Sort into: "+s.bins.join("; ");
  return t;
}
function readStep(){ const s=L&&L.steps[L.i]; if(s) Voice.say(stepReadText(s)); }

function checkBadges(){ const have=new Set(State.s.badges||[]); const nw=[]; BADGES.forEach(b=>{ if(!have.has(b.id)&&b.test(State.s)){ have.add(b.id); nw.push(b); } }); State.s.badges=[...have]; State.save(); return nw; }

function weakQuestions(){

    if((r.box||0)===0 && (r.misses||0)>0) out.push({ qid, unit:r.unit, misses:r.misses||0 }); }
  out.sort((a,b)=> b.misses-a.misses);
  return out;
}

const GOAL = 40; // daily XP goal
function level(xp){ return Math.floor(xp/100)+1; }

/* ---------- Lesson builder (content -> lessons of steps) ----------------- */
function tfToMcq(q){ return { type:"mcq", q:q.q, tf:true, options:[{t:"True",correct:q.answer===true,why:q.why},{t:"False",correct:q.answer===false,why:q.why}], ok:q.why }; }
function toStep(q){ return q.type==="tf" ? tfToMcq(q) : Object.assign({}, q); }

function vocabIntro(v, disc){ return { type:"vocabIntro", kicker:"New word", term:v.term, say:v.say, def:v.definition, emoji:DISC_EMOJI[disc]||"📘" }; }
function speakStep(v){ return { type:"speak", kicker:"Say it out loud", term:v.term, say:v.say }; }
function listenTypeStep(v){ return { type:"listenType", kicker:"Type what you hear", say:v.say, answer:v.term }; }
function matchVocabStep(vs){
  const pick = vs.slice(0, Math.min(5, vs.length));
  return { type:"match", kicker:"Match the words", q:"Match each word to its meaning.",
    left: pick.map(v=>({ t:v.term, key:v.term })),
    right: shuffle(pick.map(v=>({ t:v.definition, key:v.term }))),
    ok:"Nice — you matched them all.", bad:"Match each word to its plain-English meaning." };
}
function gapVocabStep(vs){
  const v = vs[0]; const others = vs.slice(1).map(x=>x.term);
  const bank = shuffle([v.term, ...others.slice(0,3)]);
  const article = /^[aeiou]/i.test(v.term.trim()) ? "An " : "A ";
  return { type:"gap", kicker:"Sentence builder", q:"Tap the word that fits the meaning.",
    parts:[article, {b:0}, " is ", v.definition, "."], blanks:[v.term], bank, ok:"That's the right word." };
}
function teachFact(text, disc, kicker){ return { type:"teach", kicker:kicker||"Learn", emoji:DISC_EMOJI[disc]||"📘", h:"", html:"<p>"+text+"</p>" }; }

function interleave(a, b){ const out=[]; const n=Math.max(a.length,b.length); for(let i=0;i<n;i++){ if(a[i])out.push(a[i]); if(b[i])out.push(b[i]); } return out; }

function chunk(a,n){ const out=[]; for(let i=0;i<a.length;i+=n) out.push(a.slice(i,i+n)); return out; }
function splitEven(arr,n){ const out=Array.from({length:Math.max(1,n)},()=>[]); arr.forEach((x,i)=>out[i%out.length].push(x)); return out; }

// Combined "arrive at the word" card: hear the word + meaning, then say it back — all in one place.
function vocabStep(v, disc){ return { type:"vocab", kicker:"Key word — hear it & say it", term:v.term, say:v.say, def:v.definition, emoji:DISC_EMOJI[disc]||"📘" }; }

// Does a fact's text actually mention this term (whole word, simple plural)? Used to
// tie a word's card to the fact that explains it. Short words use word boundaries so
// "ore" doesn't match "more"/"store".
function termInFact(term, fact){
  const esc=String(term).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  try{ return new RegExp("\\b"+esc+"s?\\b","i").test(fact); }catch(e){ return false; }
}
// Interleave teaching blocks (each = a fact + its tied word cards) with questions.
function interleaveBlocks(blocks, qs){ const out=[]; const n=Math.max(blocks.length,qs.length); for(let i=0;i<n;i++){ if(blocks[i]) out.push(...blocks[i]); if(qs[i]) out.push(qs[i]); } return out; }

// Higher-tier detection (so Foundation tier can hide HT-only content).
function isHTQ(q){ return /higher/i.test(q.kicker||"") || /^\s*higher tier/i.test(q.q||""); }
function isHTFact(f){ return /^\s*higher tier/i.test(f||""); }
function buildLessons(c){
  const disc=c.discipline, V=c.vocab;
  const rawFacts = (TIER==="foundation") ? c.facts.filter(f=>!isHTFact(f)) : c.facts;
  const facts=rawFacts.map(f=>teachFact(f,disc));
  let QP=c.questions.map((q,idx)=>({q,idx}));
  if(TIER==="foundation") QP=QP.filter(x=>!isHTQ(x.q));
  const Q=QP.map(x=>{ const s=toStep(x.q); s.qid=c.code+"#"+x.idx; return s; });   // qid keeps ORIGINAL index
  const qchunks=chunk(Q,5);
  const n=Math.max(1,qchunks.length);
  const fGroups=splitEven(facts,n);   // round-robin: fact i lives in lesson i%n

  // Tie each word to the first fact that actually explains (mentions) it.
  const wordsByFact={}, unmatched=[];
  V.forEach(v=>{ const fi=rawFacts.findIndex(f=>termInFact(v.term,f)); if(fi>=0){ (wordsByFact[fi]=wordsByFact[fi]||[]).push(v); } else unmatched.push(v); });
  const unmatchedGroups=splitEven(unmatched,n);   // leftover words consolidate at lesson end

  const pTitles=["Learn","Build","Practise","Apply","Master"], pIcons=["📖","🧩","✍️","🔬","🏆"];
  const lessons=[];
  qchunks.forEach((qc,ci)=>{
    const lessonFacts=fGroups[ci]||[];
    // each fact becomes a block: the fact, then the word cards it explains (taught → then hear/say)
    const blocks=lessonFacts.map(fs=>{ const fi=facts.indexOf(fs); return [fs, ...(wordsByFact[fi]||[]).map(v=>vocabStep(v,disc))]; });
    let steps=interleaveBlocks(blocks, qc);
    // words with no explaining fact: consolidate at the end
    const cons=unmatchedGroups[ci]||[];
    cons.forEach(v=>steps.push(vocabStep(v,disc)));
    const lessonWords=lessonFacts.reduce((a,fs)=>a.concat(wordsByFact[facts.indexOf(fs)]||[]),[]).concat(cons);
    if(lessonWords.length>=2) steps.push(matchVocabStep(lessonWords));
    if(lessonWords.length) steps.push(listenTypeStep(lessonWords[lessonWords.length-1]));
    lessons.push({ title:pTitles[ci]||("Round "+(ci+1)), icon:pIcons[ci]||"🎯", kind:"practice", words:lessonWords.length, steps });
  });
  return lessons;
}

const LESSONS = {}; // code -> [lessons]
let TIER = "higher";   // "higher" | "foundation" — Foundation hides Higher-only content

/* ---------- Tracks, sequential gating & recaps (learn-it-all path) ----------
   Each "track" is a sequence a learner unlocks topic by topic: KS3 is one track,
   and each GCSE subject (Physics/Chemistry/Biology) is its own track. A topic is
   complete when all its lessons AND its recap warm-up are done; the next topic in
   the track unlocks only then. Every topic after the first in a track opens with a
   recap drawn from earlier learned material. */
let UNIT_POS = {}; // code -> {track, idx, prev:{code,t}}
function sectionTrack(sec){
  const y=sec.year||"";
  if(/^Year /.test(y)) return "ks3";
  if(/Physics/.test(y)) return "gcse-physics";
  if(/Chemistry/.test(y)) return "gcse-chem";
  if(/Biology/.test(y)) return "gcse-bio";
  return "ks3";
}
function indexTracks(){
  const tr={}; UNIT_POS={};
  PATHWAY.forEach(sec=>{ const t=sectionTrack(sec);
    sec.units.forEach(u=>{ if(u.code && LESSONS[u.code]){ (tr[t]=tr[t]||[]).push(u); } }); });
  Object.keys(tr).forEach(t=> tr[t].forEach((u,i)=>{ UNIT_POS[u.code]={track:t, idx:i, prev:i>0?{code:tr[t][i-1].code,t:tr[t][i-1].t}:null}; }));
}
// (Re)build all lessons for the current tier, then re-index the tracks. Called at
// load and whenever the Higher/Foundation tier is switched in Settings.
function rebuildLessons(){
  TIER = (State.s && State.s.tier) || "higher";
  Object.keys(CONTENT).forEach(code=> LESSONS[code]=buildLessons(CONTENT[code]));
  indexTracks();
}
rebuildLessons();
function unitHasRecap(code){ const p=UNIT_POS[code]; return !!(p && p.idx>0); }
function unitComplete(code){
  const L=LESSONS[code]; if(!L) return false;
  for(let i=0;i<L.length;i++) if(!State.lessonDone(code+"-L"+i)) return false;
  if(unitHasRecap(code) && !State.lessonDone(code+"-RECAP")) return false;
  return true;
}
function unitUnlocked(code){
  const p=UNIT_POS[code]; if(!p) return true;          // special/non-tracked units stay open
  if(p.idx===0) return true;                           // first topic of a track is always open
  return p.prev ? unitComplete(p.prev.code) : true;    // previous topic must be complete
}
// Pool of question ids from earlier units the learner has already started (for recaps).
function earlierQuestionPool(code){
  const pool=[];
  for(const sec of PATHWAY){ for(const u of sec.units){
    if(!u.code || !LESSONS[u.code]) continue;
    if(u.code===code) return pool;
    const total=LESSONS[u.code].length;
    const started = State.unitCrowns(u.code,total)>0 || State.lessonDone(u.code+"-RECAP");
    if(started && CONTENT[u.code]) CONTENT[u.code].questions.forEach((q,idx)=>{ if(q.type!=="exam") pool.push(u.code+"#"+idx); });
  }}
  return pool;
}
function buildRecapSteps(code){
  const steps=[], seen=new Set();
  const add=(qid)=>{ if(steps.length>=6||seen.has(qid))return; const st=retrievalStep(qid); if(st){ st.kicker="🔄 Recap"; steps.push(st); seen.add(qid);} };
  dueReviews(code).forEach(d=>add(d.qid));      // spaced-repetition first
  weakQuestions().forEach(w=>add(w.qid));       // then tricky ones
  shuffle(earlierQuestionPool(code)).forEach(qid=>add(qid)); // then a spread of earlier topics
  return steps;
}
function startRecap(code){
  const steps=buildRecapSteps(code);
  if(!steps.length){ State.completeLesson(code+"-RECAP", 5, 0); render(); return; }
  L={ code, li:-2, id:code+"-RECAP", title:"Recap", steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isRecap:true };
  go("lesson");
}

function unitHTML(u){
  const color = DISC_COLOR[u.d];
  if(u.ext){
    return `<div class="unit">
      <div class="unit-head">
        <div class="badge" style="background:${color}">🧲</div>
        <div class="meta"><div class="t">${u.t}</div><div class="sub"><span class="disc" style="color:${color}">${cap(u.d)}</span> · ready to play</div></div>
        <div class="crowns">▶</div>
      </div>
      <div class="ext-row"><a class="ext-btn" href="${u.ext}">Open the Magnetism lesson →</a></div>
    </div>`;
  }
  if(u.soon){
    return `<div class="unit locked">
      <div class="unit-head">
        <div class="badge" style="background:#C8C2B0">${DISC_EMOJI[u.d]}</div>
        <div class="meta"><div class="t" style="color:#8c856f">${u.t}</div><div class="sub"><span class="disc" style="color:#a59d86">${cap(u.d)}</span> · ${u.n} lessons</div></div>
        <div class="lock-ic">🔒</div>
      </div></div>`;
  }
  // authored, playable
  const lessons = LESSONS[u.code];
  const total = lessons.length;
  const crowns = State.unitCrowns(u.code, total);
  // Locked topic: a previous topic in the track is not finished yet.
  if(!unitUnlocked(u.code)){
    const prev = UNIT_POS[u.code] && UNIT_POS[u.code].prev;
    const prevTitle = prev ? prev.t : "the previous topic";
    return `<div class="unit locked">
      <div class="unit-head">
        <div class="badge" style="background:#C8C2B0">${UNIT_EMOJI[u.code]||DISC_EMOJI[u.d]}</div>
        <div class="meta"><div class="t" style="color:#8c856f">${u.t}</div><div class="sub"><span class="disc" style="color:#a59d86">${cap(u.d)}</span> · ${total} lessons</div></div>
        <div class="lock-ic">🔒</div>
      </div>
      <div class="lockmsg">Finish <b>${prevTitle}</b> to unlock this topic</div>
    </div>`;
  }
  const hasRecap = unitHasRecap(u.code);
  const recapDone = State.lessonDone(u.code+"-RECAP");
  const recapGate = hasRecap && !recapDone;     // must do the recap before new content
  const nextIdx = firstIncomplete(u.code, total);
  let nodes = "";
  if(hasRecap){
    nodes += `<button class="node recap ${recapDone?'done':'next'}" data-recap="1" data-code="${u.code}">
      ${recapDone?'':'<span class="start-pill">Start</span>'}
      <span class="ring">${recapDone?'✓':'🔄'}</span>
      <span class="lab">Recap</span>
    </button>`;
  }
  nodes += lessons.map((ls,i)=>{
    const id=u.code+"-L"+i, done=State.lessonDone(id);
    const isNext = !recapGate && (i===nextIdx) && !done;
    const locked = recapGate || ((i>nextIdx) && !done);
    return `<button class="node ${done?'done':''} ${isNext?'next':''} ${locked?'locked':''}" data-code="${u.code}" data-li="${i}" ${locked?'disabled':''}>
      ${isNext?'<span class="start-pill">Start</span>':''}
      <span class="ring">${done?'✓':ls.icon}</span>
      <span class="lab">${ls.title}</span>
    </button>`;
  }).join("");
  const nodeCount = total + (hasRecap?1:0);
  const cols = nodeCount<=5 ? nodeCount : Math.ceil(nodeCount/2);
  return `<div class="unit${unitComplete(u.code)?' complete':''}">
    <div class="unit-head">
      <div class="badge" style="background:${color}">${UNIT_EMOJI[u.code]||DISC_EMOJI[u.d]}</div>
      <div class="meta"><div class="t">${u.t}</div><div class="sub"><span class="disc" style="color:${color}">${cap(u.d)}</span> · ${total} lessons${hasRecap?' + recap':''}</div></div>
      <div class="crowns">${crowns}/${total} 👑</div>
    </div>
    <div class="ublurb">${CONTENT[u.code].blurb}</div>
    <div class="nodes" style="grid-template-columns:repeat(${cols},minmax(0,1fr))">${nodes}</div>
  </div>`;
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function firstIncomplete(code,total){ for(let i=0;i<total;i++) if(!State.lessonDone(code+"-L"+i)) return i; return total; }

function wirePath(){
  [...document.querySelectorAll(".node:not([disabled])")].forEach(n=> n.onclick=()=>{
    if(n.dataset.recap){ startRecap(n.dataset.code); }
    else { startLesson(n.dataset.code, +n.dataset.li); }
  });
  const rb=document.getElementById("review"); if(rb) rb.onclick=()=>startReview();
}

/* ---------- Lesson session ---------- */
function startLesson(code, li){
  const ls = LESSONS[code][li];
  let steps = ls.steps;
  // Do Now: spaced retrieval of earlier units' content at the start of practice lessons.
  if(ls.kind === "practice"){
    const due = dueReviews(code).slice(0, 3).map(d=>retrievalStep(d.qid)).filter(Boolean);
    if(due.length) steps = [...due, ...ls.steps];
  }
  L = { code, li, id:code+"-L"+li, title:ls.title, steps, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:ls.words||0, rec:null };
  go("lesson");
}

function startReview(){
  const due = dueReviews(null).slice(0, 14).map(d=>retrievalStep(d.qid)).filter(Boolean);
  if(!due.length) return;
  L = { code:"REVIEW", li:-1, id:"review-"+todayStr(), title:"Daily review", steps:due, i:0, xp:0, correct:0, asked:0, hearts:5, checked:false, payload:null, newWords:0, rec:null, isReview:true };
  go("lesson");
}

function topbar(){
  const pct=Math.round(L.i/L.steps.length*100);
  const hearts="❤️".repeat(L.hearts)+"🤍".repeat(Math.max(0,5-L.hearts));
  return `<div class="topbar">
    <button class="iconbtn" id="quit" aria-label="Quit">✕</button>
    <div class="pbar" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"><i style="width:${pct}%"></i></div>
    <button class="iconbtn" id="readaloud" title="Read aloud" aria-label="Read this question aloud">🔊</button>
    <div class="hearts"><span class="hh">${hearts}</span></div></div>`;
}

function renderStep(){
  if(L.i >= L.steps.length){ return finishLesson(); }
  const s=L.steps[L.i];
  let body="";
  if(s.type==="teach") body=viewTeach(s);
  else if(s.type==="vocab") body=viewVocab(s);
  else if(s.type==="speak") body=viewSpeak(s);
  else if(s.type==="listenType") body=viewListenType(s);
  else if(s.type==="mcq") body=viewMcq(s);
  else if(s.type==="multi") body=viewMulti(s);
  else if(s.type==="gap") body=viewGap(s);
  else if(s.type==="match") body=viewMatch(s);
  else if(s.type==="numeric") body=viewNumeric(s);
  else if(s.type==="categorise") body=viewCategorise(s);
  else if(s.type==="order") body=viewOrder(s);
  else if(s.type==="diagram") body=viewDiagram(s);
  else if(s.type==="exam") body=viewExam(s);

  app.innerHTML = topbar() + `<div class="stage fade" id="stage">${body}</div>` + footerShell();
  document.getElementById("quit").onclick=()=>{ if(L.rec){try{L.rec.abort();}catch(e){}} go("home"); };
  document.getElementById("readaloud").onclick=readStep;

  if(s.type==="teach") wireTeachLike(s);
  else if(s.type==="vocab") wireVocab(s);
  else if(s.type==="speak") wireSpeak(s);
  else if(s.type==="listenType") wireListenType(s);
  else if(s.type==="mcq") wireMcq(s);
  else if(s.type==="multi") wireMulti(s);
  else if(s.type==="gap") wireGap(s);
  else if(s.type==="match") wireMatch(s);
  else if(s.type==="numeric") wireNumeric(s);
  else if(s.type==="categorise") wireCategorise(s);
  else if(s.type==="order") wireOrder(s);
  else if(s.type==="diagram") wireDiagram(s);
  else if(s.type==="exam") wireExam(s);
}

/* MCQ */
function viewMcq(s){
  const opts=s.options.map((o,i)=>`<button class="opt" data-idx="${i}"><span class="num">${i+1}</span>${o.t}<span class="mk"></span></button>`).join("");

    <h1 class="prompt fr">${s.q}</h1><div class="opts" id="opts">${opts}</div>

function wireMcq(s){
  L.payload={choice:null};
  const opts=[...document.querySelectorAll(".opt")];
  opts.forEach(b=> b.onclick=()=>{ if(L.checked)return; L.payload.choice=+b.dataset.idx; opts.forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); enableCheck(true); });
  setCheck(()=>{
    const ci=s.options.findIndex(o=>o.correct), chosen=L.payload.choice, ok=chosen===ci;
    opts.forEach((b,i)=>{ b.disabled=true; if(i===ci){b.classList.add("correct");b.querySelector(".mk").textContent="✓";} else if(i===chosen){b.classList.add("wrong");b.querySelector(".mk").textContent="✗";} else b.classList.add("dim"); });
    const why = ok ? s.ok : ((s.options[chosen].why?s.options[chosen].why+" ":"")+`<span class="ans">Answer: ${s.options[ci].t}</span>`);
    gradeQ(ok, why);
  });
}

function wireMulti(s){
  L.payload={set:new Set()};
  const chips=[...document.querySelectorAll(".chip")];
  chips.forEach(c=> c.onclick=()=>{ if(L.checked)return; const i=+c.dataset.idx; if(L.payload.set.has(i)){L.payload.set.delete(i);c.classList.remove("sel");} else {L.payload.set.add(i);c.classList.add("sel");} enableCheck(L.payload.set.size>0); });
  setCheck(()=>{
    let ok=true;
    chips.forEach((c,i)=>{ c.disabled=true; c.classList.remove("sel"); const should=!!s.items[i].correct, picked=L.payload.set.has(i);
      if(should&&picked)c.classList.add("correct"); else if(!should&&picked){c.classList.add("wrong");ok=false;} else if(should&&!picked){c.classList.add("miss");ok=false;} });
    gradeQ(ok, ok?s.ok:s.bad);
  });
}

function viewGap(s){

  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="sentence" id="sentence">${html}</div><div class="bank" id="bank">${bank}</div>`;
}
function wireGap(s){
  L.payload={fill:{}};
  const blanks=[...document.querySelectorAll(".blank")], tokens=[...document.querySelectorAll(".token")];
  function refresh(){
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, tk=L.payload.fill[bi]; bl.classList.toggle("filled",tk!=null);
      bl.innerHTML = tk!=null?`<button>${s.bank[tk]}</button>`:""; if(tk!=null) bl.querySelector("button").onclick=(e)=>{ if(L.checked)return; e.stopPropagation(); delete L.payload.fill[bi]; refresh(); }; });
    tokens.forEach(t=> t.classList.toggle("used", Object.values(L.payload.fill).includes(+t.dataset.w)));
    enableCheck(s.blanks.every((_,bi)=>L.payload.fill[bi]!=null));
  }
  function firstEmpty(){ for(let bi=0;bi<s.blanks.length;bi++) if(L.payload.fill[bi]==null) return bi; return -1; }
  tokens.forEach(t=> t.onclick=()=>{ if(L.checked)return; const bi=firstEmpty(); if(bi<0)return; L.payload.fill[bi]=+t.dataset.w; refresh(); });
  blanks.forEach(bl=> bl.onclick=()=>{ if(L.checked)return; const bi=+bl.dataset.b; if(L.payload.fill[bi]!=null){ delete L.payload.fill[bi]; refresh(); } });
  refresh();
  setCheck(()=>{ let ok=true;
    blanks.forEach(bl=>{ const bi=+bl.dataset.b, word=s.bank[L.payload.fill[bi]], good=word===s.blanks[bi]; bl.classList.add(good?"ok":"bad"); if(!good)ok=false; const inner=bl.querySelector("button"); if(inner)inner.disabled=true; });
    tokens.forEach(t=>t.disabled=true);
    const correct=s.parts.map(p=> typeof p==="string"?p:`<b>${s.blanks[p.b]}</b>`).join("");
    gradeQ(ok, ok?s.ok:`The answer is: “${correct}”`);
  });
}

/* MATCH */
const PAIR_COLORS=["#1E2761","#C99528","#2C5F2D","#7A4FA3","#1E5F8C"];
function viewMatch(s){
  const left=s.left.map((l,i)=>`<button class="mitem mleft" data-idx="${i}">${l.t}<span class="dot"></span></button>`).join("");
  const right=s.right.map((r,i)=>`<button class="mitem mright" data-idx="${i}">${r.t}<span class="dot"></span></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker}</div><h1 class="prompt fr">${s.q}</h1>
    <div class="match"><div class="col">${left}</div><div class="col">${right}</div></div>
    <div class="hint">Tap one on the left, then its match on the right.</div>`;
}
function wireMatch(s){
  L.payload={links:{}, activeLeft:null, colorOf:{}};
  const lefts=[...document.querySelectorAll(".mleft")], rights=[...document.querySelectorAll(".mright")]; let cn=0;
  function clearActive(){ lefts.forEach(l=>l.classList.remove("active")); }
  function paint(){
    lefts.forEach(l=>{ const i=+l.dataset.idx, on=L.payload.links[i]!=null; l.classList.toggle("paired",on); l.querySelector(".dot").style.background=on?L.payload.colorOf[i]:"transparent"; });
    rights.forEach(r=>{ const i=+r.dataset.idx, li=Object.keys(L.payload.links).find(k=>L.payload.links[k]===i), on=li!=null; r.classList.toggle("paired",on); r.querySelector(".dot").style.background=on?L.payload.colorOf[li]:"transparent"; });
    enableCheck(Object.keys(L.payload.links).length===s.left.length);
  }
  lefts.forEach(l=> l.onclick=()=>{ if(L.checked)return; clearActive(); l.classList.add("active"); L.payload.activeLeft=+l.dataset.idx; });
  rights.forEach(r=> r.onclick=()=>{ if(L.checked||L.payload.activeLeft==null)return; const li=L.payload.activeLeft, ri=+r.dataset.idx;
    for(const k of Object.keys(L.payload.links)) if(L.payload.links[k]===ri) delete L.payload.links[k];
    if(L.payload.colorOf[li]==null) L.payload.colorOf[li]=PAIR_COLORS[(cn++)%PAIR_COLORS.length];
    L.payload.links[li]=ri; L.payload.activeLeft=null; clearActive(); paint(); });
  setCheck(()=>{ let ok=true; lefts.forEach(l=>l.disabled=true); rights.forEach(r=>r.disabled=true);
    Object.entries(L.payload.links).forEach(([li,ri])=>{ const good=s.left[li].key===s.right[ri].key; lefts[li].classList.add(good?"correct":"wrong"); rights[ri].classList.add(good?"correct":"wrong"); if(!good)ok=false; });
    gradeQ(ok, ok?s.ok:s.bad);
  });
}

/* NUMERIC (type a number) */
function viewNumeric(s){
  return `<div class="step-kicker mono-kicker">${s.kicker||"Work it out"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    ${s.hint?`<div class="formula">${s.hint}</div>`:''}
    <div class="num-row">

      ${s.unit?`<span class="num-unit">${s.unit}</span>`:''}
    </div>
    <div class="hint">Type the number${s.unit?` (in ${s.unit})`:''}, then press Check.</div>`;
}
function numMatch(typed, s){
  const v=parseFloat(String(typed).replace(/[, ]/g,""));
  if(isNaN(v)) return false;
  const accept = s.accept || [s.answer];
  const tol = s.tolerance!=null ? s.tolerance : 0;
  return accept.some(a=> Math.abs(v-a) <= tol);
}
function wireNumeric(s){
  const inp=document.getElementById("nin"); inp.focus();
  inp.oninput=()=> enableCheck(inp.value.trim().length>0);
  setCheck(()=>{
    const ok=numMatch(inp.value, s);
    inp.disabled=true; inp.classList.add(ok?"ok":"bad");
    gradeQ(ok, ok? (s.ok||"That's right.") : `The answer is <span class="ans">${s.answer}${s.unit?(" "+s.unit):""}</span>.${s.ok?" "+s.ok:""}`);
  });
}

function wireCategorise(s){
  L.payload={assign:{}, active:null};   // assign[itemIdx]=binIdx
  const pool=document.getElementById("pool");
  const bodies=[...document.querySelectorAll(".bin-body")];
  const bins=[...document.querySelectorAll(".bin")];
  function chipHTML(i){ return `<button class="cat-chip" data-i="${i}">${s.items[i].t}</button>`; }
  function refresh(){
    pool.innerHTML = s.items.map((it,i)=> L.payload.assign[i]==null? chipHTML(i):"").join("");

function wireOrder(s){
  const ansFills=[...document.querySelectorAll(".slot-fill")];

  function refresh(){
    pool.innerHTML = L.payload.order.filter(i=>!L.payload.placed.includes(i)).map(i=>chip(i,"pool")).join("");
    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; f.innerHTML = i!=null? chip(i,"ans") : ""; });

  }
  refresh();

    ansFills.forEach((f,slot)=>{ const i=L.payload.placed[slot]; const good=(i===slot); if(!good)ok=false;
      const c=f.querySelector(".order-chip"); if(c){ c.classList.add(good?"correct":"wrong"); c.disabled=true; } });
    gradeQ(ok, ok?(s.ok||"Perfect order!"):`The correct order is: ${s.items.map((t,i)=>`<b>${i+1}.</b> ${t}`).join("  ")}`);

}

/* ---------- Lesson complete ---------- */
function finishLesson(){
  const acc = L.asked? Math.round(L.correct/L.asked*100) : 100;
  const first = !State.lessonDone(L.id);
  const perfect = (L.hearts===5 && acc===100 && L.asked>0);
  const bonus = perfect ? 5 : 0;
  const xp = L.xp + (first?5:0) + bonus;
  State.completeLesson(L.id, xp, first?L.newWords:0);
  if(perfect) State.s.flags.perfect=true;
  if(L.isReview) State.s.flags.reviewed=true;
  if(L.isWeak) State.s.flags.weakFixed=true;
  State.save();
  const badges=checkBadges();
  go("done", { acc, xp, streak:State.s.streak, review:!!L.isReview, weak:!!L.isWeak, recap:!!L.isRecap, exam:!!L.isExam, code:L.code, li:L.li, badges });
}

/* ---------- Cross-device sync (optional; only when opened via a pupil link ?t=…) ----------
   Anonymous use is unchanged (localStorage only). With a token we hydrate from the
   server and merge (never clobber: keep the furthest progress per field), then push
   saves back, debounced. Offline-safe — a failed push just retries on the next save. */
var SYNC_TOKEN = null, SYNC_TIMER = null;
function mergeState(local, remote){
  if(!remote || typeof remote!=="object") return local;
  const out = Object.assign({}, remote, local);
  out.xp = Math.max(local.xp||0, remote.xp||0);
  out.words = Math.max(local.words||0, remote.words||0);
  const ll=local.lastDay||"", rl=remote.lastDay||"";
  if(rl>ll){ out.lastDay=rl; out.streak=remote.streak||0; } else { out.lastDay=ll||rl; out.streak=local.streak||0; }
  out.lessons = Object.assign({}, remote.lessons||{});
  const lz=local.lessons||{}; for(const k in lz){ const a=lz[k], b=out.lessons[k]; if(!b || (a&&(a.xp||0)>=(b.xp||0))) out.lessons[k]=a; }
  out.dailyXP = Object.assign({}, remote.dailyXP||{});
  const ld=local.dailyXP||{}; for(const d in ld){ out.dailyXP[d]=Math.max(out.dailyXP[d]||0, ld[d]||0); }
  out.review = Object.assign({}, remote.review||{});
  const lr=local.review||{}; for(const q in lr){ const a=lr[q], b=out.review[q];
    if(!b){ out.review[q]=a; } else { const al=a.last||"", bl=b.last||""; out.review[q]= al>bl? a : (bl>al? b : ((a.box||0)>=(b.box||0)? a : b)); } }
  out.badges = Array.from(new Set([...(remote.badges||[]), ...(local.badges||[])]));
  out.flags = Object.assign({}, remote.flags||{}, local.flags||{});
  out.a11y = local.a11y || remote.a11y;                                  // device prefs: keep local
  out.sound = (typeof local.sound==="boolean")? local.sound : remote.sound;
  out.seen = local.seen || remote.seen;
  return out;
}
function syncPull(){
  fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN))
    .then(r=> r.ok? r.json() : null)
    .then(d=>{ if(d && d.state){ State.s = mergeState(State.s, d.state); State.save(); if(view.name==="home"||view.name==="done") render(); } })
    .catch(()=>{});
}
function syncPush(){
  if(!SYNC_TOKEN) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(()=>{
    fetch("/api/springboard/progress?t="+encodeURIComponent(SYNC_TOKEN), { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ state: State.s }) }).catch(()=>{});
  }, 1500);
}
function syncInit(){
  try{ const t=new URLSearchParams(location.search).get("t"); if(t && /^[A-Za-z0-9_-]{16,64}$/.test(t)){ SYNC_TOKEN=t; syncPull(); } }catch(e){}
}
syncInit();

// PWA: register the service worker for offline use + install.
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
