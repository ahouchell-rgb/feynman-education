" width=\"36\" height=\"30\" rx=\"6\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"elasticForce\"><line class=\"sm-pulse\" x1=\"280\" y1=\"170\" x2=\"280\" y2=\"206\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polyline points=\"274,198 280,208 286,198\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g data-part=\"workArrow\"></g>", parts:[{"id":"gpeStore","label":"GPE store","x":30,"y":21,"note":"The raised object holds a full gravitational store: lift it higher or make it heavier and this store grows, ready to be spent."},{"id":"height","label":"Height (h)","x":30,"y":48,"note":"The height above the ground sets how much is stored, since energy equals mass times gravitational field strength times this height."},{"id":"fallPath","label":"Object falls","x":52,"y":62,"note":"As it drops, the gravitational store empties and pours into the kinetic store, with the total energy staying the same throughout."},{"id":"keStore","label":"Kinetic store","x":30,"y":75,"note":"The object speeds up as it falls, filling its kinetic store; double the speed and the store grows four times, since speed is squared."},{"id":"workArrow","label":"Work done","x":30,"y":92,"note":"Gravity does work by pulling the object through a distance, and this work is exactly how the energy gets transferred, measured in joules."},{"id":"spring","label":"Spring extension","x":84,"y":34,"note":"Stretching the spring stores energy elastically; pull it further and the extension grows, so long as it springs back to its original length."},{"id":"elasticForce","label":"Elastic PE","x":84,"y":68,"note":"The stretched spring now holds an elastic store; released, it snaps back and pushes this energy into the object's kinetic store."}] },

{"id":"inputEnergy","label":"Input energy","x":18,"y":46,"note":"Energy flows into the device every second; how fast it arrives is the power, measured in joules per second (watts)."},{"id":"device","label":"Device","x":40,"y":34,"note":"Inside the device, the input energy is transferred into different forms; how well it does this is its efficiency."},{"id":"usefulOutput","label":"Useful output","x":85,"y":48,"note":"Some energy leaves as the useful transfer we actually want; the bigger this share, the more efficient the device."},{"id":"wastedEnergy","label":"Wasted (dissipated) energy","x":52,"y":90,"note":"The rest is dissipated to the surroundings, usually as heat; this is why no device can ever reach 100% efficient."},{"id":"insulation","label":"Insulation","x":37,"y":68,"note":"Insulation with low thermal conductivity wraps the device, slowing heat escaping so less useful energy is wasted."},{"id":"lubrication","label":"Lubricated part","x":52,"y":50,"note":"Oil between moving parts cuts friction, so less energy is wasted as heat and more becomes useful output."},{"id":"wall","label":"Thick wall","x":68,"y":30,"note":"A thicker wall of low-conductivity material slows heat passing through, trapping warmth and reducing wasted energy transfer."}] },

'4' fill='#1E2761'/></g>", parts:[{"id":"battery","label":"Battery (supply)","x":13,"y":19,"note":"The battery pushes charge out and drives the whole circuit; this potential difference is shared out to everything connected to it."},{"id":"seriesLoop","label":"Series loop","x":41,"y":20,"note":"Here the parts sit in one single loop, so the same current flows through every component, one after another, all the way round."},{"id":"seriesResistor","label":"Resistor","x":38,"y":56,"note":"Each resistor added to the loop squeezes the current more, so the total resistance grows and less current flows overall."},{"id":"seriesBreak","label":"Single break","x":19,"y":86,"note":"Snap the loop anywhere and the current has no path back, so everything switches off at once, like old fairy lights."},{"id":"parallelJunction","label":"Junction","x":72,"y":25,"note":"At this junction the current splits, giving it extra paths to flow through; more paths mean the total resistance actually drops."},{"id":"parallelBranch","label":"Parallel branch","x":90,"y":41,"note":"Each branch feels the full supply voltage; their separate currents rejoin, adding up to the total current leaving the battery."}] },

nce tips, and a Sun-like star swells outwards, cooling its surface to red as it becomes a red giant."},{"id":"whiteDwarf","label":"White dwarf","x":22,"y":90,"note":"The giant sheds its outer layers, leaving behind a small, hot, dense core called a white dwarf that gradually cools and fades."},{"id":"supernova","label":"Supernova","x":78,"y":69,"note":"A far heavier star's core collapses and rebounds in a huge supernova explosion, scattering heavy elements beyond iron out into space."},{"id":"blackHole","label":"Black hole","x":78,"y":93,"note":"For the most massive stars, gravity crushes the leftover core so tightly that not even light can escape, forming a black hole."}] },
  d_GS3:{ vb:"0 0 320 250", svg:"<rect x=\"0\" y=\"0\" width=\"320\" height=\"250\" fill=\"#F4F6FC\"/><g data-part=\"bigBang\"><circle class=\"sm-glow\" cx=\"40\" cy=\"150\" r=\"13\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"40\" cy=\"150\" r=\"22\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2\" opacity=\"0.6\"/><line x1=\"55\" y1=\"139\" x2=\"66\" y2=\"130\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"58\" y1=\"150\" x2=\"71\" y2=\"150\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"55\" y1=\"161\" x2=\"66\" y2=\"170\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/></g><g data-part=\"nearGalaxy\"><circle cx=\"110\" cy=\"95\" r=\"14\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/></g><g data-part=\"farGalaxy\"><circle cx=\"205\" cy=\"70\" r=\"14\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/></g><g data-part=\"expansion\"><line class=\"sm-pulse\" x1=\"122\" y1=\"83\" x2=\"140\" y2=\"65\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polygon points=\"140,65 130,67 137,74\" fill=\"#1E2761\"/><line class=\"sm-pulse\" x1=\"217\" y1=\"58\" x2=\"245\" y2=\"40\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"245,40 233,42 241,50\" fill=\"#1E2761\"/></g><g data-part=\"shortWave\"><polyline class=\"sm-osc\" points=\"60,205 70,195 80,215 90,195 100,215 110,205\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g data-part=\"redWave\"><polyline class=\"sm-osc\" points=\"150,205 165,193 180,217 195,193 210,217 225,205\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><line x1=\"55\" y1=\"230\" x2=\"235\" y2=\"230\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"55\" y1=\"226\" x2=\"55\" y2=\"234\" stroke=\"#7a8199\" stroke-width=\"2\"/><line x1=\"235\" y1=\"226\" x2=\"235\" y2=\"234\" stroke=\"#7a8199\" stroke-width=\"2\"/>", parts:[{"id":"bigBang","label":"Big Bang","x":12,"y":60,"note":"It all starts here: the universe erupts from a tiny, hot, dense point and has been expanding outward ever since."},{"id":"farGalaxy","label":"Distant galaxy","x":64,"y":28,"note":"This galaxy sits far out in space, and being furthest away it races away from us the fastest."},{"id":"nearGalaxy","label":"Nearer galaxy","x":34,"y":38,"note":"A closer galaxy is still fleeing, but being nearer it moves away more slowly than the distant one."},{"id":"expansion","label":"Moving apart","x":47,"y":18,"note":"Space itself stretches, carrying every galaxy apart from every other, like dots on an inflating balloon."},{"id":"shortWave","label":"Source light","x":27,"y":80,"note":"Each galaxy sends out light with its own wavelengths, our starting ruler before the journey across expanding space."},{"id":"redWave","label":"Red-shifted light","x":59,"y":85,"note":"As the galaxy speeds away, its light gets stretched to longer wavelengths, shifting towards red and proving the universe expands."}] },

x1=\"100\" y1=\"172\" x2=\"100\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><line x1=\"122\" y1=\"172\" x2=\"122\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"128\" y1=\"172\" x2=\"128\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"134\" y1=\"172\" x2=\"134\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"140\" y1=\"172\" x2=\"140\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"162\" y1=\"172\" x2=\"162\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><line x1=\"184\" y1=\"172\" x2=\"184\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><line x1=\"206\" y1=\"172\" x2=\"206\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"212\" y1=\"172\" x2=\"212\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"218\" y1=\"172\" x2=\"218\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"224\" y1=\"172\" x2=\"224\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"246\" y1=\"172\" x2=\"246\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><line x1=\"268\" y1=\"172\" x2=\"268\" y2=\"218\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></g><g data-part=\"compression\"><circle cx=\"48\" cy=\"152\" r=\"7\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2\"/></g><g data-part=\"rarefaction\"><circle cx=\"173\" cy=\"152\" r=\"7\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/></g><line x1=\"232\" y1=\"236\" x2=\"288\" y2=\"236\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polygon points=\"288,236 280,232 280,240\" fill=\"#1E2761\"/>", parts:[{"id":"transverseWave","label":"Transverse wave","x":70,"y":13,"note":"Watch the wave travel sideways while the particles bob up and down at right angles to it, carrying energy along without moving matter."},{"id":"amplitude","label":"Amplitude","x":18,"y":21,"note":"Measure from the rest line up to the crest: the bigger this height, the more energy the wave carries as it travels."},{"id":"wavelength","label":"Wavelength","x":38,"y":31,"note":"Measure from one crest across to the next crest: that gap is one complete wave repeating over and over as it moves."},{"id":"longitudinalWave","label":"Longitudinal wave","x":80,"y":68,"note":"Now the particles jiggle back and forth along the same direction the wave travels, squashing and stretching as sound does through air."},{"id":"compression","label":"Compression","x":15,"y":58,"note":"Here the particles bunch up tightly, squeezing together as the wave pushes through and momentarily raising the pressure."},{"id":"rarefaction","label":"Rarefaction","x":54.1,"y":58,"note":"Here the particles spread far apart, stretched thin between compressions, lowering the pressure before the next squeeze arrives."}] },
  d_GW2:{ vb:"0 0 320 240", svg:"<rect x=\"8\" y=\"8\" width=\"304\" height=\"224\" rx=\"12\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><g data-part=\"restPosition\"><line x1=\"28\" y1=\"96\" x2=\"300\" y2=\"96\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-dasharray=\"6 5\" stroke-linecap=\"round\"/></g><path class=\"sm-osc\" d=\"M28 96 Q56 36 84 96 Q112 156 140 96 Q168 36 196 96 Q224 156 252 96 Q280 36 300 96\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\"/><g data-part=\"crest\"><circle cx=\"56\" cy=\"54\" r=\"4.5\" fill=\"#2C5F2D\"/><circle cx=\"168\" cy=\"54\" r=\"4.5\" fill=\"#2C5F2D\"/></g><g data-part=\"trough\"><circle cx=\"112\" cy=\"138\" r=\"4.5\" fill=\"#B4341E\"/></g><g data-part=\"wavelength\"><line x1=\"56\" y1=\"54\" x2=\"168\" y2=\"54\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"56\" y1=\"49\" x2=\"56\" y2=\"59\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"168\" y1=\"49\" x2=\"168\" y2=\"59\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/></g><g data-part=\"amplitude\"><line x1=\"224\" y1=\"96\" x2=\"224\" y2=\"54\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"219\" y1=\"96\" x2=\"229\" y2=\"96\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/></g><g data-part=\"rippleTank\"><rect x=\"28\" y=\"184\" width=\"272\" height=\"40\" rx=\"8\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><path class=\"sm-osc-x\" d=\"M40 204 Q54 194 68 204 Q82 214 96 204 Q110 194 124 204 Q138 214 152 204 Q166 194 180 204 Q194 214 208 204 Q222 194 236 204 Q250 214 264 204 Q278 194 288 204\" fill=\"none\" stroke=\"#AEB6D6\" stroke-width=\"2.5\" stroke-linecap=\"round\"/></g>", parts:[{"id":"crest","label":"Crest","x":17,"y":22,"note":"Here's the top of the wave, its highest point. Count how many crests pass each second and you have the frequency."},{"id":"trough","label":"Trough","x":35,"y":58,"note":"The wave dips to its lowest point here. A crest plus a trough makes one full wave carrying energy along."},{"id":"wavelength","label":"Wavelength","x":35,"y":18,"note":"Measure crest-to-crest and you have the wavelength. Multiply it by frequency and you get how fast the wave travels."},{"id":"amplitude","label":"Amplitude","x":70,"y":31,"note":"Measured from rest to the crest, this shows how much energy the wave carries, though it never changes the wave speed."},{"id":"restPosition","label":"Rest Position","x":85,"y":40,"note":"This is where the water or string sits still. The wave makes it wobble up and down about this line as energy passes."},{"id":"rippleTank","label":"Ripple Tank","x":50,"y":85,"note":"Send ripples across shallow water here, then time and measure them to work out the wave speed for real."}] },
  d_GW3:{ vb:"0 0 320 250", svg:"<rect x=\"10\" y=\"10\" width=\"300\" height=\"230\" rx=\"10\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><g data-part=\"spectrumBand\"><g stroke=\"#1E2761\" stroke-width=\"2.5\"><rect x=\"28\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#CDE5C6\"/><rect x=\"66\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#DCEAF6\"/><rect x=\"104\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#F7F2E6\"/><rect x=\"142\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#AEB6D6\"/><rect x=\"180\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#F1D2D8\"/><rect x=\"218\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#DCEAF6\"/><rect x=\"256\" y=\"40\" width=\"38\" height=\"34\" rx=\"3\" fill=\"#F1D2D8\"/></g></g><g data-part=\"transverseWave\"><polyline class=\"sm-osc\" points=\"28,95 40,95 46,84 58,106 70,84 82,106 94,84 106,106 118,84 130,106 142,84 154,106 166,84 178,106 190,87 202,103 214,89 226,101 238,90 250,100 262,91 272,99 294,95\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g data-part=\"radioEnd\"><g stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"28\" y1=\"130\" x2=\"152\" y2=\"130\"/><polygon points=\"28,130 38,125 38,135\" fill=\"#2C5F2D\" stroke=\"none\"/></g></g><g data-part=\"gammaEnd\"><g stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"168\" y1=\"130\" x2=\"294\" y2=\"130\"/><polygon points=\"294,130 284,125 284,135\" fill=\"#B4341E\" stroke=\"none\"/></g></g><g data-part=\"wavelengthAxis\"><line x1=\"160\" y1=\"122\" x2=\"160\" y2=\"138\" stroke=\"#7a8199\" stroke-width=\"2\" stroke-linecap=\"round\"/></g><g data-part=\"refractedRay\"><g stroke=\"#1E2761\" stroke-width=\"2.5\"><line x1=\"60\" y1=\"165\" x2=\"120\" y2=\"210\" stroke-linecap=\"round\"/><line x1=\"120\" y1=\"210\" x2=\"205\" y2=\"230\" stroke-linecap=\"round\"/><line x1=\"40\" y1=\"210\" x2=\"285\" y2=\"210\" stroke=\"#7a8199\" stroke-width=\"2\"/></g></g><circle cx=\"120\" cy=\"210\" r=\"3\" fill=\"#1E2761\" stroke=\"none\"/><g data-part=\"frequencyAxis\"></g>", parts:[{"id":"spectrumBand","label":"Electromagnetic spectrum","x":50,"y":23,"note":"Here is the whole family of electromagnetic waves laid out in a band; every one is a transverse wave racing through vacuum at the speed of light."},{"id":"radioEnd","label":"Radio waves","x":15,"y":23,"note":"At this end sit radio waves, the lowest frequency and longest wavelength members, where the spectrum begins before frequency climbs across the band."},{"id":"gammaEnd","label":"Gamma rays","x":86,"y":23,"note":"At the far end come gamma rays, the highest frequency and shortest wavelength waves, showing how far frequency rises across the spectrum."},{"id":"transverseWave","label":"Transverse wave","x":40,"y":38,"note":"Each wave wobbles up and down at right angles to its direction of travel, marking every member of this family as transverse."},{"id":"wavelengthAxis","label":"Increasing wavelength","x":28,"y":52,"note":"Reading this way the waves stretch out longer, so wavelength grows towards the radio end while frequency drops the same direction."},{"id":"frequencyAxis","label":"Increasing frequency","x":72,"y":52,"note":"Reading the other way the waves pack tighter, so frequency climbs towards gamma rays even though the speed in vacuum never changes."},{"id":"refractedRay","label":"Refraction at a boundary","x":50,"y":88,"note":"Crossing a boundary the wave changes speed, and meeting it at an angle bends the ray as the change of speed refracts it."}] },

B4341E\"/><g data-part=\"leslieCube\"><polygon points=\"40,160 120,160 144,140 64,140\" fill=\"#7a8199\" stroke=\"#1E2761\"/><rect x=\"40\" y=\"160\" width=\"80\" height=\"56\" fill=\"#1E2761\" stroke=\"#1E2761\"/><polygon points=\"120,160 144,140 144,196 120,216\" fill=\"#AEB6D6\" stroke=\"#1E2761\"/></g><g data-part=\"mattFace\"><rect x=\"40\" y=\"160\" width=\"80\" height=\"56\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.5\"/></g><line x1=\"152\" y1=\"176\" x2=\"178\" y2=\"176\" stroke=\"#B4341E\" stroke-width=\"2\"/><polygon points=\"178,176 170,172 170,180\" fill=\"#B4341E\" stroke=\"#B4341E\"/><line x1=\"152\" y1=\"196\" x2=\"178\" y2=\"196\" stroke=\"#B4341E\" stroke-width=\"2\"/><polygon points=\"178,196 170,192 170,200\" fill=\"#B4341E\" stroke=\"#B4341E\"/><rect x=\"192\" y=\"166\" width=\"34\" height=\"52\" rx=\"5\" fill=\"#F4F6FC\" stroke=\"#1E2761\"/><line x1=\"209\" y1=\"174\" x2=\"209\" y2=\"200\" stroke=\"#B4341E\" stroke-width=\"3\"/><circle cx=\"209\" cy=\"206\" r=\"5\" fill=\"#B4341E\" stroke=\"#B4341E\"/></g>", parts:[{"id":"radioBand","label":"Radio waves","x":11,"y":22,"note":"We start at the low-frequency end: radio waves carry TV and radio broadcasts through the air to aerials in your home."},{"id":"infraredBand","label":"Infrared","x":50,"y":22,"note":"Further along, infrared carries heat. Black matt surfaces pour it out best, so warm objects glow strongly in the infrared."},{"id":"uvBand","label":"Ultraviolet","x":62,"y":33,"note":"Push higher and waves turn harmful: ultraviolet packs enough energy to damage skin cells, causing sunburn and, over time, skin cancer."},{"id":"gammaBand","label":"X-rays & gamma","x":82,"y":22,"note":"At the top sit X-rays and gamma rays. These ionise atoms, tearing at cells and DNA, so exposure can trigger cancer."},{"id":"freqArrow","label":"Increasing frequency","x":30,"y":42,"note":"This arrow tracks frequency climbing left to right; as it rises the waves carry more energy and grow more dangerous."},{"id":"leslieCube","label":"Leslie cube","x":25,"y":80,"note":"The Leslie cube tests this: fill it with hot water and each face radiates infrared, letting us compare surfaces fairly."},{"id":"mattFace","label":"Black matt face","x":13,"y":62,"note":"Point the detector here and the reading spikes: the black matt face emits far more infrared than the cube's shiny sides."}] },

=\"#B4341E\" stroke-width=\"3\"/></g></g><g data-part=\"gene\"><rect x=\"242\" y=\"146\" width=\"64\" height=\"62\" rx=\"8\" fill=\"#CDE5C6\" fill-opacity=\"0.45\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/><g stroke-linecap=\"round\"><line x1=\"270\" y1=\"158\" x2=\"286\" y2=\"158\" stroke=\"#2C5F2D\" stroke-width=\"3\"/><line x1=\"258\" y1=\"176\" x2=\"288\" y2=\"176\" stroke=\"#2C5F2D\" stroke-width=\"3\"/><line x1=\"264\" y1=\"194\" x2=\"282\" y2=\"194\" stroke=\"#2C5F2D\" stroke-width=\"3\"/></g></g>", parts:[{"id":"nucleus","label":"Nucleus","x":15,"y":52,"note":"Inside the nucleus the genetic information is stored; when a sperm's 23 chromosomes join an ovum's 23, the zygote gets a full set of 46."},{"id":"chromosome","label":"Chromosome","x":22,"y":27,"note":"Zooming in, we see one chromosome; your body cells each pack 46 of these thread-like structures, arranged neatly into 23 matching pairs."},{"id":"chromosomePair","label":"Chromosome Pair","x":34,"y":47,"note":"The two chromosomes pair up because one came from your mother and one from your father, so each parent contributes half your instructions."},{"id":"doubleHelix","label":"Double Helix","x":85,"y":22,"note":"Unwinding a chromosome reveals DNA: a long molecule twisted into a double helix, like a ladder spiralled round, holding all the code."},{"id":"base","label":"DNA Base Pair","x":85,"y":40,"note":"The ladder's rungs are pairs of bases; their exact order along the strand spells out the coded instructions the cell reads."},{"id":"gene","label":"Gene","x":85,"y":60,"note":"A short stretch of this base sequence is one gene, carrying the code to build a single protein; each chromosome holds many genes."}] },

th=\"3\"/><line x1=\"310\" y1=\"206\" x2=\"310\" y2=\"266\" stroke=\"#B4341E\" stroke-width=\"3\"/><line x1=\"244\" y1=\"228\" x2=\"322\" y2=\"228\" stroke=\"#B4341E\" stroke-width=\"3\"/><line x1=\"244\" y1=\"246\" x2=\"322\" y2=\"246\" stroke=\"#B4341E\" stroke-width=\"3\"/></g></g>", parts:[{"id":"acidReaction","label":"Metal + acid","x":44,"y":33,"note":"Drop a metal into acid and it fizzes: the acid attacks it, giving a salt plus hydrogen gas that streams off as bubbles."},{"id":"reactivitySeries","label":"Reactivity series","x":13,"y":29,"note":"Some metals fizz furiously, others barely react, so we rank them by how vigorously they react into a league table of reactivity."},{"id":"furnace","label":"Furnace","x":81,"y":29,"note":"In the furnace we heat the metal's ore with carbon; the carbon grabs the oxygen away, freeing the pure metal like iron."},{"id":"ceramic","label":"Ceramic","x":22,"y":79,"note":"Heating wet clay drives off the water, so the molecules can no longer slide past each other, setting hard and brittle."},{"id":"polymer","label":"Polymer chain","x":51,"y":80,"note":"Many small monomers join into one long chain; where chains slide over each other you get a plastic that stretches and melts."},{"id":"composite","label":"Composite","x":83,"y":79,"note":"Combine flexible steel bars with strong concrete and the composite gains both: it bends without snapping yet resists being crushed."}] },

he world every second."},{"id":"supply","label":"Energy supply","x":9,"y":39,"note":"Energy flows in from the supply to feed the device. Without this store of energy, the device has nothing to transfer."},{"id":"energyFlow","label":"Energy transferred","x":80,"y":44,"note":"Energy pours through in joules. Power will measure how fast this flow moves, not just the total amount transferred."},{"id":"powerRating","label":"Power rating","x":52,"y":60,"note":"The power rating in watts tells us the speed: 1 watt means 1 joule is transferred every single second."},{"id":"clock","label":"Time","x":82,"y":75,"note":"The clock times how long energy is transferred. We convert to seconds first, multiplying any minutes by 60."},{"id":"formula","label":"P = E ÷ t","x":27,"y":83,"note":"Divide the energy transferred by the time taken and out pops the power: P = E ÷ t."}] },

" cy=\"214\" r=\"5\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2\"/></g></g><g data-part=\"fermentation\"><rect x=\"24\" y=\"190\" width=\"78\" height=\"36\" rx=\"9\" fill=\"#F7F2E6\" stroke=\"#B4341E\" stroke-width=\"2.5\"/><path class=\"sm-glow\" d=\"M40 218 l12 -16 l12 16 z\" fill=\"#B4341E\" opacity=\"0.55\"/><line x1=\"92\" y1=\"150\" x2=\"70\" y2=\"188\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/></g><g data-part=\"lacticAcid\"><rect x=\"218\" y=\"190\" width=\"78\" height=\"36\" rx=\"9\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/><circle cx=\"236\" cy=\"208\" r=\"5\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"252\" cy=\"214\" r=\"4\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><circle cx=\"278\" cy=\"205\" r=\"5\" fill=\"#fff\" stroke=\"#2C5F2D\" stroke-width=\"2\"/><line x1=\"228\" y1=\"150\" x2=\"250\" y2=\"188\" stroke=\"#2C5F2D\" stroke-width=\"2\" stroke-linecap=\"round\"/></g>", parts:[{"id":"glucose","label":"Glucose","x":18.8,"y":24.4,"note":"Glucose is the fuel going in; its chemical bonds hold the energy the cell is about to release, not burn as breathing."},{"id":"oxygen","label":"Oxygen","x":81.2,"y":20.8,"note":"Oxygen joins the glucose, breathed in through the lungs and delivered by blood, so the fuel can be broken down fully."},{"id":"mitochondria","label":"Mitochondria","x":50,"y":47.2,"note":"Inside these tiny structures the glucose and oxygen react, making mitochondria the power stations where energy is actually released."},{"id":"cell","label":"Cell","x":34.4,"y":28.8,"note":"Everything happens inside the living cell, where digested glucose and breathed-in oxygen arrive together to keep the cell alive."},{"id":"products","label":"CO₂ + Water","x":50,"y":86.4,"note":"Carbon dioxide and water leave as waste; they are breathed out and removed once the energy has been released from glucose."},{"id":"lacticAcid","label":"Lactic Acid","x":19.7,"y":83.2,"note":"Without enough oxygen, human cells break glucose only into lactic acid, releasing far less energy and making muscles ache."},{"id":"fermentation","label":"Fermentation","x":80.3,"y":83.2,"note":"In yeast the oxygen-free route splits glucose into ethanol and carbon dioxide, the reaction that makes bread rise and brews alcohol."}] },

  d_SPC:{ vb:"0 0 320 260", svg:"<g data-part=\"orbitPath\"><g fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"><ellipse cx=\"96\" cy=\"150\" rx=\"58\" ry=\"34\"/><ellipse cx=\"96\" cy=\"150\" rx=\"86\" ry=\"52\"/></g></g><g data-part=\"sun\"><circle cx=\"96\" cy=\"150\" r=\"22\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"3\"/><g class=\"sm-glow\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"96\" y1=\"122\" x2=\"96\" y2=\"114\"/><line x1=\"96\" y1=\"178\" x2=\"96\" y2=\"186\"/><line x1=\"68\" y1=\"150\" x2=\"60\" y2=\"150\"/><line x1=\"124\" y1=\"150\" x2=\"132\" y2=\"150\"/></g></g><g data-part=\"rockyPlanet\"><circle cx=\"154\" cy=\"150\" r=\"9\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/></g><g data-part=\"tiltAxis\"><g stroke=\"#2C5F2D\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"158\" y1=\"143\" x2=\"150\" y2=\"157\"/></g></g><g data-part=\"moon\"><circle cx=\"171\" cy=\"139\" r=\"3.5\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"gasPlanet\"><circle cx=\"182\" cy=\"150\" r=\"15\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><ellipse cx=\"182\" cy=\"150\" rx=\"24\" ry=\"7\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"2.5\"/></g><g data-part=\"galaxy\"><g class=\"sm-spin-slow\"><g stroke=\"#1E2761\" stroke-width=\"2.5\" fill=\"none\"><path d=\"M256 56 q34 6 30 32 q-3 22 -30 24 q-30 2 -34 -22\"/><path d=\"M286 88 q-34 -6 -30 -32 q3 -22 30 -24 q30 -2 34 22\"/></g><circle cx=\"271\" cy=\"72\" r=\"5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"245\" cy=\"60\" r=\"2\" fill=\"#1E2761\"/><circle cx=\"300\" cy=\"86\" r=\"2\" fill=\"#1E2761\"/><circle cx=\"262\" cy=\"100\" r=\"2\" fill=\"#1E2761\"/><circle cx=\"285\" cy=\"50\" r=\"2\" fill=\"#1E2761\"/></g></g>", parts:[{"id":"sun","label":"Sun (a star)","x":29,"y":59,"note":"It all starts here: the Sun, a giant ball of glowing gas, sits at the centre while eight planets circle around it."},{"id":"orbitPath","label":"Orbit","x":4,"y":78,"note":"Each planet travels this looping path, held in place by the Sun's gravity constantly pulling it inwards so it never flies off into space."},{"id":"rockyPlanet","label":"Rocky planet","x":46,"y":64,"note":"Closest to the Sun sit the four rocky planets — Mercury, Venus, Earth and Mars — small worlds with solid, stony surfaces you could stand on."},{"id":"moon","label":"Moon","x":57,"y":47,"note":"Some planets have moons, which loop around the planet the same way the planet loops the Sun, tugged along by the planet's gravity."},{"id":"gasPlanet","label":"Gas planet","x":62,"y":63,"note":"Further out sit the giant gas planets — Jupiter, Saturn, Uranus and Neptune — huge worlds with no solid ground, just thick swirling gas."},{"id":"galaxy","label":"Galaxy (Milky Way)","x":89,"y":28,"note":"Zoom right out and our whole Solar System is one tiny speck in the Milky Way, a spiral galaxy holding billions of stars."},{"id":"tiltAxis","label":"Tilted axis","x":42,"y":49,"note":"Earth spins around this tilted line once a day, turning us towards the Sun for daytime and away into darkness for night."}] },

support and protecting the nerve cord inside."},{"id":"invertebrate","label":"Invertebrate","x":20,"y":72,"note":"Everything without a backbone, like insects and worms, drops into invertebrates, the far larger group making up most animal species."},{"id":"species","label":"Species","x":60,"y":58,"note":"The smallest group is a species: two organisms belong together only if they can breed and produce fertile offspring that can breed too."},{"id":"conservation","label":"Conservation","x":42,"y":88,"note":"When species start disappearing we step in with conservation, protecting habitats and running breeding programmes to keep biodiversity high."},{"id":"seedVault","label":"Seed Vault","x":80,"y":88,"note":"As a backup, a global seed vault freezes millions of seeds, so if disease wipes out a crop we can regrow it."}] },

\"268\" y1=\"130\" x2=\"268\" y2=\"136\" stroke=\"#1E2761\" stroke-width=\"2\"/><line x1=\"302\" y1=\"130\" x2=\"302\" y2=\"136\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"signsOfReaction\"><rect x=\"16\" y=\"188\" width=\"160\" height=\"28\" rx=\"7\" fill=\"#F7F2E6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"30\" cy=\"202\" r=\"4\" fill=\"#B4341E\"/><circle cx=\"54\" cy=\"202\" r=\"4\" fill=\"#2C5F2D\"/><circle cx=\"78\" cy=\"202\" r=\"4\" fill=\"#AEB6D6\"/><circle cx=\"102\" cy=\"202\" r=\"4\" fill=\"#1E2761\"/><circle cx=\"126\" cy=\"202\" r=\"4\" fill=\"#7a8199\"/><circle cx=\"150\" cy=\"202\" r=\"4\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2\"/></g>", parts:[{"id":"reactants","label":"Reactants","x":18,"y":25,"note":"We start on the left with the reactants — the starting substances whose atoms are about to be rearranged into something new."},{"id":"arrow","label":"Reaction arrow","x":42,"y":25,"note":"The arrow means 'turns into', not equals — it shows the reactants changing one way into fresh products, never back again."},{"id":"products","label":"Products","x":66,"y":25,"note":"On the right we get the products: brand-new substances built from the same atoms, but now with different properties."},{"id":"combustion","label":"Combustion","x":89,"y":25,"note":"In combustion a fuel burns in oxygen, releasing energy and usually giving out carbon dioxide and water as products."},{"id":"thermalDecomp","label":"Thermal decomposition","x":13,"y":63,"note":"Here heat alone splits one reactant apart — a metal carbonate breaks into a metal oxide plus carbon dioxide gas."},{"id":"oxidation","label":"Oxidation (rust)","x":43,"y":63,"note":"In oxidation an element grabs oxygen — iron slowly joins with oxygen to form iron oxide, which we see as rust."},{"id":"signsOfReaction","label":"Signs of reaction","x":72,"y":63,"note":"Watch for the tell-tale signs a reaction is happening: heat change, light, colour change, fizzing, or a solid precipitate appearing."},{"id":"conservationMass","label":"Mass conserved","x":89,"y":63,"note":"No atoms vanish — they're only rearranged, so the products always weigh exactly the same as the reactants did."}] },

rming the planet's hot inner heart."}] },

oke-linecap='round'/><circle cx='114' cy='188' r='15' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='2.5'/></g><g data-part='newProperties'><rect x='170' y='150' width='136' height='76' rx='10' fill='#fff' stroke='#1E2761' stroke-width='3'/><circle class='sm-glow' cx='208' cy='188' r='17' fill='#F1D2D8' stroke='#B4341E' stroke-width='3'/><circle cx='262' cy='180' r='13' fill='#DCEAF6' stroke='#1E2761' stroke-width='2.5'/><circle cx='282' cy='204' r='10' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='2.5'/></g>", parts:[{"id":"elementBox","label":"Element","x":18,"y":17,"note":"We start with an element: a pure substance built from only one type of atom, like the copper in a wire or oxygen gas."},{"id":"compoundBox","label":"Compound","x":50,"y":17,"note":"Now join different atoms together with chemical bonds and you make a compound, a brand-new substance holding two or more types of atom."},{"id":"mixtureBox","label":"Mixture","x":82,"y":17,"note":"In a mixture the substances just sit together, not bonded, so you can pull them apart again, like lifting iron filings out of sulfur with a magnet."},{"id":"bond","label":"Chemical bond","x":50,"y":38,"note":"The chemical bond is the glue: it locks different atoms together so tightly they now behave as one whole new substance, not a mixture."},{"id":"formulaUnit","label":"Molecule (formula)","x":26,"y":75,"note":"We write the result as a formula, using symbols and small numbers to count each atom, so H₂O tells us two hydrogen atoms joined to one oxygen."},{"id":"newProperties","label":"New properties","x":74,"y":75,"note":"Bonding transforms everything: soft sodium metal and toxic chlorine gas combine to give ordinary table salt, with completely new properties of its own."}] },

6,66 256,66\"/><polyline points=\"251,56 256,66 262,63\"/></g></g><g data-part=\"thermometer\"><rect x=\"234\" y=\"104\" width=\"12\" height=\"74\" rx=\"6\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"240\" cy=\"182\" r=\"10\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><rect x=\"237\" y=\"150\" width=\"6\" height=\"30\" rx=\"3\" fill=\"#B4341E\"/><line x1=\"246\" y1=\"118\" x2=\"251\" y2=\"118\" stroke=\"#1E2761\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"246\" y1=\"134\" x2=\"251\" y2=\"134\" stroke=\"#1E2761\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"246\" y1=\"150\" x2=\"251\" y2=\"150\" stroke=\"#1E2761\" stroke-width=\"2\" stroke-linecap=\"round\"/></g>", parts:[{"id":"exoBeaker","label":"Exothermic","x":27,"y":74,"note":"In an exothermic change, energy pours out of the reaction into everything around it, so the surroundings warm up."},{"id":"energyOut","label":"Energy out","x":27,"y":22,"note":"Energy escapes to the surroundings here, just like a hand warmer or self-heating can pushing out heat when it reacts."},{"id":"endoBeaker","label":"Endothermic","x":72,"y":74,"note":"In an endothermic change, the reaction pulls energy in from around it, so the surroundings cool down instead."},{"id":"energyIn","label":"Energy in","x":72,"y":22,"note":"Energy is dragged in from the surroundings here, the way an instant icepack sucks heat away and turns cold."},{"id":"thermometer","label":"Thermometer","x":75,"y":58,"note":"The thermometer reads the temperature: if it rises the change is exothermic, if it falls it is endothermic."},{"id":"surroundings","label":"Surroundings","x":50,"y":92,"note":"The surroundings include the thermometer itself, which is exactly why it can sense the energy moving in or out."}] },

lly needs."},{"id":"generator","label":"Generator","x":59,"y":61,"note":"The spinning turbine turns the generator, and it is here that the movement is converted into an electric current."},{"id":"dam","label":"Dam (hydro)","x":79,"y":50,"note":"A hydro station skips burning fuel: water released from behind the dam rushes down and spins the same turbine instead."},{"id":"nationalGrid","label":"National Grid","x":90,"y":20,"note":"The current flows out along the National Grid's cables, carrying electricity to homes, businesses and factories everywhere."}] },
  d_GA1:{ vb:"0 0 320 280", svg:"<g data-part=\"shell\"><g fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\"><ellipse cx=\"150\" cy=\"140\" rx=\"62\" ry=\"62\"/><ellipse cx=\"150\" cy=\"140\" rx=\"112\" ry=\"112\"/></g></g><g data-part=\"nucleus\"><g data-part=\"proton\"><circle cx=\"131\" cy=\"131\" r=\"15\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"168\" cy=\"127\" r=\"15\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"139\" cy=\"161\" r=\"15\" fill=\"#B4341E\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"neutron\"><circle cx=\"150\" cy=\"114\" r=\"15\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"190\" cy=\"141\" r=\"15\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"123\" cy=\"153\" r=\"15\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/></g></g><g data-part=\"electron\"><circle cx=\"150\" cy=\"78\" r=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"150\" cy=\"202\" r=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"38\" cy=\"140\" r=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"262\" cy=\"140\" r=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"ejectedElectron\"><line class=\"sm-flow\" stroke-dasharray=\"6 6\" x1=\"244\" y1=\"58\" x2=\"272\" y2=\"30\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polyline points=\"268,24 278,24 278,34\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"294\" cy=\"18\" r=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g>", parts:[{"id":"nucleus","label":"Nucleus","x":47,"y":38,"note":"At the centre sits a tiny nucleus — only a ten-thousandth of the atom's width, yet it packs in almost all the mass."},{"id":"proton","label":"Proton","x":43,"y":60,"note":"Inside the nucleus we pack positive protons; how many there are decides which element this atom actually is."},{"id":"neutron","label":"Neutron","x":60,"y":50,"note":"Alongside them sit neutral neutrons, adding mass but no charge, helping bind the crowded nucleus together."},{"id":"electron","label":"Electron","x":82,"y":50,"note":"Now tiny negative electrons appear, far lighter than protons, whizzing around the nucleus in the mostly empty space."},{"id":"shell","label":"Electron shell","x":33,"y":34,"note":"The electrons settle into shells — energy levels at set distances — filling from the innermost outwards around the nucleus."},{"id":"ejectedElectron","label":"Ejected electron (ion)","x":92,"y":6,"note":"Absorbing electromagnetic radiation can knock an electron clean out, leaving the atom with extra positive charge — now a positive ion."}] },
  d_GA2:{ vb:"0 0 330 250", svg:"<rect x='2' y='2' width='326' height='246' rx='12' fill='#F4F6FC' stroke='#1E2761' stroke-width='2'/><g data-part='alphaSource'><circle cx='38' cy='190' r='26' fill='#F1D2D8' stroke='#B4341E' stroke-width='2.5'/><circle cx='30' cy='182' r='3.5' fill='#1E2761'/><circle cx='46' cy='180' r='3.5' fill='#1E2761'/><circle cx='28' cy='198' r='3.5' fill='#1E2761'/><circle cx='44' cy='200' r='3.5' fill='#1E2761'/><circle cx='38' cy='190' r='3.5' fill='#1E2761'/></g><g data-part='goldFoil'><rect x='78' y='34' width='14' height='170' rx='5' fill='#F7E3A1' stroke='#1E2761' stroke-width='2.5'/></g><g data-part='straightPath'><line class='sm-flow' stroke-dasharray='6 6' x1='28' y1='120' x2='76' y2='120' stroke='#2C5F2D' stroke-width='2.5' stroke-linecap='round'/><polygon points='76,120 68,116 68,124' fill='#2C5F2D'/><line x1='94' y1='120' x2='150' y2='120' stroke='#2C5F2D' stroke-width='2.5' stroke-linecap='round'/><polygon points='150,120 142,116 142,124' fill='#2C5F2D'/><path d='M85 85 L150 85 L312 55' fill='none' stroke='#7a8199' stroke-width='2' stroke-linecap='round'/><path d='M85 155 L150 155 L312 195' fill='none' stroke='#7a8199' stroke-width='2' stroke-linecap='round'/></g><g data-part='deflectedPath'><path class='sm-flow' stroke-dasharray='6 6' d='M85 100 Q165 100 110 30' fill='none' stroke='#B4341E' stroke-width='2.5' stroke-linecap='round'/><polygon points='110,30 106,40 115,38' fill='#B4341E'/></g><g data-part='electronShell'><circle cx='235' cy='120' r='56' fill='none' stroke='#AEB6D6' stroke-width='2'/><circle cx='235' cy='120' r='34' fill='none' stroke='#AEB6D6' stroke-width='2'/></g><circle cx='275' cy='80' r='4' fill='#1E2761'/><circle cx='201' cy='120' r='4' fill='#1E2761'/><circle cx='235' cy='154' r='4' fill='#1E2761'/><g data-part='nucleus'><circle cx='227' cy='114' r='14' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='2.5'/><circle cx='221' cy='110' r='5' fill='#B4341E' stroke='#1E2761' stroke-width='1.5'/><circle cx='233' cy='108' r='5' fill='#B4341E' stroke='#1E2761' stroke-width='1.5'/><circle cx='226' cy='120' r='5' fill='#B4341E' stroke='#1E2761' stroke-width='1.5'/></g><g data-part='neutron'><circle cx='252' cy='135' r='6' fill='#7a8199' stroke='#1E2761' stroke-width='1.5'/></g>", parts:[{"id":"alphaSource","label":"Alpha source","x":12,"y":76,"note":"Here we fire a beam of tiny positive alpha particles at the foil, testing whether Thomson's soft plum-pudding atom really holds up."},{"id":"goldFoil","label":"Gold foil","x":26,"y":62,"note":"The beam hits gold hammered incredibly thin, just a few atoms deep, so we can watch how each particle passes through the atoms."},{"id":"straightPath","label":"Passes straight through","x":78,"y":80,"note":"Almost every particle sails straight through undeflected, telling us the atom is mostly empty space with nothing solid in the way."},{"id":"deflectedPath","label":"Deflected / bounced back","x":33,"y":12,"note":"A few particles swerve sharply or bounce right back, so something tiny, dense and positive must be repelling them."},{"id":"nucleus","label":"Nucleus","x":66,"y":42,"note":"That something is the nucleus: a minuscule, dense, positively charged core at the centre where nearly all the atom's mass is packed."},{"id":"electronShell","label":"Electron shell","x":83,"y":32,"note":"Bohr adds electrons orbiting the nucleus at fixed distances in shells, each shell a set energy level rather than a random cloud."},{"id":"neutron","label":"Neutron","x":78,"y":56,"note":"Finally Chadwick finds neutrons sitting in the nucleus, uncharged particles that add mass and complete our picture of the atom."}] },
  d_GA3:{ vb:"0 0 320 250", svg:"<rect x=\"0\" y=\"0\" width=\"320\" height=\"250\" fill=\"#F4F6FC\"/><g stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"><rect x=\"14\" y=\"96\" width=\"40\" height=\"54\" rx=\"8\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\"/><circle cx=\"34\" cy=\"123\" r=\"9\" fill=\"#B4341E\" stroke=\"#B4341E\"/></g><g stroke-width=\"3\" stroke-linecap=\"round\"><g data-part=\"alpha\"><line class=\"sm-flow\" stroke-dasharray=\"6 6\" x1=\"54\" y1=\"112\" x2=\"96\" y2=\"112\" stroke=\"#B4341E\"/><polygon points=\"96,112 88,107 88,117\" fill=\"#B4341E\" stroke=\"none\"/></g><g data-part=\"beta\"><line class=\"sm-flow\" stroke-dasharray=\"6 6\" x1=\"54\" y1=\"123\" x2=\"150\" y2=\"123\" stroke=\"#1E2761\"/><polygon points=\"150,123 142,118 142,128\" fill=\"#1E2761\" stroke=\"none\"/></g><g data-part=\"gamma\"><line class=\"sm-flow\" stroke-dasharray=\"6 6\" x1=\"54\" y1=\"134\" x2=\"246\" y2=\"134\" stroke=\"#AEB6D6\"/><polygon points=\"246,134 238,129 238,139\" fill=\"#AEB6D6\" stroke=\"none\"/></g><g data-part=\"neutron\"><line class=\"sm-flow\" x1=\"54\" y1=\"145\" x2=\"246\" y2=\"145\" stroke=\"#7a8199\" stroke-dasharray=\"6 5\"/><polygon points=\"246,145 238,140 238,150\" fill=\"#7a8199\" stroke=\"none\"/></g></g><g><g data-part=\"paper\"><rect x=\"96\" y=\"86\" width=\"10\" height=\"78\" rx=\"3\" fill=\"#F7F2E6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"aluminium\"><rect x=\"150\" y=\"86\" width=\"14\" height=\"78\" rx=\"3\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"leadConcrete\"><rect x=\"246\" y=\"78\" width=\"26\" height=\"94\" rx=\"3\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g></g><g data-part=\"gmTube\"><g stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"><rect x=\"200\" y=\"190\" width=\"64\" height=\"40\" rx=\"8\" fill=\"#F4F6FC\"/><line x1=\"232\" y1=\"190\" x2=\"232\" y2=\"170\"/><circle class=\"sm-blink\" cx=\"232\" cy=\"165\" r=\"8\" fill=\"#fff\"/><line x1=\"212\" y1=\"222\" x2=\"222\" y2=\"222\"/><line x1=\"244\" y1=\"222\" x2=\"254\" y2=\"222\"/></g></g></svg>", parts:[{"id":"alpha","label":"Alpha particle","x":24,"y":47,"note":"An unstable nucleus flings out an alpha particle, a heavy clump of 2 protons and 2 neutrons, losing energy as it decays."},{"id":"beta","label":"Beta particle","x":40,"y":49,"note":"Instead a fast-moving electron shoots out of the nucleus, carrying energy away much lighter and quicker than an alpha particle."},{"id":"gamma","label":"Gamma ray","x":60,"y":54,"note":"The nucleus also releases a burst of pure electromagnetic energy, a gamma ray, needing no particle to carry it away."},{"id":"neutron","label":"Neutron","x":74,"y":58,"note":"Sometimes a lone neutron is thrown out of the nucleus, a neutral particle with no charge to attract or repel it."},{"id":"paper","label":"Paper","x":31,"y":34,"note":"The heavy alpha barely gets anywhere: a single sheet of paper absorbs it completely, blocking its path here."},{"id":"aluminium","label":"Aluminium","x":49,"y":34,"note":"Beta pushes further, but a few millimetres of aluminium soak it up, stopping the electrons dead."},{"id":"leadConcrete","label":"Lead / concrete","x":81,"y":31,"note":"Gamma streaks through almost everything; only thick lead or concrete can absorb enough to weaken the beam."},{"id":"gmTube","label":"Geiger-Muller tube","x":73,"y":84,"note":"A Geiger-Muller tube catches each particle as it arrives, clicking out a count-rate that reveals the source's activity in becquerel."}] },

5\" stroke-linecap=\"round\"/><g data-part=\"decayCurve\"><path d=\"M40 158 C 90 158, 95 196, 130 206 S 200 226, 240 230 S 290 235, 296 235\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3\" stroke-linecap=\"round\"/></g><g data-part=\"oneHalfLife\"><line x1=\"40\" y1=\"196\" x2=\"108\" y2=\"196\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"/><line x1=\"108\" y1=\"196\" x2=\"108\" y2=\"238\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"/><circle cx=\"108\" cy=\"196\" r=\"3.5\" fill=\"#B4341E\"/></g><g data-part=\"twoHalfLives\"><line x1=\"40\" y1=\"217\" x2=\"176\" y2=\"217\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"/><line x1=\"176\" y1=\"217\" x2=\"176\" y2=\"238\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"/><circle cx=\"176\" cy=\"217\" r=\"3.5\" fill=\"#B4341E\"/></g>", parts:[{"id":"parentNucleus","label":"Parent nucleus","x":24,"y":27,"note":"We start with an unstable parent nucleus, packed with too many protons and neutrons, so it is about to break apart to become more stable."},{"id":"alphaParticle","label":"Alpha particle","x":53,"y":12,"note":"The nucleus flings out an alpha particle of 2 protons and 2 neutrons, dropping its mass number by 4 and atomic number by 2."},{"id":"betaParticle","label":"Beta particle (electron)","x":52,"y":43,"note":"In beta decay a neutron flips into a proton and fires out a fast electron, so the atomic number climbs by 1 while mass stays the same."},{"id":"decayCurve","label":"Activity curve","x":80,"y":61,"note":"As nuclei decay, the count-rate drops, tracing this falling curve; the time for the activity to halve is one half-life."},{"id":"oneHalfLife","label":"After 1 half-life","x":34,"y":75,"note":"After one half-life, half the unstable nuclei have decayed, so the activity has dropped to exactly half its starting value."},{"id":"twoHalfLives","label":"After 2 half-lives","x":55,"y":84,"note":"After a second half-life, the activity halves again, leaving just a quarter of the original count-rate on the curve."}] },

2\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"82\" y1=\"156\" x2=\"160\" y2=\"142\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polygon points=\"156,118 166,120 158,128\" fill=\"#B4341E\"/><polygon points=\"156,138 166,140 158,148\" fill=\"#B4341E\"/></g><g data-part=\"rays\"><rect class=\"sm-glow\" x=\"108\" y=\"86\" width=\"14\" height=\"130\" rx=\"5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"3\"/></g><g data-part=\"shield\"><rect x=\"264\" y=\"150\" width=\"42\" height=\"60\" rx=\"6\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><polygon points=\"285,118 296,128 296,150 274,150 274,128\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/><line x1=\"285\" y1=\"160\" x2=\"285\" y2=\"200\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><line x1=\"274\" y1=\"178\" x2=\"296\" y2=\"178\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/></g>", parts:[{"id":"externalSource","label":"External source","x":19,"y":60,"note":"The story starts here: a radioactive source sits outside the body, firing radiation across the gap without ever touching you."},{"id":"rays","label":"Radiation rays","x":38,"y":50,"note":"The rays stream from the source and pass through the body from outside; this exposure is irradiation, but no radioactive atoms are left behind."},{"id":"contaminant","label":"Contaminant on body","x":54,"y":38,"note":"Now radioactive atoms land on the body itself; unlike irradiation, this source sticks around and keeps firing radiation from where it clings."},{"id":"body","label":"Exposed body","x":61,"y":68,"note":"The exposed body absorbs the incoming radiation, but once the external source is removed the person is no longer radioactive."},{"id":"shield","label":"Shield (precaution)","x":90,"y":71,"note":"Slide a dense shield between source and body and it blocks most rays, cutting your dose alongside keeping distance and limiting time."},{"id":"backgroundSource","label":"Background source","x":13,"y":16,"note":"All around, low-level background radiation drips in constantly from radon, rocks, soil, space and food, the baseline dose we all receive."}] },
  d_GBC1:{ vb:"0 0 320 250", svg:"<g data-part=\"cellWall\"><rect x=\"18\" y=\"22\" width=\"284\" height=\"206\" rx=\"26\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"3.5\"/></g><g data-part=\"cellMembrane\"><rect x=\"30\" y=\"34\" width=\"260\" height=\"182\" rx=\"18\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"nucleus\"><ellipse cx=\"168\" cy=\"125\" rx=\"44\" ry=\"40\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"3\"/><circle cx=\"168\" cy=\"125\" r=\"12\" fill=\"#1E2761\"/></g><g data-part=\"chloroplast\"><rect x=\"58\" y=\"60\" width=\"70\" height=\"40\" rx=\"16\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><ellipse class=\"sm-glow\" cx=\"93\" cy=\"80\" rx=\"14\" ry=\"9\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><line x1=\"83\" y1=\"80\" x2=\"103\" y2=\"80\" stroke=\"#CDE5C6\" stroke-width=\"2\" stroke-linecap=\"round\"/></g><g data-part=\"mitochondria\"><ellipse class=\"sm-throb\" cx=\"230\" cy=\"78\" rx=\"22\" ry=\"12\" fill=\"#F7F2E6\" stroke=\"#B4341E\" stroke-width=\"3\"/><line x1=\"230\" y1=\"78\" x2=\"230\" y2=\"78\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-linecap=\"round\"/></g><g data-part=\"cytoplasm\"><ellipse cx=\"95\" cy=\"175\" rx=\"30\" ry=\"24\" fill=\"#F1D2D8\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"ribosomes\"><g class=\"sm-drift\"><circle cx=\"232\" cy=\"160\" r=\"4\" fill=\"#1E2761\"/><circle cx=\"248\" cy=\"172\" r=\"4\" fill=\"#1E2761\"/><circle cx=\"222\" cy=\"180\" r=\"4\" fill=\"#1E2761\"/><circle cx=\"242\" cy=\"190\" r=\"4\" fill=\"#1E2761\"/><circle cx=\"258\" cy=\"150\" r=\"4\" fill=\"#1E2761\"/></g></g>", parts:[{"id":"cellWall","label":"Cell wall","x":10,"y":14,"note":"A tough cellulose wall builds around the plant cell, giving it a rigid shape and stopping it bursting when it fills with water."},{"id":"cellMembrane","label":"Cell membrane","x":52,"y":16,"note":"Just inside sits the thin membrane, controlling what enters and leaves so useful substances get in and waste passes out."},{"id":"chloroplast","label":"Chloroplast","x":29,"y":32,"note":"Green chloroplasts, packed with chlorophyll, trap sunlight energy to make food for the plant in photosynthesis."},{"id":"mitochondria","label":"Mitochondria","x":72,"y":31,"note":"Tiny mitochondria carry out aerobic respiration, releasing the energy the cell needs to power everything it does."},{"id":"nucleus","label":"Nucleus","x":52,"y":50,"note":"The nucleus sits in the centre, holding the DNA instructions and acting as the control room directing all the cell's activities."},{"id":"cytoplasm","label":"Cytoplasm","x":30,"y":80,"note":"Jelly-like cytoplasm fills the cell, a watery space where the chemical reactions of life keep happening."},{"id":"ribosomes","label":"Ribosomes","x":77,"y":70,"note":"Scattered through the cytoplasm, tiny ribosomes read the instructions and build the proteins the cell needs to work."}] },

d side, evening out the solution without any energy used."},{"id":"activeTransport","label":"Active transport","x":33,"y":52,"note":"Here substances are pumped uphill against the gradient, so the cell must spend energy from respiration to do it."},{"id":"mitosis","label":"Mitosis","x":13,"y":78,"note":"The cell copies its DNA then splits, producing two identical cells to grow the organism or repair damaged tissue."},{"id":"gradient","label":"Concentration gradient","x":75,"y":80,"note":"A steeper drop in concentration, more surface area and a shorter path all speed up how fast particles diffuse across."}] },

s in through tiny holes in the leaf, supplying the carbon needed to build glucose."},{"id":"water","label":"Water from roots","x":35,"y":94,"note":"Water is pulled up from the roots into the leaf, providing the hydrogen that helps form the glucose."},{"id":"oxygen","label":"Oxygen out","x":82,"y":75,"note":"Oxygen is made as a waste product and escapes out through the leaf's holes into the air around it."},{"id":"starch","label":"Starch store","x":50,"y":92,"note":"Spare glucose is packed away as starch, storing the trapped energy for the plant to use later."}] },
  d_GBE2:{ vb:"0 0 320 300", svg:"<rect x='40' y='70' width='240' height='180' rx='28' fill='#F4F6FC' stroke='#1E2761' stroke-width='3'/><g data-part=\"cell\"><rect x='66' y='150' width='84' height='52' rx='12' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='3'/></g><g data-part=\"glucose\"><circle cx='108' cy='118' r='22' fill='#F7F2E6' stroke='#1E2761' stroke-width='3'/><line class=\"sm-flow\" x1='108' y1='40' x2='108' y2='96' stroke='#1E2761' stroke-width='3' stroke-linecap='round' stroke-dasharray='6 6'/><polygon points='108,98 102,86 114,86' fill='#1E2761'/></g><g data-part=\"oxygen\"><circle cx='250' cy='118' r='20' fill='#DCEAF6' stroke='#1E2761' stroke-width='3'/><line class=\"sm-flow\" x1='250' y1='40' x2='250' y2='96' stroke='#1E2761' stroke-width='3' stroke-linecap='round' stroke-dasharray='6 6'/><polygon points='250,98 244,86 256,86' fill='#1E2761'/></g><g data-part=\"energy\"><line x1='150' y1='176' x2='224' y2='176' stroke='#1E2761' stroke-width='3' stroke-linecap='round'/><polygon points='226,176 214,170 214,182' fill='#1E2761'/><polygon class=\"sm-glow\" points='248,160 270,176 248,192 234,176' fill='#F1D2D8' stroke='#B4341E' stroke-width='3'/></g><g data-part=\"aerobicProducts\"><line class=\"sm-flow\" x1='108' y1='202' x2='108' y2='236' stroke='#2C5F2D' stroke-width='3' stroke-linecap='round' stroke-dasharray='6 6'/><polygon points='108,238 102,226 114,226' fill='#2C5F2D'/><rect x='66' y='238' width='84' height='38' rx='10' fill='#F7F2E6' stroke='#B4341E' stroke-width='3'/></g><g data-part=\"lacticAcid\"><circle cx='250' cy='232' r='20' fill='#AEB6D6' stroke='#1E2761' stroke-width='3'/><line x1='250' y1='192' x2='250' y2='210' stroke='#1E2761' stroke-width='2.5' stroke-linecap='round'/><polygon points='250,212 244,200 256,200' fill='#1E2761'/></g>", parts:[{"id":"glucose","label":"Glucose","x":34,"y":39,"note":"Glucose is the fuel: this sugar carries the stored energy that respiration will unlock, feeding into every living cell nonstop."},{"id":"oxygen","label":"Oxygen in","x":78,"y":39,"note":"Oxygen is breathed in and delivered to the cell, where it will react with the glucose to release far more energy."},{"id":"cell","label":"Living cell","x":50,"y":58,"note":"Inside every living cell the glucose and oxygen meet and react, running the exothermic reaction that powers the whole organism."},{"id":"aerobicProducts","label":"CO₂ + water","x":80,"y":59,"note":"The reaction makes carbon dioxide and water as waste; these leave the cell to be breathed out and removed by the blood."},{"id":"energy","label":"Energy released","x":34,"y":86,"note":"The real prize: energy is released for movement, growth and warmth, driving all the cell's other reactions."},{"id":"lacticAcid","label":"Lactic acid","x":34,"y":61,"note":"Without enough oxygen the muscle switches to anaerobic respiration, releasing less energy and building up lactic acid that makes muscles ache."}] },

narrow them, the starved muscle causes coronary heart disease."},{"id":"body","label":"Body tissues","x":35,"y":84,"note":"At the body tissues, blood delivers oxygen and collects waste, then heads back to the heart to be pumped round again."},{"id":"capillary","label":"Capillary","x":54,"y":38,"note":"Here blood slows through tiny capillaries whose walls are one cell thick, letting oxygen and food pass into the tissues."},{"id":"bloodComposition","label":"Blood components","x":78,"y":39,"note":"The blood itself carries red cells for oxygen, white cells to fight pathogens, platelets to clot, and plasma dissolving everything else."}] },

uble helix","x":89,"y":33,"note":"Zoom into a chromosome and you find DNA: two long strands twisted together into a double helix that stores all the instructions."},{"id":"basePair","label":"Gene / base pair","x":89,"y":52,"note":"The strands are held by paired bases; a short run of these forms one gene, coding for a single feature of the organism."}] },

; here both are Bb, so each can pass on either a B or a b to their offspring."},{"id":"dominantOffspring","label":"Dominant offspring","x":37,"y":35,"note":"Where a dominant B lands in the square, it overrides the other allele, so the offspring shows the dominant characteristic even with just one copy."},{"id":"heterozygous","label":"Heterozygous (Bb)","x":64,"y":35,"note":"A B pairs with a b, giving two different alleles; the dominant B is expressed, so the phenotype still shows the dominant characteristic."},{"id":"recessiveOffspring","label":"Recessive (bb)","x":64,"y":67,"note":"Only when two recessive b alleles meet does the recessive characteristic finally appear, since no dominant allele is present to mask it."},{"id":"ratio","label":"3 : 1 ratio","x":89,"y":50,"note":"Counting the four squares gives three offspring showing dominant to one showing recessive, the classic 3:1 ratio from two heterozygous parents."},{"id":"sexChromosomes","label":"XX / XY sex","x":73,"y":92,"note":"Sex is set the same way: an X from mum pairs with an X or Y from dad, giving XX females or XY males."}] },

"#7a8199\"/></g>", parts:[{"id":"population","label":"Varied population","x":14,"y":16,"note":"We start with a population where individuals differ — their genes, environment, or both make no two exactly alike, giving natural selection something to act on."},{"id":"mutation","label":"Mutation / new allele","x":33,"y":40,"note":"A random mutation copies a gene wrongly, creating a brand-new allele — a fresh variation that may turn out helpful, harmful, or make no difference."},{"id":"selectPressure","label":"Selection pressure","x":66,"y":20,"note":"The environment throws a challenge — a predator, cold, or disease — that tests everyone; only the best-suited traits help individuals cope with it."},{"id":"survivor","label":"Survivor (best adapted)","x":88,"y":40,"note":"The best-adapted individuals survive this pressure and reproduce, while poorly-suited ones die out before passing their alleles on."},{"id":"nextGen","label":"Next generation","x":78,"y":82,"note":"Survivors pass their helpful alleles to offspring, so the next generation carries more of them — over many generations the whole species shifts."},{"id":"selectiveBreeding","label":"Selective breeding","x":40,"y":72,"note":"Humans speed this up by choosing individuals with useful traits, like high yield, and breeding them together generation after generation."},{"id":"fossil","label":"Fossil evidence","x":14,"y":82,"note":"Fossils capture how species looked long ago, letting us track gradual changes over time — solid evidence that evolution really happened."}] },

/></g><g stroke='#1E2761' stroke-width='3' fill='none'><g data-part='group'><rect x='51' y='81' width='28' height='82' rx='4'/></g><g data-part='group1'><rect x='25' y='55' width='28' height='134' rx='4'/></g><g data-part='group0'><rect x='259' y='55' width='28' height='108' rx='4'/></g><g data-part='nonMetals'><rect x='207' y='107' width='80' height='54' rx='4' stroke='#B4341E'/></g></g><g data-part='atomicOrder'><g stroke='#B4341E' stroke-width='2.5' stroke-linecap='round'><line x1='30' y1='30' x2='280' y2='30'/><polyline points='272,24 282,30 272,36' fill='none'/></g></g>", parts:[{"id":"atomicOrder","label":"Increasing atomic number","x":48,"y":13,"note":"We lay the elements out in order of increasing atomic number, left to right, row by row, so each has one more proton than the last."},{"id":"group","label":"Group (column)","x":20,"y":37,"note":"Reading down a column, every element shares the same number of outer electrons, which is why a group behaves in similar ways."},{"id":"period","label":"Period (row)","x":42,"y":67,"note":"Moving across a row, we cross a full period, adding one proton and one electron at each step until the shell fills."},{"id":"metals","label":"Metals","x":21,"y":53,"note":"The left and centre fill with metals, which readily lose electrons, giving them their shine, strength and ability to conduct."},{"id":"nonMetals","label":"Non-metals","x":77,"y":63,"note":"Over on the right sit the non-metals, which tend to gain or share electrons, behaving quite differently from the metals opposite."},{"id":"group1","label":"Group 1 (alkali metals)","x":12,"y":78,"note":"Group 1, the alkali metals, throw off their single outer electron to react with water, making hydrogen and an alkali, faster down the group."},{"id":"group0","label":"Group 0 (noble gases)","x":85,"y":50,"note":"The far-right column is Group 0, the noble gases, whose full outer shells leave nothing to gain or lose, so they stay unreactive."}] },

=\"#1E2761\" stroke-width=\"2.5\"><circle cx=\"205\" cy=\"140\" r=\"10\" fill=\"#AEB6D6\"/><circle cx=\"230\" cy=\"140\" r=\"10\" fill=\"#AEB6D6\"/><circle cx=\"255\" cy=\"140\" r=\"10\" fill=\"#AEB6D6\"/><circle cx=\"218\" cy=\"162\" r=\"10\" fill=\"#AEB6D6\"/><circle cx=\"243\" cy=\"162\" r=\"14\" fill=\"#F7F2E6\"/><circle cx=\"268\" cy=\"162\" r=\"10\" fill=\"#AEB6D6\"/></g><g class=\"sm-drift\" fill=\"#B4341E\"><circle cx=\"217\" cy=\"128\" r=\"2.5\"/><circle cx=\"242\" cy=\"128\" r=\"2.5\"/><circle cx=\"205\" cy=\"152\" r=\"2.5\"/><circle cx=\"230\" cy=\"152\" r=\"2.5\"/><circle cx=\"262\" cy=\"150\" r=\"2.5\"/></g></g><g data-part=\"alloy\"><circle cx=\"160\" cy=\"248\" r=\"34\" fill=\"#F7F2E6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/></g><g data-part=\"nanoparticle\"><g stroke=\"#2C5F2D\" stroke-width=\"2\" fill=\"#CDE5C6\"><circle cx=\"150\" cy=\"240\" r=\"6\"/><circle cx=\"170\" cy=\"242\" r=\"6\"/><circle cx=\"158\" cy=\"258\" r=\"6\"/><circle cx=\"173\" cy=\"258\" r=\"6\"/><circle cx=\"146\" cy=\"256\" r=\"5\"/></g></g>", parts:[{"id":"ionicLattice","label":"Giant ionic lattice","x":27,"y":20,"note":"Millions of oppositely charged ions lock into a giant grid; breaking so many strong bonds needs huge heat, so melting points soar."},{"id":"simpleMolecule","label":"Simple molecular","x":72,"y":18,"note":"Only weak forces hold these separate molecules together, so they pull apart easily, giving low melting points and no charge to carry current."},{"id":"giantCovalent","label":"Giant covalent","x":18,"y":52,"note":"Here every atom bonds strongly to its neighbours in one huge network, so enormous heat is needed to break them apart and melt it."},{"id":"metalStructure","label":"Metal structure","x":67,"y":45,"note":"Positive metal ions sit in a sea of loose electrons that drift freely, carrying charge and heat while layers slide to bend the metal."},{"id":"alloy","label":"Alloy (distorted)","x":76,"y":56,"note":"Mixing in different-sized atoms jams the neat layers so they cannot slide past each other, making the alloy harder than the pure metal."},{"id":"nanoparticle","label":"Nanoparticle","x":50,"y":83,"note":"Shrunk to 1-100 nm, so much surface is exposed for their size that they speed up reactions as catalysts and block UV in sunscreens."}] },

 fill=\"#F1D2D8\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"electrolysis\"><path class=\"sm-flow\" d=\"M240 224 q34 0 34 -34\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"6 6\"/><polygon points=\"230,224 246,216 246,232\" fill=\"#1E2761\"/><rect x=\"40\" y=\"222\" width=\"22\" height=\"16\" rx=\"4\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2\"/></g>", parts:[{"id":"reactivitySeries","label":"Reactivity series","x":42,"y":13,"note":"We line the metals up from most to least reactive; this ladder predicts every reaction, because a metal higher up displaces one below it from its compound."},{"id":"reactiveMetals","label":"Very reactive metals","x":13,"y":13,"note":"At the top sit potassium, sodium, calcium and magnesium; they grab oxygen and other elements eagerly, so they are locked tightly inside compounds in the ground."},{"id":"unreactiveMetals","label":"Unreactive metals","x":13,"y":79,"note":"Down here copper, silver and gold barely react, so they cling weakly to compounds and are easily pushed out by any metal above them."},{"id":"carbonLine","label":"Carbon's position","x":74,"y":40,"note":"We slot carbon into the ladder as a dividing line; whether a metal sits above or below it decides how we tear that metal from its ore."},{"id":"reduction","label":"Reduction (with carbon)","x":85,"y":21,"note":"For metals below carbon, like iron, we heat the ore with carbon; carbon steals the oxygen away, reducing the ore back to pure metal."},{"id":"electrolysis","label":"Electrolysis","x":74,"y":75,"note":"Metals above carbon, like aluminium, hold oxygen too tightly for carbon; instead electricity splits the molten compound apart to release the metal."}] },

"The positive ion is drawn to the negative cathode, where it gains electrons and turns into a neutral atom."},{"id":"anion","label":"Negative ion (anion)","x":58,"y":80,"note":"The negative ion is drawn to the positive anode, where it loses electrons and becomes a neutral atom."}] },
  d_GCE2:{ vb:"0 0 320 240", svg:"<rect x=\"0\" y=\"0\" width=\"320\" height=\"240\" fill=\"#F4F6FC\"/><g data-part=\"energyAxis\"><line x1=\"46\" y1=\"24\" x2=\"46\" y2=\"206\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"46\" y1=\"206\" x2=\"300\" y2=\"206\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><polygon points=\"46,18 41,30 51,30\" fill=\"#1E2761\"/></g><path d=\"M62 86 L100 86 Q138 86 150 50 Q162 16 186 16 Q210 16 222 58 Q234 158 272 158 L288 158\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M150 50 Q138 86 100 86\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"2 6\"/><g data-part=\"catalystPath\"><path class=\"sm-flow\" d=\"M100 86 Q132 86 144 64 Q156 42 186 42 Q216 42 226 96\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"5 5\"/></g><line x1=\"100\" y1=\"86\" x2=\"100\" y2=\"158\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"3 4\"/><line x1=\"272\" y1=\"158\" x2=\"100\" y2=\"158\" stroke=\"#7a8199\" stroke-width=\"1.5\" stroke-dasharray=\"3 4\"/><g data-part=\"energyChange\"><line class=\"sm-pulse\" x1=\"112\" y1=\"86\" x2=\"112\" y2=\"158\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polygon points=\"112,86 108,96 116,96\" fill=\"#1E2761\"/><polygon points=\"112,158 108,148 116,148\" fill=\"#1E2761\"/></g><g data-part=\"activationEnergy\"><line class=\"sm-pulse\" x1=\"186\" y1=\"16\" x2=\"186\" y2=\"86\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><polygon points=\"186,16 182,28 190,28\" fill=\"#1E2761\"/><polygon points=\"186,86 182,74 190,74\" fill=\"#1E2761\"/></g><g data-part=\"reactants\"><circle cx=\"80\" cy=\"86\" r=\"5\" fill=\"#CDE5C6\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"products\"><circle cx=\"284\" cy=\"158\" r=\"5\" fill=\"#AEB6D6\" stroke=\"#1E2761\" stroke-width=\"2\"/></g>", parts:[{"id":"energyAxis","label":"Energy axis","x":13,"y":18,"note":"We plot energy going up the side, so we can track how much the reacting particles hold as the reaction runs left to right."},{"id":"reactants","label":"Reactants","x":22,"y":34,"note":"Here sit the starting chemicals, storing their energy before anything reacts; this height is where the whole story begins."},{"id":"products","label":"Products","x":90,"y":67,"note":"After reacting, the new substances settle here; where they land compared to the start tells us if energy was released or absorbed."},{"id":"activationEnergy","label":"Activation energy","x":59,"y":10,"note":"Particles must climb this hump first, gaining enough energy on collision to break bonds and get the reaction started."},{"id":"catalystPath","label":"Catalyst path","x":62,"y":24,"note":"A catalyst carves a lower route over the hump, so more collisions succeed and the reaction speeds up without being used up."},{"id":"energyChange","label":"Energy change","x":35,"y":52,"note":"The drop from reactants to products is the energy given out; here products sit lower, so this reaction releases heat overall."}] },

t shortens and pulls the forearm up, bending the elbow."},{"id":"triceps","label":"Triceps muscle","x":68,"y":80,"note":"The triceps lies on the back of the upper arm; it contracts to pull the forearm back down, straightening the elbow again."},{"id":"tendon","label":"Tendon","x":48,"y":47,"note":"A tough tendon anchors the muscle to the bone, so the muscle's pull is passed straight into the bone and moves it."},{"id":"cartilage","label":"Cartilage","x":41,"y":31,"note":"Smooth cartilage caps each bone end, cushioning the meeting point and letting the bones slide without grinding against each other."},{"id":"joint","label":"Joint","x":54,"y":62,"note":"Here two bones meet at a joint; this movable junction is where bending happens as the muscles pull the bones."},{"id":"ligament","label":"Ligament","x":33,"y":54,"note":"Strong ligaments strap the two bones together, holding the joint stable so it bends smoothly without the bones pulling apart."}] },

62,200 246,192 246,208' fill='#1E2761'/></g>", parts:[{"id":"forceArrow","label":"Applied force","x":66,"y":44,"note":"We draw the push as an arrow: it points the way the force acts, and a longer arrow means a bigger pull in newtons."},{"id":"springExtension","label":"Extension","x":33,"y":26,"note":"The force stretches the spring longer; this extra length is the extension, and doubling the force doubles it up to the elastic limit."},{"id":"weightArrow","label":"Weight","x":27,"y":72,"note":"Gravity pulls the object straight down as weight — a non-contact force acting across a gap, needing nothing to touch it."},{"id":"pivot","label":"Pivot","x":80,"y":76,"note":"The force now turns the object about this fixed pivot; the further out it acts, the bigger the turning moment it makes."},{"id":"leverArm","label":"Lever arm","x":65,"y":61,"note":"The long lever arm multiplies the distance from the pivot, so a small push at the end delivers a big turning moment."},{"id":"resultant","label":"Resultant force","x":62,"y":84,"note":"These forces don't cancel, leaving a resultant force that pushes the object into motion in the direction that arrow points."}] },

function viewDiagram(s){
  const d=DIAGRAMS[s.diagram]; if(!d) return `<h1 class="prompt fr">${s.q}</h1>`;
  const wh=d.vb.split(" "); const ratio=wh[2]+" / "+wh[3];
  const spots=d.parts.map(p=>`<button class="hotspot" data-id="${p.id}" style="left:${p.x}%;top:${p.y}%" aria-label="${p.label}"></button>`).join("");
  return `<div class="step-kicker mono-kicker">${s.kicker||"Label the diagram"}</div>
    <h1 class="prompt fr">${s.q}</h1>
    <div class="diagram" style="aspect-ratio:${ratio}"><svg viewBox="${d.vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">${d.svg}</svg>${spots}</div>
    <div class="hint">Tap the right part of the diagram.</div>`;
}
function wireDiagram(s){
  L.payload={pick:null};
  const d=DIAGRAMS[s.diagram]; const spots=[...document.querySelectorAll(".hotspot")];
  spots.forEach(b=>b.onclick=()=>{ if(L.checked)return; L.payload.pick=b.dataset.id; spots.forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); enableCheck(true); });
  setCheck(()=>{ const ok=L.payload.pick===s.answer; const lbl=((d.parts.find(p=>p.id===s.answer)||{}).label||"part").toLowerCase();
    spots.forEach(b=>{ b.disabled=true; if(b.dataset.id===s.answer) b.classList.add("correct"); else if(b.dataset.id===L.payload.pick) b.classList.add("wrong"); });
    gradeQ(ok, ok?(s.ok||"Correct!"):`Not quite — the highlighted spot is the <b>${lbl}</b>.`);
  });
}

/* DIAGRAM CHECKPOINT — auto-generated from the build-up diagram: right after a fact
