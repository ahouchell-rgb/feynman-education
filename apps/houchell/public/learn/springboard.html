><g data-part=\"species\"><g fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\" stroke-linejoin=\"round\"><path d=\"M92 210 Q100 198 116 202 Q124 204 122 214 Q108 220 92 214 Z\"/><circle cx=\"120\" cy=\"203\" r=\"6\"/><path d=\"M126 203 L134 201 L128 207 Z\"/></g><g fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\" stroke-linejoin=\"round\" transform=\"translate(320,0) scale(-1,1)\"><path d=\"M92 210 Q100 198 116 202 Q124 204 122 214 Q108 220 92 214 Z\"/><circle cx=\"120\" cy=\"203\" r=\"6\"/><path d=\"M126 203 L134 201 L128 207 Z\"/></g><path d=\"M160 208 Q156 202 152 206 Q149 209 160 218 Q171 209 168 206 Q164 202 160 208 Z\" fill=\"#B4341E\" class=\"sm-throb\"/><circle cx=\"160\" cy=\"232\" r=\"6\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"conservation\"><path d=\"M40 262 Q60 244 80 262\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3.5\" stroke-linecap=\"round\"/><path d=\"M46 266 Q60 250 74 266\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"3.5\" stroke-linecap=\"round\"/><line x1=\"60\" y1=\"252\" x2=\"60\" y2=\"240\" stroke=\"#2C5F2D\" stroke-width=\"3\"/><path d=\"M60 244 Q50 240 46 232 Q56 232 60 242 Z\" fill=\"#2C5F2D\"/><path d=\"M60 244 Q70 238 74 230 Q64 230 60 240 Z\" fill=\"#357a36\"/></g><g data-part=\"seedVault\"><rect x=\"238\" y=\"232\" width=\"52\" height=\"42\" rx=\"6\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><rect x=\"248\" y=\"224\" width=\"32\" height=\"10\" rx=\"3\" fill=\"#1E2761\"/><g fill=\"#C99528\"><circle cx=\"252\" cy=\"256\" r=\"4\"/><circle cx=\"264\" cy=\"262\" r=\"4\"/><circle cx=\"276\" cy=\"254\" r=\"4\"/><circle cx=\"258\" cy=\"248\" r=\"4\"/><circle cx=\"272\" cy=\"246\" r=\"4\"/></g><g stroke=\"#3D6FB0\" stroke-width=\"1.6\" stroke-linecap=\"round\" class=\"sm-glow\"><line x1=\"222\" y1=\"240\" x2=\"234\" y2=\"240\"/><line x1=\"228\" y1=\"234\" x2=\"228\" y2=\"246\"/><line x1=\"224\" y1=\"236\" x2=\"232\" y2=\"244\"/><line x1=\"232\" y1=\"236\" x2=\"224\" y2=\"244\"/></g></g>","parts":[{"id":"classification","label":"Classification","x":42,"y":11,"note":"We begin by sorting living things into groups by their features, called classification, using the system Carl Linnaeus built to make sense of nature."},{"id":"fiveKingdoms","label":"Five Kingdoms","x":42,"y":30,"note":"The biggest sort splits every organism into five kingdoms, so a bacterium and an oak tree land in completely different branches."},{"id":"vertebrate","label":"Vertebrate","x":20,"y":55,"note":"Zoom into animals and we split again: vertebrates have a backbone running down them, giving support and protecting the nerve cord inside."},{"id":"invertebrate","label":"Invertebrate","x":20,"y":72,"note":"Everything without a backbone, like insects and worms, drops into invertebrates, the far larger group making up most animal species."},{"id":"species","label":"Species","x":60,"y":58,"note":"The smallest group is a species: two organisms belong together only if they can breed and produce fertile offspring that can breed too."},{"id":"conservation","label":"Conservation","x":42,"y":88,"note":"When species start disappearing we step in with conservation, protecting habitats and running breeding programmes to keep biodiversity high."},{"id":"seedVault","label":"Seed Vault","x":80,"y":88,"note":"As a backup, a global seed vault freezes millions of seeds, so if disease wipes out a crop we can regrow it."}]},
"d_CHR":{"vb":"0 0 320 226","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"226\" fill=\"#F4F6FC\"/><g data-part=\"reactants\"><rect x=\"14\" y=\"18\" width=\"86\" height=\"52\" rx=\"8\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"40\" cy=\"44\" r=\"11\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"66\" cy=\"38\" r=\"9\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"76\" cy=\"54\" r=\"9\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"arrow\"><path d=\"M110 44 L152 44\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#chrA)\"/></g><g data-part=\"products\"><rect x=\"162\" y=\"18\" width=\"86\" height=\"52\" rx=\"8\" fill=\"#CDE5C6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><circle cx=\"186\" cy=\"40\" r=\"11\" fill=\"#2C5F2D\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"206\" cy=\"52\" r=\"9\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"228\" cy=\"34\" r=\"9\" fill=\"#C99528\" stroke=\"#1E2761\" stroke-width=\"2\"/></g><g data-part=\"conservationMass\"><line x1=\"284\" y1=\"20\" x2=\"284\" y2=\"66\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><line x1=\"266\" y1=\"30\" x2=\"302\" y2=\"30\" stroke=\"#1E2761\" stroke-width=\"3\" stroke-linecap=\"round\"/><path d=\"M266 30 L260 44 L272 44 Z\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/><path d=\"M302 30 L296 44 L308 44 Z\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2\"/><polygon points=\"284,66 278,74 290,74\" fill=\"#1E2761\"/></g><g data-part=\"combustion\"><rect x=\"12\" y=\"96\" width=\"70\" height=\"70\" rx=\"8\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"2\"/><rect x=\"40\" y=\"150\" width=\"14\" height=\"10\" fill=\"#1E2761\"/><g class=\"sm-throb\"><path d=\"M47 148 Q34 132 47 108 Q60 132 47 148 Z\" fill=\"#B4341E\"/><path d=\"M47 146 Q40 132 47 118 Q54 132 47 146 Z\" fill=\"#C99528\"/></g></g><g data-part=\"thermalDecomp\"><rect x=\"94\" y=\"96\" width=\"70\" height=\"70\" rx=\"8\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"2\"/><circle cx=\"129\" cy=\"118\" r=\"12\" fill=\"#7a8199\" stroke=\"#1E2761\" stroke-width=\"2\"/><path d=\"M120 136 L110 148\" stroke=\"#1E2761\" stroke-width=\"2\" marker-end=\"url(#chrS)\"/><path d=\"M138 136 L148 148\" stroke=\"#1E2761\" stroke-width=\"2\" marker-end=\"url(#chrS)\"/><circle cx=\"106\" cy=\"152\" r=\"8\" fill=\"#CDE5C6\" stroke=\"#1E2761\" stroke-width=\"2\"/><circle cx=\"152\" cy=\"152\" r=\"8\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2\"/><g class=\"sm-throb\"><path d=\"M129 160 Q124 152 129 144 Q134 152 129 160 Z\" fill=\"#B4341E\" opacity=\"0.6\"/></g></g><g data-part=\"oxidation\"><rect x=\"176\" y=\"96\" width=\"70\" height=\"70\" rx=\"8\" fill=\"#fff\" stroke=\"#7a8199\" stroke-width=\"2\"/><path d=\"M198 110 L214 110 L211 152 L201 152 Z\" fill=\"#9aa0ab\" stroke=\"#1E2761\" stroke-width=\"2\"/><path d=\"M198 110 L214 110 L212 126 L200 126 Z\" fill=\"#B4341E\" opacity=\"0.55\"/><g fill=\"#B4341E\" class=\"sm-drift\" opacity=\"0.7\"><circle cx=\"226\" cy=\"120\" r=\"3\"/><circle cx=\"232\" cy=\"132\" r=\"3\"/><circle cx=\"228\" cy=\"144\" r=\"3\"/></g><text x=\"228\" y=\"114\" font-size=\"8\" fill=\"#1E2761\" font-family=\"sans-serif\">O</text></g><g data-part=\"signsOfReaction\"><rect x=\"258\" y=\"96\" width=\"52\" height=\"70\" rx=\"8\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2\"/><path d=\"M276 110 L276 150 Q276 158 284 158 Q292 158 292 150 L292 110 Z\" fill=\"#CDE5C6\" stroke=\"#1E2761\" stroke-width=\"2\"/><line x1=\"273\" y1=\"110\" x2=\"295\" y2=\"110\" stroke=\"#1E2761\" stroke-width=\"2\"/><g class=\"sm-rise\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"1\"><circle cx=\"282\" cy=\"142\" r=\"3\"/><circle cx=\"287\" cy=\"132\" r=\"2.5\"/><circle cx=\"281\" cy=\"124\" r=\"3\"/><circle cx=\"286\" cy=\"116\" r=\"2\"/></g></g><defs><marker id=\"chrA\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4.5\" orient=\"auto\"><path d=\"M0 0 L9 4.5 L0 9 Z\" fill=\"#1E2761\"/></marker><marker id=\"chrS\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3.5\" orient=\"auto\"><path d=\"M0 0 L7 3.5 L0 7 Z\" fill=\"#1E2761\"/></marker></defs>","parts":[{"id":"reactants","label":"Reactants","x":18,"y":25,"note":"We start on the left with the reactants — the starting substances whose atoms are about to be rearranged into something new."},{"id":"arrow","label":"Reaction arrow","x":42,"y":25,"note":"The arrow means 'turns into', not equals — it shows the reactants changing one way into fresh products, never back again."},{"id":"products","label":"Products","x":66,"y":25,"note":"On the right we get the products: brand-new substances built from the same atoms, but now with different properties."},{"id":"combustion","label":"Combustion","x":89,"y":25,"note":"In combustion a fuel burns in oxygen, releasing energy and usually giving out carbon dioxide and water as products."},{"id":"thermalDecomp","label":"Thermal decomposition","x":13,"y":63,"note":"Here heat alone splits one reactant apart — a metal carbonate breaks into a metal oxide plus carbon dioxide gas."},{"id":"oxidation","label":"Oxidation (rust)","x":43,"y":63,"note":"In oxidation an element grabs oxygen — iron slowly joins with oxygen to form iron oxide, which we see as rust."},{"id":"signsOfReaction","label":"Signs of reaction","x":72,"y":63,"note":"Watch for the tell-tale signs a reaction is happening: heat change, light, colour change, fizzing, or a solid precipitate appearing."},{"id":"conservationMass","label":"Mass conserved","x":89,"y":63,"note":"No atoms vanish — they're only rearranged, so the products always weigh exactly the same as the reactants did."}]},

t=\"118\" rx=\"8\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"3\"/><g data-part=\"waterSurface\"><path d=\"M30 132 Q60 124 90 132 Q120 140 150 132 Q180 124 210 132 Q240 140 290 132\" fill=\"none\" stroke=\"#3D6FB0\" stroke-width=\"3\" stroke-linecap=\"round\" class=\"sm-osc-x\"/><g class=\"sm-drift\" fill=\"#3D6FB0\" opacity=\"0.8\"><circle cx=\"70\" cy=\"126\" r=\"2.5\"/><circle cx=\"130\" cy=\"124\" r=\"2.5\"/><circle cx=\"200\" cy=\"127\" r=\"2.5\"/><circle cx=\"255\" cy=\"125\" r=\"2.5\"/></g></g><g data-part=\"iceCube\"><rect x=\"70\" y=\"118\" width=\"40\" height=\"34\" rx=\"4\" fill=\"#EAF4FC\" stroke=\"#1E2761\" stroke-width=\"2.5\" class=\"sm-osc\"/><g stroke=\"#3D6FB0\" stroke-width=\"1.4\" opacity=\"0.6\"><line x1=\"80\" y1=\"124\" x2=\"88\" y2=\"132\"/><line x1=\"98\" y1=\"126\" x2=\"104\" y2=\"138\"/></g><path d=\"M70 132 L110 132\" stroke=\"#3D6FB0\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/></g><g data-part=\"sinkingObject\"><path d=\"M213 150 L213 190\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-dasharray=\"4 5\" marker-end=\"url(#dnDown)\" class=\"sm-flow\"/><rect x=\"196\" y=\"198\" width=\"34\" height=\"34\" rx=\"3\" fill=\"#1E2761\" stroke=\"#0f143a\" stroke-width=\"2.5\" class=\"sm-fall\"/></g><defs><marker id=\"dnDown\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"6\" orient=\"auto\"><path d=\"M0 0 L8 0 L4 8 Z\" fill=\"#B4341E\"/></marker></defs>","parts":[{"id":"solid","label":"Solid (densest)","x":17,"y":20,"note":"Here the particles are jammed tightly together with little space between them, so the most mass fits in the smallest volume, making solids densest."},{"id":"liquid","label":"Liquid","x":50,"y":20,"note":"Now the particles have loosened and can slide past each other, spreading out a little, so a liquid is usually less dense than its solid."},{"id":"gas","label":"Gas (least dense)","x":83,"y":20,"note":"Here the particles fly far apart into the empty space, so very little mass fills a big volume, making a gas the least dense state."},{"id":"waterSurface","label":"Water surface","x":50,"y":59,"note":"At the water surface the particles are constantly jiggling and moving randomly, Brownian motion, proving the particles inside are never truly still."},{"id":"iceCube","label":"Floating ice","x":29,"y":57,"note":"Water is odd: its solid packs less tightly than the liquid, so ice is less dense than water and floats on top."},{"id":"sinkingObject","label":"Denser object sinks","x":68,"y":83,"note":"This object is denser than the water around it, so it cannot stay up and sinks straight to the bottom."}]},
"d_DIET":{"vb":"0 0 320 250","svg":"<rect x=\"4\" y=\"4\" width=\"312\" height=\"242\" rx=\"14\" fill=\"#F4F6FC\" stroke=\"#1E2761\" stroke-width=\"2.5\"/><ellipse cx=\"146\" cy=\"132\" rx=\"104\" ry=\"100\" fill=\"#e7ecf6\"/><g data-part=\"plate\"><circle cx=\"146\" cy=\"128\" r=\"100\" fill=\"#ffffff\" stroke=\"#1E2761\" stroke-width=\"3.5\"/><circle cx=\"146\" cy=\"128\" r=\"82\" fill=\"none\" stroke=\"#7a8199\" stroke-width=\"1.5\"/></g><g data-part=\"carbsSlice\"><path d=\"M146 128 L146 48 A80 80 0 0 1 222 103 Z\" fill=\"#F0D8A8\" stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/></g><g data-part=\"proteinSlice\"><path d=\"M146 128 L222 103 A80 80 0 0 1 199 200 Z\" fill=\"#E9B7A0\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/></g><g data-part=\"fatSlice\"><path d=\"M146 128 L199 200 A80 80 0 0 1 118 205 Z\" fill=\"#F7E9A0\" stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/></g><g data-part=\"fibreSlice\"><path d=\"M146 128 L118 205 A80 80 0 0 1 66 128 Z\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/></g><g data-part=\"vitMinSlice\"><path d=\"M146 128 L66 128 A80 80 0 0 1 146 48 Z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/></g><g data-part=\"water\"><path d=\"M280 30 L308 30 L302 96 Q301 104 293 104 Q285 104 284 96 Z\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/><path d=\"M285 78 L307 78 L302 96 Q301 104 293 104 Q285 104 285 96 Z\" fill=\"#8CC0EA\"/><path class=\"sm-fall\" d=\"M290 104 Q284 128 279 150\" fill=\"none\" stroke=\"#8CC0EA\" stroke-width=\"4\" stroke-linecap=\"round\"/><circle class=\"sm-fall\" cx=\"276\" cy=\"162\" r=\"4\" fill=\"#8CC0EA\"/></g>","parts":[{"id":"carbsSlice","label":"Carbohydrates","x":48,"y":24,"note":"We start the plate with carbohydrates, the fuel that gives your body most of its energy for moving, thinking and staying warm."},{"id":"proteinSlice","label":"Protein","x":62,"y":58,"note":"Next we add protein, which the body uses to grow new cells and repair damaged ones, like building blocks for your muscles."},{"id":"fatSlice","label":"Fats","x":52,"y":78,"note":"A small slice of fats goes on to insulate and cushion your organs, though too much on the plate can harm your health."},{"id":"fibreSlice","label":"Fibre","x":34,"y":70,"note":"Fibre joins the plate to keep food moving through your gut, preventing constipation and keeping digestion healthy."},{"id":"vitMinSlice","label":"Vitamins & Minerals","x":31,"y":40,"note":"Vitamins and minerals fill the last slice: calcium builds bones, iron helps blood carry oxygen, and vitamins protect eyesight and immunity."},{"id":"plate","label":"Balanced Plate","x":18,"y":16,"note":"Together these slices make a balanced plate, since no single food holds all seven nutrients, we must eat a variety."},{"id":"water","label":"Water","x":88,"y":29,"note":"Finally we pour water over everything, letting chemical reactions happen inside cells and carrying substances around your whole body."}]},
"d_EAR":{"vb":"0 0 320 300","svg":"<rect x=\"0\" y=\"0\" width=\"320\" height=\"300\" fill=\"#F4F6FC\"/>\n<g data-part=\"atmosphere\">\n  <circle cx=\"160\" cy=\"168\" r=\"126\" fill=\"#DCEAF6\" opacity=\"0.55\"/>\n  <circle cx=\"160\" cy=\"168\" r=\"126\" fill=\"none\" stroke=\"#8FB4E0\" stroke-width=\"2\" stroke-dasharray=\"4 6\"/>\n  <g fill=\"#fff\" opacity=\"0.9\" class=\"sm-drift\">\n    <ellipse cx=\"96\" cy=\"70\" rx=\"20\" ry=\"9\"/>\n    <ellipse cx=\"228\" cy=\"86\" rx=\"16\" ry=\"7\"/>\n  </g>\n</g>\n<circle cx=\"160\" cy=\"168\" r=\"116\" fill=\"#fff\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n<g data-part=\"mantle\">\n  <circle cx=\"160\" cy=\"168\" r=\"112\" fill=\"#F1D2D8\"/>\n  <g fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2\" opacity=\"0.6\" class=\"sm-spin-slow\" style=\"transform-origin:160px 168px\">\n    <path d=\"M160 78 a90 90 0 0 1 40 14\"/>\n    <path d=\"M160 258 a90 90 0 0 1 -40 -14\"/>\n  </g>\n</g>\n<g data-part=\"outerCore\">\n  <circle cx=\"160\" cy=\"168\" r=\"72\" fill=\"#B4341E\"/>\n  <g fill=\"#E0873B\" opacity=\"0.7\" class=\"sm-drift\">\n    <circle cx=\"132\" cy=\"150\" r=\"9\"/>\n    <circle cx=\"192\" cy=\"190\" r=\"11\"/>\n    <circle cx=\"176\" cy=\"132\" r=\"7\"/>\n  </g>\n</g>\n<g data-part=\"innerCore\">\n  <circle cx=\"160\" cy=\"168\" r=\"34\" fill=\"#C99528\"/>\n  <circle cx=\"160\" cy=\"168\" r=\"34\" fill=\"none\" stroke=\"#8a6a1a\" stroke-width=\"2\"/>\n  <path d=\"M142 168 h36 M160 150 v36\" stroke=\"#8a6a1a\" stroke-width=\"1.4\" opacity=\"0.5\"/>\n</g>\n<g data-part=\"crust\">\n  <path d=\"M160 52 A 116 116 0 0 1 276 168\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n  <path d=\"M208 66 l6 -8 l6 8 z\" fill=\"#2C5F2D\"/>\n</g>","parts":[{"id":"atmosphere","label":"Atmosphere","x":50,"y":11,"note":"A thin blanket of gas wraps the planet: mostly nitrogen, about a fifth oxygen for breathing, plus tiny traces like carbon dioxide."},{"id":"crust","label":"Crust","x":50,"y":24,"note":"This is the thin rocky skin we live on, only tens of kilometres deep, floating on the hotter layers pressing up beneath it."},{"id":"mantle","label":"Mantle","x":67,"y":37,"note":"Beneath the crust sits the vast, slowly flowing mantle, whose heat drives movement in the rock above it."},{"id":"outerCore","label":"Outer core","x":30,"y":65,"note":"Deeper still, iron here is so hot it melts into molten liquid, churning around the solid centre below."},{"id":"innerCore","label":"Inner core","x":50,"y":53,"note":"At the very centre the pressure squeezes the iron so hard it stays solid, forming the planet's hot inner heart."}]},

"note":"Energy escapes to the surroundings here, just like a hand warmer or self-heating can pushing out heat when it reacts."},{"id":"endoBeaker","label":"Endothermic","x":72,"y":74,"note":"In an endothermic change, the reaction pulls energy in from around it, so the surroundings cool down instead."},{"id":"energyIn","label":"Energy in","x":72,"y":22,"note":"Energy is dragged in from the surroundings here, the way an instant icepack sucks heat away and turns cold."},{"id":"thermometer","label":"Thermometer","x":75,"y":58,"note":"The thermometer reads the temperature: if it rises the change is exothermic, if it falls it is endothermic."},{"id":"surroundings","label":"Surroundings","x":50,"y":92,"note":"The surroundings include the thermometer itself, which is exactly why it can sense the energy moving in or out."}]},

e cx=\"66\" cy=\"180\" r=\"5.5\" fill=\"#2C5F2D\"/>\n  <line x1=\"137\" y1=\"90\" x2=\"143\" y2=\"90\" stroke=\"#fff\" stroke-width=\"1.4\"/>\n  <line x1=\"189\" y1=\"142\" x2=\"195\" y2=\"142\" stroke=\"#fff\" stroke-width=\"1.4\"/>\n  <line x1=\"137\" y1=\"240\" x2=\"143\" y2=\"240\" stroke=\"#fff\" stroke-width=\"1.4\"/>\n  <line x1=\"63\" y1=\"180\" x2=\"69\" y2=\"180\" stroke=\"#fff\" stroke-width=\"1.4\"/>\n</g>\n<g data-part=\"ejectedElectron\">\n  <path d=\"M170 60 Q220 40 268 32\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-dasharray=\"5 5\" stroke-linecap=\"round\"/>\n  <polygon points=\"268,32 259,31 262,40\" fill=\"#B4341E\"/>\n  <circle class=\"sm-drift\" cx=\"270\" cy=\"30\" r=\"5.5\" fill=\"#2C5F2D\" stroke=\"#B4341E\" stroke-width=\"1.6\"/>\n  <text x=\"228\" y=\"118\" font-family=\"Arial,sans-serif\" font-size=\"16\" fill=\"#B4341E\" text-anchor=\"middle\" font-weight=\"bold\">+</text>\n  <circle cx=\"228\" cy=\"113\" r=\"12\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"1.6\"/>\n</g>","parts":[{"id":"nucleus","label":"Nucleus","x":47,"y":38,"note":"At the centre sits a tiny nucleus — only a ten-thousandth of the atom's width, yet it packs in almost all the mass."},{"id":"proton","label":"Proton","x":43,"y":60,"note":"Inside the nucleus we pack positive protons; how many there are decides which element this atom actually is."},{"id":"neutron","label":"Neutron","x":60,"y":50,"note":"Alongside them sit neutral neutrons, adding mass but no charge, helping bind the crowded nucleus together."},{"id":"electron","label":"Electron","x":82,"y":50,"note":"Now tiny negative electrons appear, far lighter than protons, whizzing around the nucleus in the mostly empty space."},{"id":"shell","label":"Electron shell","x":33,"y":34,"note":"The electrons settle into shells — energy levels at set distances — filling from the innermost outwards around the nucleus."},{"id":"ejectedElectron","label":"Ejected electron (ion)","x":92,"y":6,"note":"Absorbing ight through undeflected, telling us the atom is mostly empty space with nothing solid in the way."},{"id":"deflectedPath","label":"Deflected / bounced back","x":33,"y":12,"note":"A few particles swerve sharply or bounce right back, so something tiny, dense and positive must be repelling them."},{"id":"nucleus","label":"Nucleus","x":66,"y":42,"note":"That something is the nucleus: a minuscule, dense, positively charged core at the centre where nearly all the atom's mass is packed."},{"id":"electronShell","label":"Electron shell","x":83,"y":32,"note":"Bohr adds electrons orbiting the nucleus at fixed distances in shells, each shell a set energy level rather than a random cloud."},{"id":"neutron","label":"Neutron","x":78,"y":56,"note":"Finally Chadwick finds neutrons sitting in the nucleus, uncharged particles that add mass and complete our picture of the atom."}]},

>\n  <marker id=\"ga3arrowN\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"#7a8199\"/></marker>\n</defs>\n","parts":[{"id":"alpha","label":"Alpha particle","x":24,"y":47,"note":"An unstable nucleus flings out an alpha particle, a heavy clump of 2 protons and 2 neutrons, losing energy as it decays."},{"id":"beta","label":"Beta particle","x":40,"y":49,"note":"Instead a fast-moving electron shoots out of the nucleus, carrying energy away much lighter and quicker than an alpha particle."},{"id":"gamma","label":"Gamma ray","x":60,"y":54,"note":"The nucleus also releases a burst of pure electromagnetic energy, a gamma ray, needing no particle to carry it away."},{"id":"neutron","label":"Neutron","x":74,"y":58,"note":"Sometimes a lone neutron is thrown out of the nucleus, a neutral particle with no charge to attract or repel it."},{"id":"paper","label":"Paper","x":31,"y":34,"note":"The heavy alpha barely gets anywhere: a single sheet of paper absorbs it completely, blocking its path here."},{"id":"aluminium","label":"Aluminium","x":49,"y":34,"note":"Beta pushes further, but a few millimetres of aluminium soak it up, stopping the electrons dead."},{"id":"leadConcrete","label":"Lead / concrete","x":81,"y":31,"note":"Gamma streaks through almost everything; only thick lead or concrete can absorb enough to weaken the beam."},{"id":"gmTube","label":"Geiger-Muller tube","x":73,"y":84,"note":"A Geiger-Muller tube catches each particle as it arrives, clicking out a count-rate that reveals the source's activity in becquerel."}]},

,"parts":[{"id":"parentNucleus","label":"Parent nucleus","x":24,"y":27,"note":"We start with an unstable parent nucleus, packed with too many protons and neutrons, so it is about to break apart to become more stable."},{"id":"alphaParticle","label":"Alpha particle","x":53,"y":12,"note":"The nucleus flings out an alpha particle of 2 protons and 2 neutrons, dropping its mass number by 4 and atomic number by 2."},{"id":"betaParticle","label":"Beta particle (electron)","x":52,"y":43,"note":"In beta decay a neutron flips into a proton and fires out a fast electron, so the atomic number climbs by 1 while mass stays the same."},{"id":"decayCurve","label":"Activity curve","x":80,"y":61,"note":"As nuclei decay, the count-rate drops, tracing this falling curve; the time for the activity to halve is one half-life."},{"id":"oneHalfLife","label":"After 1 half-life","x":34,"y":75,"note":"After one half-life, half the unstable nuclei have decayed, so the activity has dropped to exactly half its starting value."},{"id":"twoHalfLives","label":"After 2 half-lives","x":55,"y":84,"note":"After a second half-life, the activity halves again, leaving just a quarter of the original count-rate on the curve."}]},

The rays stream from the source and pass through the body from outside; this exposure is irradiation, but no radioactive atoms are left behind."},{"id":"contaminant","label":"Contaminant on body","x":54,"y":38,"note":"Now radioactive atoms land on the body itself; unlike irradiation, this source sticks around and keeps firing radiation from where it clings."},{"id":"body","label":"Exposed body","x":61,"y":68,"note":"The exposed body absorbs the incoming radiation, but once the external source is removed the person is no longer radioactive."},{"id":"shield","label":"Shield (precaution)","x":90,"y":71,"note":"Slide a dense shield between source and body and it blocks most rays, cutting your dose alongside keeping distance and limiting time."},{"id":"backgroundSource","label":"Background source","x":13,"y":16,"note":"All around, low-level background radiation drips in constantly from radon, rocks, soil, space and food, the baseline dose we all receive."}]},

20\" cy=\"160\" r=\"3.5\" fill=\"#1E2761\"/>\n  <circle cx=\"205\" cy=\"150\" r=\"3.5\" fill=\"#1E2761\"/>\n  <circle cx=\"222\" cy=\"180\" r=\"3.5\" fill=\"#1E2761\"/>\n  <circle cx=\"245\" cy=\"130\" r=\"3.5\" fill=\"#1E2761\"/>\n  <circle cx=\"190\" cy=\"190\" r=\"3.5\" fill=\"#1E2761\"/>\n</g>\n","parts":[{"id":"cellWall","label":"Cell wall","x":10,"y":14,"note":"A tough cellulose wall builds around the plant cell, giving it a rigid shape and stopping it bursting when it fills with water."},{"id":"cellMembrane","label":"Cell membrane","x":52,"y":16,"note":"Just inside sits the thin membrane, controlling what enters and leaves so useful substances get in and waste passes out."},{"id":"chloroplast","label":"Chloroplast","x":29,"y":32,"note":"Green chloroplasts, packed with chlorophyll, trap sunlight energy to make food for the plant in photosynthesis."},{"id":"mitochondria","label":"Mitochondria","x":72,"y":31,"note":"Tiny mitochondria carry out aerobic respiration, releasing the energy the cell needs to power everything it does."},{"id":"nucleus","label":"Nucleus","x":52,"y":50,"note":"The nucleus sits in the centre, holding the DNA instructions and acting as the control room directing all the cell's activities."},{"id":"cytoplasm","label":"Cytoplasm","x":30,"y":80,"note":"Jelly-like cytoplasm fills the cell, a watery space where the chemical reactions of life keep happening."},{"id":"ribosomes","label":"Ribosomes","x":77,"y":70,"note":"Scattered through the cytoplasm, tiny ribosomes read the instructions and build the proteins the cell needs to work."}]},

ing replacements from embryos, bone marrow or plant meristems."}]},

/g>\n<defs>\n  <marker id=\"gb3g\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"#2C5F2D\"/></marker>\n  <marker id=\"gb3b\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"#1E2761\"/></marker>\n  <marker id=\"gb3r\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"#B4341E\"/></marker>\n</defs>\n","parts":[{"id":"membrane","label":"Partially permeable membrane","x":36,"y":11,"note":"This barrier lets some particles through but not others, so it controls what enters and leaves the cell."},{"id":"diffusion","label":"Diffusion","x":29,"y":25,"note":"Particles spread out on their own, moving from where they are crowded to where they are sparse, needing no energy."},{"id":"osmosis","label":"Osmosis (water)","x":24,"y":40,"note":"Water slips across the membrane towards the more concentrated side, evening out the solution without any energy used."},{"id":"activeTransport","label":"Active transport","x":33,"y":52,"note":"Here substances are pumped uphill against the gradient, so the cell must spend energy from respiration to do it."},{"id":"mitosis","label":"Mitosis","x":13,"y":78,"note":"The cell copies its DNA then splits, producing two identical cells to grow the organism or repair damaged tissue."},{"id":"gradient","label":"Concentration gradient","x":75,"y":80,"note":"A steeper drop in concentration, more surface area and a shorter path all speed up how fast particles diffuse across."}]},

 the leaf's cells, the trapped energy joins the raw materials together, turning them into glucose and oxygen."},{"id":"carbonDioxide","label":"Carbon dioxide in","x":7,"y":75,"note":"Carbon dioxide seeps in through tiny holes in the leaf, supplying the carbon needed to build glucose."},{"id":"water","label":"Water from roots","x":35,"y":94,"note":"Water is pulled up from the roots into the leaf, providing the hydrogen that helps form the glucose."},{"id":"oxygen","label":"Oxygen out","x":82,"y":75,"note":"Oxygen is made as a waste product and escapes out through the leaf's holes into the air around it."},{"id":"starch","label":"Starch store","x":50,"y":92,"note":"Spare glucose is packed away as starch, storing the trapped energy for the plant to use later."}]},

x=\"276\" cy=\"90\" r=\"4\" fill=\"#B4341E\"/><path d=\"M290 122 c0 7 5 9 5 3 c0 -3 -2.5 -3.5 -2.5 -7 c-1 3 -2.5 4 -2.5 4 Z\" fill=\"#1E76C8\"/></g><g data-part=\"energy\"><polyline class=\"sm-flow\" points=\"160,60 160,34 160,16\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"3\" stroke-dasharray=\"6 6\" stroke-linecap=\"round\"/><g class=\"sm-pulse\"><polygon points=\"160,4 168,22 188,24 172,36 178,56 160,44 142,56 148,36 132,24 152,22\" fill=\"#C99528\" stroke=\"#B4341E\" stroke-width=\"1.6\"/></g></g><g data-part=\"lacticAcid\"><polyline class=\"sm-flow\" points=\"150,178 140,220 132,250\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"3\" stroke-dasharray=\"7 7\" stroke-linecap=\"round\"/><polygon points=\"132,250 128,240 138,242\" fill=\"#B4341E\"/><ellipse cx=\"126\" cy=\"272\" rx=\"52\" ry=\"20\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.5\"/><text x=\"126\" y=\"278\" font-family=\"Georgia, serif\" font-size=\"13\" fill=\"#B4341E\" text-anchor=\"middle\" font-style=\"italic\" class=\"sm-osc-x\">ache</text></g>","parts":[{"id":"glucose","label":"Glucose","x":34,"y":39,"note":"Glucose is the fuel: this sugar carries the stored energy that respiration will unlock, feeding into every living cell nonstop."},{"id":"oxygen","label":"Oxygen in","x":78,"y":39,"note":"Oxygen is breathed in and delivered to the cell, where it will react with the glucose to release far more energy."},{"id":"cell","label":"Living cell","x":50,"y":58,"note":"Inside every living cell the glucose and oxygen meet and react, running the exothermic reaction that powers the whole organism."},{"id":"aerobicProducts","label":"CO₂ + water","x":80,"y":59,"note":"The reaction makes carbon dioxide and water as waste; these leave the cell to be breathed out and removed by the blood."},{"id":"energy","label":"Energy released","x":34,"y":86,"note":"The real prize: energy is released for movement, growth and warmth, driving all the cell's other reactions."},{"id":"lacticAcid","label":"Lactic acid","x":34,"y":61,"note":"Without enough oxygen the muscle switches to anaerobic respiration, releasing less energy and building up lactic acid that makes muscles ache."}]},

 stroke-dasharray=\"8 8\" stroke-linecap=\"round\"/><circle cx=\"220\" cy=\"150\" r=\"9\" fill=\"#F7ECD3\" stroke=\"#C99528\" stroke-width=\"2.5\"/><path d=\"M220 150 l8 -4 M220 150 l8 6 M220 150 l10 0\" stroke=\"#C99528\" stroke-width=\"1.6\"/><polygon points=\"258,190 248,186 250,196\" fill=\"#C99528\"/></g><g data-part=\"effector\"><ellipse cx=\"284\" cy=\"200\" rx=\"26\" ry=\"16\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"3\" class=\"sm-pulse\"/><path d=\"M262 200 h44 M266 194 h36 M266 206 h36\" stroke=\"#B4341E\" stroke-width=\"2\" stroke-linecap=\"round\"/></g>","parts":[{"id":"receptor","label":"Receptor","x":12,"y":70,"note":"It all starts here: the receptor detects a change (the stimulus), like heat or pressure, and fires off a tiny electrical impulse."},{"id":"sensoryNeurone","label":"Sensory neurone","x":34,"y":78,"note":"The sensory neurone carries that impulse away from the receptor, racing it inwards towards the spinal cord to report what was detected."},{"id":"coordinationCentre","label":"Coordination centre","x":47,"y":30,"note":"The spinal cord receives the incoming signal and decides on a response, coordinating what happens next without waiting for the conscious brain."},{"id":"synapse","label":"Synapse","x":50,"y":53,"note":"The neurones don't quite touch: a chemical squirts across this tiny gap and triggers a fresh impulse in the next neurone."},{"id":"motorNeurone","label":"Motor neurone","x":72,"y":58,"note":"The motor neurone now carries the outgoing command back out from the spinal cord, heading straight for the muscle that must act."},{"id":"effector","label":"Effector (muscle)","x":85,"y":79,"note":"The message arrives and the effector responds: the muscle contracts, pulling you away fast to protect the body from harm."}]},

,"note":"At the body tissues, blood delivers oxygen and collects waste, then heads back to the heart to be pumped round again."},{"id":"capillary","label":"Capillary","x":54,"y":38,"note":"Here blood slows through tiny capillaries whose walls are one cell thick, letting oxygen and food pass into the tissues."},{"id":"bloodComposition","label":"Blood components","x":78,"y":39,"note":"The blood itself carries red cells for oxygen, white cells to fight pathogens, platelets to clot, and plasma dissolving everything else."}]},
"d_GBO3":{"vb":"0 0 320 300","svg":"<rect x='0' y='0' width='320' height='300' fill='#ffffff'/><rect x='0' y='200' width='320' height='100' fill='#E8D9C0'/><g data-part='leaf'><path d='M96 70 q-56 -6 -70 30 q40 22 70 4 q30 18 70 -4 q-14 -36 -70 -30 z' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='2.5' stroke-linejoin='round'/><path d='M96 74 v26' stroke='#2C5F2D' stroke-width='2' fill='none'/><path d='M96 82 l-22 8 M96 88 l22 8 M96 90 l-18 12' stroke='#2C5F2D' stroke-width='1.2' fill='none'/></g><g data-part='stem'><rect x='150' y='96' width='16' height='108' fill='#CDE5C6' stroke='#2C5F2D' stroke-width='2.5'/></g><g data-part='root'><path d='M150 204 q-10 20 -30 34 q-6 4 -12 2 M158 204 q0 28 4 50 M162 204 q10 22 32 34 q6 4 10 0' fill='none' stroke='#8a6a3a' stroke-width='3' stroke-linecap='round'/></g><g data-part='xylem'><line class='sm-flow' x1='153' y1='202' x2='153' y2='100' stroke='#1E5A9E' stroke-width='3.5' stroke-dasharray='7 6'/><polygon points='149,104 153,92 157,104' fill='#1E5A9E'/></g><g data-part='phloem'><line class='sm-flow' x1='163' y1='100' x2='163' y2='202' stroke='#2C5F2D' stroke-width='3.5' stroke-dasharray='7 6'/><polygon points='159,198 163,210 167,198' fill='#2C5F2D'/></g><g data-part='stomata'><ellipse cx='150' cy='104' rx='11' ry='6' fill='#DCEAF6' stroke='#2C5F2D' stroke-width='2.5'/><ellipse cx='150' cy='104' rx='4' ry='5' fill='#ffffff' stroke='#2C5F2D' stroke-width='1.5'/><circle class='sm-rise' cx='150' cy='96' r='3' fill='#DCEAF6' stroke='#1E5A9E' stroke-width='1.5'/><circle class='sm-rise' cx='158' cy='90' r='2.5' fill='#DCEAF6' stroke='#1E5A9E' stroke-width='1.5'/></g><g data-part='transpirationStream'><path class='sm-flow' d='M204 180 q10 -50 -6 -110' fill='none' stroke='#1E5A9E' stroke-width='2.5' stroke-dasharray='5 6'/><polygon points='194,74 197,62 202,72' fill='#1E5A9E'/><circle cx='210' cy='150' r='2.5' fill='#1E5A9E'/><circle cx='206' cy='120' r='2.5' fill='#1E5A9E'/></g>","parts":[{"id":"leaf","label":"Leaf","x":18,"y":15,"note":"Start at the leaf, the plant's food factory: it traps sunlight for photosynthesis and is where the water journey ends."},{"id":"stem","label":"Stem","x":42,"y":48,"note":"The stem holds the plant up and forms the highway between roots and leaves, carrying water up and sugars back down."},{"id":"root","label":"Roots","x":27,"y":92,"note":"Roots anchor the plant and soak up water and dissolved minerals from the soil, feeding them into the transport system."},{"id":"xylem","label":"Xylem","x":25,"y":42,"note":"Xylem pipes, made of dead hollow cells, carry water and minerals one way: upwards from the roots to the thirsty leaves."},{"id":"phloem","label":"Phloem","x":55,"y":58,"note":"Living phloem tubes flow the other way, carrying sugars made in the leaves out to growing roots and stems (translocation)."},{"id":"stomata","label":"Stomata","x":27,"y":27,"note":"Tiny stomata on the leaf underside open to let water vapour escape, releasing water lost through the leaf surface."},{"id":"transpirationStream","label":"Transpiration stream","x":48,"y":20,"note":"As water evaporates out, it drags more water up the xylem behind it: this continuous pull is the transpiration stream."}]},
"d_GBV1":{"vb":"0 0 320 220","svg":"\n<rect x=\"0\" y=\"0\" width=\"320\" height=\"220\" fill=\"#F4F6FC\"/>\n<text x=\"80\" y=\"14\" font-family=\"Arial,sans-serif\" font-size=\"10\" fill=\"#7a8199\" text-anchor=\"middle\">Sexual reproduction</text>\n<g data-part=\"eggCell\">\n  <circle cx=\"40\" cy=\"52\" r=\"20\" fill=\"#F1D2D8\" stroke=\"#B4341E\" stroke-width=\"2.5\"/>\n  <circle cx=\"40\" cy=\"52\" r=\"8\" fill=\"#B4341E\" opacity=\"0.5\"/>\n</g>\n<g data-part=\"spermCell\">\n  <ellipse cx=\"40\" cy=\"112\" rx=\"10\" ry=\"7\" fill=\"#DCEAF6\" stroke=\"#1E2761\" stroke-width=\"2.5\"/>\n  <path d=\"M50 112 q10 -8 20 0 q-10 8 -20 0\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"2\" class=\"sm-osc\"/>\n  <line x1=\"50\" y1=\"112\" x2=\"72\" y2=\"112\" stroke=\"#1E2761\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/>\n</g>\n<path d=\"M64 60 L96 78\" stroke=\"#7a8199\" stroke-width=\"2\" fill=\"none\"/>\n<path d=\"M96 78 l-11 -1 l3 -8 z\" fill=\"#7a8199\"/>\n<path d=\"M56 108 L96 86\" stroke=\"#7a8199\" stroke-width=\"2\" fill=\"none\"/>\n<path d=\"M96 86 l-11 1 l3 8 z\" fill=\"#7a8199\"/>\n<g data-part=\"zygote\">\n  <circle cx=\"118\" cy=\"82\" r=\"18\" fill=\"#CDE5C6\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/>\n</g>\n<g data-part=\"chromosomes\">\n  <path d=\"M35 46 v12 M45 46 v12\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <path d=\"M37 108 v8 M43 108 v8\" stroke=\"#1E2761\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <path d=\"M112 78 v10 M117 76 v12 M122 78 v10 M127 80 v8\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <text x=\"118\" y=\"112\" font-family=\"Arial,sans-serif\" font-size=\"8\" fill=\"#2C5F2D\" text-anchor=\"middle\">n + n = 2n</text>\n</g>\n<g data-part=\"asexualParent\">\n  <text x=\"60\" y=\"150\" font-family=\"Arial,sans-serif\" font-size=\"10\" fill=\"#7a8199\" text-anchor=\"middle\">Asexual (clone)</text>\n  <circle cx=\"30\" cy=\"182\" r=\"15\" fill=\"#CDE5C6\" stroke=\"#2C5F2D \" y1=\"82\" x2=\"300\" y2=\"82\" stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <line x1=\"274\" y1=\"98\" x2=\"300\" y2=\"98\" stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n  <line x1=\"274\" y1=\"114\" x2=\"300\" y2=\"114\" stroke=\"#C99528\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n</g>\n","parts":[{"id":"eggCell","label":"Egg (gamete)","x":16,"y":26,"note":"The mother makes an egg, a sex cell carrying just half her genetic information, waiting to be joined by the other parent."},{"id":"spermCell","label":"Sperm (gamete)","x":38,"y":27,"note":"The father's sperm swims in carrying his half of the genes, ready to fuse with the egg and mix two sets of information."},{"id":"zygote","label":"Fertilised cell","x":27,"y":68,"note":"Egg and sperm fuse at fertilisation, restoring the full set of chromosomes; this single cell now divides by mitosis to grow."},{"id":"asexualParent","label":"Single parent (clone)","x":70,"y":16,"note":"With no gametes and no mixing, one parent simply copies itself, so every offspring is an identical clone with no variation."},{"id":"chromosomes","label":"Chromosomes (halved)","x":70,"y":42,"note":"Meiosis halves the chromosomes when making gametes, so two joining cells add back to the normal number rather than doubling it."},{"id":"dnaHelix","label":"DNA double helix","x":89,"y":33,"note":"Zoom into a chromosome and you find DNA: two long strands twisted together into a double helix that stores all the instructions."},{"id":"basePair","label":"Gene / base pair","x":89,"y":52,"note":"The strands are held by paired bases; a short run of these forms one gene, coding for a single feature of the organism."}]},

roke='#C99528' stroke-width='2.5'/><text x='264' y='123' font-size='18' fill='#3a2f14' text-anchor='middle' font-weight='bold'>3 : 1</text></g><g data-part='sexChromosomes'><rect x='60' y='224' width='200' height='44' rx='8' fill='#F4F6FC' stroke='#7a8199' stroke-width='2'/><text x='104' y='250' font-size='15' fill='#B4341E' text-anchor='middle' font-weight='bold'>XX</text><text x='104' y='263' font-size='8' fill='#7a8199' text-anchor='middle'>female</text><text x='216' y='250' font-size='15' fill='#1E2761' text-anchor='middle' font-weight='bold'>XY</text><text x='216' y='263' font-size='8' fill='#7a8199' text-anchor='middle'>male</text><line x1='140' y1='246' x2='180' y2='246' stroke='#7a8199' stroke-width='1.5'/></g>","parts":[{"id":"parentAlleles","label":"Parent alleles","x":36,"y":12,"note":"Each parent carries two alleles for the gene; here both are Bb, so each can pass on either a B or a b to their offspring."},{"id":"dominantOffspring","label":"Dominant offspring","x":37,"y":35,"note":"Where a dominant B lands in the square, it overrides the other allele, so the offspring shows the dominant characteristic even with just one copy."},{"id":"heterozygous","label":"Heterozygous (Bb)","x":64,"y":35,"note":"A B pairs with a b, giving two different alleles; the dominant B is expressed, so the phenotype still shows the dominant characteristic."},{"id":"recessiveOffspring","label":"Recessive (bb)","x":64,"y":67,"note":"Only when two recessive b alleles meet does the recessive characteristic finally appear, since no dominant allele is present to mask it."},{"id":"ratio","label":"3 : 1 ratio","x":89,"y":50,"note":"Counting the four squares gives three offspring showing dominant to one showing recessive, the classic 3:1 ratio from two heterozygous parents."},{"id":"sexChromosomes","label":"XX / XY sex","x":73,"y":92,"note":"Sex is set the same way: an X from mum pairs with an X or Y from dad, giving XX females or XY males."}]},

y generations the whole species shifts."},{"id":"selectiveBreeding","label":"Selective breeding","x":40,"y":72,"note":"Humans speed this up by choosing individuals with useful traits, like high yield, and breeding them together generation after generation."},{"id":"fossil","label":"Fossil evidence","x":14,"y":82,"note":"Fossils capture how species looked long ago, letting us track gradual changes over time — solid evidence that evolution really happened."}]},

"11\" fill=\"#FFFFFF\" text-anchor=\"middle\" font-weight=\"700\">&#8722;</text>\n  </g>\n</g>","parts":[{"id":"nucleus","label":"Nucleus","x":50,"y":33,"note":"Right at the centre we pack a tiny dense nucleus of protons and neutrons; it holds nearly all the atom's mass in a minute space."},{"id":"proton","label":"Proton","x":37,"y":44,"note":"Inside the nucleus each proton carries a +1 charge and a mass of 1; counting these protons tells us which element the atom is."},{"id":"neutron","label":"Neutron","x":63,"y":44,"note":"Neutrons sit alongside the protons with no charge but a mass of 1, adding weight and helping hold the nucleus together."},{"id":"innerShell","label":"First Shell","x":50,"y":71,"note":"Electrons now orbit in shells, filling from the inside out; this first shell fills up first and holds a maximum of 2 electrons."},{"id":"outerShell","label":"Outer Shell","x":13,"y":50,"note":"Once the inner shell is full, electrons spill into the next shell out, which can take up to 8, building the arrangement outwards."},{"id":"electron","label":"Electron","x":87,"y":50,"note":"Each electron carries a -1 charge and almost no mass; in a neutral atom their number matches the protons, so charges cancel out."}]},

chor=\"middle\" fill=\"#1E2761\">nm</text>\n</g>","parts":[{"id":"ionicLattice","label":"Giant ionic lattice","x":27,"y":20,"note":"Millions of oppositely charged ions lock into a giant grid; breaking so many strong bonds needs huge heat, so melting points soar."},{"id":"simpleMolecule","label":"Simple molecular","x":72,"y":18,"note":"Only weak forces hold these separate molecules together, so they pull apart easily, giving low melting points and no charge to carry current."},{"id":"giantCovalent","label":"Giant covalent","x":18,"y":52,"note":"Here every atom bonds strongly to its neighbours in one huge network, so enormous heat is needed to break them apart and melt it."},{"id":"metalStructure","label":"Metal structure","x":67,"y":45,"note":"Positive metal ions sit in a sea of loose electrons that drift freely, carrying charge and heat while layers slide to bend the metal."},{"id":"alloy","label":"Alloy (distorted)","x":76,"y":56,"note":"Mixing in different-sized atoms jams the neat layers so they cannot slide past each other, making the alloy harder than the pure metal."},{"id":"nanoparticle","label":"Nanoparticle","x":50,"y":83,"note":"Shrunk to 1-100 nm, so much surface is exposed for their size that they speed up reactions as catalysts and block UV in sunscreens."}]},

=\"224\" r=\"7\" fill=\"#7a8199\"/>\n  <g class=\"sm-rise\">\n    <path d=\"M195,252 q4,-10 8,0\" stroke=\"#B4341E\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\"/>\n    <path d=\"M214,252 q4,-12 8,0\" stroke=\"#B4341E\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\"/>\n    <path d=\"M233,252 q4,-10 8,0\" stroke=\"#B4341E\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\"/>\n  </g>\n  <path d=\"M266,210 L286,192\" stroke=\"#7a8199\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" marker-end=\"url(#c1arr)\"/>\n  <text x=\"292\" y=\"190\" font-family=\"sans-serif\" font-size=\"8\" fill=\"#7a8199\" text-anchor=\"middle\">CO&#8322;</text>\n  <path d=\"M244,248 L270,260\" stroke=\"#C99528\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\" class=\"sm-fall\"/>\n</g>","parts":[{"id":"reactivitySeries","label":"Reactivity series","x":42,"y":13,"note":"We line the metals up from most to least reactive; this ladder predicts every reaction, because a metal higher up displaces one below it from its compound."},{"id":"reactiveMetals","label":"Very reactive metals","x":13,"y":13,"note":"At the top sit potassium, sodium, calcium and magnesium; they grab oxygen and other elements eagerly, so they are locked tightly inside compounds in the ground."},{"id":"unreactiveMetals","label":"Unreactive metals","x":13,"y":79,"note":"Down here copper, silver and gold barely react, so they cling weakly to compounds and are easily pushed out by any metal above them."},{"id":"carbonLine","label":"Carbon's position","x":74,"y":40,"note":"We slot carbon into the ladder as a dividing line; whether a metal sits above or below it decides how we tear that metal from its ore."},{"id":"reduction","label":"Reduction (with carbon)","x":85,"y":21,"note":"For metals below carbon, like iron, we heat the ore with carbon; carbon steals the oxygen away, reducing the ore back to pure metal."},{"id":"electrolysis","label":"Electrolysis","x":74,"y":75,"note":"Metals above carbon, like aluminium, hold oxygen too tightly for carbon; instead electricity splits the molten compound apart to release the metal."}]},

"y":48,"note":"This electrode is now negative, so it pulls in positive metal ions and hands them electrons, forming the metal here."},{"id":"anode","label":"Anode (positive)","x":60,"y":48,"note":"This electrode is now positive, so it attracts negative ions and takes electrons from them, forming the non-metal here."},{"id":"electrolyte","label":"Electrolyte","x":80,"y":86,"note":"Melting or dissolving the compound frees its ions to move, letting charge flow so the compound can be split apart."},{"id":"cation","label":"Positive ion (cation)","x":42,"y":68,"note":"The positive ion is drawn to the negative cathode, where it gains electrons and turns into a neutral atom."},{"id":"anion","label":"Negative ion (anion)","x":58,"y":80,"note":"The negative ion is drawn to the positive anode, where it loses electrons and becomes a neutral atom."}]},

0 z\" fill=\"#B4341E\"/>\n  <path d=\"M120 118 l-5 -11 h10 z\" fill=\"#B4341E\"/>\n  <text x=\"128\" y=\"92\" font-family=\"Arial,sans-serif\" font-size=\"11\" fill=\"#B4341E\">Ea</text>\n</g>\n<g data-part=\"catalystPath\">\n  <path d=\"M60 120 C104 120 116 88 158 88 C200 88 210 150 258 150\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"3\" stroke-dasharray=\"7 5\" stroke-linecap=\"round\" class=\"sm-flow\"/>\n  <circle cx=\"158\" cy=\"88\" r=\"4\" fill=\"#C99528\"/>\n</g>\n<g data-part=\"energyChange\">\n  <line x1=\"290\" y1=\"120\" x2=\"290\" y2=\"150\" stroke=\"#2C5F2D\" stroke-width=\"2.5\"/>\n  <path d=\"M290 148 l-5 -10 h10 z\" fill=\"#2C5F2D\"/>\n  <line x1=\"278\" y1=\"120\" x2=\"296\" y2=\"120\" stroke=\"#2C5F2D\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/>\n  <text x=\"298\" y=\"138\" font-family=\"Arial,sans-serif\" font-size=\"10\" fill=\"#2C5F2D\">-ΔE</text>\n</g>\n","parts":[{"id":"energyAxis","label":"Energy axis","x":13,"y":18,"note":"We plot energy going up the side, so we can track how much the reacting particles hold as the reaction runs left to right."},{"id":"reactants","label":"Reactants","x":22,"y":34,"note":"Here sit the starting chemicals, storing their energy before anything reacts; this height is where the whole story begins."},{"id":"products","label":"Products","x":90,"y":67,"note":"After reacting, the new substances settle here; where they land compared to the start tells us if energy was released or absorbed."},{"id":"activationEnergy","label":"Activation energy","x":59,"y":10,"note":"Particles must climb this hump first, gaining enough energy on collision to break bonds and get the reaction started."},{"id":"catalystPath","label":"Catalyst path","x":62,"y":24,"note":"A catalyst carves a lower route over the hump, so more collisions succeed and the reaction speeds up without being used up."},{"id":"energyChange","label":"Energy change","x":35,"y":52,"note":"The drop from reactants to products is the energy given out; here products sit lower, so this reaction releases heat overall."}]},

enerator."}]},

t-family=\"Arial,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#7a8199\">I = V/R</text></g>","parts":[{"id":"cell","label":"Cell / Battery","x":12,"y":43,"note":"The cell pushes charge out of one terminal and back into the other; connect both ends to power the loop."},{"id":"bulb","label":"Bulb (component)","x":47,"y":19,"note":"Charge flowing through the bulb makes it light up; this is where the circuit's energy is transferred and used."},{"id":"resistor","label":"Resistor","x":78,"y":19,"note":"The resistor pushes back against the flowing charge; add more resistance and the current drops, so the bulb dims."},{"id":"voltmeter","label":"Voltmeter (across)","x":47,"y":43,"note":"Wired across the bulb, the voltmeter reads how many volts of energy the charge gives up passing through it."},{"id":"ammeter","label":"Ammeter (series)","x":56,"y":67,"note":"Placed in the loop itself, the ammeter counts the charge flowing past each second, reading the current in amps."},{"id":"wire","label":"Conducting wire","x":91,"y":86,"note":"The metal wire carries the charge round, ferrying energy from the cell to the bulb and back again."},{"id":"symbol","label":"Resistance (Ω)","x":53,"y":86,"note":"Resistance ties it together: current equals potential difference divided by resistance, so voltage and resistance decide the flow."}]},

ys."}]},

ht=\"15\" rx=\"2\" fill=\"#AEB6D6\"/><rect x=\"273\" y=\"132\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#AEB6D6\"/></g><rect x=\"18\" y=\"42\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#2C5F2D\" fill-opacity=\"0.85\"/></g><g data-part=\"divide\"><path d=\"M213 72 L213 87 L228 87 L228 117 L228 132 L228 147\" fill=\"none\" stroke=\"#1E2761\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></g><g data-part=\"period\"><rect x=\"16\" y=\"131\" width=\"274\" height=\"17\" rx=\"3\" fill=\"none\" stroke=\"#C99528\" stroke-width=\"3.5\"/></g><path d=\"M8 46 L8 148\" fill=\"none\" stroke=\"#2C5F2D\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><path class=\"sm-fall\" d=\"M8 148 l-4 -8 h8 z\" fill=\"#2C5F2D\"/><path d=\"M312 46 L312 148\" fill=\"none\" stroke=\"#B4341E\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><path class=\"sm-rise\" d=\"M312 46 l-4 8 h8 z\" fill=\"#B4341E\"/>","parts":[{"id":"group1","label":"Group 1 (alkali metals)","x":11,"y":21,"note":"This far-left column holds the alkali metals; reading down the column, each one reacts more violently, so reactivity climbs as you go."},{"id":"metals","label":"Metals","x":33,"y":63,"note":"Most of the table fills with metals: strong, shiny, bendy conductors of heat and electricity, so the vast bulk of elements sit on this side."},{"id":"divide","label":"Metal / non-metal divide","x":60,"y":47,"note":"This zig-zag line splits the table: metals on the left give basic oxides, while non-metals on the right form mostly acidic oxides."},{"id":"nonMetals","label":"Non-metals","x":71,"y":63,"note":"Squeezed into the top-right corner sit the roughly 18 non-metals: brittle, dull insulators that behave the opposite way to metals."},{"id":"group0","label":"Group 0 (noble gases)","x":86,"y":21,"note":"The final column holds the noble gases; their outer shells are already full, so they barely react and drift about as loners."},{"id":"period","label":"Period (row)","x":47,"y":78,"note":"Reading across nce travelled. As we climb it, the object has moved further from its starting point."},{"id":"xAxis","label":"Time axis","x":53,"y":86,"note":"Time runs along the bottom, ticking forward second by second. Reading left to right, we watch the journey unfold."},{"id":"shallowSlope","label":"Moving (slope)","x":30,"y":68,"note":"The line climbs as time passes, so distance grows each second. That sloping rise tells us the object is on the move."},{"id":"flatLine","label":"Stationary (flat)","x":55,"y":56,"note":"Here the line goes flat: time passes but distance stops growing, so the object has halted and is standing still."},{"id":"steepSlope","label":"Faster (steeper)","x":75,"y":38,"note":"Now the line rockets up steeply, covering lots of distance per second. A steeper slope always means a faster object."}]},
