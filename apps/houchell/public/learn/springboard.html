st be extracted by electrolysis (1)","e.g. aluminium (1)","very unreactive metals such as gold are found native/uncombined and need no extraction (1)"],"model":"Metals below carbon in the reactivity series (like iron) can be reduced by carbon, which removes the oxygen. Metals above carbon (like aluminium) are too reactive for carbon to remove the oxygen, so they are extracted by electrolysis. Very unreactive metals such as gold are found native and need no extraction."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Predict and explain the products at each electrode when molten zinc chloride is electrolysed.","scheme":["At the cathode: zinc (1)","because positive metal ions are attracted to the negative cathode (1)","At the anode: chlorine (1)","because negative chloride ions are attracted to the positive anode (1)"],"model":"Zinc forms at the cathode because the positive zinc ions are attracted to the negative electrode. Chlorine forms at the anode because the negative chloride ions are attracted to the positive electrode."}]},"GCE1":{"code":"GCE1","title":"Exothermic & endothermic reactions","discipline":"chemistry","blurb":"Reactions that give out or take in energy, and how we use them.","diagram":{"key":"d_GCE1","map":[["reactants","products","energyOut"],["endoCurve","energyIn"],null,null,["activation"]]},"vocab":[{"term":"exothermic","definition":"a reaction that transfers energy to the surroundings, so the temperature rises","say":"ex-oh-ther-mic"},{"term":"endothermic","definition":"a reaction that takes in energy, so the temperature falls","say":"en-doh-ther-mic"}],"facts":["An exothermic reaction transfers energy to the surroundings, so the temperature of the surroundings rises. Examples include combustion, neutralisation and oxidation.","An endothermic reaction takes in energy from the surroundings, so the temperature falls. Examples include thermal decomposition and some dissolving reactions.","Required practical: measure the temperature change of reactions such as dissolving, displacement and neutralisation.","Hand warmers use exothermic reactions to warm you up; some sports injury cold packs use endothermic reactions to cool a injury.","Whether a reaction is exothermic or endothermic depends on the balance of energy taken in to break bonds and given out to make bonds."],"misconceptions":[{"wrong":"Endothermic reactions feel hot.","right":"Endothermic reactions take in energy, so the surroundings get colder, not hotter."},{"wrong":"All reactions give out energy.","right":"Exothermic reactions give out energy, but endothermic reactions take it in."}],"questions":[{"type":"mcq","q":"What happens to the temperature of the surroundings in an exothermic reaction?","options":[{"t":"It rises","correct":true},{"t":"It falls","why":"Falling temperature is endothermic."},{"t":"It stays the same","why":"Exothermic reactions release energy, warming the surroundings."}],"ok":"Exothermic reactions release energy, so the surroundings get warmer."},{"type":"mcq","q":"What is an endothermic reaction?","options":[{"t":"One that takes in energy, so the temperature falls","correct":true},{"t":"One that gives out energy","why":"That is exothermic."},{"t":"One with no energy change","why":"Endothermic reactions take in energy."}],"ok":"Endothermic reactions absorb energy, cooling the surroundings."},{"type":"categorise","q":"Sort each as exothermic or endothermic.","bins":["Exothermic","Endothermic"],"items":[{"t":"Combustion (burning)","bin":"Exothermic"},{"t":"Neutralisation","bin":"Exothermic"},{"t":"Thermal decomposition","bin":"Endothermic"},{"t":"A sports cold pack","bin":"Endothermic"}],"ok":"Giving out energy is exothermic; taking it in is endothermic.","bad":"Burning and neutralisation give out energy; decomposition and cold packs take it in."},{"type":"mcq","q":"A hand warmer gets hot when it is activated. What kind of reaction is inside?","options":[{"t":"Exothermic","correct":true},{"t":"Endothermic","why":"Endothermic reactions cool down, not warm up."},{"t":"Neither","why":"Giving out heat is exothermic."}],"ok":"A hand warmer uses an exothermic reaction to release heat."},{"type":"mcq","q":"In the required practical, how do you tell whether a reaction is exothermic or endothermic?","options":[{"t":"Measure the temperature change of the mixture","correct":true},{"t":"Measure its mass","why":"Mass does not tell you the energy change."},{"t":"Measure its colour","why":"Colour does not directly show the energy change."}],"ok":"You measure the temperature change: a rise is exothermic, a fall is endothermic."},{"type":"tf","q":"Neutralisation of an acid by an alkali is an exothermic reaction.","answer":true,"why":"Neutralisation releases energy, so the temperature of the mixture rises."}]},"GCE2":{"code":"GCE2","title":"Reaction profiles","discipline":"chemistry","blurb":"Energy level diagrams, activation energy, and bond breaking and making.","diagram":{"key":"d_GCE2","map":[["energyAxis","reactants","products"],["products","energyChange"],"activationEnergy",null,"catalystPath"]},"vocab":[{"term":"reaction profile","definition":"an energy diagram showing the energy of reactants and products","say":"ree-ac-shun pro-file"},{"term":"activation energy","definition":"the minimum energy needed for a reaction to start","say":"ac-ti-vay-shun energy"}],"facts":["A reaction profile shows the energy of the reactants and the products during a reaction.","In an exothermic reaction the products are at a lower energy than the reactants; in an endothermic reaction they are higher.","The activation energy is the minimum energy that colliding particles need for a reaction to start; it is the height of the hump on the profile.","Breaking bonds takes in energy (endothermic); making bonds gives out energy (exothermic).","A reaction is exothermic overall if more energy is given out making bonds than is taken in breaking them; a catalyst lowers the activation energy."],"misconceptions":[{"wrong":"Making bonds takes in energy.","right":"Making bonds gives out energy; it is breaking bonds that takes in energy."},{"wrong":"A catalyst makes a reaction exothermic.","right":"A catalyst lowers the activation energy and speeds up the reaction; it does not change whether it is exothermic or endothermic."}],"questions":[{"type":"mcq","q":"On a reaction profile for an exothermic reaction, where are the products?","options":[{"t":"Lower in energy than the reactants","correct":true},{"t":"Higher in energy than the reactants","why":"Higher products would be endothermic."},{"t":"At the same energy as the reactants","why":"Exothermic reactions release energy, lowering the products."}],"ok":"In an exothermic reaction, the products are at a lower energy than the reactants."},{"type":"mcq","q":"What is the activation energy?","options":[{"t":"The minimum energy needed for a reaction to start","correct":true},{"t":"The energy given out by a reaction","why":"That is the overall energy change, not the activation energy."},{"t":"The energy stored in the products","why":"Activation energy is the barrier at the start."}],"ok":"Activation energy is the minimum energy needed to start a reaction."},{"type":"mcq","q":"Is breaking bonds exothermic or endothermic?","options":[{"t":"Endothermic (it takes in energy)","correct":true},{"t":"Exothermic (it gives out energy)","why":"Making bonds gives out energy; breaking takes it in."},{"t":"Neither","why":"Breaking bonds always takes in energy."}],"ok":"Breaking bonds takes in energy, so it is endothermic."},{"type":"mcq","q":"Is making bonds exothermic or endothermic?","options":[{"t":"Exothermic (it gives out energy)","correct":true},{"t":"Endothermic (it takes in energy)","why":"Breaking bonds takes in energy; making them gives it out."},{"t":"Neither","why":"Making bonds always gives out energy."}],"ok":"Making bonds gives out energy, so it is exothermic."},{"type":"mcq","q":"What does a catalyst do to the activation energy?","options":[{"t":"Lowers it","correct":true},{"t":"Raises it","why":"A catalyst lowers the activation energy."},{"t":"Has no effect","why":"Lowering the activation energy is how a catalyst speeds a reaction."}],"ok":"A catalyst lowers the activation energy, speeding up the reaction."},{"type":"tf","q":"In an endothermic reaction, the products are higher in energy than the reactants.","answer":true,"why":"Endothermic reactions take in energy, so the products end up at a higher energy level."}]},"GCE-EX":{"code":"GCE-EX","title":"Energy changes — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Energy changes.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A reaction's products are at a higher energy than its reactants. What does this tell you?","options":[{"t":"The reaction is endothermic","correct":true},{"t":"The reaction is exothermic","why":"Exothermic reactions have lower-energy products."},{"t":"No reaction has happened","why":"An energy change shows a reaction has happened."}],"ok":"Higher-energy products mean energy was taken in, so the reaction is endothermic."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"A student mixes two solutions and the temperature falls from 21 degC to 15 degC. Explain what type of reaction this is and describe how the student could improve the reliability of the result.","scheme":["The temperature falls, so the reaction is endothermic (1)","energy is taken in from the surroundings (1)","To improve reliability: use a lid/insulated cup to reduce heat exchange with the air (1)","repeat the experiment and calculate a mean temperature change (1)","control the volumes and concentrations of the solutions each time (1)","use the same thermometer / read it at eye level to reduce errors (1)"],"model":"The temperature falls, so the reaction is endothermic — it takes in energy from the surroundings. To improve reliability, use an insulated cup with a lid, repeat the experiment and take a mean, keep the volumes and concentrations the same each time, and read the thermometer carefully."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Use ideas about bond breaking and bond making to explain why a combustion reaction is exothermic.","scheme":["Breaking the bonds in the reactants takes in energy (1)","Making the bonds in the products (CO2 and water) gives out energy (1)","More energy is given out making bonds than is taken in breaking them (1)","so there is a net release of energy, making it exothermic (1)"],"model":"Breaking the bonds in the fuel and oxygen takes in energy, but making the bonds in the carbon dioxide and water gives out energy. More energy is released making bonds than is used breaking them, so overall energy is given out — the reaction is exothermic."}]},"GCR1":{"code":"GCR1","title":"Rate of reaction","discipline":"chemistry","blurb":"What controls how fast reactions go, using collision theory.","diagram":{"key":"d_GCR1","map":[null,["reactants","collision","products"],"temperature",null,["activationEnergy","catalystPath"]]},"vocab":[{"term":"rate of reaction","definition":"how quickly reactants are used up or products are made","say":"rayt of ree-ac-shun"},{"term":"collision theory","definition":"the idea that reactions happen when particles collide with enough energy","say":"col-li-shun theory"},{"term":"catalyst","definition":"a substance that speeds up a reaction without being used up","say":"cat-a-list"},{"term":"surface area","definition":"the total area of the surface of a solid that is exposed to react","say":"sur-face air-ee-a"}],"facts":["The rate of reaction is how quickly the reactants are used up or the products are made.","Collision theory says reactions happen when particles collide with at least the activation energy and the correct orientation; more frequent or more energetic collisions speed up the reaction.","Increasing the temperature speeds up a reaction because particles move faster and collide more often and more energetically.","Increasing the concentration of a solution (or the pressure of a gas) speeds up a reaction because there are more particles in the same volume, so collisions are more frequent.","Increasing the surface area of a solid speeds up a reaction; a catalyst speeds up a reaction by providing a different pathway with a lower activation energy, and is not used up."],"misconceptions":[{"wrong":"A catalyst is used up in the reaction.","right":"A catalyst is not used up; it can be used again and again."},{"wrong":"Breaking a solid into smaller pieces gives it less surface area.","right":"Smaller pieces have a larger total surface area, so the reaction is faster."}],"questions":[{"type":"mcq","q":"What is the rate of a reaction?","options":[{"t":"How quickly reactants are used up or products made","correct":true},{"t":"How much product is made in total","why":"Rate is about speed, not total amount."},{"t":"The temperature of the reaction","why":"Temperature affects rate but is not the rate itself."}],"ok":"Rate is how fast reactants are used up or products are formed."},{"type":"mcq","q":"According to collision theory, what is needed for a reaction to happen?","options":[{"t":"Particles must collide with at least the activation energy","correct":true},{"t":"Particles must be the same size","why":"Size is not the requirement."},{"t":"Particles must be cold","why":"Colder particles react more slowly."}],"ok":"Particles must collide with enough energy (the activation energy) and the right orientation."},{"type":"mcq","q":"Why does raising the temperature speed up a reaction?","options":[{"t":"Particles move faster and collide more often and more energetically","correct":true},{"t":"Particles get bigger","why":"Temperature changes speed, not size."},{"t":"There are more particles","why":"Temperature does not add particles; it speeds them up."}],"ok":"Hotter particles collide more frequently and with more energy."},{"type":"mcq","q":"Why does increasing the surface area of a solid speed up a reaction?","options":[{"t":"More of the solid is exposed, so collisions are more frequent","correct":true},{"t":"The solid becomes more concentrated","why":"Surface area is about exposed area, not concentration."},{"t":"The activation energy falls","why":"Surface area does not change the activation energy."}],"ok":"More exposed surface means more frequent collisions and a faster reaction."},{"type":"mcq","q":"How does a catalyst speed up a reaction?","options":[{"t":"It provides a pathway with a lower activation energy","correct":true},{"t":"It increases the temperature","why":"A catalyst does not heat the reaction."},{"t":"It is used up to release energy","why":"A catalyst is not used up."}],"ok":"A catalyst lowers the activation energy and is not used up."},{"type":"categorise","q":"Match each change to why it speeds up a reaction.","bins":["More frequent collisions","More energetic collisions","Lower activation energy"],"items":[{"t":"Higher concentration","bin":"More frequent collisions"},{"t":"Larger surface area","bin":"More frequent collisions"},{"t":"Higher temperature","bin":"More energetic collisions"},{"t":"Adding a catalyst","bin":"Lower activation energy"}],"ok":"Concentration and surface area raise collision frequency; temperature raises energy; catalysts lower the barrier.","bad":"Frequency vs energy vs activation energy are the three ways to speed up a reaction."},{"type":"tf","q":"A catalyst is used up during a reaction.","answer":false,"why":"A catalyst speeds up a reaction without being used up, so it can be reused."}]},"GCR2":{"code":"GCR2","title":"Reversible reactions & equilibrium","discipline":"chemistry","blurb":"Reversible reactions, their energy changes, and dynamic equilibrium.","diagram":{"key":"d_GCR2","map":["doubleArrow",null,["closedSystem","forwardReaction"],["reactants","products"],"reverseReaction"]},"vocab":[{"term":"reversible reaction","definition":"a reaction in which the products can react to reform the reactants","say":"ree-ver-si-bul"},{"term":"equilibrium","definition":"the state where the forward and reverse reactions happen at the same rate","say":"ee-kwi-lib-ree-um"}],"facts":["A reversible reaction is one where the products can react to reform the reactants; it is shown with a special double arrow.","If a reversible reaction is exothermic in one direction, it is endothermic in the other, by the same amount of energy.","In a closed system a reversible reaction reaches equilibrium, where the forward and reverse reactions happen at the same rate.","At equilibrium the amounts (concentrations) of reactants and products stay constant, even though both reactions are still going on.","This is called a dynamic equilibrium, because the reactions have not stopped; they just balance out."],"misconceptions":[{"wrong":"At equilibrium the reactions have stopped.","right":"At equilibrium both reactions still happen, but at equal rates, so the amounts stay constant (dynamic equilibrium)."},{"wrong":"Equilibrium means there are equal amounts of reactants and products.","right":"It means the rates are equal, not the amounts; the amounts simply stay constant."}],"questions":[{"type":"mcq","q":"What is a reversible reaction?","options":[{"t":"One where the products can react to reform the reactants","correct":true},{"t":"One that can only go forwards","why":"Reversible reactions can go both ways."},{"t":"One that releases no energy","why":"Reversible reactions can still involve energy changes."}],"ok":"In a reversible reaction the products can reform the reactants."},{"type":"mcq","q":"A reversible reaction is exothermic in the forward direction. What is it in the reverse direction?","options":[{"t":"Endothermic, by the same amount of energy","correct":true},{"t":"Exothermic, by the same amount","why":"If forward is exothermic, reverse is endothermic."},{"t":"It releases no energy in reverse","why":"The reverse takes in the same energy the forward gave out."}],"ok":"If exothermic one way, it is endothermic the other, by the same amount."},{"type":"mcq","q":"What happens at dynamic equilibrium in a closed system?","options":[{"t":"The forward and reverse reactions happen at the same rate","correct":true},{"t":"Both reactions stop","why":"Both reactions continue; they just balance."},{"t":"Only the forward reaction happens","why":"Both directions happen at equilibrium."}],"ok":"At equilibrium the forward and reverse rates are equal."},{"type":"mcq","q":"At equilibrium, what happens to the amounts of reactants and products?","options":[{"t":"They stay constant","correct":true},{"t":"They keep increasing","why":"Amounts are constant at equilibrium."},{"t":"They fall to zero","why":"Both reactants and products remain present."}],"ok":"The concentrations stay constant because the rates are balanced."},{"type":"tf","q":"At equilibrium the reactions have completely stopped.","answer":false,"why":"Both reactions continue at equal rates (dynamic equilibrium), so the amounts stay constant."},{"type":"mcq","q":"Why is equilibrium described as 'dynamic'?","options":[{"t":"Both reactions are still happening, but at equal rates","correct":true},{"t":"The container is moving","why":"Dynamic refers to the ongoing reactions, not movement."},{"t":"The temperature keeps changing","why":"Dynamic refers to the balanced reactions continuing."}],"ok":"Dynamic means the reactions continue but balance out."}]},"GCR-EX":{"code":"GCR-EX","title":"Rates — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Rate and extent of chemical change.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Marble chips react faster with acid when ground into a powder. Why?","options":[{"t":"The powder has a larger surface area, so collisions are more frequent","correct":true},{"t":"The powder is more concentrated","why":"Surface area, not concentration, has changed."},{"t":"The powder is hotter","why":"Grinding does not heat the marble."}],"ok":"A powder exposes more surface, so there are more frequent collisions."},{"type":"mcq","q":"Which change would NOT increase the rate of a reaction between a solid and an acid?","options":[{"t":"Cooling the acid down","correct":true},{"t":"Increasing the acid concentration","why":"Higher concentration increases the rate."},{"t":"Using a catalyst","why":"A catalyst increases the rate."}],"ok":"Cooling slows particles down, decreasing the rate."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Using collision theory, explain why increasing the temperature and increasing the concentration both speed up a reaction.","scheme":["Reactions happen when particles collide with at least the activation energy (1)","Increasing temperature gives particles more energy / they move faster (1)","so they collide more often AND more collisions have the activation energy (1)","Increasing concentration means more particles in the same volume (1)","so there are more frequent collisions (1)","more successful collisions per second means a faster rate (1)"],"model":"Reactions need collisions with at least the activation energy. Higher temperature makes particles move faster, so they collide more often and a greater fraction of collisions has enough energy. Higher concentration puts more particles in the same volume, so collisions are more frequent. Both give more successful collisions each second, so the rate increases."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain what is meant by a dynamic equilibrium in a closed system.","scheme":["The reaction is reversible and takes place in a closed system (1)","The forward and reverse reactions both continue (1)","They happen at the same rate (1)","so the concentrations of reactants and products stay constant (1)"],"model":"In a closed system a reversible reaction reaches a point where the forward and reverse reactions both still occur but at equal rates, so the concentrations of reactants and products stay constant. This is a dynamic equilibrium."}]},"GCO1":{"code":"GCO1","title":"Crude oil & hydrocarbons","discipline":"chemistry","blurb":"Crude oil, alkanes, fractional distillation and the properties of fractions.","diagram":{"key":"d_GCO1","map":["crudeOilInlet",null,["column","coolTop","hotBottom"],["topFraction","bottomFraction"],null]},"vocab":[{"term":"hydrocarbon","definition":"a compound made of hydrogen and carbon only","say":"hy-droh-car-bon"},{"term":"alkane","definition":"a saturated hydrocarbon with the general formula CnH2n+2","say":"al-kane"},{"term":"crude oil","definition":"a finite mixture of hydrocarbons formed from ancient sea creatures","say":"crood oyl"},{"term":"fractional distillation","definition":"separating crude oil into fractions by their boiling points","say":"frac-shun-al dis-til-ay-shun"}],"facts":["Crude oil is a finite resource and a mixture of hydrocarbons, most of which are alkanes.","Alkanes are saturated hydrocarbons with the general formula CnH2n+2; the first four are methane, ethane, propane and butane.","Fractional distillation separates crude oil into fractions: the column is hot at the bottom and cooler at the top, so each fraction condenses at its boiling point.","Shorter-chain hydrocarbons have lower boiling points, are more volatile (evaporate more easily), are more flammable, and are less viscous (runnier).","Complete combustion of a hydrocarbon in plenty of oxygen produces carbon dioxide and water, releasing energy."],"misconceptions":[{"wrong":"Crude oil is a single compound.","right":"Crude oil is a mixture of many different hydrocarbons."},{"wrong":"Longer hydrocarbons are more flammable.","right":"Shorter-chain hydrocarbons are more volatile and more flammable than longer ones."}],"questions":[{"type":"mcq","q":"What is a hydrocarbon?","options":[{"t":"A compound of hydrogen and carbon only","correct":true},{"t":"A compound containing oxygen","why":"Hydrocarbons contain only hydrogen and carbon."},{"t":"A type of metal","why":"Hydrocarbons are not metals."}],"ok":"Hydrocarbons contain only hydrogen and carbon."},{"type":"mcq","q":"What is the general formula of an alkane?","options":[{"t":"CnH2n+2","correct":true},{"t":"CnH2n","why":"That is the formula for an alkene."},{"t":"CnHn","why":"That is not a correct hydrocarbon formula."}],"ok":"Alkanes are saturated with the general formula CnH2n+2."},{"type":"mcq","q":"How does fractional distillation separate crude oil?","options":[{"t":"By the different boiling points of the fractions","correct":true},{"t":"By their colours","why":"Boiling point, not colour, is used."},{"t":"By a chemical reaction","why":"Fractional distillation is a physical separation."}],"ok":"Fractions condense at different heights because they have different boiling points."},{"type":"mcq","q":"What is true of a shorter-chain hydrocarbon compared with a longer one?","options":[{"t":"It has a lower boiling point and is more flammable","correct":true},{"t":"It is more viscous","why":"Shorter chains are less viscous (runnier)."},{"t":"It has a higher boiling point","why":"Shorter chains have lower boiling points."}],"ok":"Shorter chains are more volatile, more flammable and less viscous."},{"type":"mcq","q":"What are the products of complete combustion of a hydrocarbon?","options":[{"t":"Carbon dioxide and water","correct":true},{"t":"Carbon monoxide and water","why":"That is incomplete combustion."},{"t":"Hydrogen and oxygen","why":"Those are not combustion products."}],"ok":"Complete combustion gives carbon dioxide and water."},{"type":"tf","q":"Crude oil is a finite resource.","answer":true,"why":"Crude oil formed over millions of years and is being used up far faster than it forms."},{"type":"order","q":"Order these alkanes from the lowest boiling point to the highest.","items":["Methane","Ethane","Propane","Butane"],"ok":"Longer chains have higher boiling points, so butane boils highest."}]},"GCO2":{"code":"GCO2","title":"Cracking & alkenes","discipline":"chemistry","blurb":"Cracking long hydrocarbons into useful ones, and the reactive alkenes.","diagram":{"key":"d_GCO2","map":[["largeHydrocarbon","catalyst"],"smallAlkane",["alkene","doubleBond"],"bromineTest",null]},"vocab":[{"term":"cracking","definition":"breaking large hydrocarbon molecules into smaller, more useful ones","say":"crack-ing"},{"term":"alkene","definition":"an unsaturated hydrocarbon with a carbon-carbon double bond, formula CnH2n","say":"al-keen"},{"term":"unsaturated","definition":"containing a carbon-carbon double bond","say":"un-sat-yur-ay-ted"}],"facts":["Cracking breaks large, less useful hydrocarbon molecules into smaller, more useful ones, using heat with a catalyst or steam.","Cracking produces smaller alkanes (useful as fuels) and alkenes.","Alkenes are unsaturated hydrocarbons with a carbon-carbon double bond and the general formula CnH2n.","Alkenes are more reactive than alkanes; they turn bromine water from orange to colourless, which is the test for an alkene.","Cracking is done because the demand for short-chain hydrocarbons (fuels) is greater than the supply, and alkenes are used to make polymers."],"misconceptions":[{"wrong":"Cracking joins small molecules into big ones.","right":"Cracking breaks big molecules into smaller ones; joining small molecules makes polymers."},{"wrong":"Alkanes turn bromine water colourless.","right":"Only alkenes (with a C=C double bond) decolourise bromine water; alkanes do not."}],"questions":[{"type":"mcq","q":"What does cracking do?","options":[{"t":"Breaks large hydrocarbons into smaller, more useful ones","correct":true},{"t":"Joins small molecules into a polymer","why":"That is polymerisation, not cracking."},{"t":"Burns hydrocarbons completely","why":"That is combustion."}],"ok":"Cracking breaks long-chain hydrocarbons into shorter, more useful molecules."},{"type":"mcq","q":"What are the products of cracking a long alkane?","options":[{"t":"Smaller alkanes and alkenes","correct":true},{"t":"Only carbon dioxide and water","why":"Those are combustion products."},{"t":"Only metals","why":"Cracking does not make metals."}],"ok":"Cracking gives smaller alkanes and alkenes."},{"type":"mcq","q":"What is the general formula of an alkene?","options":[{"t":"CnH2n","correct":true},{"t":"CnH2n+2","why":"That is the formula of an alkane."},{"t":"CnHn","why":"That is not a hydrocarbon formula."}],"ok":"Alkenes are unsaturated with the general formula CnH2n."},{"type":"mcq","q":"How can you test for an alkene?","options":[{"t":"Add bromine water — it turns from orange to colourless","correct":true},{"t":"Add bromine water — it stays orange","why":"Alkenes decolourise bromine water; staying orange would mean no alkene."},{"t":"Add limewater — it turns milky","why":"That is the test for carbon dioxide."}],"ok":"Alkenes decolourise bromine water, turning it from orange to colourless."},{"type":"mcq","q":"Why is cracking carried out?","options":[{"t":"Demand for short-chain fuels is greater than the supply","correct":true},{"t":"To make crude oil","why":"Crude oil is the raw material, not the product."},{"t":"To remove all alkenes","why":"Cracking actually produces useful alkenes."}],"ok":"Cracking turns surplus long chains into short-chain fuels and useful alkenes."},{"type":"tf","q":"Alkenes are unsaturated because they contain a carbon-carbon double bond.","answer":true,"why":"The C=C double bond makes alkenes unsaturated and more reactive than alkanes."}]},"GCO-EX":{"code":"GCO-EX","title":"Organic — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Organic chemistry.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"A hydrocarbon decolourises bromine water. What does this show?","options":[{"t":"It is an alkene (it contains a C=C double bond)","correct":true},{"t":"It is an alkane","why":"Alkanes do not decolourise bromine water."},{"t":"It contains oxygen","why":"Hydrocarbons contain only carbon and hydrogen."}],"ok":"Decolourising bromine water shows a carbon-carbon double bond — an alkene."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how fractional distillation separates crude oil into useful fractions, and why different fractions condense at different heights in the column.","scheme":["Crude oil is heated until it evaporates (1)","The vapours rise up a column that is hot at the bottom and cooler at the top (1)","Each fraction condenses when it reaches a temperature equal to its boiling point (1)","Fractions with high boiling points (long chains) condense low down (1)","Fractions with low boiling points (short chains) condense near the top (1)","so the mixture is separated into fractions of similar chain length (1)"],"model":"Heated crude oil evaporates and rises up a column that is hot at the bottom and cool at the top. Each fraction condenses where the temperature matches its boiling point: long-chain fractions with high boiling points condense low down, while short-chain fractions with low boiling points reach the cooler top before condensing, so the oil is separated by chain length."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why crude oil is cracked, and name the two types of product formed.","scheme":["Demand for short-chain hydrocarbons (fuels) is greater than the supply (1)","Cracking turns long-chain hydrocarbons into shorter, more useful ones (1)","It produces smaller alkanes (used as fuels) (1)","and alkenes (used to make polymers) (1)"],"model":"There is more demand for short-chain hydrocarbon fuels than crude oil supplies directly, so long chains are cracked into shorter, more useful molecules. This produces smaller alkanes, used as fuels, and alkenes, used to make polymers."}]},"GCN1":{"code":"GCN1","title":"Purity, formulations & chromatography","discipline":"chemistry","blurb":"Pure substances and formulations, and using chromatography to separate mixtures.","diagram":{"key":"d_GCN1","map":[null,null,null,["paper","solvent"],["baseline","solventFront","spot","distance"]]},"vocab":[{"term":"pure substance","definition":"a single element or compound, not mixed with anything else","say":"pyoor sub-stance"},{"term":"formulation","definition":"a mixture made to an exact recipe for a useful purpose","say":"for-mew-lay-shun"},{"term":"chromatography","definition":"a method that separates a mixture as a solvent moves through paper","say":"crow-ma-tog-ra-fee"},{"term":"Rf value","definition":"the distance a substance moves divided by the distance the solvent moves","say":"arr-eff value"}],"facts":["In chemistry a pure substance is a single element or compound; it melts and boils at a sharp, specific temperature.","Impurities lower the melting point and raise the boiling point, and the substance melts or boils over a range of temperatures.","A formulation is a mixture made to an exact recipe so that each component does a particular job, for example paints, medicines and fuels.","Paper chromatography has a stationary phase (the paper) and a mobile phase (the solvent), and separates substances by how strongly they are attracted to each.","The Rf value = distance moved by the substance / distance moved by the solvent, and is always between 0 and 1."],"misconceptions":[{"wrong":"In everyday language and chemistry, 'pure' means the same thing.","right":"In chemistry 'pure' means a single element or compound; in everyday use it can just mean natural or clean."},{"wrong":"An impure substance melts at one exact temperature.","right":"Impurities make a substance melt over a range of temperatures, and at a lower temperature."}],"questions":[{"type":"mcq","q":"What is a pure substance in chemistry?","options":[{"t":"A single element or compound","correct":true},{"t":"Anything natural","why":"Chemical purity means a single substance, not just natural."},{"t":"A mixture made to a recipe","why":"That is a formulation."}],"ok":"A pure substance is a single element or compound."},{"type":"mcq","q":"How does a pure substance melt?","options":[{"t":"At a sharp, specific temperature","correct":true},{"t":"Over a wide range of temperatures","why":"That is what an impure substance does."},{"t":"It never melts","why":"Pure substances melt at a definite temperature."}],"ok":"A pure substance melts at one sharp temperature."},{"type":"mcq","q":"What is a formulation?","options":[{"t":"A mixture made to an exact recipe for a purpose","correct":true},{"t":"A single pure compound","why":"A formulation is a mixture, not a pure substance."},{"t":"An element","why":"An element is not a formulation."}],"ok":"Formulations are useful mixtures made to a precise recipe, like paint or medicine."},{"type":"mcq","q":"In paper chromatography, what is the stationary phase?","options":[{"t":"The paper","correct":true},{"t":"The solvent","why":"The solvent is the mobile phase."},{"t":"The beaker","why":"The stationary phase is the paper."}],"ok":"The paper is the stationary phase; the solvent is the mobile phase."},{"type":"numeric","kicker":"Work it out","q":"In chromatography, a dye moves 4 cm while the solvent moves 8 cm. What is the Rf value?","hint":"Rf = distance moved by substance / distance moved by solvent","answer":0.5,"unit":"","ok":"4 / 8 = 0.5."},{"type":"tf","q":"Impurities lower the melting point of a substance.","answer":true,"why":"Impurities lower the melting point and make it melt over a range of temperatures."},{"type":"mcq","q":"Why might a single dye produce one spot in chromatography but a mixture produce several?","options":[{"t":"Each substance travels a different distance with the solvent","correct":true},{"t":"The paper changes colour by itself","why":"The spots come from the substances, not the paper."},{"t":"Pure substances cannot be tested","why":"Pure substances can be tested and give one spot."}],"ok":"Different substances are attracted differently, so they travel different distances."}]},"GCN2":{"code":"GCN2","title":"Tests for gases","discipline":"chemistry","blurb":"The standard chemical tests for hydrogen, oxygen, carbon dioxide and chlorine.","diagram":{"key":"d_GCN2","map":[["hydrogenTest","splint"],"oxygenTest","limewater","litmusPaper",null]},"vocab":[{"term":"limewater","definition":"a solution used to test for carbon dioxide; it turns milky","say":"lime-wa-ter"},{"term":"splint","definition":"a thin piece of wood used to test for hydrogen or oxygen","say":"splint"}],"facts":["Hydrogen is tested with a lighted splint: it burns with a squeaky pop.","Oxygen is tested with a glowing splint: the splint relights.","Carbon dioxide is tested with limewater: it turns milky (cloudy).","Chlorine is tested with damp litmus paper: it is bleached white.","These simple tests let you identify common gases produced in reactions."],"misconceptions":[{"wrong":"A glowing splint tests for hydrogen.","right":"A lighted splint and squeaky pop tests for hydrogen; a glowing splint relighting tests for oxygen."},{"wrong":"Chlorine turns limewater milky.","right":"Carbon dioxide turns limewater milky; chlorine bleaches damp litmus paper."}],"questions":[{"type":"mcq","q":"What is the test for hydrogen gas?","options":[{"t":"A lighted splint gives a squeaky pop","correct":true},{"t":"A glowing splint relights","why":"That is the test for oxygen."},{"t":"Limewater turns milky","why":"That is the test for carbon dioxide."}],"ok":"Hydrogen burns with a squeaky pop when a lighted splint is used."},{"type":"mcq","q":"What is the test for oxygen gas?","options":[{"t":"A glowing splint relights","correct":true},{"t":"A lighted splint gives a squeaky pop","why":"That is the test for hydrogen."},{"t":"Damp litmus is bleached","why":"That is the test for chlorine."}],"ok":"Oxygen relights a glowing splint."},{"type":"mcq","q":"What is the test for carbon dioxide?","options":[{"t":"Limewater turns milky (cloudy)","correct":true},{"t":"A squeaky pop with a lighted splint","why":"That is the test for hydrogen."},{"t":"A glowing splint relights","why":"That is the test for oxygen."}],"ok":"Carbon dioxide turns limewater milky."},{"type":"mcq","q":"What is the test for chlorine gas?","options":[{"t":"Damp litmus paper is bleached white","correct":true},{"t":"Limewater turns milky","why":"That tests for carbon dioxide."},{"t":"A squeaky pop","why":"That tests for hydrogen."}],"ok":"Chlorine bleaches damp litmus paper white."},{"type":"categorise","q":"Match each gas to its test result.","bins":["Squeaky pop","Relights a glowing splint","Limewater milky","Bleaches damp litmus"],"items":[{"t":"Hydrogen","bin":"Squeaky pop"},{"t":"Oxygen","bin":"Relights a glowing splint"},{"t":"Carbon dioxide","bin":"Limewater milky"},{"t":"Chlorine","bin":"Bleaches damp litmus"}],"ok":"Each gas has a distinctive simple test.","bad":"Hydrogen: pop. Oxygen: relights. CO2: milky limewater. Chlorine: bleaches litmus."},{"type":"tf","q":"Carbon dioxide relights a glowing splint.","answer":false,"why":"Carbon dioxide puts out a flame; it is oxygen that relights a glowing splint."}]},"GCN-EX":{"code":"GCN-EX","title":"Analysis — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemical analysis.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"In a chromatogram, a pigment travels 3 cm and the solvent travels 12 cm. Calculate the Rf value.","hint":"Rf = distance by substance / distance by solvent","answer":0.25,"unit":"","ok":"3 / 12 = 0.25."},{"type":"mcq","q":"A gas puts out a lighted splint and turns limewater milky. What is the gas?","options":[{"t":"Carbon dioxide","correct":true},{"t":"Oxygen","why":"Oxygen relights a splint and does not turn limewater milky."},{"t":"Hydrogen","why":"Hydrogen gives a squeaky pop."}],"ok":"Turning limewater milky identifies carbon dioxide."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain how the melting point of a substance can be used to tell whether it is pure.","scheme":["A pure substance melts at a single, sharp temperature (1)","An impure substance melts over a range of temperatures (1)","and at a lower temperature than the pure substance (1)","so a sharp melting point at the expected value shows the substance is pure (1)"],"model":"A pure substance melts at one sharp temperature, while an impure substance melts over a range and at a lower temperature. So if the sample melts sharply at the expected value, it is pure; if it melts over a range, it contains impurities."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Describe how you would carry out paper chromatography to separate the dyes in a sample of ink.","scheme":["Draw a pencil baseline near the bottom of the chromatography paper (1)","Put a spot of ink on the baseline (1)","Stand the paper in solvent so the solvent is below the baseline (1)","Let the solvent rise and carry the dyes up; the dyes separate into spots (1)"],"model":"Draw a pencil baseline near the bottom of the paper and add a spot of ink on it. Stand the paper in solvent (kept below the baseline). As the solvent rises it carries the dyes different distances, separating them into individual spots."}]},"GCT1":{"code":"GCT1","title":"Earth's atmosphere & its evolution","discipline":"chemistry","blurb":"The gases in today's air and how the atmosphere changed over billions of years.","diagram":{"key":"d_GCT1","map":["atmosphere","volcano","ocean",["plants","sedimentaryRock"],"algae"]},"vocab":[{"term":"atmosphere","definition":"the layer of gases surrounding the Earth","say":"at-mo-sfeer"}],"facts":["Today's atmosphere is about four-fifths (80%) nitrogen and about one-fifth (20%) oxygen, with small amounts of carbon dioxide, water vapour and noble gases.","The Earth's early atmosphere had a lot of carbon dioxide and little or no oxygen, released by intense volcanic activity along with water vapour.","As the Earth cooled, the water vapour condensed to form the oceans.","Carbon dioxide levels fell because it dissolved in the oceans and was absorbed by plants and algae for photosynthesis, and became locked in sedimentary rocks and fossil fuels.","Oxygen levels rose over time because algae and then plants produced oxygen by photosynthesis."],"misconceptions":[{"wrong":"The air is mostly oxygen.","right":"The air is about 80% nitrogen and only about 20% oxygen."},{"wrong":"The early atmosphere was like today's.","right":"The early atmosphere had lots of carbon dioxide and little oxygen, very different from today's."}],"questions":[{"type":"mcq","q":"Roughly what proportion of today's atmosphere is nitrogen?","options":[{"t":"About 80% (four-fifths)","correct":true},{"t":"About 20%","why":"That is the proportion of oxygen."},{"t":"About 50%","why":"Nitrogen is about 80%."}],"ok":"The air is about 80% nitrogen and 20% oxygen."},{"type":"mcq","q":"What was the Earth's early atmosphere like?","options":[{"t":"Lots of carbon dioxide and little or no oxygen","correct":true},{"t":"Mostly oxygen","why":"Oxygen built up much later, from photosynthesis."},{"t":"The same as today","why":"The early atmosphere was very different."}],"ok":"The early atmosphere had lots of carbon dioxide and little oxygen."},{"type":"mcq","q":"Why did oxygen levels in the atmosphere increase?","options":[{"t":"Algae and plants produced it by photosynthesis","correct":true},{"t":"Volcanoes released oxygen","why":"Volcanoes released carbon dioxide and water vapour, not oxygen."},{"t":"Oceans gave out oxygen","why":"Oxygen came mainly from photosynthesis."}],"ok":"Photosynthesis by algae and plants released oxygen."},{"type":"mcq","q":"Give one reason the carbon dioxide level fell over time.","options":[{"t":"It dissolved in the oceans and was used by plants for photosynthesis","correct":true},{"t":"It was destroyed by sunlight","why":"CO2 was removed by oceans, plants and rocks, not destroyed by light."},{"t":"Volcanoes absorbed it","why":"Volcanoes released CO2, not absorbed it."}],"ok":"CO2 dissolved in oceans, was used by plants, and became locked in rocks and fossil fuels."},{"type":"multi","q":"Tap the gases found in today's atmosphere.","items":[{"t":"Nitrogen","correct":true},{"t":"Oxygen","correct":true},{"t":"Carbon dioxide (small amount)","correct":true},{"t":"Hydrogen as the main gas"}],"ok":"Today's air is mostly nitrogen and oxygen, with a little carbon dioxide and noble gases.","bad":"Hydrogen is not a main gas in today's atmosphere."},{"type":"tf","q":"The oceans formed when water vapour in the early atmosphere condensed as the Earth cooled.","answer":true,"why":"As the Earth cooled, the water vapour condensed to form the oceans."}]},"GCT2":{"code":"GCT2","title":"Greenhouse gases & pollutants","discipline":"chemistry","blurb":"The greenhouse effect, climate change, the carbon footprint and combustion pollutants.","diagram":{"key":"d_GCT2","map":[["sun","sunlight","greenhouseGases","infrared"],"factory",null,"soot","acidRain"]},"vocab":[{"term":"greenhouse gas","definition":"a gas such as carbon dioxide or methane that traps heat in the atmosphere","say":"green-house gas"},{"term":"global warming","definition":"the rise in the Earth's average temperature caused by more greenhouse gases","say":"glow-bal warm-ing"},{"term":"carbon footprint","definition":"the total greenhouse gases given out over the life of a product or activity","say":"car-bon foot-print"}],"facts":["Greenhouse gases such as carbon dioxide, methane and water vapour absorb the infrared radiation re-emitted by the Earth, keeping the planet warm enough for life.","Human activities such as burning fossil fuels, deforestation and farming increase greenhouse gases, leading to global warming and climate change.","The carbon footprint is the total amount of greenhouse gases given out over the full life of a product, service or activity; it can be reduced by using less fossil fuel.","Burning fuels can release pollutants: carbon monoxide (a toxic gas from incomplete combustion) and soot (particulates).","Sulfur dioxide and oxides of nitrogen cause acid rain, and oxides of nitrogen and particulates can cause breathing problems."],"misconceptions":[{"wrong":"The greenhouse effect is entirely bad.","right":"The natural greenhouse effect keeps Earth warm enough for life; the problem is the extra warming from increased greenhouse gases."},{"wrong":"Carbon monoxide is harmless.","right":"Carbon monoxide is a toxic gas; it stops the blood carrying oxygen properly."}],"questions":[{"type":"mcq","q":"How do greenhouse gases keep the Earth warm?","options":[{"t":"They absorb infrared radiation re-emitted by the Earth","correct":true},{"t":"They block sunlight from reaching the Earth","why":"They trap heat leaving the Earth, not incoming light."},{"t":"They produce their own heat","why":"They trap heat; they do not generate it."}],"ok":"Greenhouse gases absorb infrared radiated from the Earth's surface."},{"type":"mcq","q":"Which human activity increases atmospheric carbon dioxide the most?","options":[{"t":"Burning fossil fuels","correct":true},{"t":"Photosynthesis by plants","why":"Photosynthesis removes carbon dioxide."},{"t":"Letting forests grow","why":"Growing forests absorb carbon dioxide."}],"ok":"Burning fossil fuels releases large amounts of carbon dioxide."},{"type":"mcq","q":"Why is carbon monoxide dangerous?","options":[{"t":"It is toxic and stops the blood carrying oxygen properly","correct":true},{"t":"It causes acid rain","why":"Sulfur dioxide and nitrogen oxides cause acid rain."},{"t":"It is harmless","why":"Carbon monoxide is a toxic gas."}],"ok":"Carbon monoxide is toxic; it reduces the blood's ability to carry oxygen."},{"type":"mcq","q":"Which pollutant gas causes acid rain?","options":[{"t":"Sulfur dioxide","correct":true},{"t":"Carbon monoxide","why":"Carbon monoxide is toxic but does not cause acid rain."},{"t":"Oxygen","why":"Oxygen is not a pollutant."}],"ok":"Sulfur dioxide (and oxides of nitrogen) dissolve to make acid rain."},{"type":"categorise","q":"Match each pollutant to the main problem it causes.","bins":["Toxic to humans","Acid rain","Breathing problems"],"items":[{"t":"Carbon monoxide","bin":"Toxic to humans"},{"t":"Sulfur dioxide","bin":"Acid rain"},{"t":"Particulates (soot)","bin":"Breathing problems"}],"ok":"Different combustion pollutants cause different problems.","bad":"Carbon monoxide is toxic, sulfur dioxide causes acid rain, particulates harm breathing."},{"type":"tf","q":"Increasing greenhouse gases is linked to global warming and climate change.","answer":true,"why":"More greenhouse gases trap more heat, raising the Earth's average temperature."},{"type":"mcq","q":"What is a carbon footprint?","options":[{"t":"The total greenhouse gases given out over the life of a product or activity","correct":true},{"t":"The amount of carbon in a person's body","why":"It measures greenhouse gas emissions, not body carbon."},{"t":"The size of a coal mine","why":"It is a measure of emissions, not mine size."}],"ok":"A carbon footprint is the total greenhouse gas emissions over something's whole life."}]},"GCT-EX":{"code":"GCT-EX","title":"Atmosphere — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Chemistry of the atmosphere.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Which two gases make up almost all of today's atmosphere?","options":[{"t":"Nitrogen and oxygen","correct":true},{"t":"Carbon dioxide and water vapour","why":"These are only small amounts today."},{"t":"Hydrogen and helium","why":"These are not the main atmospheric gases."}],"ok":"Today's air is about 80% nitrogen and 20% oxygen."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how and why the levels of oxygen and carbon dioxide in the Earth's atmosphere have changed since the Earth was first formed.","scheme":["The early atmosphere had a lot of carbon dioxide and little/no oxygen (1)","released by volcanoes, along with water vapour (1)","Algae and then plants carried out photosynthesis (1)","which released oxygen, so oxygen levels rose (1)","Carbon dioxide was absorbed by plants and dissolved in the oceans (1)","and became locked in sedimentary rocks and fossil fuels, so its level fell (1)"],"model":"The early atmosphere, from volcanic activity, was rich in carbon dioxide with little oxygen. As algae and plants evolved, photosynthesis released oxygen, so oxygen levels rose. Meanwhile carbon dioxide was taken up by plants, dissolved in the oceans, and locked into sedimentary rocks and fossil fuels, so its level fell to today's small amount."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Burning fuels in vehicles releases several pollutant gases. Name two pollutants and describe a problem each one causes.","scheme":["Carbon monoxide (1) is toxic / reduces oxygen carried by the blood (1)","Sulfur dioxide (1) causes acid rain (1)","(or oxides of nitrogen cause acid rain/breathing problems; particulates cause breathing problems)"],"model":"Carbon monoxide is toxic and reduces the oxygen the blood can carry. Sulfur dioxide dissolves in rain to cause acid rain, which damages buildings and plants. (Oxides of nitrogen and particulates also cause acid rain and breathing problems.)"}]},"GCU1":{"code":"GCU1","title":"Resources & potable water","discipline":"chemistry","blurb":"Finite and renewable resources, making water safe to drink, and treating waste water.","diagram":{"key":"d_GCU1","map":[null,"potableTap",["sourceWater","filterBed","steriliser"],["desalUnit","reverseOsmosis"],"settlingTank"]},"vocab":[{"term":"finite resource","definition":"a resource that will run out because it is not replaced quickly","say":"fy-nite ree-sorss"},{"term":"potable water","definition":"water that is safe to drink","say":"poh-ta-bul wa-ter"},{"term":"desalination","definition":"removing salt from sea water to make it drinkable","say":"dee-sal-in-ay-shun"}],"facts":["Natural resources can be finite (like fossil fuels and metal ores) or renewable; chemistry helps by improving processes and finding sustainable alternatives.","Potable water is water that is safe to drink; it is not pure, because it still contains dissolved substances.","In the UK, fresh water is made potable by filtering to remove solids and then sterilising with chlorine, ozone or ultraviolet light to kill microbes.","Where fresh water is scarce, salty water can be made drinkable by desalination, using distillation or reverse osmosis, both of which need a lot of energy.","Waste water is treated by screening to remove large solids, settling out sludge (sedimentation), and breaking down organic matter with aerobic bacteria."],"misconceptions":[{"wrong":"Potable water is pure water.","right":"Potable water is safe to drink but still contains dissolved substances, so it is not chemically pure."},{"wrong":"Desalination is cheap and easy.","right":"Desalination needs a lot of energy, so it is expensive and usually a last resort."}],"questions":[{"type":"mcq","q":"What is potable water?","options":[{"t":"Water that is safe to drink","correct":true},{"t":"Chemically pure water","why":"Potable water still contains dissolved substances."},{"t":"Sea water","why":"Sea water is not safe to drink without treatment."}],"ok":"Potable water is safe to drink, though not chemically pure."},{"type":"mcq","q":"How is fresh water usually made potable in the UK?","options":[{"t":"Filtering to remove solids, then sterilising to kill microbes","correct":true},{"t":"Just adding salt","why":"Salt is removed, not added, and does not sterilise."},{"t":"Freezing it solid","why":"Freezing is not the standard treatment."}],"ok":"Fresh water is filtered then sterilised with chlorine, ozone or UV."},{"type":"mcq","q":"What is desalination?","options":[{"t":"Removing salt from sea water to make it drinkable","correct":true},{"t":"Adding salt to water","why":"Desalination removes salt, not adds it."},{"t":"Filtering out solids","why":"Filtering removes solids, not dissolved salt."}],"ok":"Desalination removes dissolved salt from sea water."},{"type":"mcq","q":"Why is desalination usually a last resort?","options":[{"t":"It needs a lot of energy, so it is expensive","correct":true},{"t":"It makes water poisonous","why":"Desalination makes water safe, not poisonous."},{"t":"It is illegal","why":"It is legal but energy-intensive."}],"ok":"Desalination uses a lot of energy, making it costly."},{"type":"tf","q":"Potable water is the same as pure water.","answer":false,"why":"Potable water is safe to drink but still contains dissolved substances, so it is not pure."},{"type":"mcq","q":"Which step of water treatment kills microbes?","options":[{"t":"Sterilising with chlorine, ozone or UV light","correct":true},{"t":"Filtering","why":"Filtering removes solids, not microbes."},{"t":"Sedimentation","why":"Settling removes solids, not microbes."}],"ok":"Sterilising with chlorine, ozone or UV kills microbes in the water."}]},"GCU2":{"code":"GCU2","title":"Life cycle assessment & recycling","discipline":"chemistry","blurb":"Assessing environmental impact and conserving resources by reducing, reusing and recycling.","diagram":{"key":"d_GCU2","map":[["rawMaterials","manufacture","use","disposal"],"recycleLoop",null,"biasScale",null]},"vocab":[{"term":"life cycle assessment","definition":"an assessment of the environmental impact of a product over its whole life","say":"life cycle ass-ess-ment"},{"term":"recycling","definition":"processing used materials so they can be used again","say":"ree-sy-cling"}],"facts":["A life cycle assessment (LCA) looks at the environmental impact of a product at every stage: getting the raw materials, manufacturing, using the product, and disposing of it.","Reducing, reusing and recycling materials conserves limited resources, saves energy, reduces waste and cuts environmental damage.","Recycling metals usually uses much less energy than extracting new metal from its ore.","Some parts of an LCA, such as the effect of pollutants, are hard to measure and can be judged differently by different people.","This means an LCA can be biased, for example if a company uses it to make its product look better."],"misconceptions":[{"wrong":"A life cycle assessment only looks at how a product is made.","right":"An LCA covers the whole life: raw materials, manufacture, use AND disposal."},{"wrong":"Recycling a metal uses more energy than extracting it.","right":"Recycling a metal usually uses far less energy than extracting it from its ore."}],"questions":[{"type":"mcq","q":"What does a life cycle assessment consider?","options":[{"t":"The environmental impact across a product's whole life","correct":true},{"t":"Only how much the product costs to buy","why":"An LCA is about environmental impact, not just cost."},{"t":"Only the manufacturing stage","why":"An LCA covers all stages, not just manufacture."}],"ok":"An LCA covers raw materials, manufacture, use and disposal."},{"type":"mcq","q":"Why does recycling a metal save energy?","options":[{"t":"It uses much less energy than extracting new metal from its ore","correct":true},{"t":"It creates new ore","why":"Recycling reuses metal; it does not make ore."},{"t":"It uses no energy at all","why":"Recycling uses energy, but far less than extraction."}],"ok":"Recycling avoids the energy-heavy step of extracting metal from ore."},{"type":"order","q":"Put the stages of a life cycle assessment in order.","items":["Getting the raw materials","Manufacturing the product","Using the product","Disposing of the product"],"ok":"An LCA follows a product from raw materials, through manufacture and use, to disposal."},{"type":"mcq","q":"Why can a life cycle assessment be biased?","options":[{"t":"Some impacts are hard to measure and can be judged differently","correct":true},{"t":"It always gives an exact, certain answer","why":"Some parts are subjective, so it is not always exact."},{"t":"It ignores the environment","why":"An LCA is all about environmental impact."}],"ok":"Some impacts are hard to quantify, so an LCA can be made to favour a product."},{"type":"multi","q":"Tap the benefits of reducing, reusing and recycling materials.","items":[{"t":"Conserves limited resources","correct":true},{"t":"Saves energy","correct":true},{"t":"Reduces waste","correct":true},{"t":"Uses up resources faster"}],"ok":"Reduce, reuse and recycle conserve resources, save energy and cut waste.","bad":"These actions conserve resources rather than using them up faster."},{"type":"tf","q":"Recycling a metal usually uses less energy than extracting it from its ore.","answer":true,"why":"Recycling skips the energy-intensive extraction step, so it saves energy."}]},"GCU-EX":{"code":"GCU-EX","title":"Using resources — Exam practice","discipline":"chemistry","blurb":"Mixed exam-style questions for Using resources.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"mcq","q":"Why is potable water not classed as a pure substance in chemistry?","options":[{"t":"It contains dissolved substances","correct":true},{"t":"It contains no water","why":"Potable water is mostly water."},{"t":"It is frozen","why":"Potability has nothing to do with being frozen."}],"ok":"Potable water is safe to drink but still contains dissolved substances, so it is not pure."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Describe how fresh water is treated to make it safe to drink (potable), and explain why sea water is more difficult and expensive to treat.","scheme":["Fresh water is passed through filters to remove insoluble solids (1)","It is then sterilised to kill microbes (1)","using chlorine, ozone or ultraviolet light (1)","Sea water contains dissolved salt that must be removed by desalination (1)","e.g. distillation or reverse osmosis (1)","these need a lot of energy, so treating sea water is more expensive (1)"],"model":"Fresh water is filtered to remove solids, then sterilised with chlorine, ozone or UV light to kill microbes. Sea water also contains dissolved salt, which must be removed by desalination (distillation or reverse osmosis). These processes require a great deal of energy, making sea water much more expensive to treat."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"Explain why recycling aluminium is better for the environment than extracting new aluminium from its ore.","scheme":["Extracting aluminium from its ore uses electrolysis, which needs a lot of electrical energy (1)","Recycling uses much less energy (1)","It conserves the finite ore / raw materials (1)","and reduces waste sent to landfill (1)"],"model":"Extracting aluminium requires electrolysis, which uses a great deal of electrical energy. Recycling melts down used aluminium, using far less energy, conserves the finite ore, and reduces waste — so it has a much smaller environmental impact."}]}});

Object.assign(CONTENT, {"GBC1":{"code":"GBC1","title":"Cell structure","discipline":"biology","blurb":"Eukaryotic and prokaryotic cells, and the parts of animal, plant and bacterial cells.","diagram":{"key":"d_GBC1","map":["cellWall",["cellMembrane","cytoplasm"],["nucleus"],["mitochondria","ribosomes"],"chloroplast"]},"vocab":[{"term":"eukaryotic cell","definition":"a cell with a nucleus, like animal and plant cells","say":"yoo-kair-ee-ot-ic"},{"term":"prokaryotic cell","definition":"a cell with no nucleus, like a bacterium","say":"pro-kair-ee-ot-ic"},{"term":"nucleus","definition":"the part of a cell that controls it and holds the DNA","say":"new-clee-us"},{"term":"mitochondria","definition":"the parts of a cell where aerobic respiration happens","say":"my-toh-con-dree-a"},{"term":"chloroplast","definition":"the green part of a plant cell where photosynthesis happens","say":"klor-oh-plast"}],"facts":["Eukaryotic cells (animal and plant cells) have a nucleus; prokaryotic cells (bacteria) do not, and their genetic material is a single DNA loop, sometimes with extra rings called plasmids.","Animal cells contain a nucleus, cytoplasm, a cell membrane, mitochondria and ribosomes.","Plant cells have all of those plus a cell wall (made of cellulose), a permanent vacuole and often chloroplasts.","The nucleus controls the cell and holds the DNA; mitochondria are where aerobic respiration releases energy; ribosomes are where proteins are made.","Chloroplasts contain chlorophyll and are where photosynthesis happens; bacterial cells are much smaller than plant and animal cells."],"misconceptions":[{"wrong":"All cells have a nucleus.","right":"Eukaryotic cells have a nucleus, but prokaryotic cells (bacteria) do not."},{"wrong":"Animal cells have a cell wall.","right":"Only plant (and bacterial) cells have a cell wall; animal cells do not."}],"questions":[{"type":"mcq","q":"What is the main difference between a eukaryotic and a prokaryotic cell?","options":[{"t":"Eukaryotic cells have a nucleus; prokaryotic cells do not","correct":true},{"t":"Prokaryotic cells are bigger","why":"Prokaryotic (bacterial) cells are much smaller."},{"t":"Only eukaryotic cells have DNA","why":"Both have DNA, but prokaryotes have no nucleus."}],"ok":"Eukaryotic cells have a nucleus; prokaryotic cells (bacteria) do not."},{"type":"multi","q":"Tap the parts found in a plant cell but NOT an animal cell.","items":[{"t":"Cell wall","correct":true},{"t":"Permanent vacuole","correct":true},{"t":"Chloroplasts","correct":true},{"t":"Cytoplasm"}],"ok":"Plant cells have a cell wall, vacuole and chloroplasts; cytoplasm is in both.","bad":"Cytoplasm is in both animal and plant cells."},{"type":"mcq","q":"What does the nucleus do?","options":[{"t":"Controls the cell and holds the DNA","correct":true},{"t":"Releases energy by respiration","why":"That is the mitochondria."},{"t":"Makes food by photosynthesis","why":"That is the chloroplast."}],"ok":"The nucleus controls the cell and contains the DNA."},{"type":"mcq","q":"Where does aerobic respiration happen in a cell?","options":[{"t":"In the mitochondria","correct":true},{"t":"In the nucleus","why":"The nucleus controls the cell; respiration is in mitochondria."},{"t":"In the cell wall","why":"The cell wall supports the cell; it does not respire."}],"ok":"Mitochondria are the site of aerobic respiration."},{"type":"mcq","q":"What is the genetic material of a bacterium like?","options":[{"t":"A single loop of DNA, sometimes with plasmids","correct":true},{"t":"DNA inside a nucleus","why":"Bacteria have no nucleus."},{"t":"Chloroplasts","why":"Bacteria do not have chloroplasts."}],"ok":"Bacteria have a single DNA loop and sometimes plasmids, with no nucleus."},{"type":"categorise","q":"Sort each cell part by where it is found.","bins":["Plant cells only","Both animal and plant cells"],"items":[{"t":"Chloroplast","bin":"Plant cells only"},{"t":"Cell wall","bin":"Plant cells only"},{"t":"Mitochondria","bin":"Both animal and plant cells"},{"t":"Cell membrane","bin":"Both animal and plant cells"},{"t":"Nucleus","bin":"Both animal and plant cells"}],"ok":"Chloroplasts and cell walls are plant-only; membranes, nuclei and mitochondria are in both.","bad":"Animal cells lack a cell wall and chloroplasts."},{"type":"tf","q":"Bacterial cells contain a nucleus.","answer":false,"why":"Bacteria are prokaryotic, so they have no nucleus; their DNA is a single loop."}]},"GBC2":{"code":"GBC2","title":"Microscopy & specialised cells","discipline":"biology","blurb":"Magnification, light and electron microscopes, differentiation and stem cells.","diagram":{"key":"d_GBC2","map":[["eyepiece","objective"],null,"specialisedCell","rootHair","stemCell"]},"vocab":[{"term":"magnification","definition":"how many times bigger an image is than the real object","say":"mag-ni-fi-cay-shun"},{"term":"differentiation","definition":"when a cell becomes specialised for a particular job","say":"diff-er-en-she-ay-shun"},{"term":"stem cell","definition":"an unspecialised cell that can divide to form other types of cell","say":"stem cell"}],"facts":["Magnification = size of image / size of real object. The total magnification of a microscope = eyepiece lens magnification x objective lens magnification.","Light microscopes are cheaper and can view living cells, but electron microscopes have a much higher magnification and resolution, revealing tiny structures.","Differentiation is the process by which a cell becomes specialised to do a particular job, for example a nerve cell or a root hair cell.","Specialised cells have features suited to their function, such as a sperm cell's tail or a root hair cell's large surface area.","Stem cells are unspecialised cells that can divide and differentiate; they are found in early embryos, in adult bone marrow, and in plant meristems."],"misconceptions":[{"wrong":"Electron microscopes can view living cells.","right":"Electron microscopes cannot view living cells, but they give much higher magnification and resolution than light microscopes."},{"wrong":"A specialised cell can become any other type of cell.","right":"Once differentiated, most animal cells cannot change; stem cells are the unspecialised cells that can become different types."}],"questions":[{"type":"numeric","kicker":"Work it out","q":"A cell image is 40 mm wide and the real cell is 0.1 mm wide. What is the magnification?","hint":"magnification = size of image / size of real object","answer":400,"unit":"","ok":"40 / 0.1 = 400 times."},{"type":"numeric","kicker":"Work it out","q":"A microscope has an eyepiece of 10x and an objective of 40x. What is the total magnification?","hint":"total magnification = eyepiece x objective","answer":400,"unit":"","ok":"10 x 40 = 400 times."},{"type":"mcq","q":"What is an advantage of an electron microscope over a light microscope?","options":[{"t":"Much higher magnification and resolution","correct":true},{"t":"It can view living cells","why":"Electron microscopes cannot view living cells."},{"t":"It is cheaper","why":"Electron microscopes are far more expensive."}],"ok":"Electron microscopes give much higher magnification and resolution."},{"type":"mcq","q":"What is differentiation?","options":[{"t":"When a cell becomes specialised for a particular job","correct":true},{"t":"When a cell divides into two","why":"That is cell division, not differentiation."},{"t":"When a cell dies","why":"Differentiation is becoming specialised, not dying."}],"ok":"Differentiation is a cell becoming specialised for its function."},{"type":"mcq","q":"What is a stem cell?","options":[{"t":"An unspecialised cell that can divide and become different types of cell","correct":true},{"t":"A fully specialised nerve cell","why":"A stem cell is unspecialised."},{"t":"A dead cell","why":"Stem cells are living, dividing cells."}],"ok":"Stem cells are unspecialised and can differentiate into other cell types."},{"type":"tf","q":"A root hair cell's large surface area helps it absorb water and minerals.","answer":true,"why":"Root hair cells are specialised with a large surface area to absorb water and minerals efficiently."},{"type":"mcq","q":"Where are stem cells found in a plant?","options":[{"t":"In the meristems","correct":true},{"t":"In the chloroplasts","why":"Chloroplasts carry out photosynthesis, not cell division."},{"t":"In the xylem vessels","why":"Xylem is dead tissue for transport, not stem cells."}],"ok":"Plant stem cells are found in the meristems, where growth happens."}]},"GBC3":{"code":"GBC3","title":"Cell division & transport","discipline":"biology","blurb":"Mitosis and the cell cycle, plus diffusion, osmosis and active transport.","diagram":{"key":"d_GBC3","map":["mitosis","diffusion",["osmosis","membrane"],"activeTransport","gradient"]},"vocab":[{"term":"mitosis","definition":"cell division that makes two identical cells for growth and repair","say":"my-toh-sis"},{"term":"diffusion","definition":"the spreading of particles from a high to a low concentration","say":"diff-yoo-shun"},{"term":"osmosis","definition":"the diffusion of water across a partially permeable membrane","say":"oz-moh-sis"},{"term":"active transport","definition":"moving substances against a concentration gradient, using energy","say":"ac-tiv transport"}],"facts":["In the cell cycle, the cell grows and copies its DNA, then divides by mitosis to make two genetically identical cells, used for growth and repair.","Diffusion is the net movement of particles from an area of higher concentration to an area of lower concentration, down a concentration gradient.","Osmosis is the diffusion of water across a partially permeable membrane, from a dilute solution to a more concentrated one.","Active transport moves substances from a lower to a higher concentration (against the gradient), which needs energy from respiration.","A larger surface area, a shorter distance, and a bigger concentration difference all increase the rate of diffusion."],"misconceptions":[{"wrong":"Osmosis is the movement of any particle across a membrane.","right":"Osmosis is specifically the movement of WATER across a partially permeable membrane."},{"wrong":"Active transport needs no energy.","right":"Active transport moves substances against the gradient, so it needs energy from respiration."}],"questions":[{"type":"mcq","q":"What does mitosis produce?","options":[{"t":"Two genetically identical cells","correct":true},{"t":"Four different cells","why":"That describes meiosis, not mitosis."},{"t":"Cells with half the DNA","why":"Mitosis keeps the full set of DNA; meiosis halves it."}],"ok":"Mitosis makes two identical cells for growth and repair."},{"type":"mcq","q":"What is diffusion?","options":[{"t":"Movement of particles from high to low concentration","correct":true},{"t":"Movement of water only","why":"That is osmosis specifically."},{"t":"Movement using energy against the gradient","why":"That is active transport."}],"ok":"Diffusion is net movement down a concentration gradient."},{"type":"mcq","q":"What is osmosis?","options":[{"t":"The diffusion of water across a partially permeable membrane","correct":true},{"t":"The diffusion of any particle","why":"Osmosis is specifically about water."},{"t":"Active movement of salt","why":"Osmosis is the passive movement of water."}],"ok":"Osmosis is the movement of water across a partially permeable membrane."},{"type":"mcq","q":"How is active transport different from diffusion?","options":[{"t":"It moves substances against the gradient and needs energy","correct":true},{"t":"It needs no energy","why":"Active transport requires energy from respiration."},{"t":"It only moves water","why":"Active transport can move many dissolved substances."}],"ok":"Active transport works against the concentration gradient, using energy."},{"type":"multi","q":"Tap what increases the rate of diffusion.","items":[{"t":"A larger surface area","correct":true},{"t":"A shorter diffusion distance","correct":true},{"t":"A bigger concentration difference","correct":true},{"t":"A thicker membrane"}],"ok":"More surface, shorter distance and a bigger concentration difference all speed diffusion.","bad":"A thicker membrane is a longer distance, which slows diffusion."},{"type":"tf","q":"Active transport allows a root to absorb minerals even when they are more concentrated inside the root than in the soil.","answer":true,"why":"Active transport moves minerals against the gradient into the root, using energy."},{"type":"mcq","q":"Why does active transport require energy?","options":[{"t":"It moves substances from a low to a high concentration","correct":true},{"t":"It moves substances down the gradient","why":"Moving down the gradient is diffusion and needs no energy."},{"t":"It destroys the membrane","why":"Active transport uses carrier proteins, not membrane destruction."}],"ok":"Going against the concentration gradient requires energy from respiration."}]},"GBC-EX":{"code":"GBC-EX","title":"Cell biology — Exam practice","discipline":"biology","blurb":"Mixed exam-style questions for Cell biology.","vocab":[],"facts":[],"misconceptions":[],"questions":[{"type":"numeric","kicker":"Exam · calculate","q":"An image of a cell is 60 mm long and the magnification is 300x. Calculate the real length of the cell in mm.","hint":"real size = image size / magnification","answer":0.2,"unit":"mm","ok":"60 / 300 = 0.2 mm."},{"type":"mcq","q":"A cell has no nucleus and its DNA is a single loop. What type of cell is it?","options":[{"t":"A prokaryotic cell (bacterium)","correct":true},{"t":"An animal cell","why":"Animal cells have a nucleus."},{"t":"A plant cell","why":"Plant cells have a nucleus."}],"ok":"No nucleus and a single DNA loop means a prokaryotic (bacterial) cell."},{"type":"exam","kicker":"Exam practice","marks":6,"q":"Explain how the structure of a plant root hair cell is adapted for absorbing water and dissolved minerals.","scheme":["It has a long extension / large surface area (1)","so more water and minerals can be absorbed (1)","It has a thin cell wall / membrane (1)","giving a short distance for substances to cross (1)","It has many mitochondria (1)","which release energy for active transport of minerals against the gradient (1)"],"model":"A root hair cell has a long projection giving a large surface area, so more water and minerals can be absorbed. Its thin wall gives a short distance for substances to cross. It has many mitochondria to release energy for active transport, allowing minerals to be taken up against the concentration gradient."},{"type":"exam","kicker":"Exam practice","marks":4,"q":"A student places potato chips in salt solutions of different concentrations. Explain, using osmosis, why a chip in a concentrated salt solution loses mass.","scheme":["The salt solution is more concentrated than the potato cells (1)","Water moves out of the cells by osmosis (1)","across the partially permeable cell membrane (1)","so the chip loses mass (water) (1)"],"model":"The concentrated salt solution has a lower water concentration than inside the potato cells, so water moves out of the cells by osmosis across the partially permeable membrane. Losing water means the chip loses mass."}]},"GBO1":{"code":"GBO1","title":"Enzymes & digestion","discipline":"biology","blurb":"How enzymes work, the digestive enzymes, and food tests.","diagram":{"key":"d_GBO1","map":["enzyme",["activeSite","substrate"],"denatured","products",null]},"vocab":[{"term":"enzyme","definition":"a biological catalyst that speeds up reactions in living things","say":"en-zime"},{"term":"substrate","definition":"the molecule that an enzyme acts on","say":"sub-strayt"},{"term":"active site","definition":"the part of an enzyme where the substrate fits","say":"ac-tiv site"}],"facts":["Enzymes are biological catalysts: proteins that speed up reactions without being used up.","Each enzyme has a specific shape (active site) that fits only its substrate, like a lock and key.","Enzymes work fastest at their optimum temperature and pH; too high a temperature or the wrong pH changes the active site's shape (denaturing) so the substrate no longer fits.","Carbohydrase enzymes (e.g. amylase) break down starch to sugars, protease breaks proteins into amino acids, and lipase breaks lipids into fatty acids and glycerol.","Food tests: iodine turns blue-black with starch; Benedict's solution turns brick-red when heated with sugar; biuret turns purple with protein; ethanol gives a cloudy white layer with lipids."],"misconceptions":[{"wrong":"A denatured enzyme just slows down and can recover.","right":"Denaturing permanently changes the active site's shape, so the enzyme no longer works."},{"wrong":"One enzyme can break down any food molecule.","right":"Each enzyme is specific: its active site only fits one type of substrate."}],"questions":[{"type":"mcq","q":"What is an enzyme?","options":[{"t":"A biological catalyst that speeds up reactions","correct":true},{"t":"A type of sugar","why":"Enzymes are proteins, not sugars."},{"t":"A food molecule that is broken down","why":"That is the substrate; the enzyme breaks it down."}],"ok":"Enzymes are biological catalysts (proteins) that speed up reactions."},{"type":"mcq","q":"Why does each enzyme only work on one substrate?","options":[{"t":"Its active site has a specific shape that fits only that substrate","correct":true},{"t":"Enzymes are too weak for big molecules","why":"Specificity is about shape, not strength."},{"t":"Enzymes only work once","why":"Enzymes are not used up and can work repeatedly."}],"ok":"The lock-and-key shape of the active site makes an enzyme specific."},{"type":"mcq","q":"What happens to an enzyme at too high a temperature?","options":[{"t":"Its active site changes shape (denatures) and stops working","correct":true},{"t":"It works faster forever","why":"Beyond the optimum it denatures and stops working."},{"t":"It turns into a sugar","why":"Enzymes do not turn into sugars."}],"ok":"Too much heat denatures the enz
