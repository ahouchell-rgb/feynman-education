font-family="Instrument Serif, Georgia, serif" font-size="30" fill="#1a1714" font-weight="400" text-anchor="start">Roots &amp; the turning point</text><circle cx="328" cy="236" r="3" fill="#2e3a5f"/><text x="342" y="241" font-family="IBM Plex Sans, Helvetica, sans-serif" font-size="15" fill="#4d4940" font-weight="400" text-anchor="start">A quadratic y = x² + bx + c makes a parabola.</text><circle cx="328" cy="270" r="3" fill="#2e3a5f"/><text x="342" y="275" font-family="IBM Plex Sans, Helvetica, sans-serif" font-size="15" fill="#4d4940" font-weight="400" text-anchor="start">Roots = where the curve cuts the x-axis (y = 0).</text><circle cx="328" cy="304" r="3" fill="#2e3a5f"/><text x="342" y="309" font-family="IBM Plex Sans, Helvetica, sans-serif" font-size="15" fill="#4d4940" font-weight="400" text-anchor="start">Turning point sits on the line of symmetry, halfway between the roots.</text><circle cx="328" cy="338" r="3" fill="#2e3a5f"/><text x="342" y="343" font-family="IBM Plex Sans, Helvetica, sans-serif" font-size="15" fill="#4d4940" font-weight="400" text-anchor="start">Factorise to find the roots: x² − 2x − 3 = (x−3)(x+1).</text><rect x="906" y="228" width="290" height="210" rx="8" fill="#faf6ec" stroke="#dcd5c0" opacity="1"/><line x1="926" y1="398" x2="1176" y2="398" stroke="#b8b1a0"/><line x1="1051.0" y1="244" x2="1051.0" y2="422" stroke="#b8b1a0"/><path d="M926,248 L937,272 L947,294 L957,314 L968,331 L978,347 L989,361 L999,372 L1009,381 L1020,389 L1030,394 L1041,397 L1051,398 L1061,397 L1072,394 L1082,389 L1093,381 L1103,372 L1113,361 L1124,347 L1134,331 L1145,314 L1155,294 L1165,272 L1176,248" fill="none" stroke="#2e3a5f" stroke-width="2.5"/><circle cx="1051.0" cy="0" r="0" fill="none"/><circle cx="1051.0" cy="0" r="0" fill="none"/><circle cx="978" cy="398" r="4" fill="#b95a3c"/><circle cx="1124" cy="398" r="4" fill="#b95a3c"/><circle cx="1051" cy="398" r="4" fill="#5e7c4b"/><text x="1051.0" y="430" font-family="IBM Plex Mono, monospace" font-size="9" fill=